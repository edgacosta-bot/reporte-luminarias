<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script>
protegerPagina(["colono","residente","admin"]);
</script>

<title>Dashboard Luminarias</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #161a1d;
  color: white;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 15px;
}

h1 {
  text-align: center;
  margin-bottom: 15px;
}

select {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  background: #1e293b;
  color: white;
  border: none;
  margin-bottom: 15px;
}

.card {
  background: #1e293b;
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 10px;
  text-align: center;
}

.kpis {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

.kpis .card {
  flex: 1;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th {
  background: #334155;
  padding: 10px;
  font-size: 13px;
}

td {
  padding: 10px;
  border-bottom: 1px solid #334155;
  font-size: 13px;
}

.back {
  display: block;
  text-align: center;
  padding: 14px;
  margin-top: 15px;
  background: #374151;
  border-radius: 10px;
  text-decoration: none;
  color: white;
}
</style>
</head>

<body>

<div class="container">

<h1>💡 Estado de luminarias</h1>

<!-- 🔽 FILTRO -->
<select id="filtroCalle" onchange="filtrar()">
  <option value="">Todas las calles</option>
</select>

<!-- 📊 KPIs -->
<div class="kpis">
  <div class="card">
    <div>Total</div>
    <div id="kpiTotal">0</div>
  </div>
  <div class="card">
    <div>Operativas</div>
    <div id="kpiOk">0</div>
  </div>
  <div class="card">
    <div>Fuera de servicio</div>
    <div id="kpiFail">0</div>
  </div>
  <div class="card">
    <div>Prever reemplazo prox.</div>
    <div id="kpiPrev">0</div>
  </div>
</div>

<!-- 📋 TABLA -->
<table>
  <thead>
    <tr>
      <th>No. luminaria conforme croquis</th>
      <th>Situación</th>
      <th>% Vida útil</th>
      <th>Acción a realizar</th>
    </tr>
  </thead>
  <tbody id="tabla"></tbody>
</table>

<a href="luminarias.html" class="back">← Volver</a>

</div>

<script>

let datosGlobal = [];

// 🔄 CARGAR DATA
async function cargar() {

  const { data, error } = await supabaseClient
    .from("dashboard_luminarias_safe")
    .select("*");

  if (error) {
    console.error(error);
    return;
  }

  datosGlobal = data;

  llenarFiltroCalles(data);
  render(data);
}

// 🔽 LLENAR SELECT
function llenarFiltroCalles(data) {
  const select = document.getElementById("filtroCalle");

  const calles = [...new Set(data.map(d => d.calle))].sort();

  calles.forEach(calle => {
    const option = document.createElement("option");
    option.value = calle;
    option.textContent = calle;
    select.appendChild(option);
  });
}

// 🔍 FILTRO
function filtrar() {

  const calle = document.getElementById("filtroCalle").value;

  let filtrados = datosGlobal;

  if (calle) {
    filtrados = filtrados.filter(d => d.calle === calle);
  }

  render(filtrados);
}

// 🎯 RENDER
function render(data) {

  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  let total = data.length;
  let ok = 0;
  let fail = 0;
  let prev = 0;

  data.forEach(l => {

    if (l.situacion === "Operativo") ok++;
    if (l.situacion === "Fuera de servicio") fail++;
    if (l.estado_automatico === "Prever reemplazo próximo") prev++;

    tabla.innerHTML += `
      <tr>
        <td>${l.no_luminaria}</td>
        <td>${l.situacion}</td>
        <td>${(l.porcentaje_vida * 100).toFixed(2)} %</td>
        <td>${l.estado_automatico}</td>
      </tr>
    `;
  });

  document.getElementById("kpiTotal").innerText = total;
  document.getElementById("kpiOk").innerText = ok;
  document.getElementById("kpiFail").innerText = fail;
  document.getElementById("kpiPrev").innerText = prev;
}

// 🚀 INICIO
cargar();

</script>

</body>
</html>

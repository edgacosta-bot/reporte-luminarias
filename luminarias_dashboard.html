<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script>
protegerPagina(["administracion","colono","residente",]);
</script>

<title>Dashboard Luminarias</title>

    <link rel="stylesheet" href="styles/luminarias_dashboard.css">
</head>

<body>

<div class="container">

<h1>💡 Estado de luminarias</h1>

<!-- 🔽 FILTRO -->
<select id="filtroCalle" onchange="filtrar()">
  <option value="">Todas las calles</option>
</select>

<!-- 📊 KPIs -->
<div class="kpis">
  <div class="card">
    <div>Total</div>
    <div id="kpiTotal">0</div>
  </div>
  <div class="card">
    <div>Operativas</div>
    <div id="kpiOk">0</div>
  </div>
  <div class="card">
    <div>Fuera de servicio</div>
    <div id="kpiFail">0</div>
  </div>
  <div class="card">
    <div>Prever reemplazo prox.</div>
    <div id="kpiPrev">0</div>
  </div>
  <div class="card">
  <div>Atender reporte</div>
  <div id="kpiAtender">0</div>
</div>
</div>

<!-- 📋 TABLA -->
<table>
  <thead>
    <tr>
      <th>No. luminaria conforme croquis</th>
      <th>Situación</th>
      <th>Porcentaje de uso (Estimado)</th>
      <th>Acción a realizar</th>
    </tr>
  </thead>
  <tbody id="tabla"></tbody>
</table>

<a href="index.html" class="back">← Volver</a>

</div>

<script>

let datosGlobal = [];

// 🔄 CARGAR DATA
async function cargar() {

  const { data, error } = await supabaseClient
  .from("dashboard_luminarias_safe")
  .select("*")
  .order("no_luminaria", { ascending: true });

  if (error) {
    console.error(error);
    return;
  }

  datosGlobal = data;

  llenarFiltroCalles(data);
  render(data);
}

// 🔽 LLENAR SELECT
function llenarFiltroCalles(data) {
  const select = document.getElementById("filtroCalle");

  const calles = [...new Set(data.map(d => d.calle))].sort();

  calles.forEach(calle => {
    const option = document.createElement("option");
    option.value = calle;
    option.textContent = calle;
    select.appendChild(option);
  });
}

// 🔍 FILTRO
function filtrar() {

  const calle = document.getElementById("filtroCalle").value;

  let filtrados = datosGlobal;

  if (calle) {
    filtrados = filtrados.filter(d => d.calle === calle);
  }

  render(filtrados);
}

// 🎯 RENDER
function render(data) {

  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  let total = data.length;
  let ok = 0;
  let fail = 0;
  let prev = 0;
  let atender = 0;

  data.forEach(l => {

    if (l.situacion === "Operativo") ok++;
    if (l.situacion === "Fuera de servicio") fail++;
    if (l.estado_automatico === "Prever reemplazo próximo") prev++;
    if (l.estado_automatico === "Atender reporte") atender++;

    tabla.innerHTML += `
      <tr>
        <td class="center">${l.no_luminaria}</td>

        <td class="${l.situacion === 'Operativo' ? 'ok' : 'fail'}">
          ${l.situacion}
        </td>

        <td class="vida">
          ${(l.porcentaje_vida * 100).toFixed(2)}%
        </td>

        <td class="${
          l.estado_automatico === 'Prever reemplazo próximo' ? 'warn' :
          l.estado_automatico === 'Reemplazar' ? 'fail' :
          l.estado_automatico === 'Atender reporte' ? 'atender' :
          'ok'
          }">
          ${l.estado_automatico}
        </td>
      </tr>
    `;
  });

  document.getElementById("kpiTotal").innerText = total;
  document.getElementById("kpiOk").innerText = ok;
  document.getElementById("kpiFail").innerText = fail;
  document.getElementById("kpiPrev").innerText = prev;
  document.getElementById("kpiAtender").innerText = atender;
}

// 🚀 INICIO
cargar();

</script>

</body>
</html>

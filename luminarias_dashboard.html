<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<title>Dashboard Luminarias</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#020617,#0f172a);
  color: white;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
}

/* KPIs */
.kpis {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}

.card {
  background: #111827;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
}

.card h3 {
  font-size: 13px;
  color: #9ca3af;
}

.card p {
  font-size: 22px;
  margin: 0;
}

/* Tabla */
table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: #1e3a8a;
  padding: 10px;
}

td {
  padding: 10px;
  text-align: center;
  border-bottom: 1px solid #374151;
}

/* estados */
.operativo { color: #22c55e; }
.fuera { color: #ef4444; }
.reemplazar { color: #f59e0b; }

.back {
  display: block;
  margin-top: 20px;
  text-align: center;
  background: #374151;
  padding: 12px;
  border-radius: 10px;
  text-decoration: none;
  color: white;
}
</style>

</head>

<body>

<div class="container">

<h1>💡 Estado de luminarias</h1>

<div class="kpis">
  <div class="card">
    <h3>Total</h3>
    <p id="total">0</p>
  </div>
  <div class="card">
    <h3>Operativas</h3>
    <p id="operativas">0</p>
  </div>
  <div class="card">
    <h3>Fuera de servicio</h3>
    <p id="fuera">0</p>
  </div>
  <div class="card">
    <h3>Reemplazo</h3>
    <p id="reemplazo">0</p>
  </div>
</div>

<table>
  <thead>
    <tr>
      <th>#</th>
      <th>Calle</th>
      <th>Privada</th>
      <th>Situación</th>
      <th>Estado</th>
    </tr>
  </thead>
  <tbody id="tabla"></tbody>
</table>

<a href="luminarias.html" class="back">← Volver</a>

</div>

<script>

let datosGlobal = [];

window.addEventListener("DOMContentLoaded", async () => {
  await protegerPagina(["admin","colono","residente"]);
  cargar();
});

async function cargar() {

  const { data, error } = await supabaseClient
    .from("dashboard_luminarias_safe")
    .select("*")
    .order("no_luminaria", { ascending: true });

  if (error) {
    console.error(error);
    return;
  }

  datosGlobal = data || [];
  render(datosGlobal);
}

function render(data) {

  document.getElementById("total").innerText = data.length;

  document.getElementById("operativas").innerText =
    data.filter(d => (d.situacion || "").toLowerCase() === "operativo").length;

  document.getElementById("fuera").innerText =
    data.filter(d => (d.situacion || "").toLowerCase() === "fuera de servicio").length;

  document.getElementById("reemplazo").innerText =
    data.filter(d => (d.estado_automatico || "").toLowerCase().includes("reemplazar")).length;

  renderTabla(data);
}

function renderTabla(data) {

  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  if (!data.length) {
    tabla.innerHTML = `<tr><td colspan="5">Sin registros</td></tr>`;
    return;
  }

  data.forEach(d => {

    const situacion = (d.situacion || "").toLowerCase();
    let clase = "";

    if (situacion === "operativo") clase = "operativo";
    if (situacion === "fuera de servicio") clase = "fuera";

    const reemplazo = (d.estado_automatico || "").toLowerCase().includes("reemplazar");

    tabla.innerHTML += `
      <tr>
        <td>${d.no_luminaria}</td>
        <td>${d.calle}</td>
        <td>${d.privada}</td>
        <td class="${clase}">${d.situacion}</td>
        <td class="${reemplazo ? "reemplazar" : ""}">${d.estado_automatico}</td>
      </tr>
    `;
  });
}

</script>

</body>
</html>

<!DOCTYPE html>

<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Reporte de Agua – Villas de la Concepción</title>
</head>
<body>

<h2>Registro Vecinal de Reportes de Agua</h2>

<form id="formAgua">

<label>Fecha del reporte</label><br> <input type="date" id="fecha_reporte" required><br><br>

<label>Número de reporte</label><br> <input type="text" id="numero_reporte" required><br><br>

<label>Tipo de falla</label><br> <select id="tipo_falla" required> <option value="">Selecciona...</option> <option>Sin suministro de agua</option> <option>Baja presión</option> <option>Servicio intermitente</option> <option>Fuga de agua</option> <option>Otro</option> </select><br><br>

<label>Calle / Privada</label><br> <select id="calle_id" required></select><br><br>

<label>Número exterior</label><br> <input type="text" id="numero_exterior"><br><br>

<button type="submit">Enviar reporte</button>

</form>

<script>
const SUPABASE_URL = "https://prjxmfhahnzosdwljode.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs";
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyKWLCyjXmziMIFu_2bQoaawhzE4IUAbRnf71fvNsCjuea5DmH150w93FgLC9WqMIw/exec";


// ===============================
// 🔽 CARGAR CALLES DESDE SUPABASE
// ===============================
async function cargarCalles() {

  const res = await fetch(`${SUPABASE_URL}/rest/v1/ubicaciones?select=id,calle&order=calle.asc`, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    }
  });

  const data = await res.json();
  const select = document.getElementById("calle_id");

  data.forEach(item => {
    const option = document.createElement("option");
    option.value = item.id;
    option.textContent = item.calle;
    select.appendChild(option);
  });
}

cargarCalles();


// ===============================
// 🔽 ENVÍO DEL FORMULARIO
// ===============================
document.getElementById("formAgua").addEventListener("submit", async (e) => {

  e.preventDefault();

 const select = document.getElementById("calle_id");

// 👉 SOLO lo que Supabase necesita
const dataSupabase = {
  fecha_reporte: document.getElementById("fecha_reporte").value,
  numero_reporte: document.getElementById("numero_reporte").value.trim(),
  tipo_falla: document.getElementById("tipo_falla").value,
  calle_id: parseInt(select.value),
  numero_exterior: document.getElementById("numero_exterior").value.trim()
};

// 👉 lo que irá a Sheets
const dataSheets = {
  ...dataSupabase,
  calle: select.options[select.selectedIndex].text
};

  try {

    // 🔹 1. GUARDAR EN SUPABASE
    const res = await fetch(`${SUPABASE_URL}/rest/v1/reportes_agua_caasim`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`
      },
      body: JSON.stringify(dataSupabase)
    });

    if (!res.ok) {
      alert("Error al guardar en Supabase");
      return;
    }

    // 🔹 2. GUARDAR EN SHEETS (ESPEJO)
    await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      body: "data=" + encodeURIComponent(JSON.stringify(data))
    });

    alert("Reporte enviado correctamente");
    e.target.reset();

  } catch (error) {
    alert("Error al enviar");
  }

});
</script>

</body>
</html>

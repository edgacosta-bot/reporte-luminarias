<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QR Asesores Inmobiliarios</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="auth.js"></script>

<style>

body{
  margin:0;
  font-family:'Segoe UI';
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
}

.container{
  max-width:700px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
}

.kpi{
  background:#111827;
  border-radius:18px;
  padding:20px;
  text-align:center;
  margin-bottom:20px;
}

.kpi span{
  font-size:34px;
  font-weight:bold;
}

.card{
  background:#111827;
  border-radius:18px;
  padding:18px;
  margin-bottom:12px;
}

.titulo-asesor{

  font-size:18px;

  font-weight:bold;

  color:#93c5fd;

  margin-bottom:10px;

}

.activo{

  color:#22c55e;

  font-weight:bold;

}

.inactivo{

  color:#ef4444;

  font-weight:bold;

}  

#contenedorNotificaciones{
  position:fixed;
  top:20px;
  right:20px;
  width:350px;
  z-index:10000;
}

.notificacion{
  padding:14px;
  border-radius:12px;
  margin-bottom:10px;
  font-weight:600;
  animation:aparecer .25s ease;
    box-shadow:
    0 4px 12px rgba(0,0,0,.35);
}

.notificacion.exito{
  background:#14532d;
  border:1px solid #22c55e;
  color:white;
}

.notificacion.error{
  background:#7f1d1d;
  border:1px solid #ef4444;
  color:white;
}

@keyframes aparecer{

  from{
    opacity:0;
    transform:translateY(-10px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }

}
  
</style>

</head>

<body>

<div class="container">

  <h1>
  🔐 Códigos QR de Asesores
  </h1>

  <div id="contenedorNotificaciones"></div>

  
   <div style="text-align:center;margin-bottom:20px;">

 
</div> 

  <div id="lista"></div>

</div>

<script>    

let asesores = [];

let notificacionActual = null;

function mostrarNotificacion(
  mensaje,
  tipo = "exito"
){

   const contenedor =
    document.getElementById(
      "contenedorNotificaciones"
    );

  
  if(notificacionActual){
    notificacionActual.remove();
  }

  const div =
    document.createElement(
      "div"
    );

  div.className =
    `notificacion ${tipo}`;

  div.innerHTML =
    mensaje;

  contenedor.appendChild(
    div
  );

  notificacionActual = div;

  setTimeout(()=>{

    if(div.parentNode){

      div.remove();

      if(
        notificacionActual === div
      ){
        notificacionActual = null;
      }

    }

  },4000);

}  

async function cargar(){

  const { data, error } =
    await supabaseClient.rpc(
      "obtener_asesores_inmobiliarios"
    );

  if(error){

    console.log(error);

    return;

  }

  asesores = data || [];

  renderizar();

}

function renderizar(){

  const lista =
    document.getElementById(
      "lista"
    );

  if(
    asesores.length === 0
  ){

    lista.innerHTML =
      "<div class='card'>No existen asesores registrados.</div>";

    return;

  }

  let html = "";

  asesores.forEach(a=>{

    html += `

      <div class="card">

        <div class="titulo-asesor">

          👤 ${a.nombre}

        </div>

        <div>

          <b>🏢 Empresa:</b>

          ${a.empresa || "-"}

        </div>

        <div>

          <b>📱 Teléfono:</b>

          ${a.telefono || "-"}

        </div>

        <div>

          <b>🔐 QR:</b>

          ${
            a.qr_generado
            ? "Generado"
            : "No generado"
          }

        </div>

        <div>

          <b>📅 Vigencia:</b>

          ${
            a.vigencia_indefinida
            ? "Indefinida"
            : a.fecha_vencimiento
          }

        </div>

        <div class="${
          a.activo
          ? 'activo'
          : 'inactivo'
        }">

          ${
            a.activo
            ? '✅ ACTIVO'
            : '🚫 INACTIVO'
          }

        </div>

        <div
  style="
    margin-top:15px;
    display:flex;
    gap:10px;
  ">

  ${
    a.qr_generado
    ?
    `
      <button
        onclick="verQr(
          '${a.asesor_id}'
        )">

        👁 Ver QR

      </button>
    `
    :
    `
      <button
        onclick="generarQr(
          '${a.asesor_id}'
        )">

        🔐 Generar QR

      </button>
    `
  }

</div>
      </div>

    `;

  });

  lista.innerHTML = html;

}

  async function generarQr(id){

  if(
    !confirm(
      "¿Desea generar el código QR para este asesor?"
    )
  ){
    return;
  }

  const {
    error
  } =
  await supabaseClient.rpc(
    "generar_qr_asesor",
    {
      p_asesor_id:id
    }
  );

  if(error){

    mostrarNotificacion(
      `❌ ${error.message}`,
      "error"
    );

    return;

  }

  mostrarNotificacion(
    "✅ Código QR generado correctamente",
    "exito"
  );

  await cargar();

}

  async function verQr(id){

  const {
    data,
    error
  } =
  await supabaseClient.rpc(
    "obtener_asesor_qr",
    {
      p_asesor_id:id
    }
  );

  if(error){

    mostrarNotificacion(
      `❌ ${error.message}`,
      "error"
    );

    return;

  }

  if(!data || data.length === 0){

    mostrarNotificacion(
      "❌ No fue posible obtener la información del asesor",
      "error"
    );

    return;

  }

  const asesor = data[0];

  const url =
  `credencial_asesor.html` +
  `?asesor_id=${encodeURIComponent(
    asesor.asesor_id
  )}` +
  `&qr=${encodeURIComponent(
    asesor.qr_codigo
  )}` +
  `&nombre=${encodeURIComponent(
    asesor.nombre
  )}` +
  `&empresa=${encodeURIComponent(
    asesor.empresa || ""
  )}` +
  `&origen=admin`;

  window.open(
    url,
    "_blank"
  );

}

window.addEventListener(
  "DOMContentLoaded",
  async ()=>{

    await protegerPagina([
      "administracion"
    ]);

    await cargar();

  }
);    

</script>

</body>
</html>

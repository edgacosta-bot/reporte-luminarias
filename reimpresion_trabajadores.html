<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reimpresión QR Trabajador</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: #111827;
  padding: 20px;
  border-radius: 20px;
  width: 90%;
  max-width: 350px;
  text-align: center;
}

select, input {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: none;
  background: #1f2937;
  color: white;
}

#qr { margin-top: 15px; }

button {
  margin-top: 10px;
  padding: 12px;
  border: none;
  border-radius: 10px;
  width: 100%;
  font-weight: bold;
  cursor: pointer;
}

.btn-wa { background: #25D366; }
</style>

</head>

<body>

<div class="card">

<h2>Reimpresión QR</h2>

<select id="filtroPrivada">
  <option value="">Todas las privadas</option>
</select>

<select id="trabajador">
  <option>Cargando...</option>
</select>

<div id="qr"></div>
<div id="nombre"></div>

<button id="btnWA" class="btn-wa" style="display:none;">
📲 Enviar por WhatsApp
</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>

let dataGlobal = [];
let trabajadorSeleccionado = null;

window.addEventListener("DOMContentLoaded", async () => {
  await protegerPagina(["admin","administracion"]);
  await cargarTrabajadores();
});

async function cargarTrabajadores() {

  const { data, error } = await supabaseClient
    .from("trabajadores_obra")
    .select("*")
    .eq("activo", true)
    .order("privada")
    .order("nombre");

  if (error) return console.log(error);

  dataGlobal = data;

  cargarFiltro(data);
  render();
}

function cargarFiltro(data) {

  const filtro = document.getElementById("filtroPrivada");
  const privadas = [...new Set(data.map(t => t.privada))];

  filtro.innerHTML = '<option value="">Todas</option>';

  privadas.forEach(p => {
    const o = document.createElement("option");
    o.value = p;
    o.textContent = `Privada ${p}`;
    filtro.appendChild(o);
  });
}

function render() {

  const select = document.getElementById("trabajador");
  const privada = document.getElementById("filtroPrivada").value;

  const hoy = new Date().toLocaleDateString('sv-SE');

  let lista = dataGlobal.filter(t => {
    if (t.fecha_inicio && hoy < t.fecha_inicio) return false;
    if (t.fecha_fin && hoy > t.fecha_fin) return false;
    return true;
  });

  if (privada) {
    lista = lista.filter(t => t.privada === privada);
  }

  // 🔹 limpiar visual SIN cambiar diseño
  document.getElementById("qr").innerHTML = "";
  document.getElementById("nombre").innerText = "";
  document.getElementById("btnWA").style.display = "none";

  if (lista.length === 0) {
    select.innerHTML = '<option>No hay trabajadores</option>';
    return;
  }

  select.innerHTML = '<option value="">Selecciona</option>';

  lista.forEach(t => {
    const o = document.createElement("option");
    o.value = t.qr_codigo;
    o.textContent = t.nombre;
    o.dataset.privada = t.privada;
    o.dataset.casa = t.casa;
    select.appendChild(o);
  });
}

document.getElementById("filtroPrivada").addEventListener("change", render);

document.getElementById("trabajador").addEventListener("change", function() {

  const selected = this.options[this.selectedIndex];

  if (!selected.value) {
    document.getElementById("qr").innerHTML = "";
    document.getElementById("nombre").innerText = "";
    document.getElementById("btnWA").style.display = "none";
    return;
  }

  const codigo = selected.value;
  const nombre = selected.textContent;
  const privada = selected.dataset.privada;
  const casa = selected.dataset.casa;

  trabajadorSeleccionado = { codigo, nombre, privada, casa };

  const url = `${window.location.origin}/credencial_trabajador.html?qr=${codigo}&nombre=${encodeURIComponent(nombre)}&privada=${privada}&casa=${casa}`;

  const qrDiv = document.getElementById("qr");
  qrDiv.innerHTML = "";

  QRCode.toCanvas(url, { width: 200 }, (err, canvas) => {
    if (err) return console.error(err);
    qrDiv.appendChild(canvas);
  });

  document.getElementById("nombre").innerText = nombre;
  document.getElementById("btnWA").style.display = "block";
});

document.getElementById("btnWA").addEventListener("click", () => {

  if (!trabajadorSeleccionado) return;

  const { codigo, nombre, privada, casa } = trabajadorSeleccionado;

  const link = `${window.location.origin}/credencial_trabajador.html?qr=${codigo}&nombre=${encodeURIComponent(nombre)}&privada=${privada}&casa=${casa}`;

  const mensaje = `👷 Credencial\n\nNombre: ${nombre}\nPrivada ${privada} - Lote ${casa}\n\n${link}`;

  window.open(`https://wa.me/?text=${encodeURIComponent(mensaje)}`, "_blank");
});

</script>

</body>
</html>

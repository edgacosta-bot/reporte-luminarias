<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reimpresión QR</title>

<script src="auth.js"></script>
<script>
protegerPagina(["admin"]);
</script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

.grupo {
  margin-bottom: 20px;
}

.titulo-grupo {
  font-weight: bold;
  margin-bottom: 10px;
  color: #94a3b8;
}

.card {
  background: #1f2937;
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.nombre {
  font-size: 14px;
}

button {
  padding: 8px 12px;
  border: none;
  border-radius: 8px;
  background: #2563eb;
  color: white;
  font-size: 12px;
  cursor: pointer;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="container">

<h2>🔁 Reimpresión de QR</h2>

<div id="lista"></div>

</div>

<script>

const client = supabase.createClient(
  "https://prjxmfhahnzosdwljode.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs"
);

cargar();

async function cargar() {

  const { data } = await client
    .from("trabajadores_obra")
    .select("*")
    .not("qr_codigo", "is", null)
    .order("privada", { ascending: true })
    .order("casa", { ascending: true });

  const contenedor = document.getElementById("lista");
  contenedor.innerHTML = "";

  const grupos = {};

  data.forEach(t => {

    const clave = `Privada ${t.privada} - Casa ${t.casa}`;

    if (!grupos[clave]) grupos[clave] = [];

    grupos[clave].push(t);
  });

  Object.keys(grupos).forEach(grupo => {

    const divGrupo = document.createElement("div");
    divGrupo.className = "grupo";

    divGrupo.innerHTML = `<div class="titulo-grupo">${grupo}</div>`;

    grupos[grupo].forEach(t => {

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <div class="nombre">${t.nombre}</div>
        <button onclick="reimprimir('${t.qr_codigo}', '${t.nombre}', '${t.privada}', '${t.casa}')">
          Reimprimir QR
        </button>
      `;

      divGrupo.appendChild(card);
    });

    contenedor.appendChild(divGrupo);
  });
}

function reimprimir(qr, nombre, privada, casa) {

  window.location.href =
    `credencial_trabajador.html?qr=${qr}&nombre=${encodeURIComponent(nombre)}&privada=${privada}&casa=${casa}&reimpresion=1&origen=admin`;
}

</script>

</body>
</html>

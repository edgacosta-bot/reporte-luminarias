<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso Hogar</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="/utils/ui.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI';
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  text-align: center;
}

body.ok { background: #16a34a; color: white; }
body.warn { background: #f59e0b; color: #111827; }
body.error { background: #dc2626; color: white; }

.container {
  max-width: 360px;
  width: 92%;
  padding: 20px;
}

input, button {
  width: 100%;
  height: 52px;
  padding: 0 16px;
  margin-top: 12px;
  border-radius: 14px;
  border: none;
  font-size: 16px;
  font-weight: 600;
  box-sizing: border-box;
}

  button {
  background: #2563eb;
  color: white;
  transition: all 0.2s ease;
}

button:active {
  transform: scale(0.98);
}

button:disabled {
  opacity: 0.6;
}

.btn-primary {
  background: #2563eb;
  color: white;
}

.btn-success {
  background: #16a34a;
}

.btn-warning {
  background: #f59e0b;
  color: #111827;
}

.btn-danger {
  background: #dc2626;
}

input {
  background: #020617;
  color: white;
  text-align: center;
  font-size: 18px;
  letter-spacing: 2px;
}

button {
  background: #2563eb;
  color: white;
  font-weight: bold;
}

.hidden { display:none; }
</style>

</head>

<body>

<div class="container">

<h2 id="titulo">🏡 Acceso asesor inmobiliario</h2>

<h1 id="estado">Validando...</h1>
<div id="detalle"></div>

<input type="password" id="pin" placeholder="Ingrese PIN del vigilante">
<button id="btnValidar" class="btn-primary">Validar</button>

<button id="btnRegistrar" class="btn-success hidden">Registrar</button>


</div>

<script>

const qr = new URLSearchParams(window.location.search).get("qr");

let asesor = null;
let vigilante = null;
let tipoAccion = "";

init();

async function init(){

  
  const { data: sessionData } = await supabaseClient.auth.getSession();
  
  // 🔹 VALIDAR QR

const { data, error } =
  await supabaseClient.rpc(
    "obtener_asesor_por_qr",
    {
      p_qr_codigo: qr
    }
  );

if(error){

  console.error(error);

  pintar(
    "Error al validar QR",
    "error"
  );

  return;
}

if(!data || data.length === 0){

  pintar(
    "QR inválido",
    "error"
  );

  return;
}

asesor = data[0];

if(!asesor.activo){

  pintar(
    "Asesor desactivado",
    "error"
  );

  return;
}

if(!asesor.vigente){

  pintar(
    "Asesor no vigente",
    "error"
  );

  return;
}

tipoAccion =
  asesor.asesor_dentro
    ? "salida"
    : "entrada";

renderDetalle();

estado.innerText =
  tipoAccion === "salida"
    ? "Validar salida"
    : "Validar acceso";

titulo.innerText =
  tipoAccion === "salida"
    ? "🏡 Salida asesor"
    : "🏡 Acceso asesor";

btnRegistrar.classList.add(
  "hidden"
);
}

// 🔹 VALIDAR PIN
btnValidar.onclick = async () => {

  const pin = document.getElementById("pin").value.trim();

  if(!pin){
    ui.warn("Ingrese PIN");
    return;
  }

  const { data: pinData, error: pinError } = await supabaseClient
  .rpc("validar_pin_vigilante", { pin_input: pin });

if (pinError) {
  console.error("ERROR PIN:", pinError);
  ui.error("Error validando PIN");
  return;
}

  if (!pinData || pinData.length === 0) {
    ui.error("PIN incorrecto");
    return;
  }

  vigilante = pinData[0];

 
  ocultarValidacion();

  console.log("TIPO ACCION DETECTADO:", tipoAccion);

 if(tipoAccion === "salida"){

  document.body.className =
    "warn";

  estado.innerText =
    "Autorizar salida";

  btnRegistrar.innerText =
    "Registrar salida";

  btnRegistrar.classList.remove(
    "hidden"
  );

  return;
}

evaluarEstadoEntrada();
};

// 🔹 ENTRADA

function evaluarEstadoEntrada(){

  document.body.className =
    "ok";

  estado.innerText =
    "Acceso permitido";

  btnRegistrar.innerText =
    "Registrar acceso";

  btnRegistrar.classList.remove(
    "hidden"
  );

}
// 🔹 REGISTRAR
btnRegistrar.onclick = async () => {

  btnRegistrar.disabled = true;
  btnRegistrar.innerText = "Procesando...";

  // ====================================
  // SALIDA
  // ====================================

  if(tipoAccion === "salida"){

    const { data, error } =
      await supabaseClient.rpc(
        "registrar_salida_asesor",
        {
          p_asesor_id: asesor.asesor_id,
          p_vigilante_id: vigilante.id
        }
      );

    if(error){

      console.error(error);

      ui.error(
        "Error al registrar salida"
      );

      btnRegistrar.disabled = false;

      btnRegistrar.innerText =
        "Registrar salida";

      return;
    }

    const visitantesDentro =
      data?.[0]?.visitantes_dentro || 0;

    document.body.className =
      visitantesDentro > 0
        ? "warn"
        : "ok";

    estado.innerText =
      visitantesDentro > 0
        ? `Salida registrada. Permanecen ${visitantesDentro} visitantes dentro`
        : "Salida registrada correctamente";

    btnRegistrar.classList.add(
      "hidden"
    );

    return;
  }

  // ====================================
  // ENTRADA
  // ====================================

  const { error } =
    await supabaseClient.rpc(
      "registrar_entrada_asesor",
      {
        p_asesor_id: asesor.asesor_id,
        p_vigilante_id: vigilante.id
      }
    );

  if(error){

    console.error(error);

    ui.error(
      "Error al registrar acceso"
    );

    btnRegistrar.disabled = false;

    btnRegistrar.innerText =
      "Registrar acceso";

    return;
  }

  document.body.className =
    "ok";

  estado.innerText =
    "Acceso registrado";

  btnRegistrar.classList.add(
    "hidden"
  );

};

// 🔹 UI
function renderDetalle(){

  detalle.innerHTML = `

    <p>
      <b>${asesor.nombre}</b>
    </p>

    <p>
      ${asesor.empresa}
    </p>

  `;

}

function pintar(texto, color){
  document.body.className = color;
  estado.innerText = texto;

  // 🔥 OCULTAR TODO EL FLUJO
  pin.style.display = "none";
  btnValidar.style.display = "none";
  btnRegistrar.classList.add("hidden");
  }

function ocultarValidacion(){
  pin.style.display = "none";
  btnValidar.style.display = "none";
}

</script>

</body>
</html>

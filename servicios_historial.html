<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bitácora de accesos</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="/utils/dates.js"></script>

<style>

body {
  margin: 0;
  font-family: 'Segoe UI';
  background: linear-gradient(135deg,#020617,#0f172a);
  color: white;
}

/* 🔷 HEADER */
.header-app {
  display: flex;
  justify-content: center;
  align-items: center;
  margin-top: 20px;
}

.logo-app {
  width: 80px;
  height: 80px;
  object-fit: contain;
}

/* 🔷 CONTENEDOR */
.container {
  max-width: 520px;
  margin: auto;
  padding: 20px;
}

h2 {
  text-align: center;
  margin-bottom: 15px;
}

/* 🔷 FILTROS */
.filtros {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 20px;
}

input {
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #1f2937;
  color: white;
  font-size: 14px;
}

button {
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: #2563eb;
  color: white;
  font-weight: bold;
  font-size: 15px;
  cursor: pointer;
}

/* 🔷 CARD */
.card {
  background: #111827;
  padding: 16px;
  border-radius: 16px;
  margin-bottom: 12px;
  box-shadow: 0 6px 16px rgba(0,0,0,0.3);
}

.nombre {
  font-weight: bold;
  font-size: 16px;
  margin-bottom: 6px;
}

.detalle {
  font-size: 13px;
  color: #cbd5f5;
  margin-bottom: 6px;
}

.hora {
  font-size: 13px;
  margin-bottom: 4px;
}

.estado-activo {
  color: #facc15;
}

.estado-finalizado {
  color: #f87171;
}

/* 🔷 VACÍO */
.vacio {
  text-align: center;
  margin-top: 20px;
  color: #94a3b8;
}

</style>
</head>

<body>

<!-- 🔷 LOGO -->
<div class="header-app">
  <img src="/icono-512.png" class="logo-app">
</div>

<div class="container">

<h2>📊 Bitácora de accesos</h2>

<!-- 🔷 FILTROS -->
<div class="filtros">
  <input type="date" id="inicio">
  <input type="date" id="fin">
  <button onclick="cargar()">Consultar</button>
</div>

<!-- 🔷 RESULTADOS -->
<div id="lista"></div>

</div>

<script>

window.addEventListener("DOMContentLoaded", async () => {
  await protegerPagina(["residente","admin","vigilante"]);
});


// 🔥 CARGAR BITÁCORA GLOBAL
async function cargar(){

  const inicio = document.getElementById("inicio").value;
  const fin = document.getElementById("fin").value;

  if(!inicio || !fin){
    alert("Selecciona rango de fechas");
    return;
  }

  const fechaInicioLocal = parseLocalDate(inicio);
  const fechaFinLocal = parseLocalDate(fin);

  const rangoInicio = window.getUTCDayRange(fechaInicioLocal);
  const rangoFin = window.getUTCDayRange(fechaFinLocal);

  const { data, error } = await supabaseClient
    .from("accesos_servicios")
    .select(`
      id,
      nombre_persona,
      fecha_entrada,
      fecha_salida,
      catalogo_servicios(nombre)
    `)
    .gte("fecha_entrada", rangoInicio.start)
    .lte("fecha_entrada", rangoFin.end)
    .not("fecha_entrada","is",null)
    .order("fecha_entrada", { ascending: false });

  if(error){
    console.error(error);
    alert("Error al cargar información");
    return;
  }

  let html = "";

  if(!data || data.length === 0){
    document.getElementById("lista").innerHTML =
      `<div class="vacio">No hay registros en el rango seleccionado</div>`;
    return;
  }

  data.forEach(r => {

    html += `
    <div class="card">

      <div class="nombre">
        🚚 ${r.catalogo_servicios?.nombre || "Servicio"}
      </div>

      <div class="detalle">
        👤 ${r.nombre_persona || "Sin nombre"}
      </div>

      <div class="hora">
        🟢 Entrada: ${window.formatMXDate(r.fecha_entrada)}
      </div>

      <div class="hora">
        ${
          r.fecha_salida
          ? `<span class="estado-finalizado">
               🔴 Salida: ${window.formatMXDate(r.fecha_salida)}
             </span>`
          : `<span class="estado-activo">
               🟡 En sitio
             </span>`
        }
      </div>

    </div>`;
  });

  document.getElementById("lista").innerHTML = html;

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servicios del fraccionamiento</title>

<style>

body {
  margin: 0;
  font-family: 'Segoe UI';
  background: linear-gradient(135deg,#020617,#0f172a);
  color: white;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

.info {
  background: #111827;
  padding: 15px;
  border-radius: 14px;
  margin-bottom: 15px;
  font-size: 14px;
  color: #cbd5f5;
}

.filtros {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}

.filtros button {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #1f2937;
  color: white;
  font-size: 13px;
  cursor: pointer;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: #1f2937;
  color: white;
  margin-bottom: 10px;
}

button.consultar {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: #2563eb;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.card {
  background: #111827;
  padding: 15px;
  border-radius: 14px;
  margin-top: 12px;
  border-left: 6px solid #3b82f6;
}

.nombre {
  font-weight: bold;
  font-size: 15px;
}

.detalle {
  font-size: 13px;
  margin-top: 4px;
  color: #cbd5f5;
}

.hora {
  font-size: 12px;
  color: #94a3b8;
}

</style>
</head>

<body>

<div class="container">

<div class="info">
Consulta los servicios que han ingresado al fraccionamiento.<br>
Puede verificar horarios y personal que realizó el acceso.
</div>

<div class="filtros">
  <button onclick="filtroRapido('hoy')">Hoy</button>
  <button onclick="filtroRapido('ayer')">Ayer</button>
  <button onclick="filtroRapido('semana')">7 días</button>
  <button onclick="filtroRapido('custom')">Personalizado</button>
</div>

<input type="date" id="inicio">
<input type="date" id="fin">

<button class="consultar" onclick="cargar()">Consultar</button>

<div id="lista"></div>

</div>

<!-- 🔥 IMPORTANTE: NO usamos module para evitar romper auth.js -->
<script src="/utils/dates.js"></script>

<script>

window.addEventListener("DOMContentLoaded", async ()=>{
  await protegerPagina(["residente","colono"]);
});

// 🔹 FORMATO INPUT
function formatoInput(fecha){
  return fecha.toISOString().split("T")[0];
}

// 🔹 SET INPUTS
function setFechaInputs(inicio, fin){
  document.getElementById("inicio").value = inicio;
  document.getElementById("fin").value = fin;
}

// 🔹 FILTROS RÁPIDOS
function filtroRapido(tipo){

  const hoy = new Date();
  let inicio, fin;

  if(tipo === "hoy"){
    inicio = new Date(hoy);
    fin = new Date(hoy);
  }

  if(tipo === "ayer"){
    inicio = new Date(hoy);
    inicio.setDate(inicio.getDate() - 1);
    fin = new Date(inicio);
  }

  if(tipo === "semana"){
    inicio = new Date(hoy);
    inicio.setDate(inicio.getDate() - 7);
    fin = new Date(hoy);
  }

  if(tipo === "custom"){
    return;
  }

  setFechaInputs(formatoInput(inicio), formatoInput(fin));
  cargar();
}

// 🔹 CARGAR DATOS (CORREGIDO)
async function cargar(){

  const inicio = document.getElementById("inicio").value;
  const fin = document.getElementById("fin").value;

  if(!inicio || !fin){
    alert("Selecciona fechas");
    return;
  }

  const rangoInicio = window.getUTCDayRange(new Date(inicio));
  const rangoFin = window.getUTCDayRange(new Date(fin));

  const { data, error } = await supabaseClient
    .from("accesos_servicios")
    .select(`
      *,
      catalogo_servicios(nombre)
    `)
    .gte("fecha_entrada", rangoInicio.start)
    .lte("fecha_entrada", rangoFin.end)
    .order("fecha_entrada",{ascending:false});

  if(error){
    console.error("ERROR SUPABASE:", error);
    alert("Error al cargar datos");
    return;
  }

  let html="";

  data?.forEach(r=>{

    html += `
    <div class="card">

      <div class="nombre">
        🚛 ${r.catalogo_servicios?.nombre || "Servicio"}
      </div>

      <div class="detalle">
        👤 ${r.nombre_persona || "Sin nombre"}
      </div>

      <div class="hora">
        🟢 Entrada: ${window.formatMXDate(r.fecha_entrada)}
      </div>

      <div class="hora">
        ${
          r.fecha_salida
          ? `🔴 Salida: ${window.formatMXDate(r.fecha_salida)}`
          : "⚠️ En sitio"
        }
      </div>

    </div>`;
  });

  document.getElementById("lista").innerHTML =
    html || "Sin registros";
}

</script>

</body>
</html>

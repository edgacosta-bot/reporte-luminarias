<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historial de acceso de servicios</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<style>

body {
  margin: 0;
  font-family: 'Segoe UI';
  background: linear-gradient(135deg,#020617,#0f172a);
  color: white;
}

/* HEADER */
.header-app {
  display: flex;
  justify-content: center;
  margin-top: 20px;
}

.logo-app {
  width: 80px;
}

/* CONTENEDOR MÁS EQUILIBRADO */
.container {
  max-width: 520px;
  margin: auto;
  padding: 18px;
}

h2 {
  text-align: center;
  margin-bottom: 15px;
}

/* BOTONES FILTRO */
.filtros-rapidos button {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  font-size: 14px;
}

.filtros-rapidos button {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  background: #1e40af;
  border: none;
  color: white;
  font-size: 13px;
  cursor: pointer;
}

label {
  font-size: 12px;
  color: #94a3b8;
  margin-top: 8px;
}

/* INPUTS MÁS CÓMODOS */
input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  font-size: 15px;
}

/* BOTÓN PRINCIPAL */
.btn-consultar {
  margin-top: 14px;
  padding: 16px;
  font-size: 16px;
  border-radius: 14px;
}

/* CARD */
/* CARD MÁS RESPIRABLE */
.card {
  padding: 18px;
  border-radius: 18px;
  margin-bottom: 14px;
}

/* TEXTO MEJOR JERARQUÍA */
.nombre {
  font-size: 17px;
}

.detalle {
  font-size: 14px;
}

.hora {
  font-size: 13px;
}

.estado-activo {
  color: #facc15;
}

.estado-finalizado {
  color: #f87171;
}

.vacio {
  text-align: center;
  margin-top: 20px;
  color: #94a3b8;
}

</style>
</head>

<body>

<div class="header-app">
  <img src="/icono-512.png" class="logo-app">
</div>

<div class="container">

<h2>📊 Hisotrial de acceso de servicios</h2>

<!-- FILTROS RÁPIDOS -->
<div class="filtros-rapidos">
  <button onclick="setRango(0)">Hoy</button>
  <button onclick="setRango(7)">7 días</button>
  <button onclick="setRango(30)">30 días</button>
</div>

<!-- INPUTS -->
<label>Fecha de inicio de tu consulta</label>
<input type="date" id="inicio">

<label>Fecha término de tu consulta</label>
<input type="date" id="fin">

<button class="btn-consultar" onclick="cargar()">Consultar</button>

<div id="lista"></div>

</div>

<script>

window.addEventListener("DOMContentLoaded", async () => {
  await protegerPagina(["residente","admin","vigilante"]);

  // 🔥 SOLO setea fechas, NO carga datos
  setRango(7, false);

  // 🔥 mensaje inicial
  document.getElementById("lista").innerHTML = `
    <div class="vacio">
      Selecciona un rango de fechas y presiona "Consultar"
    </div>
  `;
});

function setRango(dias, autoConsultar = true){

  const hoy = new Date();

  const fin = new Date(hoy);
  const inicio = new Date(hoy);

  inicio.setDate(hoy.getDate() - dias);

  document.getElementById("inicio").value =
    inicio.toLocaleDateString("en-CA")

  document.getElementById("fin").value =
     fin.toLocaleDateString("en-CA")

  if(autoConsultar){
    cargar();
  }
}


// 🔥 CONSULTA GLOBAL
async function cargar(){

  const inicio = document.getElementById("inicio").value;
  const fin = document.getElementById("fin").value;

  if(!inicio || !fin){
    alert("Selecciona rango de fechas");
    return;
  }

  const fechaInicio = new Date(inicio + "T00:00:00");
  const fechaFin = new Date(fin + "T23:59:59");

  const { data, error } = await supabaseClient
    .from("accesos_servicios")
    .select(`
      id,
      nombre_persona,
      fecha_entrada,
      fecha_salida,
      catalogo_servicios(nombre)
    `)
    .gte("fecha_entrada", fechaInicio.toISOString())
    .lte("fecha_entrada", fechaFin.toISOString())
    .order("fecha_entrada", { ascending: false });

  if(error){
    console.error(error);
    alert("Error al cargar datos");
    return;
  }

  let html = "";

  if(!data || data.length === 0){
    document.getElementById("lista").innerHTML =
      `<div class="vacio">No hay registros en el rango seleccionado</div>`;
    return;
  }

  data.forEach(r => {

    html += `
    <div class="card">

      <div class="nombre">
        🚚 ${r.catalogo_servicios?.nombre || "Servicio"}
      </div>

      <div class="detalle">
        👤 ${r.nombre_persona || "Sin nombre"}
      </div>

      <div class="hora">
        🟢 Entrada: ${new Date(r.fecha_entrada).toLocaleString()}
      </div>

      <div class="hora">
        ${
          r.fecha_salida
          ? `<span class="estado-finalizado">
               🔴 Salida: ${new Date(r.fecha_salida).toLocaleString()}
             </span>`
          : `<span class="estado-activo">
               🟡 En sitio
             </span>`
        }
      </div>

    </div>`;
  });

  document.getElementById("lista").innerHTML = html;

}

</script>

</body>
</html>

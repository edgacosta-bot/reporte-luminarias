<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recepción de paquetes</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

.card {
  background: #111827;
  padding: 20px;
  border-radius: 16px;
}

/* SWITCH */
.switch {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.toggle {
  width: 55px;
  height: 30px;
  background: #374151;
  border-radius: 20px;
  position: relative;
  cursor: pointer;
}

.toggle::after {
  content: "";
  width: 24px;
  height: 24px;
  background: white;
  position: absolute;
  top: 3px;
  left: 3px;
  border-radius: 50%;
  transition: 0.3s;
}

.toggle.active {
  background: #22c55e;
}

.toggle.active::after {
  left: 28px;
}

/* MENSAJE */
.mensaje {
  margin-top: 15px;
  font-size: 13px;
  line-height: 1.4;
}

.warning { color: #facc15; }
.error { color: #f87171; }
.ok { color: #34d399; }

</style>
</head>

<body>

<div class="container">

  <div style="text-align:center; margin-bottom:20px;">
  <img src="icono-512.png" alt="Logo"
       style="
         width:100px;
         height:auto;
         border-radius:24px;
         box-shadow:0 8px 20px rgba(0,0,0,0.4);
       ">
</div>

  <h2>📦 Recepción de paquetes</h2>

  <div class="card">

    <div class="switch">
      <span>Autorizar recepción en caseta</span>
      <div id="toggle" class="toggle"></div>
    </div>

    <div id="mensaje" class="mensaje"></div>

    <div style="
  margin-top:15px;
  font-size:12px;
  color:#facc15;
  background:#3f2f00;
  padding:10px;
  border-radius:10px;
  line-height:1.4;
">
  ⚠️ Estimado residente: La recepción de paquetería en caseta es un servicio de apoyo. El personal de vigilancia no asume responsabilidad por el contenido, estado, faltantes o daños de los paquetes recibidos.
</div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="utils/residente.js"></script>

<script>
window.addEventListener("load", () => {
  protegerPagina(["residente"]);
});
</script>

<script>


let residenteId = null;
let estadoPago = null;
let autorizado = false;


  
const toggle = document.getElementById("toggle");
const mensaje = document.getElementById("mensaje");

// 🔽 CARGAR DATOS
async function cargar() {

  const residente = await getResidente();

  if (!residente) {
    alert("Error de sesión");
    return;
  }

  residenteId = residente.id;
  estadoPago = (residente.estado_pago || "").trim().toLowerCase();
  console.log("estado_pago limpio:", estadoPago);
  console.log("estado_pago raw:", residente.estado_pago);
  autorizado = residente.recibe_paquetes || false;

  render();
}

// 🎨 UI
function render() {

  toggle.classList.toggle("active", autorizado);

  // MOROSO → BLOQUEADO
  if (estadoPago === "moroso") {
    toggle.style.opacity = "0.5";
    toggle.style.pointerEvents = "none";

    mensaje.className = "mensaje error";
    mensaje.innerText =
      "⚠️ Estimado redidente, este beneficio no está disponible por adeudo. Regulariza tu situación para activarlo. Gracias";
    return;
  }

  // ATRASO → PERMITIDO CON ADVERTENCIA
  if (estadoPago === "atraso_1") {
    mensaje.className = "mensaje warning";
    mensaje.innerText =
      "⚠️ Estimado residente, puedes activar este servicio, pero se recomienda regularizar tu situación de pago en la administración. Gracias";
    return;
  }

  // CORRIENTE
  mensaje.className = "mensaje ok";
  mensaje.innerText =
    "✔ Puedes autorizar la recepción de paquetes en caseta.";
}

// 🔁 TOGGLE
toggle.addEventListener("click", async () => {

  if (estadoPago === "moroso") return;

  autorizado = !autorizado;

  // ✅ CORRECTO (antes estaba mal)
  const { error } = await supabaseClient
  .from("residentes")
  .update({ recibe_paquetes: autorizado })
  .eq("id", residenteId);

   console.log("ERROR UPDATE:", error);

  render();
});

// INIT
(async () => {
  await cargar();
})();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="utils/dates.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporte General</title>

<style>

body {
  margin: 0;
  font-family: 'Segoe UI', Arial;
  background: linear-gradient(135deg, #020617, #0f172a);
  color: white;
}

.container {
  max-width: 520px;
  margin: auto;
  padding: 20px;
}

.info {
  background: #111827;
  padding: 18px;
  border-radius: 18px;
  margin-bottom: 20px;
  font-size: 14px;
  color: #cbd5f5;
}

.label {
  font-size: 13px;
  color: #94a3b8;
  margin-bottom: 6px;
  display: block;
}

input[type="date"] {
  width: 100%;
  padding: 14px 16px;
  border-radius: 14px;
  border: none;
  background: #1e293b;
  color: white;
  box-sizing: border-box;
}

button {
  padding: 12px;
  border-radius: 20px;
  border: none;
  background: linear-gradient(135deg, #2563eb, #3b82f6);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.kpis {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin: 20px 0;
}

.kpi {
  padding: 18px;
  border-radius: 18px;
  text-align: center;
  font-weight: bold;
}

.incidencia { background: #ef4444; }
.agua { background: #f59e0b; color: #1e293b; }
.luminaria { background: #10b981; }
.total { background: #0f172a; }

.section-title {
  margin-top: 25px;
  margin-bottom: 10px;
}

.item {
  background: #111827;
  padding: 16px;
  border-radius: 16px;
  margin-bottom: 10px;
  border-left: 6px solid;
}

.item.agua {
  color: #ffffff !important; /* 🔥 FIX REAL */
}

.item.incidencia { border-color: #ef4444; }
.item.agua { border-color: #f59e0b; }
.item.luminaria { border-color: #10b981; }
.item.vigilante { border-color: #3b82f6; }
.item.obra { border-color: #a855f7; }

.hora { font-size: 12px; color: #94a3b8; }
.extra { margin-top: 4px; }

</style>
</head>

<body>

<div class="container">

<div class="info">
<b>Estimado administrador:</b><br><br>
Se recomienda informar a los residentes sobre las acciones realizadas en atención a sus reportes dentro de un plazo no mayor a 5 días.<br><br>
Gracias por tu compromiso.
</div>

<div style="display:flex; gap:10px; margin-bottom:10px;">
  <button style="flex:1" onclick="rangoRapido(0)">HOY</button>
  <button style="flex:1" onclick="rangoRapido(7)">7 días</button>
  <button style="flex:1" onclick="rangoRapido(30)">30 días</button>
</div>

<div style="display:flex; gap:10px; margin-bottom:10px;">
<select id="filtroPrivada" style="flex:1; padding:10px; border-radius:20px; background:#1f2937; color:white;">
  <option value="">Privada</option>
</select>

<select id="filtroCasa" style="flex:1; padding:10px; border-radius:20px; background:#1f2937; color:white;">
  <option value="">Lote</option>
</select>
</div>

<div>
  <div class="label">Fecha inicio</div>
  <input type="date" id="inicio">
</div>

<div>
  <div class="label">Fecha fin</div>
  <input type="date" id="fin">
</div>

<button style="width:100%; margin-top:10px;" onclick="cargar()">Consultar</button>

<div class="kpis">
  <div class="kpi incidencia" id="inc">0 Incidencias</div>
  <div class="kpi agua" id="agua">0 Agua</div>
  <div class="kpi luminaria" id="lum">0 Luminarias</div>
  <div class="kpi total" id="total">0 Total</div>
</div>

<div id="lista"></div>

</div>

<script>

window.addEventListener("DOMContentLoaded", async () => {
  await protegerPagina(["admin","administracion"]);
  await cargarPrivadas(); // 🔥 ESTA ES LA CLAVE
});

function rangoRapido(dias){
  const rango = getLastDaysRange(dias);
  document.getElementById("inicio").value = rango.start.split("T")[0];
  document.getElementById("fin").value = rango.end.split("T")[0];
  cargar();
}

async function cargarPrivadas(){

  const { data } = await supabaseClient
    .from("lotes")
    .select("privada")
    .not("privada","in","(ADMIN,SEG)");

  const privadas = [...new Set(data.map(l=>l.privada))];

  const select = document.getElementById("filtroPrivada");

  privadas.forEach(p=>{
    const opt = document.createElement("option");
    opt.value = p;
    opt.textContent = p;
    select.appendChild(opt);
  });
}
  
async function cargar(){

  const privadaFiltro = document.getElementById("filtroPrivada").value;
const loteFiltro = document.getElementById("filtroCasa").value;
  let inicio = document.getElementById("inicio").value;
  let fin = document.getElementById("fin").value;

  if(!inicio || !fin){
  const rango = getLastDaysRange(7);

  inicio = rango.start.split("T")[0];
  fin = rango.end.split("T")[0];
}

  let registros=[];

  // 🔵 MAPA VIGILANTES (SEGURO)
   // 🔵 MAPA VIGILANTES (AHORA DESDE RESIDENTES)
let mapaVigilantes = {};

const { data: residentesLista } = await supabaseClient
  .from("residentes")
  .select("id, nombre, tipo")
  .eq("tipo", "vigilante");

residentesLista?.forEach(r=>{
  mapaVigilantes[r.id] = r.nombre;
});

  // 🔴 VECINALES
  let queryVecinal = supabaseClient
  .from("incidencias_vecinales")
  .select("*")
  .gte("fecha_reporte", fechaInicioUTC(inicio))
  .lte("fecha_reporte", fechaFinUTC(fin));

if(privadaFiltro){
  queryVecinal = queryVecinal.eq("privada", privadaFiltro);
}

if(loteFiltro){
  queryVecinal = queryVecinal.eq("casa", loteFiltro);
}

let { data: inc } = await queryVecinal;

  inc?.forEach(i=>{
  registros.push({
    tipo:"incidencia",
    grupo:"vecinal",
    titulo:"Incidencia vecinal",
    descripcion:i.descripcion,
    hora:i.fecha_reporte,

    reporta: `${i.privada}-${i.casa}`,

    afecta: i.privada_afectada && i.casa_afectada
      ? `${i.privada_afectada}-${i.casa_afectada}`
      : null,

    // 🔥 NUEVO
    rol_creador: i.rol_creador
  });
});

  // 🔵 VIGILANTES
 
let queryVigilante = supabaseClient
  .from("reportes_vigilantes")
  .select("*")
  .gte("fecha_reporte", fechaInicioUTC(inicio))
  .lte("fecha_reporte", fechaFinUTC(fin));

if(privadaFiltro){
  queryVigilante = queryVigilante.eq("privada", privadaFiltro);
}

if(loteFiltro){
  queryVigilante = queryVigilante.eq("casa", loteFiltro);
}
  
let { data: rv } = await queryVigilante;

 rv?.forEach(r=>{
  registros.push({
    tipo:"vigilante",
    grupo:"vigilante",
    titulo:"Reporte a vigilante",
    descripcion:r.descripcion,
    hora:r.fecha_reporte,

    origen:`${r.privada}-${r.casa}`,
    extra2: mapaVigilantes[r.vigilante_id] || "Sin nombre",

    // 🔥 NUEVO
    rol_creador: r.rol_creador
  });
});

// 🔵 MAPA OBRAS
let mapaObras = {};
const { data: listaObras } = await supabaseClient
  .from("obras")
  .select("id, privada, casa");

listaObras?.forEach(o=>{
  mapaObras[o.id] = `${o.privada}-${o.casa}`;
});

// 🔵 MAPA TRABAJADORES
let mapaTrabajadores = {};
const { data: listaTrabajadores } = await supabaseClient
  .from("trabajadores_obra")
  .select("id, nombre");

listaTrabajadores?.forEach(t=>{
  mapaTrabajadores[t.id] = t.nombre;
});

  
  // 🟣 OBRAS (SIN JOIN RIESGOSO)
 let queryObras = supabaseClient
  .from("reportes_obras")
  .select("*")
  .gte("fecha_reporte", fechaInicioUTC(inicio))
  .lte("fecha_reporte", fechaFinUTC(fin));

if(privadaFiltro){
  queryObras = queryObras.eq("privada", privadaFiltro);
}

if(loteFiltro){
  queryObras = queryObras.eq("casa", loteFiltro);
}

let { data: obras } = await queryObras;

  obras?.forEach(i=>{
  registros.push({
    tipo:"obra",
    grupo:"obra",
    titulo:"Reporte de obra",
    descripcion:i.descripcion,
    hora:i.fecha_reporte,

    reporta: `${i.privada}-${i.casa}`,

    obra: mapaObras[i.obra_id] || "Obra no identificada",

    trabajador: i.trabajador_id
      ? `👷 ${mapaTrabajadores[i.trabajador_id] || "Trabajador desconocido"}`
      : "👷 Trabajador no identificado",

    // 🔥 CLAVE REAL (NO inventamos origen)
    rol_creador: i.rol_creador
  });
});

  // 🟡 AGUA
  let queryAgua = supabaseClient
  .from("reportes_agua_caasim")
  .select("*")
  // ✅ CORRECTO
.gte("fecha_registro", fechaInicioUTC(inicio))
.lte("fecha_registro", fechaFinUTC(fin))

if(privadaFiltro){
  queryAgua = queryAgua.eq("privada", privadaFiltro);
}

if(loteFiltro){
  queryAgua = queryAgua.eq("casa", loteFiltro);
}

let { data: agua } = await queryAgua;

 agua?.forEach(i=>{
  registros.push({
    tipo:"agua",
    grupo:"agua",
    titulo:`Reporte ${i.numero_reporte}`,
    descripcion:i.tipo_falla,
    hora: i.fecha_reporte || i.fecha_registro, // 🔥 FIX REAL
    origen:`${i.privada}-${i.casa}`
  });
});

  // 🟢 LUMINARIAS
  let queryLuminarias = supabaseClient
  .from("vista_reportes_luminarias")
  .select("*")
  .gte("fecha_reporte", fechaInicioUTC(inicio))
  .lte("fecha_reporte", fechaFinUTC(fin));

if(privadaFiltro){
  queryLuminarias = queryLuminarias.eq("privada", privadaFiltro);
}

if(loteFiltro){
  queryLuminarias = queryLuminarias.eq("casa", loteFiltro);
}

let { data: luminarias } = await queryLuminarias;

  luminarias?.forEach(i=>{
    registros.push({
      tipo:"luminaria",
      grupo:"luminaria",
      titulo:`Luminaria #${i.no_luminaria}`,
      descripcion:i.descripcion,
      hora:i.fecha_reporte,
      origen:`${i.privada}-${i.casa}`
    });
  });

  // KPIs
  document.getElementById("inc").innerText =
    registros.filter(r=>["incidencia","vigilante","obra"].includes(r.tipo)).length + " Incidencias";

  document.getElementById("agua").innerText =
    registros.filter(r=>r.tipo==="agua").length + " Agua";

  document.getElementById("lum").innerText =
    registros.filter(r=>r.tipo==="luminaria").length + " Luminarias";

  document.getElementById("total").innerText =
    registros.length + " Total";

  let html="";

  function renderGrupo(grupo,titulo){
    const datos = registros.filter(r=>r.grupo===grupo)
      .sort((a,b)=> new Date(b.hora)-new Date(a.hora));

    if(!datos.length) return;

    html += `<div class="section-title">${titulo}</div>`;

    datos.forEach(r=>{
      html += `<div class="item ${r.tipo}">
        <b>${r.titulo}</b>
        <div class="hora">${formatMXDate(r.hora)}</div>

        ${r.reporta ? `<div class="extra">🏠 Reporta: ${r.reporta}</div>`:""}
        ${r.afecta ? `<div class="extra">🎯 Afecta: ${r.afecta}</div>`:""}
        ${(!r.reporta && r.origen) ? `<div class="extra">🏠 ${r.origen}</div>`:""}
        ${r.extra2 ? `<div class="extra">${r.extra2}</div>`:""}
        ${r.obra ? `<div class="extra">🏗️ Obra reportada: ${r.obra}</div>`:""}
        ${r.rol_creador === "vigilante"
  ? `<div class="extra">🤖 Generado por vigilancia</div>`
  : `<div class="extra">👤 Reportado por residente</div>`
}
        ${r.trabajador ? `<div class="extra">${r.trabajador}</div>`:""}

        <div class="extra">${r.descripcion}</div>
      </div>`;
    });
  }

  renderGrupo("vecinal","🚨 Incidencias vecinales");
  renderGrupo("vigilante","👮 Reportes a vigilantes");
  renderGrupo("obra","🏗️ Reportes de obra");
  renderGrupo("agua","💧 Reportes de agua");
  renderGrupo("luminaria","💡 Luminarias");

  document.getElementById("lista").innerHTML = html || "Sin resultados";
}

// Cuando cambia la privada
document.getElementById("filtroPrivada").addEventListener("change", async function(){

  // 1. Saber qué privada eligieron
  const privadaSeleccionada = this.value;

  // 2. Ubicar el select de lotes
  const selectLote = document.getElementById("filtroCasa");

  // 3. Limpiar el select
  selectLote.innerHTML = '<option value="">Lote</option>';

  // 4. Si no eligieron privada, salir
  if(!privadaSeleccionada) return;

  // 5. Traer lotes de esa privada
  const { data, error } = await supabaseClient
    .from("lotes")
    .select("lote")
    .eq("privada", privadaSeleccionada);

  if(error){
    console.error(error);
    return;
  }

  // 6. Llenar el select
  data.forEach(registro => {

    const option = document.createElement("option");

    option.value = registro.lote;
    option.textContent = registro.lote;

    selectLote.appendChild(option);
  });

});

  
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporte General</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Arial;
  background: linear-gradient(135deg, #e0f2fe, #f8fafc);
  color: #0f172a;
}
.container { max-width: 520px; margin: auto; padding: 20px; }
h2 { text-align: center; }

.label { font-size: 13px; color: #475569; }
.input-group { margin-bottom: 15px; }

input {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: 1px solid #cbd5e1;
}

button {
  width: 100%;
  padding: 15px;
  border-radius: 16px;
  border: none;
  background: linear-gradient(135deg, #1e40af, #3b82f6);
  color: white;
  font-weight: bold;
}

.kpis {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin: 25px 0;
}

.kpi {
  padding: 18px;
  border-radius: 18px;
  color: white;
  text-align: center;
  font-weight: bold;
}

.incidencia { background: #ef4444; }
.agua { background: #f59e0b; color: #111; }
.luminaria { background: #10b981; }
.total { background: #0f172a; }

.item {
  background: white;
  padding: 16px;
  border-radius: 18px;
  margin-bottom: 12px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
  border-left: 6px solid;
}

.item.incidencia { border-color: #ef4444; }
.item.agua { border-color: #f59e0b; }
.item.luminaria { border-color: #10b981; }

.hora { font-size: 12px; color: #64748b; }
.extra { font-size: 14px; margin-top: 4px; }

.modal-bg {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal {
  background:white;
  padding:20px;
  border-radius:16px;
  text-align:center;
}
</style>
</head>

<body>

<div class="container">

<h2>📊 Reporte General</h2>

<div class="input-group">
  <div class="label">Fecha inicio</div>
  <input type="date" id="inicio">
</div>

<div class="input-group">
  <div class="label">Fecha fin</div>
  <input type="date" id="fin">
</div>

<div class="input-group">
  <div class="label">Privada (opcional)</div>
  <input type="text" id="privada">
</div>

<div class="input-group">
  <div class="label">Casa (opcional)</div>
  <input type="text" id="casa">
</div>

<button onclick="cargar()">Consultar</button>

<div class="kpis">
  <div class="kpi incidencia" id="inc">0 Incidencias</div>
  <div class="kpi agua" id="agua">0 Agua</div>
  <div class="kpi luminaria" id="lum">0 Luminarias</div>
  <div class="kpi total" id="total">0 Total</div>
</div>

<div id="lista"></div>

</div>

<div id="modal" class="modal-bg">
  <div class="modal">
    <h3>Selecciona fechas</h3>
    <button onclick="cerrarModal()">OK</button>
  </div>
</div>

<script>

window.addEventListener("DOMContentLoaded", async () => {
  await protegerPagina(["admin","administracion"]);
});

function mostrarModal(){
  document.getElementById("modal").style.display="flex";
}

function cerrarModal(){
  document.getElementById("modal").style.display="none";
}

async function cargar(){

  const inicio = document.getElementById("inicio").value;
  const fin = document.getElementById("fin").value;

  if(!inicio || !fin){
    mostrarModal();
    return;
  }

  let registros=[];

  try {

    // 🔴 INCIDENCIAS TRABAJADORES (MEJORADO)
    let {data:trab} = await supabaseClient
      .from("incidencias_trabajadores")
      .select("*")
      .gte("fecha_local", inicio+"T00:00:00")
      .lte("fecha_local", fin+"T23:59:59");

    const ids = [...new Set((trab || []).map(i=>i.trabajador_id).filter(Boolean))];

    let mapaTrab = {};

    if(ids.length > 0){
      const {data:trabajadores} = await supabaseClient
        .from("trabajadores_obra")
        .select("id, nombre, privada, casa")
        .in("id", ids);

      trabajadores?.forEach(t=> mapaTrab[t.id]=t);
    }

    (trab || []).forEach(i=>{
      const t = mapaTrab[i.trabajador_id];

      const obraTexto = t
        ? `Privada ${t.privada || "-"} - Casa ${t.casa || "-"}`
        : null;

      registros.push({
        tipo:"incidencia",
        titulo:`Incidencia trabajador (${i.tipo})`,
        descripcion:i.descripcion,
        hora:i.fecha_local,
        trabajador:t?.nombre || null,
        obra: obraTexto
      });
    });

  } catch (e) {
    console.error(e);
  }

  document.getElementById("inc").innerText =
    registros.length+" Incidencias";

  document.getElementById("total").innerText =
    registros.length+" Total";

  registros.sort((a,b)=> new Date(b.hora)-new Date(a.hora));

  let html="";

  registros.forEach(r=>{
    const fechaLocal = new Date(r.hora).toLocaleString("es-MX");

    html+=`<div class="item incidencia">
      <b>${r.titulo}</b>
      <div class="hora">${fechaLocal}</div>
      ${r.trabajador ? `<div class="extra">👷 ${r.trabajador}</div>`:""}
      ${r.obra ? `<div class="extra">📍 ${r.obra}</div>`:""}
      <div class="extra">${r.descripcion}</div>
    </div>`;
  });

  document.getElementById("lista").innerHTML = html || "Sin resultados";
}

</script>

</body>
</html>

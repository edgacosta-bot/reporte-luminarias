<!DOCTYPE html>
<html lang="es">
<head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporte General</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Arial;
  background: linear-gradient(135deg, #e0f2fe, #f8fafc);
  color: #0f172a;
}
.container { max-width: 520px; margin: auto; padding: 20px; }
h2 { text-align: center; }

.section-title { margin-top: 25px; margin-bottom: 10px; font-size: 16px; }
.label { font-size: 13px; color: #475569; }
.input-group { margin-bottom: 15px; }

input {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: 1px solid #cbd5e1;
}

button {
  width: 100%;
  padding: 15px;
  border-radius: 16px;
  border: none;
  background: linear-gradient(135deg, #1e40af, #3b82f6);
  color: white;
  font-weight: bold;
}

.kpis {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin: 25px 0;
}

.kpi { padding: 18px; border-radius: 18px; color: white; text-align: center; font-weight: bold; }
.incidencia { background: #ef4444; }
.agua { background: #f59e0b; color: #111; }
.luminaria { background: #10b981; }
.total { background: #0f172a; }

.item {
  background: white;
  padding: 16px;
  border-radius: 18px;
  margin-bottom: 12px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
  border-left: 6px solid;
}

.item.incidencia { border-color: #ef4444; }
.item.agua { border-color: #f59e0b; }
.item.luminaria { border-color: #10b981; }

.hora { font-size: 12px; color: #64748b; }
.extra { font-size: 14px; margin-top: 4px; }
</style>
</head>

<body>

<div class="container">

<h2>📊 Reporte General</h2>

<div class="input-group">
  <div class="label">Fecha inicio</div>
  <input type="date" id="inicio">
</div>

<div class="input-group">
  <div class="label">Fecha fin</div>
  <input type="date" id="fin">
</div>

<button onclick="cargar()">Consultar</button>

<div class="kpis">
  <div class="kpi incidencia" id="inc">0 Incidencias</div>
  <div class="kpi agua" id="agua">0 Agua</div>
  <div class="kpi luminaria" id="lum">0 Luminarias</div>
  <div class="kpi total" id="total">0 Total</div>
</div>

<div id="lista"></div>

</div>

<script>

function toUTC(date, end=false){
  const d = new Date(date);
  if(end){ d.setHours(23,59,59,999); }
  else { d.setHours(0,0,0,0); }
  return new Date(d.getTime() + (6 * 60 * 60 * 1000)).toISOString();
}

window.addEventListener("DOMContentLoaded", async () => {
  await protegerPagina(["admin","administracion"]);
});

async function cargar(){

  const inicio = document.getElementById("inicio").value;
  const fin = document.getElementById("fin").value;

  if(!inicio || !fin){
    alert("Selecciona fechas");
    return;
  }

  const inicioUTC = toUTC(inicio);
  const finUTC = toUTC(fin, true);

  let registros=[];

  try {

    // ✅ INCIDENCIAS VECINALES (RESTAURADO)
    let {data:inc} = await supabaseClient
      .from("incidencias_vecinales")
      .select("*")
      .gte("fecha_local", inicio+"T00:00:00")
      .lte("fecha_local", fin+"T23:59:59");

    inc?.forEach(i=>{
      registros.push({
        tipo:"incidencia",
        grupo:"vecinal",
        titulo:"Incidencia vecinal",
        descripcion:i.descripcion,
        hora:i.fecha_local,
        origen:`${i.privada}-${i.casa}`
      });
    });

    // ✅ REPORTES DE OBRA (AQUÍ VA TU FIX)
    let {data:obras} = await supabaseClient
      .from("reportes_obras")
      .select("*")
      .gte("fecha_reporte", inicio + " 00:00:00")
      .lte("fecha_reporte", fin + " 23:59:59");

    obras?.forEach(i=>{
      registros.push({
        tipo:"incidencia",
        grupo:"trabajador",
        titulo:"Reporte de obra",
        descripcion:i.descripcion,
        hora:i.fecha_reporte
      });
    });

    // 🔴 TRABAJADORES
    let {data:trab} = await supabaseClient
      .from("incidencias_trabajadores")
      .select("*")
      .gte("fecha", inicioUTC)
      .lte("fecha", finUTC);

    const ids = [...new Set((trab || []).map(i=>i.trabajador_id).filter(Boolean))];

    let mapaTrab = {};

    if(ids.length > 0){
      const {data:trabajadores} = await supabaseClient
        .from("trabajadores_obra")
        .select("id, nombre, privada, casa")
        .in("id", ids);

      trabajadores?.forEach(t=> mapaTrab[t.id]=t);
    }

    (trab || []).forEach(i=>{
      const t = mapaTrab[i.trabajador_id];

      registros.push({
        tipo:"incidencia",
        grupo:"trabajador",
        titulo:"Incidencia trabajador",
        descripcion:i.descripcion,
        hora: i.fecha_local || i.fecha,
        trabajador:t?.nombre,
        obra: t ? `Privada ${t.privada} - Casa ${t.casa}` : null
      });
    });

    // 💧 AGUA
    let {data:agua} = await supabaseClient
      .from("reportes_agua_caasim")
      .select("*")
      .gte("fecha_registro", inicioUTC)
      .lte("fecha_registro", finUTC);

    agua?.forEach(i=>{
      registros.push({
        tipo:"agua",
        grupo:"agua",
        titulo:"Reporte agua",
        descripcion:i.tipo_falla,
        hora:i.fecha_registro,
        origen:`${i.privada}-${i.numero_exterior}`
      });
    });

    // 💡 LUMINARIAS
    let {data:luminarias} = await supabaseClient
      .from("vista_reportes_luminarias")
      .select("*")
      .gte("fecha_reporte", inicioUTC)
      .lte("fecha_reporte", finUTC);

    luminarias?.forEach(i=>{
      registros.push({
        tipo:"luminaria",
        grupo:"luminaria",
        titulo:`Luminaria #${i.no_luminaria}`,
        descripcion:i.descripcion,
        hora:i.fecha_reporte
      });
    });

  } catch (e) {
    console.error(e);
  }

  document.getElementById("inc").innerText =
    registros.filter(r=>r.tipo==="incidencia").length+" Incidencias";

  document.getElementById("agua").innerText =
    registros.filter(r=>r.tipo==="agua").length+" Agua";

  document.getElementById("lum").innerText =
    registros.filter(r=>r.tipo==="luminaria").length+" Luminarias";

  document.getElementById("total").innerText =
    registros.length+" Total";

  let html="";

  function renderGrupo(grupo, titulo){
    const datos = registros
      .filter(r=>r.grupo===grupo)
      .sort((a,b)=> new Date(b.hora)-new Date(a.hora));

    if(!datos.length) return;

    html += `<div class="section-title">${titulo}</div>`;

    datos.forEach(r=>{
      const fechaLocal = new Date(r.hora).toLocaleString("es-MX");

      html+=`<div class="item ${r.tipo}">
        <b>${r.titulo}</b>
        <div class="hora">${fechaLocal}</div>
        ${r.trabajador ? `<div class="extra">👷 ${r.trabajador}</div>`:""}
        ${r.obra ? `<div class="extra">📍 ${r.obra}</div>`:""}
        ${r.origen ? `<div class="extra">🏠 ${r.origen}</div>`:""}
        <div class="extra">${r.descripcion}</div>
      </div>`;
    });
  }

  renderGrupo("vecinal","🚨 Incidencias vecinales");
  renderGrupo("trabajador","👷 Incidencias trabajadores / obras");
  renderGrupo("agua","💧 Reportes de agua");
  renderGrupo("luminaria","💡 Luminarias");

  document.getElementById("lista").innerHTML = html || "Sin resultados";
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporte General</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #eef2f7;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 15px;
}

h2 {
  text-align: center;
}

/* LABELS */
.label {
  font-size: 13px;
  color: #6b7280;
}

/* FILTROS */
.filtros {
  display: flex;
  flex-direction: column;
  gap: 5px;
  margin-bottom: 15px;
}

input {
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #ccc;
}

button {
  margin-top: 10px;
  padding: 14px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(135deg, #2563eb, #1d4ed8);
  color: white;
  font-weight: bold;
}

/* KPIs */
.kpis {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}

.kpi {
  padding: 18px;
  border-radius: 16px;
  color: white;
  text-align: center;
}

.incidencia { background: #ef4444; }
.agua { background: #f59e0b; color: black; }
.luminaria { background: #3b82f6; }
.total { background: #374151; }

h3 {
  margin-top: 20px;
}

/* LISTA */
.item {
  background: white;
  padding: 14px;
  border-radius: 14px;
  margin-bottom: 10px;
  border-left: 6px solid;
}

.item.incidencia { border-color: #ef4444; }
.item.agua { border-color: #f59e0b; }
.item.luminaria { border-color: #3b82f6; }

.hora {
  font-size: 12px;
  color: gray;
}
</style>
</head>

<body>

<div class="container">

<h2>📊 Reporte General</h2>

<div class="filtros">
  <div class="label">Selecciona fecha inicio</div>
  <input type="date" id="fechaInicio">

  <div class="label">Selecciona fecha fin</div>
  <input type="date" id="fechaFin">

  <button onclick="cargarReporte()">Consultar</button>
</div>

<div class="kpis">
  <div class="kpi incidencia" id="kpiInc">0 Incidencias</div>
  <div class="kpi agua" id="kpiAgua">0 Agua</div>
  <div class="kpi luminaria" id="kpiLum">0 Luminarias</div>
  <div class="kpi total" id="kpiTotal">0 Total</div>
</div>

<div id="resultado"></div>

</div>

<script>
const supabaseClient = supabase.createClient(
  "https://prjxmfhahnzosdwljode.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs"
);

if (localStorage.getItem("rol") !== "admin") {
  window.location.href = "index.html";
}

async function cargarReporte() {

  const fechaInicio = document.getElementById("fechaInicio").value;
  const fechaFin = document.getElementById("fechaFin").value;

  if (!fechaInicio || !fechaFin) {
    alert("Selecciona rango de fechas");
    return;
  }

  let registros = [];

  // 🔴 INCIDENCIAS VECINALES
  const { data: incVec } = await supabaseClient
    .from("incidencias_vecinales")
    .select("*")
    .gte("fecha_local", fechaInicio + "T00:00:00")
    .lte("fecha_local", fechaFin + "T23:59:59");

  incVec?.forEach(i => {
    registros.push({
      tipo: "incidencia",
      titulo: "Incidencia vecinal",
      descripcion: i.descripcion,
      hora: i.fecha_local,
      privada: i.privada || "-",
      casa: i.casa || "-"
    });
  });

  // 🔵 LUMINARIAS (VERSIÓN CORRECTA Y EFICIENTE)

const { data: luminarias } = await supabaseClient
  .from("reportes_vecinales")
  .select("*")
  .gte("fecha_reporte", fechaInicio + "T00:00:00")
  .lte("fecha_reporte", fechaFin + "T23:59:59");

// 1. IDs reales usados
const ids = [...new Set(luminarias.map(i => i.luminaria_id).filter(Boolean))];

// 2. traer SOLO esas luminarias
const { data: control } = await supabaseClient
  .from("control_luminarias")
  .select("id, ubicacion_id")
  .in("id", ids);

// 3. ids de ubicaciones
const ubicIds = [...new Set(control.map(c => c.ubicacion_id).filter(Boolean))];

// 4. traer SOLO esas ubicaciones
const { data: ubicaciones } = await supabaseClient
  .from("ubicaciones")
  .select("id, calle, privada")
  .in("id", ubicIds);

// 5. mapas
const mapaControl = {};
control.forEach(c => mapaControl[c.id] = c);

const mapaUbicacion = {};
ubicaciones.forEach(u => mapaUbicacion[u.id] = u);

// 6. construir resultado
luminarias.forEach(i => {

  const controlData = mapaControl[Number(i.luminaria_id)];
  const ubic = mapaUbicacion[Number(controlData?.ubicacion_id)];

  registros.push({
    tipo: "luminaria",
    titulo: `Luminaria #${i.no_luminaria}`,
    descripcion: i.descripcion,
    hora: i.fecha_reporte,
    privada: i.privada || ubic?.privada || "-",
    casa: i.casa || "-",
    extra: "Calle: " + (ubic?.calle || "-")
  });

});

  // 💧 AGUA (JOIN SIMPLE)
  const { data: agua } = await supabaseClient
    .from("reportes_agua_caasim")
    .select(`
      *,
      ubicaciones (calle)
    `)
    .gte("fecha_registro", fechaInicio + "T00:00:00")
    .lte("fecha_registro", fechaFin + "T23:59:59");

  agua?.forEach(i => {
    registros.push({
      tipo: "agua",
      titulo: "Reporte agua",
      descripcion: i.tipo_falla,
      hora: i.fecha_registro,
      privada: i.privada || "N/A",
      casa: i.numero_exterior || "-",
      extra: "Calle: " + (i.ubicaciones?.calle || "-")
    });
  });

  // 🔄 ORDEN
  registros.sort((a,b)=> new Date(b.hora) - new Date(a.hora));

  // KPIs
  document.getElementById("kpiInc").innerText =
    registros.filter(r=>r.tipo==="incidencia").length + " Incidencias";

  document.getElementById("kpiAgua").innerText =
    registros.filter(r=>r.tipo==="agua").length + " Agua";

  document.getElementById("kpiLum").innerText =
    registros.filter(r=>r.tipo==="luminaria").length + " Luminarias";

  document.getElementById("kpiTotal").innerText =
    registros.length + " Total";

  let html = "";

  const renderGrupo = (titulo, tipo) => {
    const grupo = registros.filter(r => r.tipo === tipo);
    if (!grupo.length) return;

    html += `<h3>${titulo}</h3>`;

    grupo.forEach(r => {
      html += `
        <div class="item ${tipo}">
          <strong>${r.titulo}</strong><br>
          <div class="hora">${new Date(r.hora).toLocaleString("es-MX")}</div>
          <div><b>Origen: ${r.privada}-${r.casa}</b></div>
          ${r.extra ? `<div>${r.extra}</div>` : ""}
          ${r.descripcion}
        </div>
      `;
    });
  };

  renderGrupo("🚨 Incidencias", "incidencia");
  renderGrupo("💧 Agua", "agua");
  renderGrupo("💡 Luminarias", "luminaria");

  document.getElementById("resultado").innerHTML =
    html || "No hay registros";
}
</script>

</body>
</html>

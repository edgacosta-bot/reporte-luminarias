<!DOCTYPE html>

<html lang="es">
<head>

<script src="utils/dates.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="auth.js"></script>

<meta charset="UTF-8">
<title>Bitácora de visitantes</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #111827;
  border-radius: 16px;
  padding: 20px;
}

.logo {
  width: 70px;
  display: block;
  margin: 0 auto 10px;
}

h2 {
  text-align: center;
  margin-bottom: 10px;
}

.filtros {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}

.filtros button {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
  font-weight: bold;
  background: #1f2937;
  color: white;
  cursor: pointer;
}

.filtros button.activo {
  background: #2563eb;
}

label {
  font-size: 13px;
  margin-top: 10px;
  display: block;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
  border: none;
  background: #1f2937;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border-radius: 10px;
  border: none;
  color: white;
  font-weight: bold;
}

.btn-primary { background: #2563eb; }
.btn-back { background: #374151; }

.resultado { margin-top: 20px; }

.item {
  background: #1e293b;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 10px;
}

.vacio {
  text-align: center;
  margin-top: 15px;
  color: #9ca3af;
}

.info-user {
  font-size: 13px;
  margin-bottom: 10px;
  color: #9ca3af;
  text-align: center;
}
</style>

</head>

<body>

<div class="container">
  <div class="card">

<img src="/icono-512.png" class="logo">

<h2>Bitácora de visitantes</h2>

<div id="infoUsuario" class="info-user"></div>

<!-- 🔥 FILTROS PRO -->
<div class="filtros">
  <button id="btnHoy" onclick="filtroHoy()">Hoy</button>
  <button id="btn7" onclick="filtro7dias()">7 días</button>
  <button id="btn30" onclick="filtro30dias()">30 días</button>
</div>

<label>Fecha de inicio de tu consulta</label>
<input id="desde" type="date">

<label>Fecha término de tu consulta</label>
<input id="hasta" type="date">

<button class="btn-primary" onclick="consultar()">Consultar</button>

<div id="resultado" class="resultado"></div>

<button class="btn-back" onclick="volverInicio()">← Volver al inicio</button>

  </div>
</div>

<script>

let rolGlobal = null;
let residenteIdGlobal = null;

// 🔐 CONTROL
window.addEventListener("DOMContentLoaded", async () => {

  await protegerPagina(["admin","vigilante"]);

  const { data } = await supabaseClient.auth.getUser();
  const user = data?.user;

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  const { data: residente } = await supabaseClient
    .from("residentes")
    .select("tipo, privada, casa, id")
    .eq("user_id", user.id)
    .single();

  rolGlobal = residente.tipo;
  residenteIdGlobal = residente.id;

  document.getElementById("infoUsuario").innerText =
    rolGlobal === "admin"
      ? "Administrador - Consulta general"
      : `Privada ${residente.privada} - Casa ${residente.casa}`;

  document.getElementById("resultado").innerHTML =
    "<div class='vacio'>Selecciona un filtro o rango de fechas</div>";

});

// 🕒 UTC
function toUTC(date, end=false) {
  const d = new Date(date + "T00:00:00");
  end ? d.setHours(23,59,59,999) : d.setHours(0,0,0,0);
  return d.toISOString();
}

// 🎯 ACTIVAR BOTÓN
function activarBoton(id) {
  ["btnHoy","btn7","btn30"].forEach(b=>{
    document.getElementById(b).classList.remove("activo");
  });
  document.getElementById(id).classList.add("activo");
}

// 📅 SET FECHAS
function setFechas(desde, hasta) {
  document.getElementById("desde").value = desde;
  document.getElementById("hasta").value = hasta;
}

// 🔥 FILTROS
function filtroHoy() {
  const hoy = new Date().toISOString().slice(0,10);
  setFechas(hoy, hoy);
  activarBoton("btnHoy");
  consultar();
}

function filtro7dias() {
  const hoy = new Date();
  const desde = new Date();
  desde.setDate(hoy.getDate() - 6);

  setFechas(desde.toISOString().slice(0,10), hoy.toISOString().slice(0,10));
  activarBoton("btn7");
  consultar();
}

function filtro30dias() {
  const hoy = new Date();
  const desde = new Date();
  desde.setDate(hoy.getDate() - 29);

  setFechas(desde.toISOString().slice(0,10), hoy.toISOString().slice(0,10));
  activarBoton("btn30");
  consultar();
}

// 🔍 CONSULTA
async function consultar() {

  const desde = document.getElementById("desde").value;
  const hasta = document.getElementById("hasta").value;
  const contenedor = document.getElementById("resultado");

  contenedor.innerHTML = "Consultando...";

  let query = supabaseClient
    .from('accesos_visitas')
    .select(`
      id,
      fecha_hora_entrada,
      fecha_hora_salida,
      visitas_qr (
        nombre_visitante,
        privada,
        casa,
        residente_id
      )
    `)
    .not('fecha_hora_entrada', 'is', null)
    .order('fecha_hora_entrada', { ascending: false });

  if (rolGlobal !== "admin") {
    query = query.eq('visitas_qr.residente_id', residenteIdGlobal);
  }

  if (desde) query = query.gte('fecha_hora_entrada', toUTC(desde));
  if (hasta) query = query.lte('fecha_hora_entrada', toUTC(hasta, true));

  const { data, error } = await query;

  if (error) {
    console.error(error);
    contenedor.innerHTML = "<div class='vacio'>Error al consultar</div>";
    return;
  }

  if (!data || data.length === 0) {
    contenedor.innerHTML = "<div class='vacio'>Sin registros</div>";
    return;
  }

  contenedor.innerHTML = "";

  data.forEach(v => {

    if (!v.visitas_qr) return;

    const visita = v.visitas_qr;

    const entrada = formatMXDate(v.fecha_hora_entrada);
    const salida = v.fecha_hora_salida
      ? formatMXDate(v.fecha_hora_salida)
      : "Dentro";

    contenedor.innerHTML += `
      <div class="item">
        <b>${visita.nombre_visitante}</b><br>
        🟢 Entrada: ${entrada}<br>
        🔴 Salida: ${salida}<br>
        🏠 ${visita.privada}-${visita.casa}
      </div>
    `;
  });
}

function volverInicio() {
  window.location.href = "index.html";
}

</script>

</body>
</html>

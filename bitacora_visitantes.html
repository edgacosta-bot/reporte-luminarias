<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Bitácora de visitantes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: #111827;
      border-radius: 16px;
      padding: 20px;
    }

    h2 {
      text-align: center;
      margin-bottom: 15px;
    }

    label {
      font-size: 13px;
      margin-top: 10px;
      display: block;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 8px;
      border: none;
      background: #1f2937;
      color: white;
      font-size: 14px;
    }

    input::placeholder {
      color: #9ca3af;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border-radius: 10px;
      border: none;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
    }

    .btn-primary { background: #2563eb; }
    .btn-back { background: #374151; }

    .resultado {
      margin-top: 20px;
    }

    .item {
      background: #1e293b;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
      font-size: 14px;
      line-height: 1.4;
    }

    .vacio {
      text-align: center;
      margin-top: 15px;
      color: #9ca3af;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="card">

    <h2>Bitácora de visitantes</h2>

    <!-- 🔐 AUTENTICACIÓN -->
    <label>Privada</label>
    <select id="privada">
      <option value="">Selecciona</option>
      <option value="I">Privada I</option>
      <option value="II">Privada II</option>
      <option value="III">Privada III</option>
      <option value="IV">Privada IV</option>
    </select>

    <label>Casa</label>
    <input id="casa" type="number" placeholder="Número de casa">

    <label>Clave</label>
    <input id="clave" type="password" placeholder="Ingrese su clave">

    <!-- 📅 FILTRO -->
    <label>Desde</label>
    <input id="desde" type="date">

    <label>Hasta</label>
    <input id="hasta" type="date">

    <button class="btn-primary" onclick="consultar()">Consultar</button>

    <div id="resultado" class="resultado"></div>

    <button class="btn-back" onclick="volverInicio()">← Volver al inicio</button>

  </div>
</div>

<script>
const client = window.supabase.createClient(
  'https://prjxmfhahnzosdwljode.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs'
);

// ✅ FUNCIÓN CORRECTA (LOCAL → UTC)
function toUTC(date, end=false) {
  const d = new Date(date + "T00:00:00");

  if (end) {
    d.setHours(23,59,59,999);
  } else {
    d.setHours(0,0,0,0);
  }

  return d.toISOString();
}

async function consultar() {

  const privada = document.getElementById("privada").value;
  const casa = document.getElementById("casa").value;
  const clave = document.getElementById("clave").value;
  const desde = document.getElementById("desde").value;
  const hasta = document.getElementById("hasta").value;

  const contenedor = document.getElementById("resultado");
  contenedor.innerHTML = "Consultando...";

  // 🔐 VALIDAR RESIDENTE
  const { data: user } = await client
    .from('residentes')
    .select('*')
    .eq('privada', privada)
    .eq('casa', casa)
    .eq('clave', clave)
    .single();

  if (!user) {
    contenedor.innerHTML = "<div class='vacio'>Datos incorrectos</div>";
    return;
  }

  let query = client
    .from('visitas_qr')
    .select('*')
    .eq('residente_id', user.id)
    .not('hora_ingreso_utc', 'is', null)
    .order('hora_ingreso_utc', { ascending: false });

  if (desde) query = query.gte('hora_ingreso_utc', toUTC(desde));
  if (hasta) query = query.lte('hora_ingreso_utc', toUTC(hasta, true));

  const { data, error } = await query;

  if (error) {
    contenedor.innerHTML = "<div class='vacio'>Error al consultar</div>";
    return;
  }

  if (!data || data.length === 0) {
    contenedor.innerHTML = "<div class='vacio'>Sin registros</div>";
    return;
  }

  contenedor.innerHTML = "";

  data.forEach(v => {
    const fecha = new Date(v.hora_ingreso_utc);

    const fechaLocal = fecha.toLocaleString('es-MX', {
      timeZone: 'America/Mexico_City',
      year: 'numeric',
      month: '2-digit',
      day: '2-digit',
      hour: '2-digit',
      minute: '2-digit'
    });

    contenedor.innerHTML += `
      <div class="item">
        <b>${v.nombre_visitante}</b><br>
        📅 ${fechaLocal}<br>
        🏠 ${v.privada}-${v.casa}
      </div>
    `;
  });
}

function volverInicio() {
  window.location.href = "index.html";
}
</script>

</body>
</html>

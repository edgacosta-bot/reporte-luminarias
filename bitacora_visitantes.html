<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Bitácora de visitantes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: #111827;
      border-radius: 16px;
      padding: 20px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 8px;
      border: none;
      background: #1f2937;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border-radius: 10px;
      border: none;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-primary { background: #2563eb; }
    .btn-back { background: #374151; }

    .item {
      background: #1e293b;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="card">

    <h2>Bitácora de visitantes</h2>

    <select id="privada">
      <option value="">Privada</option>
      <option value="I">I</option>
      <option value="II">II</option>
    </select>

    <input id="casa" placeholder="Casa">
    <input id="clave" type="password" placeholder="Clave">

    <input id="desde" type="date">
    <input id="hasta" type="date">

    <button class="btn-primary" onclick="consultar()">Consultar</button>

    <div id="resultado"></div>

    <button class="btn-back" onclick="volverInicio()">← Volver</button>

  </div>
</div>

<script>
const client = window.supabase.createClient(
  'https://prjxmfhahnzosdwljode.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs'
);

function toUTC(date, end=false) {
  return end
    ? date + "T23:59:59.999Z"
    : date + "T00:00:00.000Z";
}

async function consultar() {

  const privada = document.getElementById("privada").value;
  const casa = document.getElementById("casa").value;
  const clave = document.getElementById("clave").value;
  const desde = document.getElementById("desde").value;
  const hasta = document.getElementById("hasta").value;

  const contenedor = document.getElementById("resultado");
  contenedor.innerHTML = "Consultando...";

  const { data: user } = await client
    .from('residentes')
    .select('*')
    .eq('privada', privada)
    .eq('casa', casa)
    .eq('clave', clave)
    .single();

  if (!user) {
    contenedor.innerHTML = "Datos incorrectos";
    return;
  }

  let query = client
    .from('visitas_qr')
    .select('*')
    .eq('residente_id', user.id)
    .not('hora_ingreso_utc', 'is', null)
    .order('hora_ingreso_utc', { ascending: false });

  if (desde) query = query.gte('hora_ingreso_utc', toUTC(desde));
  if (hasta) query = query.lte('hora_ingreso_utc', toUTC(hasta, true));

  const { data } = await query;

  contenedor.innerHTML = "";

  data.forEach(v => {
    const fecha = new Date(v.hora_ingreso_utc);

    contenedor.innerHTML += `
      <div class="item">
        <b>${v.nombre_visitante}</b><br>
        ${fecha.toLocaleString()}
      </div>
    `;
  });
}

function volverInicio() {
  window.location.href = "index.html";
}
</script>

</body>
</html>

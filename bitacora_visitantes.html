<!DOCTYPE html>
<html lang="es">
<head>

<!-- 🔥 ORDEN CORRECTO -->
<script src="utils/dates.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<meta charset="UTF-8">
<title>Bitácora de visitantes</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #111827;
  border-radius: 16px;
  padding: 20px;
}

h2 {
  text-align: center;
  margin-bottom: 15px;
}

label {
  font-size: 13px;
  margin-top: 10px;
  display: block;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
  border: none;
  background: #1f2937;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border-radius: 10px;
  border: none;
  color: white;
  font-weight: bold;
}

.btn-primary { background: #2563eb; }
.btn-back { background: #374151; }

.resultado { margin-top: 20px; }

.item {
  background: #1e293b;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 10px;
}

.vacio {
  text-align: center;
  margin-top: 15px;
  color: #9ca3af;
}

.info-user {
  font-size: 13px;
  margin-bottom: 10px;
  color: #9ca3af;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <h2>Bitácora de visitantes</h2>

    <div id="infoUsuario" class="info-user"></div>

    <label>Desde</label>
    <input id="desde" type="date">

    <label>Hasta</label>
    <input id="hasta" type="date">

    <button class="btn-primary" onclick="consultar()">Consultar</button>

    <div id="resultado" class="resultado"></div>

    <button class="btn-back" onclick="volverInicio()">← Volver al inicio</button>

  </div>
</div>

<script>

let rolGlobal = null;
let userIdGlobal = null;
let residenteIdGlobal = null;

// 🔐 CONTROL
window.addEventListener("DOMContentLoaded", async () => {

  await protegerPagina(["admin","colono","residente"]);

  const { data } = await supabaseClient.auth.getUser();
  const user = data?.user;

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  userIdGlobal = user.id;

  const { data: residente } = await supabaseClient
    .from("residentes")
    .select("tipo, privada, casa, id")
    .eq("user_id", user.id)
    .single();

  rolGlobal = residente.tipo;
  residenteIdGlobal = residente.id;

  if (rolGlobal !== "admin") {
    document.getElementById("infoUsuario").innerText =
      `Privada ${residente.privada} - Casa ${residente.casa}`;
  } else {
    document.getElementById("infoUsuario").innerText =
      `Administrador - Consulta general`;
  }
});

// 🕒 UTC helper (se mantiene)
function toUTC(date, end=false) {
  const d = new Date(date + "T00:00:00");

  if (end) d.setHours(23,59,59,999);
  else d.setHours(0,0,0,0);

  return d.toISOString();
}

// 🔍 CONSULTA
async function consultar() {

  const desde = document.getElementById("desde").value;
  const hasta = document.getElementById("hasta").value;
  const contenedor = document.getElementById("resultado");

  contenedor.innerHTML = "Consultando...";

  let query = supabaseClient
    .from('visitas_qr')
    .select('*')
    .not('hora_ingreso_utc', 'is', null)
    .order('hora_ingreso_utc', { ascending: false });

  if (rolGlobal !== "admin") {
    query = query.eq('residente_id', residenteIdGlobal); // 🔥 ya no consulta otra vez
  }

  if (desde) query = query.gte('hora_ingreso_utc', toUTC(desde));
  if (hasta) query = query.lte('hora_ingreso_utc', toUTC(hasta, true));

  const { data, error } = await query;

  if (error) {
    console.error(error);
    contenedor.innerHTML = "<div class='vacio'>Error al consultar</div>";
    return;
  }

  if (!data || data.length === 0) {
    contenedor.innerHTML = "<div class='vacio'>Sin registros</div>";
    return;
  }

  contenedor.innerHTML = "";

  data.forEach(v => {

    if (!v.hora_ingreso_utc) return; // 🔥 protección

    const fechaLocal = formatMXDate(v.hora_ingreso_utc); // 🔥 ESTANDAR

    contenedor.innerHTML += `
      <div class="item">
        <b>${v.nombre_visitante}</b><br>
        📅 ${fechaLocal}<br>
        🏠 ${v.privada}-${v.casa}
      </div>
    `;
  });
}

function volverInicio() {
  window.location.href = "index.html";
}

</script>

</body>
</html>

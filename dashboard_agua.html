<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reportes de agua</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="utils/dates.js"></script> <!-- 🔥 IMPORTANTE -->

<script>
try {
  protegerPagina(["admin", "administracion", "colono", "residente"]);
} catch (e) {
  console.warn("Auth no bloqueante:", e);
}
</script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #020617, #0f172a);
  color: white;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

h1 { text-align: center; }

.kpis {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}

.card {
  background: #111827;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
}

.card h3 {
  font-size: 14px;
  color: #9ca3af;
}

.card p {
  font-size: 22px;
  margin: 0;
}

.filtros {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 10px;
  width: 100%;
}

.campo {
  display: flex;
  flex-direction: column;
}

.campo label {
  font-size: 12px;
  color: #9ca3af;
  margin-bottom: 4px;
}

input, select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #1f2937;
  color: white;
}

input[type="date"] {
  color-scheme: dark;
  cursor: pointer;
}

input[type="date"]::-webkit-calendar-picker-indicator {
  filter: invert(1);
}

.botones {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

.btn {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

.filtrar { background: #2563eb; color: white; }
.limpiar { background: #374151; color: white; }

.table {
  width: 100%;
  border-collapse: collapse;
}

.table th {
  background: #1e3a8a;
  padding: 10px;
}

.table td {
  padding: 10px;
  text-align: center;
  border-bottom: 1px solid #374151;
}

.tipo {
  padding: 5px 10px;
  border-radius: 8px;
  font-size: 12px;
}

.sin_servicio { background: #dc2626; }
.fuga { background: #2563eb; }
.baja_presion { background: #d97706; }

.back {
  display: block;
  margin-top: 20px;
  text-align: center;
  background: #374151;
  padding: 12px;
  border-radius: 10px;
  text-decoration: none;
  color: white;
}

@media (max-width: 600px) {
  .filtros { grid-template-columns: 1fr; }
}
</style>

</head>

<body>

<div class="container">

<h1>💧 Reportes de agua</h1>

<div class="kpis">
  <div class="card">
    <h3>Total</h3>
    <p id="total">0</p>
  </div>
  <div class="card">
    <h3>Sin servicio</h3>
    <p id="sinServicio">0</p>
  </div>
  <div class="card">
    <h3>Fugas</h3>
    <p id="fugas">0</p>
  </div>
</div>

<div class="filtros">
  <div class="campo">
    <label>Fecha inicio</label>
    <input type="date" id="fechaInicio">
  </div>

  <div class="campo">
    <label>Fecha fin</label>
    <input type="date" id="fechaFin">
  </div>
</div>

<div class="botones">
  <button class="btn filtrar" onclick="filtrarPorFecha()">Filtrar</button>
  <button class="btn limpiar" onclick="limpiarFiltro()">Limpiar</button>
</div>

<select id="filtroTipo">
  <option value="">Todos</option>
  <option value="sin_servicio">Sin servicio</option>
  <option value="fuga">Fuga</option>
  <option value="baja_presion">Baja presión</option>
</select>

<table class="table">
  <thead>
    <tr>
      <th>Fecha</th>
      <th>Reporte</th>
      <th>Privada</th>
      <th>Casa</th>
      <th>Falla</th>
    </tr>
  </thead>
  <tbody id="tabla"></tbody>
</table>

<a href="index.html" class="back">← Volver</a>

</div>

<script>

let datosGlobal = [];
let datosFiltrados = [];

async function cargarDatos() {

  const { data, error } = await supabaseClient
    .from("reportes_agua_caasim")
    .select("*")
    .order("fecha_reporte", { ascending: false });

  if (error) {
    console.error(error);
    return;
  }

  datosGlobal = data || [];
  datosFiltrados = [...datosGlobal];

  renderTodo(datosFiltrados);
}

// 🔥 CORRECCIÓN AQUÍ
function filtrarPorFecha() {

  const inicio = document.getElementById("fechaInicio").value;
  const fin = document.getElementById("fechaFin").value;

  datosFiltrados = datosGlobal.filter(r => {

    if (!r.fecha_reporte) return false;

    const fecha = new Date(r.fecha_reporte + "T00:00:00Z");

    if (inicio) {
      const fInicio = new Date(fechaInicioUTC(inicio));
      if (fecha < fInicio) return false;
    }

    if (fin) {
      const fFin = new Date(fechaFinUTC(fin));
      if (fecha > fFin) return false;
    }

    return true;
  });

  aplicarFiltroTipo();
}

function limpiarFiltro() {
  document.getElementById("fechaInicio").value = "";
  document.getElementById("fechaFin").value = "";
  datosFiltrados = [...datosGlobal];
  aplicarFiltroTipo();
}

function aplicarFiltroTipo() {

  const tipo = document.getElementById("filtroTipo").value;

  let data = [...datosFiltrados];

  if (tipo) {
    data = data.filter(r => normalizar(r.tipo_falla) === tipo);
  }

  renderTodo(data);
}

document.getElementById("filtroTipo").addEventListener("change", aplicarFiltroTipo);

function renderTodo(data) {

  document.getElementById("total").innerText = data.length;

  document.getElementById("sinServicio").innerText =
    data.filter(r => normalizar(r.tipo_falla) === "sin_servicio").length;

  document.getElementById("fugas").innerText =
    data.filter(r => normalizar(r.tipo_falla) === "fuga").length;

  renderTabla(data);
}

function renderTabla(data) {

  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  if (!data.length) {
    tabla.innerHTML = `<tr><td colspan="5">Sin registros</td></tr>`;
    return;
  }

  data.forEach(r => {

    const tipo = r.tipo_falla || "";

    tabla.innerHTML += `
      <tr>
        <td>${formatearFecha(r.fecha_reporte)}</td>
        <td>${r.numero_reporte || "-"}</td>
        <td>${r.privada || "-"}</td>
        <td>${r.numero_exterior || "-"}</td>
        <td><span class="tipo ${tipo}">${formatearTipo(tipo)}</span></td>
      </tr>
    `;
  });
}

function normalizar(texto) {
  return (texto || "").toLowerCase().trim();
}

function formatearTipo(tipo) {
  return (tipo || "")
    .replaceAll("_", " ")
    .replace(/\b\w/g, l => l.toUpperCase());
}

function formatearFecha(fecha) {
  return new Date(fecha).toLocaleDateString("es-MX");
}

setTimeout(cargarDatos, 300);

</script>

</body>
</html>

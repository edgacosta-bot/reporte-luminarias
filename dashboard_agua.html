<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reportes de agua</title>

<!-- 🔥 ORDEN CORRECTO -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<script>
protegerPagina(["admin", "administracion", "colono"]);
</script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #020617, #0f172a);
  color: white;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
}

/* KPIs */
.kpis {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}

.card {
  background: #111827;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
}

.card h3 {
  font-size: 14px;
  color: #9ca3af;
}

.card p {
  font-size: 22px;
  margin: 0;
}

/* Filtro */
select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #1f2937;
  color: white;
  margin-bottom: 15px;
}

/* Tabla */
.table {
  width: 100%;
  border-collapse: collapse;
}

.table th {
  background: #1e3a8a;
  padding: 10px;
}

.table td {
  padding: 10px;
  text-align: center;
  border-bottom: 1px solid #374151;
}

/* Tipo */
.tipo {
  padding: 5px 10px;
  border-radius: 8px;
  font-size: 12px;
}

.sin_servicio { background: #dc2626; }
.fuga { background: #2563eb; }
.baja_presion { background: #d97706; }

/* Botón */
.back {
  display: block;
  margin-top: 20px;
  text-align: center;
  background: #374151;
  padding: 12px;
  border-radius: 10px;
  text-decoration: none;
  color: white;
}
</style>

</head>

<body>

<div class="container">

<h1>💧 Reportes de agua</h1>

<!-- KPIs -->
<div class="kpis">
  <div class="card">
    <h3>Total</h3>
    <p id="total">0</p>
  </div>
  <div class="card">
    <h3>Sin servicio</h3>
    <p id="sinServicio">0</p>
  </div>
  <div class="card">
    <h3>Fugas</h3>
    <p id="fugas">0</p>
  </div>
</div>

<!-- FILTRO -->
<select id="filtroTipo">
  <option value="">Todos</option>
  <option value="sin_servicio">Sin servicio</option>
  <option value="fuga">Fuga</option>
  <option value="baja_presion">Baja presión</option>
</select>

<!-- TABLA -->
<table class="table">
  <thead>
    <tr>
      <th>Fecha</th>
      <th>Reporte</th>
      <th>Privada</th>
      <th>Casa</th>
      <th>Falla</th>
    </tr>
  </thead>
  <tbody id="tabla"></tbody>
</table>

<a href="index.html" class="back">← Volver</a>

</div>

<script>

let datosGlobal = [];

// 🔥 CARGAR DATOS
async function cargarDatos() {

  const { data, error } = await supabaseClient
    .from("reportes_agua_caasim")
    .select("*")
    .order("fecha_reporte", { ascending: false });

  console.log("DATA:", data);

  if (error) {
    console.error("ERROR:", error);
    return;
  }

  datosGlobal = data || [];
  renderTodo(datosGlobal);
}

// 🔥 KPIs + render
function renderTodo(data) {

  document.getElementById("total").innerText = data.length;

  document.getElementById("sinServicio").innerText =
    data.filter(r => normalizar(r.tipo_falla) === "sin_servicio").length;

  document.getElementById("fugas").innerText =
    data.filter(r => normalizar(r.tipo_falla) === "fuga").length;

  renderTabla(data);
}

// 🔥 TABLA
function renderTabla(data) {

  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  if (!data || data.length === 0) {
    tabla.innerHTML = `<tr><td colspan="5">Sin registros</td></tr>`;
    return;
  }

  data.forEach(r => {

    const tipo = r.tipo_falla || "";

    const row = `
      <tr>
        <td>${formatearFecha(r.fecha_reporte)}</td>
        <td>${r.numero_reporte || "-"}</td>
        <td>${r.privada || "-"}</td>
        <td>${r.casa || "-"}</td>
        <td>
          <span class="tipo ${tipo}">
            ${formatearTipo(tipo)}
          </span>
        </td>
      </tr>
    `;

    tabla.innerHTML += row;
  });
}

// 🔥 FILTRO
document.getElementById("filtroTipo").addEventListener("change", (e) => {

  const tipo = e.target.value;

  if (!tipo) {
    renderTodo(datosGlobal);
    return;
  }

  const filtrados = datosGlobal.filter(r =>
    normalizar(r.tipo_falla) === tipo
  );

  renderTodo(filtrados);
});

// 🔥 HELPERS
function normalizar(texto) {
  return (texto || "").toLowerCase().trim();
}

function formatearTipo(tipo) {
  return (tipo || "")
    .replaceAll("_", " ")
    .replace(/\b\w/g, l => l.toUpperCase());
}

function formatearFecha(fecha) {
  if (!fecha) return "-";
  return new Date(fecha).toLocaleDateString("es-MX");
}

// INIT
cargarDatos();

</script>

</body>
</html>

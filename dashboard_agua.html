<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reportes de agua</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="utils/dates.js"></script> <!-- 🔥 IMPORTANTE -->

<script>
try {
  protegerPagina(["admin", "administracion", "colono", "residente"]);
} catch (e) {
  console.warn("Auth no bloqueante:", e);
}
</script>

    <link rel="stylesheet" href="styles/dashboard_agua.css">
</head>

<body>

<div class="container">

<h1>💧 Reportes de agua</h1>

<div class="kpis">
  <div class="card">
    <h3>Total</h3>
    <p id="total">0</p>
  </div>
  <div class="card">
    <h3>Sin servicio</h3>
    <p id="sinServicio">0</p>
  </div>
  <div class="card">
    <h3>Fugas</h3>
    <p id="fugas">0</p>
  </div>
<div class="card">
  <h3>Baja presión</h3>
  <p id="bajaPresion">0</p>
</div>
</div>

<div class="filtros">
  <div class="campo">
    <label>Fecha inicio</label>
    <input type="date" id="fechaInicio">
  </div>

  <div class="campo">
    <label>Fecha fin</label>
    <input type="date" id="fechaFin">
  </div>
</div>

<div class="botones">
  <button class="btn filtrar" onclick="filtrarPorFecha()">Filtrar</button>
  <button class="btn limpiar" onclick="limpiarFiltro()">Limpiar</button>
</div>

<select id="filtroTipo">
  <option value="">Todos</option>
  <option value="sin_servicio">Sin servicio</option>
  <option value="fuga">Fuga</option>
  <option value="baja_presion">Baja presión</option>
</select>

<table class="table">
  <thead>
    <tr>
      <th>Fecha</th>
      <th>Reporte</th>
      <th>Privada</th>
      <th>Casa</th>
      <th>Falla</th>
    </tr>
  </thead>
  <tbody id="tabla"></tbody>
</table>

<a href="index.html" class="back">← Volver</a>

</div>

<script>

let datosGlobal = [];
let datosFiltrados = [];

async function cargarDatos() {

  const { data, error } = await supabaseClient
    .from("reportes_agua_caasim")
    .select("*")
    .order("fecha_reporte", { ascending: false });

  if (error) {
    console.error(error);
    return;
  }

  datosGlobal = data || [];
  datosFiltrados = [...datosGlobal];

  renderTodo(datosFiltrados);
}

// 🔥 CORRECCIÓN AQUÍ
function filtrarPorFecha() {

  const inicio = document.getElementById("fechaInicio").value;
  const fin = document.getElementById("fechaFin").value;

  const inicioUTC = inicio ? fechaInicioUTC(inicio) : null;
  const finUTC = fin ? fechaFinUTC(fin) : null;

  datosFiltrados = datosGlobal.filter(r => {

    if (!r.fecha_reporte) return false;

    const fecha = new Date(r.fecha_reporte).toISOString();

    if (inicioUTC && fecha < inicioUTC) return false;
    if (finUTC && fecha > finUTC) return false;

    return true;
  });

  aplicarFiltroTipo();
}

function limpiarFiltro() {
  document.getElementById("fechaInicio").value = "";
  document.getElementById("fechaFin").value = "";
  datosFiltrados = [...datosGlobal];
  aplicarFiltroTipo();
}

function aplicarFiltroTipo() {

  const tipo = document.getElementById("filtroTipo").value;

  let data = [...datosFiltrados];

  if (tipo) {
    data = data.filter(r => normalizar(r.tipo_falla) === tipo);
  }

  renderTodo(data);
}

document.getElementById("filtroTipo").addEventListener("change", aplicarFiltroTipo);

function renderTodo(data) {

  // 🔢 TOTAL
  document.getElementById("total").innerText = data.length;

  // 🔥 CONTADOR DINÁMICO
  let conteo = {};

  data.forEach(r => {
    const tipo = normalizar(r.tipo_falla);

    if (!conteo[tipo]) {
      conteo[tipo] = 0;
    }

    conteo[tipo]++;
  });

  // 🔢 KPIs
  document.getElementById("sinServicio").innerText = conteo["sin_servicio"] || 0;
  document.getElementById("fugas").innerText = conteo["fuga"] || 0;

  // 🔥 NUEVO KPI
  document.getElementById("bajaPresion").innerText = conteo["baja_presion"] || 0;

  renderTabla(data);
}

function renderTabla(data) {

  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  if (!data.length) {
    tabla.innerHTML = `<tr><td colspan="5">Sin registros</td></tr>`;
    return;
  }

  data.forEach(r => {

    const tipo = r.tipo_falla || "";

    tabla.innerHTML += `
      <tr>
        <td>${formatearFecha(r.fecha_reporte)}</td>
        <td>${r.numero_reporte || "-"}</td>
        <td>${r.privada || "-"}</td>
        <td>${r.casa || "-"}</td>
        <td><span class="tipo ${tipo}">${formatearTipo(tipo)}</span></td>
      </tr>
    `;
  });
}

function normalizar(texto) {
  return (texto || "").toLowerCase().trim();
}

function formatearTipo(tipo) {
  return (tipo || "")
    .replaceAll("_", " ")
    .replace(/\b\w/g, l => l.toUpperCase());
}

function formatearFecha(fecha) {
  if (!fecha) return "-";

  return new Date(fecha).toLocaleDateString("es-MX", {
    day: "2-digit",
    month: "2-digit",
    year: "numeric"
  });
}

setTimeout(cargarDatos, 300);

</script>

</body>
</html>

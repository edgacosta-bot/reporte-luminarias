<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accesos propietarios</title>

<style>
body {
  font-family: Arial;
  background: #161a1d;
  color: white;
  margin: 0;
  padding: 20px;
}

h2 {
  text-align: center;
}

select, input, button {
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 12px;
  border: none;
  box-sizing: border-box;
}

button {
  background: #2563eb;
  color: white;
  cursor: pointer;
}

.qr {
  text-align: center;
  margin-top: 20px;
}

.btn-wa {
  background: #25D366;
}
</style>
</head>

<body>

<h2>Generar accesos propietarios</h2>

<select id="residente"></select>

<input type="text" id="nombre" placeholder="Nombre">
<input type="text" id="tipo" placeholder="Tipo (esposa, hijo, etc)">

<button id="btnCrear" onclick="crearAcceso()">Generar acceso</button>

<div id="resultado"></div>

<div class="qr">
  <canvas id="qr"></canvas>
</div>

<button id="btnWA" class="btn-wa" style="display:none;">
  📲 Enviar por WhatsApp
</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>
const { createClient } = supabase;

const supabaseClient = createClient(
  "https://prjxmfhahnzosdwljode.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0"
);

let urlCredencial = "";
let urlParaEnviar = "";
let creando = false; // 🔥 control de doble click

async function cargarResidentes() {

  const { data } = await supabaseClient
    .from("residentes")
    .select("id, privada, casa")
    .eq("es_residente", false)
    .order("privada");

  const select = document.getElementById("residente");
  select.innerHTML = "";

  data.forEach(r => {
    const option = document.createElement("option");
    option.value = r.id;
    option.text = `${r.privada} - ${r.casa}`;
    select.appendChild(option);
  });
}

function generarUUID() {
  return crypto.randomUUID();
}

async function crearAcceso() {

  if(creando) return; // 🔥 evita múltiples clicks
  creando = true;

  const btn = document.getElementById("btnCrear");
  btn.disabled = true;

  const residente_id = document.getElementById("residente").value;
  const nombre = document.getElementById("nombre").value.trim();
  const tipo = document.getElementById("tipo").value.trim();
  const resultado = document.getElementById("resultado");

  if (!nombre) {
    resultado.innerText = "Ingresa nombre";
    creando = false;
    btn.disabled = false;
    return;
  }

  // 🔥 VALIDAR DUPLICADO
  const { data: existente } = await supabaseClient
    .from("accesos_propietarios")
    .select("id")
    .eq("residente_id", residente_id)
    .eq("nombre", nombre)
    .eq("activo", true)
    .maybeSingle();

  if(existente){
    resultado.innerText = "Ya existe un acceso activo para esta persona";
    creando = false;
    btn.disabled = false;
    return;
  }

  const identificador = generarUUID();

  const { data: residente } = await supabaseClient
    .from("residentes")
    .select("privada, casa")
    .eq("id", residente_id)
    .single();

  const { error } = await supabaseClient
    .from("accesos_propietarios")
    .insert({
      residente_id,
      nombre,
      tipo,
      identificador
    });

  if (error) {
    console.log("ERROR INSERT:", error);
    resultado.innerText = "Error al crear acceso";
    creando = false;
    btn.disabled = false;
    return;
  }

  resultado.innerText = "Acceso creado correctamente";

  urlCredencial = `${window.location.origin}/credencial_propietario.html?qr=${identificador}&nombre=${encodeURIComponent(nombre)}&privada=${residente.privada}&casa=${residente.casa}&origen=admin`;

  urlParaEnviar = `${window.location.origin}/credencial_propietario.html?qr=${identificador}&nombre=${encodeURIComponent(nombre)}&privada=${residente.privada}&casa=${residente.casa}`;

  generarQR(urlCredencial);

  prepararWhatsApp(nombre, residente.privada, residente.casa);

  // 🔥 DISPARAR WA AUTOMÁTICO
  document.getElementById("btnWA").click();

  creando = false;
  btn.disabled = false;
}

function generarQR(texto) {

  const canvas = document.getElementById("qr");

  QRCode.toCanvas(canvas, texto, { width: 220 }, function (error) {
    if (error) console.error(error);
  });
}

function prepararWhatsApp(nombre, privada, casa) {

  const btn = document.getElementById("btnWA");
  btn.style.display = "block";

  btn.onclick = () => {

    const mensaje =
      `🔐 Acceso al fraccionamiento\n\n` +
      `Nombre: ${nombre}\n` +
      `Ubicación: Privada ${privada} - Lote ${casa}\n\n` +
      `Presenta este código en caseta:\n${urlParaEnviar}`;

    const wa = `https://wa.me/?text=${encodeURIComponent(mensaje)}`;

    window.open(wa, "_blank");
  };
}

cargarResidentes();
</script>

</body>
</html>

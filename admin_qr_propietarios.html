<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accesos propietarios</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="/utils/ui.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
  font-family: 'Segoe UI';
  background: #020617;
  color: white;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 400px;
  margin: auto;
}

h2 {
  text-align: center;
}

select, input, button {
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 12px;
  border: none;
}

input, select {
  background: #1f2937;
  color: white;
}

button {
  background: #2563eb;
  color: white;
  font-weight: bold;
}

.qr {
  text-align: center;
  margin-top: 20px;
}

.btn-wa {
  background: #25D366;
}
</style>

</head>

<body>

<div class="container">

<h2>🏠 Generar accesos propietarios</h2>

<select id="residente"></select>

<input type="text" id="nombre" placeholder="Nombre">
<input type="text" id="tipo" placeholder="Tipo (esposa, hijo, etc)">

<button onclick="crearAcceso()">Generar acceso</button>

<div id="resultado"></div>

<div class="qr">
  <canvas id="qr"></canvas>
</div>

<button id="btnWA" class="btn-wa" style="display:none;">
  📲 Enviar por WhatsApp
</button>

</div>

<script>

window.addEventListener("DOMContentLoaded", async ()=>{
  await protegerPagina(["admin","administracion"]);
  cargarResidentes();
});

let urlCredencial = "";
let urlParaEnviar = "";

async function cargarResidentes() {

  const { data, error } = await supabaseClient
    .from("residentes")
    .select("id, privada, casa")
    .eq("es_residente", false)
    .order("privada");

  if(error){
    ui.error("Error cargando residentes");
    return;
  }

  const select = document.getElementById("residente");
  select.innerHTML = "";

  data.forEach(r => {
    const option = document.createElement("option");
    option.value = r.id;
    option.text = `${r.privada} - ${r.casa}`;
    select.appendChild(option);
  });
}

function generarUUID() {
  return crypto.randomUUID();
}

async function crearAcceso() {

  const residente_id = document.getElementById("residente").value;
  const nombre = document.getElementById("nombre").value.trim();
  const tipo = document.getElementById("tipo").value.trim();

  if (!nombre) {
    ui.warn("Ingresa nombre");
    return;
  }

  const identificador = generarUUID();

  const { data: residente, error: errRes } = await supabaseClient
    .from("residentes")
    .select("privada, casa")
    .eq("id", residente_id)
    .single();

  if(errRes){
    ui.error("Error obteniendo datos del residente");
    return;
  }

  const { error } = await supabaseClient
    .from("accesos_propietarios")
    .insert({
      residente_id,
      nombre,
      tipo,
      identificador
    });

  if (error) {
    ui.error("Error al crear acceso");
    return;
  }

  ui.ok("Acceso creado correctamente");

  urlCredencial = `${window.location.origin}/credencial_propietario.html?qr=${identificador}&nombre=${encodeURIComponent(nombre)}&privada=${residente.privada}&casa=${residente.casa}&origen=admin`;

  urlParaEnviar = `${window.location.origin}/credencial_propietario.html?qr=${identificador}&nombre=${encodeURIComponent(nombre)}&privada=${residente.privada}&casa=${residente.casa}`;

  generarQR(urlCredencial);

  prepararWhatsApp(nombre, residente.privada, residente.casa);

  // 🔥 LIMPIAR FORM
  document.getElementById("nombre").value = "";
  document.getElementById("tipo").value = "";
}

function generarQR(texto) {

  const canvas = document.getElementById("qr");

  QRCode.toCanvas(canvas, texto, { width: 220 }, function (error) {
    if (error) console.error(error);
  });
}

function prepararWhatsApp(nombre, privada, casa) {

  const btn = document.getElementById("btnWA");
  btn.style.display = "block";

  btn.onclick = () => {

    const mensaje =
      `🔐 Acceso al fraccionamiento\n\n` +
      `Nombre: ${nombre}\n` +
      `Ubicación: Privada ${privada} - Lote ${casa}\n\n` +
      `Presenta este código en caseta:\n${urlParaEnviar}`;

    const wa = `https://wa.me/?text=${encodeURIComponent(mensaje)}`;

    window.open(wa, "_blank");
  };
}

</script>

</body>
</html>

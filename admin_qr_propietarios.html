<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accesos propietarios</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>

  body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
  padding: 20px;
}

.header {
  text-align: center;
  margin-bottom: 20px;
}

.logo {
  width: 180px;
  max-width: 80%;
  margin-bottom: 10px;
}

.titulo {
  font-size: 20px;
  font-weight: 600;
}

.container {
  max-width: 420px;
  margin: auto;
}

.card {
  background: #111827;
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 15px;
}

label {
  font-size: 13px;
  color: #9ca3af;
  margin-bottom: 6px;
  display: block;
}

select, input {
  width: 100%;
  height: 52px;            /* 🔥 fija altura uniforme */
  padding: 0 14px;         /* 🔥 elimina padding vertical desigual */
  margin-bottom: 14px;
  border-radius: 12px;
  border: none;
  background: #1f2937;
  color: white;
  font-size: 14px;
  box-sizing: border-box;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

.qr {
  text-align: center;
  margin-top: 20px;
}

.btn-wa {
  background: #25D366;
}

.resultado {
  text-align: center;
  margin-top: 10px;
}

.resultado.ok { color: #22c55e; }
.resultado.error { color: #f87171; }
  
</style>

  
</head>

<body>

<div class="header">
  <img src="logo-sigvic-dark.png" class="logo">
  <div class="titulo">Accesos propietarios</div>
</div>

<div class="container">

  <div class="card">

    <label>Selecciona residente</label>
    <select id="residente"></select>

    <label>Nombre</label>
    <input type="text" id="nombre" placeholder="Ej. Juan Pérez">

    <label>Tipo</label>
    <input type="text" id="tipo" placeholder="Ej. Esposa, hijo, etc">

    <button id="btnCrear" onclick="crearAcceso()">
      Generar acceso
    </button>

    <div id="resultado" class="resultado"></div>

  </div>

  <div class="card qr">
    <canvas id="qr"></canvas>

    <button id="btnWA" class="btn-wa" style="display:none;">
      📲 Enviar por WhatsApp
    </button>
  </div>

</div>


<script>

let urlCredencial = "";
let urlParaEnviar = "";
let creando = false;

// 🔐 PROTEGER ACCESO (ADMIN)
window.addEventListener("DOMContentLoaded", async ()=>{
  await protegerPagina(["admin","administracion"]);
  cargarResidentes();
});

async function cargarResidentes() {

  const { data } = await supabaseClient
    .from("residentes")
    .select("id, privada, casa")
    .eq("es_residente", false)
    .order("privada");

  const select = document.getElementById("residente");
  select.innerHTML = "";

  data.forEach(r => {
    const option = document.createElement("option");
    option.value = r.id;
    option.text = `${r.privada} - ${r.casa}`;
    select.appendChild(option);
  });
}

function generarUUID() {
  return crypto.randomUUID();
}

async function crearAcceso() {

  if(creando) return;
  creando = true;

  const btn = document.getElementById("btnCrear");
  btn.disabled = true;

  const residente_id = document.getElementById("residente").value;
  const nombre = document.getElementById("nombre").value.trim();
  const tipo = document.getElementById("tipo").value.trim();
  const resultado = document.getElementById("resultado");

 if (!nombre) {
  resultado.className = "resultado error";
  resultado.innerText = "Ingresa nombre";
    reset();
    return;
  }

  // 🔍 VALIDAR DUPLICADO
  const { data: existente } = await supabaseClient
    .from("accesos_propietarios")
    .select("id")
    .eq("residente_id", residente_id)
    .eq("nombre", nombre)
    .eq("activo", true)
    .maybeSingle();

  if(existente){
    resultado.className = "resultado error";
    resultado.innerText = "Ya existe un acceso activo para esta persona";
    reset();
    return;
  }

  const identificador = generarUUID();

  const { data: residente } = await supabaseClient
    .from("residentes")
    .select("privada, casa")
    .eq("id", residente_id)
    .single();

  const { error } = await supabaseClient
    .from("accesos_propietarios")
    .insert({
      residente_id,
      nombre,
      tipo,
      identificador
    });

  if (error) {
    resultado.className = "resultado error";
    resultado.innerText = "Error al crear acceso";
    reset();
    return;
  }

  resultado.className = "resultado ok";
  resultado.innerText = "Acceso creado correctamente";
  document.getElementById("nombre").value = "";
  document.getElementById("tipo").value = "";

  urlCredencial = `${window.location.origin}/credencial_propietario.html?qr=${identificador}&nombre=${encodeURIComponent(nombre)}&privada=${encodeURIComponent(residente.privada)}&casa=${encodeURIComponent(residente.casa)}&origen=admin`;

  urlParaEnviar = `${window.location.origin}/credencial_propietario.html?qr=${identificador}&nombre=${encodeURIComponent(nombre)}&privada=${encodeURIComponent(residente.privada)}&casa=${encodeURIComponent(residente.casa)}`;

  generarQR(urlCredencial);
  prepararWhatsApp(nombre, residente.privada, residente.casa);

  
  reset();
}

function reset(){
  creando = false;
  document.getElementById("btnCrear").disabled = false;
}

function generarQR(texto) {
  QRCode.toCanvas(document.getElementById("qr"), texto, { width: 220 });
}

function prepararWhatsApp(nombre, privada, casa) {

  const btn = document.getElementById("btnWA");
  btn.style.display = "block";

  btn.onclick = () => {

    const mensaje =
      `🔐 Acceso al fraccionamiento\n\n` +
      `Nombre: ${nombre}\n` +
      `Ubicación: Privada ${privada} - Lote ${casa}\n\n` +
      `Presenta este código en caseta:\n${urlParaEnviar}`;

    window.open(`https://wa.me/?text=${encodeURIComponent(mensaje)}`, "_blank");
  };
}

</script>

</body>
</html>

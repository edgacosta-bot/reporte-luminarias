<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reportes fuera de horario</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="utils/dates.js"></script>

<script>
protegerPagina(["vigilante","administracion","admin"]);
</script>

    <link rel="stylesheet" href="styles/reportes_fuera_horario.css">
</head>

<body>

<div class="container">

  <h1>🚨 Reportes fuera de horario</h1>

  <div id="alerta" class="alerta-global"></div>

  <div id="lista"></div>

</div>

<script>

cargar();
setInterval(cargar, 10000);

function formatearHora(fecha) {

  if (!fecha) return "-";

  const f = new Date(fecha);

  return f.toLocaleString("es-MX", {
    hour: "2-digit",
    minute: "2-digit",
    day: "2-digit",
    month: "2-digit"
  });
}

let privadasAbiertas = new Set();
let lotesAbiertos = new Set();

async function cargar() {

  const lista = document.getElementById("lista");
  const alertaDiv = document.getElementById("alerta");

  const fechaHoyMX = new Date().toLocaleDateString("en-CA", {
    timeZone: "America/Mexico_City"
  });

  const inicio = fechaInicioUTC(fechaHoyMX);
  const fin = fechaFinUTC(fechaHoyMX);

 const { data: reportes, error } =
  await supabaseClient.rpc(
    "obtener_reportes_fuera_horario"
  );

 if (error) {

  console.log(error);

  lista.innerHTML =
    "<p>Error al cargar</p>";

  return;
}

  const reportesHoy =
  (reportes || []).filter(r =>
    r.fecha_reporte >= inicio
    &&
    r.fecha_reporte <= fin
  );
  
 if (reportesHoy.length === 0) {

    lista.innerHTML =
      "<p class='vacio'>No hay reportes fuera de horario</p>";

    alertaDiv.innerHTML = "Todo en orden";
    alertaDiv.style.color = "#34d399";

    return;
  }

  privadasAbiertas.clear();
  lotesAbiertos.clear();

  document
    .querySelectorAll("details[data-privada]")
    .forEach(d => {
      if (d.open) {
        privadasAbiertas.add(d.dataset.privada);
      }
    });

  document
    .querySelectorAll("details[data-lote]")
    .forEach(d => {
      if (d.open) {
        lotesAbiertos.add(d.dataset.lote);
      }
    });

  lista.innerHTML = "";

  const agrupado = {};

  for (const item of reportesHoy) {

    const privada = item.privada || "Sin privada";
    const lote = item.casa || "Sin lote";

    if (!agrupado[privada]) {
      agrupado[privada] = {};
    }

    if (!agrupado[privada][lote]) {
      agrupado[privada][lote] = [];
    }

    agrupado[privada][lote].push(item);
  }

  const privadasOrdenadas =
    Object.keys(agrupado).sort();

  for (const privada of privadasOrdenadas) {

    const detallePrivada =
      document.createElement("details");

    detallePrivada.dataset.privada = privada;

    if (privadasAbiertas.has(privada)) {
      detallePrivada.open = true;
    }

    const totalPrivada =
      Object.values(agrupado[privada])
        .reduce((acc, arr) => acc + arr.length, 0);

    detallePrivada.innerHTML = `
      <summary class="acordeon-privada">
        🏘 Privada ${privada} (${totalPrivada})
      </summary>
    `;

    const lotesOrdenados =
      Object.keys(agrupado[privada])
        .sort((a,b) => Number(a) - Number(b));

    for (const lote of lotesOrdenados) {

      const detalleLote =
        document.createElement("details");

      const llaveLote =
        privada + "-" + lote;

      detalleLote.dataset.lote = llaveLote;

      if (lotesAbiertos.has(llaveLote)) {
        detalleLote.open = true;
      }

      const reportesLote =
        agrupado[privada][lote];

      detalleLote.innerHTML = `
        <summary class="acordeon-lote">
          🏠 Lote ${lote} (${reportesLote.length})
        </summary>
      `;

      reportesLote.sort((a,b) =>
        new Date(b.fecha_reporte)
        - new Date(a.fecha_reporte)
      );

      for (const reporte of reportesLote) {

        const div =
          document.createElement("div");

        div.className = "reporte-item";

        div.innerHTML = `
         
         <div class="nombre">

  👷 ${reporte.nombre}

</div>

<div class="detalle">

  🏗 Construcción

  <br>

  Privada ${reporte.privada}
  - Lote ${reporte.casa}

  <br><br>

  🕒 Salida:
  ${formatearHora(
    reporte.fecha_reporte
  )}

</div>
        `;

        detalleLote.appendChild(div);
      }

      detallePrivada.appendChild(detalleLote);
    }

    lista.appendChild(detallePrivada);
  }

  alertaDiv.innerHTML =
    `🚨 ${reportesHoy.length} reporte(s) fuera de horario`;

  alertaDiv.style.color = "#f87171";
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Clientes de Asesor</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="/utils/ui.js"></script>  

<script>
protegerPagina(["vigilante"]);
</script>

<style>

body{
  margin:0;
  font-family:'Segoe UI';
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
}

.container{
  max-width:700px;
  margin:auto;
  padding:18px;
}

h2{
  text-align:center;
}

.card{
  background:#111827;
  padding:18px;
  border-radius:18px;
  margin-bottom:12px;
  border-left:6px solid #16a34a;
}

input,
select{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  font-size:15px;
  background:#1f2937;
  color:white;
  box-sizing:border-box;
}

.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
  font-size:15px;
}

.btn-verde{
  background:#16a34a;
  color:white;
}

.nombre{
  font-size:22px;
  font-weight:bold;
  margin-bottom:8px;
}

.detalle{
  color:#cbd5e1;
  font-size:14px;
}

.vacio{
  text-align:center;
  color:#94a3b8;
  margin-top:20px;
}

.msg{
  margin-top:10px;
  text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h2>
🏡 Clientes de Asesores
</h2>

<div class="card">

<h3>
Registrar cliente
</h3>

<select id="asesor">
  <option value="">
    Seleccione asesor...
  </option>
</select>

<br><br>

<input
  id="cliente"
  placeholder="Nombre del cliente">

<br><br>

<input
  id="pin"
  type="password"
  placeholder="NIP vigilante">

<br><br>

<button
  class="btn btn-verde"
  onclick="registrarCliente()">

  Registrar cliente

</button>

<div
  id="msgRegistro"
  class="msg">
</div>

</div>

<h2 id="tituloClientes">
👥 Clientes dentro
</h2>

<div id="clientesDentro">
Cargando...
</div>

</div>

<script>

cargar();

async function cargar(){

  await cargarAsesores();
  await cargarClientes();

}

// =====================================
// ASESORES DENTRO
// =====================================

async function cargarAsesores(){

  const select =
    document.getElementById("asesor");

  select.innerHTML = `
    <option value="">
      Seleccione asesor...
    </option>
  `;

  const { data, error } =
    await supabaseClient.rpc(
      "obtener_asesores_dentro"
    );

  if(error){

    console.error(error);
    return;

  }

  data.forEach(a => {

    select.innerHTML += `

      <option value="${a.asesor_id}">

        ${a.nombre}
        (${a.empresa})

      </option>

    `;

  });

}

// =====================================
// CLIENTES DENTRO
// =====================================

async function cargarClientes(){

  const contenedor =
    document.getElementById(
      "clientesDentro"
    );

  const { data, error } =
    await supabaseClient.rpc(
      "obtener_visitantes_asesor_dentro"
    );

  if(error){

    console.error(error);

    contenedor.innerHTML =
      "Error al cargar";

    return;

  }

  if(!data || data.length === 0){

    contenedor.innerHTML = `
      <div class="vacio">
        No hay clientes dentro
      </div>
    `;

    return;

  }

  contenedor.innerHTML = "";

  data.forEach(cliente => {

    contenedor.innerHTML += `

      <div class="card">

        <div class="nombre">

          ${cliente.nombre_visitante}

        </div>

        <div class="detalle">

          Asesor:
          ${cliente.asesor_nombre}

          <br><br>

          Empresa:
          ${cliente.empresa}

        </div>

        <br>

        <button
          class="btn btn-verde"
          onclick="
            registrarSalida(
              '${cliente.visitante_id}'
            )
          ">

          Registrar salida

        </button>

      </div>

    `;

  });

}

// =====================================
// REGISTRAR CLIENTE
// =====================================

async function registrarCliente(){

  const asesorId =
    document.getElementById(
      "asesor"
    ).value;

  const nombreCliente =
    document.getElementById(
      "cliente"
    ).value.trim();

  const pin =
    document.getElementById(
      "pin"
    ).value.trim();

  if(!asesorId){

  ui.warn(
    "Seleccione asesor"
  );

  return;

}
  if(!nombreCliente){

  ui.warn(
    "Capture nombre del cliente"
  );

  return;

}

  if(!pin){

  ui.warn(
    "Capture NIP"
  );

  return;

}
  const { data: vigilante } =
    await supabaseClient.rpc(
      "validar_pin_vigilante",
      {
        pin_input: pin
      }
    );

  if(
    !vigilante ||
    vigilante.length === 0
  ){

    ui.error(
  "NIP incorrecto"
);

    return;

  }

  const { error } =
    await supabaseClient.rpc(
      "registrar_entrada_visitante_asesor",
      {
        p_asesor_id:
          asesorId,

        p_nombre_visitante:
          nombreCliente,

        p_vigilante_id:
          vigilante[0].id
      }
    );

  if(error){

    console.error(error);

    ui.error(
  error.message
);

    return;

  }

  document.getElementById(
    "cliente"
  ).value = "";

  document.getElementById(
    "pin"
  ).value = "";

 ui.success(
  "Cliente registrado correctamente"
);

  await cargarAsesores();
  await cargarClientes();

}

// =====================================
// SALIDA CLIENTE
// =====================================

async function registrarSalida(
  visitanteId
){

  const pin =
    window.prompt(
      "Ingrese NIP del vigilante"
    );

  if(!pin){
    return;
  }

  const { data: vigilante } =
    await supabaseClient.rpc(
      "validar_pin_vigilante",
      {
        pin_input: pin
      }
    );

  if(
    !vigilante ||
    vigilante.length === 0
  ){

    alert(
      "NIP incorrecto"
    );

    return;

  }

  const { error } =
    await supabaseClient.rpc(
      "registrar_salida_visitante_asesor",
      {
        p_visitante_id:
          visitanteId,

        p_vigilante_id:
          vigilante[0].id
      }
    );

  if(error){

    console.error(error);

    alert(
      error.message
    );

    return;

  }

  await cargarAsesores();
  await cargarClientes();

}

</script>

</body>
</html>

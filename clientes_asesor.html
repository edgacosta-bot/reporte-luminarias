<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Clientes de Asesor</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="/utils/ui.js"></script>  
<script src="/modal.js"></script>  

<script>
protegerPagina(["vigilante"]);
</script>

    <link rel="stylesheet" href="styles/clientes_asesor.css">
</head>

<body>

<div class="container">

<h2>
🏡 Clientes de Asesores
</h2>

<div class="card">

<h3>
Registrar cliente
</h3>

<select id="asesor">
  <option value="">
    Seleccione asesor...
  </option>
</select>

<br><br>

<input
  id="cliente"
  placeholder="Nombre del cliente">

<br><br>

<input
  id="pin"
  type="password"
  placeholder="NIP vigilante">

<br><br>

<button
  class="btn btn-verde"
  onclick="registrarCliente()">

  Registrar cliente

</button>

<div
  id="msgRegistro"
  class="msg">
</div>

</div>

<h2 id="tituloClientes">
👥 Clientes dentro
</h2>

<div id="clientesDentro">
Cargando...
</div>

</div>

<script>

cargar();

async function cargar(){

  await cargarAsesores();
  await cargarClientes();

}

// =====================================
// ASESORES DENTRO
// =====================================

async function cargarAsesores(){

  const select =
    document.getElementById("asesor");

  select.innerHTML = `
    <option value="">
      Seleccione asesor...
    </option>
  `;

  const { data, error } =
    await supabaseClient.rpc(
      "obtener_asesores_dentro"
    );

  if(error){

    console.error(error);
    return;

  }

  data.forEach(a => {

    select.innerHTML += `

      <option value="${a.asesor_id}">

        ${a.nombre}
        (${a.empresa})

      </option>

    `;

  });

}

// =====================================
// CLIENTES DENTRO
// =====================================

async function cargarClientes(){

  const contenedor =
    document.getElementById(
      "clientesDentro"
    );

  const { data, error } =
    await supabaseClient.rpc(
      "obtener_visitantes_asesor_dentro"
    );

  if(error){

    console.error(error);

    contenedor.innerHTML =
      "Error al cargar";

    return;

  }

  if(!data || data.length === 0){

    contenedor.innerHTML = `
      <div class="vacio">
        No hay clientes dentro
      </div>
    `;

    return;

  }

  contenedor.innerHTML = "";

  data.forEach(cliente => {

    contenedor.innerHTML += `

      <div class="card">

        <div class="nombre">

          ${cliente.nombre_visitante}

        </div>

        <div class="detalle">

          Asesor:
          ${cliente.asesor_nombre}

          <br><br>

          Empresa:
          ${cliente.empresa}

        </div>

        <br>

        <button
          class="btn btn-ambar"
          onclick="
            registrarSalida(
              '${cliente.visitante_id}'
            )
          ">

          Registrar salida

        </button>

      </div>

    `;

  });

}

// =====================================
// REGISTRAR CLIENTE
// =====================================

async function registrarCliente(){

  const asesorId =
    document.getElementById(
      "asesor"
    ).value;

  const nombreCliente =
    document.getElementById(
      "cliente"
    ).value.trim();

  const pin =
    document.getElementById(
      "pin"
    ).value.trim();

  if(!asesorId){

  ui.warn(
    "Seleccione asesor"
  );

  return;

}
  if(!nombreCliente){

  ui.warn(
    "Capture nombre del cliente"
  );

  return;

}

  if(!pin){

  ui.warn(
    "Capture NIP"
  );

  return;

}
  const { data: vigilante } =
    await supabaseClient.rpc(
      "validar_pin_vigilante",
      {
        pin_input: pin
      }
    );

  if(
    !vigilante ||
    vigilante.length === 0
  ){

    ui.error(
  "NIP incorrecto"
);

    return;

  }

  const { error } =
    await supabaseClient.rpc(
      "registrar_entrada_visitante_asesor",
      {
        p_asesor_id:
          asesorId,

        p_nombre_visitante:
          nombreCliente,

        p_vigilante_id:
          vigilante[0].id
      }
    );

  if(error){

    console.error(error);

    ui.error(
  error.message
);

    return;

  }

  document.getElementById(
    "cliente"
  ).value = "";

  document.getElementById(
    "pin"
  ).value = "";

 ui.success(
  "Cliente registrado correctamente"
);

  await cargarAsesores();
  await cargarClientes();

}

// =====================================
// SALIDA CLIENTE
// =====================================

async function registrarSalida(
  visitanteId
){

  const confirmar =
  await mostrarConfirmacion({

    titulo:
      "Registrar salida",

    mensaje:
      "¿Desea registrar la salida de este cliente?"

  });

if(!confirmar){
  return;
}

const pin =
  await mostrarSolicitudPin({
    titulo:"Registrar salida",
    mensaje:"Ingrese NIP del vigilante"
  });

if(!pin){
  return;
}

  const { data: vigilante } =
    await supabaseClient.rpc(
      "validar_pin_vigilante",
      {
        pin_input: pin
      }
    );

  if(
  !vigilante ||
  vigilante.length === 0
){

  ui.error(
    "NIP incorrecto"
  );

  return;

}

  const { error } =
    await supabaseClient.rpc(
      "registrar_salida_visitante_asesor",
      {
        p_visitante_id:
          visitanteId,

        p_vigilante_id:
          vigilante[0].id
      }
    );

 if(error){

  console.error(error);

  ui.error(
    error.message
  );

  return;

}

  await cargarAsesores();
  await cargarClientes();

}

</script>

</body>
</html>

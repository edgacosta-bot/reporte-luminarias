<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de trabajadores</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<script>
window.addEventListener("load", () => {
  protegerPagina(["residente"]);
});
</script>

<style>
/* 🔒 UX INTACTO — SIN CAMBIOS */
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

.aviso {
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 15px;
  font-size: 14px;
  text-align: center;
}

.aviso-warning { background: #f59e0b; color: #1f2937; }
.aviso-error { background: #dc2626; }

.card {
  background: #1f2937;
  border-radius: 14px;
  padding: 15px;
  margin-bottom: 12px;
}

.nombre { font-weight: bold; font-size: 16px; }

.info {
  font-size: 12px;
  color: #9ca3af;
  margin-bottom: 10px;
}

.botones { display: flex; gap: 8px; }

button {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}

.btn-on { background: #16a34a; color: white; }
.btn-off { background: #6b7280; color: white; }
.btn-del { background: #dc2626; color: white; }

.bloqueado {
  opacity: 0.5;
  pointer-events: none;
}
</style>

</head>

<body>

<div class="container">

<h2>👷 Trabajadores del hogar</h2>

<div id="aviso"></div>
<div id="lista"></div>

</div>

<script>

let residente = null;
let trabajadorSeleccionado = null;

cargar();

async function cargar() {

  const { data: userData } = await supabaseClient.auth.getUser();
  const user = userData?.user;

  if (!user) {
    alert("Sesión no válida");
    return;
  }

  const { data, error } = await supabaseClient
    .from("residentes")
    .select("*")
    .eq("user_id", user.id)
    .single();

  if (error || !data) {
    alert("Error obteniendo residente");
    return;
  }

  residente = data;

  const aviso = document.getElementById("aviso");
  aviso.innerHTML = "";

  if (residente.estado_pago === "atraso_1") {
    aviso.className = "aviso aviso-warning";
    aviso.innerText = "⚠️ Tienes atraso en tus aportaciones. Puedes continuar, pero regulariza.";
  }

  if (residente.estado_pago === "moroso") {
    aviso.className = "aviso aviso-error";
    aviso.innerText = "⛔ No puedes gestionar trabajadores por adeudo. Regulariza para continuar.";
  }

  const { data: trabajadores } = await supabaseClient
    .from("trabajadores_hogar")
    .select("*")
    .eq("residente_id", residente.id)
    .order("created_at", { ascending: false });

  const contenedor = document.getElementById("lista");
  contenedor.innerHTML = "";

  trabajadores?.forEach(t => {

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="nombre">${t.nombre}</div>

      <div class="info">
        Inicio: ${t.fecha_inicio || "Sin definir"}<br>
        Fin: ${t.fecha_fin || "Sin límite"}
      </div>

      <div class="botones">
        <button class="${t.activo ? 'btn-off' : 'btn-on'}"
        onclick="toggle('${t.id}', ${t.activo})">
        ${t.activo ? 'Desactivar' : 'Activar'}
        </button>

        <button onclick="abrirRenovar('${t.id}', '${t.fecha_fin || ''}')">
        Renovar
        </button>

        <button class="btn-del" onclick="eliminar('${t.id}')">
        Eliminar
        </button>
      </div>
    `;

    if (residente.estado_pago === "moroso") {
      card.querySelectorAll("button").forEach(btn => {
        btn.classList.add("bloqueado");
      });
    }

    contenedor.appendChild(card);
  });
}

async function toggle(id, estadoActual) {

  if (residente.estado_pago === "moroso") return;

  const { error } = await supabaseClient.rpc("toggle_trabajador_activo", {
    p_trabajador_id: id,
    p_estado: !estadoActual
  });

  if (error) {
    console.error("ERROR TOGGLE:", error);
    alert("No se pudo actualizar el estado");
    return;
  }

  cargar();
}

async function eliminar(id) {

  if (residente.estado_pago === "moroso") return;

  if (!confirm("¿Eliminar trabajador?")) return;

  const { error } = await supabaseClient
    .from("trabajadores_hogar")
    .delete()
    .eq("id", id);

  if (error) {
    console.error("ERROR ELIMINAR:", error);
    alert("Error al eliminar");
    return;
  }

  cargar();
}

function abrirRenovar(id, fechaActual) {

  if (residente.estado_pago === "moroso") return;

  trabajadorSeleccionado = id;

  const nueva = prompt("Nueva fecha fin (YYYY-MM-DD)", fechaActual || "");
  if (!nueva) return;

  renovar(nueva);
}

async function renovar(nuevaFecha) {

  const { error } = await supabaseClient
    .from("trabajadores_hogar")
    .update({
      fecha_fin: nuevaFecha,
      activo: true
    })
    .eq("id", trabajadorSeleccionado);

  if (error) {
    console.error("ERROR RENOVAR:", error);
    alert("Error al renovar");
    return;
  }

  cargar();
}

</script>

</body>
</html>

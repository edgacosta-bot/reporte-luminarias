<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de trabajadores</title>

<script src="auth.js"></script>
<script>
protegerPagina(["colono"]);
</script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

/* 🔥 AVISOS */
.aviso {
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 15px;
  font-size: 14px;
  text-align: center;
}

.aviso-warning {
  background: #f59e0b;
  color: #1f2937;
}

.aviso-error {
  background: #dc2626;
}

/* TARJETAS */
.card {
  background: #1f2937;
  border-radius: 14px;
  padding: 15px;
  margin-bottom: 12px;
}

.nombre {
  font-weight: bold;
  font-size: 16px;
}

.info {
  font-size: 12px;
  color: #9ca3af;
  margin-bottom: 10px;
}

.botones {
  display: flex;
  gap: 8px;
}

button {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}

.btn-on { background: #16a34a; color: white; }
.btn-off { background: #6b7280; color: white; }
.btn-del { background: #dc2626; color: white; }

/* 🔒 BOTÓN BLOQUEADO */
.bloqueado {
  opacity: 0.5;
  pointer-events: none;
}

  #modalRenovar {
  backdrop-filter: blur(4px);
}

#modalRenovar div {
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
</style>

<!-- 1️⃣ PRIMERO SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- 2️⃣ LUEGO TU AUTH -->
<script src="auth.js"></script>

<!-- 3️⃣ LUEGO PROTECCIÓN -->
<script>
protegerPagina(["colono"]);
</script>
</head>

<body>

<div class="container">

<h2>👷 Trabajadores del hogar</h2>

<!-- 🔥 AVISO DINÁMICO -->
<div id="aviso"></div>

<div id="lista"></div>

<div id="toast" style="
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #16a34a;
  color: white;
  padding: 12px 20px;
  border-radius: 10px;
  display: none;
  font-weight: bold;
  z-index: 999;
">
  Renovado correctamente
</div>  

 <div id="modalRenovar" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); align-items:center; justify-content:center;">

  <div style="background:#1f2937; padding:20px; border-radius:16px; width:90%; max-width:300px;">

    <h3 style="margin-top:0;">Renovar vigencia</h3>

    <input type="date" id="nuevaFecha" style="width:100%; padding:10px; border-radius:10px; border:none; margin-top:10px;">

    <div style="display:flex; gap:10px; margin-top:15px;">
      <button onclick="cerrarModal()">Cancelar</button>
      <button class="btn-on" onclick="confirmarRenovar(event)">Guardar</button>
    </div>

  </div>
</div> 

</div>

<script>



let residente = null;

let trabajadorSeleccionado = null;  

cargar();

async function cargar() {

  // 🔎 obtener residente
// 🔥 SESIÓN REAL
const { data: userData } = await supabaseClient.auth.getUser();
const user = userData?.user;

if (!user) {
  alert("Sesión no válida");
  return;
}

// 🔥 RESIDENTE POR USER_ID
const { data, error } = await supabaseClient
  .from("residentes")
  .select("*")
  .eq("user_id", user.id)
  .single();

if (error || !data) {
  alert("Error obteniendo residente");
  return;
}

residente = data;

  

  // 🔥 MOSTRAR AVISO
  const aviso = document.getElementById("aviso");

  if (residente.estado_pago === "atraso_1") {
    aviso.className = "aviso aviso-warning";
    aviso.innerText = "⚠️ Tienes atraso en tus aportaciones. Puedes continuar, pero regulariza.";
  }

  if (residente.estado_pago === "moroso") {
    aviso.className = "aviso aviso-error";
    aviso.innerText = "⛔ No puedes gestionar trabajadores por adeudo. Regulariza para continuar.";
  }

  // 🔎 obtener trabajadores
  const { data: trabajadores } = await supabaseClient
    .from("trabajadores_hogar")
    .select("*")
    .eq("residente_id", residente.id)
    .order("created_at", { ascending: false });

  const contenedor = document.getElementById("lista");
  contenedor.innerHTML = "";

  trabajadores.forEach(t => {

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="nombre">${t.nombre}</div>

      <div class="info">
       Inicio: ${t.fecha_inicio ? formatoMX(t.fecha_inicio) : "Sin definir"}<br>
       Fin: ${t.fecha_fin ? formatoMX(t.fecha_fin) : "Sin límite"}
      </div>

      <div class="botones">
  <button class="${t.activo ? 'btn-off' : 'btn-on'}"
    onclick="toggle('${t.id}', ${t.activo})">
    ${t.activo ? 'Desactivar' : 'Activar'}
  </button>

  <button onclick="abrirRenovar('${t.id}', '${t.fecha_fin || ''}')">
    Renovar
  </button>

  <button class="btn-del" onclick="eliminar('${t.id}')">
    Eliminar
  </button>
</div>
    `;

    // 🔒 BLOQUEAR SI MOROSO
    if (residente.estado_pago === "moroso") {
      card.querySelectorAll("button").forEach(btn => {
        btn.classList.add("bloqueado");
      });
    }

    contenedor.appendChild(card);
  });
}

// 🔥 ACTIVAR / DESACTIVAR
async function toggle(id, estadoActual) {

  if (residente.estado_pago === "moroso") return;

  await supabaseClient
    .from("trabajadores_hogar")
    .update({ activo: !estadoActual })
    .eq("id", id);

  cargar();
}

// 🔥 ELIMINAR
async function eliminar(id) {

  if (residente.estado_pago === "moroso") return;

  if (!confirm("¿Eliminar trabajador?")) return;

  await supabaseClient
    .from("trabajadores_hogar")
    .delete()
    .eq("id", id);

  cargar();
}

// 🔄 RENOVAR
function abrirRenovar(id, fechaActual) {

  if (residente.estado_pago === "moroso") return;

  trabajadorSeleccionado = id;

  document.getElementById("modalRenovar").style.display = "flex";
  document.getElementById("nuevaFecha").value = fechaActual || "";
}

  function cerrarModal() {
  document.getElementById("modalRenovar").style.display = "none";
}

async function confirmarRenovar(event) {

  const nuevaFecha = document.getElementById("nuevaFecha").value;
  const btn = event.target;
btn.disabled = true;
btn.innerText = "Guardando...";

  if (!nuevaFecha) {
  alert("Selecciona una fecha");
  btn.disabled = false;
  btn.innerText = "Guardar";
  return;
}

  if (isNaN(Date.parse(nuevaFecha))) {
  alert("Fecha inválida");
  btn.disabled = false;
  btn.innerText = "Guardar";
  return;
}

  const { error } = await supabaseClient
    .from("trabajadores_hogar")
    .update({
      fecha_fin: nuevaFecha,
      activo: true
    })
    .eq("id", trabajadorSeleccionado);

 if (error) {
  alert("Error al renovar");
  console.log(error);
  btn.disabled = false;
  btn.innerText = "Guardar";
  return;
}

  
  cerrarModal();
  cargar();
  mostrarToast("Renovado correctamente");
  btn.disabled = false;
btn.innerText = "Guardar";
}
  function mostrarToast(mensaje) {

  const toast = document.getElementById("toast");
  toast.innerText = mensaje;
  toast.style.display = "block";

  setTimeout(() => {
    toast.style.display = "none";
  }, 2000);
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Invitados Reservación</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="auth.js"></script>
<script src="utils/residente.js"></script>
<script src="modal.js"></script>

<style>

body{
  margin:0;
  font-family:'Segoe UI';
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
}

.container{
  max-width:700px;
  margin:auto;
  padding:20px;
}

.card{
  background:#111827;
  border-radius:18px;
  padding:20px;
  margin-bottom:15px;
}

input{
  width:100%;
  box-sizing:border-box;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#1f2937;
  color:white;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1
  style="
    margin-bottom:20px;
  "
>
📋 Detalle de actividad
</h1>

<div
  id="informacionGeneral"
></div>

<div
  id="instructoresContainer"
></div>

<div
  id="participantesContainer"
></div>      

<div
  class="card"
  style="
    border-left:6px solid #22c55e;
  "
>

  <input
    id="nombreParticipante"
    placeholder="Nombre del residente asistente"
  >

  <br><br>

  <button
    style="
      background:#16a34a;
    "
    onclick="agregarParticipante()"
  >

    ➕ Agregar residente

  </button>

</div>
      
<div
  class="card"
  style="
    border-left:6px solid #2563eb;
  "
>

  <input
    id="nombreInvitado"
    placeholder="Nombre del invitado"
  >

  <br><br>

  <button
    onclick="agregarInvitado()"
  >

    ➕ Agregar invitado

  </button>

</div>

<div id="lista"></div>

</div>

<script>

const params =
  new URLSearchParams(
    window.location.search
  );

const actividadId =
  params.get(
    "actividad_id"
  );

let residenteId = null;

let detalle = [];

let horarios = [];

let instructores = [];

let participantesResidente = [];      

function formatearFecha(fecha){

  if(!fecha){
    return "";
  }

  return new Date(
    fecha + "T00:00:00"
  ).toLocaleDateString(
    "es-MX",
    {
      day:"numeric",
      month:"short",
      year:"numeric"
    }
  );

}


async function cargarResidente(){

  const residente =
    await getResidente();

  if(!residente){

    alert(
      "Error de sesión"
    );

    return false;

  }

  residenteId =
    residente.id;

  return true;

}      
      
function renderizar(){

  if(
    detalle.length === 0
  ){
    return;
  }

  let activos = [];

  detalle.forEach(i => {

    if(!i.invitado_id){
      return;
    }

    if(i.estatus_invitado !== 'cancelado'){
      activos.push(i);
    }

  });

  const r =
    detalle[0];

  document.getElementById(
    "informacionGeneral"
  ).innerHTML = `

  <div class="card">

    <div
      style="
        color:#93c5fd;
        font-weight:bold;
        margin-bottom:15px;
      "
    >
      📋 Información general
    </div>

    <b>🏟 Amenidad:</b>
    ${r.amenidad}

    <br><br>

    <b>💃 Actividad:</b>
    ${r.actividad}

    <br><br>

    <b>📅 Vigencia:</b>

    <br>

    ${formatearFecha(r.fecha_inicio)}
    al
    ${formatearFecha(r.fecha_fin)}

    <br><br>

    <b>🕒 Horarios:</b>

    <br><br>

    ${renderizarHorariosTexto()}

  </div>

  `;

  const lista =
    document.getElementById(
      "lista"
    );

  let html = "";

  if(activos.length > 0){

    html += `

      <div
        class="card"
        style="
          border-left:6px solid #22c55e;
        "
      >

        <div
          style="
            color:#22c55e;
            font-weight:bold;
            font-size:18px;
          "
        >

          👥 Mis invitados (${activos.length})

        </div>

      </div>

    `;

  }

  activos.forEach(i => {

    html += `

      <div
        class="card"
        style="
          border-left:6px solid #22c55e;
        "
      >

        <div
          style="
            font-size:18px;
            font-weight:bold;
            color:#93c5fd;
          "
        >

          👤 ${i.invitado}

        </div>

        <div
          style="
            margin-top:10px;
            color:#22c55e;
            font-weight:bold;
          "
        >

          🟢 Autorizado

        </div>

        <br>

        <button
          style="
            background:#dc2626;
          "
          onclick="
            cancelarInvitado(
              '${i.invitado_id}'
            )
          "
        >

          ❌ Cancelar invitado

        </button>

      </div>

    `;

  });

  lista.innerHTML = html;

  renderizarInstructores();

  renderizarParticipantes();

}    
     
function renderizarInstructores(){

  if(
    !instructores ||
    instructores.length === 0
  ){
    return "";
  }

  let html = `

    <br><br>

    <div
      style="
        color:#93c5fd;
        font-weight:bold;
        margin-bottom:10px;
      "
    >
      👨‍🏫 Instructor(es)
    </div>

  `;

  
instructores.forEach(i => {

    html += `

      <div
        style="
          margin-bottom:8px;
          padding:8px;
          background:#1f2937;
          border-radius:10px;
        "
      >

        <div>
  👤 ${i.nombre}
</div>

<div
  style="
    margin-top:4px;
    font-size:13px;
    color:#9ca3af;
  "
>
  ${i.especialidad}
  ·
  ${i.rol}
</div>

      </div>

    `;

  });

  document.getElementById(
  "instructoresContainer"
).innerHTML = `

<div class="card">

${html}

</div>

`;

}
      
function renderizarHorarios(){

 if(
  !horarios ||
  horarios.length === 0
){
  return "";
}

if(
  horarios.filter(
    h => h.activo
  ).length === 0
){
  return "";
}

  let html = `

    <hr
      style="
        border:0;
        border-top:1px solid #374151;
        margin:20px 0;
      "
    >

    <div
      style="
        color:#93c5fd;
        font-weight:bold;
        margin-bottom:10px;
      "
    >
      🕒 Horarios de la actividad
    </div>

  `;

const dias = {
  1:"Lunes",
  2:"Martes",
  3:"Miércoles",
  4:"Jueves",
  5:"Viernes",
  6:"Sábado",
  7:"Domingo"
};

horarios
  .filter(h => h.activo)
  .sort((a,b) =>
    a.dia_semana - b.dia_semana
  )
  .forEach(h => {

    html += `

      <div
        style="
          margin-bottom:8px;
          padding:8px;
          background:#1f2937;
          border-radius:10px;
        "
      >

        📅 ${dias[h.dia_semana]}

        <br>

        🕒 ${h.hora_inicio.substring(0,5)}
        -
        ${h.hora_fin.substring(0,5)}

      </div>

    `;

  });
      
  document.getElementById(
  "horariosContainer"
).innerHTML = `

<div class="card">

${html}

</div>

`;

}

function renderizarParticipantes(){

  if(
  !participantesResidente
){
  participantesResidente = [];
}

  let html = `

    <div class="card">

      <div
        style="
          color:#93c5fd;
          font-weight:bold;
          margin-bottom:10px;
        "
      >
        👨‍👩‍👧‍👦 Residentes asistentes
        (${participantesResidente.length})    
        
      </div>

  `;

  participantesResidente.forEach(p => {

    html += `

      <div
        style="
          margin-bottom:8px;
          padding:10px;
          background:#1f2937;
          border-radius:10px;
        "
      >

        <div>

          👤 ${p.nombre}

        </div>

        <button
          style="
            margin-top:8px;
            background:#dc2626;
          "
          onclick="
            eliminarParticipante(
              '${p.id}'
            )
          "
        >

          ❌ Remover

        </button>

      </div>

    `;

  });

  html += `

    </div>

  `;

  document.getElementById(
    "participantesContainer"
  ).innerHTML = html;

}     
      
async function cargar(){

  
const [
  detalleResp,
  horariosResp,
  instructoresResp,
  participantesResp
] = await Promise.all([

  supabaseClient.rpc(
    "obtener_detalle_actividad_completo",
    {
      p_actividad_id:
        actividadId,

      p_residente_id:
        residenteId
    }
  ),

  supabaseClient.rpc(
  "obtener_horarios_actividad",
  {
    p_actividad_id:
      actividadId
  }
),

supabaseClient.rpc(
  "obtener_instructores_actividad",
  {
    p_actividad_id:
      actividadId
  }
),

supabaseClient.rpc(
  "obtener_participantes_residente_actividad",
  {
    p_actividad_id:
      actividadId,

    p_residente_id:
      residenteId
  }
)

]);

const data =
  detalleResp.data;

const error =
  detalleResp.error;

horarios =
  horariosResp.data?.horarios || [];


instructores =
  instructoresResp.data?.instructores || [];

participantesResidente =
  participantesResp.data?.participantes || [];  

console.table(
  participantesResidente
);      

  if(error){

    console.error(error);

    return;

  }

  detalle =
    data || [];

  
  renderizar();

}   

async function agregarParticipante(){

  const nombre =
    document.getElementById(
      "nombreParticipante"
    ).value.trim();

  if(!nombre){

    await mostrarAlerta({

      titulo:"SIGVIC",

      mensaje:
        "Capture el nombre del residente."

    });

    return;

  }

  const { data, error } =
    await supabaseClient.rpc(
      "agregar_participante_residente_actividad",
      {
        p_actividad_id:
          actividadId,

        p_residente_id:
          residenteId,

        p_nombre:
          nombre
      }
    );

  if(error){

    await mostrarAlerta({

      titulo:"Error",

      mensaje:
        error.message

    });

    return;

  }

  await mostrarAlerta({

    titulo:"SIGVIC",

    mensaje:
      data.mensaje

  });

  document.getElementById(
    "nombreParticipante"
  ).value = "";

  await cargar();

}
      
async function agregarInvitado(){

  const nombre =
    document.getElementById(
      "nombreInvitado"
    ).value.trim();

  if(!nombre){

    await mostrarAlerta({

      titulo:"SIGVIC",

      mensaje:
        "Capture el nombre del invitado."

    });

    return;

  }

  const { data, error } =
    await supabaseClient.rpc(
      "agregar_invitado_actividad",
      {
       
  p_actividad_id:
    actividadId,

  p_residente_id:
    residenteId,

  p_nombre:
    nombre
}
    );

  if(error){

    await mostrarAlerta({

      titulo:"Error",

      mensaje:
        error.message

    });

    return;

  }

  await mostrarAlerta({

    titulo:"SIGVIC",

    mensaje:
      data.mensaje

  });

  document.getElementById(
    "nombreInvitado"
  ).value = "";

  
await cargar();

}

async function eliminarParticipante(
  id
){

  const { data, error } =
    await supabaseClient.rpc(
  "cancelar_participante_residente_actividad",
      {
      p_participante_id:id
      }
    );

  if(error){

    await mostrarAlerta({

      titulo:"Error",

      mensaje:error.message

    });

    return;

  }

  await mostrarAlerta({

    titulo:"SIGVIC",

    mensaje:data.mensaje

  });

  await cargar();

}
      
async function cancelarInvitado(
  invitadoId
){

  const { data, error } =
    await supabaseClient.rpc(
      "cancelar_invitado_actividad",
      {
        p_invitado_id:
          invitadoId
      }
    );

  if(error){

    await mostrarAlerta({

      titulo:"Error",

      mensaje:
        error.message

    });

    return;

  }

  await mostrarAlerta({

    titulo:"SIGVIC",

    mensaje:
      data.mensaje

  });

  await cargar();

}  

   window.addEventListener(
  "DOMContentLoaded",
  async ()=>{

    console.log("PASO 1");

    await protegerPagina([
      "residente"
    ]);

    console.log("PASO 2");

    const ok =
      await cargarResidente();

    console.log(
      "PASO 3",
      ok,
      residenteId
    );

    if(!ok){
      return;
    }

    await cargar();

    console.log("PASO 4");

  }
);

      

</script>

</body>
</html>

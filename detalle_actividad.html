<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Invitados Reservación</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="auth.js"></script>
<script src="utils/residente.js"></script>
<script src="modal.js"></script>

    <link rel="stylesheet" href="styles/detalle_actividad.css">
</head>

<body>

<div class="container">

<h1>
👥 Invitados
</h1>

<div
  id="detalle"
  class="card"
>
Cargando...
</div>

<div class="card">

  <input
    id="nombreInvitado"
    placeholder="Nombre del invitado"
  >

  <br><br>

  <button
    onclick="agregarInvitado()"
  >

    Agregar invitado

  </button>

</div>

<div id="lista"></div>

</div>

<script>

const params =
  new URLSearchParams(
    window.location.search
  );

const actividadId =
  params.get(
    "actividad_id"
  );

let residenteId = null;

let detalle = [];


async function cargarResidente(){

  const residente =
    await getResidente();

  if(!residente){

    alert(
      "Error de sesión"
    );

    return false;

  }

  residenteId =
    residente.id;

  return true;

}      
      
function renderizar(){

  console.log(
    "ENTRO A RENDERIZAR"
  );

  console.log(
    detalle
  );    

  if(
    detalle.length === 0
  ){
    return;
  }

const r =
  detalle[0];

console.log(
  "REGISTRO",
  r
);      

document.getElementById(
  "detalle"
).innerHTML = `

  <b>🏟 Amenidad:</b>
  ${r.amenidad}

  <br><br>

  <b>💃 Actividad:</b>
  ${r.actividad}

  <br><br>

  <b>🏷 Tipo:</b>
  ${r.tipo}

  <br><br>

  <b>📅 Inicio:</b>
  ${r.fecha_inicio}

  <br>

  <b>📅 Fin:</b>
  ${r.fecha_fin}

`;
      
  const lista =
    document.getElementById(
      "lista"
    );

  let html = "";

  detalle.forEach(i => {

    if(
      !i.invitado_id
    ){
      return;
    }

html += `

  <div class="card">

    <b>
      ${i.invitado}
    </b>

    <br><br>

    Estado:
    ${i.estatus_invitado}

    <br><br>

    ${
      i.estatus_invitado !== 'cancelado'
      ? `
        <button
          onclick="cancelarInvitado('${i.invitado_id}')"
        >
          Cancelar invitado
        </button>
      `
      : ''
    }

  </div>

`;
        
  });

console.log(
  "HTML GENERADO",
  html
);
      
  lista.innerHTML = html;

}    

async function cargar(){

  console.log(
    "Actividad:",
    actividadId
  );

  console.log(
    "Residente:",
    residenteId
  );

  const { data, error } =
    await supabaseClient.rpc(
      "obtener_detalle_actividad_completo",
      {
        p_actividad_id:
          actividadId,

        p_residente_id:
          residenteId
      }
    );

  console.table(data);

  console.log(
    "ERROR",
    error
  );

  if(error){

    console.error(error);

    return;

  }

  detalle =
    data || [];

  renderizar();

}   

async function agregarInvitado(){

  const nombre =
    document.getElementById(
      "nombreInvitado"
    ).value.trim();

  if(!nombre){

    await mostrarAlerta({

      titulo:"SIGVIC",

      mensaje:
        "Capture el nombre del invitado."

    });

    return;

  }

  const { data, error } =
    await supabaseClient.rpc(
      "agregar_invitado_actividad",
      {
       
  p_actividad_id:
    actividadId,

  p_residente_id:
    residenteId,

  p_nombre:
    nombre
}
    );

  if(error){

    await mostrarAlerta({

      titulo:"Error",

      mensaje:
        error.message

    });

    return;

  }

  await mostrarAlerta({

    titulo:"SIGVIC",

    mensaje:
      data.mensaje

  });

  document.getElementById(
    "nombreInvitado"
  ).value = "";

  
await cargar();

}

async function cancelarInvitado(
  invitadoId
){

  const { data, error } =
    await supabaseClient.rpc(
      "cancelar_invitado_actividad",
      {
        p_invitado_id:
          invitadoId
      }
    );

  if(error){

    await mostrarAlerta({

      titulo:"Error",

      mensaje:
        error.message

    });

    return;

  }

  await mostrarAlerta({

    titulo:"SIGVIC",

    mensaje:
      data.mensaje

  });

  await cargar();

}  

   window.addEventListener(
  "DOMContentLoaded",
  async ()=>{

    console.log("PASO 1");

    await protegerPagina([
      "residente"
    ]);

    console.log("PASO 2");

    const ok =
      await cargarResidente();

    console.log(
      "PASO 3",
      ok,
      residenteId
    );

    if(!ok){
      return;
    }

    await cargar();

    console.log("PASO 4");

  }
);

      

</script>

</body>
</html>

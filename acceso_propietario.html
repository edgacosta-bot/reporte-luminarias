<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso Propietario</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  color: white;
  text-align: center;
}

.ok { background: #16a34a; }
.warn { background: #f59e0b; }
.error { background: #dc2626; }

.container {
  max-width: 320px;
  width: 90%;
}

input, button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  box-sizing: border-box;
}

#btnSalir {
  display: none;
  background: #1f2937;
  color: white;
}

#errorMsg {
  display: none;
  color: #fecaca;
  font-size: 14px;
  margin-top: 8px;
}
</style>
</head>

<body>

<div class="container">
  <h1 id="estado">Validando...</h1>
  <div id="nombre"></div>

  <input type="password" id="pin" placeholder="PIN">
  <button id="btnConfirmar" onclick="confirmar()">Confirmar</button>

  <div id="errorMsg">PIN incorrecto</div>

  <button id="btnSalir" onclick="salir()">Salir</button>
</div>

<script>

const PIN = "7482";

const client = supabase.createClient(
  "https://prjxmfhahnzosdwljode.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs"
);

const qr = new URLSearchParams(window.location.search).get("qr");

let acceso = null;
let tipo = "";
let puedeConfirmar = false;

init();

async function init() {

  const { data } = await client
    .from("accesos_propietarios")
    .select("*")
    .eq("identificador", qr)
    .maybeSingle();

  if (!data) {
    pintar("QR INVÁLIDO", "error");
    return;
  }

  acceso = data;

  const { data: residente } = await client
    .from("residentes")
    .select("estado_pago")
    .eq("id", acceso.residente_id)
    .single();

  const estado = (residente?.estado_pago || "").toLowerCase();

  if (estado === "moroso") {
    pintar("ACCESO DENEGADO POR ADEUDO", "error");
    puedeConfirmar = false;
    return;
  }

  document.getElementById("nombre").innerText = acceso.nombre;

  const { data: movimiento } = await client
    .from("accesos_registro_propietarios")
    .select("*")
    .eq("acceso_id", acceso.id)
    .is("fecha_hora_salida", null)
    .maybeSingle();

  if (!movimiento) {
    tipo = "entrada";
    puedeConfirmar = true;

    if (estado === "atraso_1") {
      pintar("ACCESO CON ALERTA", "warn");
    } else {
      pintar("PERMITIR ACCESO", "ok");
    }

  } else {
    tipo = "salida";
    puedeConfirmar = true;
    pintar("REGISTRAR SALIDA", "warn");
  }
}

function pintar(texto, color) {
  document.body.className = color;
  document.getElementById("estado").innerText = texto;

  const mostrar = (color === "ok" || color === "warn");

  document.getElementById("pin").style.display = mostrar ? "block" : "none";
  document.getElementById("btnConfirmar").style.display = mostrar ? "block" : "none";

  document.getElementById("errorMsg").style.display = "none";
}

async function confirmar() {

  if (!puedeConfirmar) return;

  const pin = document.getElementById("pin").value;

  if (pin !== PIN) {
    document.getElementById("errorMsg").style.display = "block";
    document.getElementById("pin").value = "";
    return;
  }

  const ahora = new Date().toISOString();

  if (tipo === "entrada") {

    await client.from("accesos_registro_propietarios").insert([{
      acceso_id: acceso.id,
      fecha_hora_entrada: ahora,
      estatus: "dentro"
    }]);

    pintarFinal("ENTRADA REGISTRADA", "ok");

  } else {

    await client.from("accesos_registro_propietarios")
      .update({
        fecha_hora_salida: ahora,
        estatus: "fuera"
      })
      .eq("acceso_id", acceso.id)
      .is("fecha_hora_salida", null);

    pintarFinal("SALIDA REGISTRADA", "warn");
  }
}

function pintarFinal(texto, color) {
  document.body.className = color;
  document.getElementById("estado").innerText = texto;

  document.getElementById("pin").style.display = "none";
  document.getElementById("btnConfirmar").style.display = "none";

  document.getElementById("btnSalir").style.display = "block";
}

function salir() {
  window.location.href = "index.html";
}

</script>

</body>
</html>

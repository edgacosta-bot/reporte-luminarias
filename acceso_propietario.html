<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Acceso Propietario</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

.ok { background: #1e5b4f; }
.warn { background: #a57f2c; }
.error { background: #9b2247; }

button {
  padding: 12px;
  width: 100%;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
}
</style>

</head>

<body>

<div>

<h1 id="estado">Validando...</h1>
<div id="nombre"></div>

<input type="password" id="pin" placeholder="PIN">
<button onclick="confirmar()">Confirmar</button>

</div>

<script>

const PIN = "7482";

const client = supabase.createClient("URL","KEY");

const qr = new URLSearchParams(window.location.search).get("qr");

let registro = null;
let residente = null;
let tipo = "";

init();

async function init() {

  const { data } = await client
    .from("propietarios_qr")
    .select("*")
    .eq("qr_codigo", qr)
    .maybeSingle();

  if (!data) {
    pintar("QR INVÁLIDO", "error");
    return;
  }

  registro = data;

  const { data: res } = await client
    .from("residentes")
    .select("*")
    .eq("id", data.residente_id)
    .single();

  residente = res;

  document.getElementById("nombre").innerText = data.nombre;

  if (res.estado_pago === "moroso") {
    pintar("ACCESO DENEGADO", "error");
    return;
  }

  if (res.estado_pago === "atraso_1") {
    tipo = "warn";
    pintar("ACCESO CON ADVERTENCIA", "warn");
  } else {
    tipo = "ok";
    pintar("PERMITIR ACCESO", "ok");
  }
}

function pintar(texto, color) {
  document.body.className = color;
  document.getElementById("estado").innerText = texto;
}

async function confirmar() {

  const pin = document.getElementById("pin").value;

  if (pin !== PIN) {
    alert("PIN incorrecto");
    return;
  }

  alert("Acceso registrado");
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Validación acceso propietario</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/utils/dates.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Segoe UI';
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  color: white;
  text-align: center;
  background: linear-gradient(135deg,#020617,#0f172a);
}

.header-app { margin-bottom: 10px; }

.logo-app {
  width: 70px;
  height: 70px;
  opacity: 0.95;
}

.container {
  max-width: 320px;
  width: 100%;
  padding: 20px;
}

.ok { background: #16a34a; }
.warn { background: #f59e0b; }
.error { background: #dc2626; }

input {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #334155;
  font-size: 18px;
  text-align: center;
  background: #020617;
  color: white;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="header-app">
  <img src="/icono-512.png" class="logo-app">
</div>

<div class="container">
  <h1 id="estado">Validando...</h1>
  <div id="detalle"></div>

  <button id="btnAccion" style="display:none;">Continuar</button>

  <div id="control" style="display:none;">
    <input type="password" id="pin" placeholder="Ingrese PIN">
    <button id="btnRegistrar">Registrar</button>
  </div>
</div>

<script>

// 🔥 CLIENTE PÚBLICO (SOLO PARA QR)
const client = window.supabase.createClient(
  'https://prjxmfhahnzosdwljode.supabase.co',
  'TU_ANON_KEY_AQUI'
);

// 🔹 PARAMETRO QR (ROBUSTO)
const params = new URLSearchParams(window.location.search);
const qr =
  params.get("qr") ||
  params.get("id") ||
  params.get("token") ||
  params.get("v");

console.log("QR recibido:", qr);

let PIN_CORRECTO = null;

let acceso = null;
let residente = null;
let accionActual = null;
let colorActual = "";

cargarConfiguracion();

// 🔹 CONFIG
async function cargarConfiguracion() {
  const { data, error } = await client
    .from("seguridad_config")
    .select("pin_acceso")
    .limit(1)
    .maybeSingle();

  if (error) {
    console.error("Error config:", error);
  }

  if (data) {
    PIN_CORRECTO = data.pin_acceso;
  }

  validar();
}

// 🔹 VALIDAR
async function validar() {

  try {

    if (!qr) {
      pintar("QR inválido", "error");
      return;
    }

    const { data, error } = await client
      .from("accesos_propietarios")
      .select("*")
      .eq("identificador", qr)
      .maybeSingle();

    console.log("DATA acceso:", data);
    console.log("ERROR acceso:", error);

    if (error) {
      console.error(error);
      pintar("Error de consulta", "error");
      return;
    }

    if (!data) {
      pintar("QR inválido", "error");
      return;
    }

    acceso = data;

    const { data: res, error: errRes } = await client
      .from("residentes")
      .select("*")
      .eq("id", acceso.residente_id)
      .maybeSingle();

    if (errRes || !res) {
      console.error("Error residente:", errRes);
      pintar("Error de residente", "error");
      return;
    }

    residente = res;

    const { data: movimientos } = await client
      .from("accesos_registro_propietarios")
      .select("*")
      .eq("acceso_id", acceso.id)
      .order("fecha_hora_entrada", { ascending: false })
      .limit(1);

    const ultimo = movimientos?.[0];

    accionActual = (ultimo && ultimo.estatus === "dentro") ? "salida" : "entrada";

    pintar("VALIDADO", "ok", residente);

    document.getElementById("btnAccion").style.display = "block";

  } catch (e) {
    console.error("ERROR VALIDAR:", e);
    pintar("ERROR DE SISTEMA", "error");
  }
}

// 🔹 ACCIÓN
document.getElementById("btnAccion").onclick = () => {
  document.getElementById("control").style.display = "block";
};

// 🔹 REGISTRAR
document.getElementById("btnRegistrar").onclick = async () => {

  const pin = document.getElementById("pin").value;

  if (!PIN_CORRECTO) {
    alert("Error de configuración");
    return;
  }

  if (pin !== PIN_CORRECTO) {
    alert("PIN incorrecto");
    return;
  }

  const { data, error } = await client.rpc('registrar_acceso_propietario', {
    p_qr: qr,
    p_pin: pin
  });

  console.log("RPC respuesta:", data, error);

  if (error || !data?.ok) {
    alert(data?.mensaje || "Error");
    return;
  }

  mostrarResultado(
    data.accion === "salida"
      ? "SALIDA REGISTRADA"
      : "ENTRADA REGISTRADA"
  );
};

// 🔹 RESULTADO
function mostrarResultado(texto) {
  document.getElementById("estado").innerText = texto;
  document.body.className = colorActual;
}

// 🔹 UI
function pintar(mensaje, tipo, data = null) {

  document.body.className = tipo;
  document.getElementById("estado").innerText = mensaje;

  const detalle = document.getElementById("detalle");

  if (data) {
    detalle.innerHTML = `
      <p><b>PROPIETARIO</b></p>
      <p><b>${(acceso && acceso.nombre) || "SIN NOMBRE"}</b></p>
      <p>${data.privada}-${data.casa}</p>
    `;
  } else {
    detalle.innerHTML = "";
  }
}

</script>

</body>
</html>

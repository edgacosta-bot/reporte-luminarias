<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Validación acceso propietario</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/utils/ui.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI';
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  color: white;
  text-align: center;
  background: #020617;
}

.container {
  max-width: 320px;
  width: 90%;
}

.ok { background: #16a34a; }
.warn { background: #f59e0b; }
.error { background: #dc2626; }

input, button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
}

button {
  background: #2563eb;
  color: white;
  font-weight: bold;
}
</style>

</head>

<body>

<div class="container">

  <h1 id="estado">Validar acceso</h1>
  <div id="detalle"></div>

  <input type="password" id="pin" placeholder="Ingrese PIN">
  <button id="btnConfirmar">Confirmar</button>

</div>

<script>

const client = supabase.createClient(
  "https://prjxmfhahnzosdwljode.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs"
);

const qr = new URLSearchParams(window.location.search).get("qr");

let acceso = null;
let residente = null;
let accesoAbierto = null;

// 🔹 INICIO
init();

async function init(){

  if(!qr){
    pintar("QR inválido","error");
    return;
  }

  const { data } = await client
    .from("accesos_propietarios")
    .select("*")
    .eq("identificador", qr)
    .maybeSingle();

  if(!data){
    pintar("QR inválido","error");
    return;
  }

  acceso = data;

  const { data: res } = await client
    .from("residentes")
    .select("id, privada, casa, estado_pago")
    .eq("id", acceso.residente_id)
    .single();

  residente = res;

  document.getElementById("detalle").innerHTML = `
    <p><b>PROPIETARIO</b></p>
    <p>${acceso.nombre || ""}</p>
    <p>${residente.privada}-${residente.casa}</p>
  `;

  // 🔍 detectar acceso abierto
 const { data: abiertos } = await client
  .from("accesos_registro_propietarios")
  .select("*")
  .eq("acceso_id", acceso.id)
  .is("fecha_hora_salida", null)
  .order("fecha_hora_entrada", { ascending: false })
  .limit(1);

  accesoAbierto = abiertos && abiertos.length ? abiertos[0] : null;

  if(accesoAbierto){
    document.getElementById("estado").innerText = "Registrar salida";
  }

}

// 🔹 CONFIRMAR
document.getElementById("btnConfirmar").onclick = async () => {

  const pin = document.getElementById("pin").value.trim();

  if(!pin){
    ui.warn("Ingresa PIN");
    return;
  }

  // 🔐 VALIDACIÓN CORRECTA (ALINEADA A TU SISTEMA)
  const { data: vigilante } = await client
    .from("residentes")
    .select("*")
    .eq("pin_vigilante", pin)
    .eq("tipo", "vigilante")
    .eq("activo", true)
    .maybeSingle();

  if(!vigilante){
    ui.error("PIN incorrecto");
    return;
  }

  const ahora = new Date().toISOString();

  // 🔴 SALIDA
  if(accesoAbierto){

    await client
      .from("accesos_registro_propietarios")
      .update({
        fecha_hora_salida: ahora,
        estatus: "fuera",
        vigilante_salida_id: vigilante.id
      })
      .eq("id", accesoAbierto.id);

    pintar("SALIDA REGISTRADA","warn");
    return;
  }

  // 🔥 ENTRADA → evaluar estado_pago
  const estado = (residente.estado_pago || "").toLowerCase();

  let color = "ok";
  let mensaje = "";

  if(estado === "moroso"){
    color = "error";

    mensaje = `
      ⚠️ Aviso importante<br><br>
      El residente presenta adeudo.<br><br>
      El vigilante no puede realizar la apertura.<br><br>
      El residente debe abrir directamente.
    `;
  }

  else if(estado === "atraso_1"){
    color = "warn";

    mensaje = `
      ⚠️ Aviso<br><br>
      El residente presenta atraso.<br><br>
      Se permite el acceso, recordarle regularizar.
    `;
  }

  // 🔥 REGISTRAR ENTRADA
  await client
    .from("accesos_registro_propietarios")
    .insert([{
      acceso_id: acceso.id,
      fecha_hora_entrada: ahora,
      estatus: "dentro",
      vigilante_id: vigilante.id
    }]);

  pintarFinal("ACCESO REGISTRADO", color, mensaje);

};

// 🔹 UI
function pintar(texto,color){
  document.body.className = color;
  document.getElementById("estado").innerText = texto;
}

function pintarFinal(texto,color,mensaje){
  document.body.className = color;
  document.getElementById("estado").innerText = texto;

  document.getElementById("detalle").innerHTML += `<div style="margin-top:10px">${mensaje}</div>`;

  document.getElementById("pin").style.display = "none";
  document.getElementById("btnConfirmar").style.display = "none";
}

</script>

</body>
</html>

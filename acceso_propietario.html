<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Validación acceso propietario</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/utils/ui.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI';
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  color: white;
  text-align: center;
  background: #020617;
}

.container {
  max-width: 320px;
  width: 90%;
}

.ok { background: #16a34a; }
.warn { background: #f59e0b; }
.error { background: #dc2626; }

input, button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
}

button {
  background: #2563eb;
  color: white;
  font-weight: bold;
}
</style>

</head>

<body>

<div class="container">

  <h1 id="estado">Validar acceso</h1>
  <div id="detalle"></div>

  <input type="password" id="pin" placeholder="Ingrese PIN">
  <button id="btnValidar">Validar</button>

  <button id="btnRegistrar" style="display:none;">Registrar</button>

</div>

<script>

const client = supabase.createClient(
  "https://prjxmfhahnzosdwljode.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs"
);

const qr = new URLSearchParams(window.location.search).get("qr");

let acceso = null;
let residente = null;
let accesoAbierto = null;
let vigilante = null;
let tipoOperacion = "";
let mensajeEstado = "";

init();

async function init(){

  if(!qr){
    pintar("QR inválido","error");
    return;
  }

  const { data } = await client
    .from("accesos_propietarios")
    .select("*")
    .eq("identificador", qr)
    .maybeSingle();

  if(!data){
    pintar("QR inválido","error");
    return;
  }

  acceso = data;

  const { data: res } = await client
    .from("residentes")
    .select("id, privada, casa, estado_pago")
    .eq("id", acceso.residente_id)
    .single();

  residente = res;

  renderDetalle();

  const { data: abiertos } = await client
    .from("accesos_registro_propietarios")
    .select("*")
    .eq("acceso_id", acceso.id)
    .is("fecha_hora_salida", null)
    .order("fecha_hora_entrada", { ascending: false })
    .limit(1);

  accesoAbierto = abiertos && abiertos.length ? abiertos[0] : null;

  if(accesoAbierto){
    tipoOperacion = "salida";
    document.getElementById("estado").innerText = "Registrar salida";
  } else {
    tipoOperacion = "entrada";
  }

}

// 🔹 VALIDAR PIN
document.getElementById("btnValidar").onclick = async () => {

  const pin = document.getElementById("pin").value.trim();

  if(!pin){
    ui.warn("Ingresa PIN");
    return;
  }

  const { data } = await client
    .from("residentes")
    .select("*")
    .eq("pin_vigilante", pin)
    .eq("tipo", "vigilante")
    .eq("activo", true)
    .maybeSingle();

  if(!data){
    ui.error("PIN incorrecto");
    return;
  }

  vigilante = data;

  // 🔹 SALIDA
  if(tipoOperacion === "salida"){

    document.getElementById("estado").innerText = "Confirmar salida";

    ocultarValidacion();
    document.getElementById("btnRegistrar").style.display = "block";

    return;
  }

  // 🔹 ENTRADA → evaluar estado
  const estado = (residente.estado_pago || "").toLowerCase();

  let color = "ok";
  mensajeEstado = "";

  if(estado === "moroso"){
    color = "error";
    mensajeEstado = `
      ⚠️ Aviso importante<br><br>
      Residente moroso.<br><br>
      El vigilante no debe abrir la puerta.<br>
      El residente debe hacerlo directamente y se le invita a regularizar su situación para evitar problemas en el acceso.
    `;
  }
  else if(estado === "atraso_1"){
    color = "warn";
    mensajeEstado = `
      ⚠️ Aviso<br><br>
      Residente con atraso.<br>
      Se permite el acceso y se invita a que pase a regularizar su situación para evitar problemas en el acceso.
    `;
  }

  document.body.className = color;
  document.getElementById("estado").innerText = "Registrar acceso";

  if(mensajeEstado){
    document.getElementById("detalle").innerHTML += `<div style="margin-top:10px">${mensajeEstado}</div>`;
  }

  ocultarValidacion();
  document.getElementById("btnRegistrar").style.display = "block";

};

// 🔹 REGISTRAR
document.getElementById("btnRegistrar").onclick = async () => {

  const ahora = new Date().toISOString();

  if(tipoOperacion === "salida"){

    await client
      .from("accesos_registro_propietarios")
      .update({
        fecha_hora_salida: ahora,
        estatus: "fuera",
        vigilante_salida_id: vigilante.id
      })
      .eq("id", accesoAbierto.id);

    pintar("SALIDA REGISTRADA","warn");
    return;
  }

  if(tipoOperacion === "entrada"){

    await client
      .from("accesos_registro_propietarios")
      .insert([{
        acceso_id: acceso.id,
        fecha_hora_entrada: ahora,
        estatus: "dentro",
        vigilante_id: vigilante.id
      }]);

    pintar("ACCESO REGISTRADO","ok");
  }

};

// 🔹 UI LIMPIA FINAL
function pintar(texto,color){

  document.body.className = color;
  document.getElementById("estado").innerText = texto;

  // 🔥 LIMPIA MENSAJES (CLAVE)
  renderDetalle();

  document.getElementById("btnRegistrar").style.display = "none";
}

// 🔹 UTIL
function renderDetalle(){
  document.getElementById("detalle").innerHTML = `
    <p><b>PROPIETARIO</b></p>
    <p>${acceso.nombre}</p>
    <p>${residente.privada}-${residente.casa}</p>
  `;
}

function ocultarValidacion(){
  document.getElementById("pin").style.display = "none";
  document.getElementById("btnValidar").style.display = "none";
}

</script>

</body>
</html>

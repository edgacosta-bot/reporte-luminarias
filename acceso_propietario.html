<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Validación acceso propietario</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/utils/ui.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Segoe UI';
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  color: white;
  text-align: center;
  background: linear-gradient(135deg,#020617,#0f172a);
}

.header-app { margin-bottom: 10px; }

.logo-app {
  width: 70px;
  height: 70px;
  opacity: 0.95;
}

.container {
  max-width: 320px;
  width: 100%;
  padding: 20px;
}

.ok { background: #16a34a; }
.warn { background: #f59e0b; }
.error { background: #dc2626; }

input {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #334155;
  font-size: 18px;
  text-align: center;
  background: #020617;
  color: white;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="header-app">
  <img src="/icono-512.png" class="logo-app">
</div>

<div class="container">
  <h1 id="estado">Validando...</h1>
  <div id="detalle"></div>

  <button id="btnAccion" style="display:none;">Continuar</button>

  <div id="control" style="display:none;">
    <input type="password" id="pin" placeholder="Ingrese PIN">
    <button id="btnRegistrar">Registrar</button>
  </div>
</div>

<script>

const client = window.supabase.createClient(
  'https://prjxmfhahnzosdwljode.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs'
);

// 🔹 QR limpio
let qr = new URLSearchParams(window.location.search).get("qr");

if (qr) {
  qr = qr.trim().toLowerCase();
  qr = qr.match(/[0-9a-f-]{36}/)?.[0];
}

let acceso = null;
let residente = null;
let accionActual = null;
let colorActual = "";

// 🔹 VALIDAR
async function validar() {

  try {

    if (!qr) {
      ui.error("QR inválido");
      return pintar("QR inválido", "error");
    }

    const { data, error } = await client
      .from("accesos_propietarios")
      .select("*")
      .eq("identificador", qr)
      .single();

    if (error || !data) {
      ui.error("No se encontró el acceso");
      return pintar("QR inválido", "error");
    }

    acceso = data;

    const { data: res } = await client
      .from("residentes")
      .select("*")
      .eq("id", acceso.residente_id)
      .single();

    residente = res;

    const estado = (residente.estado_pago || "").toLowerCase();
    let mensajeExtra = "";

    // 🔥 PRIORIDAD POR ESTADO DE PAGO
    if (estado === "moroso") {
      colorActual = "error";

      mensajeExtra = `
        <p style="margin-top:10px;">
          ⚠️ Aviso importante<br><br>
          El residente presenta adeudo.<br><br>
          Por políticas del fraccionamiento, el personal de vigilancia no puede realizar la apertura.<br><br>
          Se solicita amablemente que el acceso sea realizado directamente por el residente.
        </p>
      `;
    } 
    else if (estado === "atraso_1") {
      colorActual = "warn";

      mensajeExtra = `
        <p style="margin-top:10px;">
          ⚠️ Aviso<br><br>
          El residente presenta un atraso en su pago.<br><br>
          Se permite el acceso.<br>
          Favor de recordarle que puede regularizar su situación en administración.
        </p>
      `;
    }

    // 🔥 LÓGICA ENTRADA / SALIDA
    const { data: abiertos } = await client
      .from("accesos_registro_propietarios")
      .select("id")
      .eq("acceso_id", acceso.id)
      .is("fecha_hora_salida", null)
      .limit(1);

    const abierto = abiertos?.[0];

    accionActual = abierto ? "salida" : "entrada";

    // 🔥 SOLO SI NO ES MOROSO NI ATRASO
    if (!colorActual) {
      colorActual = abierto ? "warn" : "ok";
    }

    pintar(
      abierto ? "REGISTRAR SALIDA" : "REGISTRAR ENTRADA",
      colorActual,
      residente,
      mensajeExtra
    );

    document.getElementById("btnAccion").style.display = "block";

  } catch (err) {
    console.error(err);
    ui.error("Error en validación");
    pintar("Error en validación", "error");
  }
}

validar();

// 🔹 MOSTRAR PIN
document.getElementById("btnAccion").onclick = () => {
  document.getElementById("control").style.display = "block";
};

// 🔹 REGISTRAR
document.getElementById("btnRegistrar").onclick = async () => {

  const btn = document.getElementById("btnRegistrar");
  btn.disabled = true;
  btn.innerText = "Procesando...";

  try {

    const pin = document.getElementById("pin").value.trim();

    if (!pin) {
      ui.warn("Ingresa el PIN");
      resetBtn(btn);
      return;
    }

    const { data, error } = await client.rpc('registrar_acceso_propietario', {
      p_qr: qr,
      p_pin: pin
    });

    if (error) {
      ui.error("Error técnico: " + error.message);
      resetBtn(btn);
      return;
    }

    if (!data?.ok) {
      ui.warn(data?.mensaje || "Operación no válida");
      resetBtn(btn);
      return;
    }

    if (data.accion === "salida") {
      ui.success("Salida registrada");
      mostrarResultado("SALIDA REGISTRADA", "warn");
    } else {
      ui.success("Acceso autorizado");
      mostrarResultado("ACCESO AUTORIZADO", "ok");
    }

    resetBtn(btn);

  } catch (err) {
    console.error(err);
    ui.error("Error inesperado");
    resetBtn(btn);
  }
};

// 🔹 RESET
function resetBtn(btn) {
  btn.disabled = false;
  btn.innerText = "Registrar";
}

// 🔹 RESULTADO
function mostrarResultado(texto, tipo) {
  document.body.className = tipo;
  document.getElementById("estado").innerText = texto;
  document.getElementById("detalle").innerHTML = "";
  document.getElementById("btnAccion").style.display = "none";
  document.getElementById("control").style.display = "none";
}

// 🔹 UI
function pintar(mensaje, tipo, data = null, extra = "") {

  document.body.className = tipo;
  document.getElementById("estado").innerText = mensaje;

  const detalle = document.getElementById("detalle");

  if (data) {
    detalle.innerHTML = `
      <p><b>PROPIETARIO</b></p>
      <p><b>${acceso?.nombre || "SIN NOMBRE"}</b></p>
      <p>${data?.privada || ""}-${data?.casa || ""}</p>
      ${extra}
    `;
  } else {
    detalle.innerHTML = "";
  }
}

</script>

</body>
</html>

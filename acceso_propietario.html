<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Validación acceso propietario</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  color: white;
  text-align: center;
}

.container {
  max-width: 320px;
  width: 100%;
}

.ok { background: #16a34a; }
.warn { background: #f59e0b; }
.error { background: #dc2626; }

input {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  font-size: 18px;
  text-align: center;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
  <h1 id="estado">Validando...</h1>
  <div id="detalle"></div>

  <div id="control" style="display:none;">
    <input type="password" id="pin" placeholder="PIN">
    <button id="btn">Registrar</button>
  </div>
</div>

<script>
const PIN_CORRECTO = "7482";

const client = window.supabase.createClient(
  'https://prjxmfhahnzosdwljode.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs'
);

const params = new URLSearchParams(window.location.search);
const qr = params.get("qr");

let acceso = null;
let residente = null;

validar();

async function validar() {

  const { data } = await client
    .from("accesos_propietarios")
    .select("*")
    .eq("identificador", qr)
    .single();

  if (!data) {
    pintar("QR inválido", "error");
    return;
  }

  acceso = data;

  const { data: res } = await client
    .from("residentes")
    .select("*")
    .eq("id", acceso.residente_id)
    .single();

  residente = res;

  const estado = (residente.estado_pago || "").toLowerCase();

  if (estado === "moroso") {
    pintar("ACCESO DENEGADO", "error", residente,
      "No es posible el acceso debido a la morosidad en sus pagos.");
    return;
  }

  if (estado === "atraso_1") {
    pintar("ACCESO CON ADVERTENCIA", "warn", residente,
      "Se permite el acceso, pero se invita a regularizar su situación.");
  } else {
    pintar("ACCESO PERMITIDO", "ok", residente);
  }

  document.getElementById("control").style.display = "block";
}

document.getElementById("btn").addEventListener("click", async () => {

  const pin = document.getElementById("pin").value;
  if (pin !== PIN_CORRECTO) return;

  const ahora = new Date().toISOString();

  // 🔥 OBTENER ÚLTIMO MOVIMIENTO
  const { data: movimientos } = await client
    .from("accesos_registro_propietarios")
    .select("*")
    .eq("acceso_id", acceso.id)
    .order("fecha_hora_entrada", { ascending: false })
    .limit(1);

  const movimiento = movimientos && movimientos.length > 0 ? movimientos[0] : null;

  console.log("último movimiento:", movimiento);

  if (movimiento && movimiento.fecha_hora_salida === null) {

    await client
      .from("accesos_registro_propietarios")
      .update({
        fecha_hora_salida: ahora,
        estatus: "fuera"
      })
      .eq("id", movimiento.id);

    pintar("SALIDA REGISTRADA", "ok", residente);

  } else {

    await client
      .from("accesos_registro_propietarios")
      .insert([{
        acceso_id: acceso.id,
        fecha_hora_entrada: ahora,
        estatus: "dentro"
      }]);

    pintar("ENTRADA REGISTRADA", "ok", residente);
  }

  document.getElementById("control").style.display = "none";

  setTimeout(() => {
    location.reload();
  }, 1200);
});

function pintar(mensaje, tipo, data = null, texto = "") {
  document.body.className = tipo;
  document.getElementById("estado").innerText = mensaje;

  if (data) {
    document.getElementById("detalle").innerHTML = `
      <p>${data.privada}-${data.casa}</p>
      <p>${texto || ""}</p>
    `;
  }
}
</script>

</body>
</html>

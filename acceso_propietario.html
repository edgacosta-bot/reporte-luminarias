<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Validación acceso propietario</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/utils/dates.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Segoe UI';
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  color: white;
  text-align: center;
  background: linear-gradient(135deg,#020617,#0f172a);
}

.header-app { margin-bottom: 10px; }

.logo-app {
  width: 70px;
  height: 70px;
  opacity: 0.95;
}

.container {
  max-width: 320px;
  width: 100%;
  padding: 20px;
}

.ok { background: #16a34a; }
.warn { background: #f59e0b; }
.error { background: #dc2626; }

input {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #334155;
  font-size: 18px;
  text-align: center;
  background: #020617;
  color: white;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="header-app">
  <img src="/icono-512.png" class="logo-app">
</div>

<div class="container">
  <h1 id="estado">Validando...</h1>
  <div id="detalle"></div>

  <button id="btnAccion" style="display:none;">Continuar</button>

  <div id="control" style="display:none;">
    <input type="password" id="pin" placeholder="Ingrese PIN">
    <button id="btnRegistrar">Registrar</button>
  </div>
</div>

<script>

// 🔥 CLIENTE PÚBLICO (CORRECTO PARA QR)
const client = window.supabase.createClient(
  'https://prjxmfhahnzosdwljode.supabase.co',
  'TU_ANON_KEY_AQUI'
);

let PIN_CORRECTO = null;

const params = new URLSearchParams(window.location.search);
const qr = params.get("qr");

let acceso = null;
let residente = null;
let accionActual = null;
let colorActual = "";

cargarConfiguracion();

async function cargarConfiguracion() {
  const { data } = await client
    .from("seguridad_config")
    .select("pin_acceso")
    .limit(1)
    .single();

  if (data) PIN_CORRECTO = data.pin_acceso;

  validar();
}

async function validar() {

  if (!qr) return pintar("QR inválido", "error");

  const { data } = await client
    .from("accesos_propietarios")
    .select("*")
    .eq("identificador", qr)
    .single();

  if (!data) return pintar("QR inválido", "error");

  acceso = data;

  const { data: res } = await client
    .from("residentes")
    .select("*")
    .eq("id", acceso.residente_id)
    .single();

  residente = res;

  const { data: movimientos } = await client
    .from("accesos_registro_propietarios")
    .select("*")
    .eq("acceso_id", acceso.id)
    .order("fecha_hora_entrada", { ascending: false })
    .limit(1);

  const ultimo = movimientos?.[0];

  accionActual = (ultimo && ultimo.estatus === "dentro") ? "salida" : "entrada";

  pintar("VALIDADO", "ok", residente);

  document.getElementById("btnAccion").style.display = "block";
}

document.getElementById("btnAccion").onclick = () => {
  document.getElementById("control").style.display = "block";
};

document.getElementById("btnRegistrar").onclick = async () => {

  const pin = document.getElementById("pin").value;

  if (pin !== PIN_CORRECTO) return;

  const { data } = await client.rpc('registrar_acceso_propietario', {
    p_qr: qr,
    p_pin: pin
  });

  if (!data?.ok) {
    alert("Error");
    return;
  }

  mostrarResultado(
    data.accion === "salida"
      ? "SALIDA REGISTRADA"
      : "ENTRADA REGISTRADA"
  );
};

function mostrarResultado(texto) {
  document.getElementById("estado").innerText = texto;
  document.body.className = colorActual;
}

function pintar(mensaje, tipo, data = null) {
  document.body.className = tipo;
  document.getElementById("estado").innerText = mensaje;
}

</script>

</body>
</html>

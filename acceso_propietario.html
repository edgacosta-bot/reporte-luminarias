<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Validación acceso propietario</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Segoe UI';
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  color: white;
  text-align: center;
  background: linear-gradient(135deg,#020617,#0f172a);
  transition: 0.3s;
}

.header-app { margin-bottom: 10px; }

.logo-app {
  width: 70px;
  height: 70px;
  opacity: 0.95;
}

.container {
  max-width: 320px;
  width: 100%;
  padding: 20px;
}

.ok { background: #16a34a; }
.warn { background: #f59e0b; }
.error { background: #dc2626; }

input {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #334155;
  font-size: 18px;
  text-align: center;
  background: #020617;
  color: white;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

</style>
</head>

<body>

<div class="header-app">
  <img src="/icono-512.png" class="logo-app">
</div>

<div class="container">
  <h1 id="estado">Validando...</h1>
  <div id="detalle"></div>

  <button id="btnAccion" style="display:none;">Continuar</button>

  <div id="control" style="display:none;">
    <input type="password" id="pin" placeholder="Ingrese PIN">
    
    <p style="font-size:12px;color:#9ca3af;">
      Presione una sola vez y espere confirmación
    </p>

    <button id="btnRegistrar">Registrar</button>
  </div>
</div>

<script>

// 🔥 CLIENTE
const client = window.supabase.createClient(
  'https://prjxmfhahnzosdwljode.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs'
);

// 🔹 QR LIMPIO
let qr = new URLSearchParams(window.location.search).get("qr");

if (qr) {
  qr = qr.trim().toLowerCase();
  qr = qr.match(/[0-9a-f-]{36}/)?.[0];
}

console.log("QR limpio:", qr);

// 🔹 VARIABLES
let acceso = null;
let residente = null;
let colorActual = "ok";
let bloqueado = false;

// 🔹 VALIDAR
async function validar() {

  try {

    if (!qr) return pintar("QR inválido", "error");

    const { data, error } = await client
      .from("accesos_propietarios")
      .select("*")
      .eq("identificador", qr)
      .single();

    if (error || !data) return pintar("QR inválido", "error");

    acceso = data;

    const { data: res } = await client
      .from("residentes")
      .select("*")
      .eq("id", acceso.residente_id)
      .single();

    residente = res;

    pintar("VALIDADO", "ok", residente);

    document.getElementById("btnAccion").style.display = "block";

  } catch (err) {
    console.error(err);
    pintar("Error en validación", "error");
  }
}

validar();

// 🔹 MOSTRAR PIN
document.getElementById("btnAccion").onclick = () => {
  document.getElementById("control").style.display = "block";
};

// 🔹 REGISTRAR
document.getElementById("btnRegistrar").onclick = async () => {

  if (bloqueado) return;
  bloqueado = true;

  const boton = document.getElementById("btnRegistrar");
  boton.disabled = true;

  try {

    const pin = document.getElementById("pin").value.trim();

    if (!pin) {
      alert("Ingresa el PIN");
      return;
    }

    const { data, error } = await client.rpc('registrar_acceso_propietario', {
      p_qr: qr,
      p_pin: pin
    });

    console.log("RPC RESPONSE:", { data, error });

    if (error) {
      alert("Error técnico: " + error.message);
      return;
    }

    if (!data?.ok) {
      alert(data?.mensaje || "Operación no válida");
      return;
    }

    mostrarResultado(
      data.accion === "salida"
        ? "SALIDA REGISTRADA"
        : "ENTRADA REGISTRADA"
    );

  } catch (err) {
    console.error(err);
    alert("Error inesperado");
  } finally {
    setTimeout(() => {
      bloqueado = false;
      boton.disabled = false;
    }, 2000);
  }
};

// 🔹 RESULTADO PRO
function mostrarResultado(texto) {

  document.getElementById("estado").innerText = texto;
  document.body.className = "ok";

  // 🔒 BLOQUEAR UI
  document.getElementById("btnRegistrar").style.display = "none";
  document.getElementById("btnAccion").style.display = "none";
  document.getElementById("control").style.display = "none";

  alert(texto);
}

// 🔹 UI
function pintar(mensaje, tipo, data = null) {

  document.body.className = tipo;
  document.getElementById("estado").innerText = mensaje;

  const detalle = document.getElementById("detalle");

  if (data) {
    detalle.innerHTML = `
      <p><b>PROPIETARIO</b></p>
      <p><b>${acceso?.nombre || "SIN NOMBRE"}</b></p>
      <p>${data?.privada || ""}-${data?.casa || ""}</p>
    `;
  } else {
    detalle.innerHTML = "";
  }
}

</script>

</body>
</html>

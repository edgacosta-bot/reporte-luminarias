<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Pase de acceso</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- QR -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: white;
    }

    .card {
      background: white;
      color: black;
      border-radius: 16px;
      padding: 20px;
      width: 320px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .header {
      background: #1e293b;
      color: white;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 15px;
      font-size: 14px;
    }

    .nombre {
      font-size: 20px;
      font-weight: bold;
      margin-top: 10px;
    }

    .info {
      margin-top: 10px;
      font-size: 14px;
      color: #475569;
    }

    #qrcode {
      margin-top: 20px;
    }

    .error {
      color: red;
    }
  </style>
</head>

<body>

<div class="card">
  <div class="header">Villas de la Concepción</div>

  <div class="nombre" id="nombre">Cargando...</div>
  <div class="info" id="info"></div>

  <div id="qrcode"></div>
</div>

<script>
// 🔗 Conexión Supabase
const client = window.supabase.createClient(
  'https://prjxmfhahnzosdwljode.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs'
);

// 🔍 Obtener parámetro QR
const params = new URLSearchParams(window.location.search);
let qr = params.get("qr");

// Validación fuerte
if (!qr || qr === "null" || qr === "undefined") {
  document.getElementById("nombre").innerText = "QR inválido";
  document.getElementById("nombre").className = "nombre error";
  throw new Error("QR inválido");
}

qr = qr.trim();

// 🚀 Ejecutar carga
cargar();

async function cargar() {

  const { data, error } = await client
    .from('visitas_qr')
    .select('*')
    .eq('codigo_qr', qr);

  if (error || !data || data.length === 0) {
    document.getElementById("nombre").innerText = "QR inválido";
    document.getElementById("nombre").className = "nombre error";
    return;
  }

  const visita = data[0];

  // 🧾 Mostrar datos
  document.getElementById("nombre").innerText = visita.nombre_visitante;

  document.getElementById("info").innerHTML = `
    📅 ${visita.fecha_visita}<br>
    🏠 ${
      visita.tipo_generador === 'administracion'
        ? 'ADMINISTRACIÓN'
        : visita.privada + '-' + visita.casa
    }
  `;

  // 🔗 Link correcto para validación
  const link = `https://reporte-luminarias-3lj5.vercel.app/validar.html?qr=${qr}`;

  console.log("LINK FINAL:", link);

  // 📦 Contenedor QR
  const qrContainer = document.getElementById("qrcode");

  // Limpiar
  qrContainer.innerHTML = "";

  // Generar QR
  new QRCode(qrContainer, {
    text: link,
    width: 220,
    height: 220,
    correctLevel: QRCode.CorrectLevel.H
  });
}
</script>

</body>
</html>

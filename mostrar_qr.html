<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Pase de acceso</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      width: 320px;
      text-align: center;
    }

    .header {
      background: #1e293b;
      color: white;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .nombre {
      font-size: 20px;
      font-weight: bold;
      margin-top: 10px;
    }

    .info {
      margin-top: 10px;
      font-size: 14px;
      color: #475569;
    }

    canvas {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="card">
  <div class="header">Villas de la Concepción</div>

  <div class="nombre" id="nombre">Cargando...</div>
  <div class="info" id="info"></div>

  <canvas id="qr"></canvas>
</div>

<script>
const client = window.supabase.createClient(
  'https://prjxmfhahnzosdwljode.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs'
);

const params = new URLSearchParams(window.location.search);
const qrParam = params.get("qr");

if (!qrParam) {
  document.getElementById("nombre").innerText = "QR inválido";
  throw new Error("QR inválido");
}

cargar();

async function cargar() {

  const { data } = await client
    .from('visitas_qr')
    .select('*')
    .eq('codigo_qr', qrParam);

  if (!data || data.length === 0) {
    document.getElementById("nombre").innerText = "QR inválido";
    return;
  }

  const visita = data[0];

  document.getElementById("nombre").innerText = visita.nombre_visitante;

  document.getElementById("info").innerHTML = `
    📅 ${visita.fecha_visita}<br>
    🏠 ${visita.privada}-${visita.casa}
  `;

  const link = `https://reporte-luminarias-3lj5.vercel.app/validar.html?qr=${qrParam}`;

  new QRious({
    element: document.getElementById('qr'),
    value: link,
    size: 220
  });
}
</script>

</body>
</html>

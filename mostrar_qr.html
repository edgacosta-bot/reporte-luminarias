<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Pase de acceso</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>

  <script src="auth.js"></script>

      <link rel="stylesheet" href="styles/mostrar_qr.css">
</head>

<body>

<div class="card">

  <div class="logo">
    <img src="/icono-512.png" alt="Logo">
  </div>

  <div class="header">
    Villas de la Concepción<br>
    Pase de visitante
  </div>

  <div class="status" id="status">Validando...</div>

  <div class="nombre" id="nombre">Cargando...</div>

  <div class="info" id="info"></div>

  <div class="qr-box">
    <canvas id="qr"></canvas>
  </div>

  <div class="footer">
    📲 Muestre este código al vigilante a su INGRESO y su SALIDA.
  </div>

</div>

<script>
const client = createSupabaseClient();

const params = new URLSearchParams(window.location.search);
const qrParam = params.get("qr");

if (!qrParam) {
  document.getElementById("nombre").innerText = "QR inválido";
  throw new Error("QR inválido");
}

cargar();

async function cargar() {

  // 🔵 estado inicial
  document.getElementById("status").innerText = "Validando...";
  document.getElementById("status").style.background = "#64748b";

  const { data, error } = await client
    .from('visitas_qr')
    .select(`
      *,
      accesos_visitas (
        id,
        fecha_hora_entrada,
        fecha_hora_salida,
        estatus
      )
    `)
    .eq('codigo_qr', qrParam);

  // ❌ ERROR SUPABASE
  if (error) {
    console.error("ERROR SUPABASE:", error);

    document.getElementById("status").innerText = "❌ ERROR";
    document.getElementById("status").style.background = "#dc2626";

    document.getElementById("nombre").innerText = "Error al validar QR";
    return;
  }

  // ❌ NO EXISTE
  if (!data || data.length === 0) {
    document.getElementById("status").innerText = "❌ ACCESO DENEGADO";
    document.getElementById("status").style.background = "#dc2626";

    document.getElementById("nombre").innerText = "QR inválido";
    return;
  }

  const visita = data[0];
  const acceso = visita.accesos_visitas?.[0] || null;

  // ✅ ACCESO VÁLIDO
  document.getElementById("status").innerText = "✔ ACCESO VÁLIDO";
  document.getElementById("status").style.background = "#16a34a";

  document.getElementById("nombre").innerText = visita.nombre_visitante;

  document.getElementById("info").innerHTML = `
    📅 ${visita.fecha_visita}<br>
    🏠 ${
      visita.tipo_generador === 'administracion'
        ? 'ADMINISTRACIÓN'
        : visita.privada + '-' + visita.casa
    }
  `;

  const link = `${window.location.origin}/validar.html?qr=${qrParam}`;

  new QRious({
    element: document.getElementById('qr'),
    value: link,
    size: 220
  });
}
</script>

</body>
</html>

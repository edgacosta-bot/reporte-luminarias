<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Pase de acceso</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      border-radius: 22px;
      padding: 20px;
      width: 320px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    /* 🔥 LOGO */
    .logo {
      text-align: center;
      margin-bottom: 10px;
    }

    .logo img {
      width: 70px;
    }

    /* HEADER */
    .header {
      background: #1e293b;
      color: white;
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
      margin-bottom: 15px;
      font-weight: bold;
      line-height: 1.4;
    }

    /* STATUS */
    .status {
      background: #16a34a;
      color: white;
      padding: 8px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 12px;
      font-weight: bold;
    }

    .nombre {
      font-size: 24px;
      font-weight: bold;
      margin-top: 5px;
      color: #0f172a;
    }

    .info {
      margin-top: 10px;
      font-size: 14px;
      color: #475569;
      line-height: 1.5;
    }

    /* 🔥 QR */
    .qr-box {
      margin-top: 18px;
      padding: 16px;
      background: #f1f5f9;
      border-radius: 16px;
      display: inline-block;
      box-shadow: inset 0 0 0 2px #e2e8f0;
    }

    canvas {
      display: block;
    }

    /* FOOTER */
    .footer {
      margin-top: 18px;
      font-size: 13px;
      color: #1e293b;
      background: #f8fafc;
      padding: 12px;
      border-radius: 10px;
      line-height: 1.4;
    }
  </style>
</head>

<body>

<div class="card">

  <!-- 🔥 LOGO -->
  <div class="logo">
    <img src="/icono-512.png" alt="Logo">
  </div>

  <div class="header">
    Villas de la Concepción<br>
    Pase de visitante
  </div>

  <div class="status" id="status">Validando...</div>

  <div class="nombre" id="nombre">Cargando...</div>

  <div class="info" id="info"></div>

  <div class="qr-box">
    <canvas id="qr"></canvas>
  </div>

  <div class="footer">
    📲 Muestre este código al vigilante para permitir el acceso
  </div>

</div>

<script>
const client = window.supabase.createClient(
  'https://prjxmfhahnzosdwljode.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs'
);

const params = new URLSearchParams(window.location.search);
const qrParam = params.get("qr");

if (!qrParam) {
  document.getElementById("nombre").innerText = "QR inválido";
  throw new Error("QR inválido");
}

cargar();

async function cargar() {

   // 👇 AQUÍ VA (PRIMERAS LÍNEAS)
  document.getElementById("status").innerText = "Validando...";
  document.getElementById("status").style.background = "#64748b";

  const { data, error } = await client
  .from('accesos_visitas')
  .select('*')
  .eq('codigo_qr', qrParam);

// 🚨 1. ERROR REAL DE SUPABASE (RLS, conexión, etc)
if (error) {
  console.error("ERROR SUPABASE:", error);

  document.querySelector(".status").innerText = "❌ ERROR";
  document.querySelector(".status").style.background = "#dc2626";

  document.getElementById("nombre").innerText = "Error al validar QR";
  return;
}

// 🚨 2. QR NO EXISTE
if (!data || data.length === 0) {
  document.querySelector(".status").innerText = "❌ ACCESO DENEGADO";
  document.querySelector(".status").style.background = "#dc2626";

  document.getElementById("nombre").innerText = "QR inválido";
  return;
}

  const visita = data[0];

  document.getElementById("nombre").innerText = visita.nombre_visitante;

  document.getElementById("info").innerHTML = `
    📅 ${visita.fecha_visita}<br>
    🏠 ${
      visita.tipo_generador === 'administracion'
        ? 'ADMINISTRACIÓN'
        : visita.privada + '-' + visita.casa
    }
  `;

  const link = `${window.location.origin}/validar.html?qr=${qrParam}`;

  new QRious({
    element: document.getElementById('qr'),
    value: link,
    size: 220
  });
}
</script>

</body>
</html>

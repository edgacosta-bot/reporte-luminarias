<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Pase de acceso</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: white;
    }

    .card {
      background: white;
      color: black;
      border-radius: 16px;
      padding: 20px;
      width: 320px;
      text-align: center;
    }

    .header {
      background: #1e293b;
      color: white;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .nombre {
      font-size: 20px;
      font-weight: bold;
    }

    .info {
      margin-top: 10px;
      font-size: 14px;
    }

    #qrcode {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="card">
  <div class="header">Villas de la Concepción</div>

  <div class="nombre" id="nombre">Cargando...</div>
  <div class="info" id="info"></div>

  <div id="qrcode"></div>
</div>

<script>
const client = window.supabase.createClient(
  'https://prjxmfhahnzosdwljode.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs'
);

const params = new URLSearchParams(window.location.search);
const qr = params.get("qr")?.trim();
alert("QR recibido: " + qr);

console.log("QR recibido:", qr);

// 🚨 VALIDACIÓN CRÍTICA
if (!qr) {
  document.getElementById("nombre").innerText = "QR inválido";
  throw new Error("QR vacío");
}

cargar();

async function cargar() {

  const { data, error } = await client
    .from('visitas_qr')
    .select('*')
    .eq('codigo_qr', qr);

  if (error || !data || data.length === 0) {
    document.getElementById("nombre").innerText = "QR inválido";
    return;
  }

  const visita = data[0];

  document.getElementById("nombre").innerText = visita.nombre_visitante;

  document.getElementById("info").innerHTML = `
    📅 ${visita.fecha_visita}<br>
    🏠 ${
      visita.tipo_generador === 'administracion'
        ? 'ADMINISTRACIÓN'
        : visita.privada + '-' + visita.casa
    }
  `;

  // 🔥 LINK CORRECTO
  const link = `https://reporte-luminarias-3lj5.vercel.app/validar.html?qr=${qr}`;

  console.log("LINK QR:", link);

  // LIMPIAR
  document.getElementById("qrcode").innerHTML = "";

  // GENERAR QR
  new QRCode(document.getElementById("qrcode"), {
    text: link,
    width: 200,
    height: 200
  });
}
</script>

</body>
</html>

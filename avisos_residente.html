<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mis avisos</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<script>
protegerPagina(["residente"]);
</script>

    <link rel="stylesheet" href="styles/avisos_residente.css">
</head>

<body>

<div class="container">

  <h1>🔔 Mis avisos</h1>

  <div id="kpi" class="kpi">
    Cargando avisos...
  </div>

  <div id="lista"></div>

</div>

<script>

cargar();

async function cargar(){

  const lista = document.getElementById("lista");
  const kpi = document.getElementById("kpi");

  lista.innerHTML = "";

  const {
  data: sessionData
} = await supabaseClient.auth.getSession();

const authUser =
  sessionData?.session?.user;

if(!authUser){

  lista.innerHTML = `
    <p class="vacio">
      No hay sesión activa.
    </p>
  `;

  return;
}

const {
  data: residente
} = await supabaseClient

  .from("residentes")

  .select("id")

  .eq("user_id", authUser.id)

  .maybeSingle();

if(!residente){

  lista.innerHTML = `
    <p class="vacio">
      No se identificó residente.
    </p>
  `;

  return;
}

const userId = residente.id;
  const { data, error } = await supabaseClient

  .from("avisos_destinatarios")

  .select(`
    id,
    leido,
    fecha_lectura,
    fecha_entrega,

    aviso:avisos (
      id,
      titulo,
      mensaje,
      tipo,
      emisor_tipo,
      fecha_creacion
    )
  `)

  .eq("residente_id", userId)

  .order("fecha_entrega", {
    ascending:false
  });

  if(error){

    console.error(error);

    lista.innerHTML = `
      <p class="vacio">
        Error al cargar avisos.
      </p>
    `;

    return;
  }

  if(!data || data.length === 0){

    kpi.innerHTML = `
      🔔 0 avisos
    `;

    lista.innerHTML = `
      <p class="vacio">
        No tienes avisos.
      </p>
    `;

    return;
  }

  const noLeidos =
    data.filter(x => !x.leido).length;

  kpi.innerHTML = `
    🔔 ${data.length} aviso(s)
    ${noLeidos > 0
      ? `<span class="badge">
          ${noLeidos} nuevo(s)
        </span>`
      : ""
    }
  `;

  for(const item of data){

    const aviso = item.aviso;

    const div = document.createElement("div");

    div.className =
      `aviso ${item.leido ? 'leido' : 'no-leido'}`;

    div.innerHTML = `

      <div class="titulo">

        ${aviso.titulo}

        ${!item.leido
          ? `<span class="badge">Nuevo</span>`
          : ""
        }

      </div>

      <div class="detalle">

        👤 ${aviso.emisor_tipo}
        <br>

        📅 ${
          formatearFecha(
            aviso.fecha_creacion
          )
        }

      </div>

      <div class="mensaje">

        ${aviso.mensaje}

      </div>

      ${!item.leido
        ? `
          <button
            class="button"
            onclick="marcarLeido('${item.id}')">

            Entendido

          </button>
        `
        : `
          <div class="detalle">

            ✅ Leído

            ${
              item.fecha_lectura
              ? `
                <br>
                ${formatearFecha(item.fecha_lectura)}
              `
              : ""
            }

          </div>
        `
      }

    `;

    lista.appendChild(div);
  }
}

async function marcarLeido(id){

  const { error } = await supabaseClient

    .from("avisos_destinatarios")

    .update({
      leido:true,
      fecha_lectura:new Date().toISOString()
    })

    .eq("id", id);

  if(error){

    alert("Error al actualizar");

    return;
  }

  cargar();
}

function formatearFecha(fecha){

  if(!fecha) return "-";

  return new Date(fecha)

    .toLocaleString("es-MX", {

      day:"2-digit",
      month:"2-digit",
      year:"numeric",

      hour:"2-digit",
      minute:"2-digit"

    });
}

</script>

</body>
</html>

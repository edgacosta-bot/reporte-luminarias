<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro trabajador hogar</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 420px;
  margin: auto;
}

h1 {
  text-align: center;
  margin-bottom: 10px;
}

/* 🔴 AVISO ATRASO (AHORA ARRIBA) */
.aviso {
  background: #f59e0b;
  color: #111827;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 15px;
  font-size: 14px;
  font-weight: bold;
  text-align: center;
}

input, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  font-size: 14px;
}

button {
  background: #2563eb;
  color: white;
  font-weight: bold;
}

#qrContainer {
  margin-top: 20px;
  text-align: center;
}

.hidden {
  display: none;
}
</style>

</head>

<body>

<div class="container">

  <h1>Registro trabajador del hogar</h1>

  <!-- 🔥 AHORA SIEMPRE VISIBLE ARRIBA -->

  <div id="avisoAtraso" class="aviso hidden">
    Tienes atraso. Puedes continuar, pero regulariza.
  </div>

  <input type="text" id="nombre" placeholder="Nombre completo">
  <input type="text" id="telefono" placeholder="Teléfono">

<button id="btnGenerar">Generar QR</button>

  <div id="qrContainer" class="hidden">
    <canvas id="qr"></canvas>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>

// 🔥 SIMULACIÓN / FLAG DE ATRASO (YA EXISTENTE EN TU LÓGICA)
let tieneAtraso = true; // <-- aquí normalmente viene de BD

// 🔥 MOSTRAR AVISO DESDE EL INICIO
if (tieneAtraso) {
  document.getElementById("avisoAtraso").classList.remove("hidden");
}

// GENERAR QR
document.getElementById("btnGenerar").addEventListener("click", () => {

  const nombre = document.getElementById("nombre").value;

  if (!nombre) {
    alert("Ingrese nombre");
    return;
  }

  const qrData = `demo-${Date.now()}`;

  QRCode.toCanvas(document.getElementById("qr"), qrData, { width: 200 });

  document.getElementById("qrContainer").classList.remove("hidden");
});

</script>

</body>
</html>

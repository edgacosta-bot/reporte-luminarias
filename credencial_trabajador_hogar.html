<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro trabajador del hogar</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  padding: 20px;
}

.container {
  max-width: 420px;
  margin: auto;
}

h1 {
  text-align: center;
  margin-bottom: 10px;
}

/* 🔶 AVISO ATRASO */
.aviso {
  background: #f59e0b;
  color: #111827;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 15px;
  font-size: 14px;
  font-weight: bold;
  text-align: center;
}

.hidden {
  display: none;
}

input, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  font-size: 14px;
}

button {
  background: #2563eb;
  color: white;
  font-weight: bold;
}
</style>

</head>

<body>

<div class="container">

  <h1>Registro trabajador del hogar</h1>

  <!-- 🔥 AHORA ARRIBA -->

  <div id="avisoAtraso" class="aviso hidden">
    ⚠️ Tienes atraso. Puedes continuar, pero regulariza.
  </div>

  <!-- 🔽 TU FORMULARIO ORIGINAL (NO TOCADO) -->

  <input type="text" id="nombre" placeholder="Nombre completo">
  <input type="text" id="telefono" placeholder="Teléfono">

<button id="btnGenerar">Generar QR</button>

</div>

<script>

// 🔴 ESTA VARIABLE DEBE VENIR DE TU LÓGICA REAL (NO INVENTADA)
let tieneAtraso = false;

// 🔥 SOLO MOSTRAR AVISO (NO DENTRO DEL CLICK)
function mostrarAvisoAtraso(){
  const aviso = document.getElementById("avisoAtraso");
  if (aviso) {
    aviso.classList.remove("hidden");
  }
}

// 🔥 SE EJECUTA AL CARGAR
window.addEventListener("DOMContentLoaded", () => {
  if (tieneAtraso) {
    mostrarAvisoAtraso();
  }
});

// 🔴 NO TOCAR TU LÓGICA DEL BOTÓN
// (Aquí se queda EXACTAMENTE como ya la tienes en tu sistema)

</script>

</body>
</html>

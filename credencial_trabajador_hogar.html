<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credencial Trabajador Hogar</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  color: white;
}

/* 🔥 TARJETA */
.card {
  background: #111827;
  border-radius: 20px;
  padding: 25px 20px;
  width: 90%;
  max-width: 340px;
  text-align: center;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

/* 🔷 LOGO */
.logo img {
  width: 80px;
  border-radius: 20px;
  margin-bottom: 10px;
}

/* 🔤 TEXTOS */
h1 {
  font-size: 14px;
  color: #9ca3af;
  margin-bottom: 5px;
}

h2 {
  font-size: 20px;
  margin: 0;
  margin-bottom: 10px;
}

.nombre {
  font-size: 22px;
  font-weight: bold;
  margin-top: 10px;
}

.detalle {
  font-size: 14px;
  color: #9ca3af;
  margin-bottom: 15px;
}

/* 🔲 QR CONTENEDOR */
.qr-box {
  background: white;
  padding: 12px;
  border-radius: 12px;
  display: inline-block;
  margin-top: 10px;
}

/* 🟢 BOTÓN */
.btn-wa {
  margin-top: 20px;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: #25D366;
  color: white;
  font-size: 16px;
  font-weight: bold;
  width: 100%;
  cursor: pointer;
}

/* 📝 TEXTO FINAL */
.footer {
  margin-top: 15px;
  font-size: 12px;
  color: #9ca3af;
}
</style>

</head>

<body>

<div class="card">

  <div class="logo">
    <img src="icono-512.png" alt="Logo">
  </div>

  <h1>Villas de la Concepción</h1>
  <h2>Acceso trabajador hogar</h2>

  <div class="nombre" id="nombre"></div>
  <div class="detalle" id="detalle"></div>

  <div class="qr-box">
    <div id="qr"></div>
  </div>

  <button id="btnWA" class="btn-wa">
    📲 Enviar por WhatsApp
  </button>

  <div class="footer">
    Deberá mostrar este código al ingresar y salir del fraccionamiento
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>

// 🔎 PARAMETROS
const params = new URLSearchParams(window.location.search);

const codigo = params.get("qr");
const nombre = params.get("nombre");
const privada = params.get("privada");
const casa = params.get("casa");
const origen = params.get("origen");

// 🔐 VALIDACIÓN
if (!codigo) {
  document.body.innerHTML = "QR inválido";
  throw new Error("QR inválido");
}

// 🔥 BASE URL
const baseURL = window.location.origin;

// 🔥 URL REAL DE ACCESO
const urlQR = `${baseURL}/acceso_trabajador_hogar.html?qr=${codigo}`;

// 🎯 GENERAR QR
QRCode.toCanvas(urlQR, {
  width: 220,
  margin: 1
}, function (err, canvas) {
  if (!err) {
    document.getElementById("qr").appendChild(canvas);
  }
});

// 🧾 DATOS
document.getElementById("nombre").innerText = nombre || "";
document.getElementById("detalle").innerText =
  `Privada ${privada || ""} • Lote ${casa || ""}`;

// 🔥 OCULTAR BOTÓN EN WA
if (origen !== "admin" && origen !== "residente") {
  document.getElementById("btnWA").style.display = "none";
}

// 📲 WHATSAPP
document.getElementById("btnWA").addEventListener("click", () => {

  const linkCredencial =
  `${baseURL}/credencial_trabajador_hogar.html` +
  `?qr=${codigo}` +
  `&nombre=${encodeURIComponent(nombre || "")}` +
  `&privada=${privada || ""}` +
  `&casa=${casa || ""}` +
  `&origen=wa`;

  const mensaje =
    `👷 Credencial de acceso\n\n` +
    `Nombre: ${nombre || ""}\n` +
    `Ubicación: Privada ${privada || ""} - Lote ${casa || ""}\n\n` +
    `Presenta este código en caseta:\n${linkCredencial}`;

  const wa = `https://wa.me/?text=${encodeURIComponent(mensaje)}`;

  window.open(wa, "_blank");
});

</script>

</body>
</html>

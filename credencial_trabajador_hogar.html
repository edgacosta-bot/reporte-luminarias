<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro trabajador del hogar</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  padding: 20px;
}

.container {
  max-width: 420px;
  margin: auto;
}

h1 {
  text-align: center;
  margin-bottom: 10px;
}

/* 🔶 AVISO ATRASO */
.aviso {
  background: #f59e0b;
  color: #111827;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 15px;
  font-size: 14px;
  font-weight: bold;
  text-align: center;
}

.hidden {
  display: none;
}

input, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  font-size: 14px;
}

button {
  background: #2563eb;
  color: white;
  font-weight: bold;
}

#qrContainer {
  margin-top: 20px;
  text-align: center;
}
</style>

</head>

<body>

<div class="container">

  <h1>Registro trabajador del hogar</h1>

  <!-- 🔥 AVISO SE MUESTRA ARRIBA DESDE EL INICIO -->

  <div id="avisoAtraso" class="aviso hidden">
    Tienes atraso. Puedes continuar, pero regulariza.
  </div>

  <input type="text" id="nombre" placeholder="Nombre completo">
  <input type="text" id="telefono" placeholder="Teléfono">

<button id="btnGenerar">Generar QR</button>

  <div id="qrContainer" class="hidden">
    <canvas id="qr"></canvas>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>

// 🔎 VARIABLES EXISTENTES (RESPETANDO LÓGICA)
let tieneAtraso = false;

// 🔥 ESTA FUNCIÓN SOLO MUESTRA EL AVISO
function mostrarAvisoAtraso(){
  const aviso = document.getElementById("avisoAtraso");
  if (aviso) {
    aviso.classList.remove("hidden");
  }
}

// 🔥 SIMULACIÓN: AQUÍ DEBES USAR TU DATO REAL (NO SE ALTERA LÓGICA EXISTENTE)
// EJEMPLO: tieneAtraso = data.atraso;

if (tieneAtraso) {
  mostrarAvisoAtraso();
}

// GENERAR QR (SIN TOCAR TU FLUJO ORIGINAL)
document.getElementById("btnGenerar").addEventListener("click", () => {

  const nombre = document.getElementById("nombre").value;

  if (!nombre) {
    alert("Ingrese nombre");
    return;
  }

  const qrData = `demo-${Date.now()}`;

  QRCode.toCanvas(document.getElementById("qr"), qrData, { width: 200 });

  document.getElementById("qrContainer").classList.remove("hidden");
});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credencial</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: #111827;
  padding: 20px;
  border-radius: 20px;
  width: 320px;
  text-align: center;
  color: white;
}

.header {
  font-size: 14px;
  color: #9ca3af;
}

.titulo {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 10px;
}

.nombre {
  font-size: 20px;
  font-weight: bold;
  margin-top: 10px;
}

.datos {
  font-size: 14px;
  color: #9ca3af;
}

#qr {
  margin: 15px 0;
}
</style>
</head>

<body>

<div class="card">

  <div class="header">Villas de la Concepción</div>
  <div class="titulo">Acceso trabajador hogar</div>

  <div class="nombre" id="nombre"></div>
  <div class="datos" id="datos"></div>

  <div id="qr"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>

const params = new URLSearchParams(window.location.search);

const qr = params.get("qr");
const nombre = params.get("nombre");
const privada = params.get("privada");
const casa = params.get("casa");

document.getElementById("nombre").innerText = nombre;
document.getElementById("datos").innerText =
  `Privada ${privada} - Lote ${casa}`;

const url = `${window.location.origin}/acceso_trabajador_hogar.html?qr=${qr}`;

QRCode.toCanvas(url, { width: 220 }, function (err, canvas) {
  document.getElementById("qr").appendChild(canvas);
});

</script>

</body>
</html>

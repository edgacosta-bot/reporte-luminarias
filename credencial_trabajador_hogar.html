<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credencial Trabajador Hogar</title>

    <link rel="stylesheet" href="styles/credencial_trabajador_hogar.css">
</head>

<body>

<div class="card">

  <div class="logo">
    <img src="icono-512.png" alt="Logo">
  </div>

  <h1>Villas de la Concepción</h1>
  <h2>Acceso trabajador hogar</h2>

  <div class="nombre" id="nombre"></div>
  <div class="detalle" id="detalle"></div>

  <div class="qr-box">
    <div id="qr"></div>
  </div>

  <button id="btnWA" class="btn-wa">
    📲 Enviar por WhatsApp
  </button>

  <div class="footer">
    Deberá mostrar este código al ingresar y salir del fraccionamiento
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>

// 🔎 PARAMETROS
const params = new URLSearchParams(window.location.search);

const codigo = params.get("qr");
const nombre = params.get("nombre");
const privada = params.get("privada");
const casa = params.get("casa");
const origen = params.get("origen");

// 🔐 VALIDACIÓN
if (!codigo) {
  document.body.innerHTML = "QR inválido";
  throw new Error("QR inválido");
}

// 🔥 BASE URL
const baseURL = window.location.origin;

// 🔥 URL REAL DE ACCESO
const urlQR = `${baseURL}/acceso_trabajador_hogar.html?qr=${codigo}`;

// 🎯 GENERAR QR
QRCode.toCanvas(urlQR, {
  width: 220,
  margin: 1
}, function (err, canvas) {
  if (!err) {
    document.getElementById("qr").appendChild(canvas);
  }
});

// 🧾 DATOS
document.getElementById("nombre").innerText = nombre || "";
document.getElementById("detalle").innerText =
  `Privada ${privada || ""} • Lote ${casa || ""}`;

// 🔥 OCULTAR BOTÓN EN WA
if (origen !== "admin" && origen !== "residente") {
  document.getElementById("btnWA").style.display = "none";
}

// 📲 WHATSAPP
document.getElementById("btnWA").addEventListener("click", () => {

  const linkCredencial =
  `${baseURL}/credencial_trabajador_hogar.html` +
  `?qr=${codigo}` +
  `&nombre=${encodeURIComponent(nombre || "")}` +
  `&privada=${privada || ""}` +
  `&casa=${casa || ""}` +
  `&origen=wa`;

  const mensaje =
    `👷 Credencial de acceso\n\n` +
    `Nombre: ${nombre || ""}\n` +
    `Ubicación: Privada ${privada || ""} - Lote ${casa || ""}\n\n` +
    `Presenta este código en caseta:\n${linkCredencial}`;

  const wa = `https://wa.me/?text=${encodeURIComponent(mensaje)}`;

  window.open(wa, "_blank");
});

</script>

</body>
</html>

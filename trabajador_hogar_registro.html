<!DOCTYPE html>
<html lang="es">
<head>
<script src="auth.js"></script>
<script>
protegerPagina(["colono"]);
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trabajador del hogar</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
}

/* CONTENEDOR */
.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

/* CARD */
.card {
  background: #f1f5f9;
  color: #1e293b;
  border-radius: 20px;
  padding: 20px;
}

/* HEADER */
.header {
  background: #1e293b;
  color: white;
  padding: 14px;
  border-radius: 12px;
  text-align: center;
  margin-bottom: 20px;
  font-weight: bold;
  font-size: 16px;
}

/* LABELS */
label {
  font-size: 13px;
  font-weight: bold;
  margin-top: 10px;
  display: block;
}

/* INPUTS */
input {
  width: 100%;
  padding: 14px;
  margin-top: 6px;
  margin-bottom: 12px;
  border-radius: 12px;
  border: 1px solid #cbd5e1;
  font-size: 14px;
}

/* BOTÓN PRINCIPAL */
.btn-primary {
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  border: none;
  font-weight: bold;
  font-size: 16px;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

/* BOTÓN WHATSAPP */
.btn-wa {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-weight: bold;
  background: #25D366;
  color: white;
  margin-top: 10px;
  display: none;
}

/* QR */
#qr {
  margin-top: 20px;
  text-align: center;
}

/* TEXTO AYUDA */
.helper {
  font-size: 12px;
  color: #64748b;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="header">
      👷 Registro de trabajador del hogar
    </div>

    <!-- NOMBRE -->
    <label>Nombre del trabajador</label>
    <input id="nombre" placeholder="Ej. María López">

    <!-- FECHA INICIO -->
    <label>Inicio de acceso</label>
    <input id="fecha_inicio" type="date">
    <div class="helper">Opcional (puede iniciar hoy)</div>

    <!-- FECHA FIN -->
    <label>Fin de acceso</label>
    <input id="fecha_fin" type="date">
    <div class="helper">Opcional (déjalo vacío si no tiene vencimiento)</div>

    <!-- BOTÓN -->
    <button class="btn-primary" onclick="generar()">
      📱 Generar código QR de acceso
    </button>

    <!-- QR -->
    <div id="qr"></div>

    <!-- WHATSAPP -->
    <button id="btnWA" class="btn-wa">
      📲 Enviar acceso por WhatsApp
    </button>

  </div>
</div>

<script>

const client = supabase.createClient(
  "https://prjxmfhahnzosdwljode.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs"
);

const privada = localStorage.getItem("privada");
const casa = localStorage.getItem("casa");

async function generar() {

  const nombre = document.getElementById("nombre").value.trim();
  const inicio = document.getElementById("fecha_inicio").value;
  const fin = document.getElementById("fecha_fin").value;

  if (!nombre) {
    alert("Ingresa el nombre del trabajador");
    return;
  }

  // 🔥 CONFIG GLOBAL
  const { data: config } = await client
    .from("configuracion_sistema")
    .select("*")
    .eq("clave", "trabajadores_hogar_activo")
    .single();

  const activoGlobal = config.valor;

  // 🔥 RESIDENTE
  const { data: residente } = await client
    .from("residentes")
    .select("*")
    .eq("privada", privada)
    .eq("casa", casa)
    .single();

  const estado = (residente.estado_pago || "").toLowerCase().trim();

  if (!activoGlobal) {

    if (estado === "moroso") {
      alert("Acceso bloqueado por adeudo");
      return;
    }

    if (estado === "atraso_1") {
      const continuar = confirm("Tiene atraso. ¿Desea continuar?");
      if (!continuar) return;
    }
  }

  const codigo = crypto.randomUUID();

  await client.from("trabajadores_hogar").insert([{
    residente_id: residente.id,
    nombre,
    qr_codigo: codigo,
    fecha_inicio: inicio || null,
    fecha_fin: fin || null,
    activo: true
  }]);

  const link = `${window.location.origin}/credencial_trabajador_hogar.html?qr=${codigo}`;

  document.getElementById("qr").innerHTML = "";
  new QRCode(document.getElementById("qr"), {
    text: link,
    width: 200,
    height: 200
  });

  const btn = document.getElementById("btnWA");
  btn.style.display = "block";

  btn.onclick = () => {
    const mensaje = `👷 Acceso trabajador\n\nNombre: ${nombre}\n\nPresenta este código:\n${link}`;
    window.open(`https://wa.me/?text=${encodeURIComponent(mensaje)}`);
  };
}

</script>

</body>
</html>

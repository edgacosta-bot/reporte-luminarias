<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trabajador del hogar</title>

<script src="auth.js"></script>
<script>
protegerPagina(["colono"]);
</script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: #e5e7eb;
  padding: 25px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
}

h2 {
  text-align: center;
}

label {
  font-weight: bold;
  margin-top: 10px;
  display: block;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 5px;
  box-sizing: border-box;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  border: none;
  border-radius: 12px;
  background: #2563eb;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* 🔥 MENSAJE APP */
.mensaje {
  margin-top: 10px;
  font-size: 14px;
  display: none;
}

.error {
  color: #dc2626;
}

.warning {
  color: #f59e0b;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="card">

<h2>Registro trabajador del hogar</h2>

<label>Nombre</label>
<input id="nombre">

<label>Inicio</label>
<input id="inicio" type="date">

<label>Fin</label>
<input id="fin" type="date">

<button onclick="registrar()">Generar QR</button>

<div id="mensaje" class="mensaje"></div>

</div>

<script>

const client = window.supabase.createClient(
  "https://prjxmfhahnzosdwljode.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs"
);

async function registrar() {

  const nombre = document.getElementById("nombre").value;
  const inicio = document.getElementById("inicio").value;
  const fin = document.getElementById("fin").value;
  const mensaje = document.getElementById("mensaje");

  mensaje.style.display = "none";

  if (!nombre) {
    mensaje.innerText = "Ingresa nombre";
    mensaje.className = "mensaje error";
    mensaje.style.display = "block";
    return;
  }

  const identificador = localStorage.getItem("identificador");

  const { data: residente, error } = await client
    .from("residentes")
    .select("*")
    .eq("identificador", identificador)
    .single();

  if (error || !residente) {
    mensaje.innerText = "Error obteniendo datos";
    mensaje.className = "mensaje error";
    mensaje.style.display = "block";
    return;
  }

  const estado = (residente.estado_pago || "").toLowerCase();

  // 🔴 BLOQUEO TOTAL
  if (estado === "moroso") {
    mensaje.innerText = "⛔ No puedes generar accesos. Regulariza tu pago.";
    mensaje.className = "mensaje error";
    mensaje.style.display = "block";
    return;
  }

  // 🟡 ADVERTENCIA
  if (estado === "atraso_1") {
    mensaje.innerText = "⚠️ Tienes atraso. Puedes continuar, pero regulariza.";
    mensaje.className = "mensaje warning";
    mensaje.style.display = "block";
  }

  const codigo = crypto.randomUUID();

  const { error: insertError } = await client
    .from("trabajadores_hogar")
    .insert([{
      residente_id: residente.id,
      nombre: nombre,
      qr_codigo: codigo,
      activo: true,
      fecha_inicio: inicio || null,
      fecha_fin: fin || null
    }]);

  if (insertError) {
    mensaje.innerText = "Error al registrar";
    mensaje.className = "mensaje error";
    mensaje.style.display = "block";
    return;
  }

  window.location.href =
  `credencial_trabajador_hogar.html?qr=${codigo}&nombre=${encodeURIComponent(nombre)}&privada=${residente.privada}&casa=${residente.casa}&origen=admin`;
}

</script>

</body>
</html>

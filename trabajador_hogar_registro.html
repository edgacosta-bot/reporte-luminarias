<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trabajador del hogar</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script src="auth.js"></script>

<script src="utils/residente.js"></script>

<script>
window.addEventListener("load", () => {
  protegerPagina(["residente"]);
});
</script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: #e5e7eb;
  padding: 25px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
}

h2 {
  text-align: center;
}

label {
  font-weight: bold;
  margin-top: 10px;
  display: block;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 5px;
  box-sizing: border-box;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  border: none;
  border-radius: 12px;
  background: #2563eb;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.mensaje {
  margin-top: 10px;
  font-size: 14px;
  display: none;
}

.error { color: #dc2626; }
.warning { color: #f59e0b; }
</style>

</head>

<body>

<div class="card">

  <div style="text-align:center; margin-bottom:15px;">
    <img src="icono-512.png" alt="Logo"
         style="width:90px; height:auto; border-radius:20px;">
  </div>

  <h2>Registro trabajador del hogar</h2>

  <!-- 🔥 AVISO FIJO ARRIBA -->

  <div id="avisoAtraso" class="mensaje warning" style="display:none;"></div>

<label>Nombre</label> <input id="nombre">

<label>Fecha de inicio de vigencia</label> <input id="inicio" type="date"> <small style="color:#6b7280;">Desde cuándo es válido el acceso</small>

<label style="margin-top:10px;">Fecha de término de vigencia</label> <input id="fin" type="date"> <small style="color:#6b7280;">Hasta cuándo es válido el acceso</small>

<button id="btnRegistrar" onclick="registrar()">Generar QR</button>

  <div id="mensaje" class="mensaje"></div>

</div>

<script>

let residenteGlobal = null;

window.addEventListener("DOMContentLoaded", async () => {

  residenteGlobal = await getResidente();

  if (!residenteGlobal) {
    alert("Sesión no válida");
    return;
  }

  const aviso = document.getElementById("avisoAtraso");
  const estado = (residenteGlobal.estado_pago || "").toLowerCase();

  if (estado === "atraso_1") {
    aviso.innerText = "⚠️ Tienes atraso. Puedes continuar, pero regulariza.";
    aviso.style.display = "block";
  }

});

async function registrar() {

  const nombre = document.getElementById("nombre").value.trim();
  const inicio = document.getElementById("inicio").value;
  const fin = document.getElementById("fin").value;
  const mensaje = document.getElementById("mensaje");
  const btn = document.getElementById("btnRegistrar");

  if (inicio && fin && fin < inicio) {
    mensaje.innerText = "La fecha fin no puede ser menor a inicio";
    mensaje.className = "mensaje error";
    mensaje.style.display = "block";
    return;
  }

  mensaje.style.display = "none";

  if (!nombre) {
    mensaje.innerText = "Ingresa nombre";
    mensaje.className = "mensaje error";
    mensaje.style.display = "block";
    return;
  }

  if (!residenteGlobal) {
    mensaje.innerText = "Error de sesión";
    mensaje.className = "mensaje error";
    mensaje.style.display = "block";
    return;
  }

  const estado = (residenteGlobal.estado_pago || "").toLowerCase();

  if (estado === "moroso") {
    mensaje.innerText = "⛔ No puedes generar accesos. Regulariza tu pago.";
    mensaje.className = "mensaje error";
    mensaje.style.display = "block";
    return;
  }

  btn.disabled = true;
  btn.innerText = "Generando...";

  const codigo = crypto.randomUUID();

  const { error } = await supabaseClient
    .from("trabajadores_hogar")
    .insert([{
      residente_id: residenteGlobal.id,
      nombre: nombre,
      qr_codigo: codigo,
      activo: true,
      fecha_inicio: inicio || null,
      fecha_fin: fin || null
    }]);

  if (error) {
    btn.disabled = false;
    btn.innerText = "Generar QR";
    mensaje.innerText = "Error al registrar";
    mensaje.className = "mensaje error";
    mensaje.style.display = "block";
    return;
  }

  mensaje.innerHTML = `
    <div style="text-align:center;">
      <div style="margin-bottom:10px;">✅ Acceso generado correctamente</div>
      <canvas id="qrCanvas"></canvas>
      <button id="btnWA" style="margin-top:10px;">📲 Enviar por WhatsApp</button>
    </div>
  `;

  mensaje.style.display = "block";

  const urlQR =
    `${window.location.origin}/acceso_trabajador_hogar.html?qr=${codigo}`;

  QRCode.toCanvas(document.getElementById("qrCanvas"), urlQR, { width: 200 });

  document.getElementById("btnWA").onclick = () => {

    const linkCredencial =
      `${window.location.origin}/credencial_trabajador_hogar.html` +
      `?qr=${codigo}` +
      `&nombre=${encodeURIComponent(nombre)}` +
      `&privada=${residenteGlobal.privada}` +
      `&casa=${residenteGlobal.casa}` +
      `&origen=wa`;

    const mensajeWA =
      `👷 Credencial de acceso\n\n` +
      `Nombre: ${nombre}\n` +
      `Ubicación: Privada ${residenteGlobal.privada} - Lote ${residenteGlobal.casa}\n\n` +
      `Presenta este código en caseta:\n${linkCredencial}`;

    window.open(`https://wa.me/?text=${encodeURIComponent(mensajeWA)}`, "_blank");
  };

  btn.disabled = false;
  btn.innerText = "Generar QR";

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trabajador del hogar</title>

<script src="auth.js"></script>
<script>
protegerPagina(["colono"]);
</script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: #e5e7eb;
  padding: 25px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
}

h2 {
  text-align: center;
}

label {
  font-weight: bold;
  margin-top: 10px;
  display: block;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 5px;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  border: none;
  border-radius: 12px;
  background: #2563eb;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.btn-wa {
  background: #25D366;
  display: none;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="card">

<h2>Registro trabajador del hogar</h2>

<label>Nombre</label>
<input id="nombre">

<label>Inicio</label>
<input id="inicio" type="date">

<label>Fin</label>
<input id="fin" type="date">

<button onclick="registrar()">Generar QR</button>

<!-- 🔥 BOTÓN WHATSAPP RESTAURADO -->
<button id="btnWA" class="btn-wa">
  📲 Enviar credencial por WhatsApp
</button>

</div>

<script>

const client = window.supabase.createClient(
  "https://prjxmfhahnzosdwljode.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs"
);

let datosQR = null;

async function registrar() {

  const nombre = document.getElementById("nombre").value;
  const inicio = document.getElementById("inicio").value;
  const fin = document.getElementById("fin").value;

  if (!nombre) {
    alert("Ingresa nombre");
    return;
  }

  const identificador = localStorage.getItem("identificador");

  const { data: residente, error } = await client
    .from("residentes")
    .select("*")
    .eq("identificador", identificador)
    .single();

  if (error || !residente) {
    alert("Error obteniendo datos del residente");
    return;
  }

  const codigo = crypto.randomUUID();

  const { error: insertError } = await client
    .from("trabajadores_hogar")
    .insert([{
      residente_id: residente.id,
      nombre: nombre,
      qr_codigo: codigo,
      activo: true,
      fecha_inicio: inicio || null,
      fecha_fin: fin || null
    }]);

  if (insertError) {
    alert("Error al registrar");
    console.log(insertError);
    return;
  }

  // 🔥 GUARDAMOS DATOS PARA WHATSAPP
  datosQR = {
    codigo,
    nombre,
    privada: residente.privada,
    casa: residente.casa
  };

  // 🔥 MOSTRAR BOTÓN
  document.getElementById("btnWA").style.display = "block";

  // 🔥 OPCIONAL: redirigir como antes
  window.location.href =
    `credencial_trabajador_hogar.html?qr=${codigo}&nombre=${encodeURIComponent(nombre)}&privada=${residente.privada}&casa=${residente.casa}`;
}


// 📲 WHATSAPP
document.getElementById("btnWA").addEventListener("click", () => {

  if (!datosQR) return;

  const { codigo, nombre, privada, casa } = datosQR;

  const link =
    `${window.location.origin}/credencial_trabajador_hogar.html?qr=${codigo}&nombre=${encodeURIComponent(nombre)}&privada=${privada}&casa=${casa}`;

  const mensaje =
    `👷 Credencial de acceso\n\n` +
    `Nombre: ${nombre}\n` +
    `Ubicación: Privada ${privada} - Lote ${casa}\n\n` +
    `Presenta este código en caseta:\n${link}`;

  const wa = `https://wa.me/?text=${encodeURIComponent(mensaje)}`;

  window.open(wa, "_blank");
});

</script>

</body>
</html>

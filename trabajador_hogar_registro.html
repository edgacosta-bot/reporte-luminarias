<!DOCTYPE html>
<html lang="es">
<head>
<script src="auth.js"></script>
<script>
protegerPagina(["colono"]);
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trabajador del hogar</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #f1f5f9;
  color: #1e293b;
  border-radius: 20px;
  padding: 20px;
}

.header {
  background: #1e293b;
  color: white;
  padding: 14px;
  border-radius: 12px;
  text-align: center;
  margin-bottom: 20px;
  font-weight: bold;
}

label {
  font-size: 13px;
  font-weight: bold;
  display: block;
  margin-top: 10px;
}

input {
  width: 100%;
  padding: 14px;
  margin-top: 6px;
  margin-bottom: 10px;
  border-radius: 12px;
  border: 1px solid #cbd5e1;
}

.helper {
  font-size: 12px;
  color: #64748b;
  margin-bottom: 10px;
}

.btn-primary {
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  border: none;
  font-weight: bold;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

.btn-wa {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-weight: bold;
  background: #25D366;
  color: white;
  margin-top: 10px;
  display: none;
}

#qr {
  margin-top: 20px;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="header">
      👷 Registro de trabajador del hogar
    </div>

    <label>Nombre del trabajador</label>
    <input id="nombre" placeholder="Ej. María López">

    <label>Inicio de acceso</label>
    <input id="fecha_inicio" type="date">
    <div class="helper">Opcional</div>

    <label>Fin de acceso</label>
    <input id="fecha_fin" type="date">
    <div class="helper">Opcional</div>

    <button class="btn-primary" onclick="generar()">
      📱 Generar código QR
    </button>

    <div id="qr"></div>

    <button id="btnWA" class="btn-wa">
      📲 Enviar por WhatsApp
    </button>

  </div>
</div>

<script>

const client = supabase.createClient(
  "https://prjxmfhahnzosdwljode.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs"
);

const privada = localStorage.getItem("privada");
const casa = localStorage.getItem("casa");

async function generar() {

  const nombre = document.getElementById("nombre").value.trim();

  if (!nombre) {
    alert("Ingresa el nombre");
    return;
  }

  const { data: residente } = await client
    .from("residentes")
    .select("*")
    .eq("privada", privada)
    .eq("casa", casa)
    .single();

  const codigo = crypto.randomUUID();

  await client.from("trabajadores_hogar").insert([{
    residente_id: residente.id,
    nombre,
    privada: residente.privada,
    casa: residente.casa,
    qr_codigo: codigo,
    activo: true
  }]);

  const link = `${window.location.origin}/credencial_trabajador_hogar.html?qr=${codigo}&nombre=${encodeURIComponent(nombre)}&privada=${privada}&casa=${casa}`;

  document.getElementById("qr").innerHTML = "";

  new QRCode(document.getElementById("qr"), {
    text: link,
    width: 200,
    height: 200
  });

  const btn = document.getElementById("btnWA");
  btn.style.display = "block";

  btn.onclick = () => {
    window.open(`https://wa.me/?text=${encodeURIComponent(link)}`);
  };
}

</script>

</body>
</html>

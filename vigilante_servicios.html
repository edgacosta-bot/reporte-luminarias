<!DOCTYPE html>
<html lang="es">
<head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accesos recurrentes</title>

<style>

body {
  margin: 0;
  font-family: 'Segoe UI';
  background: linear-gradient(135deg,#020617,#0f172a);
  color: white;
}

/* 🔥 HEADER APP */
.header-app {
  display: flex;
  justify-content: center;
  align-items: center;
  margin-top: 20px;
  margin-bottom: 10px;
}

.logo-app {
  width: 70px;
  height: 70px;
  object-fit: contain;
  opacity: 0.95;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

h2 {
  text-align: center;
  margin-bottom: 15px;
}

/* 🔥 CARD */
.card {
  background: #111827;
  padding: 16px;
  border-radius: 16px;
  margin-bottom: 12px;
  border-left: 6px solid #3b82f6;
}

.nombre {
  font-weight: bold;
  font-size: 16px;
}

.estado {
  font-size: 13px;
  color: #94a3b8;
  margin-top: 4px;
}

/* 🔥 INPUT */
input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
  background: #1f2937;
  color: white;
}

/* 🔥 BOTONES */
.btn {
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  width: 100%;
  font-weight: bold;
  cursor: pointer;
}

.entrada { background: #16a34a; }
.salida { background: #dc2626; }

</style>
</head>

<body>

<!-- 🔥 HEADER UX PRO -->
<div class="header-app">
  <img src="/icono-512.png" class="logo-app">
</div>

<div class="container">

<h2>🚧 Accesos recurrentes</h2>

<div id="lista">Cargando...</div>

</div>

<!-- 🔥 FECHAS GLOBAL -->
<script src="/utils/dates.js"></script>

<script>

window.addEventListener("DOMContentLoaded", async ()=>{
  await protegerPagina(["vigilante","admin"]);
  cargarServicios();
});

// 🔹 CARGAR SERVICIOS
async function cargarServicios(){

  const { data } = await supabaseClient
    .from("catalogo_servicios")
    .select("*")
    .eq("activo", true)
    .order("nombre");

  let html="";

  for(const s of data){

    const { data: abierto } = await supabaseClient
      .from("accesos_servicios")
      .select("*")
      .eq("servicio_id", s.id)
      .is("fecha_salida", null)
      .limit(1);

    html += `
    <div class="card">

      <div class="nombre">${s.nombre}</div>

      ${
        abierto?.length
        ? `
          <div class="estado">
            🟢 Entrada: ${window.formatMXDate(abierto[0].fecha_entrada)}
          </div>

          <button class="btn salida"
            onclick="registrarSalida('${abierto[0].id}')">
            Registrar salida
          </button>
        `
        : `
          <input id="persona_${s.id}" placeholder="Nombre de quien ingresa">

          <button class="btn entrada"
            onclick="registrarEntrada('${s.id}')">
            Registrar entrada
          </button>
        `
      }

    </div>`;
  }

  document.getElementById("lista").innerHTML = html || "Sin servicios";
}

// 🔹 ENTRADA (UTC CORRECTO)
async function registrarEntrada(servicio_id){

  const nombre = document.getElementById("persona_"+servicio_id).value;

  if(!nombre){
    alert("Ingresa nombre");
    return;
  }

  const { data:userData } = await supabaseClient.auth.getUser();

  const { error } = await supabaseClient
    .from("accesos_servicios")
    .insert([{
      servicio_id,
      nombre_persona: nombre,
      fecha_entrada: new Date().toISOString(), // ✅ UTC correcto
      registrado_por: userData.user.id
    }]);

  if(error){
    console.error(error);
    alert("Error al registrar entrada");
    return;
  }

  cargarServicios();
}

// 🔹 SALIDA (UTC CORRECTO)
async function registrarSalida(id){

  const { error } = await supabaseClient
    .from("accesos_servicios")
    .update({
      fecha_salida: new Date().toISOString() // ✅ UTC correcto
    })
    .eq("id", id);

  if(error){
    console.error(error);
    alert("Error al registrar salida");
    return;
  }

  cargarServicios();
}

</script>

</body>
</html>

<!DOCTYPE html>

<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accesos recurrentes</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="auth.js"></script>

<script src="/utils/dates.js"></script>

        <link rel="stylesheet" href="styles/global.css">
<link rel="stylesheet" href="styles/vigilante_servicios.css">
</head>

<body>

<div class="header-app">
  <img src="/icono-512.png" class="logo-app">
</div>

<div class="container">

<h2>🚧 Accesos recurrentes</h2>

<div id="lista" class="vacio">
  Cargando servicios...
</div>


<div
  id="modalComunidad"
  style="
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.65);
    z-index:999;
    align-items:center;
    justify-content:center;
    padding:20px;
  ">

  <div style="
    background:#111827;
    width:100%;
    max-width:420px;
    border-radius:18px;
    padding:22px;
    display:flex;
    flex-direction:column;
    gap:14px;
    text-align:center;
  ">

    <div style="font-size:18px; font-weight:bold;">
      📢 Aviso comunitario
    </div>

    <div style="font-size:14px; color:#cbd5e1;">
      ¿Desea notificar a residentes sobre el arribo del servicio?
    </div>

    <button
      class="btn entrada"
      onclick="notificarComunidad()">

      Notificar por WhatsApp
    </button>

    <button
      class="btn salida"
      onclick="cerrarModalComunidad()">

      Omitir
    </button>

  </div>

</div>
  
</div>

<script>

window.addEventListener("DOMContentLoaded", async ()=>{
  await protegerPagina(["vigilante"]);
  cargarServicios();
});

// 🔐 VALIDAR NIP (DESDE RESIDENTES ✔)
async function validarNIP(pin){

  const limpio = pin.trim().replace(/\s+/g,"");

  const { data } = await supabaseClient
    .from("residentes")
    .select("id")
    .eq("tipo","vigilante")
    .eq("pin_vigilante", limpio)
    .maybeSingle();

  return data || null;
}

// 🔹 CARGAR SERVICIOS
async function cargarServicios(){

  const contenedor = document.getElementById("lista");
  contenedor.innerHTML = "Cargando...";

  const { data } = await supabaseClient
    .from("catalogo_servicios")
    .select("*")
    .eq("activo", true)
    .order("nombre");

  if(!data || data.length === 0){
    contenedor.innerHTML = `<div class="vacio">Sin servicios disponibles</div>`;
    return;
  }

  let html = "";

  for(const s of data){

    const { data: abierto } = await supabaseClient
      .from("accesos_servicios")
      .select("*")
      .eq("servicio_id", s.id)
      .is("fecha_salida", null)
      .limit(1);

    const activo = abierto?.length;

    html += `
    <div class="card">

      <div class="nombre">${s.nombre}</div>

      ${activo
        ? `
          <div class="estado activo">
            🟢 En sitio desde ${window.formatMXDate(abierto[0].fecha_entrada)}
          </div>

          <input id="nip_salida_${abierto[0].id}" type="password"
            placeholder="NIP de seguridad">

          <div id="msg_${abierto[0].id}" class="mensaje"></div>

          <button class="btn salida"
            onclick="registrarSalida('${abierto[0].id}', this)">
            Registrar salida
          </button>
        `
        : `
          <input id="persona_${s.id}" placeholder="Nombre de quien ingresa">

          <input id="nip_entrada_${s.id}" type="password"
            placeholder="NIP de seguridad">

          <div id="msg_${s.id}" class="mensaje"></div>

          <button class="btn entrada"
            onclick='registrarEntrada(${JSON.stringify(s)}, this)'>

            Registrar entrada
          </button>
        `
      }

    </div>`;
  }

  contenedor.innerHTML = html;
}

// 🔹 ENTRADA
async function registrarEntrada(servicio, btn){
  
  const servicio_id = servicio.id; 

  btn.disabled = true;

  const nombre = document.getElementById("persona_"+servicio_id).value.trim();
  const pin = document.getElementById("nip_entrada_"+servicio_id).value.trim();
  const msg = document.getElementById("msg_"+servicio_id);

  msg.innerText = "";

  if(!nombre){
    msg.className="mensaje error";
    msg.innerText="Ingresa nombre";
    btn.disabled=false;
    return;
  }

  if(!pin){
    msg.className="mensaje error";
    msg.innerText="Ingresa NIP";
    btn.disabled=false;
    return;
  }

  const vigilante = await validarNIP(pin);

  if(!vigilante){
    msg.className="mensaje error";
    msg.innerText="NIP incorrecto";
    btn.disabled=false;
    return;
  }

  const { data: abierto } = await supabaseClient
    .from("accesos_servicios")
    .select("id")
    .eq("servicio_id", servicio_id)
    .is("fecha_salida", null)
    .limit(1);

  if(abierto?.length){
    msg.className="mensaje error";
    msg.innerText="Ya existe un acceso abierto";
    btn.disabled=false;
    return;
  }

  await supabaseClient
  .from("accesos_servicios")
  .insert([{
    servicio_id,
    nombre_persona: nombre,
    fecha_entrada: new Date().toISOString(),
    vigilante_entrada_id: vigilante.id
  }]);

// 🔔 AVISO COMUNITARIO
if(servicio.notificar_comunidad){

  localStorage.setItem(
    "wa_comunidad",
    `🚛 SIGVIC informa:

Estimados residentes, el servicio de ${servicio.nombre} ha ingresado al fraccionamiento y comenzará su recorrido en breve.`
  );
}
// ✅ MENSAJE VISUAL
msg.className = "mensaje ok";
msg.innerText = "Acceso registrado correctamente";
if(servicio.notificar_comunidad){

  document.getElementById(
    "modalComunidad"
  ).style.display = "flex";

} else {

  cargarServicios();
}

}


// 🔹 SALIDA
async function registrarSalida(id, btn){

  btn.disabled = true;

  const pin = document.getElementById("nip_salida_"+id).value.trim();
  const msg = document.getElementById("msg_"+id);

  msg.innerText="";

  if(!pin){
    msg.className="mensaje error";
    msg.innerText="Ingresa NIP";
    btn.disabled=false;
    return;
  }

  const vigilante = await validarNIP(pin);

  if(!vigilante){
    msg.className="mensaje error";
    msg.innerText="NIP incorrecto";
    btn.disabled=false;
    return;
  }

  await supabaseClient
    .from("accesos_servicios")
    .update({
      fecha_salida: new Date().toISOString(),
      vigilante_salida_id: vigilante.id
    })
    .eq("id", id);

  cargarServicios();
}

function notificarComunidad(){

  const mensaje =
    localStorage.getItem("wa_comunidad");

  if(!mensaje) return;

  const url =
    `https://wa.me/?text=${encodeURIComponent(mensaje)}`;

     document.getElementById(
  "modalComunidad"
).style.display = "none";

  window.open(url, "_blank");

  cargarServicios();
  
}

function cerrarModalComunidad(){

  document.getElementById(
    "modalComunidad"
  ).style.display = "none";

  cargarServicios();
}
  
</script>

</body>
</html>

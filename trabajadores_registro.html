<!DOCTYPE html>
<html lang="es">
<head>

<!-- 🔥 1. SUPABASE PRIMERO -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- 🔥 2. DESPUÉS AUTH -->
<script src="auth.js"></script> 
<script>
protegerPagina(["administracion"]);
</script>  

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Trabajador</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.card {
  background: #111827;
  padding: 25px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

h2 {
  text-align: center;
  margin-bottom: 15px;
}

select, input {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 10px;
  border: none;
  background: #1f2937;
  color: white;
}

button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: #2563eb;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}

.mensaje {
  margin-top: 10px;
  text-align: center;
}

.error { color: #f87171; }
.ok { color: #34d399; }
</style>

</head>

<body>

<div class="card">

<h2>Registrar trabajador</h2>

<select id="obra">
  <option value="">Cargando obras...</option>
</select>

<input type="text" id="nombre" placeholder="Nombre del trabajador">
<input type="date" id="fecha_inicio">
<input type="date" id="fecha_fin">

<button onclick="registrar()">Registrar</button>

<div id="mensaje" class="mensaje"></div>

</div>

<script>


// 🔥 FLUJO CONTROLADO
window.addEventListener("DOMContentLoaded", async () => {
  await protegerPagina(["administracion"]);
  await cargarObras();
});

// 🔥 CARGAR OBRAS
async function cargarObras() {

  const select = document.getElementById("obra");

  const { data, error } = await supabaseClient
    .from("obras")
    .select("*")
    .eq("estatus", "activa")
    .eq("aprobada", true);

  console.log("OBRAS:", data);
  console.log("ERROR:", error);

  if (error) {
    select.innerHTML = '<option>Error cargando obras</option>';
    return;
  }

  if (!data || data.length === 0) {
    select.innerHTML = '<option>No hay obras aprobadas</option>';
    return;
  }

  select.innerHTML = '<option value="">Selecciona obra</option>';

  data.forEach(item => {
    const option = document.createElement("option");
    option.value = item.id;
    option.textContent = `Privada ${item.privada} - Lote ${item.casa}`;
    select.appendChild(option);
  });
}

// 🚀 REGISTRAR
async function registrar() {

  const obra_id = document.getElementById("obra").value;
  const nombre = document.getElementById("nombre").value.trim();
  const fecha_inicio = document.getElementById("fecha_inicio").value;
  const fecha_fin = document.getElementById("fecha_fin").value;

  const mensaje = document.getElementById("mensaje");
  mensaje.className = "mensaje";

  // 🔴 VALIDACIÓN BÁSICA
  if (!obra_id || !nombre) {
    mensaje.innerText = "Completa todos los campos";
    mensaje.classList.add("error");
    return;
  }

  // 🔴 VALIDACIÓN FECHAS (CORREGIDO)
  if (fecha_inicio && fecha_fin && fecha_fin < fecha_inicio) {
    mensaje.innerText = "La fecha fin no puede ser menor que la de inicio";
    mensaje.classList.add("error");
    return;
  }

  // 🔎 Obtener obra
  const { data: obra, error: errorObra } = await supabaseClient
    .from("obras")
    .select("*")
    .eq("id", obra_id)
    .single();

  if (errorObra || !obra) {
    mensaje.innerText = "Error al obtener la obra";
    mensaje.classList.add("error");
    return;
  }

  // 🔒 VALIDACIÓN DE APROBACIÓN
  if (!obra.aprobada) {
    mensaje.innerText = "La obra no está autorizada";
    mensaje.classList.add("error");
    return;
  }

  const qr_codigo = crypto.randomUUID();

  const { error } = await supabaseClient
    .from("trabajadores_obra")
    .insert([{
      nombre,
      privada: obra.privada,
      casa: obra.casa,
      obra_id,
      qr_codigo,
      activo: true,
      fecha_inicio: fecha_inicio || null,
      fecha_fin: fecha_fin || null
    }]);

  if (error) {
    console.log("ERROR INSERT:", error);
    mensaje.innerText = "Error al registrar trabajador";
    mensaje.classList.add("error");
    return;
  }

  mensaje.innerText = "Trabajador registrado correctamente ✅";
  mensaje.classList.add("ok");

  // 🔄 limpiar formulario
  document.getElementById("nombre").value = "";
  document.getElementById("obra").value = "";
  document.getElementById("fecha_inicio").value = "";
  document.getElementById("fecha_fin").value = "";
}

</script>

</body>
</html>

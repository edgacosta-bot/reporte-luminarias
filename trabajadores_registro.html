<!DOCTYPE html>
<html lang="es">
<head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrar trabajador</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.card {
  background: #111827;
  padding: 25px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
}

select, input {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 10px;
  border: none;
  background: #1f2937;
  color: white;
}

button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

.mensaje {
  margin-top: 10px;
  text-align: center;
}

.error { color: #f87171; }
.ok { color: #34d399; }
</style>

</head>

<body>

<div class="card">

<h2>Registrar trabajador</h2>

<select id="obra">
  <option value="">Cargando obras aprobadas...</option>
</select>

<input type="text" id="nombre" placeholder="Nombre del trabajador">

<input type="date" id="fecha_inicio">
<input type="date" id="fecha_fin">

<button id="btnRegistrar">Registrar</button>

<div id="mensaje" class="mensaje"></div>

</div>

<script>

// 🔐 CONTROL
window.addEventListener("DOMContentLoaded", async () => {
  try {
    await protegerPagina(["admin", "administracion"]);
  } catch (e) {
    console.warn("Auth no bloqueante");
  }

  await cargarObras();
});

// 🔥 CARGAR SOLO OBRAS APROBADAS
async function cargarObras() {

  const select = document.getElementById("obra");

  try {

    const { data, error } = await supabaseClient
      .from("obras")
      .select("*")
      .eq("estatus", "aprobada")
      .eq("aprobada", true);

    if (error) throw error;

    if (!data || data.length === 0) {
      select.innerHTML = '<option>No hay obras aprobadas</option>';
      return;
    }

    select.innerHTML = '<option value="">Selecciona obra</option>';

    data.forEach(o => {
      const option = document.createElement("option");
      option.value = o.id; // ✅ CAMBIO SEGURO
      option.textContent = `Privada ${o.privada} - Lote ${o.casa}`;
      select.appendChild(option);
    });

  } catch (err) {
    console.error(err);
    select.innerHTML = '<option>Error cargando obras</option>';
  }
}

// 🚀 REGISTRAR TRABAJADOR
document.getElementById("btnRegistrar").addEventListener("click", registrar);

async function registrar() {

  const mensaje = document.getElementById("mensaje");
  const btn = document.getElementById("btnRegistrar");

  mensaje.className = "mensaje";
  btn.disabled = true;
  btn.innerText = "Registrando...";

  try {

    const obra_id = document.getElementById("obra").value;
    const nombre = document.getElementById("nombre").value.trim();
    const fecha_inicio = document.getElementById("fecha_inicio").value;
    const fecha_fin = document.getElementById("fecha_fin").value;

    if (!obra_id || !nombre) {
      throw new Error("Completa todos los campos");
    }

    // 🔥 Obtener obra real desde BD (NO confiar en frontend)
    const { data: obra, error: errorObra } = await supabaseClient
      .from("obras")
      .select("*")
      .eq("id", obra_id)
      .single();

    if (errorObra || !obra) {
      throw new Error("Obra inválida");
    }

    if (!obra.aprobada) {
      throw new Error("La obra no está aprobada");
    }

    // 📅 VALIDACIÓN DE FECHAS
    if (fecha_inicio && fecha_fin && fecha_fin < fecha_inicio) {
      throw new Error("La fecha fin no puede ser menor que la de inicio");
    }

    // 🔒 VALIDAR DUPLICADOS
    const { data: existente } = await supabaseClient
      .from("trabajadores_obra")
      .select("id")
      .eq("nombre", nombre)
      .eq("obra_id", obra_id)
      .maybeSingle();

    if (existente) {
      throw new Error("Este trabajador ya está registrado en esta obra");
    }

    const qr_codigo = crypto.randomUUID();

    const { error } = await supabaseClient
      .from("trabajadores_obra")
      .insert([{
        nombre,
        privada: obra.privada,
        casa: obra.casa,
        obra_id: obra.id,
        qr_codigo,
        activo: true,
        fecha_inicio: fecha_inicio || null,
        fecha_fin: fecha_fin || null
      }]);

    if (error) throw error;

    mensaje.innerHTML = `
      <b>✅ Trabajador registrado</b><br><br>
      Ya puedes generar su código QR
    `;
    mensaje.classList.add("ok");

    // limpiar
    document.getElementById("obra").value = "";
    document.getElementById("nombre").value = "";
    document.getElementById("fecha_inicio").value = "";
    document.getElementById("fecha_fin").value = "";

  } catch (err) {

    console.error(err);
    mensaje.innerText = err.message || "Error al registrar trabajador";
    mensaje.classList.add("error");

  }

  btn.disabled = false;
  btn.innerText = "Registrar";
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis paquetes</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="utils/dates.js"></script>

<style>
body {
  background:#0f172a;
  color:white;
  font-family:Arial;
  padding:20px;
}

.item {
  background:#1e293b;
  padding:12px;
  border-radius:10px;
  margin-bottom:8px;
}

.vacio {
  text-align:center;
  color:#94a3b8;
  margin-top:20px;
}
</style>
</head>

<body>

<h2>📦 Paquetes en caseta</h2>

<div id="lista"></div>

<a href="index.html" style="display:block;margin-top:20px;color:white;">Regresar</a>

<script>

let residenteGlobal = null;

// 🔐 INIT AUTH
window.addEventListener("DOMContentLoaded", async () => {

  await protegerPagina(["colono","residente","admin"]);

  const { data } = await supabaseClient.auth.getUser();
  const user = data?.user;

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  const { data: residente, error } = await supabaseClient
    .from("residentes")
    .select("privada, casa")
    .eq("user_id", user.id)
    .single();

  if (error || !residente) {
    document.getElementById("lista").innerHTML =
      "<div class='vacio'>Error de sesión</div>";
    return;
  }

  residenteGlobal = residente;

  cargar();

  // 🔄 refresco automático
  setInterval(cargar, 10000);
});

// 🔍 CARGAR DATOS
async function cargar() {

  if (!residenteGlobal) return;

  const { data, error } = await supabaseClient
    .from('paquetes')
    .select('*')
    .eq('privada', residenteGlobal.privada)
    .eq('casa', residenteGlobal.casa)
    .eq('entregado', false)
    .order('fecha_recepcion', { ascending: false });

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  if (error) {
    lista.innerHTML = "<div class='vacio'>Error al cargar</div>";
    return;
  }

  if (!data || data.length === 0) {
    lista.innerHTML = "<div class='vacio'>No tienes paquetes pendientes</div>";
    return;
  }

  data.forEach(p => {

    const fecha = formatMXDate(p.fecha_recepcion); // 🔥 HOMOLOGADO

    lista.innerHTML += `
      <div class="item">
        📦 Recibido:<br>
        ${fecha}
      </div>
    `;
  });
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis paquetes</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  background:#0f172a;
  color:white;
  font-family:Arial;
  padding:20px;
}

.item {
  background:#1e293b;
  padding:12px;
  border-radius:10px;
  margin-bottom:8px;
}

.vacio {
  text-align:center;
  color:#94a3b8;
  margin-top:20px;
}
</style>
</head>

<body>

<h2>📦 Paquetes en caseta</h2>

<div id="lista"></div>

<a href="index.html" style="display:block;margin-top:20px;color:white;">Regresar</a>

<script>
const { createClient } = supabase;

const supabaseClient = createClient(
  "https://prjxmfhahnzosdwljode.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs"
);

// 🔒 PROTECCIÓN
if (!localStorage.getItem("usuario_valido")) {
  window.location.href = "login.html";
}

// 🔍 DATOS USUARIO
const privada = (localStorage.getItem("privada") || "").trim();
const casa = (localStorage.getItem("casa") || "").trim();

async function cargar() {

  const { data, error } = await supabaseClient
    .from('paquetes')
    .select('*')
    .eq('privada', privada)
    .eq('casa', casa)
    .eq('entregado', false)
    .order('fecha_recepcion', { ascending: false });

  console.log("PAQUETES:", data);

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  if (error) {
    lista.innerHTML = "<div class='vacio'>Error al cargar</div>";
    return;
  }

  if (!data || data.length === 0) {
    lista.innerHTML = "<div class='vacio'>No tienes paquetes pendientes</div>";
    return;
  }

  data.forEach(p => {

    const fecha = new Date(p.fecha_recepcion);

    lista.innerHTML += `
      <div class="item">
        📦 Recibido:<br>
        ${fecha.toLocaleString('es-MX')}
      </div>
    `;
  });
}

// 🔄 refresco automático
setInterval(cargar, 10000);

cargar();
</script>

</body>
</html>

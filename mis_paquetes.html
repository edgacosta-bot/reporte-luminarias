<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis paquetes</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="utils/dates.js"></script>

<style>
body {
  background:#0f172a;
  color:white;
  font-family:Arial;
  padding:20px;
}

.item {
  background:#1e293b;
  padding:12px;
  border-radius:10px;
  margin-bottom:8px;
}

.vacio {
  text-align:center;
  color:#94a3af;
  margin-top:20px;
}
</style>
</head>

<body>

<h2>📦 Paquetes en caseta</h2>

<div id="lista"></div>

<a href="index.html" style="display:block;margin-top:20px;color:white;">Regresar</a>

<script>

let residenteIdGlobal = null;

// 🔐 INIT AUTH
window.addEventListener("DOMContentLoaded", async () => {

  await protegerPagina(["colono","residente","admin"]);

  const { data } = await supabaseClient.auth.getUser();
  const user = data?.user;

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  // 🔥 OBTENER ID REAL DE RESIDENTE
  const { data: residente, error } = await supabaseClient
    .from("residentes")
    .select("id")
    .eq("user_id", user.id)
    .single();

  if (error || !residente) {
    document.getElementById("lista").innerHTML =
      "<div class='vacio'>Error de sesión</div>";
    return;
  }

  residenteIdGlobal = residente.id;

  cargar();

  // 🔄 refresco automático
  setInterval(cargar, 10000);
});

// 🔍 CARGAR DATOS
async function cargar() {

  if (!residenteIdGlobal) return;

  const { data, error } = await supabaseClient
    .from('paquetes')
    .select('*')
    .eq('residente_id', residenteIdGlobal)
    .eq('entregado', false)
    .order('fecha_recepcion', { ascending: false });

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  if (error) {
    lista.innerHTML = "<div class='vacio'>Error al cargar</div>";
    return;
  }

  if (!data || data.length === 0) {
    lista.innerHTML = `
      <div class='vacio'>
        📭 No tienes paquetes pendientes en caseta<br>
        <small style="color:#64748b;">Cuando llegue uno aparecerá aquí</small>
      </div>
    `;
    return;
  }

  data.forEach(p => {

    if (!p.fecha_recepcion) return;

    const fecha = formatMXDate(p.fecha_recepcion);

    lista.innerHTML += `
      <div class="item">
        <div><b>📦 Paquete en caseta</b></div>
        <div style="margin-top:5px;">
          🕒 Recibido: ${fecha}
        </div>
      </div>
    `;
  });
}

</script>

</body>
</html>

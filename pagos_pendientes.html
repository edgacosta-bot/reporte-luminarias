<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pagos pendientes</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="modal.js"></script>  

<script>
protegerPagina([
  "tesorero",
  "administracion", "residente"
]);
</script>

    <link rel="stylesheet" href="styles/pagos_pendientes.css">
</head>

<body>

<div class="container">

  <h1>💳 Pagos pendientes</h1>

  <div id="kpi" class="kpi">
    Cargando...
  </div>

  <div id="lista"></div>

</div>

<script>

cargar();

async function cargar(){

  const lista =
    document.getElementById("lista");

  const kpi =
    document.getElementById("kpi");

  lista.innerHTML = "";

  const { data, error } =
    await supabaseClient

      .from("notificaciones_pago")

      .select(`
        *,
        residentes(
          id,
          nombre,
          privada,
          casa
        )
      `)

      .eq("estatus", "pendiente")

      .order("fecha_reporte", {
        ascending:false
      });

  if(error){

    console.error(error);

    kpi.innerHTML =
      "Error al cargar.";

    return;
  }

  if(!data || data.length === 0){

    kpi.innerHTML =
      "✅ No hay pagos pendientes.";

    lista.innerHTML = `
      <div class="vacio">
        No existen pagos pendientes.
      </div>
    `;

    return;
  }

  kpi.innerHTML = `
    ⚠️ ${data.length}
    pago(s) pendiente(s)
  `;

  for(const item of data){

    const r = item.residentes;

    const div =
      document.createElement("div");

    div.className = "card";

    div.innerHTML = `

      <div class="titulo">

        ${r.nombre}
        <br>

        ${r.privada}-${r.casa}

      </div>

      <div class="detalle">
        💰 <b>Concepto:</b>
        ${item.concepto}
      </div>

      <div class="detalle">
        📅 <b>Periodo:</b>
        ${
          item.periodo_mes
          ? `${nombreMes(item.periodo_mes)} ${item.periodo_anio}`
          : "No aplica"
        }
      </div>

      <div class="detalle">
        💵 <b>Monto:</b>
        $${Number(item.monto).toFixed(2)}
      </div>

      <div class="detalle">
        🏦 <b>Referencia:</b>
        ${item.referencia || "-"}
      </div>

      <div class="detalle">
        📆 <b>Fecha transferencia:</b>
        ${item.fecha_transferencia}
      </div>

      <div class="detalle">
        📝 <b>Observaciones:</b>
        ${item.observaciones || "-"}
      </div>

      <div class="detalle">
        🕒 <b>Reportado:</b>
        ${formatoFecha(item.fecha_reporte)}
      </div>

      <div class="botones">

        <button
          class="btn-validar"
          onclick="validarPago('${item.id}')">

          Validar

        </button>

        <button
          class="btn-rechazar"
          onclick="rechazarPago('${item.id}')">

          Rechazar

        </button>

      </div>

    `;

    lista.appendChild(div);
  }
}

async function validarPago(id){

  const confirmar =
  await mostrarConfirmacion({

    titulo:"Validar pago",

    mensaje:
      "¿Deseas validar este pago?"

  });

  if(!confirmar) return;

  try{

    // 🔹 obtener datos del pago

    const {
      data: pago,
      error: errorPago
    } = await supabaseClient

      .from("notificaciones_pago")

      .select("*")

      .eq("id", id)

      .single();

    if(errorPago || !pago){

      console.error(errorPago);

      await mostrarAlerta({

  titulo:"Error",

  mensaje:
    "No se pudo obtener el pago."

});

      return;
    }

    // 🔹 actualizar notificación

    const {
      error: errorUpdate
    } = await supabaseClient

      .from("notificaciones_pago")

      .update({

        estatus:"validado",

        fecha_validacion:
          new Date().toISOString()

      })

      .eq("id", id);

    if(errorUpdate){

      console.error(errorUpdate);

      await mostrarAlerta({

  titulo:"Error",

  mensaje:
    "Ocurrió un error al validar."

});

      return;
    }

    // 🔹 registrar pago oficial

    const {
      error: errorInsert
    } = await supabaseClient

      .from("pagos_residentes")

      .insert({

        residente_id:
          pago.residente_id,

        notificacion_pago_id:
          pago.id,

        concepto:
          pago.concepto,

        periodo_mes:
          pago.periodo_mes,

        periodo_anio:
          pago.periodo_anio,

        monto:
          pago.monto,

        fecha_pago:
          pago.fecha_transferencia,

        referencia:
          pago.referencia,

        observaciones:
          pago.observaciones,

        metodo_pago:
          "transferencia"

      });

    if(errorInsert){

      console.error(errorInsert);

      await mostrarAlerta({

  titulo:"Error",

  mensaje:
    "El pago se validó pero no pudo registrarse oficialmente."

});

      return;
    }

    await mostrarAlerta({

  titulo:"Pago validado",

  mensaje:
    "El pago fue validado correctamente."

});

    cargar();

  }catch(err){

    console.error(err);

    await mostrarAlerta({

  titulo:"Error",

  mensaje:
    "Ocurrió un error inesperado."

});
  }
}

async function rechazarPago(id){

  const motivo =
    prompt("Motivo del rechazo:");

  if(motivo === null) return;

  const { error } =
    await supabaseClient

      .from("notificaciones_pago")

      .update({
        estatus:"rechazado",
        observaciones_tesorero:
          motivo,
        fecha_validacion:
          new Date().toISOString()
      })

      .eq("id", id);

  if(error){

    console.error(error);

    alert("Error al rechazar.");

    return;
  }

  alert("Pago rechazado.");

  cargar();
}

function formatoFecha(fecha){

  if(!fecha) return "-";

  return new Date(fecha)

    .toLocaleString("es-MX", {

      day:"2-digit",
      month:"2-digit",
      year:"numeric",

      hour:"2-digit",
      minute:"2-digit"
    });
}

function nombreMes(mes){

  const meses = {

    1:"Enero",
    2:"Febrero",
    3:"Marzo",
    4:"Abril",
    5:"Mayo",
    6:"Junio",
    7:"Julio",
    8:"Agosto",
    9:"Septiembre",
    10:"Octubre",
    11:"Noviembre",
    12:"Diciembre"
  };

  return meses[mes] || mes;
}

</script>

</body>
</html>

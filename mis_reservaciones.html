<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mis Reservaciones</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="auth.js"></script>

<script src="utils/residente.js"></script>  

<script src="utils/dates.js"></script>

<script src="modal.js"></script>  

    <link rel="stylesheet" href="styles/mis_reservaciones.css">
</head>

<body>

<div class="container">

<h1>
📅 Mis Reservaciones
</h1>

  
<div id="lista">
</div>

</div>

<script>

let residenteId = null;

let reservaciones = [];

function renderizar(){

  const lista =
    document.getElementById(
      "lista"
    );

  if(
    reservaciones.length === 0
  ){

    lista.innerHTML = `
      <div class="card">
        No tienes reservaciones.
      </div>
    `;

    return;

  }

  let html = "";

  reservaciones.forEach(r => {

    html += `

      <div class="card">

        <div
          style="
            font-size:20px;
            font-weight:bold;
            color:#93c5fd;
            margin-bottom:12px;
          "
        >

          🏟 ${r.amenidad}

        </div>

        <div>

          📅 ${r.fecha}

        </div>

        <div>

          🕒 ${r.hora_inicio}
          -
          ${r.hora_fin}

        </div>

  <div
  style="
    margin-top:10px;
    font-weight:bold;
    color:${
      r.estado === 'activa'
        ? '#4ade80'
        : '#f87171'
    };
  "
>

  ${
    r.estado === 'activa'
      ? '✅ ACTIVA'
      : '❌ CANCELADA'
  }

</div>

${
  r.estado === 'activa'
  ? `

      <button
        style="
          margin-top:12px;
        "
        onclick="
          verInvitados(
            '${r.reservacion_id}'
          )
        "
      >

        👥 Invitados

      </button>

    `
  : ''
}

 ${
  r.estado === 'activa'
  ? `
      <button
        style="
          margin-top:12px;
          background:#dc2626;
        "
        onclick="
          cancelarReservacion(
            '${r.reservacion_id}'
          )
        "
      >

        Cancelar reservación

      </button>
    `
  : ''
}

      </div>

    `;

  });

  lista.innerHTML = html;

}
  
async function cargarResidente(){

  const residente =
    await getResidente();

  if(!residente){

    alert(
      "Error de sesión"
    );

    return false;

  }

  residenteId =
    residente.id;

  return true;

}

async function cancelarReservacion(
  reservacionId
){

  console.log(
  "Reservación a cancelar:",
  reservacionId
);

  const confirmar =
    await mostrarConfirmacion({

      titulo:
        "Cancelar reservación",

      mensaje:
        "¿Desea cancelar la reservación?"

    });

  if(!confirmar){
    return;
  }

  const { data, error } =
    await supabaseClient.rpc(
      "cancelar_reservacion_amenidad",
      {
        p_reservacion_id:
          reservacionId
      }
    );

  if(error){

    await mostrarAlerta({

      titulo: "Error",

      mensaje:
        error.message

    });

    return;

  }

  await mostrarAlerta({

    titulo: "SIGVIC",

    mensaje:
      data.mensaje

  });

  await cargar();

}

function verInvitados(
  reservacionId
){

  window.location.href =

    `detalle_reservacion.html?reservacion_id=${reservacionId}`;

}
  
async function cargar(){

  const { data, error } =
    await supabaseClient.rpc(
      "obtener_mis_reservaciones",
      {
        p_residente_id:
          residenteId
      }
    );

  if(error){

    console.error(error);

    return;

  }

  reservaciones =
    data || [];

  renderizar();

}  
  
 
  
window.addEventListener(
  "DOMContentLoaded",
  async ()=>{

    await protegerPagina([
      "residente"
    ]);

    const ok =
      await cargarResidente();

    if(!ok){
      return;
    }

    await cargar();

  }
);

</script>

</body>
</html>

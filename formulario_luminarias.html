<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reporte de luminaria</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

h2 {
  text-align: center;
}

select, textarea, button {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 10px;
  border: none;
}

textarea {
  min-height: 100px;
}

button {
  background: #2563eb;
  color: white;
  cursor: pointer;
}

.mensaje {
  text-align: center;
  margin-top: 10px;
}

.error { color: #f87171; }
.ok { color: #34d399; }

</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="container">

<h2>💡 Reporte de luminaria</h2>

<select id="luminaria">
  <option value="">Cargando luminarias...</option>
</select>

<textarea id="descripcion" placeholder="Describe el problema"></textarea>

<button onclick="registrar()">Enviar reporte</button>

<div id="mensaje" class="mensaje"></div>

</div>

<script>

const client = window.supabase.createClient(
  "https://prjxmfhahnzosdwljode.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs"
);

// 🔥 CARGAR LUMINARIAS
async function cargarLuminarias() {

  const select = document.getElementById("luminaria");

  const { data, error } = await client
    .from("control_luminarias")
    .select("*")
    .order("no_luminaria");

  if (error || !data) {
    select.innerHTML = '<option>Error cargando luminarias</option>';
    return;
  }

  select.innerHTML = '<option value="">Selecciona luminaria</option>';

  data.forEach(l => {
    const option = document.createElement("option");
    option.value = l.id;
    option.textContent = `Luminaria ${l.no_luminaria}`;
    option.dataset.numero = l.no_luminaria;
    select.appendChild(option);
  });
}

cargarLuminarias();


// 🚀 REGISTRAR REPORTE
async function registrar() {

  const luminariaSelect = document.getElementById("luminaria");
  const luminaria_id = luminariaSelect.value;
  const no_luminaria = luminariaSelect.selectedOptions[0]?.dataset.numero;

  const descripcion = document.getElementById("descripcion").value.trim();

  const mensaje = document.getElementById("mensaje");
  mensaje.className = "mensaje";

  if (!luminaria_id || !descripcion) {
    mensaje.innerText = "Completa todos los campos";
    mensaje.classList.add("error");
    return;
  }

  try {

    // 🔥 USAR LOCALSTORAGE (MODO SEGURO PARA DEMO)
    const privada = localStorage.getItem("privada");
    const casa = localStorage.getItem("casa");

    if (!privada || !casa) {
      throw new Error("No se pudo obtener la información del usuario");
    }

    const { error } = await client
      .from("reportes_vecinales")
      .insert([{
        luminaria_id: luminaria_id,
        no_luminaria: no_luminaria,
        descripcion: descripcion,
        estatus: 'NUEVO',
        observaciones: descripcion,
        privada: privada,
        casa: casa
      }]);

    if (error) {
      throw error;
    }

    mensaje.innerText = "Reporte enviado correctamente ✅";
    mensaje.classList.add("ok");

    document.getElementById("luminaria").value = "";
    document.getElementById("descripcion").value = "";

  } catch (err) {
    mensaje.innerText = err.message || "Error al registrar";
    mensaje.classList.add("error");
  }
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mis actividades</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="auth.js"></script>

<script src="utils/residente.js"></script>  

<script src="utils/dates.js"></script>

<script src="modal.js"></script>  

    <link rel="stylesheet" href="styles/actividades_disponibles.css">
</head>

<body>

<div class="container">

<h1>
🎯 Mis Actividades
</h1>

  
<div id="lista">
</div>

</div>

<script>

let residenteId = null;

let actividades = [];

function renderizar(){

  const lista =
    document.getElementById(
      "lista"
    );

  if(
    actividades.length === 0
  ){

    lista.innerHTML = `
      <div class="card">
        No tienes actividades inscritas.
      </div>
    `;

    return;

  }

  let html = "";

  actividades.forEach(a => {

    html += `

      <div class="card">

        <div
          style="
            font-size:20px;
            font-weight:bold;
            color:#93c5fd;
            margin-bottom:12px;
          "
        >

          💃 ${a.actividad}

        </div>

        <div>

          📍 ${a.amenidad}

        </div>

        <div>

          Tipo:
          ${a.tipo}

        </div>

        <div>

          Inicio:
          ${a.fecha_inicio}

        </div>

        <div>

          Fin:
          ${a.fecha_fin}

        </div>

        <div
          style="
            margin-top:10px;
            font-weight:bold;
            color:${
              a.estatus_inscripcion === 'activo'
                ? '#4ade80'
                : '#f87171'
            };
          "
        >

      ${
  a.estatus_inscripcion === 'activo'
  ? `

      <button
        style="
          margin-top:12px;
        "
        onclick="
          verInvitados(
            '${a.actividad_id}'
          )
        "
      >

        👥 Invitados

      </button>

      <button
        style="
          margin-top:8px;
          background:#dc2626;
        "
        onclick="
          cancelarInscripcion(
            '${a.actividad_id}'
          )
        "
      >

        Cancelar inscripción

      </button>

    `
  : ''
}   
               
               </div>

    `;

  });

  lista.innerHTML = html;

}
  
async function cargarResidente(){

  const residente =
    await getResidente();

  if(!residente){

    alert(
      "Error de sesión"
    );

    return false;

  }

  residenteId =
    residente.id;

  return true;

}

function verInvitados(
  actividadId
){

  console.log(
    "Actividad seleccionada:",
    actividadId
  );

  alert(
    actividadId
  );

  window.location.href =
    `detalle_actividad.html?actividad_id=${actividadId}`;

}
  
  async function cancelarInscripcion(
  actividadId
){

  const confirmar =
    await mostrarConfirmacion({

      titulo:
        "Cancelar inscripción",

      mensaje:
        "¿Desea cancelar su inscripción?"

    });

  if(!confirmar){
    return;
  }

  const { data, error } =
    await supabaseClient.rpc(
      "cancelar_inscripcion_actividad",
      {
        p_actividad_id:
          actividadId,

        p_residente_id:
          residenteId
      }
    );

  if(error){

    await mostrarAlerta({

      titulo: "Error",

      mensaje:
        error.message

    });

    return;

  }

  await mostrarAlerta({

    titulo: "SIGVIC",

    mensaje:
      data.mensaje

  });

  await cargar();

}
  
async function cargar(){

  const { data, error } =
   await supabaseClient.rpc(
  "obtener_mis_actividades",
  {
    p_residente_id:
      residenteId
  }
);

  if(error){

    console.error(error);

    return;

  }

  actividades =
    data || [];

  renderizar();

}
  
 
  
window.addEventListener(
  "DOMContentLoaded",
  async ()=>{

    await protegerPagina([
      "residente"
    ]);

    const ok =
      await cargarResidente();

    if(!ok){
      return;
    }

    await cargar();

  }
);

</script>

</body>
</html>

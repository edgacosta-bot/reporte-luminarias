<!DOCTYPE html>
<html lang="es">
<head>

<!-- 🔥 ORDEN CORRECTO -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrar obra</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.card {
  background: #111827;
  padding: 25px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

h2 {
  text-align: center;
  margin-bottom: 15px;
}

select, input {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 10px;
  border: none;
  background: #1f2937;
  color: white;
}

button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: #2563eb;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}

.mensaje {
  margin-top: 10px;
  text-align: center;
}

.error { color: #f87171; }
.ok { color: #34d399; }
</style>

</head>

<body>

<div class="card">

<h2>Registrar obra</h2>

<select id="privada">
  <option value="">Selecciona privada</option>
  <option value="I">Privada I</option>
  <option value="II">Privada II</option>
  <option value="III">Privada III</option>
</select>

<input type="number" id="casa" placeholder="Número de lote">
<input type="text" id="" placeholder="Director Responsable de Obra ()">
<input type="date" id="fecha_inicio">

<button onclick="registrar()">Registrar obra</button>

<div id="mensaje" class="mensaje"></div>

</div>

<script>

// 🔥 CONTROL DE ACCESO
window.addEventListener("DOMContentLoaded", async () => {
  await protegerPagina(["administracion"]);
});

// 🚀 REGISTRAR OBRA
async function registrar() {

  const privada = document.getElementById("privada").value;
  const casa = document.getElementById("casa").value;
  const  = document.getElementById("").value.trim();
  const fecha_inicio = document.getElementById("fecha_inicio").value;

  const mensaje = document.getElementById("mensaje");
  mensaje.className = "mensaje";

  // 🔴 VALIDACIÓN
  if (!privada || !casa || !) {
    mensaje.innerText = "Completa todos los campos";
    mensaje.classList.add("error");
    return;
  }

  // 📅 Fecha opcional pero validada
  if (fecha_inicio) {
    const hoy = new Date().toLocaleDateString('sv-SE');
    if (fecha_inicio < hoy) {
      console.log("Fecha en pasado (permitido)");
    }
  }

  // 🔥 INSERT
  const { error } = await supabaseClient
    .from("obras")
    .insert([{
      privada: privada,
      casa: casa,
      dro_nombre: dro,
      fecha_inicio: fecha_inicio || null,
      estatus: "activa",
      aprobada: false
    }]);

  if (error) {
    console.log("ERROR:", error);
    mensaje.innerText = "Error al registrar obra";
    mensaje.classList.add("error");
    return;
  }

  mensaje.innerText = "Obra registrada correctamente ✅";
  mensaje.classList.add("ok");

  // 🔄 limpiar
  document.getElementById("privada").value = "";
  document.getElementById("casa").value = "";
  document.getElementById("dro").value = "";
  document.getElementById("fecha_inicio").value = "";
}

</script>

</body>
</html>

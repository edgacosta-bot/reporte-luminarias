<!DOCTYPE html>

<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Obra</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="auth.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.container {
  padding: 20px;
  max-width: 500px;
  margin: auto;
  text-align: center;
}

.logo {
  width: 120px;
  margin: 10px auto 20px;
  display: block;
}

input, select, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  font-size: 15px;
}

input, select {
  background: #1e293b;
  color: white;
}

button {
  background: #2563eb;
  color: white;
  cursor: pointer;
}

.msg {
  margin-top: 12px;
  font-weight: bold;
}

.ok { color: #22c55e; }
.error { color: #ef4444; }

.helper {
  font-size: 13px;
  color: #cbd5f5;
  margin-top: 5px;
  text-align: left;
}
</style>

</head>

<body>

<div class="container">

<img src="/logo.png" class="logo">

<h2>Registrar Obra</h2>

<select id="lote">
  <option value="">Selecciona privada y lote</option>
</select>

<input id="dro" placeholder="Nombre del DRO">

<input id="fecha_inicio" type="date">
<input id="fecha_fin" type="date">

<div class="helper">
Introduce el periodo de vigencia de la aprobación de la obra
</div>

<button onclick="registrar()">Guardar</button>

<div id="msg" class="msg"></div>

</div>

<script>

window.addEventListener("DOMContentLoaded", async () => {
  await protegerPagina(["admin","administracion"]);
  await cargarLotes();
});

async function cargarLotes(){

  const { data, error } = await supabaseClient
    .from("lotes")
    .select("id, privada, casa");

  if(error){
    console.log(error);
    return;
  }

  const select = document.getElementById("lote");

  data.forEach(l => {
    const option = document.createElement("option");
    option.value = JSON.stringify(l);
    option.text = `${l.privada} - Lote ${l.casa}`;
    select.appendChild(option);
  });
}

async function registrar(){

  const loteData = document.getElementById("lote").value;
  const dro = document.getElementById("dro").value.trim();
  const fecha_inicio = document.getElementById("fecha_inicio").value;
  const fecha_fin = document.getElementById("fecha_fin").value;

  const msg = document.getElementById("msg");
  msg.innerText = "";
  msg.className = "msg";

  if(!loteData || !dro || !fecha_inicio){
    msg.innerText = "Completa todos los campos obligatorios";
    msg.classList.add("error");
    return;
  }

  const lote = JSON.parse(loteData);

  const { error } = await supabaseClient
    .from("obras")
    .insert([{
      privada: lote.privada,
      casa: lote.casa,
      lote_id: lote.id,
      dro_nombre: dro,
      fecha_inicio,
      fecha_fin,
      estatus: "pendiente",
      aprobada: false
    }]);

  if(error){
    console.log(error);
    msg.innerText = "Error al registrar obra";
    msg.classList.add("error");
    return;
  }

  msg.innerText = `Registro exitoso de la obra de la privada ${lote.privada} lote ${lote.casa}. Es necesario informar al comité de diseño para su aprobación para poder dar de alta a los trabajadores. Gracias.`;
  msg.classList.add("ok");

  document.getElementById("lote").value = "";
  document.getElementById("dro").value = "";
  document.getElementById("fecha_inicio").value = "";
  document.getElementById("fecha_fin").value = "";
}

</script>

</body>
</html>

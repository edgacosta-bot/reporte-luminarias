<!DOCTYPE html>
<html lang="es">
<head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrar obra</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.card {
  background: #111827;
  padding: 25px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

select, input {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 10px;
  border: none;
  background: #1f2937;
  color: white;
}

button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: #2563eb;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.mensaje { margin-top: 10px; text-align: center; }
.error { color: #f87171; }
.ok { color: #34d399; }
</style>

</head>

<body>

<div class="card">

<h2>Registrar obra</h2>

<select id="lote">
  <option value="">Cargando lotes...</option>
</select>

<input type="text" id="dro" placeholder="Director Responsable de Obra">

<input type="date" id="fecha_inicio">

<button onclick="registrar()">Registrar obra</button>

<div id="mensaje" class="mensaje"></div>

</div>

<script>

// 🔐 CONTROL
window.addEventListener("DOMContentLoaded", async () => {
  await protegerPagina(["administracion"]);
  await cargarLotes();
});

// 🔥 CARGAR LOTES
async function cargarLotes() {

  const select = document.getElementById("lote");

  const { data, error } = await supabaseClient
    .from("lotes")
    .select("*")
    .order("privada")
    .order("lote");

  if (error) {
    select.innerHTML = '<option>Error cargando lotes</option>';
    return;
  }

  if (!data || data.length === 0) {
    select.innerHTML = '<option>No hay lotes</option>';
    return;
  }

  select.innerHTML = '<option value="">Selecciona lote</option>';

  data.forEach(l => {
    const option = document.createElement("option");
    option.value = l.id;
    option.textContent = `Privada ${l.privada} - Lote ${l.lote}`;
    select.appendChild(option);
  });
}

// 🚀 REGISTRAR
async function registrar() {

  const lote_id = document.getElementById("lote").value;
  const dro = document.getElementById("dro").value.trim();
  const fecha_inicio = document.getElementById("fecha_inicio").value;

  const mensaje = document.getElementById("mensaje");
  mensaje.className = "mensaje";

  // 🔴 VALIDACIÓN
  if (!lote_id || !dro) {
    mensaje.innerText = "Completa todos los campos";
    mensaje.classList.add("error");
    return;
  }

  // 🔎 Obtener lote
  const { data: lote, error: errorLote } = await supabaseClient
    .from("lotes")
    .select("*")
    .eq("id", lote_id)
    .single();

  if (errorLote || !lote) {
    mensaje.innerText = "Error al obtener lote";
    mensaje.classList.add("error");
    return;
  }

  // 🔥 INSERT
  const { error } = await supabaseClient
    .from("obras")
    .insert([{
      lote_id: lote_id,
      privada: lote.privada,
      casa: lote.lote,
      dro_nombre: dro,
      fecha_inicio: fecha_inicio || null,
      estatus: "activa",
      aprobada: false
    }]);

  if (error) {
    console.log(error);
    mensaje.innerText = "Error al registrar obra";
    mensaje.classList.add("error");
    return;
  }

  mensaje.innerText = "Obra registrada correctamente ✅";
  mensaje.classList.add("ok");

  // limpiar
  document.getElementById("lote").value = "";
  document.getElementById("dro").value = "";
  document.getElementById("fecha_inicio").value = "";
}

</script>

</body>
</html>

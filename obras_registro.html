<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Obra</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.container {
  padding: 20px;
  max-width: 500px;
  margin: auto;
}

input, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  font-size: 15px;
}

input {
  background: #1e293b;
  color: white;
}

button {
  background: #2563eb;
  color: white;
  cursor: pointer;
}

.msg {
  margin-top: 12px;
  font-weight: bold;
}

.ok { color: #22c55e; }
.error { color: #ef4444; }
</style>

</head>

<body>

<div class="container">

<h2>Registrar Obra</h2>

<input id="privada" placeholder="Privada">
<input id="casa" placeholder="Lote / Casa">
<input id="dro" placeholder="Nombre del DRO">
<input id="fecha_inicio" type="date">
<input id="fecha_fin" type="date">

<button onclick="registrar()">Guardar</button>

<div id="msg" class="msg"></div>

</div>

<script>

window.addEventListener("DOMContentLoaded", async () => {
  await protegerPagina(["admin","administracion"]);

  // 🔁 recuperar contexto si viene de rechazo
  const privada = localStorage.getItem("privada_rechazo");
  const casa = localStorage.getItem("casa_rechazo");

  if (privada) document.getElementById("privada").value = privada;
  if (casa) document.getElementById("casa").value = casa;
});

async function registrar(){

  const privada = document.getElementById("privada").value.trim();
  const casa = document.getElementById("casa").value.trim();
  const dro = document.getElementById("dro").value.trim();
  const fecha_inicio = document.getElementById("fecha_inicio").value;
  const fecha_fin = document.getElementById("fecha_fin").value;

  const msg = document.getElementById("msg");
  msg.innerText = "";
  msg.className = "msg";

  if(!privada || !casa || !dro || !fecha_inicio){
    msg.innerText = "Completa todos los campos obligatorios";
    msg.classList.add("error");
    return;
  }

  const { error } = await supabaseClient
    .from("obras")
    .insert([{
      privada,
      casa,
      dro_nombre: dro,
      fecha_inicio,
      fecha_fin,
      estatus: "pendiente",
      aprobada: false
    }]);

  if(error){
    console.log(error);
    msg.innerText = "Error al registrar obra";
    msg.classList.add("error");
    return;
  }

  msg.innerText = "Obra registrada correctamente";
  msg.classList.add("ok");

  // 🧹 limpiar
  document.getElementById("privada").value = "";
  document.getElementById("casa").value = "";
  document.getElementById("dro").value = "";
  document.getElementById("fecha_inicio").value = "";
  document.getElementById("fecha_fin").value = "";

  localStorage.removeItem("privada_rechazo");
  localStorage.removeItem("casa_rechazo");
}

</script>

</body>
</html>

<!DOCTYPE html>

<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Obra</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="auth.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.container {
  padding: 20px;
  max-width: 500px;
  margin: auto;
  text-align: center;
}

.logo {
  width: 120px;
  margin: 10px auto 20px;
  display: block;
}

input, select, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  font-size: 15px;
}

input, select {
  background: #1e293b;
  color: white;
}

/* 🔥 Mejora visibilidad icono calendario */
input[type="date"]::-webkit-calendar-picker-indicator {
  filter: invert(1);
  cursor: pointer;
}

button {
  background: #2563eb;
  color: white;
  cursor: pointer;
}

.msg {
  margin-top: 12px;
  font-weight: bold;
}

.ok { color: #22c55e; }
.error { color: #ef4444; }

.helper {
  font-size: 13px;
  color: #cbd5f5;
  margin-top: 5px;
  text-align: left;
}
</style>

</head>

<body>

<div class="container">

<img src="/icono-512.png" class="logo">

<h2>Registrar Obra</h2>

<select id="privada">
  <option value="">Introduce la privada</option>
</select>

<select id="lote">
  <option value="">Introduce el número de lote</option>
</select>

<input id="dro" placeholder="Nombre del DRO">

<input id="fecha_inicio" type="date" placeholder="Introduce fecha de inicio">
<input id="fecha_fin" type="date" placeholder="Introduce fecha final">

<div class="helper">
Introduce el periodo de vigencia de la aprobación de la obra
</div>

<button onclick="registrar()">Guardar</button>

<div id="msg" class="msg"></div>

</div>

<script>

window.addEventListener("DOMContentLoaded", async () => {
  await protegerPagina(["admin","administracion"]);
  await cargarPrivadas();
});

// 🔹 CARGAR PRIVADAS (SIN ADMIN Y SEG)
async function cargarPrivadas(){

  const { data, error } = await supabaseClient
    .from("lotes")
    .select("privada");

  if(error){
    console.log(error);
    return;
  }

  const privadas = [...new Set(
    data
      .map(l => l.privada)
      .filter(p => p && p !== "ADMIN" && p !== "SEG")
  )];

  const select = document.getElementById("privada");

  privadas.forEach(p => {
    const option = document.createElement("option");
    option.value = p;
    option.text = p;
    select.appendChild(option);
  });
}

// 🔹 CARGAR LOTES SEGÚN PRIVADA
document.getElementById("privada").addEventListener("change", async (e) => {

  const privada = e.target.value;
  const selectLote = document.getElementById("lote");

  selectLote.innerHTML = `<option value="">Introduce el número de lote</option>`;

  if(!privada) return;

  const { data, error } = await supabaseClient
    .from("lotes")
    .select("id, casa")
    .eq("privada", privada);

  if(error){
    console.log(error);
    return;
  }

  data.forEach(l => {
    const option = document.createElement("option");
    option.value = JSON.stringify({
      id: l.id,
      privada: privada,
      casa: l.casa
    });
    option.text = `Lote ${l.casa}`;
    selectLote.appendChild(option);
  });

});

// 🔹 REGISTRAR OBRA
async function registrar(){

  const loteData = document.getElementById("lote").value;
  const dro = document.getElementById("dro").value.trim();
  const fecha_inicio = document.getElementById("fecha_inicio").value;
  const fecha_fin = document.getElementById("fecha_fin").value;

  const msg = document.getElementById("msg");
  msg.innerText = "";
  msg.className = "msg";

  if(!loteData || !dro || !fecha_inicio){
    msg.innerText = "Completa todos los campos obligatorios";
    msg.classList.add("error");
    return;
  }

  const lote = JSON.parse(loteData);

  const { error } = await supabaseClient
    .from("obras")
    .insert([{
      privada: lote.privada,
      casa: lote.casa,
      lote_id: lote.id,
      dro_nombre: dro,
      fecha_inicio,
      fecha_fin,
      estatus: "pendiente",
      aprobada: false
    }]);

  if(error){
    console.log(error);
    msg.innerText = "Error al registrar obra";
    msg.classList.add("error");
    return;
  }

  msg.innerText = `Registro exitoso de la obra de la privada ${lote.privada} lote ${lote.casa}. Es necesario informar al comité de diseño para su aprobación para poder dar de alta a los trabajadores. Gracias.`;
  msg.classList.add("ok");

  document.getElementById("privada").value = "";
  document.getElementById("lote").innerHTML = `<option value="">Introduce el número de lote</option>`;
  document.getElementById("dro").value = "";
  document.getElementById("fecha_inicio").value = "";
  document.getElementById("fecha_fin").value = "";
}

</script>

</body>
</html>

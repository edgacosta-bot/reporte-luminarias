<!DOCTYPE html>
<html lang="es">
<head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrar obra</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.card {
  background: #111827;
  padding: 25px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

select, input {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 10px;
  border: none;
  background: #1f2937;
  color: white;
}

button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: #2563eb;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:disabled {
  background: #6b7280;
  cursor: not-allowed;
}

.mensaje {
  margin-top: 10px;
  text-align: center;
}

.error { color: #f87171; }
.ok { color: #34d399; }
</style>

</head>

<body>

<div class="card">

<h2>Registrar obra</h2>

<select id="lote">
  <option value="">Cargando lotes...</option>
</select>

<input type="text" id="dro" placeholder="Director Responsable de Obra">

<input type="date" id="fecha_inicio">

<button id="btnRegistrar">Registrar obra</button>

<div id="mensaje" class="mensaje"></div>

</div>

<script>

// 🔐 CONTROL (puedes comentarlo si estorba)
window.addEventListener("DOMContentLoaded", async () => {
  try {
    await protegerPagina(["administracion"]);
  } catch (e) {
    console.warn("Auth no bloqueante:", e);
  }

  await cargarLotes();
});

// 🔥 CARGAR LOTES
async function cargarLotes() {

  const select = document.getElementById("lote");

  try {

    const { data, error } = await supabaseClient
      .from("lotes")
      .select("privada, lote")
      .order("privada")
      .order("lote");

    if (error) throw error;

    if (!data || data.length === 0) {
      select.innerHTML = '<option>No hay lotes</option>';
      return;
    }

    select.innerHTML = '<option value="">Selecciona lote</option>';

    data.forEach(l => {
      const option = document.createElement("option");
      option.value = JSON.stringify(l);
      option.textContent = `Privada ${l.privada} - Lote ${l.lote}`;
      select.appendChild(option);
    });

  } catch (err) {
    console.error("Error cargando lotes:", err);
    select.innerHTML = '<option>Error cargando lotes</option>';
  }
}

// 🚀 REGISTRAR OBRA
document.getElementById("btnRegistrar").addEventListener("click", registrar);

async function registrar() {

  const btn = document.getElementById("btnRegistrar");
  const mensaje = document.getElementById("mensaje");

  btn.disabled = true;
  btn.innerText = "Registrando...";
  mensaje.className = "mensaje";

  try {

    const loteRaw = document.getElementById("lote").value;
    const dro = document.getElementById("dro").value.trim();
    const fecha_inicio = document.getElementById("fecha_inicio").value;

    if (!loteRaw || !dro) {
      throw new Error("Completa todos los campos");
    }

    const lote = JSON.parse(loteRaw);

    // 🔎 VALIDAR DUPLICADO
    const { data: existente, error: errorExistente } = await supabaseClient
      .from("obras")
      .select("id")
      .eq("privada", lote.privada)
      .eq("casa", lote.lote)
      .eq("estatus", "activa")
      .maybeSingle();

    if (errorExistente) throw errorExistente;

    if (existente) {
      throw new Error("Ya existe una obra activa en este lote");
    }

    // 🔥 INSERT
    const { error } = await supabaseClient
      .from("obras")
      .insert([{
        privada: lote.privada,
        casa: lote.lote,
        dro_nombre: dro,
        fecha_inicio: fecha_inicio || null,
        estatus: "activa",
        aprobada: false
      }]);

    if (error) throw error;

    mensaje.innerHTML = `
      <b>✅ Obra registrada correctamente</b><br><br>
      ⚠️ Requiere validación del Comité de Diseño<br><br>
      No podrás registrar trabajadores hasta su aprobación
    `;
    mensaje.classList.add("ok");

    // limpiar
    document.getElementById("lote").value = "";
    document.getElementById("dro").value = "";
    document.getElementById("fecha_inicio").value = "";

  } catch (err) {

    console.error("ERROR:", err);

    mensaje.innerText = err.message || "Error al registrar obra";
    mensaje.classList.add("error");

  }

  btn.disabled = false;
  btn.innerText = "Registrar obra";
}

</script>

</body>
</html>

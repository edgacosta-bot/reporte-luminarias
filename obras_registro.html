<!DOCTYPE html>

<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Obra</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="auth.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.container {
  padding: 30px 20px;
  max-width: 500px;
  margin: auto;
  text-align: center;
}

.logo {
  width: 120px;
  margin: 10px auto 25px;
  display: block;
}

h2 {
  margin-bottom: 20px;
}

input, select {
  width: 100%;
  padding: 14px;
  margin-top: 14px;
  border-radius: 12px;
  border: none;
  font-size: 15px;
  background: #1e293b;
  color: white;
}

/* Mejora visibilidad icono calendario */
input[type="date"]::-webkit-calendar-picker-indicator {
  filter: invert(1);
  cursor: pointer;
}

/* 🔹 Espaciado visual */
.field-group {
  margin-bottom: 10px;
}

/* 🔹 CONTENEDOR DE BOTÓN (alineado a la derecha) */
.button-group {
  display: flex;
  justify-content: flex-end;
  margin-top: 24px;
}

/* 🔹 BOTÓN UNIFICADO */
button {
  width: 180px;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 15px;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

/* 🔹 Hover */
button:hover {
  background: #1d4ed8;
}

/* 🔹 Mensajes */
.msg {
  margin-top: 18px;
  font-weight: bold;
  line-height: 1.4;
  text-align: center;
}

.ok { color: #22c55e; }
.error { color: #ef4444; }

.helper {
  font-size: 13px;
  color: #cbd5f5;
  margin-top: 8px;
  margin-bottom: 8px;
  text-align: left;
  line-height: 1.4;
}
</style>

</head>

<body>

<div class="container">

<img src="/icono-512.png" class="logo">

<h2>Registrar Obra</h2>

<div class="field-group">
<select id="privada">
  <option value="">Introduce la privada</option>
</select>
</div>

<div class="field-group">
<select id="lote">
  <option value="">Introduce el número de lote</option>
</select>
</div>

<div class="field-group">
<input id="dro" placeholder="Nombre del DRO">
</div>

<div class="field-group">
<input id="fecha_inicio" type="date" placeholder="Introduce fecha de inicio">
</div>

<div class="field-group">
<input id="fecha_fin" type="date" placeholder="Introduce fecha final">
</div>

<div class="helper">
Introduce el periodo de vigencia de la aprobación de la obra. Este periodo podrá cambiarse posteriormente.
</div>

<div class="button-group">
<button onclick="registrar()">Guardar</button>
</div>

<div id="msg" class="msg"></div>

</div>

<script>

window.addEventListener("DOMContentLoaded", async () => {
  await protegerPagina(["admin","administracion"]);
  await cargarPrivadas();
});

// 🔹 CARGAR PRIVADAS
async function cargarPrivadas(){

  const { data, error } = await supabaseClient
    .from("lotes")
    .select("privada");

  if(error){
    console.log(error);
    return;
  }

  const privadas = [...new Set(
    data
      .map(l => l.privada)
      .filter(p => p && p !== "ADMIN" && p !== "SEG")
  )];

  const select = document.getElementById("privada");

  privadas.forEach(p => {
    const option = document.createElement("option");
    option.value = p;
    option.text = p;
    select.appendChild(option);
  });
}

// 🔹 CARGAR LOTES
document.getElementById("lote").addEventListener("focus", async () => {

  const privada = document.getElementById("privada").value;
  const selectLote = document.getElementById("lote");

  if(!privada){
    selectLote.innerHTML = `<option value="">Selecciona primero la privada</option>`;
    return;
  }

  selectLote.innerHTML = `<option value="">Cargando lotes...</option>`;

  const { data, error } = await supabaseClient
    .from("lotes")
    .select("id, lote")
    .eq("privada", privada);

  if(error){
    console.error("ERROR LOTES:", error);
    selectLote.innerHTML = `<option value="">Error al cargar lotes</option>`;
    return;
  }

  selectLote.innerHTML = `<option value="">Introduce el número de lote</option>`;

  data.forEach(l => {
    const option = document.createElement("option");
    option.value = JSON.stringify({
      id: l.id,
      privada: privada,
      lote: l.lote
    });
    option.text = `Lote ${l.lote}`;
    selectLote.appendChild(option);
  });

});

// 🔹 REGISTRAR
async function registrar(){

  const loteData = document.getElementById("lote").value;
  const dro = document.getElementById("dro").value.trim();
  const fecha_inicio = document.getElementById("fecha_inicio").value;
  const fecha_fin = document.getElementById("fecha_fin").value;

  const msg = document.getElementById("msg");
  msg.innerText = "";
  msg.className = "msg";

  if(!loteData || !dro || !fecha_inicio){
    msg.innerText = "Completa todos los campos obligatorios";
    msg.classList.add("error");
    return;
  }

  const lote = JSON.parse(loteData);

  const { error } = await supabaseClient
    .from("obras")
    .insert([{
      privada: lote.privada,
      casa: lote.lote,
      lote_id: lote.id,
      dro_nombre: dro,
      fecha_inicio,
      fecha_fin,
      estatus: "pendiente",
      aprobada: false
    }]);

  if(error){
    console.log(error);
    msg.innerText = "Error al registrar obra";
    msg.classList.add("error");
    return;
  }

  msg.innerText = `Registro exitoso de la obra de la privada ${lote.privada} lote ${lote.lote}. Es necesario informar al comité de diseño para su aprobación para poder dar de alta a los trabajadores. Gracias.`;
  msg.classList.add("ok");

  document.getElementById("privada").value = "";
  document.getElementById("lote").innerHTML = `<option value="">Introduce el número de lote</option>`;
  document.getElementById("dro").value = "";
  document.getElementById("fecha_inicio").value = "";
  document.getElementById("fecha_fin").value = "";
}

</script>

</body>
</html>

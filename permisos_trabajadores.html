<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Permisos trabajadores</title>

<!-- 🔥 ORDEN CORRECTO -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

        <link rel="stylesheet" href="styles/global.css">
<link rel="stylesheet" href="styles/permisos_trabajadores.css">
</head>

<body>

<div class="container">

  <div class="logo-top">
  <img src="icono-512.png" alt="SIGVIC">

  </div>  
  
  <h2>🪪 Permisos de trabajadores</h2>
  <div id="lista"></div>
</div>

<div id="toast"></div>

<div id="modal" class="modal">
  <div class="modal-box">
    <p>¿Cancelar permiso?</p>
    <div class="modal-actions">
      <button onclick="cerrarModal()">Cancelar</button>
      <button onclick="confirmarCancelacion()">Confirmar</button>
    </div>
  </div>
</div>

<script>

// 🔥 INICIO SEGURO
window.addEventListener("DOMContentLoaded", async () => {

  if (typeof protegerPagina === "function") {
    await protegerPagina(["admin", "administracion"]);
  } else {
    console.warn("⚠️ protegerPagina no disponible");
  }

  console.log("🚀 INICIANDO PERMISOS");   
  cargar();
});

let idCancelar = null;
  
function toggleObra(id, elemento) {

  const contenido = document.getElementById(id);
  const flecha = elemento.querySelector(".flecha");

  if (contenido.style.display === "block") {
    contenido.style.display = "none";
    flecha.innerText = "▼";
  } else {
    contenido.style.display = "block";
    flecha.innerText = "▲";
  }
}
  
  
function toast(msg, tipo="ok") {
  const t = document.getElementById("toast");
  t.className = `toast-${tipo}`;
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 2500);
}

async function cargar() {

  const { data, error } = await supabaseClient
    .from("trabajadores_obra")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    console.log("ERROR:", error);
    document.getElementById("lista").innerHTML = "Error al cargar";
    return;
  }

  if (!data || data.length === 0) {
    document.getElementById("lista").innerHTML = "Sin registros";
    return;
  }

    // 🔥 CARGAR OBRAS
  const { data: obrasData } = await supabaseClient
    .from("obras")
    .select("privada,casa,estatus");

  const mapaObras = {};

  (obrasData || []).forEach(o => {

    const clave =
      `${o.privada}-${o.casa}`;

    mapaObras[clave] = o.estatus;
  });

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  const hoy = new Date().toLocaleDateString('sv-SE');
  const grupos = {};

  data.forEach(t => {
    const privada = t.privada || "SIN_PRIVADA";
    const casa = t.casa || "SIN_CASA";
    const clave = `${privada}-${casa}`;

    if (!grupos[clave]) grupos[clave] = [];
    grupos[clave].push(t);
  });

  Object.keys(grupos)

.sort((a, b) => {

  const [privadaA, casaA] = a.split("-");
  const [privadaB, casaB] = b.split("-");

  // 🔥 ORDEN PRIVADAS
  const ordenPrivadas = {
    "I": 1,
    "II": 2,
    "III": 3,
    "IV": 4
  };

  const privadaDiff =
    (ordenPrivadas[privadaA] || 999)
    -
    (ordenPrivadas[privadaB] || 999);

  if (privadaDiff !== 0) return privadaDiff;

  // 🔥 ORDEN LOTES
  return Number(casaA) - Number(casaB);

})

.forEach(clave => {

    const [privada, casa] = clave.split("-");

    const bloque = document.createElement("div");
bloque.className = "obra";

const contenidoId = `contenido_${privada}_${casa}`;

bloque.innerHTML = `
  <div class="obra-header" onclick="toggleObra('${contenidoId}', this)">
    <span>🏗 Privada ${privada} - Lote ${casa} (${grupos[clave].length})</span>
   <span class="flecha">▼</span>
  </div>

  <div class="obra-contenido" id="${contenidoId}">
  </div>
`;

    grupos[clave].forEach(t => {

      let estado = "🟢 Vigente";
      const claveObra =
  `${t.privada}-${t.casa}`;

const obraSuspendida =
  mapaObras[claveObra] === "suspendida";
      
      let clase = "estado-verde";

     if (obraSuspendida) {

  estado = "⛔ Obra suspendida";
  clase = "estado-rojo";

}
else if (!t.activo) {

  estado = "⛔ Cancelado";
  clase = "estado-rojo";

}
else if (t.fecha_inicio && hoy < t.fecha_inicio) {

  estado = "🟡 Aún no inicia";
  clase = "estado-amarillo";

}
else if (t.fecha_fin && hoy > t.fecha_fin) {

  estado = "🔴 Vencido";
  clase = "estado-rojo";
}

      const card = document.createElement("div");
      card.className = "card";

      const botonesBloqueados = obraSuspendida;
      card.innerHTML = `
        <div class="nombre">${t.nombre}</div>
        <div class="estado ${clase}">${estado}</div>

        <input
  type="date"
  id="inicio_${t.id}"
  value="${t.fecha_inicio || ""}"
  ${botonesBloqueados ? "disabled" : ""}>
        <input
  type="date"
  id="fin_${t.id}"
  value="${t.fecha_fin || ""}"
  ${botonesBloqueados ? "disabled" : ""}>

        
               <button
  class="btn-renovar"
  ${botonesBloqueados ? "disabled" : ""} onclick="renovar('${t.id}')">🔄 Guardar</button>

        ${
          t.activo
          ? `<button
  class="btn-cancelar"
  ${botonesBloqueados ? "disabled" : ""} onclick="cancelar('${t.id}')">⛔ Cancelar</button>`
          : `<button
  class="btn-reactivar"
  ${botonesBloqueados ? "disabled" : ""} onclick="reactivar('${t.id}')">🟢 Reactivar</button>`
        }
      `;

      bloque.querySelector(".obra-contenido").appendChild(card);
    });

    lista.appendChild(bloque);
  });
}

// 🔄 RENOVAR
async function renovar(id) {
  const inicio = document.getElementById(`inicio_${id}`).value;
  const fin = document.getElementById(`fin_${id}`).value;

  const { error } = await supabaseClient
    .from("trabajadores_obra")
    .update({
      fecha_inicio: inicio || null,
      fecha_fin: fin || null,
      activo: true
    })
    .eq("id", id);

  if (error) {
    console.log("ERROR RENOVAR:", error);
    toast("Error al actualizar", "error");
    return;
  }

  toast("Permiso actualizado", "ok");
  cargar();
}

// ⛔ CANCELAR
function cancelar(id) {
  idCancelar = id;
  document.getElementById("modal").style.display = "flex";
}

function cerrarModal() {
  document.getElementById("modal").style.display = "none";
}

async function confirmarCancelacion() {

  const { error } = await supabaseClient
    .from("trabajadores_obra")
    .update({ activo: false })
    .eq("id", idCancelar);

  if (error) {
    console.log("ERROR CANCELAR:", error);
    toast("Error al cancelar", "error");
    return;
  }

  toast("Acceso cancelado", "warning");

  cerrarModal();
  cargar();
}

// 🟢 REACTIVAR
async function reactivar(id) {

  const { error } = await supabaseClient
    .from("trabajadores_obra")
    .update({ activo: true })
    .eq("id", id);

  if (error) {
    console.log("ERROR REACTIVAR:", error);
    toast("Error al reactivar", "error");
    return;
  }

  toast("Acceso reactivado", "ok");
  cargar();
}

</script>

</body>
</html>

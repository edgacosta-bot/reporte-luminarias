<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Permisos trabajadores</title>

<!-- 🔥 ORDEN CORRECTO -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

.obra { margin-top: 25px; }

.obra-titulo {
  font-weight: bold;
  font-size: 14px;
  color: #94a3b8;
  margin-bottom: 10px;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 10px;
}

.nombre { font-size: 18px; font-weight: bold; }
.estado { font-size: 13px; margin: 6px 0; }

input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
  border: none;
  background: #020617;
  color: white;
}

button {
  margin-top: 8px;
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.btn-renovar { background: #2563eb; }
.btn-cancelar { background: #dc2626; }
.btn-reactivar { background: #16a34a; }

.estado-verde { color: #34d399; }
.estado-rojo { color: #f87171; }
.estado-amarillo { color: #fbbf24; }

#toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px 18px;
  border-radius: 10px;
  display: none;
  z-index: 999;
}

.toast-ok { background: #16a34a; }
.toast-error { background: #dc2626; }
.toast-warning { background: #f59e0b; }

.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-box {
  background: #1e293b;
  padding: 20px;
  border-radius: 16px;
  width: 85%;
  max-width: 320px;
  text-align: center;
}

.modal-actions {
  display: flex;
  gap: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h2>🪪 Permisos de trabajadores</h2>
  <div id="lista"></div>
</div>

<div id="toast"></div>

<div id="modal" class="modal">
  <div class="modal-box">
    <p>¿Cancelar permiso?</p>
    <div class="modal-actions">
      <button onclick="cerrarModal()">Cancelar</button>
      <button onclick="confirmarCancelacion()">Confirmar</button>
    </div>
  </div>
</div>

<script>

// 🔥 INICIO SEGURO
window.addEventListener("DOMContentLoaded", async () => {

  if (typeof protegerPagina === "function") {
    await protegerPagina(["admin", "administracion"]);
  } else {
    console.warn("⚠️ protegerPagina no disponible");
  }

  console.log("🚀 INICIANDO PERMISOS");   
  cargar();
});

let idCancelar = null;

function toast(msg, tipo="ok") {
  const t = document.getElementById("toast");
  t.className = `toast-${tipo}`;
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 2500);
}

async function cargar() {

  const { data, error } = await supabaseClient
    .from("trabajadores_obra")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    console.log("ERROR:", error);
    document.getElementById("lista").innerHTML = "Error al cargar";
    return;
  }

  if (!data || data.length === 0) {
    document.getElementById("lista").innerHTML = "Sin registros";
    return;
  }

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  const hoy = new Date().toLocaleDateString('sv-SE');
  const grupos = {};

  data.forEach(t => {
    const privada = t.privada || "SIN_PRIVADA";
    const casa = t.casa || "SIN_CASA";
    const clave = `${privada}-${casa}`;

    if (!grupos[clave]) grupos[clave] = [];
    grupos[clave].push(t);
  });

  Object.keys(grupos).forEach(clave => {

    const [privada, casa] = clave.split("-");

    const bloque = document.createElement("div");
    bloque.className = "obra";

    bloque.innerHTML = `
      <div class="obra-titulo">
        🏗 Privada ${privada} - Lote ${casa}
      </div>
    `;

    grupos[clave].forEach(t => {

      let estado = "🟢 Vigente";
      let clase = "estado-verde";

      if (!t.activo) {
        estado = "⛔ Cancelado";
        clase = "estado-rojo";
      }
      else if (t.fecha_inicio && hoy < t.fecha_inicio) {
        estado = "🟡 Aún no inicia";
        clase = "estado-amarillo";
      }
      else if (t.fecha_fin && hoy > t.fecha_fin) {
        estado = "🔴 Vencido";
        clase = "estado-rojo";
      }

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <div class="nombre">${t.nombre}</div>
        <div class="estado ${clase}">${estado}</div>

        <input type="date" id="inicio_${t.id}" value="${t.fecha_inicio || ""}">
        <input type="date" id="fin_${t.id}" value="${t.fecha_fin || ""}">

        <button class="btn-renovar" onclick="renovar('${t.id}')">🔄 Guardar</button>

        ${
          t.activo
          ? `<button class="btn-cancelar" onclick="cancelar('${t.id}')">⛔ Cancelar</button>`
          : `<button class="btn-reactivar" onclick="reactivar('${t.id}')">🟢 Reactivar</button>`
        }
      `;

      bloque.appendChild(card);
    });

    lista.appendChild(bloque);
  });
}

// 🔄 RENOVAR
async function renovar(id) {
  const inicio = document.getElementById(`inicio_${id}`).value;
  const fin = document.getElementById(`fin_${id}`).value;

  const { error } = await supabaseClient
    .from("trabajadores_obra")
    .update({
      fecha_inicio: inicio || null,
      fecha_fin: fin || null,
      activo: true
    })
    .eq("id", id);

  if (error) {
    console.log("ERROR RENOVAR:", error);
    toast("Error al actualizar", "error");
    return;
  }

  toast("Permiso actualizado", "ok");
  cargar();
}

// ⛔ CANCELAR
function cancelar(id) {
  idCancelar = id;
  document.getElementById("modal").style.display = "flex";
}

function cerrarModal() {
  document.getElementById("modal").style.display = "none";
}

async function confirmarCancelacion() {

  const { error } = await supabaseClient
    .from("trabajadores_obra")
    .update({ activo: false })
    .eq("id", idCancelar);

  if (error) {
    console.log("ERROR CANCELAR:", error);
    toast("Error al cancelar", "error");
    return;
  }

  toast("Acceso cancelado", "warning");

  cerrarModal();
  cargar();
}

// 🟢 REACTIVAR
async function reactivar(id) {

  const { error } = await supabaseClient
    .from("trabajadores_obra")
    .update({ activo: true })
    .eq("id", id);

  if (error) {
    console.log("ERROR REACTIVAR:", error);
    toast("Error al reactivar", "error");
    return;
  }

  toast("Acceso reactivado", "ok");
  cargar();
}

</script>

</body>
</html>

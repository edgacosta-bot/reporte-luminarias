<script>

// 🔥 SECUENCIA CORRECTA
window.addEventListener("DOMContentLoaded", async () => {
  await protegerPagina(["admin", "administracion"]);
  console.log("🚀 INICIANDO PERMISOS");   
  cargar();
});

let idCancelar = null;

function toast(msg, tipo="ok") {
  const t = document.getElementById("toast");
  t.className = `toast-${tipo}`;
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 2500);
}

async function cargar() {

  const { data, error } = await supabaseClient
    .from("trabajadores_obra")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    console.log("ERROR:", error);
    document.getElementById("lista").innerHTML = "Error al cargar";
    return;
  }

  if (!data || data.length === 0) {
    document.getElementById("lista").innerHTML = "Sin registros";
    return;
  }

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  const hoy = new Date().toLocaleDateString('sv-SE');
  const grupos = {};

  data.forEach(t => {
    const privada = t.privada || "SIN_PRIVADA";
    const casa = t.casa || "SIN_CASA";
    const clave = `${privada}-${casa}`;

    if (!grupos[clave]) grupos[clave] = [];
    grupos[clave].push(t);
  });

  Object.keys(grupos).forEach(clave => {

    const [privada, casa] = clave.split("-");

    const bloque = document.createElement("div");
    bloque.className = "obra";

    bloque.innerHTML = `
      <div class="obra-titulo">
        🏗 Privada ${privada} - Lote ${casa}
      </div>
    `;

    grupos[clave].forEach(t => {

      let estado = "🟢 Vigente";
      let clase = "estado-verde";

      if (!t.activo) {
        estado = "⛔ Cancelado";
        clase = "estado-rojo";
      }
      else if (t.fecha_inicio && hoy < t.fecha_inicio) {
        estado = "🟡 Aún no inicia";
        clase = "estado-amarillo";
      }
      else if (t.fecha_fin && hoy > t.fecha_fin) {
        estado = "🔴 Vencido";
        clase = "estado-rojo";
      }

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <div class="nombre">${t.nombre}</div>
        <div class="estado ${clase}">${estado}</div>

        <input type="date" id="inicio_${t.id}" value="${t.fecha_inicio || ""}">
        <input type="date" id="fin_${t.id}" value="${t.fecha_fin || ""}">

        <button class="btn-renovar" onclick="renovar('${t.id}')">🔄 Guardar</button>

        ${
          t.activo
          ? `<button class="btn-cancelar" onclick="cancelar('${t.id}')">⛔ Cancelar</button>`
          : `<button class="btn-reactivar" onclick="reactivar('${t.id}')">🟢 Reactivar</button>`
        }
      `;

      bloque.appendChild(card);
    });

    lista.appendChild(bloque);
  });
}

// 🔄 RENOVAR
async function renovar(id) {
  const inicio = document.getElementById(`inicio_${id}`).value;
  const fin = document.getElementById(`fin_${id}`).value;

  const { error } = await supabaseClient
    .from("trabajadores_obra")
    .update({
      fecha_inicio: inicio || null,
      fecha_fin: fin || null,
      activo: true
    })
    .eq("id", id);

  if (error) {
    console.log("ERROR RENOVAR:", error);
    toast("Error al actualizar", "error");
    return;
  }

  toast("Permiso actualizado", "ok");
  cargar();
}

// ⛔ CANCELAR
function cancelar(id) {
  idCancelar = id;
  document.getElementById("modal").style.display = "flex";
}

function cerrarModal() {
  document.getElementById("modal").style.display = "none";
}

async function confirmarCancelacion() {

  const { error } = await supabaseClient
    .from("trabajadores_obra")
    .update({ activo: false })
    .eq("id", idCancelar);

  if (error) {
    console.log("ERROR CANCELAR:", error);
    toast("Error al cancelar", "error");
    return;
  }

  toast("Acceso cancelado", "warning");

  cerrarModal();
  cargar();
}

// 🟢 REACTIVAR
async function reactivar(id) {

  const { error } = await supabaseClient
    .from("trabajadores_obra")
    .update({ activo: true })
    .eq("id", id);

  if (error) {
    console.log("ERROR REACTIVAR:", error);
    toast("Error al reactivar", "error");
    return;
  }

  toast("Acceso reactivado", "ok");
  cargar();
}

</script>

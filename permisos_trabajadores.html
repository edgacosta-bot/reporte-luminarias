<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Permisos trabajadores</title>

<!-- 🔥 ORDEN CORRECTO -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

.logo-top {
  text-align: center;
  margin-bottom: 20px;
}

.logo-top img {
  width: 110px;
  height: auto;
  border-radius: 20px;
}  

.obra { margin-top: 25px; }

 .obra-header {
  background: #1e293b;
  padding: 12px;
  border-radius: 12px;
  cursor: pointer;
  font-weight: 600;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.obra-contenido {
  display: none;
  margin-top: 10px;
} 

.obra-titulo {
  font-weight: 600;
  font-size: 14px;
  color: #94a3b8;
  margin-bottom: 10px;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 10px;
}

.nombre { font-size: 18px; font-weight: 600; }
.estado { font-size: 13px; margin: 6px 0; }

input {
  width: 100%;
  box-sizing: border-box;
  padding: 10px 12px;
  margin-top: 5px;
  border-radius: 8px;
  border: none;
  background: #020617;
  color: white;
  cursor: pointer;
}

  
/* ==========================================================
   Calendario visible en tema oscuro
========================================================== */

input[type="date"]::-webkit-calendar-picker-indicator {

    filter: invert(1);
    cursor: pointer;
    opacity: 1;

}  

button {
  margin-top: 8px;
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  font-weight: 600;
  cursor: pointer;
}

.btn-renovar {
  background: #2563eb;
  color: white;
}

.btn-cancelar {
  background: #dc2626;
  color: white;
}

.btn-reactivar {
  background: #16a34a;
  color: white;
}

.btn-archivar {
  background: #475569;
  color: white;
} 

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}  

.estado-verde { color: #34d399; }
.estado-rojo { color: #f87171; }
.estado-amarillo { color: #fbbf24; }

#toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px 18px;
  border-radius: 10px;
  display: none;
  z-index: 999;
}

.toast-ok { background: #16a34a; }
.toast-error { background: #dc2626; }
.toast-warning { background: #f59e0b; }

.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-box {
  background: #1e293b;
  padding: 20px;
  border-radius: 16px;
  width: 85%;
  max-width: 320px;
  text-align: center;
}

.modal-actions {
  display: flex;
  gap: 10px;
}
</style>
</head>

<body>

<div class="container">

  <div class="logo-top">
  <img src="icono-512.png" alt="SIGVIC">

  </div>  
  
  <h2>🪪 Permisos de trabajadores</h2>
  <div id="lista"></div>
</div>

<div id="toast"></div>

<div id="modal" class="modal">
  <div class="modal-box">
    <p>¿Cancelar permiso?</p>
    <div class="modal-actions">
      <button
        type="button"
        onclick="cerrarModal()">
        Cancelar
      </button>

<button
type="button"
onclick="confirmarCancelacion()">
Confirmar
</button>
   
    </div>
  </div>
</div>

  <div id="modalArchivar" class="modal">

  <div class="modal-box">

    <p style="font-weight:bold;">
      ¿Archivar trabajador?
    </p>

    <p style="font-size:14px;color:#cbd5e1;">

      El trabajador dejará de aparecer en el listado.

      <br><br>

      Su historial permanecerá almacenado.

    </p>

    <div class="modal-actions">

      <button
        type="button"
        onclick="cerrarModalArchivar()">
        Cancelar
      </button>
        
     
     <button
      type="button"
      onclick="confirmarArchivado()">
      Archivar
      </button>

    </div>

  </div>

</div>

<script>

// 🔥 INICIO SEGURO
window.addEventListener("DOMContentLoaded", async () => {

  if (typeof protegerPagina === "function") {
    await protegerPagina(["admin", "administracion"]);
  } else {
    console.warn("⚠️ protegerPagina no disponible");
  }

  console.log("🚀 INICIANDO PERMISOS");   
  cargar();
});

let idCancelar = null;
let idArchivar = null; 
let obrasAbiertas = new Set();  
  
function toggleObra(id, elemento) {

  const contenido = document.getElementById(id);
  const flecha = elemento.querySelector(".flecha");

  if (contenido.style.display === "block") {

    contenido.style.display = "none";
    flecha.innerText = "▼";

    obrasAbiertas.delete(id);

  } else {

    contenido.style.display = "block";
    flecha.innerText = "▲";

    obrasAbiertas.add(id);

  }

}
  
  
function toast(msg, tipo="ok") {
  const t = document.getElementById("toast");
  t.className = `toast-${tipo}`;
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 2500);
}


async function cargar() {

 const { data, error } = await supabaseClient
    .from("trabajadores_obra")
    .select("*")
    .eq("visible", true)
    .order("created_at", { ascending: false });

  if (error) {
    console.log("ERROR:", error);
    document.getElementById("lista").innerHTML = "Error al cargar";
    return;
  }

  if (!data || data.length === 0) {
    document.getElementById("lista").innerHTML = "Sin registros";
    return;
  }

    // 🔥 CARGAR OBRAS
  const { data: obrasData } = await supabaseClient
    .from("obras")
    .select("privada,casa,estatus");

  const mapaObras = {};

  (obrasData || []).forEach(o => {

    const clave =
      `${o.privada}-${o.casa}`;

    mapaObras[clave] = o.estatus;
  });

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  const hoy = new Date().toLocaleDateString('sv-SE');
  const grupos = {};

  data.forEach(t => {
    const privada = t.privada || "SIN_PRIVADA";
    const casa = t.casa || "SIN_CASA";
    const clave = `${privada}-${casa}`;

    if (!grupos[clave]) grupos[clave] = [];
    grupos[clave].push(t);
  });

  Object.keys(grupos)

.sort((a, b) => {

  const [privadaA, casaA] = a.split("-");
  const [privadaB, casaB] = b.split("-");

  // 🔥 ORDEN PRIVADAS
  const ordenPrivadas = {
    "I": 1,
    "II": 2,
    "III": 3,
    "IV": 4
  };

  const privadaDiff =
    (ordenPrivadas[privadaA] || 999)
    -
    (ordenPrivadas[privadaB] || 999);

  if (privadaDiff !== 0) return privadaDiff;

  // 🔥 ORDEN LOTES
  return Number(casaA) - Number(casaB);

})

.forEach(clave => {

    const [privada, casa] = clave.split("-");

    const bloque = document.createElement("div");
bloque.className = "obra";

const contenidoId = `contenido_${privada}_${casa}`;

bloque.innerHTML = `
  <div class="obra-header" onclick="toggleObra('${contenidoId}', this)">
    <span>🏗 Privada ${privada} - Lote ${casa} (${grupos[clave].length})</span>
   <span class="flecha">▼</span>
  </div>

  <div class="obra-contenido" id="${contenidoId}">
  </div>
`;

    grupos[clave].forEach(t => {

      let estado = "🟢 Vigente";
      const claveObra =
  `${t.privada}-${t.casa}`;

const obraSuspendida =
  mapaObras[claveObra] === "suspendida";
      
      let clase = "estado-verde";

     if (obraSuspendida) {

  estado = "⛔ Obra suspendida";
  clase = "estado-rojo";

}
else if (!t.activo) {

  estado = "⛔ Cancelado";
  clase = "estado-rojo";

}
else if (t.fecha_inicio && hoy < t.fecha_inicio) {

  estado = "🟡 Aún no inicia";
  clase = "estado-amarillo";

}
else if (t.fecha_fin && hoy > t.fecha_fin) {

  estado = "🔴 Vencido";
  clase = "estado-rojo";
}

      const card = document.createElement("div");
      card.className = "card";

      const botonesBloqueados = obraSuspendida;
      card.innerHTML = `
        <div class="nombre">${t.nombre}</div>
        <div class="estado ${clase}">${estado}</div>

      <div class="fecha-input">

 <input
  type="date"
  id="inicio_${t.id}"
  value="${t.fecha_inicio || ""}"
  ${botonesBloqueados ? "disabled" : ""}>
       
        
      <input
  type="date"
  id="fin_${t.id}"
  value="${t.fecha_fin || ""}"
  onpointerdown="ui.abrirCalendario(this)"
  ${botonesBloqueados ? "disabled" : ""}>

        
               <button
  class="btn-renovar"
  ${botonesBloqueados ? "disabled" : ""} onclick="renovar('${t.id}')">🔄 Guardar</button>

        ${
  t.activo
  ? `
<button
class="btn-cancelar"
${botonesBloqueados ? "disabled" : ""} onclick="cancelar('${t.id}')">
⛔ Cancelar
</button>

<button
class="btn-archivar"
${botonesBloqueados ? "disabled" : ""} onclick="archivar('${t.id}')">
🗑 Archivar
</button>
`
  : `
<button
class="btn-reactivar"
${botonesBloqueados ? "disabled" : ""} onclick="reactivar('${t.id}')">
🟢 Reactivar
</button>

<button
class="btn-archivar"
${botonesBloqueados ? "disabled" : ""} onclick="archivar('${t.id}')">
🗑 Archivar
</button>
`
}
      `;

      bloque.querySelector(".obra-contenido").appendChild(card);
    });

    lista.appendChild(bloque);

    // 🔥 Restaurar acordeones abiertos

if (obrasAbiertas.has(contenidoId)) {

  const contenido = document.getElementById(contenidoId);

  contenido.style.display = "block";

  bloque.querySelector(".flecha").innerText = "▲";

}
  
  });
}

// 🔄 RENOVAR

async function renovar(id) {

  const inicio =
    document.getElementById(`inicio_${id}`).value;

  const fin =
    document.getElementById(`fin_${id}`).value;

  const { data, error } =
    await supabaseClient.rpc(

      "renovar_permiso_trabajador",

      {
        p_trabajador_id: id,
        p_fecha_inicio: inicio || null,
        p_fecha_fin: fin || null
      }

    );

  if (error) {

    console.error(error);

    toast("Error al actualizar.", "error");

    return;

  }

  if (!data.ok) {

    toast(data.mensaje, "warning");

    return;

  }

  toast(data.mensaje, "ok");

  cargar();

}
// ⛔ CANCELAR
function cancelar(id) {
  idCancelar = id;
  document.getElementById("modal").style.display = "flex";
}

function cerrarModal() {
  document.getElementById("modal").style.display = "none";
}

// 🗑 ARCHIVAR

function archivar(id) {

  idArchivar = id;

  document.getElementById("modalArchivar").style.display = "flex";

}

function cerrarModalArchivar() {

  document.getElementById("modalArchivar").style.display = "none";

  idArchivar = null;

}

async function confirmarArchivado() {

  const { data, error } = await supabaseClient.rpc(
    "archivar_trabajador",
    {
      p_trabajador_id: idArchivar
    }
  );

  if (error) {

    console.error(error);

    toast("Error al archivar.", "error");

    return;

  }

  if (!data.ok) {

    toast(data.mensaje, "warning");

    cerrarModalArchivar();

    return;

  }

  toast(data.mensaje, "ok");

  cerrarModalArchivar();

  cargar();

}
  
async function confirmarCancelacion() {

  const { data, error } = await supabaseClient.rpc(
    "cancelar_trabajador",
    {
      p_trabajador_id: idCancelar
    }
  );

  if (error) {

    console.error(error);

    toast("Error al cancelar.", "error");

    return;

  }

  if (!data.ok) {

    toast(data.mensaje, "warning");

    cerrarModal();

    return;

  }

  toast(data.mensaje, "warning");

  cerrarModal();

  cargar();

}

  

// 🟢 REACTIVAR

async function reactivar(id) {

  const { data, error } = await supabaseClient.rpc(
    "reactivar_trabajador",
    {
      p_trabajador_id: id
    }
  );

  if (error) {

    console.error(error);

    toast("Error al reactivar.", "error");

    return;

  }

  if (!data.ok) {

    toast(data.mensaje, "warning");

    return;

  }

  toast(data.mensaje, "ok");

  cargar();

}
</script>

</body>
</html>

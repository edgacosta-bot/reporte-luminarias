<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrega de paquetes</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="utils/dates.js"></script>

    <link rel="stylesheet" href="styles/entrega_paquetes.css">
</head>

<body>

<div class="container">

<div class="header">
  <h2>📦 Entrega de paquetes</h2>
</div>

<input type="text" id="buscador" placeholder="Buscar lote..." oninput="filtrar()">

<div id="lista"></div>

<a href="index.html" class="button-sec">Regresar</a>

</div>

<div id="modal" class="modal">
  <div class="modal-content" id="modalContenido"></div>
</div>

<script>

// 🔐 PROTECCIÓN
window.addEventListener("DOMContentLoaded", async () => {
    await protegerPagina([
  "vigilante",
  "administracion"
]);
  rolActual = localStorage.getItem("rol");
  console.log("ROL:", rolActual);
  cargar();
});

let paqueteId = null;
let rolActual = null;  

function mostrarModal(titulo, texto, tipo="") {

  let inputPin = "";
  let botones = `<button onclick="cerrarModal()">Cerrar</button>`;

  if (tipo === "confirmar") {

    inputPin = `
      <input type="password" id="pin" placeholder="PIN vigilante">
    `;

    botones = `
      <button onclick="confirmarEntrega()">Confirmar entrega</button>
      <button onclick="cerrarModal()">Cancelar</button>
    `;
  }

  document.getElementById("modalContenido").innerHTML = `
    <h3>${titulo}</h3>
    <p>${texto}</p>
    ${inputPin}
    ${botones}
  `;

  document.getElementById("modal").style.display = "flex";
}

function cerrarModal() {
  document.getElementById("modal").style.display = "none";
}

async function cargar() {

  const { data, error } = await supabaseClient
    .from('paquetes')
    .select('*')
    .eq('entregado', false)
    .order('fecha_recepcion', { ascending: false });

  if (error) {
    console.error(error);
    mostrarModal("Error", "No se pudo cargar");
    return;
  }

  render(data);
}

function render(data) {

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  if (!data || data.length === 0) {
    lista.innerHTML = "<p>No hay paquetes pendientes</p>";
    return;
  }

  data.forEach(p => {

    const fecha = formatMXDate(p.fecha_recepcion);

    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <span>
        Privada ${p.privada} - Lote ${p.casa}<br>
        <small>${fecha}</small>
      </span>
     ${["vigilante","vigilancia"]
    .includes(rolActual)
  ? `
    <button class="button"
            onclick="prepararEntrega('${p.id}')">
      Entregar
    </button>
  `
  : `
    <span style="
      color:#9ca3af;
      font-size:12px;
    ">
      Solo vigilancia
    </span>
  `
}
    `;

    lista.appendChild(div);
  });
}

function prepararEntrega(id) {

  if (
  !["vigilante","vigilancia"]
    .includes(rolActual)
) {
  mostrarModal(
    "Acceso denegado",
    "Solo vigilancia puede entregar paquetes."
  );
  return;
}
  
  paqueteId = id;

  mostrarModal(
    "Confirmar entrega",
    "Confirma que el residente recibió el paquete.",
    "confirmar"
  );
}

async function confirmarEntrega() {

  try {

    const pin = document.getElementById("pin").value;

    if (!pin || pin.length < 4) {
      throw new Error("PIN inválido");
    }

    const { data: vigilante } = await supabaseClient
      .from("residentes")
      .select("id")
      .eq("pin_vigilante", pin)
      .maybeSingle();

    if (!vigilante) {
      throw new Error("PIN incorrecto");
    }

    const { error } = await supabaseClient
      .from('paquetes')
      .update({
        entregado: true,
        fecha_entrega: new Date().toISOString(),
        entregado_por: vigilante.id
      })
      .eq('id', paqueteId);

    if (error) {
      console.error(error);
      throw new Error("No se pudo actualizar");
    }

    mostrarModal("Listo", "Entrega registrada correctamente");
    cargar();

  } catch (err) {
    console.error(err);
    mostrarModal("Error", err.message);
  }
}

function filtrar() {
  const valor = document.getElementById("buscador").value.toLowerCase();
  const items = document.querySelectorAll(".item");

  items.forEach(i => {
    const texto = i.innerText.toLowerCase();
    i.style.display = texto.includes(valor) ? "flex" : "none";
  });
}

// 🔄 AUTO REFRESH
setInterval(cargar, 10000);

</script>

</body>
</html>

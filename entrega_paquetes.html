<script>

window.addEventListener("DOMContentLoaded", async () => {
  await protegerPagina(["vigilante"]);
  cargar();
});

let paqueteId = null;

function mostrarModal(titulo, texto, tipo="") {

  let botones = `<button onclick="cerrarModal()">Cerrar</button>`;

  if (tipo === "confirmar") {
    botones = `
      <button onclick="confirmarEntrega()">Confirmar entrega</button>
      <button onclick="cerrarModal()">Cancelar</button>
    `;
  }

  document.getElementById("modalContenido").innerHTML = `
    <h3>${titulo}</h3>
    <p>${texto}</p>
    ${botones}
  `;

  document.getElementById("modal").style.display = "flex";
}

function cerrarModal() {
  document.getElementById("modal").style.display = "none";
}

async function cargar() {

  const { data, error } = await supabaseClient
    .from('paquetes')
    .select('*')
    .eq('entregado', false)
    .order('fecha_recepcion', { ascending: false });

  if (error) {
    console.error(error);
    mostrarModal("Error", "No se pudo cargar");
    return;
  }

  render(data);
}

function render(data) {

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  if (!data || data.length === 0) {
    lista.innerHTML = "<p>No hay paquetes pendientes</p>";
    return;
  }

  data.forEach(p => {

    const fecha = formatMXDate(p.fecha_recepcion); // 🔥 homologado

    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <span>
        Privada ${p.privada} - Lote ${p.casa}<br>
        <small>${fecha}</small>
      </span>
      <button class="button" onclick="prepararEntrega('${p.id}')">
        Entregar
      </button>
    `;

    lista.appendChild(div);
  });
}

function prepararEntrega(id) {
  paqueteId = id;

  mostrarModal(
    "Confirmar entrega",
    "Confirma que el residente recibió el paquete.",
    "confirmar"
  );
}

async function confirmarEntrega() {

  try {

    const { data: userData } = await supabaseClient.auth.getUser();
    const user = userData?.user;

    if (!user) {
      throw new Error("Sesión no válida");
    }

    const updateData = {
      entregado: true,
      fecha_entrega: new Date().toISOString()
    };

    // 🔥 SOLO si existe usuario
    if (user.id) {
      updateData.entregado_por = user.id;
    }

    const { error } = await supabaseClient
      .from('paquetes')
      .update(updateData)
      .eq('id', paqueteId);

    if (error) {
      console.error("ERROR UPDATE:", error);
      throw error;
    }

    mostrarModal("Listo", "Entrega registrada correctamente");
    cargar();

  } catch (err) {
    console.error(err);
    mostrarModal("Error", err.message || "No se pudo actualizar");
  }
}

function filtrar() {
  const valor = document.getElementById("buscador").value.toLowerCase();
  const items = document.querySelectorAll(".item");

  items.forEach(i => {
    const texto = i.innerText.toLowerCase();
    i.style.display = texto.includes(valor) ? "flex" : "none";
  });
}

setInterval(cargar, 10000);

</script>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 🔥 PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#4B2E83">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="icon" href="/icono-192.png">
  <link rel="preload" href="/icono-512.png" as="image">

  <title>Acceso</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #161a1d;
      color: white;
      height: 100vh;
      overflow: hidden;
    }

    /* 🔥 INTRO */
    .intro {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #161a1d;
      z-index: 10;
    }

    .logo {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: #4B2E83;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pop 0.8s ease;
    }

    .logo img {
      width: 70%;
    }

    @keyframes pop {
      0% { transform: scale(0.7); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .titulo {
      margin-top: 20px;
      font-size: 18px;
      color: #e5e7eb;
      letter-spacing: 1px;
      opacity: 0;
      animation: fadeIn 1s ease forwards;
      animation-delay: 0.5s;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* 🔥 CINTILLO */
    .cinta {
      position: absolute;
      bottom: 40px;
      width: 100%;
      overflow: hidden;
    }

    .cinta span {
      display: inline-block;
      white-space: nowrap;
      padding-left: 100%;
      animation: scroll 6s linear infinite;
      color: #a57f2c;
      font-size: 13px;
    }

    @keyframes scroll {
      from { transform: translateX(0); }
      to { transform: translateX(-100%); }
    }

    /* LOGIN */
    .card {
      position: relative;
      z-index: 1;
      display: none;
      background: #111827;
      padding: 30px 20px;
      border-radius: 20px;
      width: 90%;
      max-width: 400px;
      margin: auto;
      top: 50%;
      transform: translateY(-50%);
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      text-align: center;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: none;
      background: #1f2937;
      color: white;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #4B2E83;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #4B2E83;
      padding: 10px 15px;
      border-radius: 8px;
      display: none;
    }
  </style>
</head>

<body>

<!-- 🔥 INTRO -->
<div class="intro" id="intro">
  <div class="logo">
    <img src="/icono-512.png">
  </div>

  <div class="titulo">Villas de la Concepción</div>

  <div class="cinta">
    <span>Bienvenido • Seguridad • Comunidad • Control vecinal • Villas de la Concepción •</span>
  </div>
</div>

<!-- LOGIN -->
<div class="card" id="loginCard">
  <h2>Acceso</h2>

  <input type="text" id="privada" placeholder="Privada">
  <input type="text" id="casa" placeholder="Lote">
  <input type="password" id="clave" placeholder="Clave">

  <button onclick="login()">Entrar</button>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const { createClient } = supabase;

const supabaseClient = createClient(
  "https://prjxmfhahnzosdwljode.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs"
);

// INTRO → LOGIN
setTimeout(() => {
  document.getElementById("intro").style.display = "none";
  document.getElementById("loginCard").style.display = "block";
}, 2200);

// TOAST
function toast(msg) {
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 2000);
}

async function login() {
  const privada = document.getElementById("privada").value.trim();
  const casa = document.getElementById("casa").value.trim();
  const clave = document.getElementById("clave").value;

  if (!privada || !casa || !clave) {
    toast("Completa datos");
    return;
  }

  const { data } = await supabaseClient
    .from("residentes")
    .select("*")
    .eq("privada", privada)
    .eq("casa", casa)
    .eq("clave", clave)
    .maybeSingle();

  if (!data) {
    toast("Datos incorrectos");
    return;
  }

  let rol = data.tipo;
  if (rol === "residente") rol = "colono";
  if (rol === "administracion") rol = "admin";
  if (rol === "vigilante") rol = "vigilante";

  localStorage.setItem("usuario_valido", "true");
  localStorage.setItem("rol", rol);

  window.location.href = "index.html";
}

// SW
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>

</body>
</html>

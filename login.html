<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 🔥 PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#4B2E83">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="icon" href="/icono-192.png">

  <title>Acceso</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      background: #111827;
      padding: 30px 20px;
      border-radius: 20px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      text-align: center;
    }

    /* 🔥 ICONO */
    .logo {
      width: 90px;
      height: 90px;
      margin: 0 auto 10px;
      border-radius: 50%;
      background: #4B2E83;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeScale 0.6s ease;
    }

    .logo img {
      width: 65%;
    }

    @keyframes fadeScale {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

    /* 🔥 TEXTO */
    .brand {
      font-size: 16px;
      margin-bottom: 10px;
      color: #e5e7eb;
    }

    /* 🔥 LÍNEA ANIMADA */
    .linea {
      height: 3px;
      width: 100%;
      background: #1f2937;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 20px;
      position: relative;
    }

    .linea::after {
      content: "";
      position: absolute;
      height: 100%;
      width: 35%;
      background: #4B2E83;
      animation: mover 2s linear infinite;
      border-radius: 2px;
    }

    @keyframes mover {
      0% { left: -35%; }
      100% { left: 100%; }
    }

    h2 { margin-bottom: 10px; }

    p {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 15px;
    }

    .ayuda {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 20px;
      line-height: 1.4;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      box-sizing: border-box;
      background: #1f2937;
      color: white;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .mensaje { margin-top: 15px; font-size: 14px; }
    .error { color: #f87171; }

    .registro-link {
      margin-top: 15px;
      font-size: 13px;
      color: #9ca3af;
    }

    .registro-link a {
      color: #60a5fa;
      text-decoration: underline;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="card">

  <!-- 🔥 ICONO + TEXTO DESDE EL INICIO -->
  <div class="logo">
    <img src="/icono-512.png">
  </div>

  <div class="brand">🏡 Villas de la Concepción</div>

  <div class="linea"></div>

  <h2>Acceso al sistema</h2>
  <p>Ingresa tus datos</p>

  <div class="ayuda">
    Colonos: I, II, III, IV<br>
    Administrador: ADMIN<br>
    Vigilancia: SEG
  </div>

  <input type="text" id="privada" placeholder="Privada o tipo de acceso">
  <input type="text" id="casa" placeholder="Número de casa">
  <input type="password" id="clave" placeholder="Contraseña (4 dígitos)" maxlength="4">

  <button onclick="login()">Entrar</button>

  <div id="mensaje" class="mensaje"></div>

  <div class="registro-link">
    ¿No tienes acceso aún?
    <br>
    <a href="registro.html">Registrarse</a>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const { createClient } = supabase;

const supabaseClient = createClient(
  "https://prjxmfhahnzosdwljode.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs"
);

async function login() {
  try {
    const privada = document.getElementById("privada").value.trim();
    const casa = document.getElementById("casa").value.trim();
    const clave = document.getElementById("clave").value;
    const mensaje = document.getElementById("mensaje");

    mensaje.className = "mensaje";

    if (!privada || !casa || !clave) {
      mensaje.innerText = "Completa todos los campos";
      mensaje.classList.add("error");
      return;
    }

    const { data, error } = await supabaseClient
      .from("residentes")
      .select("*")
      .eq("privada", privada)
      .eq("casa", casa)
      .eq("clave", clave)
      .maybeSingle();

    if (error || !data) {
      mensaje.innerText = "Datos incorrectos";
      mensaje.classList.add("error");
      return;
    }

    let rol = data.tipo;

    if (rol === "residente") rol = "colono";
    if (rol === "administracion") rol = "admin";
    if (rol === "vigilante") rol = "vigilante";

    localStorage.setItem("usuario_valido", "true");
    localStorage.setItem("rol", rol);

    window.location.href = "index.html";

  } catch {
    document.getElementById("mensaje").innerText = "Error inesperado";
  }
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>

</body>
</html>

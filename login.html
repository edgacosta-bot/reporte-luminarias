<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      background: #111827;
      padding: 30px 20px;
      border-radius: 20px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      text-align: center;
    }

    h2 { margin-bottom: 10px; }

    p {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 20px;
    }

    select, input {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      box-sizing: border-box;
      background: #1f2937;
      color: white;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .mensaje { margin-top: 15px; font-size: 14px; }
    .error { color: #f87171; }

    .registro-link {
      margin-top: 15px;
      font-size: 13px;
      color: #9ca3af;
    }

    .registro-link a {
      color: #60a5fa;
      text-decoration: underline;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Acceso al sistema</h2>
  <p>Ingresa tus datos</p>

  <select id="privada">
    <option value="">Selecciona privada</option>
    <option value="I">Privada I</option>
    <option value="II">Privada II</option>
    <option value="III">Privada III</option>
    <option value="IV">Privada IV</option>
  </select>

  <input type="number" id="casa" placeholder="Número de casa">
  <input type="password" id="clave" placeholder="Contraseña (4 dígitos)" maxlength="4">

  <button onclick="login()">Entrar</button>

  <div id="mensaje" class="mensaje"></div>

  <!-- 🔗 NUEVO ENLACE -->
  <div class="registro-link">
    ¿No tienes acceso aún?
    <br>
    <a href="registro.html">Registrarse</a>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  const { createClient } = supabase;

  const supabaseClient = createClient(
    "https://prjxmfhahnzosdwljode.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs"
  );

  async function login() {
    const privada = document.getElementById("privada").value;
    const casa = document.getElementById("casa").value;
    const clave = document.getElementById("clave").value;
    const mensaje = document.getElementById("mensaje");

    mensaje.className = "mensaje";

    if (!privada || !casa || !clave) {
      mensaje.innerText = "Completa todos los campos";
      mensaje.classList.add("error");
      return;
    }

    const { data, error } = await supabaseClient
      .from("residentes")
      .select("*")
      .eq("privada", privada)
      .eq("casa", casa)
      .eq("clave", clave)
      .single();

    if (error || !data) {
      mensaje.innerText = "Datos incorrectos";
      mensaje.classList.add("error");
      return;
    }

    localStorage.setItem("usuario_valido", "true");
    localStorage.setItem("privada", privada);
    localStorage.setItem("casa", casa);

    window.location.href = "index.html";
  }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 🔥 PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0f172a">

  <title>Acceso</title>

          <link rel="stylesheet" href="styles/global.css">
<link rel="stylesheet" href="styles/login.css">
</head>

<body>

<div class="card">

 <div class="logo-login">
  <img src="/logo-sigvic-dark.png" class="logo-sigvic-login">
</div>

  <h2>Acceso al sistema</h2>
  <p>Ingresa tus datos</p>

 
  <input type="text" id="privada" placeholder="Privada o tipo de acceso">
  <input type="text" id="casa" placeholder="Número de casa">
  <div class="password-container">

  <input
    type="password"
    id="clave"
    placeholder="Contraseña"
    maxlength="35">

  <span
    class="toggle-password"
    onclick="togglePassword()">

    👁️

  </span>

</div>

  <button onclick="login()">Entrar</button>

  <div id="mensaje" class="mensaje"></div>

  <div class="registro-link">
    ¿No tienes acceso aún?
    <br>
    <a href="registro.html">Registrarse</a>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>  

<script>

async function login() {
  try {
    const privada = document.getElementById("privada").value.trim();
    const casa = document.getElementById("casa").value.trim();
    const clave = document.getElementById("clave").value.trim();
    const mensaje = document.getElementById("mensaje");

    mensaje.className = "mensaje";

    if (!privada || !casa || !clave) {
      mensaje.innerText = "Completa todos los campos";
      mensaje.classList.add("error");
      return;
    }

    const email = `${privada.toLowerCase()}-${casa}@villas.com`;
    const password = clave;

    const { data, error } = await supabaseClient.auth.signInWithPassword({
      email,
      password
    });

    if (error) {
      mensaje.innerText = "Datos incorrectos";
      mensaje.classList.add("error");
      return;
    }

    const user = data.user;

    // 🔍 VALIDAR VÍNCULO (SIN AUTO-CREAR)
   const { data: residente, error: err2 } = await supabaseClient
  .from("residentes")
  .select("id, privada, casa, tipo, identificador")
  .eq("user_id", user.id)
  .maybeSingle();

    if (err2) {
      mensaje.innerText = "Error al validar usuario";
      mensaje.classList.add("error");
      return;
    }

    if (!residente) {
      mensaje.innerText = "Usuario no vinculado";
      mensaje.classList.add("error");
      return;
    }

    // 🧠 MAPEAR ROL
    let rol = residente.tipo;

    if (rol === "residente") rol = "colono";
    if (rol === "administracion") rol = "admin";
    if (rol === "vigilante") rol = "vigilante";

    // 💾 SESIÓN LOCAL
    localStorage.setItem("usuario_valido", "true");
    localStorage.setItem("privada", residente.privada);
    localStorage.setItem("casa", residente.casa);
    localStorage.setItem("rol", rol);
    localStorage.setItem("identificador", residente.identificador);

    window.location.href = "index.html";

  } catch (err) {
    console.error(err);
    document.getElementById("mensaje").innerText = "Error inesperado";
  }
}

function togglePassword(){

  const input =
    document.getElementById(
      "clave"
    );

  if(
    input.type === "password"
  ){

    input.type = "text";

  }else{

    input.type = "password";

  }

}
  
// 🔥 SERVICE WORKER
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
    .then(() => console.log('SW registrado'));
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 🔥 PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#4B2E83">
  <link rel="apple-touch-icon" href="/icono-512.png">

  <title>Acceso</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #161a1d, #1e293b);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      background: #111827;
      padding: 30px 20px;
      border-radius: 20px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      text-align: center;
    }

    /* LOGO (sin círculo extra) */
    .logo {
      margin: 0 auto 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      animation: fadeScale 0.6s ease;
    }

    .logo img {
      width: 90px;
      display: block;
    }

    @keyframes fadeScale {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .titulo-app {
      font-size: 16px;
      color: #cbd5f5;
      margin-bottom: 10px;
    }

    /* LINEA ANIMADA */
    .linea {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 20px;
      position: relative;
    }

    .linea::after {
      content: "";
      position: absolute;
      width: 40%;
      height: 100%;
      background: #4B2E83;
      animation: mover 2s infinite;
      border-radius: 10px;
    }

    @keyframes mover {
      0% { left: -40%; }
      100% { left: 100%; }
    }

    h2 { margin-bottom: 10px; }

    p {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 15px;
    }

    .ayuda {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 20px;
      line-height: 1.4;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      box-sizing: border-box;
      background: #1f2937;
      color: white;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #4B2E83;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.1s ease;
    }

    button:active {
      transform: scale(0.97);
    }

    .registro-link {
      margin-top: 15px;
      font-size: 13px;
      color: #9ca3af;
    }

    .registro-link a {
      color: #a57f2c;
      text-decoration: underline;
      cursor: pointer;
    }

    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #4B2E83;
      color: white;
      padding: 12px 18px;
      border-radius: 10px;
      display: none;
      z-index: 999;
    }
  </style>
</head>

<body>

<div class="card">

  <!-- LOGO -->
  <div class="logo">
    <img src="/icono-512.png">
  </div>

  <div class="titulo-app">Villas de la Concepción</div>
  <div class="linea"></div>

  <h2>Acceso al sistema</h2>
  <p>Ingresa tus datos</p>

  <div class="ayuda">
    Colonos: I, II, III, IV<br>
    Administrador: ADMIN<br>
    Vigilancia: SEG
  </div>

  <input type="text" id="privada" placeholder="Privada o tipo de acceso">
  <input type="text" id="casa" placeholder="Número de lote">
  <input type="password" id="clave" placeholder="Contraseña (4 dígitos)" maxlength="4">

  <button onclick="login()">Entrar</button>

  <div class="registro-link">
    ¿No tienes acceso aún?<br>
    <a href="registro.html">Registrarse</a>
  </div>

</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const { createClient } = supabase;

const supabaseClient = createClient(
  "https://prjxmfhahnzosdwljode.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA476375765.XXXX"
);

function toast(msg) {
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 2500);
}

async function login() {
  try {
    const privada = document.getElementById("privada").value.trim();
    const casa = document.getElementById("casa").value.trim();
    const clave = document.getElementById("clave").value;

    if (!privada || !casa || !clave) {
      toast("Completa todos los campos");
      return;
    }

    const { data, error } = await supabaseClient
      .from("residentes")
      .select("*")
      .eq("privada", privada)
      .eq("casa", casa)
      .eq("clave", clave)
      .maybeSingle();

    if (error || !data) {
      toast("Datos incorrectos");
      return;
    }

    let rol = data.tipo;

    if (rol === "residente") rol = "colono";
    if (rol === "administracion") rol = "admin";
    if (rol === "vigilante") rol = "vigilante";

    localStorage.setItem("usuario_valido", "true");
    localStorage.setItem("privada", privada);
    localStorage.setItem("casa", casa);
    localStorage.setItem("rol", rol);

    toast("Acceso correcto");

    setTimeout(() => {
      window.location.href = "index.html";
    }, 800);

  } catch (err) {
    toast("Error inesperado");
  }
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>

</body>
</html>

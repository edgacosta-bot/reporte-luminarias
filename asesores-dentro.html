<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Actividad Inmobiliaria</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="auth.js"></script>

<script src="utils/dates.js"></script>

<style>

body{
  margin:0;
  font-family:'Segoe UI';
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
}

.container{
  max-width:700px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
}

.kpi{
  background:#111827;
  border-radius:18px;
  padding:20px;
  text-align:center;
  margin-bottom:20px;
}

.kpi span{
  font-size:34px;
  font-weight:bold;
}

.card{
  background:#111827;
  border-radius:18px;
  padding:18px;
  margin-bottom:12px;
}

.titulo-asesor{

  font-size:18px;

  font-weight:bold;

  color:#93c5fd;

  margin-bottom:10px;

}

.clientes{

  margin-top:10px;

  padding:10px;

  border-radius:12px;

  background:#1f2937;

}

.dentro{
  color:#fbbf24;
  font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

  <h1>
    🏠 Actividad Inmobiliaria
  </h1>

  <div class="kpi">

    🏠 Asesores dentro

    <br><br>

    <span id="kpiAsesores">
      0
    </span>

    <br><br>

    👥 Clientes dentro:

    <b id="kpiClientes">
      0
    </b>

  </div>

  <div id="lista"></div>

</div>

<script>

let asesores = [];

async function cargar(){

  const { data, error } =
    await supabaseClient.rpc(
      "obtener_asesores_dentro"
    );

  if(error){

    console.log(error);

    return;

  }

  asesores = data || [];

  const totalAsesores =
    asesores.length;

  const totalClientes =
    asesores.reduce(
      (s,a)=>
        s +
        Number(
          a.clientes_dentro || 0
        ),
      0
    );

  document.getElementById(
    "kpiAsesores"
  ).innerText =
    totalAsesores;

  document.getElementById(
    "kpiClientes"
  ).innerText =
    totalClientes;

  console.log(
    "Asesores:",
    asesores
  );

}

  asesores = data || [];

  console.log(
    "Asesores:",
    asesores
  );

}

window.addEventListener(
  "DOMContentLoaded",
  async ()=>{

    await protegerPagina([
      "admin",
      "administracion",
      "vigilante"
    ]);

    await cargar();

  }
);

</script>

</body>
</html>

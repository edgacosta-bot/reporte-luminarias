<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro</title>

          <link rel="stylesheet" href="styles/global.css">
<link rel="stylesheet" href="styles/registro.css">
</head>

<body>

<div class="card">
  <h2>Registro de vecino</h2>


  <input id="privada" placeholder="Ejemplo: I, II, III, IV">
   
  <input id="casa" placeholder="Número de casa">
  <input id="nombre" placeholder="Tu nombre">
  <input type="password" id="clave" placeholder="Contraseña">
  <input type="password" id="confirmar_clave" placeholder="Confirmar contraseña">

  <button onclick="registrar()">Registrarme</button>
  <div id="mensaje" class="mensaje"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const { createClient } = supabase;

const supabaseClient = createClient(
  "https://prjxmfhahnzosdwljode.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs",
  {
    auth: {
      persistSession: false,
      autoRefreshToken: false,
      detectSessionInUrl: false
    }
  }
);


async function registrar() {
  
supabaseClient.auth.signOut();
  
  const privada = document.getElementById("privada").value.trim().toUpperCase();
  const casa = document.getElementById("casa").value.trim();
  const nombre = document.getElementById("nombre").value.trim();
  const clave = document.getElementById("clave").value;
  const confirmar = document.getElementById("confirmar_clave").value;
  const mensaje = document.getElementById("mensaje");

  mensaje.className = "mensaje";

  if (!privada || !casa || !nombre || !clave || !confirmar) {
    mensaje.innerText = "Completa todos los campos";
    mensaje.classList.add("error");
    return;
  }

  if (clave !== confirmar) {
    mensaje.innerText = "Las contraseñas no coinciden";
    mensaje.classList.add("error");
    return;
  }

  // validar vivienda
  const { data: vivienda, error } = await supabaseClient
    .from("residentes")
    .select("habilitado_registro, registrado")
    .eq("privada", privada)
    .eq("casa", casa)
    .maybeSingle();

  if (error || !vivienda) {
    mensaje.innerText = "Vivienda no válida";
    mensaje.classList.add("error");
    return;
  }

  if (!vivienda.habilitado_registro) {
    mensaje.innerText = "No habilitada para registro";
    mensaje.classList.add("error");
    return;
  }

  if (vivienda.registrado) {
    mensaje.innerHTML = `Ya registrado<br><a href="login.html">Ir a login</a>`;
    return;
  }

  const email = `${privada.toLowerCase()}-${casa}@villas.com`;

  let user;

const { data: authData, error: authError } =
  await supabaseClient.auth.signUp({ email, password: clave });

if (authError) {

  if (authError.message.includes("already registered")) {

    // 🔥 INTENTAR LOGIN
    const { data: loginData, error: loginError } =
      await supabaseClient.auth.signInWithPassword({
        email,
        password: clave
      });

    if (loginError) {
      mensaje.innerText = "Usuario ya existe, pero contraseña incorrecta";
      mensaje.classList.add("error");
      return;
    }

    user = loginData.user;

  } else {
    mensaje.innerText = authError.message;
    mensaje.classList.add("error");
    return;
  }

} else {
  user = authData.user;
}

 if (!user) {
  mensaje.innerText = "Error obteniendo usuario";
  mensaje.classList.add("error");
  return;
}

  // 🔥 AQUÍ ESTÁ LA CLAVE
  const { error: rpcError } = await supabaseClient.rpc("registrar_vivienda", {
    p_privada: privada,
    p_casa: casa,
    p_user_id: user.id,
    p_nombre: nombre
  });

  if (rpcError) {
    mensaje.innerText = "Error al vincular vivienda";
    mensaje.classList.add("error");
    return;
  }

  await supabaseClient.auth.signOut();

  mensaje.innerText = "Registro exitoso";
  mensaje.classList.add("ok");

  setTimeout(() => window.location.href = "login.html", 1200);
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      background: #111827;
      padding: 30px 20px;
      border-radius: 20px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      text-align: center;
    }

    h2 { margin-bottom: 10px; }

    p {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 20px;
    }

    select, input {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      box-sizing: border-box;
    }

    input { background: #1f2937; color: white; }
    select { background: #1f2937; color: white; }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .mensaje { margin-top: 15px; font-size: 14px; }
    .error { color: #f87171; }
    .ok { color: #34d399; }
  </style>
</head>

<body>

<div class="card">
  <h2>Registro de vecino</h2>
  <p>Ingresa tus datos para acceder al sistema</p>

  <select id="privada">
    <option value="">Selecciona privada</option>
    <option value="I">Privada I</option>
    <option value="II">Privada II</option>
    <option value="III">Privada III</option>
    <option value="IV">Privada IV</option>
  </select>

  <input type="text" id="casa" placeholder="Número de casa">
  <input type="text" id="nombre" placeholder="Tu nombre">

  <input type="password" id="clave" placeholder="Contraseña (mínimo 6 caracteres)">
  <input type="password" id="confirmar_clave" placeholder="Confirmar contraseña">

  <button onclick="registrar()">Registrarme</button>

  <div id="mensaje" class="mensaje"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const { createClient } = supabase;

const supabaseClient = createClient(
  "https://prjxmfhahnzosdwljode.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs",
  {

    
    auth: {
      persistSession: false,
      autoRefreshToken: false,
      detectSessionInUrl: false
    }
  }
);

console.log("SUPABASE URL:", supabaseClient.supabaseUrl);
  
async function registrar() {

  const privada = document.getElementById("privada").value.trim().toUpperCase();
  const casa = document.getElementById("casa").value.trim();
  const nombre = document.getElementById("nombre").value.trim();
  const clave = document.getElementById("clave").value;
  const confirmar = document.getElementById("confirmar_clave").value;
  const mensaje = document.getElementById("mensaje");

  mensaje.className = "mensaje";

  if (!privada || !casa || !nombre || !clave || !confirmar) {
    mensaje.innerText = "Completa todos los campos";
    mensaje.classList.add("error");
    return;
  }

  if (clave.length < 6) {
    mensaje.innerText = "La contraseña debe tener al menos 6 caracteres";
    mensaje.classList.add("error");
    return;
  }

  if (clave !== confirmar) {
    mensaje.innerText = "Las contraseñas no coinciden";
    mensaje.classList.add("error");
    return;
  }

  // 🔍 Validar lote
  const { data: vivienda, error } = await supabaseClient
  .from("residentes")
  .select("id, privada, casa, habilitado_registro, registrado")
  .eq("privada", privada)
  .eq("casa", casa)
  .maybeSingle();

console.log("DEBUG VIVIENDA:");
console.log("privada enviada:", privada);
console.log("casa enviada:", casa);
console.log("resultado:", vivienda);
console.log("error:", error);

 if (error) {
  console.error("ERROR REAL:", error);
  mensaje.innerText = "Error validando vivienda";
  mensaje.classList.add("error");
  return;
}

  if (!vivienda) {
    mensaje.innerText = "Lote no válido";
    mensaje.classList.add("error");
    return;
  }

 if (!vivienda.habilitado_registro) {
  mensaje.innerText = "Este lote aún no está habilitado para registro.";
  mensaje.classList.add("error");
  return;
}

 if (vivienda.registrado === true) {
    mensaje.innerHTML = `
      Esta vivienda ya cuenta con registro.<br><br>
      <a href="login.html" style="color:#60a5fa;">Iniciar sesión</a>
    `;
    mensaje.classList.add("error");
    return;
  }

  const email = `${privada.toLowerCase()}-${casa}@villas.com`;

  const { data: authData, error: authError } = await supabaseClient.auth.signUp({
    email,
    password: clave
  });

  if (authError) {
    mensaje.innerText = authError.message || "Error al crear usuario";
    mensaje.classList.add("error");
    return;
  }

  const user = authData.user || authData.session?.user;

  if (!user || !user.id) {
    mensaje.innerText = "Error al obtener usuario";
    mensaje.classList.add("error");
    return;
  }

  // 🔒 ACTUALIZAR RESIDENTE (SIN GUARDAR PASSWORD)
  const { error: errorUpdate } = await supabaseClient
    .from("residentes")
    .update({
      nombre: nombre,
      registrado: true,
      tipo: "residente",
      user_id: user.id
    })
    .eq("privada", privada)
    .eq("casa", casa);

  if (errorUpdate) {
    mensaje.innerText = "Error al registrar";
    mensaje.classList.add("error");
    return;
  }

  mensaje.innerText = "Registro exitoso ✅";
  mensaje.classList.add("ok");

  setTimeout(() => {
    window.location.href = "login.html";
  }, 1200);
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>

<script src="auth.js"></script>
<script>
protegerPagina(["admin"]);
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Incidencias</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

        <link rel="stylesheet" href="styles/global.css">
<link rel="stylesheet" href="styles/incidencias_trabajadores.css">
</head>

<body>

<div class="container">

<h1>📊 Panel de incidencias</h1>

<input type="date" id="fecha">

<!-- 🔴 INCIDENCIAS -->
<div class="titulo-seccion">🚨 Incidencias trabajadores</div>
<div id="lista"></div>

<!-- 💡 LUMINARIAS -->
<div class="titulo-seccion">💡 Reportes de luminarias</div>
<div id="luminarias"></div>

</div>

<script>

// fecha actual
const hoy = new Date().toISOString().split("T")[0];
document.getElementById("fecha").value = hoy;

document.getElementById("fecha").addEventListener("change", cargar);

cargar();

async function cargar() {

  const fecha = document.getElementById("fecha").value;

  cargarIncidencias(fecha);
  cargarLuminarias(fecha);
}

// =========================
// 🔴 INCIDENCIAS
// =========================
async function cargarIncidencias(fecha) {

  const { data } = await supabaseClient
    .from("incidencias_trabajadores")
    .select("*")
    .gte("fecha", fecha + " 00:00:00")
    .lt("fecha", fecha + " 23:59:59")
    .order("fecha", { ascending: false });

  const lista = document.getElementById("lista");

  if (!data || data.length === 0) {
    lista.innerHTML = "<p class='vacio'>Sin incidencias</p>";
    return;
  }

  lista.innerHTML = "";

  for (const item of data) {

    const { data: trabajador } = await supabaseClient
      .from("trabajadores_obra")
      .select("nombre, privada, casa")
      .eq("id", item.trabajador_id)
      .single();

    let fechaTexto = item.fecha_local || item.fecha;

    if (fechaTexto) {
      fechaTexto = fechaTexto.split(".")[0].replace(" ", "T");
    }

    const fechaInc = new Date(fechaTexto);

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="nombre">${trabajador?.nombre || "Sin nombre"}</div>
      <div class="detalle">
        ${item.descripcion}<br>
        ${fechaInc.toLocaleString("es-MX")}
      </div>
      <div class="tipo ${item.origen || 'automatico'}">
        ${(item.origen || "automatico").toUpperCase()} - ${item.tipo}
      </div>
    `;

    lista.appendChild(div);
  }
}

// =========================
// 💡 LUMINARIAS
// =========================
async function cargarLuminarias(fecha) {

  const inicio = fecha + "T00:00:00Z";
  const fin = fecha + "T23:59:59Z";

  const { data } = await supabaseClient
    .from("reportes_vecinales")
    .select("*")
    .gte("fecha_reporte", inicio)
    .lte("fecha_reporte", fin)
    .order("fecha_reporte", { ascending: false });

  const contenedor = document.getElementById("luminarias");

  if (!data || data.length === 0) {
    contenedor.innerHTML = "<p class='vacio'>Sin reportes</p>";
    return;
  }

  contenedor.innerHTML = "";

  data.forEach(item => {

    const fecha = new Date(item.fecha_reporte);

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="nombre">Luminaria #${item.no_luminaria}</div>
      <div class="detalle">
        ${item.descripcion}<br>
        ${fecha.toLocaleString("es-MX")}
      </div>
      <div class="tipo">
        ${item.estatus}
      </div>
    `;

    contenedor.appendChild(div);
  });
}

</script>

</body>
</html>

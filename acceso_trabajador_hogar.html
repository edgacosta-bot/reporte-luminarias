<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso Hogar</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="/utils/ui.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI';
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  text-align: center;
}

body.ok { background: #16a34a; color: white; }
body.warn { background: #f59e0b; color: #111827; }
body.error { background: #dc2626; color: white; }

.container {
  max-width: 320px;
  width: 90%;
}

input, button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
}

input {
  background: #020617;
  color: white;
  text-align: center;
  font-size: 18px;
}

button {
  background: #2563eb;
  color: white;
  font-weight: bold;
}

.hidden { display:none; }
</style>

</head>

<body>

<div class="container">

<h2>🏠 Acceso hogar</h2>

<h1 id="estado">Validando...</h1>
<div id="detalle"></div>

<input type="password" id="pin" placeholder="Ingrese PIN del vigilante">
<button id="btnValidar">Validar</button>

<button id="btnRegistrar" class="hidden">Registrar</button>
<button id="btnNotificar" class="hidden">Notificar</button>

</div>

<script>

const qr = new URLSearchParams(window.location.search).get("qr");

let trabajador = null;
let residente = null;
let estadoPago = "";
let tipoAccion = "";
let vigilante = null;

init();

async function init(){

  const { data } = await supabaseClient
    .from("trabajadores_hogar")
    .select("*")
    .eq("qr_codigo", qr)
    .maybeSingle();

  if(!data){
    pintar("QR inválido","error");
    return;
  }

  trabajador = data;

  const { data: res } = await supabaseClient
    .from("residentes")
    .select("estado_pago, privada, casa")
    .eq("id", trabajador.residente_id)
    .single();

  residente = res;
  estadoPago = (res.estado_pago || "").toLowerCase();

  renderDetalle();

  document.getElementById("estado").innerText = "Validar acceso";
}

// 🔹 VALIDAR PIN
btnValidar.onclick = async () => {

  const pin = document.getElementById("pin").value.trim();

  if(!pin){
    ui.warn("Ingrese PIN");
    return;
  }

  const { data } = await supabaseClient
    .from("residentes")
    .select("id")
    .eq("pin_vigilante", pin)
    .eq("tipo","vigilante")
    .eq("activo", true)
    .maybeSingle();

  if(!data){
    ui.error("PIN incorrecto");
    return;
  }

  vigilante = data;

  evaluarEstado();
};

// 🔹 EVALUAR ESTADO
function evaluarEstado(){

  ocultarValidacion();

  if(estadoPago === "moroso"){

    document.body.className = "error";
    estado.innerText = "Acceso NO permitido";

    btnRegistrar.innerText = "Registrar acceso con residente";
    btnRegistrar.classList.remove("hidden");

    btnNotificar.classList.remove("hidden");

    return;
  }

  if(estadoPago === "atraso_1"){
    document.body.className = "warn";
    estado.innerText = "Acceso permitido (con atraso)";
  } else {
    document.body.className = "ok";
    estado.innerText = "Acceso permitido";
  }

  btnRegistrar.classList.remove("hidden");
}

// 🔹 REGISTRAR
btnRegistrar.onclick = async () => {

  const ahora = new Date().toISOString();

  await supabaseClient
    .from("accesos_trabajadores_hogar")
    .insert([{
      trabajador_id: trabajador.id,
      fecha_hora_entrada: ahora,
      estatus: "dentro",
      vigilante_id: vigilante.id
    }]);

  estado.innerText = "Acceso registrado";

  btnRegistrar.classList.add("hidden");
  btnNotificar.classList.remove("hidden");
};

// 🔹 NOTIFICAR
btnNotificar.onclick = () => {

  let mensaje = "";

  if(estadoPago === "moroso"){
    mensaje = `Estimado residente, su empleado ${trabajador.nombre} se encuentra en caseta, le solicitamos su asistencia para permitírsele el acceso; asimismo, lo invitamos a regularizar sus pagos para el acceso controlado a sus empleados sin generarle molestias. Gracias;
  }
  else if(estadoPago === "atraso_1"){
    mensaje = `Estimado residente, su empleado doméstico ${trabajador.nombre} ingresó en este momento al fraccionamiento. Lo invitamos a regularizar el atraso en su cuota para evitar molestias en el acceso a sus empleados. Gracias`;
  }
  else{
    mensaje = `Estimado residente, su empleado doméstico ${trabajador.nombre} ingresó en este momento al fraccionamiento. Gracias`;
  }

  window.open(`https://wa.me/?text=${encodeURIComponent(mensaje)}`);
};

// 🔹 UI
function renderDetalle(){
  detalle.innerHTML = `
    <p><b>${trabajador.nombre}</b></p>
    <p>${residente.privada}-${residente.casa}</p>
  `;
}

function pintar(texto,color){
  document.body.className = color;
  estado.innerText = texto;
}

function ocultarValidacion(){
  pin.style.display = "none";
  btnValidar.style.display = "none";
}

</script>

</body>
</html>

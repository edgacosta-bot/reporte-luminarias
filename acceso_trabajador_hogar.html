<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso Hogar</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  color: white;
  text-align: center;
}

.ok { background: #16a34a; }
.warn { background: #f59e0b; }
.error { background: #dc2626; }

.container {
  max-width: 320px;
  width: 90%;
}

input, button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  box-sizing: border-box;
}

#btnSalir {
  display: none;
  background: #1f2937;
  color: white;
}

#errorMsg {
  display: none;
  color: #fecaca;
  font-size: 14px;
  margin-top: 8px;
}
</style>
</head>

<body>

<div class="container">
  <h1 id="estado">Validando...</h1>
  <div id="nombre"></div>

  <input type="password" id="pin" placeholder="PIN">
  <button id="btnConfirmar" onclick="confirmar()">Confirmar</button>

  <div id="errorMsg">PIN incorrecto</div>

  <button id="btnSalir" onclick="salir()">Aceptar</button>
</div>

<script>

const client = supabase.createClient(
  "https://prjxmfhahnzosdwljode.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs"
);

const qr = new URLSearchParams(window.location.search).get("qr");

let trabajador = null;
let tipo = "";
let puedeConfirmar = false;

init();

async function init() {

  const { data } = await client
    .from("trabajadores_hogar")
    .select("*")
    .eq("qr_codigo", qr)
    .maybeSingle();

  if (!data) {
    pintar("QR INVÁLIDO", "error");
    puedeConfirmar = false;
    return;
  }

  trabajador = data;

  const { data: residente } = await client
    .from("residentes")
    .select("estado_pago")
    .eq("id", trabajador.residente_id)
    .single();

  const estado = (residente?.estado_pago || "").toLowerCase();

  if (estado === "moroso") {
    pintar("ACCESO BLOQUEADO POR ADEUDO", "error");
    puedeConfirmar = false;
    return;
  }

  const hoy = new Date().toLocaleDateString('sv-SE');

  if (!data.activo) {
    pintar("ACCESO CANCELADO", "error");
    puedeConfirmar = false;
    return;
  }

  if (data.fecha_inicio && hoy < data.fecha_inicio) {
    pintar("AÚN NO VÁLIDO", "warn");
    puedeConfirmar = false;
    return;
  }

  if (data.fecha_fin && hoy > data.fecha_fin) {
    pintar("ACCESO VENCIDO", "error");
    puedeConfirmar = false;
    return;
  }

  document.getElementById("nombre").innerText = data.nombre;

  const { data: acceso } = await client
    .from("accesos_trabajadores_hogar")
    .select("*")
    .eq("trabajador_id", data.id)
    .is("fecha_hora_salida", null)
    .maybeSingle();

  if (!acceso) {
    tipo = "entrada";
    puedeConfirmar = true;
    pintar("PERMITIR ENTRADA", "ok");
  } else {
    tipo = "salida";
    puedeConfirmar = true;
    pintar("REGISTRAR SALIDA", "warn");
  }
}

function pintar(texto, color) {
  document.body.className = color;
  document.getElementById("estado").innerText = texto;

  const mostrar = (color === "ok" || texto === "REGISTRAR SALIDA");

  document.getElementById("pin").style.display = mostrar ? "block" : "none";
  document.getElementById("btnConfirmar").style.display = mostrar ? "block" : "none";

  document.getElementById("errorMsg").style.display = "none";
}

async function confirmar() {
  const btn = document.getElementById("btnConfirmar");
  btn.disabled = true;

  if (!puedeConfirmar) {
    btn.disabled = false;
    return;
  }

  const pin = document.getElementById("pin").value;

  // 🔐 VALIDACIÓN DE VIGILANTE (PIN INDIVIDUAL)
  const { data: vigilante } = await client
    .from("residentes")
    .select("id, nombre")
    .eq("pin_vigilante", pin)
    .eq("tipo", "vigilante")
    .eq("activo", true)
    .maybeSingle();

  if (!vigilante) {
    const error = document.getElementById("errorMsg");
    error.style.display = "block";
    document.getElementById("pin").value = "";
    btn.disabled = false;
    return;
  }

  // 🔥 GUARDAMOS VIGILANTE
  localStorage.setItem("vigilante_id", vigilante.id);

  const ahora = new Date().toISOString();

  // 🔍 BUSCAR ACCESO ABIERTO
  const { data: accesosAbiertos } = await client
    .from("accesos_trabajadores_hogar")
    .select("*")
    .eq("trabajador_id", trabajador.id)
    .is("fecha_hora_salida", null)
    .limit(1);

  const accesoAbierto = accesosAbiertos && accesosAbiertos.length > 0
    ? accesosAbiertos[0]
    : null;

  if (!accesoAbierto) {

    // 👉 ENTRADA
    const { error } = await client
      .from("accesos_trabajadores_hogar")
      .insert([{
        trabajador_id: trabajador.id,
        fecha_hora_entrada: ahora,
        estatus: "dentro",
        vigilante_id: vigilante.id
      }]);

    if (error) {
      alert("Error al registrar entrada");
      btn.disabled = false;
      return;
    }

    pintarFinal("ENTRADA REGISTRADA", "ok");

  } else {

    // 👉 SALIDA SEGURA (POR ID)
    const { error } = await client
      .from("accesos_trabajadores_hogar")
      .update({
  fecha_hora_salida: ahora,
  estatus: "fuera",
  vigilante_salida_id: vigilante.id
})
.eq("id", accesoAbierto.id);

    if (error) {
      alert("Error al registrar salida");
      btn.disabled = false;
      return;
    }

    pintarFinal("SALIDA REGISTRADA", "warn");
  }
}

function pintarFinal(texto, color) {
  document.body.className = color;
  document.getElementById("estado").innerText = texto;

  document.getElementById("pin").style.display = "none";
  document.getElementById("btnConfirmar").style.display = "none";

  // 🔥 LIMPIAR BOTONES PREVIOS
  const existentes = document.querySelectorAll(".btn-wa, .btn-cerrar");
  existentes.forEach(b => b.remove());

  // 🧠 DEFINIR MENSAJE SEGÚN TIPO
  let mensaje = "";

  if (texto.includes("ENTRADA")) {
    mensaje = `Estimado residente, le informamos que su trabajador *${trabajador.nombre}* ha ingresado en este momento al fraccionamiento.`;
  } else {
    mensaje = `Estimado residente, le informamos que su trabajador *${trabajador.nombre}* ha salido del fraccionamiento`;
  }

  const url = `https://wa.me/?text=${encodeURIComponent(mensaje)}`;

  // 🔘 BOTÓN NOTIFICAR
  const btnWA = document.createElement("button");
  btnWA.innerText = "Notificar";

  btnWA.style.marginTop = "12px";
  btnWA.style.background = color === "ok" ? "#16a34a" : "#f59e0b";
  btnWA.style.color = "white";
  btnWA.style.fontWeight = "bold";
  btnWA.style.borderRadius = "10px";
  btnWA.style.boxShadow = "0 4px 10px rgba(0,0,0,0.3)";
  btnWA.style.padding = "14px";
  btnWA.style.border = "none";
  btnWA.style.cursor = "pointer";

  btnWA.onclick = () => {

    window.open(url, '_blank');

    btnWA.innerText = "✔ Notificado";
    btnWA.style.background = "#1e293b";
    btnWA.disabled = true;

    // 🔒 EVITAR DUPLICADOS
    const cierreExistente = document.querySelector(".btn-cerrar");
    if (cierreExistente) cierreExistente.remove();

    // 🔘 BOTÓN FINALIZAR
    const btnCerrar = document.createElement("button");
    btnCerrar.innerText = "Finalizar";

    btnCerrar.style.marginTop = "10px";
    btnCerrar.style.background = "#020617";
    btnCerrar.style.color = "white";
    btnCerrar.style.borderRadius = "10px";
    btnCerrar.style.padding = "14px";
    btnCerrar.style.fontWeight = "bold";
    btnCerrar.style.border = "none";
    btnCerrar.style.cursor = "pointer";

    btnCerrar.classList.add("btn-cerrar");

    btnCerrar.onclick = () => {
      window.close();
      setTimeout(() => {
        window.location.href = "about:blank";
      }, 300);
    };

    document.querySelector(".container").appendChild(btnCerrar);
  };

  btnWA.classList.add("btn-wa");
  document.querySelector(".container").appendChild(btnWA);
}

function salir() {
  window.location.href = "index.html";
}

</script>

</body>
</html>

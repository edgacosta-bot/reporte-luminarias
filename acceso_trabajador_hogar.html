<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso Hogar</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  color: white;
  text-align: center;
}

.ok { background: #16a34a; }
.warn { background: #f59e0b; }
.error { background: #dc2626; }

.container {
  max-width: 320px;
  width: 90%;
}

/* 🔥 FIX GLOBAL DE DIMENSIONES */
input, button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  box-sizing: border-box;
}

/* 🔥 BOTÓN SALIR */
#btnSalir {
  display: none;
  background: #1f2937;
  color: white;
}

/* 🔥 MENSAJE ERROR */
#errorMsg {
  display: none;
  color: #fecaca;
  font-size: 14px;
  margin-top: 8px;
}
</style>
</head>

<body>

<div class="container">
  <h1 id="estado">Validando...</h1>
  <div id="nombre"></div>

  <input type="password" id="pin" placeholder="PIN">
  <button id="btnConfirmar" onclick="confirmar()">Confirmar</button>

  <div id="errorMsg">PIN incorrecto</div>

  <button id="btnSalir" onclick="salir()">Aceptar</button>
</div>

<script>

let PIN = null;

const client = supabase.createClient(
  "https://prjxmfhahnzosdwljode.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs"
);

const qr = new URLSearchParams(window.location.search).get("qr");

let trabajador = null;
let tipo = "";
let puedeConfirmar = false;

async function cargarConfiguracion() {
  const { data } = await client
    .from("seguridad_config")
    .select("pin_acceso")
    .limit(1)
    .single();

  if (data) {
    PIN = data.pin_acceso;
  }

  init();
}
cargarConfiguracion();

async function init() {

  const { data } = await client
    .from("trabajadores_hogar")
    .select("*")
    .eq("qr_codigo", qr)
    .maybeSingle();

  if (!data) {
    pintar("QR INVÁLIDO", "error");
    puedeConfirmar = false;
    return;
  }

  trabajador = data;

  // 🔥 VALIDACIÓN CORRECTA (ESTADO_PAGO)
  const { data: residente } = await client
    .from("residentes")
    .select("estado_pago")
    .eq("id", trabajador.residente_id)
    .single();

  const estado = (residente?.estado_pago || "").toLowerCase();

  if (estado === "moroso") {
    pintar("ACCESO BLOQUEADO POR ADEUDO", "error");
    puedeConfirmar = false;
    return;
  }

  const hoy = new Date().toISOString().split('T')[0];

  if (!data.activo) {
    pintar("ACCESO CANCELADO", "error");
    puedeConfirmar = false;
    return;
  }

  if (data.fecha_inicio && hoy < data.fecha_inicio) {
    pintar("AÚN NO VÁLIDO", "warn");
    puedeConfirmar = false;
    return;
  }

  if (data.fecha_fin && hoy > data.fecha_fin) {
    pintar("ACCESO VENCIDO", "error");
    puedeConfirmar = false;
    return;
  }

  document.getElementById("nombre").innerText = data.nombre;

  const { data: acceso } = await client
    .from("accesos_trabajadores_hogar")
    .select("*")
    .eq("trabajador_id", data.id)
    .is("fecha_hora_salida", null)
    .maybeSingle();

  if (!acceso) {
    tipo = "entrada";
    puedeConfirmar = true;
    pintar("PERMITIR ENTRADA", "ok");
  } else {
    tipo = "salida";
    puedeConfirmar = true;
    pintar("REGISTRAR SALIDA", "warn");
  }
}

function pintar(texto, color) {
  document.body.className = color;
  document.getElementById("estado").innerText = texto;

  const mostrar = (color === "ok" || texto === "REGISTRAR SALIDA");

  document.getElementById("pin").style.display = mostrar ? "block" : "none";
  document.getElementById("btnConfirmar").style.display = mostrar ? "block" : "none";

  document.getElementById("errorMsg").style.display = "none";
}

async function confirmar() {
const btn = document.getElementById("btnConfirmar");
btn.disabled = true;

  if (!puedeConfirmar) {
  btn.disabled = false;
  return;
}

 if (!PIN || PIN.length < 4) {
  alert("Error de configuración de seguridad");
  return;
}

  const pin = document.getElementById("pin").value;

  if (pin !== PIN) {
    const error = document.getElementById("errorMsg");
    error.style.display = "block";
    document.getElementById("pin").value = "";
    btn.disabled = false;
    return;
  }

  const ahora = new Date().toISOString();

  if (tipo === "entrada") {

  const { error } = await client.from("accesos_trabajadores_hogar").insert([{
    trabajador_id: trabajador.id,
    fecha_hora_entrada: ahora,
    estatus: "dentro"
  }]);

  if (error) {
    alert("Error al registrar entrada");
    btn.disabled = false;
    return;
  }

  pintarFinal("ENTRADA REGISTRADA", "ok");

} else {

  const { error } = await client.from("accesos_trabajadores_hogar")
    .update({
      fecha_hora_salida: ahora,
      estatus: "fuera"
    })
    .eq("trabajador_id", trabajador.id)
    .is("fecha_hora_salida", null);

  if (error) {
    alert("Error al registrar salida");
    btn.disabled = false;
    return;
  }

  pintarFinal("SALIDA REGISTRADA", "warn");
}
}
  function pintarFinal(texto, color) {
  document.body.className = color;
  document.getElementById("estado").innerText = texto;

  document.getElementById("pin").style.display = "none";
  document.getElementById("btnConfirmar").style.display = "none";

  document.getElementById("btnSalir").style.display = "block";
}

function salir() {
  window.location.href = "index.html";
}

</script>

</body>
</html>

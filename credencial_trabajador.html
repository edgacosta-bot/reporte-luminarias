<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 🔥 EVITA CACHE -->
<meta http-equiv="Cache-Control" content="no-store" />

<title>Credencial Trabajador</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.card {
  width: 320px;
  background: #111827;
  border-radius: 20px;
  padding: 20px;
  text-align: center;
  color: white;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.header {
  font-size: 14px;
  color: #9ca3af;
}

/* 🔥 etiqueta reimpresión */
.reimpresion {
  color: #f59e0b;
  font-weight: bold;
  font-size: 13px;
  margin-bottom: 6px;
}

.titulo {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 10px;
}

#qr {
  margin: 20px 0;
}

.nombre {
  font-size: 18px;
  font-weight: bold;
}

.obra {
  font-size: 14px;
  color: #9ca3af;
}

.indicacion {
  margin-top: 15px;
  font-size: 12px;
  color: #94a3b8;
}

/* 🔥 BOTÓN WHATSAPP */
#btnWA {
  display: none;
  margin-top: 15px;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #25D366;
  color: white;
  font-weight: bold;
  width: 100%;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="card">

  <div class="header">Villas de la Concepción</div>

  <!-- 🔥 REIMPRESIÓN -->
  <div id="reimpresionLabel" class="reimpresion"></div>

  <div class="titulo">Acceso de Trabajador</div>

  <div id="qr"></div>

  <div class="nombre" id="nombre"></div>
  <div class="obra" id="obra"></div>

  <div class="indicacion">
    Presentar este código en caseta
  </div>

  <!-- 🔥 BOTÓN WHATSAPP -->
  <button id="btnWA">
    📲 Enviar por WhatsApp
  </button>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>

// 🔥 LIMPIA CONTEXTO DE SESIÓN
localStorage.clear();
sessionStorage.clear();

// 🔎 Leer parámetros
const params = new URLSearchParams(window.location.search);

const codigo = params.get("qr");
const nombre = params.get("nombre");
const privada = params.get("privada");
const casa = params.get("casa");

// 🔥 nuevos params
const esReimpresion = params.get("reimpresion");
const origen = params.get("origen");

// 🔥 etiqueta reimpresión
if (esReimpresion) {
  document.getElementById("reimpresionLabel").innerText = "⚠️ REIMPRESIÓN";
}

// 🔥 QR apunta al acceso real
const urlQR = `${window.location.origin}/acceso_trabajador.html?qr=${codigo}`;

// 🎯 Generar QR
QRCode.toCanvas(urlQR, { width: 220 }, function (err, canvas) {
  document.getElementById("qr").appendChild(canvas);
});

// 🧾 Datos
document.getElementById("nombre").innerText = nombre || "";
document.getElementById("obra").innerText =
  `Privada ${privada || ""} - Lote ${casa || ""}`;

// 🔥 CONTROL BOTÓN WA (SOLO ADMIN)
if (origen === "admin") {

  const btn = document.getElementById("btnWA");
  btn.style.display = "block";

  btn.addEventListener("click", () => {

    // 🔥 LINK LIMPIO (SIN origen=admin)
    const linkCredencial =
  `${window.location.origin}/credencial_trabajador.html` +
  `?qr=${codigo}` +
  `&nombre=${encodeURIComponent(nombre)}` +
  `&privada=${privada}` +
  `&casa=${casa}` +
  (esReimpresion ? `&reimpresion=1` : "");

    const mensaje =
      `👷 Credencial de acceso\n\n` +
      `Nombre: ${nombre}\n` +
      `Ubicación: Privada ${privada} - Lote ${casa}\n\n` +
      `Presenta este código en caseta:\n${linkCredencial}`;

    const wa = `https://wa.me/?text=${encodeURIComponent(mensaje)}`;

    window.open(wa, "_blank");
  });
}

</script>

</body>
</html>

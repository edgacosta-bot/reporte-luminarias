<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 🔥 EVITA CACHE -->
<meta http-equiv="Cache-Control" content="no-store" />

<title>Credencial Trabajador</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.card {
  width: 320px;
  background: #111827;
  border-radius: 20px;
  padding: 20px;
  text-align: center;
  color: white;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.header {
  font-size: 14px;
  color: #9ca3af;
}

.titulo {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 10px;
}

#qr {
  margin: 20px 0;
}

.nombre {
  font-size: 18px;
  font-weight: bold;
}

.obra {
  font-size: 14px;
  color: #9ca3af;
}

.indicacion {
  margin-top: 15px;
  font-size: 12px;
  color: #94a3b8;
}
</style>
</head>

<body>

<div class="card">

  <div class="header">Villas de la Concepción</div>
  <div class="titulo">Acceso de Trabajador</div>

  <div id="qr"></div>

  <div class="nombre" id="nombre"></div>
  <div class="obra" id="obra"></div>

  <div class="indicacion">
    Presentar este código en caseta
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>

// 🔥 LIMPIA CONTEXTO DE SESIÓN (SOLUCIÓN AL PROBLEMA)
localStorage.clear();
sessionStorage.clear();

// 🔎 Leer parámetros
const params = new URLSearchParams(window.location.search);

const codigo = params.get("qr");
const nombre = params.get("nombre");
const privada = params.get("privada");
const casa = params.get("casa");

// 🔥 QR apunta al acceso real del vigilante
const urlQR = `${window.location.origin}/acceso_trabajador.html?qr=${codigo}`;

// 🎯 Generar QR
QRCode.toCanvas(urlQR, { width: 220 }, function (err, canvas) {
  document.getElementById("qr").appendChild(canvas);
});

// 🧾 Datos
document.getElementById("nombre").innerText = nombre || "";
document.getElementById("obra").innerText =
  `Privada ${privada || ""} - Lote ${casa || ""}`;

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Actividad Inmobiliaria</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="auth.js"></script>

<script src="utils/dates.js"></script>

<style>

body{
  margin:0;
  font-family:'Segoe UI';
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
}

.container{
  max-width:700px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
}

.kpi{
  background:#111827;
  border-radius:18px;
  padding:20px;
  text-align:center;
  margin-bottom:20px;
}

.kpi span{
  font-size:34px;
  font-weight:bold;
}

.filtros{
  background:#111827;
  border-radius:18px;
  padding:18px;
  margin-bottom:20px;
}

input,
select{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#1f2937;
  color:white;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}

.rangos{
  display:flex;
  gap:8px;
  margin-bottom:15px;
}

.rangos button{
  flex:1;
}

.card{
  background:#111827;
  border-radius:18px;
  padding:18px;
  margin-bottom:12px;
}

.dentro{
  color:#fbbf24;
  font-weight:bold;
}

.salio{
  color:#4ade80;
  font-weight:bold;
}

.label{
  margin-top:10px;
  margin-bottom:5px;
  color:#94a3b8;
  font-size:13px;
}

.badge{

  display:inline-block;

  padding:6px 12px;

  border-radius:999px;

  font-size:12px;

  font-weight:bold;

  margin-top:8px;

  margin-bottom:10px;

}

.badge-suministro{

  background:#1e3a8a;

  color:white;

}

.badge-maquinaria{

  background:#92400e;

  color:white;

}

.titulo-obra{

  font-size:18px;

  font-weight:bold;

  color:#93c5fd;

  margin-bottom:10px;

}  

</style>

</head>

<body>

<div class="container">

<h1>
🏡 Actividad Inmobiliaria
</h1>

<div class="kpi">

  🏡 Asesores dentro

  <br><br>

  <span id="kpiDentro">
    0
  </span>

</div>

<div class="filtros">

  <div class="rangos">

    <button onclick="rangoRapido(0)">
      Hoy
    </button>

    <button onclick="rangoRapido(7)">
      7 días
    </button>

    <button onclick="rangoRapido(30)">
      30 días
    </button>

    <button onclick="rangoRapido(90)">
      90 días
    </button>

  </div>

 <div class="label">
  Estado
</div>

<select
  id="filtroEstado"
  onchange="renderizar()">

  <option value="">
    Todos
  </option>

  <option value="DENTRO">
    DENTRO
  </option>

  <option value="SALIO">
    SALIÓ
  </option>

</select>

<br><br>

  <div class="label">
    Fecha inicio
  </div>

  <input
  type="date"
  id="inicio"
  onchange="renderizar()">

  <br><br>

  <div class="label">
    Fecha fin
  </div>

  <input
  type="date"
  id="fin"
  onchange="renderizar()">

  <br><br>

  <button onclick="cargar()">
    Consultar
  </button>

</div>

<div
  id="contadorResultados"
  style="
    background:#111827;
    border-radius:18px;
    padding:14px;
    margin-bottom:15px;
    color:#93c5fd;
    font-weight:bold;
    text-align:center;
  ">
</div>
  
<div id="lista">
</div>

</div>

<script>

let asesores = [];

let obrasFiltro = []; 

function formatearHoras(horas){

  const horasEnteras =
    Math.floor(horas);

  const minutos =
    Math.round(
      (horas - horasEnteras) * 60
    );

  return `
    ${horasEnteras} h
    ${minutos} min
  `;

}  

function renderizar(){

  const lista =
    document.getElementById(
      "lista"
    );

  let registros = [...asesores];

const estado =
  document.getElementById(
    "filtroEstado"
  ).value;



const fechaInicio =
  document.getElementById(
    "inicio"
  ).value;

const fechaFin =
  document.getElementById(
    "fin"
  ).value;  

if(estado){

  registros =
    registros.filter(
      r => r.estatus === estado
    );

}



if(fechaInicio){

  const inicioUTC =
    fechaInicioUTC(
      fechaInicio
    );

  registros =
    registros.filter(
      r =>
        r.fecha_entrada >= inicioUTC
    );

}

if(fechaFin){

  const finUTC =
    fechaFinUTC(
      fechaFin
    );

  registros =
    registros.filter(
      r =>
       r.fecha_entrada <= finUTC
    );

}  

registros.sort((a,b)=>{

  if(
    a.estatus === "DENTRO"
    &&
    b.estatus !== "DENTRO"
  ){
    return -1;
  }

  if(
    a.estatus !== "DENTRO"
    &&
    b.estatus === "DENTRO"
  ){
    return 1;
  }

  return (
    new Date(b.fecha_entrada)
    -
    new Date(a.fecha_entrada)
  );

});  

  const dentro =
  registros.filter(
    r => r.estatus === "DENTRO"
  ).length;

document.getElementById(
  "contadorResultados"
).innerHTML = `

  🚚 Dentro:
  <b>${dentro}</b>

  &nbsp;&nbsp;|&nbsp;&nbsp;

  🧾 Registros:
  <b>${registros.length}</b>

`;
  
  if(
  registros.length === 0
){

    lista.innerHTML =
      "<div class='card'>Sin resultados</div>";

    return;
  }

  let html = "";

  registros.forEach(a=>{

  html += `

    <div class="card">

      <div class="titulo-obra">

        👤 ${a.nombre}

      </div>

      <div>

        <b>🏢 Empresa:</b>

        ${a.empresa || "-"}

      </div>

      <br>

      <div>

        <b>Entrada:</b>

        ${formatMXDate(
          a.fecha_entrada
        )}

      </div>

      ${
        a.fecha_salida
        ? `
          <div>

            <b>Salida:</b>

            ${formatMXDate(
              a.fecha_salida
            )}

          </div>
        `
        : ''
      }

      <br>

      <div class="${
        a.estatus === 'DENTRO'
          ? 'dentro'
          : 'salio'
      }">

        ${
          a.estatus === 'DENTRO'
          ? '🟠 DENTRO'
          : '✅ SALIÓ'
        }

      </div>

      <br>

      <div>

        <b>Tiempo dentro:</b>

        ${formatearHoras(
          a.horas_dentro
        )}

      </div>

      <div>

        <b>Clientes dentro:</b>

        ${a.clientes_dentro}

      </div>

    </div>

  `;

});

lista.innerHTML = html;  

}
  
async function cargar(){

  const { data, error } =
  await supabaseClient.rpc(
    "obtener_reporte_asesores_inmobiliarios"
  );

  if(error){

    console.log(error);

    return;
  }

  

 asesores = data || [];

  const dentro =
  asesores.filter(
      a => a.estatus === "DENTRO"
    ).length;

  document.getElementById(
    "kpiDentro"
  ).innerText = dentro;

  renderizar();

 console.log(
  "Asesores:",
  asesores.length
);

}  

async function cargarFiltros(){

  const { data, error } =
    await supabaseClient.rpc(
      "obtener_obras_filtro_abastecimientos"
    );

  if(error){

    console.log(error);

    return;
  }

  obrasFiltro = data || [];

  const privadaSelect =
    document.getElementById(
      "filtroPrivada"
    );

  const privadas =
    [...new Set(
      obrasFiltro.map(
        o => o.privada
      )
    )];

  privadas.forEach(p=>{

    privadaSelect.innerHTML += `
      <option value="${p}">
        ${p}
      </option>
    `;

  });

  actualizarLotes();

}

function actualizarLotes(){

  const privada =
    document.getElementById(
      "filtroPrivada"
    ).value;

  const loteSelect =
    document.getElementById(
      "filtroCasa"
    );

  loteSelect.innerHTML = `
    <option value="">
      Todos
    </option>
  `;

  let lotes = obrasFiltro;

  if(privada){

    lotes =
      obrasFiltro.filter(
        o => o.privada === privada
      );

  }

  const casasUnicas =
  [...new Set(
    lotes.map(
      l => l.casa
    )
  )];

casasUnicas.forEach(casa=>{

  loteSelect.innerHTML += `
    <option value="${casa}">
      ${casa}
    </option>
  `;

});

  renderizar();

}  

function rangoRapido(dias){

  const hoy = new Date();

  const fechaFin =
  fechaLocalISO(
    hoy
  );

  let fechaInicio;

  if(dias === 0){

    fechaInicio = fechaFin;

  }else{

    const inicio =
      new Date();

    inicio.setDate(
      inicio.getDate() - dias
    );

    fechaInicio =
  fechaLocalISO(
    inicio
  );

  }

  document.getElementById(
    "inicio"
  ).value = fechaInicio;

  document.getElementById(
    "fin"
  ).value = fechaFin;

  renderizar();

}
  
window.addEventListener(
  "DOMContentLoaded",
  async ()=>{

    await protegerPagina([
      "admin",
      "administracion",
      "vigilante"
    ]);

    
    await cargar();

  }
);

</script>

</body>
</html>

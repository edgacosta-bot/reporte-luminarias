<!DOCTYPE html>
<html lang="es">
<head>

protegerPagina(["vigilante", "admin"]);

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrar incidencia</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.container {
  max-width: 400px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 16px;
}

/* 🔥 INPUTS MEJORADOS */
select, textarea, button {
  width: 100%;
  margin-top: 12px;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  background: #1f2937;
  color: white;
}

/* 🔥 NORMALIZAR SELECT */
select {
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;
}

textarea {
  resize: none;
  min-height: 80px;
}

button {
  background: #dc2626;
  font-weight: bold;
  cursor: pointer;
}

#msg {
  margin-top: 12px;
  text-align: center;
  color: #34d399;
}
</style>

</head>

<body>

<div class="container">
  <div class="card">
    <h2>🚨 Reportar incidencia</h2>

    <select id="trabajador"></select>

    <select id="tipo">
      <option value="">Tipo de incidente</option>
      <option value="fuera_area">Fuera de área</option>
      <option value="alcohol">Consumo de alcohol</option>
      <option value="sustancias">Uso de sustancias</option>
      <option value="conducta">Conducta inapropiada</option>
    </select>

    <textarea id="descripcion" placeholder="Describe lo ocurrido..."></textarea>

    <button onclick="guardar()">Registrar incidencia</button>

    <p id="msg"></p>
  </div>
</div>

<script>

const supabaseClient = window.supabase.createClient(
  "https://prjxmfhahnzosdwljode.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs"
);

// 🔥 CARGAR TRABAJADORES AGRUPADOS POR OBRA
async function cargarTrabajadores() {

  const { data } = await supabaseClient
    .from("trabajadores_obra")
    .select("id, nombre, privada, casa")
    .eq("activo", true)
    .order("privada")
    .order("casa");

  const select = document.getElementById("trabajador");

  select.innerHTML = "<option value=''>Selecciona trabajador</option>";

  let grupoActual = "";
  let optgroup = null;

  data.forEach(t => {

    const grupo = `Privada ${t.privada} - Lote ${t.casa}`;

    if (grupo !== grupoActual) {
      optgroup = document.createElement("optgroup");
      optgroup.label = grupo;
      select.appendChild(optgroup);
      grupoActual = grupo;
    }

    const option = document.createElement("option");
    option.value = t.id;
    option.textContent = t.nombre;

    optgroup.appendChild(option);
  });
}

cargarTrabajadores();


// 💾 GUARDAR INCIDENCIA
async function guardar() {

  const trabajador_id = document.getElementById("trabajador").value;
  const tipo = document.getElementById("tipo").value;
  const descripcion = document.getElementById("descripcion").value;

  const msg = document.getElementById("msg");

  if (!trabajador_id || !tipo) {
    msg.innerText = "Completa los campos obligatorios";
    msg.style.color = "#f87171";
    return;
  }

  await supabaseClient
    .from("incidencias_trabajadores")
    .insert([{
      trabajador_id,
      tipo,
      descripcion,
      origen: "manual",
      registrado_por: "vigilante"
    }]);

  msg.innerText = "Incidencia registrada";
  msg.style.color = "#34d399";

  // limpiar campos
  document.getElementById("trabajador").value = "";
  document.getElementById("tipo").value = "";
  document.getElementById("descripcion").value = "";
}

</script>

</body>
</html>

<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credencial Trabajador Hogar</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="auth.js"></script>  

<script src="modal.js"></script>  

    <link rel="stylesheet" href="styles/credencial_asesor.css">
</head>

<body>

<div id="contenedorNotificaciones"></div>  

<div class="card">

  <div class="logo">
    <img src="icono-512.png" alt="Logo">
  </div>

  <h1>Villas de la Concepción</h1>
  <h2>Acceso asesor inmobiliario</h2>

  <div class="nombre" id="nombre"></div>
  <div class="detalle" id="detalle"></div>

  <div class="qr-box">
    <div id="qr"></div>
  </div>

  <button id="btnWA" class="btn-wa">
    📲 Enviar por WhatsApp
  </button>

  <button
  id="btnRegenerar"
  class="btn-wa"
  style="
    background:#dc2626;
    margin-top:10px;
  ">

  ♻ Generar nuevo QR

</button>

  <div class="footer">
    Deberá mostrar este código al ingresar y salir del fraccionamiento
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>

// 🔎 PARAMETROS
const params = new URLSearchParams(window.location.search);

const asesorId =
  params.get("asesor_id");

const codigo =
  params.get("qr");

const nombre =
  params.get("nombre");

const empresa =
  params.get("empresa");

const origen =
  params.get("origen");

let notificacionActual = null;

function mostrarNotificacion(
  mensaje,
  tipo = "exito"
){

  const contenedor =
    document.getElementById(
      "contenedorNotificaciones"
    );

  if(notificacionActual){
    notificacionActual.remove();
  }

  const div =
    document.createElement(
      "div"
    );

  div.className =
    `notificacion ${tipo}`;

  div.innerHTML =
    mensaje;

  contenedor.appendChild(
    div
  );

  notificacionActual = div;

  setTimeout(()=>{

    if(div.parentNode){

      div.remove();

      if(
        notificacionActual === div
      ){
        notificacionActual = null;
      }

    }

  },4000);

}
  
// 🔐 VALIDACIÓN
if (!codigo) {
  document.body.innerHTML = "QR inválido";
  throw new Error("QR inválido");
}

// 🔥 BASE URL
const baseURL = window.location.origin;

// 🔥 URL REAL DE ACCESO
const urlQR =
  `${baseURL}/acceso_asesor.html?qr=${codigo}`;

// 🎯 GENERAR QR
QRCode.toCanvas(urlQR, {
  width: 220,
  margin: 1
}, function (err, canvas) {
  if (!err) {
    document.getElementById("qr").appendChild(canvas);
  }
});

// 🧾 DATOS
document.getElementById("nombre").innerText = nombre || "";
document.getElementById("detalle").innerText =
  empresa || "";

// 🔥 OCULTAR BOTÓN EN WA
if (origen !== "admin") {

  document
    .getElementById(
      "btnRegenerar"
    )
    .style.display =
      "none";

}

// 📲 WHATSAPP
document.getElementById("btnWA").addEventListener("click", () => {

  const linkCredencial =
  `${baseURL}/credencial_asesor.html` +
  `?qr=${codigo}` +
  `&nombre=${encodeURIComponent(nombre || "")}` +
  `&empresa=${encodeURIComponent(empresa || "")}` +
  `&origen=wa`;

  const mensaje =
  `🏡 Credencial de acceso para asesor inmobiliario\n\n` +
    `Nombre: ${nombre || ""}\n` +
    `Empresa: ${empresa || ""}\n\n` +
    `Presenta este código en caseta:\n${linkCredencial}`;

  const wa = `https://wa.me/?text=${encodeURIComponent(mensaje)}`;

  window.open(wa, "_blank");
});

document
  .getElementById(
    "btnRegenerar"
  )
  .addEventListener(
    "click",
    async ()=>{

      const confirmado =
  await mostrarConfirmacion({

    titulo:
      "Regenerar código QR",

    mensaje:
      "El código actual dejará de funcionar inmediatamente."

  });

if(!confirmado){
  return;
}

      const {
  data,
  error
} =
await supabaseClient.rpc(
  "generar_qr_asesor",
  {
    p_asesor_id:
      asesorId
  }
);

if(error){

  mostrarNotificacion(
  `❌ ${error.message}`,
  "error"
);

  return;

}

mostrarNotificacion(
  "✅ Código QR regenerado correctamente",
  "exito"
);

setTimeout(()=>{

  
  window.location.href =
    nuevaUrl;

},2000);
    }
  );  

</script>

</body>
</html>

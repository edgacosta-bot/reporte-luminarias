<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credencial Trabajador Hogar</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="auth.js"></script>  

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  color: white;
}

/* 🔥 TARJETA */
.card {
  background: #111827;
  border-radius: 20px;
  padding: 25px 20px;
  width: 90%;
  max-width: 340px;
  text-align: center;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

/* 🔷 LOGO */
.logo img {
  width: 80px;
  border-radius: 20px;
  margin-bottom: 10px;
}

/* 🔤 TEXTOS */
h1 {
  font-size: 14px;
  color: #9ca3af;
  margin-bottom: 5px;
}

h2 {
  font-size: 20px;
  margin: 0;
  margin-bottom: 10px;
}

.nombre {
  font-size: 22px;
  font-weight: bold;
  margin-top: 10px;
}

.detalle {
  font-size: 14px;
  color: #9ca3af;
  margin-bottom: 15px;
}

/* 🔲 QR CONTENEDOR */
.qr-box {
  background: white;
  padding: 12px;
  border-radius: 12px;
  display: inline-block;
  margin-top: 10px;
}

/* 🟢 BOTÓN */
.btn-wa {
  margin-top: 20px;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: #25D366;
  color: white;
  font-size: 16px;
  font-weight: bold;
  width: 100%;
  cursor: pointer;
}

/* 📝 TEXTO FINAL */
.footer {
  margin-top: 15px;
  font-size: 12px;
  color: #9ca3af;
}

#contenedorNotificaciones{
  position:fixed;
  top:20px;
  right:20px;
  width:350px;
  z-index:10000;
}

.notificacion{
  padding:14px;
  border-radius:12px;
  margin-bottom:10px;
  font-weight:600;
  animation:aparecer .25s ease;
  box-shadow:
    0 4px 12px rgba(0,0,0,.35);
}

.notificacion.exito{
  background:#14532d;
  border:1px solid #22c55e;
  color:white;
}

.notificacion.error{
  background:#7f1d1d;
  border:1px solid #ef4444;
  color:white;
}

@keyframes aparecer{

  from{
    opacity:0;
    transform:translateY(-10px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }

}
  
</style>

</head>

<body>

<div id="contenedorNotificaciones"></div>  

<div class="card">

  <div class="logo">
    <img src="icono-512.png" alt="Logo">
  </div>

  <h1>Villas de la Concepción</h1>
  <h2>Acceso asesor inmobiliario</h2>

  <div class="nombre" id="nombre"></div>
  <div class="detalle" id="detalle"></div>

  <div class="qr-box">
    <div id="qr"></div>
  </div>

  <button id="btnWA" class="btn-wa">
    📲 Enviar por WhatsApp
  </button>

  <button
  id="btnRegenerar"
  class="btn-wa"
  style="
    background:#dc2626;
    margin-top:10px;
  ">

  ♻ Generar nuevo QR

</button>

  <div class="footer">
    Deberá mostrar este código al ingresar y salir del fraccionamiento
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>

// 🔎 PARAMETROS
const params = new URLSearchParams(window.location.search);

const asesorId =
  params.get("asesor_id");

const codigo =
  params.get("qr");

const nombre =
  params.get("nombre");

const empresa =
  params.get("empresa");

const origen =
  params.get("origen");

let notificacionActual = null;

function mostrarNotificacion(
  mensaje,
  tipo = "exito"
){

  const contenedor =
    document.getElementById(
      "contenedorNotificaciones"
    );

  if(notificacionActual){
    notificacionActual.remove();
  }

  const div =
    document.createElement(
      "div"
    );

  div.className =
    `notificacion ${tipo}`;

  div.innerHTML =
    mensaje;

  contenedor.appendChild(
    div
  );

  notificacionActual = div;

  setTimeout(()=>{

    if(div.parentNode){

      div.remove();

      if(
        notificacionActual === div
      ){
        notificacionActual = null;
      }

    }

  },4000);

}
  
// 🔐 VALIDACIÓN
if (!codigo) {
  document.body.innerHTML = "QR inválido";
  throw new Error("QR inválido");
}

// 🔥 BASE URL
const baseURL = window.location.origin;

// 🔥 URL REAL DE ACCESO
const urlQR =
  `${baseURL}/acceso_asesor.html?qr=${codigo}`;

// 🎯 GENERAR QR
QRCode.toCanvas(urlQR, {
  width: 220,
  margin: 1
}, function (err, canvas) {
  if (!err) {
    document.getElementById("qr").appendChild(canvas);
  }
});

// 🧾 DATOS
document.getElementById("nombre").innerText = nombre || "";
document.getElementById("detalle").innerText =
  empresa || "";

// 🔥 OCULTAR BOTÓN EN WA
if (origen !== "admin") {

  document
    .getElementById(
      "btnRegenerar"
    )
    .style.display =
      "none";

}

// 📲 WHATSAPP
document.getElementById("btnWA").addEventListener("click", () => {

  const linkCredencial =
  `${baseURL}/credencial_asesor.html` +
  `?qr=${codigo}` +
  `&nombre=${encodeURIComponent(nombre || "")}` +
  `&empresa=${encodeURIComponent(empresa || "")}` +
  `&origen=wa`;

  const mensaje =
  `🏡 Credencial de acceso para asesor inmobiliario\n\n` +
    `Nombre: ${nombre || ""}\n` +
    `Empresa: ${empresa || ""}\n\n` +
    `Presenta este código en caseta:\n${linkCredencial}`;

  const wa = `https://wa.me/?text=${encodeURIComponent(mensaje)}`;

  window.open(wa, "_blank");
});

document
  .getElementById(
    "btnRegenerar"
  )
  .addEventListener(
    "click",
    async ()=>{

      if(
        !confirm(
          "¿Desea generar un nuevo código QR?\n\nEl código actual dejará de funcionar inmediatamente."
        )
      ){
        return;
      }

      const {
  data,
  error
} =
await supabaseClient.rpc(
  "generar_qr_asesor",
  {
    p_asesor_id:
      asesorId
  }
);

if(error){

  mostrarNotificacion(
  `❌ ${error.message}`,
  "error"
);

  return;

}

mostrarNotificacion(
  "✅ Código QR regenerado correctamente",
  "exito"
);
      
const nuevaUrl =
  `${window.location.pathname}` +
  `?asesor_id=${encodeURIComponent(
    asesorId
  )}` +
  `&qr=${encodeURIComponent(
    data
  )}` +
  `&nombre=${encodeURIComponent(
    nombre || ""
  )}` +
  `&empresa=${encodeURIComponent(
    empresa || ""
  )}` +
  `&origen=admin`;

window.location.href =
  nuevaUrl;

    }
  );  

</script>

</body>
</html>

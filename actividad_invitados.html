<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Actividades | SIGVIC</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="auth.js"></script>

    <link rel="stylesheet" href="styles/actividad_horarios.css">
</head>

<body>

<div class="container">

 <h1 id="tituloActividad">

  🎟 Invitados

</h1>

  <div id="contenedorNotificaciones"></div>

 
  <div id="lista"></div>

</div>

<script>


let actividadActual = null; 

let notificacionActual = null; 

let invitados = []; 

const params =
  new URLSearchParams(
    window.location.search
  );

const actividadId =
  params.get("id");

if(!actividadId){

  alert(
    "Actividad no especificada"
  );

  throw new Error(
    "Actividad no especificada"
  );

}  

function mostrarNotificacion(
  mensaje,
  tipo = "exito"
){

   const contenedor =
    document.getElementById(
      "contenedorNotificaciones"
    );

  
  if(notificacionActual){
    notificacionActual.remove();
  }

  const div =
    document.createElement(
      "div"
    );

  div.className =
    `notificacion ${tipo}`;

  div.innerHTML =
    mensaje;

  contenedor.appendChild(
    div
  );

  notificacionActual = div;

  setTimeout(()=>{

    if(div.parentNode){

      div.remove();

      if(
        notificacionActual === div
      ){
        notificacionActual = null;
      }

    }

  },4000);

}  

async function cargarInvitados(){

  const { data, error } =
    await supabaseClient.rpc(
      "obtener_invitados_actividad_admin",
      {
        p_actividad_id:
          actividadId
      }
    );

  if(error){

    console.log(error);

    return;

  }

  if(!data.ok){

    mostrarNotificacion(
      data.mensaje,
      "error"
    );

    return;

  }

  invitados =
    data.invitados || [];

  renderizarInvitados();

}

function renderizarInvitados(){

  const lista =
    document.getElementById(
      "lista"
    );

  if(
    invitados.length === 0
  ){

    lista.innerHTML = `

      <div class="card">

        No existen invitados registrados.

      </div>

    `;

    return;

  }

  let html = "";

  invitados.forEach(i=>{

    html += `

      <div class="card">

        <div
          style="
            font-size:20px;
            font-weight:bold;
            color:#93c5fd;
            margin-bottom:10px;
          ">

          🎟 ${i.nombre_invitado}

        </div>

        <div>

          <b>Residente:</b>

          ${i.residente}

        </div>

        <div>

          <b>Privada:</b>

          ${i.privada?.trim() || "No especificada"}

        </div>

        <div>

          <b>Casa:</b>

          ${i.casa}

        </div>

        <div>

          <b>Fecha registro:</b>

          ${
            i.fecha_registro
            ? new Date(
                i.fecha_registro
              ).toLocaleString(
                "es-MX"
              )
            : "-"
          }

        </div>

        <div>

          <b>Estatus:</b>

          <span
            style="
              color:${
                i.estatus === "activo"
                ? "#22c55e"
                : "#ef4444"
              };
              font-weight:bold;
            ">

            ${i.estatus}

          </span>

        </div>

      </div>

    `;

  });

  lista.innerHTML = html;

}

   
window.addEventListener(
  "DOMContentLoaded",
  async ()=>{

    await protegerPagina([
      "administracion"
    ]);

   await cargarInvitados();

  }
);

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Trabajador</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.card {
  background: #111827;
  padding: 20px;
  border-radius: 20px;
  width: 90%;
  max-width: 350px;
  text-align: center;
}

.logo {
  width: 80px;
  margin-bottom: 10px;
}

.descripcion {
  font-size: 13px;
  color: #9ca3af;
  margin-bottom: 15px;
}

select, input[type="date"] {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: none;
  background: #1f2937;
  color: white;
}

#qr { margin-top: 15px; }

.nombre { margin-top: 10px; font-weight: bold; }

.obra {
  font-size: 13px;
  color: #9ca3af;
}

button {
  margin-top: 15px;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #25D366;
  color: white;
  cursor: pointer;
  width: 100%;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="card">

<!-- 🔥 LOGO CORRECTO -->
<img src="icono-512.png" class="logo">

<h2>QR Trabajador</h2>

<!-- 🔥 TEXTO UX -->
<div class="descripcion">
  Utilice este formulario para generar códigos QR de acceso para los trabajadores de obra
</div>

<!-- 🔥 FILTRO -->
<select id="filtroPrivada">
  <option value="">Selecciona la privada</option>
</select>

<select id="trabajador">
  <option value="">Cargando trabajadores...</option>
</select>

<!-- 🔥 NUEVO: FECHAS -->
<input type="date" id="fechaInicio">
<input type="date" id="fechaFin">

<div id="qr"></div>

<div class="nombre" id="nombre"></div>
<div class="obra" id="obra"></div>

<button id="btnWA" style="display:none;">
  📲 Enviar credencial por WhatsApp
</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>

let trabajadorSeleccionado = null;
let dataGlobal = [];

// 🔥 SECUENCIA (RESPETADA)
window.addEventListener("DOMContentLoaded", async () => {
  await protegerPagina(["administracion"]);
  await cargarTrabajadores();
});

// 🔥 CARGA BASE (RESPETADA)
async function cargarTrabajadores() {

  const select = document.getElementById("trabajador");

  select.innerHTML = '<option value="">Cargando trabajadores...</option>';

  const { data, error } = await supabaseClient
    .from("trabajadores_obra")
    .select("*")
    .eq("activo", true)
    .order("privada")
    .order("nombre");

  if (error) {
    console.log(error);
    select.innerHTML = '<option>Error al cargar</option>';
    return;
  }

  if (!data || data.length === 0) {
    select.innerHTML = '<option>No hay trabajadores</option>';
    return;
  }

  dataGlobal = data;

  cargarFiltroPrivadas(data);
  renderTrabajadores();
}

// 🔥 FILTRO (RESPETADO + TEXTO AJUSTADO)
function cargarFiltroPrivadas(data) {

  const filtro = document.getElementById("filtroPrivada");

  const privadas = [...new Set(data.map(t => t.privada))];

  filtro.innerHTML = '<option value="">Selecciona la privada</option>';

  privadas.forEach(p => {
    const option = document.createElement("option");
    option.value = p;
    option.textContent = `Privada ${p}`;
    filtro.appendChild(option);
  });
}

// 🔥 RENDER (RESPETADO)
function renderTrabajadores() {

  const select = document.getElementById("trabajador");
  const privadaSeleccionada = document.getElementById("filtroPrivada").value;

  const hoy = new Date().toLocaleDateString('sv-SE');

  let filtrados = dataGlobal.filter(t => {
    if (t.fecha_inicio && hoy < t.fecha_inicio) return false;
    if (t.fecha_fin && hoy > t.fecha_fin) return false;
    return true;
  });

  if (privadaSeleccionada) {
    filtrados = filtrados.filter(t => t.privada === privadaSeleccionada);
  }

  if (filtrados.length === 0) {
    select.innerHTML = '<option>No hay trabajadores disponibles</option>';
    return;
  }

  select.innerHTML = '<option value="">Selecciona trabajador</option>';

  filtrados.forEach(t => {
    const option = document.createElement("option");
    option.value = t.qr_codigo;
    option.textContent = t.nombre;
    option.dataset.privada = t.privada;
    option.dataset.casa = t.casa;
    select.appendChild(option);
  });
}

// 🔁 EVENTO FILTRO (RESPETADO)
document.getElementById("filtroPrivada").addEventListener("change", renderTrabajadores);

// 🎯 CAMBIO (RESPETADO + FECHAS)
document.getElementById("trabajador").addEventListener("change", function() {

  const qrDiv = document.getElementById("qr");
  const nombreDiv = document.getElementById("nombre");
  const obraDiv = document.getElementById("obra");
  const btn = document.getElementById("btnWA");

  qrDiv.innerHTML = "";

  const selected = this.options[this.selectedIndex];

  const codigo = selected.value;
  const nombre = selected.textContent;
  const privada = selected.dataset.privada;
  const casa = selected.dataset.casa;

  if (!codigo) {
    btn.style.display = "none";
    nombreDiv.innerText = "";
    obraDiv.innerText = "";
    return;
  }

  trabajadorSeleccionado = { codigo, nombre, privada, casa };

  // 🔥 AUTOCARGAR FECHAS
  const trabajador = dataGlobal.find(t => t.qr_codigo === codigo);

  document.getElementById("fechaInicio").value = trabajador?.fecha_inicio || "";
  document.getElementById("fechaFin").value = trabajador?.fecha_fin || "";

  const url = `${window.location.origin}/credencial_trabajador.html?qr=${codigo}&nombre=${encodeURIComponent(nombre)}&privada=${privada}&casa=${casa}`;

  QRCode.toCanvas(url, { width: 200 }, function (err, canvas) {
    if (err) {
      console.error(err);
      return;
    }
    qrDiv.appendChild(canvas);
  });

  nombreDiv.innerText = nombre;
  obraDiv.innerText = `Privada ${privada} - Lote ${casa}`;

  btn.style.display = "block";
});

// 📲 WHATSAPP (RESPETADO)
document.getElementById("btnWA").addEventListener("click", () => {

  if (!trabajadorSeleccionado) return;

  const { codigo, nombre, privada, casa } = trabajadorSeleccionado;

  const link = `${window.location.origin}/credencial_trabajador.html?qr=${codigo}&nombre=${encodeURIComponent(nombre)}&privada=${privada}&casa=${casa}`;

  const mensaje = `👷 Credencial de acceso\n\n` +
                  `Nombre: ${nombre}\n` +
                  `Ubicación: Privada ${privada} - Lote ${casa}\n\n` +
                  `Presenta este código en caseta:\n${link}`;

  const wa = `https://wa.me/?text=${encodeURIComponent(mensaje)}`;

  window.open(wa, "_blank");
});

</script>

</body>
</html>

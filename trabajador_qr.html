<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Trabajador</title>

<!-- 🔥 ORDEN CORRECTO -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.card {
  background: #111827;
  padding: 20px;
  border-radius: 20px;
  width: 90%;
  max-width: 350px;
  text-align: center;
}

select {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border-radius: 10px;
  border: none;
  background: #1f2937;
  color: white;
}

#qr { margin-top: 15px; }

.nombre { margin-top: 10px; font-weight: bold; }

.obra {
  font-size: 13px;
  color: #9ca3af;
}

button {
  margin-top: 15px;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #25D366;
  color: white;
  cursor: pointer;
  width: 100%;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="card">

<h2>QR Trabajador</h2>

<select id="trabajador">
  <option value="">Selecciona trabajador</option>
</select>

<div id="qr"></div>

<div class="nombre" id="nombre"></div>
<div class="obra" id="obra"></div>

<button id="btnWA" style="display:none;">
  📲 Enviar credencial por WhatsApp
</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>

let trabajadorSeleccionado = null;

// 🔥 SECUENCIA CORRECTA
window.addEventListener("DOMContentLoaded", async () => {
  await protegerPagina(["admin", "administracion"]);
  await cargarTrabajadores();
});

async function cargarTrabajadores() {

  const { data, error } = await supabaseClient
    .from("trabajadores_obra")
    .select("*")
    .eq("activo", true);

  console.log("DATA:", data);
  console.log("ERROR:", error);

  if (error) {
    console.log("ERROR:", error);
    return;
  }

  const select = document.getElementById("trabajador");

  data.forEach(t => {
    const option = document.createElement("option");
    option.value = t.qr_codigo;
    option.textContent = t.nombre;
    option.dataset.privada = t.privada;
    option.dataset.casa = t.casa;
    select.appendChild(option);
  });
}

document.getElementById("trabajador").addEventListener("change", function() {

  const qrDiv = document.getElementById("qr");
  const nombreDiv = document.getElementById("nombre");
  const obraDiv = document.getElementById("obra");
  const btn = document.getElementById("btnWA");

  qrDiv.innerHTML = "";

  const selected = this.options[this.selectedIndex];

  const codigo = selected.value;
  const nombre = selected.textContent;
  const privada = selected.dataset.privada;
  const casa = selected.dataset.casa;

  if (!codigo) return;

  trabajadorSeleccionado = { codigo, nombre, privada, casa };

  const url = `${window.location.origin}/credencial_trabajador.html?qr=${codigo}&nombre=${encodeURIComponent(nombre)}&privada=${privada}&casa=${casa}`;

  QRCode.toCanvas(url, { width: 200 }, function (err, canvas) {
    qrDiv.appendChild(canvas);
  });

  nombreDiv.innerText = nombre;
  obraDiv.innerText = `Privada ${privada} - Lote ${casa}`;

  btn.style.display = "block";
});

document.getElementById("btnWA").addEventListener("click", () => {

  if (!trabajadorSeleccionado) return;

  const { codigo, nombre, privada, casa } = trabajadorSeleccionado;

  const link = `${window.location.origin}/credencial_trabajador.html?qr=${codigo}&nombre=${encodeURIComponent(nombre)}&privada=${privada}&casa=${casa}`;

  const mensaje = `👷 Credencial de acceso\n\n` +
                  `Nombre: ${nombre}\n` +
                  `Ubicación: Privada ${privada} - Lote ${casa}\n\n` +
                  `Presenta este código en caseta:\n${link}`;

  const wa = `https://wa.me/?text=${encodeURIComponent(mensaje)}`;

  window.open(wa, "_blank");
});

</script>

</body>
</html>

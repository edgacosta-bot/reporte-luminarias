<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Trabajador</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

    <link rel="stylesheet" href="styles/trabajador_qr.css">
</head>

<body>

<div class="card">

<!-- 🔥 LOGO CORRECTO -->
<img src="icono-512.png" class="logo">

<h2>QR Trabajador</h2>

<!-- 🔥 TEXTO UX -->
<div class="descripcion">
  Utilice este formulario para generar códigos QR de acceso para los trabajadores de obra
</div>

<!-- 🔥 FILTRO -->
<select id="filtroPrivada">
  <option value="">Selecciona la privada</option>
</select>

<div id="listaTrabajadores"></div>

<!-- 🔥 NUEVO: FECHAS -->
<label class="label">Fecha inicio de vigencia</label>
<input type="date" id="fechaInicio">

<label class="label">Fecha término de vigencia</label>
<input type="date" id="fechaFin">

<div id="qr"></div>

<div class="nombre" id="nombre"></div>
<div class="obra" id="obra"></div>

<button id="btnWA" style="display:none;">
  📲 Enviar credencial por WhatsApp
</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>

let trabajadorSeleccionado = null;
let dataGlobal = [];

function toggleObra(id, elemento) {

  const contenido = document.getElementById(id);
  const flecha = elemento.querySelector(".flecha");

  if (contenido.style.display === "block") {
    contenido.style.display = "none";
    flecha.innerText = "▼";
  } else {
    contenido.style.display = "block";
    flecha.innerText = "▲";
  }
}  

// 🔥 SECUENCIA (RESPETADA)
window.addEventListener("DOMContentLoaded", async () => {
  await protegerPagina(["administracion"]);
  await cargarTrabajadores();
});

// 🔥 CARGA BASE (RESPETADA)
async function cargarTrabajadores() {

  
  const { data, error } = await supabaseClient
    .from("trabajadores_obra")
    .select("*")
    .eq("activo", true)
    .order("privada")
    .order("nombre");

  if (error) {
    console.log(error);
    return;
  }

  if (!data || data.length === 0) {
    return;
  }

  dataGlobal = data;

  cargarFiltroPrivadas(data);
  renderTrabajadores();

  }

function seleccionarTrabajador(trabajador) {

  const qrDiv = document.getElementById("qr");
  const nombreDiv = document.getElementById("nombre");
  const obraDiv = document.getElementById("obra");
  const btn = document.getElementById("btnWA");

  qrDiv.innerHTML = "";

  trabajadorSeleccionado = trabajador;

  document.getElementById("fechaInicio").value =
    trabajador.fecha_inicio || "";

  document.getElementById("fechaFin").value =
    trabajador.fecha_fin || "";

  const url =
    `${window.location.origin}/credencial_trabajador.html` +
    `?qr=${trabajador.qr_codigo}` +
    `&nombre=${encodeURIComponent(trabajador.nombre)}` +
    `&privada=${trabajador.privada}` +
    `&casa=${trabajador.casa}`;

  QRCode.toCanvas(url, { width: 200 }, function(err, canvas){

    if(err){
      console.error(err);
      return;
    }

    qrDiv.appendChild(canvas);
  });

  nombreDiv.innerText = trabajador.nombre;

  obraDiv.innerText =
    `Privada ${trabajador.privada} - Lote ${trabajador.casa}`;

  btn.style.display = "block";
}

// 🔥 FILTRO (RESPETADO + TEXTO AJUSTADO)
function cargarFiltroPrivadas(data) {

  const filtro = document.getElementById("filtroPrivada");

  const privadas = [...new Set(data.map(t => t.privada))];

  filtro.innerHTML = '<option value="">Selecciona la privada</option>';

  privadas.forEach(p => {
    const option = document.createElement("option");
    option.value = p;
    option.textContent = `Privada ${p}`;
    filtro.appendChild(option);
  });
}

// 🔥 RENDER (RESPETADO)
function renderTrabajadores() {

  const contenedor = document.getElementById("listaTrabajadores");
  const privadaSeleccionada = document.getElementById("filtroPrivada").value;

  const hoy = new Date().toLocaleDateString('sv-SE');

  let filtrados = [...dataGlobal];

  if (privadaSeleccionada) {
    filtrados = filtrados.filter(t => t.privada === privadaSeleccionada);
  }

  contenedor.innerHTML = "";

  if (filtrados.length === 0) {
    contenedor.innerHTML = "No hay trabajadores disponibles";
    return;
  }

  // 🔥 AGRUPAR POR OBRA
  const grupos = {};

  filtrados.forEach(t => {

    const clave = `${t.privada}-${t.casa}`;

    if (!grupos[clave]) grupos[clave] = [];

    grupos[clave].push(t);
  });

  // 🔥 ORDENAR
  Object.keys(grupos)

  .sort((a, b) => {

    const [privadaA, casaA] = a.split("-");
    const [privadaB, casaB] = b.split("-");

    const ordenPrivadas = {
      "I": 1,
      "II": 2,
      "III": 3,
      "IV": 4
    };

    const privadaDiff =
      (ordenPrivadas[privadaA] || 999)
      -
      (ordenPrivadas[privadaB] || 999);

    if (privadaDiff !== 0) return privadaDiff;

    return Number(casaA) - Number(casaB);
  })

  .forEach(clave => {

    const [privada, casa] = clave.split("-");

    const contenidoId = `obra_${privada}_${casa}`;

    const bloque = document.createElement("div");
    bloque.className = "obra-bloque";

    bloque.innerHTML = `
      <div class="obra-header"
           onclick="toggleObra('${contenidoId}', this)">

        <span>
          🏗 Privada ${privada} - Lote ${casa}
          (${grupos[clave].length})
        </span>

        <span class="flecha">▼</span>
      </div>

      <div class="obra-contenido" id="${contenidoId}">
      </div>
    `;

    grupos[clave].forEach(t => {

      const item = document.createElement("div");
      item.className = "trabajador-item";

      item.innerHTML = `👷 ${t.nombre}`;

      item.onclick = () => seleccionarTrabajador(t);

      bloque.querySelector(".obra-contenido")
            .appendChild(item);
    });

    contenedor.appendChild(bloque);
  });
}

// 🔁 EVENTO FILTRO (RESPETADO)
document.getElementById("filtroPrivada").addEventListener("change", renderTrabajadores);

  
// 📲 WHATSAPP (RESPETADO)
document.getElementById("btnWA").addEventListener("click", () => {

  if (!trabajadorSeleccionado) return;

  const {
  qr_codigo,
  nombre,
  privada,
  casa
} = trabajadorSeleccionado;

  const link = `${window.location.origin}/credencial_trabajador.html?qr=${qr_codigo}&nombre=${encodeURIComponent(nombre)}&privada=${privada}&casa=${casa}`;

  const mensaje = `👷 Credencial de acceso\n\n` +
                  `Nombre: ${nombre}\n` +
                  `Ubicación: Privada ${privada} - Lote ${casa}\n\n` +
                  `Presenta este código en caseta:\n${link}`;

  const wa = `https://wa.me/?text=${encodeURIComponent(mensaje)}`;

  window.open(wa, "_blank");
});

</script>

</body>
</html>

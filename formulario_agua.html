<!DOCTYPE html>
<html lang="es">
<head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporte Agua</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #161a1d;
  color: white;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

h2 {
  text-align: center;
}

/* 🔥 TEXTO GUÍA */
.info {
  font-size: 13px;
  color: #e5e7eb;
  margin-bottom: 20px;
  text-align: center;
}

/* 🔥 CAMPOS */
input, select, textarea, button {
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 12px;
  border: 1px solid #334155;
  box-sizing: border-box;
  font-size: 15px;
}

/* 🔥 INPUTS OSCUROS */
input, textarea {
  background: #020617;
  color: white;
}

/* 🔥 SELECT */
select {
  background: #020617;
  color: white;
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;
}

/* 🔥 PLACEHOLDER */
input::placeholder,
textarea::placeholder {
  color: #ffffff;
  opacity: 0.85;
}

/* 🔥 OPCIONES */
select option {
  background: #ffffff;
  color: #000000;
}

/* 🔥 BOTÓN */
button {
  background: #2563eb;
  color: white;
  cursor: pointer;
  border: none;
}

/* 🔥 FOCUS */
input:focus, select:focus, textarea:focus {
  outline: 2px solid #2563eb;
}
</style>
</head>

<body>

<div class="container">

<h2>Reporte de agua</h2>

<p class="info">
Registra el número de reporte proporcionado por CAASIM junto con los datos correspondientes.
</p>

<input id="numero_reporte" placeholder="Número de reporte">

<!-- 🔥 NUEVO CAMPO -->
<input type="date" id="fecha_reporte">

<select id="tipo_falla">
  <option value="">Tipo de falla</option>
  <option value="sin_servicio">Sin servicio</option>
  <option value="fuga">Fuga</option>
  <option value="baja_presion">Baja presión</option>
</select>

<select id="calle"></select>

<input id="numero_exterior" placeholder="Número exterior">

<select id="medio_reporte">
  <option value="">Medio de reporte</option>
  <option value="Teléfono">Teléfono</option>
  <option value="App">App</option>
</select>

<textarea id="observaciones" placeholder="Observaciones (opcional)"></textarea>

<button onclick="guardar()">Guardar reporte</button>

<div id="msg"></div>

</div>

<script>

let userGlobal = null;

window.addEventListener("DOMContentLoaded", async () => {

  await protegerPagina(["colono","residente","admin"]);

  const { data } = await supabaseClient.auth.getUser();
  userGlobal = data?.user;

  if (!userGlobal) {
    alert("Sesión no válida");
    return;
  }

  cargarCalles();

  // 🔥 FECHA POR DEFECTO (HOY)
  const hoy = new Date();

  const fechaHoy =
    hoy.getFullYear() + "-" +
    String(hoy.getMonth() + 1).padStart(2, '0') + "-" +
    String(hoy.getDate()).padStart(2, '0');

  document.getElementById("fecha_reporte").value = fechaHoy;

});

async function cargarCalles(){

  const { data: residente } = await supabaseClient
    .from("residentes")
    .select("privada")
    .eq("user_id", userGlobal.id)
    .single();

  if(!residente) return;

  const { data } = await supabaseClient
    .from("ubicaciones")
    .select("id, calle")
    .eq("privada", residente.privada)
    .order("calle");

  const select = document.getElementById("calle");
  select.innerHTML = '<option value="">Selecciona calle</option>';

  const callesUnicas = [...new Map(data.map(item => [item.calle, item])).values()];

  callesUnicas.forEach(c => {
    const option = document.createElement("option");
    option.value = c.id;
    option.textContent = c.calle;
    select.appendChild(option);
  });
}

async function guardar(){

  const numero_reporte = document.getElementById("numero_reporte").value.trim();
  const fecha_reporte = document.getElementById("fecha_reporte").value;
  const tipo_falla = document.getElementById("tipo_falla").value;
  const calle_id = document.getElementById("calle").value;
  const numero_exterior = document.getElementById("numero_exterior").value.trim();
  const medio_reporte = document.getElementById("medio_reporte").value;
  const observaciones = document.getElementById("observaciones").value.trim();

  const msg = document.getElementById("msg");

  if(!numero_reporte || !tipo_falla || !calle_id || !fecha_reporte){
    msg.innerText = "Completa los campos requeridos";
    return;
  }

  const { data: residente } = await supabaseClient
    .from("residentes")
    .select("id, privada, casa")
    .eq("user_id", userGlobal.id)
    .single();

  if (!residente) {
    msg.innerText = "No se pudo identificar al residente";
    return;
  }

  const { error } = await supabaseClient
    .from("reportes_agua_caasim")
    .insert([{
      residente_id: residente.id,
      privada: residente.privada,
      numero_exterior: residente.casa,
      calle_id,
      numero_reporte,
      tipo_falla,
      medio_reporte,
      observaciones,
      estatus: "reportado",
      fecha_reporte: fecha_reporte
    }]);

  if(error){
    console.error(error);
    msg.innerText = "Error al guardar";
    return;
  }

  msg.innerText = "Reporte guardado correctamente";

  document.getElementById("numero_reporte").value = "";
  document.getElementById("numero_exterior").value = "";
  document.getElementById("observaciones").value = "";

  // 🔥 RESETEAR FECHA A HOY
  const hoy = new Date();
  const fechaHoy =
    hoy.getFullYear() + "-" +
    String(hoy.getMonth() + 1).padStart(2, '0') + "-" +
    String(hoy.getDate()).padStart(2, '0');

  document.getElementById("fecha_reporte").value = fechaHoy;
}

</script>

</body>
</html>

<script>

const SUPABASE_URL = "https://prjxmfhahnzosdwljode.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs";
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyKWLCyjXmziMIFu_2bQoaawhzE4IUAbRnf71fvNsCjuea5DmH150w93FgLC9WqMIw/exec";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 🔐 SESIÓN
const privada = localStorage.getItem("privada");
const casa = localStorage.getItem("casa");

if (!privada || !casa) {
  window.location.href = "login.html";
}

// 👤 INFO
document.getElementById("infoUsuario").innerText =
  `Privada ${privada} - Casa ${casa}`;

// 🔥 CARGAR CALLES
async function cargarCalles() {

  const { data, error } = await supabaseClient
    .from("ubicaciones")
    .select("id, calle")
    .eq("privada", privada);

  if (error) {
    console.log(error);
    return;
  }

  const select = document.getElementById("calle");

  data.forEach(item => {
    const option = document.createElement("option");
    option.value = item.id;
    option.textContent = item.calle;
    select.appendChild(option);
  });
}

cargarCalles();

// 🚀 SUBMIT
document.getElementById("formAgua").addEventListener("submit", async (e) => {

  e.preventDefault();

  const mensaje = document.getElementById("mensaje");
  const calle_id = document.getElementById("calle").value;

  if (!calle_id) {
    mensaje.innerText = "Selecciona la calle";
    mensaje.className = "text-red-600 text-center";
    return;
  }

  try {

    const dataSupabase = {
      fecha_reporte: document.getElementById("fecha_reporte").value,
      numero_reporte: document.getElementById("numero_reporte").value.trim(),
      medio_reporte: document.getElementById("medio_reporte").value,
      tipo_falla: document.getElementById("tipo_falla").value,
      calle_id: calle_id,
      numero_exterior: casa,
      privada: privada   // 🔥 ESTE ES EL CAMBIO CLAVE
    };

    const { error } = await supabaseClient
      .from("reportes_agua_caasim")
      .insert([dataSupabase]);

    if (error) throw error;

    await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      body: "data=" + encodeURIComponent(JSON.stringify(dataSupabase))
    });

    mensaje.innerText = "Reporte registrado correctamente.";
    mensaje.className = "text-green-600 text-center";

    e.target.reset();

  } catch (error) {
    mensaje.innerText = "Error: " + error.message;
    mensaje.className = "text-red-600 text-center";
  }

});

</script>

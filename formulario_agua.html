<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Reporte de Agua - Villas de la Concepción</title>

<script src="https://cdn.tailwindcss.com"></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white shadow-xl rounded-2xl p-6 w-full max-w-md border border-gray-200">

<div class="text-center mb-6">
  <h1 class="text-xl font-semibold text-gray-800">
    Sistema de Información Vecinal
  </h1>
  <p class="text-sm text-gray-500">
    Fraccionamiento Villas de la Concepción
  </p>
</div>

<div id="infoUsuario" class="text-xs text-gray-500 text-center mb-4"></div>

<div class="bg-blue-50 border border-blue-200 text-blue-700 text-sm rounded-lg p-3 mb-5">
  Si realizaste un reporte a CAASIM, regístralo aquí.
</div>

<h2 class="text-lg font-semibold text-gray-700 mb-4 text-center">
  Reporte de suministro de agua
</h2>

<form id="formAgua" class="space-y-4">

<div>
<label>Fecha del reporte</label>
<input type="date" id="fecha_reporte" required class="mt-1 w-full p-3 border rounded-lg">
</div>

<div>
<label>Número de reporte</label>
<input type="text" id="numero_reporte" required class="mt-1 w-full p-3 border rounded-lg">
</div>

<div>
<label>¿Cómo realizaste el reporte?</label>
<select id="medio_reporte" required class="mt-1 w-full p-3 border rounded-lg">
<option value="">Seleccione una opción</option>
<option>Teléfono</option>
<option>App</option>
<option>Presencial</option>
<option>Otro</option>
</select>
</div>

<div>
<label>Tipo de falla</label>
<select id="tipo_falla" required class="mt-1 w-full p-3 border rounded-lg">
<option value="">Seleccione una opción</option>
</select>
</div>

<div>
<label>Calle</label>
<select id="calle" required class="mt-1 w-full p-3 border rounded-lg">
<option value="">Selecciona calle</option>
</select>
</div>

<button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg">
Registrar reporte
</button>

<p id="mensaje" class="text-center text-sm mt-2"></p>

</form>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseClient = supabase.createClient(
  "https://prjxmfhahnzosdwljode.supabase.co",
  "TU_KEY"
);

const APPS_SCRIPT_URL = "TU_SCRIPT";

const privada = localStorage.getItem("privada");
const casa = localStorage.getItem("casa");

document.getElementById("infoUsuario").innerText =
  `Privada ${privada} - Casa ${casa}`;

/* 🔥 NUEVO: CATÁLOGO */
async function cargarCatalogoAgua() {

  const select = document.getElementById("tipo_falla");

  const { data, error } = await supabaseClient
    .from("catalogo_reportes")
    .select("subtipo")
    .eq("categoria", "agua")
    .eq("actor_permitido", "colono")
    .eq("activo", true)
    .order("subtipo");

  if (error) {
    console.error(error);
    return;
  }

  select.innerHTML = '<option value="">Seleccione una opción</option>';

  data.forEach(item => {
    const option = document.createElement("option");
    option.value = item.subtipo;
    option.textContent = item.subtipo.replaceAll("_", " ");
    select.appendChild(option);
  });
}

/* CALLES */
async function cargarCalles() {

  const { data } = await supabaseClient
    .from("ubicaciones")
    .select("id, calle")
    .eq("privada", privada);

  const select = document.getElementById("calle");

  data.forEach(item => {
    const option = document.createElement("option");
    option.value = item.id;
    option.textContent = item.calle;
    select.appendChild(option);
  });
}

/* SUBMIT */
document.getElementById("formAgua").addEventListener("submit", async (e) => {

  e.preventDefault();

  const mensaje = document.getElementById("mensaje");

  const dataSupabase = {
    fecha_reporte: document.getElementById("fecha_reporte").value,
    numero_reporte: document.getElementById("numero_reporte").value.trim(),
    medio_reporte: document.getElementById("medio_reporte").value,
    tipo_falla: document.getElementById("tipo_falla").value,
    calle_id: document.getElementById("calle").value,
    numero_exterior: casa,
    privada: privada
  };

  try {

    const { error } = await supabaseClient
      .from("reportes_agua_caasim")
      .insert([dataSupabase]);

    if (error) throw error;

    await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      body: "data=" + encodeURIComponent(JSON.stringify(dataSupabase))
    });

    mensaje.innerText = "✅ Reporte registrado correctamente";
    mensaje.className = "text-green-600 text-center";

    e.target.reset();

  } catch (error) {
    mensaje.innerText = "Error: " + error.message;
    mensaje.className = "text-red-600 text-center";
  }

});

/* INIT */
document.addEventListener("DOMContentLoaded", () => {
  cargarCatalogoAgua();
  cargarCalles();
});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="utils/residente.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporte Agua</title>

    <link rel="stylesheet" href="styles/formulario_agua.css">
</head>

<body>

<div class="container">

<h2>Reporte de agua</h2>

<p class="info">
Registra el número de reporte proporcionado por CAASIM junto con los datos correspondientes.
</p>

<input id="numero_reporte" placeholder="Número de reporte">

<input 
  type="text" 
  id="fecha_reporte" 
  placeholder="Seleccione la fecha en que hizo el reporte"
  onfocus="this.type='date'"
  onblur="if(!this.value)this.type='text'"
>

<select id="tipo_falla">
  <option value="">Tipo de falla</option>
  <option value="sin_servicio">Sin servicio</option>
  <option value="fuga">Fuga</option>
  <option value="baja_presion">Baja presión</option>
</select>

<select id="calle"></select>


<select id="medio_reporte">
  <option value="">Medio de reporte</option>
  <option value="Teléfono">Teléfono</option>
  <option value="App">App</option>
</select>

<textarea id="observaciones" placeholder="Observaciones (opcional)"></textarea>

<button onclick="guardar()">Guardar reporte</button>

<div id="msg"></div>

</div>

<script>

let residenteGlobal = null;

window.addEventListener("DOMContentLoaded", async () => {

  await protegerPagina(["colono","residente","admin"]);

  residenteGlobal = await getResidente();

  if (!residenteGlobal) {
    alert("Sesión no válida");
    return;
  }

  cargarCalles();

  const hoy = new Date();
  const fechaHoy =
    hoy.getFullYear() + "-" +
    String(hoy.getMonth() + 1).padStart(2, '0') + "-" +
    String(hoy.getDate()).padStart(2, '0');

});

async function cargarCalles(){

  if(!residenteGlobal) return;

  const { data } = await supabaseClient
    .from("ubicaciones")
    .select("id, calle")
    .eq("privada", residenteGlobal.privada)
    .order("calle");

  const select = document.getElementById("calle");
  select.innerHTML = '<option value="">Selecciona calle</option>';

  const callesUnicas = [...new Map(data.map(item => [item.calle, item])).values()];

  callesUnicas.forEach(c => {
    const option = document.createElement("option");
    option.value = c.id;
    option.textContent = c.calle;
    select.appendChild(option);
  });
}

async function guardar(){

  const numero_reporte = document.getElementById("numero_reporte").value.trim();
  const fecha_reporte = document.getElementById("fecha_reporte").value;
  const tipo_falla = document.getElementById("tipo_falla").value;
  const calle_id = document.getElementById("calle").value;
  const medio_reporte = document.getElementById("medio_reporte").value;
  const observaciones = document.getElementById("observaciones").value.trim();

  const msg = document.getElementById("msg");

 if(!numero_reporte || !tipo_falla || !calle_id || !fecha_reporte || !medio_reporte){
    msg.innerText = "Completa los campos requeridos";
    return;
  }

  if (!residenteGlobal) {
    msg.innerText = "No se pudo identificar al residente";
    return;
  }

  // 🔥 CONVERSIÓN CORRECTA A TIMESTAMP (CLAVE)
  const fechaISO = new Date(fecha_reporte + "T00:00:00").toISOString();

  const { error } = await supabaseClient
    .from("reportes_agua_caasim")
    .insert([{
      residente_id: residenteGlobal.id,
      privada: residenteGlobal.privada,
      casa: residenteGlobal.casa,
      calle_id,
      numero_reporte,
      tipo_falla,
      medio_reporte,
      observaciones,
      estatus: "reportado",
      fecha_reporte: fechaISO
    }]);

  if(error){
    console.error(error);
    msg.innerText = "Error al guardar";
    return;
  }

  msg.innerText = "Reporte guardado correctamente";

  document.getElementById("numero_reporte").value = "";
  document.getElementById("observaciones").value = "";

  const hoy = new Date();
  const fechaHoy =
    hoy.getFullYear() + "-" +
    String(hoy.getMonth() + 1).padStart(2, '0') + "-" +
    String(hoy.getDate()).padStart(2, '0');

  document.getElementById("fecha_reporte").value = fechaHoy;
}

</script>

</body>
</html>

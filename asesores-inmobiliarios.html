<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gestionar Asesores</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="auth.js"></script>

<style>

body{
  margin:0;
  font-family:'Segoe UI';
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
}

.container{
  max-width:700px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
}

.kpi{
  background:#111827;
  border-radius:18px;
  padding:20px;
  text-align:center;
  margin-bottom:20px;
}

.kpi span{
  font-size:34px;
  font-weight:bold;
}

.card{
  background:#111827;
  border-radius:18px;
  padding:18px;
  margin-bottom:12px;
}

.titulo-asesor{

  font-size:18px;

  font-weight:bold;

  color:#93c5fd;

  margin-bottom:10px;

}

.activo{

  color:#22c55e;

  font-weight:bold;

}

.inactivo{

  color:#ef4444;

  font-weight:bold;

}  

</style>

</head>

<body>

<div class="container">

  <h1>
    👤 Gestionar Asesores
  </h1>

  <div class="kpi">

    Asesores registrados

    <br><br>

    <span id="kpiAsesores">
      0
    </span>

  </div>

   <div style="text-align:center;margin-bottom:20px;">

  <button
    id="btnNuevoAsesor"
    style="
      background:#2563eb;
      color:white;
      border:none;
      border-radius:12px;
      padding:12px 20px;
      font-size:16px;
      cursor:pointer;
    ">

    ➕ Nuevo asesor

  </button>

</div> 

  <div id="lista"></div>

</div>

<div
  id="modalAsesor"
  style="
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.7);
    justify-content:center;
    align-items:center;
    z-index:9999;
  ">

  <div
    style="
      background:#111827;
      padding:25px;
      border-radius:18px;
      width:90%;
      max-width:500px;
    ">

    <h2>
      Nuevo asesor inmobiliario
    </h2>

   <div style="margin-bottom:12px;">

  <label>
    Nombre
  </label>

  <input
    id="nombreAsesor"
    type="text"
    style="
      width:100%;
      padding:10px;
      margin-top:5px;
      border-radius:8px;
      border:none;
    ">

</div>

<div style="margin-bottom:12px;">

  <label>
    Teléfono
  </label>

  <input
    id="telefonoAsesor"
    type="text"
    style="
      width:100%;
      padding:10px;
      margin-top:5px;
      border-radius:8px;
      border:none;
    ">

</div>

<div style="margin-bottom:12px;">

  <label>
    Empresa
  </label>

  <input
    id="empresaAsesor"
    type="text"
    style="
      width:100%;
      padding:10px;
      margin-top:5px;
      border-radius:8px;
      border:none;
    ">

</div>

<div style="margin-bottom:12px;">

  <label>

    <input
      id="vigenciaIndefinida"
      type="checkbox"
      checked>

    Vigencia indefinida

  </label>

</div>

<div style="margin-bottom:20px;">

  <label>
    Fecha de vencimiento
  </label>

  <input
    id="fechaVencimiento"
    type="date"
    disabled
    style="
      width:100%;
      padding:10px;
      margin-top:5px;
      border-radius:8px;
      border:none;
    ">

</div>

<div
  style="
    display:flex;
    gap:10px;
    justify-content:flex-end;
  ">

  <button id="btnGuardarAsesor">

    Guardar

  </button>

  <button id="btnCerrarModal">

    Cerrar

  </button>

</div>

   </div>

</div>

<script>

let asesores = [];

async function cargar(){

  const { data, error } =
    await supabaseClient.rpc(
      "obtener_asesores_inmobiliarios"
    );

  if(error){

    console.log(error);

    return;

  }

  asesores = data || [];

  renderizar();

  document.getElementById(
    "kpiAsesores"
  ).innerText =
    asesores.length;

  console.log(
    asesores
  );

}

function renderizar(){

  const lista =
    document.getElementById(
      "lista"
    );

  if(
    asesores.length === 0
  ){

    lista.innerHTML =
      "<div class='card'>No existen asesores registrados.</div>";

    return;

  }

  let html = "";

  asesores.forEach(a=>{

    html += `

      <div class="card">

        <div class="titulo-asesor">

          👤 ${a.nombre}

        </div>

        <div>

          <b>🏢 Empresa:</b>

          ${a.empresa || "-"}

        </div>

        <div>

          <b>📱 Teléfono:</b>

          ${a.telefono || "-"}

        </div>

        <div>

          <b>🔐 QR:</b>

          ${
            a.qr_generado
            ? "Generado"
            : "No generado"
          }

        </div>

        <div>

          <b>📅 Vigencia:</b>

          ${
            a.vigencia_indefinida
            ? "Indefinida"
            : a.fecha_vencimiento
          }

        </div>

        <div class="${
          a.activo
          ? 'activo'
          : 'inactivo'
        }">

          ${
            a.activo
            ? '✅ ACTIVO'
            : '🚫 INACTIVO'
          }

        </div>

      </div>

    `;

  });

  lista.innerHTML = html;

}

  function actualizarVigencia(){

  const indefinida =
    document.getElementById(
      "vigenciaIndefinida"
    ).checked;

  document
    .getElementById(
      "fechaVencimiento"
    )
    .disabled =
    indefinida;

}

async function guardarAsesor(){

  const nombre =
    document.getElementById(
      "nombreAsesor"
    ).value.trim();

  const telefono =
    document.getElementById(
      "telefonoAsesor"
    ).value.trim();

  const empresa =
    document.getElementById(
      "empresaAsesor"
    ).value.trim();

  const vigenciaIndefinida =
    document.getElementById(
      "vigenciaIndefinida"
    ).checked;

  const fechaVencimiento =
    document.getElementById(
      "fechaVencimiento"
    ).value || null;

  if(!nombre){

    alert(
      "Debe indicar el nombre del asesor"
    );

    return;

  }

  if(
    !vigenciaIndefinida &&
    !fechaVencimiento
  ){

    alert(
      "Debe indicar la fecha de vencimiento"
    );

    return;

  }

  const { error } =
    await supabaseClient.rpc(
      "crear_asesor_inmobiliario",
      {
        p_nombre: nombre,
        p_telefono: telefono,
        p_empresa: empresa,
        p_vigencia_indefinida:
          vigenciaIndefinida,
        p_fecha_vencimiento:
          fechaVencimiento
      }
    );

  if(error){

    alert(
      error.message
    );

    return;

  }

  document.getElementById(
    "modalAsesor"
  ).style.display =
    "none";

  document.getElementById(
    "nombreAsesor"
  ).value = "";

  document.getElementById(
    "telefonoAsesor"
  ).value = "";

  document.getElementById(
    "empresaAsesor"
  ).value = "";

  document.getElementById(
    "vigenciaIndefinida"
  ).checked = true;

  document.getElementById(
    "fechaVencimiento"
  ).value = "";

  actualizarVigencia();

  await cargar();

}
  
window.addEventListener(
  "DOMContentLoaded",
  async ()=>{

    await protegerPagina([
      "administracion"
    ]);

    await cargar();

   document
  .getElementById(
    "btnNuevoAsesor"
  )
  .addEventListener(
    "click",
    ()=>{

      document
        .getElementById(
          "modalAsesor"
        )
        .style.display =
        "flex";

    }
  );

   document
  .getElementById(
    "vigenciaIndefinida"
  )
  .addEventListener(
    "change",
    actualizarVigencia
  );

actualizarVigencia(); 

  document
  .getElementById(
    "btnCerrarModal"
  )
  .addEventListener(
    "click",
    ()=>{

      document
        .getElementById(
          "modalAsesor"
        )
        .style.display =
        "none";

    }
  );  

  document
  .getElementById(
    "btnGuardarAsesor"
  )
  .addEventListener(
    "click",
    guardarAsesor
  );
    
  }
);

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Control de Abastecimientos</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<style>

body{
  margin:0;
  font-family:'Segoe UI';
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
}

.header-app{
  display:flex;
  justify-content:center;
  margin-top:20px;
}

.logo-app{
  width:80px;
}

.container{
  max-width:700px;
  margin:auto;
  padding:18px;
}

h2{
  text-align:center;
}

input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  font-size:15px;
  background:#1f2937;
  color:white;
  box-sizing:border-box;
}

select,
textarea{

  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  font-size:15px;
  background:#1f2937;
  color:white;
  box-sizing:border-box;

}  

textarea{

  min-height:80px;
  resize:vertical;

}  

.card{
  background:#111827;
  padding:18px;
  border-radius:18px;
  margin-bottom:12px;
  border-left:6px solid #3b82f6;
}

.card h3{
  margin:0 0 8px 0;
}

.privada{
  margin-top:25px;
  margin-bottom:12px;
  font-size:18px;
  font-weight:bold;
  color:#93c5fd;
}

.vacio{
  text-align:center;
  color:#94a3b8;
  margin-top:20px;
}

.tipo{
  font-weight:bold;
  margin-bottom:8px;
}

.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
  font-size:15px;
}

.entrada{
  background:#16a34a;
  color:white;
}

</style>

</head>

<body>

<div class="header-app">
  <img src="/icono-512.png" class="logo-app">
</div>

<div class="container">

<h2>🚧 Control de Abastecimientos</h2>

<input
  id="buscar"
  placeholder="Buscar privada o lote..."
  oninput="renderObras()">

<br><br>

<div id="obras">
  Cargando obras...
</div>

<br>

<h2>🚚 Abastecimientos Abiertos</h2>

<div id="abiertos">
  Cargando...
</div>

</div>

<script>

let obras = [];
let abiertos = [];

let obraExpandida = null;

let tiposMaquinaria = [];

window.addEventListener(
  "DOMContentLoaded",
  async ()=>{

    await protegerPagina(["vigilante"]);

    await cargarObras();

    await cargarAbiertos();
    await cargarTiposMaquinaria();

  }
);

async function cargarObras(){

  const { data, error } =
    await supabaseClient.rpc(
      "obtener_obras_abastecimiento"
    );

  if(error){

    console.log(error);

    document.getElementById("obras").innerHTML =
      "<div class='vacio'>Error cargando obras</div>";

    return;
  }

  obras = data || [];

  renderObras();

}

function mostrarFormulario(id){

  if(obraExpandida === id){

    obraExpandida = null;

  }else{

    obraExpandida = id;

  }

  renderObras();

}

function renderObras(){

  const contenedor =
    document.getElementById("obras");

  const filtro =
    document
      .getElementById("buscar")
      .value
      .trim()
      .toLowerCase();

  const filtradas =
    obras.filter(o =>

      o.privada.toLowerCase().includes(filtro)
      ||
      o.casa.toLowerCase().includes(filtro)

    );

  if(filtradas.length===0){

    contenedor.innerHTML =
      "<div class='vacio'>Sin resultados</div>";

    return;
  }

  let html = "";

  let privadaActual = null;

  filtradas.forEach(o=>{

    const abiertosObra =
      abiertos.filter(
        a => a.obra_id === o.obra_id
      ).length;

    if(privadaActual !== o.privada){

      privadaActual = o.privada;

      html += `
        <div class="privada">
          PRIVADA ${o.privada}
        </div>
      `;
    }

    html += `

      <div class="card">

        <h3>
          Lote ${o.casa}
        </h3>

        <div style="
          margin-bottom:8px;
          font-size:14px;
          color:${
            abiertosObra > 0
              ? '#fbbf24'
              : '#4ade80'
          };
        ">

          ${
            abiertosObra > 0
              ? `🟠 ${abiertosObra} abastecimiento(s) abierto(s)`
              : `🟢 Sin abastecimientos abiertos`
          }

        </div>

        <div>
          DRO:
          ${o.dro_nombre || "No especificado"}
        </div>

       <br>

<button
  class="btn entrada"
  onclick="mostrarFormulario('${o.obra_id}')">

  Registrar abastecimiento

</button>

${
  obraExpandida === o.obra_id
  ? `

    <div style="
      margin-top:16px;
      padding-top:16px;
      border-top:1px solid #374151;
    ">

      <div style="margin-bottom:10px;">
        🚧 Formulario en construcción
      </div>

      <input
        placeholder="Proveedor">

      <br><br>

      <input
        placeholder="Nombre quien ingresa">

      <br><br>

      <input
        placeholder="Descripción">

      <br><br>

      <input
        placeholder="NIP vigilante">

    </div>

  `
  : ''
}

      </div>

    `;
  });

  contenedor.innerHTML = html;
}

async function cargarAbiertos(){

  const { data, error } =
    await supabaseClient.rpc(
      "obtener_abastecimientos_abiertos"
    );

  const contenedor =
    document.getElementById("abiertos");

  if(error){

    contenedor.innerHTML =
      "<div class='vacio'>Error cargando datos</div>";

    console.log(error);

    return;
  }

  abiertos = data || [];

  renderObras();

  if(abiertos.length===0){

    contenedor.innerHTML =
      "<div class='vacio'>Sin abastecimientos abiertos</div>";

    return;
  }

  let html = "";

  abiertos.forEach(a=>{

    html += `

      <div class="card">

        <div class="tipo">
          ${a.tipo_ingreso}
        </div>

        <div>
          <b>Proveedor:</b>
          ${a.proveedor}
        </div>

        <div>
          <b>Ingresó:</b>
          ${a.nombre_ingresa}
        </div>

        <div>
          <b>Descripción:</b>
          ${a.descripcion}
        </div>

        <div>
          <b>Ubicación:</b>
          Privada ${a.privada}
          - Lote ${a.casa}
        </div>

      </div>

    `;
  });

  contenedor.innerHTML = html;
}

async function cargarTiposMaquinaria(){

  const { data } =
    await supabaseClient.rpc(
      "obtener_tipos_maquinaria"
    );

  tiposMaquinaria = data || [];

  console.log(
  "Tipos maquinaria:",
  tiposMaquinaria
);

}  

</script>

</body>
</html>

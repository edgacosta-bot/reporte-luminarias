<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Control de Abastecimientos</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<style>

body{
  margin:0;
  font-family:'Segoe UI';
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
}

.header-app{
  display:flex;
  justify-content:center;
  margin-top:20px;
}

.logo-app{
  width:80px;
}

.container{
  max-width:700px;
  margin:auto;
  padding:18px;
}

h2{
  text-align:center;
}

input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  font-size:15px;
  background:#1f2937;
  color:white;
  box-sizing:border-box;
}

select,
textarea{

  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  font-size:15px;
  background:#1f2937;
  color:white;
  box-sizing:border-box;

}  

textarea{

  min-height:80px;
  resize:vertical;

}  

.card{
  background:#111827;
  padding:18px;
  border-radius:18px;
  margin-bottom:12px;
  border-left:6px solid #3b82f6;
}

.card h3{
  margin:0 0 8px 0;
}

.privada{
  margin-top:25px;
  margin-bottom:12px;
  font-size:18px;
  font-weight:bold;
  color:#93c5fd;
}

.vacio{
  text-align:center;
  color:#94a3b8;
  margin-top:20px;
}

.tipo{
  font-weight:bold;
  margin-bottom:8px;
}

.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
  font-size:15px;
}

.entrada{
  background:#16a34a;
  color:white;
}

</style>

</head>

<body>

<div class="header-app">
  <img src="/icono-512.png" class="logo-app">
</div>

<div class="container">

<h2>🚧 Control de Abastecimientos</h2>

<input
  id="buscar"
  placeholder="Buscar privada o lote..."
  oninput="renderObras()">

<br><br>

<div id="obras">
  Cargando obras...
</div>

<br>

<h2 id="tituloAbiertos">
🚚 Abastecimientos Abiertos
</h2>

<div id="abiertos">
  Cargando...
</div>

</div>

<script>

let obras = [];
let abiertos = [];

let obraExpandida = null;

let salidaExpandida = null;

let tiposMaquinaria = [];

window.addEventListener(
  "DOMContentLoaded",
  async ()=>{

    await protegerPagina(["vigilante"]);

    await cargarObras();

    await cargarAbiertos();
    await cargarTiposMaquinaria();

  }
);

async function cargarObras(){

  const { data, error } =
    await supabaseClient.rpc(
      "obtener_obras_abastecimiento"
    );

  if(error){

    console.log(error);

    document.getElementById("obras").innerHTML =
      "<div class='vacio'>Error cargando obras</div>";

    return;
  }

  obras = data || [];

  renderObras();

}

function mostrarFormulario(id){

  if(obraExpandida === id){

    obraExpandida = null;

  }else{

    obraExpandida = id;

  }

  renderObras();

}

function mostrarSalida(accesoId){

  if(salidaExpandida === accesoId){

    salidaExpandida = null;

  }else{

    salidaExpandida = accesoId;

  }

  cargarAbiertos();

}  

async function confirmarSalida(accesoId){

  const pin =
    document.getElementById(
      "pin_salida_" + accesoId
    ).value.trim();

  const msg =
    document.getElementById(
      "msg_salida_" + accesoId
    );

  msg.innerHTML = "";

  if(pin === ""){

    msg.style.color = "#f87171";

    msg.innerHTML =
      "Debe capturar el NIP";

    return;
  }

  const { data, error } =
    await supabaseClient.rpc(
      "validar_pin_vigilante",
      {
        pin_input: pin
      }
    );

  if(error){

    console.log(error);

    msg.style.color = "#f87171";

    msg.innerHTML =
      "Error validando NIP";

    return;
  }

  if(!data || data.length === 0){

    msg.style.color = "#f87171";

    msg.innerHTML =
      "NIP incorrecto";

    return;
  }

  const { data: salidaData, error: salidaError } =
  await supabaseClient.rpc(
    "registrar_salida_abastecimiento",
    {
      p_acceso_id:
        accesoId,

      p_vigilante_id:
        data[0].id
    }
  );

if(salidaError){

  console.log(salidaError);

  msg.style.color = "#f87171";

  msg.innerHTML =
    "Error registrando salida";

  return;
}

if(
  !salidaData ||
  salidaData.length === 0 ||
  !salidaData[0].actualizado
){

  msg.style.color = "#f87171";

  msg.innerHTML =
    "El abastecimiento ya fue cerrado";

  return;
}

msg.style.color = "#4ade80";

msg.innerHTML =
  "✅ Salida registrada correctamente";

setTimeout(async ()=>{

  salidaExpandida = null;

  await cargarAbiertos();

  await cargarObras();

}, 2000);

}  

function cambiarTipoIngreso(obraId){

  const tipo =
    document.getElementById(
      "tipo_" + obraId
    ).value;

  const contenedor =
    document.getElementById(
      "contenedor_maquinaria_" + obraId
    );

  contenedor.style.display =
    tipo === "MAQUINARIA"
      ? "block"
      : "none";

}  

async function registrarIngreso(obraId){

  const pin =
    document.getElementById(
      "pin_" + obraId
    ).value.trim();

  const msg =
    document.getElementById(
      "msg_" + obraId
    );

  msg.innerHTML = "";

  if(pin === ""){

    msg.style.color = "#f87171";

    msg.innerHTML =
      "Debe capturar el NIP del vigilante";

    return;
  }

  const { data, error } =
    await supabaseClient.rpc(
      "validar_pin_vigilante",
      {
        pin_input: pin
      }
    );

  if(error){

    console.log(error);

    msg.style.color = "#f87171";

    msg.innerHTML =
      "Error validando NIP";

    return;
  }

  if(!data || data.length === 0){

    msg.style.color = "#f87171";

    msg.innerHTML =
      "NIP incorrecto";

    return;
  }

  const tipoIngreso =
  document.getElementById(
    "tipo_" + obraId
  ).value;

const tipoMaquinaria =
  document.getElementById(
    "maquinaria_" + obraId
  )?.value || null;

const proveedor =
  document.getElementById(
    "proveedor_" + obraId
  ).value.trim();

const nombre =
  document.getElementById(
    "nombre_" + obraId
  ).value.trim();

const descripcion =
  document.getElementById(
    "descripcion_" + obraId
  ).value.trim();

const placas =
  document.getElementById(
    "placas_" + obraId
  ).value.trim();

const observaciones =
  document.getElementById(
    "observaciones_" + obraId
  ).value.trim();

const { error: errorRegistro } =
  await supabaseClient.rpc(
    "registrar_entrada_abastecimiento",
    {

      p_obra_id:
        obraId,

      p_tipo_ingreso:
        tipoIngreso,

      p_tipo_maquinaria_id:
        tipoIngreso === "MAQUINARIA"
          ? Number(tipoMaquinaria)
          : null,

      p_proveedor:
        proveedor,

      p_nombre_ingresa:
        nombre,

      p_descripcion:
        descripcion,

      p_placas:
        placas,

      p_observaciones:
        observaciones,

      p_vigilante_id:
        data[0].id

    }
  );

if(errorRegistro){

  console.log(errorRegistro);

  msg.style.color = "#f87171";

  msg.innerHTML =
    errorRegistro.message;

  return;
}

msg.style.color = "#4ade80";

msg.innerHTML =
  "✅ Abastecimiento registrado correctamente";

setTimeout(async () => {

  obraExpandida = null;

  await cargarAbiertos();

  await cargarObras();

}, 2000);

}

function renderObras(){

  const contenedor =
    document.getElementById("obras");

  const filtro =
    document
      .getElementById("buscar")
      .value
      .trim()
      .toLowerCase();

  const filtradas =
    obras.filter(o =>

      o.privada.toLowerCase().includes(filtro)
      ||
      o.casa.toLowerCase().includes(filtro)

    );

  if(filtradas.length===0){

    contenedor.innerHTML =
      "<div class='vacio'>Sin resultados</div>";

    return;
  }

  let html = "";

  let privadaActual = null;

  filtradas.forEach(o=>{

    const abiertosObra =
      abiertos.filter(
        a => a.obra_id === o.obra_id
      ).length;

    if(privadaActual !== o.privada){

      privadaActual = o.privada;

      html += `
        <div class="privada">
          PRIVADA ${o.privada}
        </div>
      `;
    }

    html += `

      <div class="card">

        <h3>
          Lote ${o.casa}
        </h3>

        <div style="
          margin-bottom:8px;
          font-size:14px;
          color:${
            abiertosObra > 0
              ? '#fbbf24'
              : '#4ade80'
          };
        ">

          ${
            abiertosObra > 0
              ? `🟠 ${abiertosObra} abastecimiento(s) abierto(s)`
              : `🟢 Sin abastecimientos abiertos`
          }

        </div>

        <div>
          DRO:
          ${o.dro_nombre || "No especificado"}
        </div>

       <br>

<button
  class="btn entrada"
  onclick="mostrarFormulario('${o.obra_id}')">

  Registrar abastecimiento

</button>

${
  obraExpandida === o.obra_id
  ? `

    <div style="
      margin-top:16px;
      padding-top:16px;
      border-top:1px solid #374151;
    ">

     <div style="margin-bottom:12px;">

  <label>
    Tipo ingreso *
  </label>

  <select
    id="tipo_${o.obra_id}"
    onchange="cambiarTipoIngreso('${o.obra_id}')">

    <option value="">
      Seleccione...
    </option>

    <option value="SUMINISTRO">
      SUMINISTRO
    </option>

    <option value="MAQUINARIA">
      MAQUINARIA
    </option>

  </select>

</div>

<div
  id="contenedor_maquinaria_${o.obra_id}"
  style="display:none; margin-bottom:12px;">

  <label>
    Tipo maquinaria *
  </label>

  <select
    id="maquinaria_${o.obra_id}">

    <option value="">
      Seleccione...
    </option>

    ${
      tiposMaquinaria.map(m => `
        <option value="${m.id}">
          ${m.nombre}
        </option>
      `).join('')
    }

  </select>

</div>

<div style="margin-bottom:12px;">

  <label>
    Proveedor *
  </label>

  <input
    id="proveedor_${o.obra_id}"
    placeholder="Proveedor">

</div>

<div style="margin-bottom:12px;">

  <label>
    Nombre quien ingresa *
  </label>

  <input
    id="nombre_${o.obra_id}"
    placeholder="Nombre completo">

</div>

<div style="margin-bottom:12px;">

  <label>
    Descripción *
  </label>

  <textarea
    id="descripcion_${o.obra_id}"
    placeholder="Descripción"></textarea>

</div>

<div style="margin-bottom:12px;">

  <label>
    Placas
  </label>

  <input
    id="placas_${o.obra_id}"
    placeholder="Placas">

</div>

<div style="margin-bottom:12px;">

  <label>
    Observaciones
  </label>

  <textarea
    id="observaciones_${o.obra_id}"
    placeholder="Observaciones"></textarea>

</div>

<div style="margin-bottom:12px;">

  <label>
    NIP vigilante *
  </label>

  <input
    id="pin_${o.obra_id}"
    type="password"
    placeholder="NIP">

</div>

<div
  id="msg_${o.obra_id}"
  class="vacio"
  style="margin-bottom:12px;">
</div>

<button
  class="btn entrada"
  onclick="registrarIngreso('${o.obra_id}')">

  Registrar ingreso

</button>

    </div>

  `
  : ''
}

      </div>

    `;
  });

  contenedor.innerHTML = html;
}

async function cargarAbiertos(){

  const { data, error } =
    await supabaseClient.rpc(
      "obtener_abastecimientos_abiertos"
    );

  const contenedor =
    document.getElementById("abiertos");

  if(error){

    contenedor.innerHTML =
      "<div class='vacio'>Error cargando datos</div>";

    console.log(error);

    return;
  }

  abiertos = data || [];

  document.getElementById(
  "tituloAbiertos"
).innerHTML =
  `🚚 Abastecimientos Abiertos (${abiertos.length})`;

  renderObras();

  if(abiertos.length===0){

    contenedor.innerHTML =
      "<div class='vacio'>Sin abastecimientos abiertos</div>";

    return;
  }

  let html = "";

  abiertos.forEach(a=>{

    html += `

      <div class="card">

        <div class="tipo">
          ${a.tipo_ingreso}
        </div>

        ${
  a.tipo_maquinaria
  ? `
      <div style="margin-bottom:8px;">
        <b>Tipo maquinaria:</b>
        ${a.tipo_maquinaria}
      </div>
    `
  : ''
}

        <div>
          <b>Proveedor:</b>
          ${a.proveedor}
        </div>

        <div>
          <b>Ingresó:</b>
          ${a.nombre_ingresa}
        </div>

        <div>
          <b>Descripción:</b>
          ${a.descripcion}
        </div>

        <div>
          <b>Ubicación:</b>
          Privada ${a.privada}
          - Lote ${a.casa}
        </div>

        <br>

<button
  class="btn entrada"
  onclick="mostrarSalida('${a.acceso_id}')">

  Registrar salida

</button>

${
  salidaExpandida === a.acceso_id
  ? `
    <br><br>

    <input
      id="pin_salida_${a.acceso_id}"
      type="password"
      placeholder="NIP vigilante">

    <br><br>

    <button
  class="btn entrada"
  onclick="confirmarSalida('${a.acceso_id}')">

  ✅ Confirmar salida

</button>

<div
  id="msg_salida_${a.acceso_id}"
  class="vacio"
  style="margin-top:10px;">
</div>
  `
  : ''
}

      </div>

    `;
  });

  contenedor.innerHTML = html;
}

async function cargarTiposMaquinaria(){

  const { data } =
    await supabaseClient.rpc(
      "obtener_tipos_maquinaria"
    );

  tiposMaquinaria = data || [];

  console.log(
  "Tipos maquinaria:",
  tiposMaquinaria
);

}  

</script>

</body>
</html>

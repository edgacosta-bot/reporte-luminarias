<!DOCTYPE html>
<html lang="es">
<head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script>
protegerPagina(["colono","residente"]);
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis reportes</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
}

.container {
  max-width: 520px;
  margin: auto;
  padding: 20px;
}

.aviso {
  background: #1f2937;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
  font-size: 14px;
  color: #d1d5db;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
}

button {
  padding: 10px;
  width: 100%;
  border-radius: 10px;
  border: none;
  background: #2563eb;
  color: white;
  margin-top: 5px;
}

.item {
  background: #111827;
  padding: 15px;
  border-radius: 12px;
  margin-top: 10px;
  border-left: 6px solid;
}

.vecinal { border-color: #ef4444; }
.obra { border-color: #f59e0b; }

.fecha {
  font-size: 12px;
  color: #9ca3af;
}

.modal {
  position: fixed;
  top:0; left:0; right:0; bottom:0;
  background: rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:#111827;
  padding:20px;
  border-radius:12px;
  text-align:center;
}

.emoji {
  font-size: 30px;
  margin: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>📋 Mis reportes</h2>

<div class="aviso">
Estimado residente:<br><br>
Después de 5 días de haber realizado su reporte, podrá evaluar la atención recibida por parte de la administración.<br><br>
Su evaluación nos ayuda a mejorar el servicio.<br><br>
Gracias por su apoyo.
</div>

<input type="date" id="inicio">
<input type="date" id="fin">

<button onclick="cargar()">Consultar</button>

<div id="lista">Cargando...</div>

</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <h3>¿Cómo fue la atención?</h3>
    <span class="emoji" onclick="evaluar('feliz')">😊</span>
    <span class="emoji" onclick="evaluar('neutral')">😐</span>
    <span class="emoji" onclick="evaluar('triste')">😞</span>
  </div>
</div>

<script>

let privada, casa;
let seleccionado = null;

async function obtenerUsuario(){
  const { data } = await supabaseClient.auth.getUser();
  const userId = data.user.id;

  const { data:res } = await supabaseClient
    .from("residentes")
    .select("privada,casa")
    .eq("user_id", userId)
    .single();

  privada = res?.privada;
  casa = res?.casa;
}

function dias(fecha){
  return (new Date() - new Date(fecha)) / (1000*60*60*24);
}

async function cargar(){

  document.getElementById("lista").innerHTML = "Cargando...";

  const inicio = document.getElementById("inicio").value;
  const fin = document.getElementById("fin").value;

  let registros = [];

  // 🔴 VECINAL (modo seguro corregido)
  let querySeg = supabaseClient
    .from("reportes_seguridad")
    .select("*")
    .or(`privada.eq.${privada},privada.eq.caseta`);

  if (inicio && fin) {
    querySeg = querySeg
      .gte("fecha", inicio + "T00:00:00")
      .lte("fecha", fin + "T23:59:59");
  }

  const { data: seg, error: errSeg } = await querySeg;

  console.log("SEG:", seg, errSeg);

  seg?.forEach(i=>{
    registros.push({
      tipo:"vecinal",
      id:i.id,
      descripcion:i.descripcion,
      fecha:i.fecha
    });
  });

  // 🟠 OBRAS
  let queryObras = supabaseClient
    .from("reportes_obras")
    .select("*")
    .eq("privada", privada)
    .eq("casa", casa);

  if (inicio && fin) {
    let ini = new Date(inicio + "T00:00:00");
    let fi = new Date(fin + "T23:59:59");
    fi.setDate(fi.getDate() + 1);

    queryObras = queryObras
      .gte("fecha_reporte", ini.toISOString())
      .lt("fecha_reporte", fi.toISOString());
  }

  const { data: obras, error: errObras } = await queryObras;

  console.log("OBRAS:", obras, errObras);

  obras?.forEach(i=>{
    registros.push({
      tipo:"obra",
      id:i.id,
      descripcion:i.descripcion,
      fecha:i.fecha_reporte
    });
  });

  // 🔍 evaluaciones
  const { data: evals } = await supabaseClient
    .from("evaluaciones_reportes")
    .select("reporte_id");

  const evaluados = new Set(evals?.map(e=>e.reporte_id));

  // 🎯 render
  let html="";

  registros
    .sort((a,b)=> new Date(b.fecha)-new Date(a.fecha))
    .forEach(r=>{

      let puedeEvaluar =
        (r.tipo === "vecinal" || r.tipo === "obra") &&
        dias(r.fecha) >= 5 &&
        !evaluados.has(r.id);

      html+=`
      <div class="item ${r.tipo}">
        <b>${r.tipo.toUpperCase()}</b>
        <div>${r.descripcion}</div>
        <div class="fecha">${new Date(r.fecha).toLocaleString("es-MX")}</div>

        ${puedeEvaluar ? `<button onclick="abrir('${r.id}')">Evaluar atención</button>`:""}
      </div>
      `;
    });

  document.getElementById("lista").innerHTML = html || "Sin resultados";
}

function abrir(id){
  seleccionado = id;
  document.getElementById("modal").style.display="flex";
}

async function evaluar(tipo){
  await supabaseClient.from("evaluaciones_reportes").insert([{
    reporte_id: seleccionado,
    tipo_reporte: "general",
    calificacion: tipo,
    privada,
    casa
  }]);

  document.getElementById("modal").style.display="none";
  cargar();
}

async function iniciar(){
  await obtenerUsuario();
  cargar();
}

iniciar();

</script>

</body>
</html>

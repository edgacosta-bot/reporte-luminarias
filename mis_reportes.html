<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis reportes</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

h2 {
  text-align: center;
}

.input-fecha {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  box-sizing: border-box;
}

.label {
  font-size: 13px;
  color: #9ca3af;
  margin-top: 10px;
}

.card {
  background: #111827;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 10px;
}

.tipo {
  font-weight: bold;
}

.fecha {
  font-size: 12px;
  color: #9ca3af;
}

.luminaria { border-left: 5px solid #9f1239; }
.agua { border-left: 5px solid #2563eb; }
.incidencia { border-left: 5px solid #dc2626; }

.back {
  display: block;
  margin-top: 15px;
  text-align: center;
  color: #9ca3af;
}
</style>
</head>

<body>

<div class="container">

<h2>📋 Mis reportes</h2>

<div class="label">Selecciona una fecha (opcional)</div>
<input type="date" id="fecha" class="input-fecha" onchange="cargarReportes()">

<div id="lista"></div>

<a href="reportes.html" class="back">← Volver</a>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseClient = supabase.createClient(
  "https://prjxmfhahnzosdwljode.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs"
);

let privada = null;
let casa = null;

async function obtenerDatosUsuario() {

  const { data: userData } = await supabaseClient.auth.getUser();

  if (!userData?.user) {
    window.location.href = "login.html";
    return;
  }

  const userId = userData.user.id;

  const { data: residente } = await supabaseClient
    .from("residentes")
    .select("privada, casa")
    .eq("user_id", userId)
    .maybeSingle();

  if (!residente) {
    window.location.href = "login.html";
    return;
  }

  privada = residente.privada;
  casa = residente.casa;
}  
function formatearFechaLocal(fechaISO) {
  if (!fechaISO) return "";

  const fecha = new Date(fechaISO);

  return fecha.toLocaleString("es-MX", {
    timeZone: "America/Mexico_City",
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit"
  });
}

async function cargarReportes() {

  const fecha = document.getElementById("fecha").value;
  const lista = document.getElementById("lista");

  lista.innerHTML = "Cargando...";

  let html = "";

  // 🔴 INCIDENCIAS
  let queryInc = supabaseClient
    .from("incidencias_vecinales")
    .select("*")
    .eq("privada", privada)
    .eq("casa", casa);

  if (fecha) {
    queryInc = queryInc
      .gte("fecha_local", fecha + "T00:00:00")
      .lte("fecha_local", fecha + "T23:59:59");
  }

  const { data: incidencias } = await queryInc.order("fecha_local", { ascending: false });

  incidencias?.forEach(item => {
    html += `
      <div class="card incidencia">
        <div class="tipo">⚠️ ${item.tipo}</div>
        <div>${item.descripcion}</div>
        <div class="fecha">${formatearFechaLocal(item.fecha_local)}</div>
      </div>
    `;
  });

  // 🔵 LUMINARIAS
  let queryLum = supabaseClient
    .from("reportes_vecinales")
    .select("*")
    .eq("privada", privada)
    .eq("casa", casa);

  if (fecha) {
    queryLum = queryLum
      .gte("fecha_reporte", fecha + "T00:00:00")
      .lte("fecha_reporte", fecha + "T23:59:59");
  }

  const { data: luminarias } = await queryLum.order("fecha_reporte", { ascending: false });

  luminarias?.forEach(item => {
    html += `
      <div class="card luminaria">
        <div class="tipo">💡 Luminaria #${item.no_luminaria}</div>
        <div>${item.descripcion}</div>
        <div class="fecha">${formatearFechaLocal(item.fecha_reporte)}</div>
      </div>
    `;
  });

  // 💧 AGUA
  let queryAgua = supabaseClient
    .from("reportes_agua_caasim")
    .select("*")
    .eq("privada", privada)
    .eq("numero_exterior", casa);

  if (fecha) {
    queryAgua = queryAgua
      .gte("fecha_registro", fecha + "T00:00:00")
      .lte("fecha_registro", fecha + "T23:59:59");
  }

  const { data: agua } = await queryAgua.order("fecha_registro", { ascending: false });

  agua?.forEach(item => {
    html += `
      <div class="card agua">
        <div class="tipo">💧 ${item.tipo_falla}</div>
        <div>Folio: ${item.numero_reporte}</div>
        <div class="fecha">${formatearFechaLocal(item.fecha_registro)}</div>
      </div>
    `;
  });

  lista.innerHTML = html || "No hay reportes";
}

async function iniciar() {
  await obtenerDatosUsuario();
  cargarReportes();
}

iniciar();

</script>

</body>
</html>

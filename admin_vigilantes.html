<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de vigilantes</title>

<script src="auth.js"></script>
<script>
protegerPagina(["admin"]);
</script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

.card {
  background: #1f2937;
  border-radius: 14px;
  padding: 15px;
  margin-bottom: 12px;
}

.nombre {
  font-weight: bold;
  font-size: 16px;
}

.info {
  font-size: 12px;
  color: #9ca3af;
  margin-bottom: 10px;
}

.botones {
  display: flex;
  gap: 8px;
}

button {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}

.btn-on { background: #16a34a; color: white; }
.btn-off { background: #6b7280; color: white; }
.btn-del { background: #dc2626; color: white; }
.btn-edit { background: #2563eb; color: white; }
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="container">

<h2>🛡️ Vigilantes</h2>

<button onclick="abrirModalNuevo()" 
  style="width:100%; margin-bottom:15px; padding:12px; border-radius:10px; border:none; background:#16a34a; color:white; font-weight:bold;">
  ➕ Nuevo vigilante
</button>  

<div id="lista"></div>

<!-- 🔐 MODAL CAMBIAR PIN -->
<div id="modalPin" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); align-items:center; justify-content:center;">

  <div style="background:#111827; padding:20px; border-radius:16px; width:90%; max-width:300px; text-align:center;">

    <h3 style="margin-top:0;">🔐 Cambiar PIN</h3>

    <input id="nuevoPinInput" type="number" placeholder="Nuevo PIN"
      style="width:100%; padding:12px; border-radius:10px; border:none; margin-top:10px; text-align:center; font-size:18px;" />

    <div style="display:flex; gap:10px; margin-top:15px;">
      <button onclick="cerrarModal()" style="flex:1; padding:10px; border-radius:10px; border:none; background:#6b7280; color:white;">
        Cancelar
      </button>

      <button onclick="guardarPin()" style="flex:1; padding:10px; border-radius:10px; border:none; background:#16a34a; color:white;">
        Guardar
      </button>
    </div>

  </div>

</div>

<!-- 👮 MODAL NUEVO VIGILANTE -->
<div id="modalNuevo" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); align-items:center; justify-content:center;">

  <div style="background:#111827; padding:20px; border-radius:16px; width:90%; max-width:300px; text-align:center;">

    <h3 style="margin-top:0;">👮 Nuevo vigilante</h3>

    <input id="nombreNuevo" type="text" placeholder="Nombre"
      style="width:100%; padding:12px; border-radius:10px; border:none; margin-top:10px;" />

    <input id="pinNuevo" type="number" placeholder="PIN (4 dígitos)"
      style="width:100%; padding:12px; border-radius:10px; border:none; margin-top:10px; text-align:center;" />

    <div style="display:flex; gap:10px; margin-top:15px;">
      <button onclick="cerrarModalNuevo()" style="flex:1; padding:10px; border-radius:10px; border:none; background:#6b7280; color:white;">
        Cancelar
      </button>

      <button onclick="crearVigilante()" style="flex:1; padding:10px; border-radius:10px; border:none; background:#16a34a; color:white;">
        Guardar
      </button>
    </div>

  </div>

</div>

</div>

<script>

const client = window.supabase.createClient(
  "https://prjxmfhahnzosdwljode.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs"
);

let vigilanteSeleccionado = null;

cargar();

async function cargar() {

  const { data } = await client
    .from("residentes")
    .select("*")
    .eq("tipo", "vigilante")
    .order("created_at", { ascending: false });

  const contenedor = document.getElementById("lista");
  contenedor.innerHTML = "";

  data.forEach(v => {

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="nombre">${v.nombre}</div>

      <div class="info">
        PIN: ${v.pin_vigilante || "No definido"}
      </div>

      <div class="botones">
        <button class="${v.activo ? 'btn-off' : 'btn-on'}"
          onclick="toggle('${v.id}', ${v.activo})">
          ${v.activo ? 'Desactivar' : 'Activar'}
        </button>

        <button class="btn-edit"
          onclick="abrirModal('${v.id}')">
          Cambiar PIN
        </button>

        <button class="btn-del"
          onclick="eliminar('${v.id}')">
          Eliminar
        </button>
      </div>
    `;

    contenedor.appendChild(card);
  });
}

async function toggle(id, estadoActual) {
  await client
    .from("residentes")
    .update({ activo: !estadoActual })
    .eq("id", id);

  cargar();
}

async function eliminar(id) {
  if (!confirm("¿Eliminar vigilante?")) return;

  await client
    .from("residentes")
    .delete()
    .eq("id", id);

  cargar();
}

function abrirModal(id) {
  vigilanteSeleccionado = id;
  document.getElementById("modalPin").style.display = "flex";
}

function cerrarModal() {
  document.getElementById("modalPin").style.display = "none";
  document.getElementById("nuevoPinInput").value = "";
}

async function guardarPin() {

  const nuevo = document.getElementById("nuevoPinInput").value;

  if (!nuevo || nuevo.length !== 4 || isNaN(nuevo)) {
    alert("El PIN debe ser de 4 dígitos numéricos");
    return;
  }

  const { data: existe } = await client
    .from("residentes")
    .select("id")
    .eq("pin_vigilante", nuevo)
    .neq("id", vigilanteSeleccionado)
    .maybeSingle();

  if (existe) {
    alert("Ese PIN ya está en uso");
    return;
  }

  const { error } = await client
    .from("residentes")
    .update({ pin_vigilante: nuevo })
    .eq("id", vigilanteSeleccionado);

  if (error) {
    alert("Error al guardar");
    return;
  }

  cerrarModal();
  cargar();
}

function abrirModalNuevo() {
  document.getElementById("modalNuevo").style.display = "flex";
}

function cerrarModalNuevo() {
  document.getElementById("modalNuevo").style.display = "none";
  document.getElementById("nombreNuevo").value = "";
  document.getElementById("pinNuevo").value = "";
}

async function crearVigilante() {

  const nombre = document.getElementById("nombreNuevo").value;
  const pin = document.getElementById("pinNuevo").value;

  if (!nombre) {
    alert("Ingresa nombre");
    return;
  }

  if (!pin || pin.length !== 4 || isNaN(pin)) {
    alert("PIN inválido");
    return;
  }

  const { data: existe } = await client
    .from("residentes")
    .select("id")
    .eq("pin_vigilante", pin)
    .maybeSingle();

  if (existe) {
    alert("Ese PIN ya existe");
    return;
  }

  const { error } = await client
    .from("residentes")
    .insert([{
      nombre: nombre,
      tipo: "vigilante",
      privada: "SEG",
      casa: nombre,
      pin_vigilante: pin,
      activo: true
    }]);

 if (error) {
  console.log("ERROR COMPLETO:", error);
  alert(error.message);
  return;
}

  cerrarModalNuevo();
  cargar();
}

</script>

</body>
</html>

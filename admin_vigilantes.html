<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de vigilantes</title>

<!-- 🔥 ORDEN CORRECTO -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

.card {
  background: #1f2937;
  border-radius: 14px;
  padding: 15px;
  margin-bottom: 12px;
}

.nombre {
  font-weight: bold;
  font-size: 16px;
}

.info {
  font-size: 12px;
  color: #9ca3af;
  margin-bottom: 10px;
}

.botones {
  display: flex;
  gap: 8px;
}

button {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}

  .modal {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.75);
  backdrop-filter: blur(4px);
  align-items:center;
  justify-content:center;
  z-index:1000;
}

.modal-content {
  background:#111827;
  width:90%;
  max-width:360px;
  border-radius:20px;
  padding:24px;
  box-shadow:0 20px 40px rgba(0,0,0,0.45);
  border:1px solid rgba(255,255,255,0.05);
}

.modal-title {
  text-align:center;
  font-size:20px;
  font-weight:bold;
  margin-bottom:20px;
}

.input-moderno {
  width:100%;
  height:52px;
  padding:0 14px;
  margin-bottom:14px;
  border:none;
  border-radius:12px;
  background:#1f2937;
  color:white;
  font-size:14px;
  box-sizing:border-box;
}

.input-moderno:focus {
  outline:none;
  border:1px solid #2563eb;
}

.modal-botones {
  display:flex;
  gap:10px;
  margin-top:10px;
}

.btn-secundario {
  flex:1;
  background:#374151;
  color:white;
}

.btn-primario {
  flex:1;
  background:#2563eb;
  color:white;
}

.btn-on { background: #16a34a; color: white; }
.btn-off { background: #6b7280; color: white; }
.btn-del { background: #dc2626; color: white; }
.btn-edit { background: #2563eb; color: white; }
</style>

</head>

<body>

<div class="container">

<h2 style="font-size:28px;">👮 Vigilantes</h2>

<button onclick="abrirModalNuevo()" 
  style="width:100%; margin-bottom:15px; padding:12px; border-radius:10px; border:none; background:#16a34a; color:white; font-weight:bold;">
  ➕ Nuevo vigilante
</button>  

<div id="lista"></div>

<!-- MODAL PIN -->
<div id="modalPin" class="modal">

  <div class="modal-content">

    <div class="modal-title">
      🔐 Cambiar PIN
    </div>

    <input
      id="nuevoPinInput"
      class="input-moderno"
      type="number"
      placeholder="Nuevo PIN de 4 dígitos"
    />

    <div class="modal-botones">
      <button onclick="cerrarModal()" class="btn-secundario">
        Cancelar
      </button>

      <button onclick="guardarPin()" class="btn-primario">
        Guardar
      </button>
    </div>

  </div>

</div>

<!-- MODAL NUEVO -->
<div id="modalNuevo" class="modal">

  <div class="modal-content">

    <div class="modal-title">
      👮 Nuevo vigilante
    </div>

    <input
      id="nombreNuevo"
      class="input-moderno"
      type="text"
      placeholder="Nombre del vigilante"
    />

    <input
      id="pinNuevo"
      class="input-moderno"
      type="number"
      placeholder="PIN de 4 dígitos"
    />

    <div class="modal-botones">

    <button
  type="button"
  onclick="cerrarModalNuevo()"
  class="btn-secundario">
  Cancelar
</button>

<button
  type="button"
  onclick="crearVigilante()"
  class="btn-primario">
  Guardar
</button>

    </div>

  </div>

</div>

 <!-- MODAL ELIMINAR -->
<div id="modalEliminar" class="modal">

  <div class="modal-content">

    <div class="modal-title">
      ⚠️ Eliminar vigilante
    </div>

    <p style="color:#9ca3af; text-align:center; margin-bottom:20px;">
      El vigilante será desactivado del sistema.
    </p>

    <div class="modal-botones">

      <button onclick="cerrarModalEliminar()" class="btn-secundario">
        Cancelar
      </button>

      <button onclick="confirmarEliminar()"
        style="flex:1; background:#dc2626; color:white;">
        Eliminar
      </button>

    </div>

  </div>

</div> 

<!-- TOAST -->
<div id="toast" style="position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
background:#111827; color:white; padding:14px 20px; border-radius:12px; opacity:0;"></div>

<script>

let vigilanteSeleccionado = null;
let vigilanteEliminar = null;  

window.addEventListener("DOMContentLoaded", async () => {
  await protegerPagina(["admin","administracion"]);
  await cargar();
});

// 🔔 TOAST
function mostrarToast(mensaje, tipo = "ok") {
  const toast = document.getElementById("toast");
  toast.innerText = mensaje;
  toast.style.background = tipo === "error" ? "#dc2626" : tipo === "warn" ? "#f59e0b" : "#16a34a";
  toast.style.opacity = "1";
  setTimeout(() => toast.style.opacity = "0", 2500);
}

// 🔄 CARGAR
async function cargar() {

  const { data, error } = await supabaseClient
  .from("residentes")
  .select("*")
  .eq("tipo", "vigilante")
  .neq("casa", "1")
  .order("created_at", { ascending: false });

  if (error) {
    console.error(error);
    mostrarToast("Error cargando vigilantes", "error");
    return;
  }

  const contenedor = document.getElementById("lista");
  contenedor.innerHTML = "";

  data.forEach(v => {

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="nombre">${v.nombre}</div>
      <div class="info">PIN: ${v.pin_vigilante || "No definido"}</div>

      <div class="botones">
        <button class="${v.activo ? 'btn-off' : 'btn-on'}"
          onclick="toggle('${v.id}', ${v.activo})">
          ${v.activo ? 'Desactivar' : 'Activar'}
        </button>

        <button class="btn-edit" onclick="abrirModal('${v.id}')">
          Cambiar PIN
        </button>

        <button class="btn-del" onclick="eliminar('${v.id}')">
          Eliminar
        </button>
      </div>
    `;

    contenedor.appendChild(card);
  });
}

// 🔁 TOGGLE
async function toggle(id, estadoActual) {
  await supabaseClient
    .from("residentes")
    .update({ activo: !estadoActual })
    .eq("id", id);

  cargar();
}

// 🗑️ ELIMINAR → 🔥 SOFT DELETE
function eliminar(id) {

  vigilanteEliminar = id;

  document.getElementById("modalEliminar").style.display = "flex";
}

function cerrarModalEliminar() {

  document.getElementById("modalEliminar").style.display = "none";
}

async function confirmarEliminar() {

  await supabaseClient
    .from("residentes")
    .update({ activo: false })
    .eq("id", vigilanteEliminar);

  cerrarModalEliminar();

  mostrarToast("Vigilante desactivado");

  cargar();
}

// 🔐 PIN
function abrirModal(id) {
  vigilanteSeleccionado = id;
  document.getElementById("modalPin").style.display = "flex";
}

function cerrarModal() {
  document.getElementById("modalPin").style.display = "none";
  document.getElementById("nuevoPinInput").value = "";
}

async function guardarPin() {

  const nuevo = document.getElementById("nuevoPinInput").value;

  if (!nuevo || nuevo.length !== 4) {
    mostrarToast("PIN inválido", "warn");
    return;
  }

  /*
const { data: existe } = await supabaseClient
  .from("residentes")
  .select("id")
  .eq("pin_vigilante", pin)
  .maybeSingle();

if (existe) {
  mostrarToast("PIN ya existe", "error");
  return;
}
*/

  await supabaseClient
    .from("residentes")
    .update({ pin_vigilante: nuevo })
    .eq("id", vigilanteSeleccionado);

  cerrarModal();
  mostrarToast("PIN actualizado");
  cargar();
}

// ➕ NUEVO
function abrirModalNuevo() {
  document.getElementById("modalNuevo").style.display = "flex";
}

function cerrarModalNuevo() {
  document.getElementById("modalNuevo").style.display = "none";
}

async function crearVigilante() {

  try {

  const nombre = document.getElementById("nombreNuevo").value;
  const pin = document.getElementById("pinNuevo").value;

  if (!nombre || !pin || pin.length !== 4) {
    mostrarToast("Datos inválidos", "warn");
    return;
  }

  const { data: existe } = await supabaseClient
    .from("residentes")
    .select("id")
    .eq("pin_vigilante", pin)
    .maybeSingle();

  if (existe) {
    mostrarToast("PIN ya existe", "error");
    return;
  }

// 🔢 OBTENER SIGUIENTE NÚMERO OPERATIVO

const { data: ultimo } = await supabaseClient
  .from("residentes")
  .select("casa")
  .eq("tipo", "vigilante")
  .eq("privada", "SEG")
  .order("created_at", { ascending: false })
  .limit(1)
  .maybeSingle();

let siguienteNumero = 1;

if (ultimo?.casa && !isNaN(parseInt(ultimo.casa))) {
  siguienteNumero = parseInt(ultimo.casa) + 1;
}
    
 const { error } = await supabaseClient
  .from("residentes")
  .insert([{
    nombre,
    tipo: "vigilante",
    privada: "SEG",
    casa: String(siguienteNumero),
    pin_vigilante: pin,
    activo: true,
    created_at: new Date().toISOString()
  }]);

    console.log("INSERT TERMINÓ");
    console.log(error);

if (error) {
  console.error(error);
  alert(error.message);
  return;
}

 cerrarModalNuevo();
mostrarToast("Vigilante creado");

cargar();

} catch(err) {
  console.error(err);
  alert(err.message);
}
    
}

</script>

</body>
</html>

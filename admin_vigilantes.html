<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de vigilantes</title>

<!-- 🔥 ORDEN CORRECTO -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

.card {
  background: #1f2937;
  border-radius: 14px;
  padding: 15px;
  margin-bottom: 12px;
}

.nombre {
  font-weight: bold;
  font-size: 16px;
}

.info {
  font-size: 12px;
  color: #9ca3af;
  margin-bottom: 10px;
}

.botones {
  display: flex;
  gap: 8px;
}

button {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}

.btn-on { background: #16a34a; color: white; }
.btn-off { background: #6b7280; color: white; }
.btn-del { background: #dc2626; color: white; }
.btn-edit { background: #2563eb; color: white; }
</style>

</head>

<body>

<div class="container">

<h2>🛡️ Vigilantes</h2>

<button onclick="abrirModalNuevo()" 
  style="width:100%; margin-bottom:15px; padding:12px; border-radius:10px; border:none; background:#16a34a; color:white; font-weight:bold;">
  ➕ Nuevo vigilante
</button>  

<div id="lista"></div>

<!-- MODAL PIN -->
<div id="modalPin" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); align-items:center; justify-content:center;">
  <div style="background:#111827; padding:20px; border-radius:16px; width:90%; max-width:300px; text-align:center;">
    <h3>🔐 Cambiar PIN</h3>
    <input id="nuevoPinInput" type="number" placeholder="Nuevo PIN"
      style="width:100%; padding:12px; border-radius:10px; border:none; margin-top:10px; text-align:center; font-size:18px;" />
    <div style="display:flex; gap:10px; margin-top:15px;">
      <button onclick="cerrarModal()" style="flex:1; background:#6b7280;">Cancelar</button>
      <button onclick="guardarPin()" style="flex:1; background:#16a34a;">Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL NUEVO -->
<div id="modalNuevo" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); align-items:center; justify-content:center;">
  <div style="background:#111827; padding:20px; border-radius:16px; width:90%; max-width:300px; text-align:center;">
    <h3>👮 Nuevo vigilante</h3>
    <input id="nombreNuevo" type="text" placeholder="Nombre">
    <input id="pinNuevo" type="number" placeholder="PIN (4 dígitos)">
    <div style="display:flex; gap:10px; margin-top:15px;">
      <button onclick="cerrarModalNuevo()" style="flex:1; background:#6b7280;">Cancelar</button>
      <button onclick="crearVigilante()" style="flex:1; background:#16a34a;">Guardar</button>
    </div>
  </div>
</div>

</div>

<!-- TOAST -->
<div id="toast" style="position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
background:#111827; color:white; padding:14px 20px; border-radius:12px; opacity:0;"></div>

<script>

let vigilanteSeleccionado = null;

window.addEventListener("DOMContentLoaded", async () => {
  await protegerPagina(["admin","administracion"]);
  await cargar();
});

// 🔔 TOAST
function mostrarToast(mensaje, tipo = "ok") {
  const toast = document.getElementById("toast");
  toast.innerText = mensaje;
  toast.style.background = tipo === "error" ? "#dc2626" : tipo === "warn" ? "#f59e0b" : "#16a34a";
  toast.style.opacity = "1";
  setTimeout(() => toast.style.opacity = "0", 2500);
}

// 🔄 CARGAR
async function cargar() {

  const { data, error } = await supabaseClient
    .from("residentes")
    .select("*")
    .eq("tipo", "vigilante")
    .order("created_at", { ascending: false });

  if (error) {
    console.error(error);
    mostrarToast("Error cargando vigilantes", "error");
    return;
  }

  const contenedor = document.getElementById("lista");
  contenedor.innerHTML = "";

  data.forEach(v => {

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="nombre">${v.nombre}</div>
      <div class="info">PIN: ${v.pin_vigilante || "No definido"}</div>

      <div class="botones">
        <button class="${v.activo ? 'btn-off' : 'btn-on'}"
          onclick="toggle('${v.id}', ${v.activo})">
          ${v.activo ? 'Desactivar' : 'Activar'}
        </button>

        <button class="btn-edit" onclick="abrirModal('${v.id}')">
          Cambiar PIN
        </button>

        <button class="btn-del" onclick="eliminar('${v.id}')">
          Eliminar
        </button>
      </div>
    `;

    contenedor.appendChild(card);
  });
}

// 🔁 TOGGLE
async function toggle(id, estadoActual) {
  await supabaseClient
    .from("residentes")
    .update({ activo: !estadoActual })
    .eq("id", id);

  cargar();
}

// 🗑️ ELIMINAR → 🔥 SOFT DELETE
async function eliminar(id) {
  if (!confirm("¿Eliminar vigilante?")) return;

  await supabaseClient
    .from("residentes")
    .update({ activo: false })
    .eq("id", id);

  mostrarToast("Vigilante desactivado");
  cargar();
}

// 🔐 PIN
function abrirModal(id) {
  vigilanteSeleccionado = id;
  document.getElementById("modalPin").style.display = "flex";
}

function cerrarModal() {
  document.getElementById("modalPin").style.display = "none";
  document.getElementById("nuevoPinInput").value = "";
}

async function guardarPin() {

  const nuevo = document.getElementById("nuevoPinInput").value;

  if (!nuevo || nuevo.length !== 4) {
    mostrarToast("PIN inválido", "warn");
    return;
  }

  const { data: existe } = await supabaseClient
    .from("residentes")
    .select("id")
    .eq("pin_vigilante", nuevo)
    .neq("id", vigilanteSeleccionado)
    .maybeSingle();

  if (existe) {
    mostrarToast("PIN ya usado", "error");
    return;
  }

  await supabaseClient
    .from("residentes")
    .update({ pin_vigilante: nuevo })
    .eq("id", vigilanteSeleccionado);

  cerrarModal();
  mostrarToast("PIN actualizado");
  cargar();
}

// ➕ NUEVO
function abrirModalNuevo() {
  document.getElementById("modalNuevo").style.display = "flex";
}

function cerrarModalNuevo() {
  document.getElementById("modalNuevo").style.display = "none";
}

async function crearVigilante() {

  const nombre = document.getElementById("nombreNuevo").value;
  const pin = document.getElementById("pinNuevo").value;

  if (!nombre || !pin || pin.length !== 4) {
    mostrarToast("Datos inválidos", "warn");
    return;
  }

  const { data: existe } = await supabaseClient
    .from("residentes")
    .select("id")
    .eq("pin_vigilante", pin)
    .maybeSingle();

  if (existe) {
    mostrarToast("PIN ya existe", "error");
    return;
  }

  await supabaseClient
    .from("residentes")
    .insert([{
      nombre,
      tipo: "vigilante",
      privada: "SEG",
      casa: nombre,
      pin_vigilante: pin,
      activo: true,
      created_at: new Date().toISOString() // 🔥 AJUSTE
    }]);

  cerrarModalNuevo();
  mostrarToast("Vigilante creado");
  cargar();
}

</script>

</body>
</html>

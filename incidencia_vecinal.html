<style>

  align-items: center;

.card {

textarea {

}

button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: #dc2626;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.mensaje {
  margin-top: 10px;
  text-align: center;
}

.ok { color: #34d399; }
.error { color: #f87171; }

.back {

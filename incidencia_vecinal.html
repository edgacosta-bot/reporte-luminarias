<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporte de incidente</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./auth.js"></script>
<script src="utils/residente.js"></script>

<script>
protegerPagina(["colono","residente"]);
</script>

        <link rel="stylesheet" href="styles/global.css">
<link rel="stylesheet" href="styles/incidencia_vecinal.css">
</head>

<body>

<div class="card">

<h2>🚨 Reportar incidente</h2>

<select id="tipo">
  <option value="">Tipo de incidente</option>
</select>

<textarea id="descripcion" placeholder="Describe el incidente..."></textarea>

<select id="privada_afectada">
  <option value="">Privada relacionada (opcional)</option>
</select>

<select id="lote_afectado">
 <option value="">Lote relacionado (opcional)</option>
</select>

<p style="
  font-size:12px;
  color:#9ca3af;
  margin-top:0;
  margin-bottom:12px;
">
Opcionalmente puede indicar la residencia relacionada con el incidente reportado.
</p>  

<button onclick="reportar()">Enviar reporte</button>

<div id="mensaje" class="mensaje"></div>

<a href="index.html" class="back">← Volver</a>

</div>

<script>

let lotesGlobal = [];

// 🔹 CATÁLOGO INCIDENTES
async function cargarCatalogo() {

  const select = document.getElementById("tipo");

  const { data, error } = await supabaseClient
  .from("catalogo_reportes")
  .select("subtipo")
  .eq("categoria", "vecinal")
  .eq("actor_permitido", "residente")
  .eq("activo", true)
  .order("subtipo");

if (error) {
  console.error("Error catálogo:", error);
  return;
}

  select.innerHTML = '<option value="">Tipo de incidente</option>';

  data.forEach(item => {
    const option = document.createElement("option");
    option.value = item.subtipo;
    option.textContent = item.subtipo.replaceAll("_", " ");
    select.appendChild(option);
  });
}

// 🔹 CARGAR LOTES
async function cargarLotes() {

  const { data } = await supabaseClient
    .from("lotes")
    .select("privada, lote")
    .not("privada", "in", "(ADMIN,SEG)");

  lotesGlobal = data;

  const privadas = [...new Set(data.map(l => l.privada))];

  const selectPriv = document.getElementById("privada_afectada");

  privadas.forEach(p => {
    const option = document.createElement("option");
    option.value = p;
    option.textContent = p;
    selectPriv.appendChild(option);
  });
}

// 🔹 FILTRAR LOTES
function filtrarLotes() {

  const privada = document.getElementById("privada_afectada").value;
  const selectLote = document.getElementById("lote_afectado");

  selectLote.innerHTML = '<option value="">Lote relacionado (opcional)</option>';

  const filtrados = lotesGlobal.filter(l => l.privada === privada);

  filtrados.forEach(l => {
    const option = document.createElement("option");
    option.value = l.lote;
    option.textContent = l.lote;
    selectLote.appendChild(option);
  });
}

// 🔹 ENVIAR
async function reportar() {

  const tipo = document.getElementById("tipo").value;
  const descripcion = document.getElementById("descripcion").value.trim();
  const privadaAfectada = document.getElementById("privada_afectada").value;
  const loteAfectado = document.getElementById("lote_afectado").value;
  const mensaje = document.getElementById("mensaje");

  if (!tipo || !descripcion) {
    mensaje.innerText = "Completa todos los campos";
    mensaje.className = "mensaje error";
    return;
  }

  // 🔥 NUEVO: obtener residente GLOBAL
  const residente = await getResidente();

  if (!residente) {
    mensaje.innerText = "Error de sesión";
    mensaje.className = "mensaje error";
    return;
  }

// 🔍 DEBUG
console.log({
  privadaAfectada,
  loteAfectado
});
  
  const { error } = await supabaseClient
    .from("incidencias_vecinales")
    .insert([{
  categoria: "vecinal",
  tipo,
  descripcion,

  residente_id: residente.id,

  privada: residente.privada,
  casa: residente.casa,

  // 🔥 NUEVO (TRAZABILIDAD)
  creado_por: residente.id,
  rol_creador: "residente",

  privada_afectada: privadaAfectada ? privadaAfectada : null,
  casa_afectada: loteAfectado ? String(loteAfectado) : null,

  fecha_reporte: new Date().toISOString(),
  estatus: "nuevo",
  atendido: false
}]);

  if (error) {
    mensaje.innerText = "Error al enviar reporte";
    mensaje.className = "mensaje error";
    return;
  }

  mensaje.innerText = "Reporte enviado correctamente ✅";
  mensaje.className = "mensaje ok";

  document.getElementById("descripcion").value = "";
}

// 🔄 INIT
document.addEventListener("DOMContentLoaded", async () => {
  await cargarCatalogo();
  await cargarLotes();

  document
    .getElementById("privada_afectada")
    .addEventListener("change", filtrarLotes);
});

</script>

</body>
</html>

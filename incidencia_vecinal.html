<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporte de incidente</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: #111827;
  padding: 25px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
}

h2 {
  text-align: center;
  margin-bottom: 15px;
}

select, textarea {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 10px;
  border: none;
  background: #1f2937;
  color: white;
}

textarea {
  min-height: 100px;
  resize: none;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: #dc2626;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.mensaje {
  margin-top: 10px;
  text-align: center;
}

.ok { color: #34d399; }
.error { color: #f87171; }

.back {
  margin-top: 10px;
  display: block;
  text-align: center;
  color: #9ca3af;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="card">

<h2>🚨 Reportar incidente</h2>

<select id="tipo">
  <option value="">Tipo de incidente</option>
</select>

<textarea id="descripcion" placeholder="Describe el incidente..."></textarea>

<button onclick="reportar()">Enviar reporte</button>

<div id="mensaje" class="mensaje"></div>

<a href="index.html" class="back">← Volver</a>

</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Tu auth existente -->
<script src="./auth.js"></script>

<script>

// 🔹 Cargar catálogo dinámico
async function cargarCatalogo() {

  const select = document.getElementById("tipo");

  const { data, error } = await supabaseClient
    .from("catalogo_reportes")
    .select("subtipo")
    .eq("categoria", "vecinal")
    .eq("actor_permitido", "colono")
    .eq("activo", true)
    .order("subtipo");

  if (error) {
    console.error("Error cargando catálogo:", error);
    return;
  }

  // limpiar
  select.innerHTML = '<option value="">Tipo de incidente</option>';

  data.forEach(item => {
    const option = document.createElement("option");
    option.value = item.subtipo;
    option.textContent = item.subtipo.replaceAll("_", " ");
    select.appendChild(option);
  });

}


// 🔹 Enviar reporte
async function reportar() {

  const tipo = document.getElementById("tipo").value;
  const descripcion = document.getElementById("descripcion").value.trim();
  const mensaje = document.getElementById("mensaje");

  mensaje.className = "mensaje";

  if (!tipo || !descripcion) {
    mensaje.innerText = "Completa todos los campos";
    mensaje.classList.add("error");
    return;
  }

  const privada = localStorage.getItem("privada");
  const casa = localStorage.getItem("casa");

  const ahoraUTC = new Date();
  const fechaMexico = new Date(ahoraUTC.getTime() - (6 * 60 * 60 * 1000));
  const fechaLocal = fechaMexico.toISOString().slice(0, 19);

  const { error } = await supabaseClient
    .from("incidencias_vecinales")
    .insert([{
      categoria: "vecinal", // 🔥 NUEVO (normalización)
      tipo: tipo,
      descripcion: descripcion,
      privada: privada,
      casa: casa,
      fecha: ahoraUTC.toISOString(),
      fecha_local: fechaLocal,
      estatus: "nuevo",
      atendido: false
    }]);

  if (error) {
    console.error(error);
    mensaje.innerText = "Error al enviar reporte";
    mensaje.classList.add("error");
    return;
  }

  mensaje.innerText = "Reporte enviado correctamente ✅";
  mensaje.classList.add("ok");

  document.getElementById("descripcion").value = "";
  document.getElementById("tipo").value = "";
}


// 🔹 Ejecutar al cargar
document.addEventListener("DOMContentLoaded", () => {
  cargarCatalogo();
});

</script>

</body>
</html>

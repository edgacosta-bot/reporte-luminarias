<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporte de incidente</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./auth.js"></script>

<script>
protegerPagina(["colono","residente"]);
</script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: #111827;
  padding: 25px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
}

h2 {
  text-align: center;
  margin-bottom: 15px;
}

/* 🔥 INPUTS ALINEADOS */
select, textarea, input {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 10px;
  border: none;
  background: #1f2937;
  color: white;
  box-sizing: border-box; /* 🔥 CLAVE */
}

textarea {
  min-height: 100px;
  resize: none;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: #dc2626;
  color: white;
  font-size: 16px;
  cursor: pointer;
  box-sizing: border-box;
}

.mensaje {
  margin-top: 10px;
  text-align: center;
}

.ok { color: #34d399; }
.error { color: #f87171; }

.back {
  margin-top: 10px;
  display: block;
  text-align: center;
  color: #9ca3af;
  text-decoration: none;
}

</style>
</head>

<body>

<div class="card">

<h2>🚨 Reportar incidente</h2>

<select id="tipo">
  <option value="">Tipo de incidente</option>
</select>

<textarea id="descripcion" placeholder="Describe el incidente..."></textarea>

<!-- 🔥 NUEVO BLOQUE -->
<input type="text" id="privada_afectada" placeholder="Privada afectada (opcional)">
<input type="text" id="casa_afectada" placeholder="Casa afectada (opcional)">

<button onclick="reportar()">Enviar reporte</button>

<div id="mensaje" class="mensaje"></div>

<a href="index.html" class="back">← Volver</a>

</div>

<script>

let residenteGlobal = null;

// 🔐 USUARIO REAL
async function obtenerUsuario() {

  const { data } = await supabaseClient.auth.getUser();
  const user = data?.user;

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  const { data: residente } = await supabaseClient
    .from("residentes")
    .select("privada, casa")
    .eq("user_id", user.id)
    .single();

  residenteGlobal = {
    ...residente,
    user_id: user.id
  };
}

// 🔹 CATÁLOGO
async function cargarCatalogo() {

  const select = document.getElementById("tipo");

  const { data } = await supabaseClient
    .from("catalogo_reportes")
    .select("subtipo")
    .eq("categoria", "vecinal")
    .eq("actor_permitido", "colono")
    .eq("activo", true)
    .order("subtipo");

  select.innerHTML = '<option value="">Tipo de incidente</option>';

  data.forEach(item => {
    const option = document.createElement("option");
    option.value = item.subtipo;
    option.textContent = item.subtipo.replaceAll("_", " ");
    select.appendChild(option);
  });
}

// 🔹 ENVIAR
async function reportar() {

  const tipo = document.getElementById("tipo").value;
  const descripcion = document.getElementById("descripcion").value.trim();
  const privadaAfectada = document.getElementById("privada_afectada").value.trim();
  const casaAfectada = document.getElementById("casa_afectada").value.trim();
  const mensaje = document.getElementById("mensaje");

  mensaje.className = "mensaje";

  if (!tipo || !descripcion) {
    mensaje.innerText = "Completa todos los campos";
    mensaje.classList.add("error");
    return;
  }

  if (!residenteGlobal) {
    mensaje.innerText = "Error de sesión";
    mensaje.classList.add("error");
    return;
  }

  const { error } = await supabaseClient
    .from("incidencias_vecinales")
    .insert([{
      categoria: "vecinal",
      tipo: tipo,
      descripcion: descripcion,

      // 🔐 QUIEN REPORTA
      residente_id: residenteGlobal.user_id,
      privada: residenteGlobal.privada,
      casa: residenteGlobal.casa,

      // 🎯 A QUIÉN REPORTA (OPCIONAL)
      privada_afectada: privadaAfectada || null,
      casa_afectada: casaAfectada || null,

      fecha: new Date().toISOString(),
      estatus: "nuevo",
      atendido: false
    }]);

  if (error) {
    mensaje.innerText = "Error al enviar reporte";
    mensaje.classList.add("error");
    return;
  }

  mensaje.innerText = "Reporte enviado correctamente ✅";
  mensaje.classList.add("ok");

  document.getElementById("descripcion").value = "";
  document.getElementById("tipo").value = "";
  document.getElementById("privada_afectada").value = "";
  document.getElementById("casa_afectada").value = "";
}

// 🔄 INIT
document.addEventListener("DOMContentLoaded", async () => {
  await obtenerUsuario();
  cargarCatalogo();
});

</script>

</body>
</html>

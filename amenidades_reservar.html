<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reservar Amenidad</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="auth.js"></script>

<script src="utils/dates.js"></script>

    <link rel="stylesheet" href="styles/amenidades_reservar.css">
</head>

<body>

<div class="container">

<h1>
🏟 Reservar Amenidad
</h1>

  
<div id="lista">
</div>

</div>

<script>

let amenidades = [];

function renderizar(){

  const lista =
    document.getElementById(
      "lista"
    );

  if(
    amenidades.length === 0
  ){

    lista.innerHTML = `
      <div class="card">
        No existen amenidades disponibles.
      </div>
    `;

    return;

  }

  let html = "";

  amenidades.forEach(a => {

    html += `

      <div class="card">

        <div
          style="
            font-size:20px;
            font-weight:bold;
            color:#93c5fd;
            margin-bottom:12px;
          "
        >

          🏟 ${a.nombre}

        </div>

        <div>

          <b>Capacidad:</b>

          ${a.capacidad_maxima}

        </div>

        <div>

          <b>Invitados permitidos:</b>

          ${a.max_invitados}

        </div>

        <div>

          <b>Horario:</b>

          ${a.horario_inicio}
          -
          ${a.horario_fin}

        </div>

        <br>

        <button
          onclick="
            reservarAmenidad(
              '${a.amenidad_id}'
            )
          "
        >

          Reservar

        </button>

      </div>

    `;

  });

  lista.innerHTML = html;

}

function reservarAmenidad(
  amenidadId
){

  window.location.href =

    `reservar_amenidad.html?amenidad_id=${amenidadId}`;

}
  
async function cargar(){

  const { data, error } =
    await supabaseClient.rpc(
      "obtener_amenidades"
    );

  if(error){

    console.error(error);

    return;

  }

  amenidades = data || [];

  renderizar();

}
  
  
window.addEventListener(
  "DOMContentLoaded",
  async ()=>{

    await protegerPagina([
      "residente"
    ]);
    
    await cargar();

  }
);

</script>

</body>
</html>

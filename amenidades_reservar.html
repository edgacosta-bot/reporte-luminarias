<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reservar Amenidad</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="auth.js"></script>

<script src="utils/dates.js"></script>

<style>

body{
  margin:0;
  font-family:'Segoe UI';
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
}

.container{
  max-width:700px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
}

.kpi{
  background:#111827;
  border-radius:18px;
  padding:20px;
  text-align:center;
  margin-bottom:20px;
}

.kpi span{
  font-size:34px;
  font-weight:bold;
}

.filtros{
  background:#111827;
  border-radius:18px;
  padding:18px;
  margin-bottom:20px;
}

input,
select{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#1f2937;
  color:white;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}

.rangos{
  display:flex;
  gap:8px;
  margin-bottom:15px;
}

.rangos button{
  flex:1;
}

.card{
  background:#111827;
  border-radius:18px;
  padding:18px;
  margin-bottom:12px;
}

.dentro{
  color:#fbbf24;
  font-weight:bold;
}

.salio{
  color:#4ade80;
  font-weight:bold;
}

.label{
  margin-top:10px;
  margin-bottom:5px;
  color:#94a3b8;
  font-size:13px;
}

.badge{

  display:inline-block;

  padding:6px 12px;

  border-radius:999px;

  font-size:12px;

  font-weight:bold;

  margin-top:8px;

  margin-bottom:10px;

}

.badge-suministro{

  background:#1e3a8a;

  color:white;

}

.badge-maquinaria{

  background:#92400e;

  color:white;

}

.titulo-obra{

  font-size:18px;

  font-weight:bold;

  color:#93c5fd;

  margin-bottom:10px;

}  

</style>

</head>

<body>

<div class="container">

<h1>
🏟 Reservar Amenidad
</h1>

  
<div id="lista">
</div>

</div>

<script>

let amenidades = [];

function renderizar(){

  const lista =
    document.getElementById(
      "lista"
    );

  if(
    amenidades.length === 0
  ){

    lista.innerHTML = `
      <div class="card">
        No existen amenidades disponibles.
      </div>
    `;

    return;

  }

  let html = "";

  amenidades.forEach(a => {

    html += `

      <div class="card">

        <div
          style="
            font-size:20px;
            font-weight:bold;
            color:#93c5fd;
            margin-bottom:12px;
          "
        >

          🏟 ${a.nombre}

        </div>

        <div>

          <b>Capacidad:</b>

          ${a.capacidad_maxima}

        </div>

        <div>

          <b>Invitados permitidos:</b>

          ${a.max_invitados}

        </div>

        <div>

          <b>Horario:</b>

          ${a.horario_inicio}
          -
          ${a.horario_fin}

        </div>

        <br>

        <button
          onclick="
            reservarAmenidad(
              '${a.amenidad_id}'
            )
          "
        >

          Reservar

        </button>

      </div>

    `;

  });

  lista.innerHTML = html;

}

function reservarAmenidad(
  amenidadId
){

  console.log(
    "Amenidad:",
    amenidadId
  );

}  
  
async function cargar(){

  const { data, error } =
    await supabaseClient.rpc(
      "obtener_amenidades"
    );

  if(error){

    console.error(error);

    return;

  }

  amenidades = data || [];

  renderizar();

}
  
  
window.addEventListener(
  "DOMContentLoaded",
  async ()=>{

    await protegerPagina([
      "residente"
    ]);
    
    await cargar();

  }
);

</script>

</body>
</html>

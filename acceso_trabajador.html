<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso Trabajador</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="/utils/ui.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI';
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  text-align: center;
}

/* 🔥 COLORES POR ESTADO (CORREGIDO) */
body.ok {
  background: #16a34a;
  color: white;
}

body.error {
  background: #dc2626;
  color: white;
}

body.warn {
  background: #f59e0b;
  color: #111827; /* 🔥 TEXTO OSCURO */
}

.container {
  max-width: 320px;
  width: 90%;
  padding: 0 10px; /* 👈 pequeño respiro lateral */
}

input, button {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  box-sizing: border-box; /* 🔥 AQUÍ MEJOR */
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  background: #020617;
  color: white;
  text-align: center;
  font-size: 18px;
  box-sizing: border-box; /* 🔥 SOLUCIÓN */
}

button {
  background: #2563eb;
  color: white;
  font-weight: bold;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="container">

  <h2>🚧 Acceso trabajador</h2>

  <h1 id="estado">Validando...</h1>
  <div id="detalle"></div>

  <input type="password" id="pin" placeholder="Ingrese PIN del vigilante">
  <button id="btnValidar">Validar</button>

  <button id="btnRegistrar" class="hidden">Registrar</button>
  <button id="btnAceptar" class="hidden">Aceptar</button>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const qr = params.get("qr");

let trabajadorGlobal = null;
let accesoActual = null;
let tipoAccion = "";
let vigilante = null;

init();

async function init(){

  if (!qr){
    pintarErrorFinal("QR inválido");
    return;
  }

  const { data: trabajador } = await supabaseClient
    .from("trabajadores_obra")
    .select("*")
    .eq("qr_codigo", qr)
    .maybeSingle();

  if (!trabajador){
    pintarErrorFinal("QR inválido");
    return;
  }

  trabajadorGlobal = trabajador;
  renderDetalle();

  // 🔴 ACCESO CANCELADO
  if (!trabajador.activo){
    pintarErrorFinal("Acceso cancelado");
    return;
  }

  const hoy = new Date().toLocaleDateString('sv-SE');

  if (trabajador.fecha_inicio && hoy < trabajador.fecha_inicio){
    pintarErrorFinal("Acceso aún no inicia");
    return;
  }

  if (trabajador.fecha_fin && hoy > trabajador.fecha_fin){
    pintarErrorFinal("Acceso vencido");
    return;
  }

  const { data: acceso } = await supabaseClient
    .from("accesos_trabajadores")
    .select("*")
    .eq("trabajador_id", trabajador.id)
    .is("fecha_hora_salida", null)
    .order("fecha_hora_entrada", { ascending:false })
    .limit(1);

  accesoActual = acceso && acceso.length ? acceso[0] : null;

  if(accesoActual){
    tipoAccion = "salida";
    document.getElementById("estado").innerText = "Registrar salida";
  } else {
    tipoAccion = "entrada";
    document.getElementById("estado").innerText = "Validar acceso";
  }

}

// 🔹 VALIDAR PIN
document.getElementById("btnValidar").onclick = async () => {

  const pin = document.getElementById("pin").value.trim();

  if(!pin){
    ui.warn("Ingrese PIN");
    return;
  }

  const { data } = await supabaseClient
    .from("residentes")
    .select("id")
    .eq("pin_vigilante", pin)
    .eq("tipo","vigilante")
    .eq("activo", true)
    .maybeSingle();

  if(!data){
    ui.error("PIN incorrecto");
    return;
  }

  vigilante = data;

  if(tipoAccion === "entrada"){
    document.getElementById("estado").innerText = "Registrar entrada";
  } else {
    document.getElementById("estado").innerText = "Confirmar salida";
  }

  ocultarValidacion();
  document.getElementById("btnRegistrar").classList.remove("hidden");

};

// 🔹 REGISTRAR
document.getElementById("btnRegistrar").onclick = async () => {

  // 🔥 FECHA ESTÁNDAR GLOBAL (UTC)
  function fechaUTC(){
  return new Date().toISOString();
}

  if(tipoAccion === "entrada"){

    await supabaseClient
      .from("accesos_trabajadores")
      .insert([{
        trabajador_id: trabajadorGlobal.id,
        fecha_hora_entrada: fechaUTC(),
        estatus: "dentro",
        vigilante_id: vigilante.id
      }]);

    pintarFinal("ENTRADA REGISTRADA","ok");
  }

  if(tipoAccion === "salida"){

    await supabaseClient
      .from("accesos_trabajadores")
      .update({
        fecha_hora_salida: fechaUTC(),
        estatus: "fuera",
        vigilante_salida_id: vigilante.id
      })
      .eq("id", accesoActual.id);

    pintarFinal("SALIDA REGISTRADA","warn");
  }

};

// 🔴 ERROR FINAL
function pintarErrorFinal(msg){

  document.body.className = "error";
  document.getElementById("estado").innerText = msg;

  ocultarValidacion();
  document.getElementById("btnAceptar").classList.remove("hidden");

}

// 🔹 ACEPTAR
document.getElementById("btnAceptar").onclick = () => {
  window.close();
};

// 🔹 UI FINAL
function pintarFinal(texto,color){

  document.body.className = color;
  document.getElementById("estado").innerText = texto;

  renderDetalle();

  document.getElementById("btnRegistrar").classList.add("hidden");
}

function renderDetalle(){
  document.getElementById("detalle").innerHTML =
    `<p><b>${trabajadorGlobal?.nombre || ""}</b></p>`;
}

function ocultarValidacion(){
  document.getElementById("pin").style.display = "none";
  document.getElementById("btnValidar").style.display = "none";
}

</script>

</body>
</html>

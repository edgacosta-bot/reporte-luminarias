<!DOCTYPE html>

<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso Obra</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="auth.js"></script>

<script src="/utils/ui.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI';
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  text-align: center;
}

body.ok { background: #16a34a; color: white; }
body.warn { background: #f59e0b; color: #111827; }
body.error { background: #dc2626; color: white; }

.container {
  max-width: 360px;
  width: 92%;
  padding: 20px;
}

input, button {
  width: 100%;
  height: 52px;
  padding: 0 16px;
  margin-top: 12px;
  border-radius: 14px;
  border: none;
  font-size: 16px;
  font-weight: 600;
  box-sizing: border-box;
}

button {
  background: #2563eb;
  color: white;
}

button:disabled {
  opacity: 0.6;
}

input {
  background: #020617;
  color: white;
  text-align: center;
  font-size: 18px;
  letter-spacing: 2px;
}

.hidden { display:none; }
</style>

</head>

<body>

<div class="container">

<h2 id="titulo">🚧 Acceso obra</h2>

<h1 id="estado">Validando...</h1>
<div id="detalle"></div>

<input type="password" id="pin" placeholder="Ingrese PIN del vigilante">
<button id="btnValidar">Validar</button>

<button id="btnRegistrar" class="hidden">Registrar</button>

</div>

<script>

const qr = new URLSearchParams(window.location.search).get("qr");

let trabajador = null;
let vigilante = null;
let accesoAbierto = null;
let tipoAccion = "";

init();

async function init(){

  if (!qr){
    pintar("QR inválido","error");
    return;
  }

  const { data, error } = await supabaseClient
    .rpc("validar_acceso_trabajador_obra", { p_qr: qr })

  if (error){
    console.error(error);
    pintar(error.message || "Acceso no permitido","error");
    return;
  }

  if (!data || data.length === 0){
    pintar("Acceso no permitido","error");
    return;
  }

  trabajador = data[0];

  // 🔥 YA VALIDADO EN BACKEND → no duplicar lógica incorrecta
  if (!trabajador.obra_aprobada){
    pintar("Obra no aprobada","error");
    return;
  }

  if (!trabajador.activo){
    pintar("Trabajador inactivo","error");
    return;
  }

  const hoy = new Date().toISOString().split("T")[0];

  if (
    (trabajador.fecha_inicio && trabajador.fecha_inicio > hoy) ||
    (trabajador.fecha_fin && trabajador.fecha_fin < hoy)
  ){
    pintar("Fuera de vigencia","error");
    return;
  }

  accesoAbierto = trabajador.acceso_abierto_id;
  tipoAccion = accesoAbierto ? "salida" : "entrada";

  renderDetalle();

  estado.innerText = tipoAccion === "salida"
    ? "Validar salida"
    : "Validar acceso";

  titulo.innerText = tipoAccion === "salida"
    ? "🚧 Salida trabajador"
    : "🚧 Acceso obra";

  btnRegistrar.classList.add("hidden");
}

// VALIDAR PIN
btnValidar.onclick = async () => {

  const pin = document.getElementById("pin").value.trim();

  if(!pin){
    ui.warn("Ingrese PIN");
    return;
  }

  const { data, error } = await supabaseClient
    .rpc("validar_pin_vigilante", { pin_input: pin });

  if (error || !data || data.length === 0){
    ui.error("PIN incorrecto");
    return;
  }

  vigilante = data[0];

  ocultarValidacion();

  if(tipoAccion === "salida"){

    document.body.className = "warn";
    estado.innerText = "Autorizar salida";

    btnRegistrar.innerText = "Registrar salida";
    btnRegistrar.classList.remove("hidden");

    return;
  }

  document.body.className = "ok";
  estado.innerText = "Acceso permitido";

  btnRegistrar.innerText = "Registrar entrada";
  btnRegistrar.classList.remove("hidden");
};

// REGISTRAR
btnRegistrar.onclick = async () => {

  btnRegistrar.disabled = true;
  btnRegistrar.innerText = "Procesando...";

  if(tipoAccion === "salida"){

    const { error } = await supabaseClient.rpc("registrar_salida_trabajador", {
      p_acceso_id: accesoAbierto,
      p_vigilante_id: vigilante.id
    });

    if (error){
      console.error("ERROR SALIDA:", error);
      estado.innerText = "Salida registrada";
      btnRegistrar.classList.add("hidden");
      document.body.className = "ok";    
      return;
    }

    estado.innerText = "Salida registrada";
    btnRegistrar.classList.add("hidden");
    document.body.className = "ok";
    return;
  }

  const { error } = await supabaseClient.rpc("registrar_entrada_trabajador", {
    p_trabajador_id: trabajador.id,
    p_vigilante_id: vigilante.id
  });

  if (error){
    ui.error("Error al registrar entrada");
    btnRegistrar.disabled = false;
    btnRegistrar.innerText = "Registrar";
    return;
  }

  estado.innerText = "Acceso registrado";
  btnRegistrar.classList.add("hidden");
  document.body.className = "ok";
};

// UI
function renderDetalle(){
  detalle.innerHTML = `<p><b>${trabajador.nombre}</b></p>`;
}

function pintar(texto, color){
  document.body.className = color;
  estado.innerText = texto;
  ocultarValidacion();
}

function ocultarValidacion(){
  pin.style.display = "none";
  btnValidar.style.display = "none";
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso Trabajador</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI';
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  color: white;
  text-align: center;
}

.container {
  max-width: 320px;
  width: 90%;
}

.ok { background: #16a34a; }
.warn { background: #f59e0b; }
.error { background: #dc2626; }

input, button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
}

button {
  background: #2563eb;
  color: white;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

  <h1 id="estado">Validando...</h1>
  <div id="detalle"></div>

  <input type="password" id="pin" placeholder="PIN vigilante">
  <button id="btnValidar">Validar</button>

  <button id="btnRegistrar" style="display:none;">Registrar</button>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const qr = params.get("qr");

let trabajadorGlobal = null;
let accesoActual = null;
let tipoAccion = "";
let vigilante = null;

validar();

async function validar(){

  if (!qr) {
    pintar("QR inválido","error");
    return;
  }

  const { data: trabajador } = await supabaseClient
    .from("trabajadores_obra")
    .select("*")
    .eq("qr_codigo", qr)
    .maybeSingle();

  if (!trabajador){
    pintar("QR inválido","error");
    return;
  }

  trabajadorGlobal = trabajador;

  renderDetalle();

  // VALIDACIONES
  if (!trabajador.activo){
    pintar("ACCESO CANCELADO","error");
    return;
  }

  const hoy = new Date().toLocaleDateString('sv-SE');

  if (trabajador.fecha_inicio && hoy < trabajador.fecha_inicio){
    pintar("ACCESO AÚN NO INICIA","warn");
    return;
  }

  if (trabajador.fecha_fin && hoy > trabajador.fecha_fin){
    pintar("ACCESO VENCIDO","error");
    return;
  }

  const { data: acceso } = await supabaseClient
    .from("accesos_trabajadores")
    .select("*")
    .eq("trabajador_id", trabajador.id)
    .is("fecha_hora_salida", null)
    .order("fecha_hora_entrada", { ascending:false })
    .limit(1);

  accesoActual = acceso && acceso.length ? acceso[0] : null;

  if(accesoActual){
    tipoAccion = "salida";
    document.getElementById("estado").innerText = "Registrar salida";
  } else {
    tipoAccion = "entrada";
    document.getElementById("estado").innerText = "Validar acceso";
  }

}

// 🔹 VALIDAR PIN
document.getElementById("btnValidar").onclick = async () => {

  const pin = document.getElementById("pin").value.trim();

  if(!pin){
    alert("Ingresa PIN");
    return;
  }

  const { data } = await supabaseClient
    .from("residentes")
    .select("id")
    .eq("pin_vigilante", pin)
    .eq("tipo","vigilante")
    .eq("activo", true)
    .maybeSingle();

  if(!data){
    pintar("PIN incorrecto","error");
    return;
  }

  vigilante = data;

  if(tipoAccion === "entrada"){
    document.getElementById("estado").innerText = "Registrar entrada";
  } else {
    document.getElementById("estado").innerText = "Confirmar salida";
  }

  ocultarValidacion();
  document.getElementById("btnRegistrar").style.display = "block";

};

// 🔹 REGISTRAR
document.getElementById("btnRegistrar").onclick = async () => {

  const ahora = new Date().toISOString();

  if(tipoAccion === "entrada"){

    await supabaseClient
      .from("accesos_trabajadores")
      .insert([{
        trabajador_id: trabajadorGlobal.id,
        fecha_hora_entrada: ahora,
        estatus: "dentro",
        vigilante_id: vigilante.id
      }]);

    pintar("ENTRADA REGISTRADA","ok");
  }

  if(tipoAccion === "salida"){

    await supabaseClient
      .from("accesos_trabajadores")
      .update({
        fecha_hora_salida: ahora,
        estatus: "fuera",
        vigilante_salida_id: vigilante.id
      })
      .eq("id", accesoActual.id);

    pintar("SALIDA REGISTRADA","warn");
  }

};

// 🔹 UI FINAL LIMPIA
function pintar(texto,color){

  document.body.className = color;
  document.getElementById("estado").innerText = texto;

  renderDetalle();

  document.getElementById("btnRegistrar").style.display = "none";
}

function renderDetalle(){
  document.getElementById("detalle").innerHTML =
    `<p><b>${trabajadorGlobal?.nombre || ""}</b></p>`;
}

function ocultarValidacion(){
  document.getElementById("pin").style.display = "none";
  document.getElementById("btnValidar").style.display = "none";
}

</script>

</body>
</html>

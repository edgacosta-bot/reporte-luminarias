<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso Trabajador</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  color: white;
  text-align: center;
  transition: background 0.3s ease;
}

.container {
  padding: 20px;
  max-width: 320px;
  width: 100%;
}

h1 {
  font-size: 28px;
  margin-bottom: 10px;
  font-weight: bold;
}

.ok { background: #16a34a; }
.warn { background: #f59e0b; }
.error { background: #dc2626; }

.control {
  margin-top: 25px;
  display: none;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: 1px solid #334155;
  margin-top: 10px;
  font-size: 18px;
  text-align: center;
  background: #020617;
  color: white;
  font-weight: bold;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  font-size: 18px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
  <h1 id="estado">Validando...</h1>
  <div id="detalle"></div>

  <div id="control" class="control">
    <input type="password" id="pin" placeholder="PIN vigilante">
    <button id="btnConfirmar" disabled>Confirmar</button>
  </div>
</div>

<script>

const supabaseClient = window.supabase.createClient(
  "https://prjxmfhahnzosdwljode.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs"
);

const params = new URLSearchParams(window.location.search);
const qr = params.get("qr");

console.log("QR RECIBIDO:", qr);

let trabajadorGlobal = null;
let accesoActual = null;
let tipoAccion = "";

// 🚀 INICIO
validar();

async function validar() {

  try {

    if (!qr || qr.length < 10) {
      pintar("QR INVÁLIDO", "error");
      return;
    }

    const { data: trabajador, error } = await supabaseClient
      .from("trabajadores_obra")
      .select("*")
      .eq("qr_codigo", qr)
      .maybeSingle();

    console.log("ERROR TRABAJADOR:", error);
    console.log("DATA TRABAJADOR:", trabajador);

    if (!trabajador) {
      pintar("QR INVÁLIDO", "error");
      return;
    }

    trabajadorGlobal = trabajador;

    const { data: acceso } = await supabaseClient
      .from("accesos_trabajadores")
      .select("*")
      .eq("trabajador_id", trabajador.id)
      .is("fecha_hora_salida", null)
      .maybeSingle();

    accesoActual = acceso;

    if (!acceso) {
      tipoAccion = "entrada";
      pintar("REGISTRAR ENTRADA", "ok", trabajador);
    } else {
      tipoAccion = "salida";
      pintar("REGISTRAR SALIDA", "warn", trabajador);
    }

    document.getElementById("control").style.display = "block";

  } catch (e) {
    console.error(e);
    pintar("ERROR DE SISTEMA", "error");
  }
}

const pinInput = document.getElementById("pin");
const btn = document.getElementById("btnConfirmar");

pinInput.addEventListener("input", () => {
  btn.disabled = pinInput.value.length < 4;
});

btn.addEventListener("click", async () => {

  const pin = pinInput.value;

  const { data: vigilante } = await supabaseClient
    .from("residentes")
    .select("id")
    .eq("pin_vigilante", pin)
    .maybeSingle();

  if (!vigilante) {
    pintar("PIN INCORRECTO", "error", trabajadorGlobal);
    return;
  }

  const ahora = new Date().toISOString();

  if (tipoAccion === "entrada") {

    await supabaseClient
      .from("accesos_trabajadores")
      .insert([{
        trabajador_id: trabajadorGlobal.id,
        fecha_hora_entrada: ahora,
        estatus: "dentro",
        vigilante_id: vigilante.id
      }]);

    pintar("ENTRADA REGISTRADA", "ok", trabajadorGlobal);

  } else {

    await supabaseClient
      .from("accesos_trabajadores")
      .update({
        fecha_hora_salida: ahora,
        estatus: "fuera",
        vigilante_salida_id: vigilante.id
      })
      .eq("id", accesoActual.id);

    pintar("SALIDA REGISTRADA", "warn", trabajadorGlobal);
  }

  document.getElementById("control").style.display = "none";
});

function pintar(mensaje, tipo, trabajador = null) {
  document.getElementById("estado").innerText = mensaje;
  document.body.className = tipo;

  if (trabajador) {
    document.getElementById("detalle").innerHTML =
      `<p><b>${trabajador.nombre}</b></p>`;
  }
}

</script>

</body>
</html>

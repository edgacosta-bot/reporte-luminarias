<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Servicios por arribar</title>

<!-- 🔥 ORDEN CORRECTO -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<script>
protegerPagina(["vigilante"]);
</script>

        <link rel="stylesheet" href="styles/global.css">
<link rel="stylesheet" href="styles/servicios_arribo_vigilante.css">
</head>

<body>

<div class="container">

  <!-- 🔥 LOGO -->
  <div class="logo">
    <img src="icono-512.png">
  </div>

  <h2>🚚 Servicios por arribar</h2>

  <div id="lista"></div>

</div>

<!-- 🔥 MODAL NIP -->
<div id="modal" class="modal">
  <div class="modal-box">

    <h3>Validar NIP</h3>

    <input 
      type="password" 
      id="nip" 
      placeholder="Ingrese NIP"
      inputmode="numeric"
      maxlength="6"
      style="
        width: 100%;
        padding: 16px;
        margin-top: 12px;
        border-radius: 12px;
        border: 1px solid #d1d5db;
        font-size: 18px;
        text-align: center;
        letter-spacing: 6px;
        box-sizing: border-box;
      "
    >

    <!-- 🔴 AQUÍ VA ESTO -->
    <div id="errorNip" style="
      margin-top:10px;
      color:#dc2626;
      font-size:14px;
      display:none;
      text-align:center;
    ">
    </div>

    <button onclick="confirmarNIP()">Confirmar</button>

  </div>
</div>

<script>

let accion = null;
let registroId = null;

cargar();

async function cargar() {

  const ahora = new Date().toISOString();

  const { data } = await supabaseClient
    .from("servicios_arribo")
    .select("*")
    .gt("expira_en", ahora)
    .neq("estado", "finalizado")
    .order("privada", { ascending: true })
    .order("casa", { ascending: true });

  const contenedor = document.getElementById("lista");
  contenedor.innerHTML = "";

  if (!data || data.length === 0) {

    contenedor.innerHTML = `
      <div class="vacio">
        <p>No se tienen servicios en espera por parte de los residentes</p>
        <button class="btn-regresar" onclick="window.location.href='index.html'">
          ← Regresar
        </button>
      </div>
    `;

    return;
  }

  data.forEach(s => {

    const card = document.createElement("div");
    card.className = "card " + s.estado;

    card.innerHTML = `
      <div class="nombre">
        Privada ${s.privada} - Casa ${s.casa}
      </div>

      <div class="info">
        ${s.nombre_servicio}
      </div>

      <div class="botones">

        ${s.estado === "pendiente" ? `
          <button class="btn-entrada" onclick="abrirNIP('entrada','${s.id}')">
            Registrar entrada
          </button>
        ` : ""}

        ${s.estado === "dentro" ? `
          <button class="btn-salida" onclick="abrirNIP('salida','${s.id}')">
            Registrar salida
          </button>
        ` : ""}

      </div>
    `;

    contenedor.appendChild(card);  
  });
}

function abrirNIP(tipo, id){
  accion = tipo;
  registroId = id;

  const modal = document.getElementById("modal");
  modal.style.display = "flex";

  // 🔥 INPUT
  const input = document.getElementById("nip");

  if (input) {
    input.value = "";   // limpia
    input.focus();      // 👈 AQUÍ ESTÁ EL AUTO-FOCUS
  }

  // 🔥 LIMPIAR ERROR
  const error = document.getElementById("errorNip");
  if (error) error.style.display = "none";
}

function mostrarError(msg){
  const e = document.getElementById("errorNip");

  if (!e) {
    alert(msg);
    return;
  }

  e.innerText = msg;
  e.style.display = "block";
}
  
async function confirmarNIP(){

  const nip = document.getElementById("nip").value.trim();

  if (!nip) {
    mostrarError("Ingrese NIP");
    return;
  }

  // 🔥 VALIDAR CONTRA RESIDENTES (tipo vigilante)
  const { data: vigilante, error } = await supabaseClient
     .from("residentes")
    .select("id, pin_vigilante")
    .eq("tipo", "vigilante")
    .eq("pin_vigilante", nip)
    .eq("activo", true)
    .limit(1)           // 👈 AGREGA ESTO
    .maybeSingle();

  console.log("VIGILANTE:", vigilante);
  console.log("ERROR:", error);

  if (error || !vigilante) {
    mostrarError("NIP incorrecto");
    return;
  }

  const ahora = new Date().toISOString();

  // 🔥 ENTRADA
  if(accion === "entrada"){

    await supabaseClient
      .from("servicios_arribo")
      .update({
        estado: "dentro",
        hora_entrada: ahora,
        vigilante_entrada_id: vigilante.id
      })
      .eq("id", registroId);

    const mensaje = `SIGVIC informa: Estimado residente, el servicio que tiene en espera ha ingresado al fraccionamiento. Gracias.`;
    const url = `https://wa.me/?text=${encodeURIComponent(mensaje)}`;
    window.open(url, "_blank");
  }

  // 🔥 SALIDA
  if(accion === "salida"){

    await supabaseClient
      .from("servicios_arribo")
      .update({
        estado: "finalizado",
        hora_salida: ahora,
        vigilante_salida_id: vigilante.id
      })
      .eq("id", registroId);
  }

  // 🔥 LIMPIEZA
  document.getElementById("modal").style.display = "none";
  document.getElementById("nip").value = "";

  cargar();
}

window.onclick = function(event) {
  const modal = document.getElementById("modal");
  if (event.target === modal) {
    modal.style.display = "none";
  }
};
  
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Servicios por arribar</title>

<script src="auth.js"></script>
<script>
protegerPagina(["vigilante"]);
</script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

/* 🔥 TARJETA MÁS ELEGANTE */
.card {
  border-radius: 18px;
  padding: 18px;
  margin-bottom: 14px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.25);
}

/* 🔥 COLORES NUEVOS (PALETA) */
.pendiente { background: #a57f2c; }  /* dorado sobrio */
.dentro { background: #1e5b4f; }     /* verde elegante */
.finalizado { background: #374151; } /* gris */

.nombre {
  font-weight: bold;
  font-size: 17px;
  margin-bottom: 5px;
}

.info {
  font-size: 13px;
  margin-bottom: 14px;
  opacity: 0.9;
}

.botones {
  display: flex;
  gap: 10px;
}

/* 🔥 BOTONES MÁS PRO */
button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
  font-size: 14px;
  transition: transform 0.1s ease, opacity 0.2s ease;
}

button:active {
  transform: scale(0.97);
  opacity: 0.9;
}

.btn-entrada {
  background: #1e5b4f;
  color: white;
}

.btn-salida {
  background: #111827;
  color: white;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="container">

<h2>🚚 Servicios por arribar</h2>

<div id="lista"></div>

</div>

<script>

const client = window.supabase.createClient(
  "https://prjxmfhahnzosdwljode.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs"
);

cargar();

async function cargar() {

  const ahora = new Date().toISOString();

  const { data } = await client
    .from("servicios_arribo")
    .select("*")
    .gt("expira_en", ahora)
    .neq("estado", "finalizado")
    .order("privada", { ascending: true })
    .order("casa", { ascending: true });

  const contenedor = document.getElementById("lista");
  contenedor.innerHTML = "";

  data.forEach(s => {

    const card = document.createElement("div");

    card.className = "card " + s.estado;

    card.innerHTML = `
      <div class="nombre">
        Privada ${s.privada} - Casa ${s.casa}
      </div>

      <div class="info">
        ${s.nombre_servicio}
      </div>

      <div class="botones">

        ${s.estado === "pendiente" ? `
          <button class="btn-entrada" onclick="entrada('${s.id}')">
            Registrar entrada
          </button>
        ` : ""}

        ${s.estado === "dentro" ? `
          <button class="btn-salida" onclick="salida('${s.id}')">
            Registrar salida
          </button>
        ` : ""}

      </div>
    `;

    contenedor.appendChild(card);
  });
}


// 🔥 ENTRADA
async function entrada(id) {

  const ahora = new Date().toISOString();

  await client
    .from("servicios_arribo")
    .update({
      estado: "dentro",
      hora_entrada: ahora
    })
    .eq("id", id);

  const mensaje = `Estimado residente, el servicio que tiene en espera, en este momento ha entrado al fraccionamiento. Gracias.`;

  const url = `https://wa.me/?text=${encodeURIComponent(mensaje)}`;

  window.open(url, "_blank");

  cargar();
}


// 🔥 SALIDA
async function salida(id) {

  const ahora = new Date().toISOString();

  await client
    .from("servicios_arribo")
    .update({
      estado: "finalizado",
      hora_salida: ahora
    })
    .eq("id", id);

  cargar();
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Servicios por arribar</title>

<!-- 🔥 ORDEN CORRECTO -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<script>
protegerPagina(["vigilante"]);
</script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

/* 🔥 LOGO */
.logo {
  text-align: center;
  margin-bottom: 10px;
}

.logo img {
  width: 90px;
  border-radius: 20px;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

.card {
  border-radius: 18px;
  padding: 18px;
  margin-bottom: 14px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.25);
}

.pendiente { background: #a57f2c; }
.dentro { background: #1e5b4f; }
.finalizado { background: #374151; }

.nombre {
  font-weight: bold;
  font-size: 17px;
  margin-bottom: 5px;
}

.info {
  font-size: 13px;
  margin-bottom: 14px;
  opacity: 0.9;
}

.botones {
  display: flex;
  gap: 10px;
}

button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
  font-size: 14px;
  transition: transform 0.1s ease, opacity 0.2s ease;
}

button:active {
  transform: scale(0.97);
  opacity: 0.9;
}

.btn-entrada {
  background: #1e5b4f;
  color: white;
}

.btn-salida {
  background: #111827;
  color: white;
}

.vacio {
  background: #1f2937;
  padding: 25px;
  border-radius: 16px;
  text-align: center;
}

.vacio p {
  margin-bottom: 20px;
}

.btn-regresar {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #2563eb;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* 🔥 MODAL NIP */
.modal-box {
  background: white;
  color: black;
  padding: 24px;
  border-radius: 16px;
  width: 90%;
  max-width: 320px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999;
}
  

.modal-box input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

.modal-box button {
  margin-top: 16px;
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  font-weight: bold;
}
</style>

</head>

<body>

<div class="container">

  <!-- 🔥 LOGO -->
  <div class="logo">
    <img src="icono-512.png">
  </div>

  <h2>🚚 Servicios por arribar</h2>

  <div id="lista"></div>

</div>

<!-- 🔥 MODAL NIP -->
<div id="modal" class="modal">
  <div class="modal-box">

    <h3>Validar NIP</h3>

    <input 
      type="password" 
      id="nip" 
      placeholder="Ingrese NIP"
      inputmode="numeric"
      maxlength="6"
      style="
        width: 100%;
        padding: 16px;
        margin-top: 12px;
        border-radius: 12px;
        border: 1px solid #d1d5db;
        font-size: 18px;
        text-align: center;
        letter-spacing: 6px;
        box-sizing: border-box;
      "
    >

    <!-- 🔴 AQUÍ VA ESTO -->
    <div id="errorNip" style="
      margin-top:10px;
      color:#dc2626;
      font-size:14px;
      display:none;
      text-align:center;
    ">
    </div>

    <button onclick="confirmarNIP()">Confirmar</button>

  </div>
</div>

<script>

let accion = null;
let registroId = null;

cargar();

async function cargar() {

  const ahora = new Date().toISOString();

  const { data } = await supabaseClient
    .from("servicios_arribo")
    .select("*")
    .gt("expira_en", ahora)
    .neq("estado", "finalizado")
    .order("privada", { ascending: true })
    .order("casa", { ascending: true });

  const contenedor = document.getElementById("lista");
  contenedor.innerHTML = "";

  if (!data || data.length === 0) {

    contenedor.innerHTML = `
      <div class="vacio">
        <p>No se tienen servicios en espera por parte de los residentes</p>
        <button class="btn-regresar" onclick="window.location.href='index.html'">
          ← Regresar
        </button>
      </div>
    `;

    return;
  }

  data.forEach(s => {

    const card = document.createElement("div");
    card.className = "card " + s.estado;

    card.innerHTML = `
      <div class="nombre">
        Privada ${s.privada} - Casa ${s.casa}
      </div>

      <div class="info">
        ${s.nombre_servicio}
      </div>

      <div class="botones">

        ${s.estado === "pendiente" ? `
          <button class="btn-entrada" onclick="abrirNIP('entrada','${s.id}')">
            Registrar entrada
          </button>
        ` : ""}

        ${s.estado === "dentro" ? `
          <button class="btn-salida" onclick="abrirNIP('salida','${s.id}')">
            Registrar salida
          </button>
        ` : ""}

      </div>
    `;

    contenedor.appendChild(card);  
  });
}

function abrirNIP(tipo, id){
  accion = tipo;
  registroId = id;

  const modal = document.getElementById("modal");
  modal.style.display = "flex";

  // 🔥 INPUT
  const input = document.getElementById("nip");

  if (input) {
    input.value = "";   // limpia
    input.focus();      // 👈 AQUÍ ESTÁ EL AUTO-FOCUS
  }

  // 🔥 LIMPIAR ERROR
  const error = document.getElementById("errorNip");
  if (error) error.style.display = "none";
}

function mostrarError(msg){
  const e = document.getElementById("errorNip");

  if (!e) {
    alert(msg);
    return;
  }

  e.innerText = msg;
  e.style.display = "block";
}
  
async function confirmarNIP(){

  const nip = document.getElementById("nip").value.trim();

  if (!nip) {
    mostrarError("Ingrese NIP");
    return;
  }

  // 🔥 CONSULTA CORRECTA
  const { data: vigilante, error } = await supabaseClient
    .from("vigilantes")
    .select("id, nip")
    .eq("nip", nip) // 🔥 SIN Number()
    .maybeSingle();

  console.log("VIGILANTE:", vigilante);
  console.log("ERROR:", error);

  if (error || !vigilante) {
    mostrarError("NIP incorrecto");
    return;
  }

  const ahora = new Date().toISOString();

  if(accion === "entrada"){

    await supabaseClient
      .from("servicios_arribo")
      .update({
        estado: "dentro",
        hora_entrada: ahora,
        vigilante_entrada_id: vigilante.id
      })
      .eq("id", registroId);

    const mensaje = `Estimado residente, el servicio que tiene en espera, en este momento ha entrado al fraccionamiento. Gracias.`;

    const url = `https://wa.me/?text=${encodeURIComponent(mensaje)}`;
    window.open(url, "_blank");
  }

  if(accion === "salida"){

    await supabaseClient
      .from("servicios_arribo")
      .update({
        estado: "finalizado",
        hora_salida: ahora,
        vigilante_salida_id: vigilante.id
      })
      .eq("id", registroId);
  }

  document.getElementById("modal").style.display = "none";
  document.getElementById("nip").value = "";

  cargar();
}

window.onclick = function(event) {
  const modal = document.getElementById("modal");
  if (event.target === modal) {
    modal.style.display = "none";
  }
};
  
</script>

</body>
</html>

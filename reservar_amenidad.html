<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Crear Reservación</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="auth.js"></script>
<script src="utils/residente.js"></script>      

<style>

body{
  margin:0;
  font-family:'Segoe UI';
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
}

.container{
  max-width:700px;
  margin:auto;
  padding:20px;
}

.card{
  background:#111827;
  border-radius:18px;
  padding:20px;
}

input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#1f2937;
  color:white;
  box-sizing:border-box;
}      
      
h1{
  text-align:center;
}

</style>

</head>

<body>

<div class="container">

  <h1>
    🏟 Nueva Reservación
  </h1>

 <div class="card">

  <div id="nombreAmenidad">
    Cargando...
  </div>

  <br>

  <label>Fecha</label>

  <input
    type="date"
    id="fecha"
  >

  <br><br>

  <label>Hora inicio</label>

  <input
    type="time"
    id="horaInicio"
  >

  <br><br>

  <label>Hora fin</label>

  <input
    type="time"
    id="horaFin"
  >

  <br><br>

  <button
    onclick="crearReservacion()"
  >
    Crear reservación
  </button>

  <br><br>

  <div id="mensaje"></div>

</div>

</div>

<script>

const params =
  new URLSearchParams(
    window.location.search
  );

const amenidadId =
  params.get(
    "amenidad_id"
  );

let residenteId = null;    

console.log(
  "Amenidad ID:",
  amenidadId
);      

document.getElementById(
  "nombreAmenidad"
).innerHTML =

  Amenidad seleccionada:

  <br><br>

  <b>${amenidadId}</b>

`;

async function cargarResidente(){

  const residente =
    await getResidente();

  if(!residente){

    alert(
      "Error de sesión"
    );

    return false;

  }

  residenteId =
    residente.id;

  return true;

}

async function crearReservacion(){

  const fecha =
    document.getElementById(
      "fecha"
    ).value;

  const horaInicio =
    document.getElementById(
      "horaInicio"
    ).value;

  const horaFin =
    document.getElementById(
      "horaFin"
    ).value;

  const mensaje =
    document.getElementById(
      "mensaje"
    );

  if(
    !fecha
    ||
    !horaInicio
    ||
    !horaFin
  ){

    mensaje.innerHTML =
      "Complete todos los campos.";

    return;

  }

  const { data, error } =
    await supabaseClient.rpc(
      "crear_reservacion_amenidad",
      {
        p_residente_id:
          residenteId,

        p_amenidad_id:
          amenidadId,

        p_fecha:
          fecha,

        p_hora_inicio:
          horaInicio,

        p_hora_fin:
          horaFin
      }
    );

  if(error){

    mensaje.innerHTML =
      error.message;

    return;

  }

  mensaje.innerHTML =
    data.mensaje;

  console.log(data);

}      
      
window.addEventListener(
  "DOMContentLoaded",
  async ()=>{

    await protegerPagina([
      "residente"
    ]);

    const ok =
      await cargarResidente();

    if(!ok){
      return;
    }

  }
);

</script>

</body>

</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Vigilantes</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="utils/residente.js"></script>  

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

/* 🔥 KPIs */
.kpis {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
  margin-bottom: 20px;
}

.kpi {
  background: #111827;
  padding: 15px;
  border-radius: 12px;
}

.kpi h3 {
  margin: 0;
  font-size: 14px;
  color: #9ca3af;
}

.kpi p {
  margin: 5px 0 0;
  font-size: 22px;
  font-weight: bold;
}

/* 🎛 filtros */
.filtros {
  background: #111827;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 20px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.filtros input, .filtros select {
  padding: 8px;
  border-radius: 8px;
  border: none;
}

.filtros button {
  background: #22c55e;
  color: white;
  border: none;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
}

/* 📊 grid */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.card {
  background: #111827;
  padding: 15px;
  border-radius: 12px;
}
</style>
</head>

<body>

<h2>📊 Dashboard Vigilantes</h2>

<!-- 🔥 KPIs -->
<div class="kpis">
  <div class="kpi"><h3>Total reportes</h3><p id="kpiTotal">0</p></div>
  <div class="kpi"><h3>Más reportado</h3><p id="kpiVigilante">-</p></div>
  <div class="kpi"><h3>Tipo más frecuente</h3><p id="kpiTipo">-</p></div>
  <div class="kpi"><h3>Día más activo</h3><p id="kpiDia">-</p></div>
</div>

<!-- 🔥 filtros -->
<div class="filtros">
  <input type="date" id="fechaInicio">
  <input type="date" id="fechaFin">
  <select id="filtroVigilante">
    <option value="">Todos los vigilantes</option>
  </select>
  <button onclick="cargarDatos()">Aplicar</button>
</div>

<!-- 📊 gráficas -->
<div class="grid">
  <div class="card"><canvas id="chartVigilantes"></canvas></div>
  <div class="card"><canvas id="chartTipos"></canvas></div>
  <div class="card"><canvas id="chartTiempo"></canvas></div>
  <div class="card"><canvas id="chartRol"></canvas></div>
</div>

<script>

// 🔐 INIT
window.addEventListener("load", async () => {
  await protegerPagina(["administracion", "mesa_directiva", "soporte"]);
  await cargarDatos(true);
});

async function cargarDatos(init=false){

  const fechaInicio = document.getElementById("fechaInicio").value;
  const fechaFin = document.getElementById("fechaFin").value;
  const vigilanteFiltro = document.getElementById("filtroVigilante").value;

  let query = supabaseClient
    .from("reportes_vigilantes")
    .select("vigilante_id, tipo, fecha_reporte, rol_creador");

  if (fechaInicio) query = query.gte("fecha_reporte", fechaInicio);
  if (fechaFin) query = query.lte("fecha_reporte", fechaFin);

  const { data: reportes } = await query;

  const { data: residentes } = await supabaseClient
    .from("residentes")
    .select("id, nombre, tipo");

  const mapa = {};
  residentes.forEach(r=>{
    if(r.tipo==="vigilante"){
      mapa[r.id]=r.nombre;

      if(init){
        const opt=document.createElement("option");
        opt.value=r.id;
        opt.textContent=r.nombre;
        document.getElementById("filtroVigilante").appendChild(opt);
      }
    }
  });

  let datos=(reportes||[]).filter(r=>mapa[r.vigilante_id]);

  if(vigilanteFiltro){
    datos=datos.filter(d=>d.vigilante_id===vigilanteFiltro);
  }

  //////////////////////////////////////////////////
  // 🎯 KPI
  //////////////////////////////////////////////////
  document.getElementById("kpiTotal").innerText = datos.length;

  const conteoVig={}, conteoTipo={}, conteoDia={};

  datos.forEach(d=>{
    const v=mapa[d.vigilante_id];
    conteoVig[v]=(conteoVig[v]||0)+1;

    conteoTipo[d.tipo]=(conteoTipo[d.tipo]||0)+1;

    const f=new Date(d.fecha_reporte).toLocaleDateString();
    conteoDia[f]=(conteoDia[f]||0)+1;
  });

  document.getElementById("kpiVigilante").innerText =
    getMax(conteoVig);

  document.getElementById("kpiTipo").innerText =
    getMax(conteoTipo);

  document.getElementById("kpiDia").innerText =
    getMax(conteoDia);

  //////////////////////////////////////////////////
  // 🎨 PALETA PRO
  //////////////////////////////////////////////////
  const colores=["#22c55e","#7c3aed","#4ade80","#a78bfa","#166534","#5b21b6"];

  //////////////////////////////////////////////////
  // 📊 GRAFICAS
  //////////////////////////////////////////////////
  render("chartVigilantes","bar",conteoVig,colores);
  render("chartTipos","pie",conteoTipo,colores);
  render("chartTiempo","line",conteoDia,colores);
  render("chartRol","doughnut",
    countBy(datos,"rol_creador"),
    colores
  );
}

////////////////////////////////////////////////
// helpers
////////////////////////////////////////////////
function getMax(obj){
  return Object.keys(obj).reduce((a,b)=>obj[a]>obj[b]?a:b,"-");
}

function countBy(arr,key){
  const r={};
  arr.forEach(i=>{
    const k=i[key]||"desconocido";
    r[k]=(r[k]||0)+1;
  });
  return r;
}

function render(id,tipo,obj,colores){

  const canvas=document.getElementById(id);

  if(canvas.chart){
    canvas.chart.destroy();
  }

  canvas.chart=new Chart(canvas,{
    type:tipo,
    data:{
      labels:Object.keys(obj),
      datasets:[{
        data:Object.values(obj),
        backgroundColor:colores
      }]
    }
  });
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Desempeño Vigilantes</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="auth.js"></script>
<script src="utils/residente.js"></script>  

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.card {
  background: #111827;
  padding: 15px;
  border-radius: 12px;
}
</style>
</head>

<body>

<h2>📊 Desempeño de Vigilantes</h2>

<div class="grid">
  <div class="card"><canvas id="chartVigilantes"></canvas></div>
  <div class="card"><canvas id="chartTipos"></canvas></div>
  <div class="card"><canvas id="chartTiempo"></canvas></div>
  <div class="card"><canvas id="chartRol"></canvas></div>
</div>

<script>

// 🔐 Protección
window.addEventListener("load", async () => {
  await protegerPagina(["administracion", "mesa_directiva", "soporte"]);
  await cargarDatos();
});

// 🚀 Cargar datos
async function cargarDatos() {

if (!supabaseClient) {
  console.error("❌ Supabase no inicializado");
  return;
}  

  // 1️⃣ Traer reportes
  const { data: reportes, error: err1 } = await supabaseClient
    .from("reportes_vigilantes")
    .select("vigilante_id, tipo, fecha_reporte, rol_creador");

  if (err1) {
    console.error("ERROR REPORTES:", err1);
    return;
  }

  // 2️⃣ Traer vigilantes
  const { data: residentes, error: err2 } = await supabaseClient
    .from("residentes")
    .select("id, nombre, tipo");

  if (err2) {
    console.error("ERROR RESIDENTES:", err2);
    return;
  }

  // 3️⃣ Crear mapa de vigilantes
  const mapaVigilantes = {};

  residentes.forEach(r => {
    if (r.tipo === "vigilante") {
      mapaVigilantes[r.id] = r.nombre;
    }
  });

  // 4️⃣ Filtrar solo reportes de vigilantes válidos
  const datos = (reportes || []).filter(r => mapaVigilantes[r.vigilante_id]);
  
  console.log("DATOS LIMPIOS:", datos);

  // 📊 1. Reportes por vigilante
if (!datos.length) {
  console.warn("⚠️ No hay datos para graficar");
}
  
  const porVigilante = {};

  datos.forEach(d => {
    const nombre = mapaVigilantes[d.vigilante_id];
    porVigilante[nombre] = (porVigilante[nombre] || 0) + 1;
  });

  const ctx = document.getElementById("chartVigilantes").getContext("2d");
  
if (ctx.chart) {
  ctx.chart.destroy();
}

ctx.chart = new Chart(ctx, {
  type: "bar",
  data: {
    labels: Object.keys(porVigilante),
    datasets: [{
      label: "Reportes por vigilante",
      data: Object.values(porVigilante)
    }]
  }
});

}


</script>

</body>
</html>

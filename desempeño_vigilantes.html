<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Desempeño Vigilantes</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="utils/residente.js"></script>  

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

h2 {
  margin-bottom: 10px;
}

/* 🔥 FILTROS */
.filtros {
  background: #111827;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 20px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.filtros input, .filtros select {
  padding: 8px;
  border-radius: 8px;
  border: none;
}

.filtros button {
  background: #22c55e;
  color: white;
  border: none;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
}

/* 🔥 GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.card {
  background: #111827;
  padding: 15px;
  border-radius: 12px;
}
</style>
</head>

<body>

<h2>📊 Desempeño de Vigilantes</h2>

<!-- 🔥 FILTROS -->
<div class="filtros">
  <input type="date" id="fechaInicio">
  <input type="date" id="fechaFin">
  <select id="filtroVigilante">
    <option value="">Todos los vigilantes</option>
  </select>
  <button onclick="cargarDatos()">Aplicar</button>
</div>

<div class="grid">
  <div class="card"><canvas id="chartVigilantes"></canvas></div>
  <div class="card"><canvas id="chartTipos"></canvas></div>
  <div class="card"><canvas id="chartTiempo"></canvas></div>
  <div class="card"><canvas id="chartRol"></canvas></div>
</div>

<script>

// 🔐 INIT
window.addEventListener("load", async () => {
  await protegerPagina(["administracion", "mesa_directiva", "soporte"]);
  await cargarDatos(true);
});

/////////////////////////////////////////////////////////
// 🚀 CARGA
/////////////////////////////////////////////////////////
async function cargarDatos(init = false) {

  if (typeof supabaseClient === "undefined") {
    console.error("❌ SupabaseClient no disponible");
    return;
  }

  const fechaInicio = document.getElementById("fechaInicio").value;
  const fechaFin = document.getElementById("fechaFin").value;
  const vigilanteFiltro = document.getElementById("filtroVigilante").value;

  // 🔹 REPORTES
  let query = supabaseClient
    .from("reportes_vigilantes")
    .select("vigilante_id, tipo, fecha_reporte, rol_creador");

  if (fechaInicio) query = query.gte("fecha_reporte", fechaInicio);
  if (fechaFin) query = query.lte("fecha_reporte", fechaFin);

  const { data: reportes, error: err1 } = await query;

  if (err1) {
    console.error(err1);
    return;
  }

  // 🔹 RESIDENTES (vigilantes)
  const { data: residentes } = await supabaseClient
    .from("residentes")
    .select("id, nombre, tipo");

  const mapaVigilantes = {};
  residentes.forEach(r => {
    if (r.tipo === "vigilante") {
      mapaVigilantes[r.id] = r.nombre;

      // 🔥 llenar filtro solo una vez
      if (init) {
        const opt = document.createElement("option");
        opt.value = r.id;
        opt.textContent = r.nombre;
        document.getElementById("filtroVigilante").appendChild(opt);
      }
    }
  });

  // 🔥 FILTRAR
  let datos = (reportes || []).filter(r => mapaVigilantes[r.vigilante_id]);

  if (vigilanteFiltro) {
    datos = datos.filter(d => d.vigilante_id === vigilanteFiltro);
  }

  /////////////////////////////////////////////////////////
  // 🎨 PALETA (VERDE + MORADO)
  /////////////////////////////////////////////////////////
  const colores = [
    "#22c55e", // verde
    "#7c3aed", // morado
    "#4ade80",
    "#a78bfa",
    "#16a34a",
    "#6d28d9"
  ];

  /////////////////////////////////////////////////////////
  // 📊 POR VIGILANTE
  /////////////////////////////////////////////////////////
  const porVigilante = {};
  datos.forEach(d => {
    const nombre = mapaVigilantes[d.vigilante_id];
    porVigilante[nombre] = (porVigilante[nombre] || 0) + 1;
  });

  renderChart("chartVigilantes", "bar",
    Object.keys(porVigilante),
    Object.values(porVigilante),
    colores
  );

  /////////////////////////////////////////////////////////
  // 🧾 POR TIPO
  /////////////////////////////////////////////////////////
  const porTipo = {};
  datos.forEach(d => {
    porTipo[d.tipo] = (porTipo[d.tipo] || 0) + 1;
  });

  renderChart("chartTipos", "pie",
    Object.keys(porTipo),
    Object.values(porTipo),
    colores
  );

  /////////////////////////////////////////////////////////
  // 📈 POR FECHA
  /////////////////////////////////////////////////////////
  const porFecha = {};
  datos.forEach(d => {
    const fecha = new Date(d.fecha_reporte).toLocaleDateString();
    porFecha[fecha] = (porFecha[fecha] || 0) + 1;
  });

  renderChart("chartTiempo", "line",
    Object.keys(porFecha),
    Object.values(porFecha),
    colores
  );

  /////////////////////////////////////////////////////////
  // 👥 POR ROL
  /////////////////////////////////////////////////////////
  const porRol = {};
  datos.forEach(d => {
    const rol = d.rol_creador || "desconocido";
    porRol[rol] = (porRol[rol] || 0) + 1;
  });

  renderChart("chartRol", "doughnut",
    Object.keys(porRol),
    Object.values(porRol),
    colores
  );
}

/////////////////////////////////////////////////////////
// 🔥 RENDER
/////////////////////////////////////////////////////////
function renderChart(id, tipo, labels, data, colores) {

  const canvas = document.getElementById(id);

  if (canvas.chart) {
    canvas.chart.destroy();
  }

  canvas.chart = new Chart(canvas, {
    type: tipo,
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: colores
      }]
    }
  });
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Desempeño Vigilantes</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

/* FILTRO */
.filtros {
  margin-bottom: 20px;
}

select {
  padding: 8px;
  border-radius: 8px;
  background: #1f2937;
  color: white;
  border: none;
}

/* KPI */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
  margin-bottom: 20px;
}

.kpi {
  background: #1f2937;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
}

.kpi h3 {
  margin: 0;
  font-size: 22px;
}

.kpi span {
  color: #9ca3af;
  font-size: 12px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.card {
  background: #1f2937;
  padding: 15px;
  border-radius: 12px;
}

/* TABLA */
table {
  width: 100%;
  border-collapse: collapse;
}

td {
  padding: 8px;
}

.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 10px;
}

.chip {
  padding: 8px 14px;
  border-radius: 20px;
  background: #1f2937;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.2s ease;
}

.chip:hover {
  background: #374151;
}

.chip.active {
  background: #9F2241;
  color: white;
}  

/* SEMÁFORO */
.bad { color: #9F2241; font-weight: bold; }
.warn { color: #BC955C; font-weight: bold; }
.good { color: #235B4E; font-weight: bold; }

</style>
</head>

<body>

<h2>📊 Desempeño de Vigilantes</h2>

<!-- 🔽 FILTRO -->
<div class="filtros">
  <label>Filtrar vigilante:</label>
  <div id="filtroVigilante" class="chips"></div>
</div>

<!-- KPIs -->
<div class="kpi-grid">
  <div class="kpi"><h3 id="kpiTotal">0</h3><span>Total reportes</span></div>
  <div class="kpi"><h3 id="kpiPromedio">0</h3><span>Promedio por vigilante</span></div>
  <div class="kpi"><h3 id="kpiTop">-</h3><span>Más reportado</span></div>
  <div class="kpi"><h3 id="kpiAlertas">0</h3><span>Alertas</span></div>
</div>

<div class="grid">
  <div class="card"><canvas id="chartVigilantes"></canvas></div>
  <div class="card"><canvas id="chartTipos"></canvas></div>
  <div class="card"><canvas id="chartTiempo"></canvas></div>
  <div class="card"><canvas id="chartRol"></canvas></div>

  <div class="card">
    <h3>🏆 Ranking</h3>
    <table id="ranking"></table>
  </div>

  <div class="card">
    <h3>🚨 Alertas</h3>
    <ul id="alertas"></ul>
  </div>
</div>

<script>

const colores = [
  "#9F2241","#235B4E","#DDC9A3","#98989A",
  "#691C32","#10312B","#BC955C","#6F7271"
];

Chart.defaults.color = "#FFFFFF";
Chart.defaults.borderColor = "#374151";

let DATA_GLOBAL = [];
let MAPA = {};

window.addEventListener("load", async () => {

  let intentos = 0;
  while (!window.supabase && intentos < 10) {
    await new Promise(r => setTimeout(r, 100));
    intentos++;
  }

  await protegerPagina(["administracion","mesa_directiva","soporte"]);
  await cargarDatosBase();
  aplicarFiltro();
});

async function cargarDatosBase(){

  const { data: reportes } = await supabaseClient
    .from("reportes_vigilantes")
    .select("vigilante_id, tipo, fecha_reporte, rol_creador");

  const { data: residentes } = await supabaseClient
    .from("residentes")
    .select("id, nombre, tipo");

  residentes.forEach(r=>{
    if(r.tipo==="vigilante") MAPA[r.id]=r.nombre;
  });

  DATA_GLOBAL = reportes.filter(r=>MAPA[r.vigilante_id]);

  // 🔽 llenar filtro
  const contenedor = document.getElementById("filtroVigilante");
contenedor.innerHTML = "";

// 🔥 estado global de selección
window.SELECCION_VIGILANTES = new Set(Object.keys(MAPA));

// 🔵 botón "Todos"
const chipAll = document.createElement("div");
chipAll.className = "chip active";
chipAll.textContent = "Todos";

chipAll.onclick = () => {

  // 🔵 Siempre activar todos
  window.SELECCION_VIGILANTES = new Set(Object.keys(MAPA));

  // 🔵 Marcar todos los chips como activos
  document.querySelectorAll(".chip").forEach(c => c.classList.add("active"));

  aplicarFiltro();
};

contenedor.appendChild(chipAll);

  Object.entries(MAPA).forEach(([id,nombre]) => {

  const chip = document.createElement("div");
  chip.className = "chip active";
  chip.textContent = nombre;

  chip.onclick = () => {
    if (window.SELECCION_VIGILANTES.has(id)) {
      window.SELECCION_VIGILANTES.delete(id);
      chip.classList.remove("active");
    } else {
      window.SELECCION_VIGILANTES.add(id);
      chip.classList.add("active");
    }

    aplicarFiltro();
  };

  contenedor.appendChild(chip);
});

  }

function aplicarFiltro(){

  const seleccionados = Array.from(window.SELECCION_VIGILANTES);

  const datos = DATA_GLOBAL.filter(r=>seleccionados.includes(r.vigilante_id));

  construirDashboard(datos);
}

function construirDashboard(datos){

  const porVigilante={}, porTipo={}, porMes={}, porRol={};

  datos.forEach(d=>{
    const nombre = MAPA[d.vigilante_id];

    porVigilante[nombre]=(porVigilante[nombre]||0)+1;
    porTipo[d.tipo]=(porTipo[d.tipo]||0)+1;
    porRol[d.rol_creador]=(porRol[d.rol_creador]||0)+1;

    const mes = new Date(d.fecha_reporte).toLocaleDateString("es-MX",{month:"short"});
    porMes[mes]=(porMes[mes]||0)+1;
  });

  render("chartVigilantes","bar",porVigilante);
  render("chartTipos","pie",porTipo);
  render("chartTiempo","line",porMes);
  render("chartRol","doughnut",porRol);

  // KPIs
  const total = datos.length;
  const vigilantes = Object.keys(porVigilante).length;

  document.getElementById("kpiTotal").innerText = total;
  document.getElementById("kpiPromedio").innerText = vigilantes ? (total/vigilantes).toFixed(1) : 0;

  const ranking = Object.entries(porVigilante).sort((a,b)=>b[1]-a[1]);

  document.getElementById("kpiTop").innerText = ranking[0]?.[0] || "-";

  // Ranking
  const tabla = document.getElementById("ranking");
  tabla.innerHTML = "";

  ranking.forEach(([nombre,total])=>{
    let clase="good";
    if(total>=4) clase="bad";
    else if(total>=2) clase="warn";

    tabla.innerHTML += `
      <tr>
        <td>${nombre}</td>
        <td>${total}</td>
        <td class="${clase}">${clase==="bad"?"🔴":"🟡"}</td>
      </tr>
    `;
  });

  // Alertas
  const alertas = document.getElementById("alertas");
  alertas.innerHTML = "";

  let totalAlertas = 0;

  ranking.forEach(([nombre,total])=>{
    if(total>=3){
      alertas.innerHTML += `<li>⚠️ ${nombre} tiene ${total} reportes</li>`;
      totalAlertas++;
    }
  });

  document.getElementById("kpiAlertas").innerText = totalAlertas;
}

function render(id,tipo,obj){

  const canvas = document.getElementById(id);

  if(canvas.chart) canvas.chart.destroy();

  canvas.chart = new Chart(canvas,{
    type: tipo,
    data:{
      labels:Object.keys(obj),
      datasets:[{
        data:Object.values(obj),
        backgroundColor:colores
      }]
    },
    options:{
      plugins:{
        legend:{ labels:{color:"#fff"} },
        datalabels:{
          color:"#fff",
          anchor:"end",
          align:"top",
          font:{
            size:16,   // 🔥 AQUÍ EL CAMBIO (ANTES PEQUEÑO)
            weight:"bold"
          },
          formatter:v=>v
        }
      }
    },
    plugins:[ChartDataLabels]
  });
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Desempeño Vigilantes</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="utils/residente.js"></script>  

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.card {
  background: #111827;
  padding: 15px;
  border-radius: 12px;
}
</style>
</head>

<body>

<h2>📊 Desempeño de Vigilantes</h2>

<div class="grid">
  <div class="card"><canvas id="chartVigilantes"></canvas></div>
  <div class="card"><canvas id="chartTipos"></canvas></div>
  <div class="card"><canvas id="chartTiempo"></canvas></div>
  <div class="card"><canvas id="chartRol"></canvas></div>
</div>

<script>

// 🔐 Protección + carga
window.addEventListener("load", async () => {
  await protegerPagina(["administracion", "mesa_directiva", "soporte"]);
  await cargarDatos();
});

async function cargarDatos() {

  if (typeof supabaseClient === "undefined") {
    console.error("❌ SupabaseClient no disponible");
    return;
  }

  // 🔹 1. Reportes
  const { data: reportes, error: err1 } = await supabaseClient
    .from("reportes_vigilantes")
    .select("vigilante_id, tipo, fecha_reporte, rol_creador");

  if (err1) {
    console.error("ERROR REPORTES:", err1);
    return;
  }

  // 🔹 2. Vigilantes
  const { data: residentes, error: err2 } = await supabaseClient
    .from("residentes")
    .select("id, nombre, tipo");

  if (err2) {
    console.error("ERROR RESIDENTES:", err2);
    return;
  }

  // 🔹 mapa vigilantes
  const mapaVigilantes = {};
  residentes.forEach(r => {
    if (r.tipo === "vigilante") {
      mapaVigilantes[r.id] = r.nombre;
    }
  });

  const datos = (reportes || []).filter(r => mapaVigilantes[r.vigilante_id]);

  console.log("DATOS LIMPIOS:", datos);

  /////////////////////////////////////////////////////////
  // 📊 1. POR VIGILANTE
  /////////////////////////////////////////////////////////
  const porVigilante = {};
  datos.forEach(d => {
    const nombre = mapaVigilantes[d.vigilante_id];
    porVigilante[nombre] = (porVigilante[nombre] || 0) + 1;
  });

  renderChart("chartVigilantes", "bar",
    Object.keys(porVigilante),
    Object.values(porVigilante),
    "Reportes por vigilante"
  );

  /////////////////////////////////////////////////////////
  // 🧾 2. POR TIPO
  /////////////////////////////////////////////////////////
  const porTipo = {};
  datos.forEach(d => {
    porTipo[d.tipo] = (porTipo[d.tipo] || 0) + 1;
  });

  renderChart("chartTipos", "pie",
    Object.keys(porTipo),
    Object.values(porTipo),
    "Tipos de reporte"
  );

  /////////////////////////////////////////////////////////
  // 📈 3. POR FECHA
  /////////////////////////////////////////////////////////
  const porFecha = {};
  datos.forEach(d => {
    const fecha = new Date(d.fecha_reporte).toLocaleDateString();
    porFecha[fecha] = (porFecha[fecha] || 0) + 1;
  });

  renderChart("chartTiempo", "line",
    Object.keys(porFecha),
    Object.values(porFecha),
    "Reportes por día"
  );

  /////////////////////////////////////////////////////////
  // 👥 4. POR ROL
  /////////////////////////////////////////////////////////
  const porRol = {};
  datos.forEach(d => {
    const rol = d.rol_creador || "desconocido";
    porRol[rol] = (porRol[rol] || 0) + 1;
  });

  renderChart("chartRol", "doughnut",
    Object.keys(porRol),
    Object.values(porRol),
    "Quién reporta"
  );
}

/////////////////////////////////////////////////////////
// 🔥 FUNCIÓN ÚNICA DE GRÁFICAS (LIMPIA)
/////////////////////////////////////////////////////////
function renderChart(id, tipo, labels, data, label) {

  const canvas = document.getElementById(id);

  if (canvas.chart) {
    canvas.chart.destroy();
  }

  canvas.chart = new Chart(canvas, {
    type: tipo,
    data: {
      labels,
      datasets: [{
        label,
        data
      }]
    }
  });
}

</script>

</body>
</html>

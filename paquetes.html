<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recepción de paquetes</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

.header {
  text-align: center;
  margin-bottom: 20px;
}

.section-title {
  margin-top: 20px;
  margin-bottom: 10px;
  font-weight: bold;
  color: #9ca3af;
  font-size: 13px;
}

.item {
  background: #1e293b;
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.ok { border-left: 6px solid #22c55e; }
.warn { border-left: 6px solid #f59e0b; }
.error { border-left: 6px solid #ef4444; }

.button {
  padding: 8px 12px;
  border-radius: 8px;
  border: none;
  background: #22c55e;
  color: white;
  cursor: pointer;
}

.button-sec {
  display: block;
  text-decoration: none;
  padding: 16px;
  border-radius: 14px;
  margin-top: 15px;
  color: white;
  font-size: 16px;
  font-weight: 500;
  background: #6b7280;
  text-align: center;
}

input {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
  border: none;
}

.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-content {
  background: #1e293b;
  padding: 25px;
  border-radius: 16px;
  text-align: center;
  width: 80%;
  max-width: 300px;
}

.modal-content button {
  margin-top: 10px;
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: white;
  display: block;
  width: 100%;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <h2>📦 Recepción de paquetes</h2>
</div>

<input type="text" id="buscador" placeholder="Buscar lote..." oninput="filtrar()">

<div id="autorizados"></div>
<div id="no_autorizados"></div>

<a href="index.html" class="button-sec">Regresar</a>

</div>

<div id="modal" class="modal">
  <div class="modal-content" id="modalContenido"></div>
</div>

<script>
const { createClient } = supabase;

const supabaseClient = createClient(
  "https://prjxmfhahnzosdwljode.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs"
);

if (!localStorage.getItem("usuario_valido")) {
  window.location.href = "login.html";
}

const rol = localStorage.getItem("rol");

if (rol !== "vigilante" && rol !== "admin") {
  window.location.href = "index.html";
}

function mostrarModal(titulo, texto, tipo = "") {

  let botones = `<button onclick="cerrarModal()">Cerrar</button>`;

  if (tipo === "notificar") {
    botones = `
      <button onclick="abrirWhats()">Abrir WhatsApp</button>
      <button onclick="confirmarNotificacion()">Ya notifiqué</button>
    `;
  }

  document.getElementById("modalContenido").innerHTML = `
    <h3>${titulo}</h3>
    <p>${texto}</p>
    ${botones}
  `;

  document.getElementById("modal").style.display = "flex";
}

function cerrarModal() {
  document.getElementById("modal").style.display = "none";
}

async function cargar() {

  const { data, error } = await supabaseClient
    .from('residentes')
    .select('id, privada, casa, telefono, estado_pago, recibe_paquetes')
    .eq('tipo', 'residente');

  if (error) {
    mostrarModal("Error", "No se pudo cargar");
    return;
  }

  render(data);
}

function render(data) {

  data.sort((a,b)=> a.privada.localeCompare(b.privada) || a.casa - b.casa);

  const contA = document.getElementById("autorizados");
  const contN = document.getElementById("no_autorizados");

  contA.innerHTML = "<div class='section-title'>AUTORIZADOS</div>";
  contN.innerHTML = "<div class='section-title'>NO DISPONIBLES</div>";

  data.forEach(r => {

    const div = document.createElement("div");
div.className = "item";

let puedeRegistrar = false;
let mensaje = "";
let clase = "";

// 🔹 No autorizó paquetes
if (!r.recibe_paquetes) {
  mensaje = "⚠ No autorizó recepción";
  clase = "warn";
}

// 🔹 MOROSO → bloqueado
else if (r.estado_pago === "moroso") {
  mensaje = "❌ No disponible por adeudo";
  clase = "error";
}

// 🔹 RETRASO → permitido con alerta
else if (r.estado_pago === "retraso_1") {
  mensaje = "⚠ Tiene adeudo";
  clase = "warn";
  puedeRegistrar = true;
}

// 🔹 CORRIENTE → permitido sin mensaje
else if (r.estado_pago === "corriente") {
  clase = "ok";
  puedeRegistrar = true;
}

// 🔹 fallback
else {
  mensaje = "❌ Estado desconocido";
  clase = "error";
}

div.classList.add(clase);

if (puedeRegistrar) {
  div.innerHTML = `
    <span>Privada ${r.privada} - Lote ${r.casa}</span>
    <div>
      ${mensaje ? `<div style="font-size:12px">${mensaje}</div>` : ""}
      <button class="button" onclick="registrar('${r.id}','${r.privada}','${r.casa}')">
        Registrar
      </button>
    </div>
  `;
} else {
  div.innerHTML = `
    <span>Privada ${r.privada} - Lote ${r.casa}</span>
    <span style="font-size:12px">${mensaje}</span>
  `;
}

      div.innerHTML = `
        <span>Privada ${r.privada} - Lote ${r.casa}</span>
        <span style="font-size:12px">${texto}</span>
      `;

      contN.appendChild(div);
    }

  });
}

function filtrar() {
  const valor = document.getElementById("buscador").value.toLowerCase();
  const items = document.querySelectorAll(".item");

  items.forEach(i => {
    const texto = i.innerText.toLowerCase();
    i.style.display = texto.includes(valor) ? "flex" : "none";
  });
}

async function registrar(id, privada, casa) {

  const { error } = await supabaseClient
    .from('paquetes')
    .insert({
      residente_id: id,
      privada,
      casa
    });

  if (error) {
    mostrarModal("Error", "No se pudo registrar");
    return;
  }

  mostrarModal(
    "Notificación",
    "Selecciona al residente en WhatsApp y envía el mensaje.",
    "notificar"
  );
}

function abrirWhats() {

  const mensaje = encodeURIComponent(
    "Estimado residente, tiene un paquete en caseta. Favor de recogerlo a la brevedad o mañana será entregado a la administración. Gracias"
  );

  window.open(`https://wa.me/?text=${mensaje}`, '_blank');
}

function confirmarNotificacion() {
  mostrarModal("Listo", "Paquete registrado correctamente");
}

setInterval(cargar, 10000);

cargar();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Expediente Electrónico</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<style>

body{

    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#0f172a;
    color:white;

}

.container{

    max-width:900px;
    margin:auto;
    padding:25px;

}

.logo{

    width:120px;
    display:block;
    margin:auto;
    margin-bottom:25px;

}

h2{

    text-align:center;
    margin-bottom:25px;

}

.card{

    background:#1e293b;
    border-radius:14px;
    padding:18px;
    margin-bottom:20px;

}

.card h3{

    margin-top:0;
    color:#60a5fa;

}

.grid{

    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:12px;

}

.item{

    background:#0f172a;
    border-radius:10px;
    padding:12px;

}

.label{

    font-size:12px;
    color:#94a3b8;

}

.value{

    margin-top:4px;
    font-size:15px;
    font-weight:bold;

}

table{

    width:100%;
    border-collapse:collapse;

}

th{

    background:#2563eb;
    padding:12px;

}

td{

    padding:12px;
    border-bottom:1px solid #334155;

}

button{

    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    padding:10px 18px;
    cursor:pointer;

}

button:hover{

    background:#1d4ed8;

}

</style>

</head>

<body>

<div class="container">

<img src="/icono-512.png" class="logo">

<h2>Expediente Electrónico</h2>

<div class="card">

<h3>Información General</h3>

<div class="grid">

<div class="item">
<div class="label">Folio</div>
<div class="value" id="folio">-</div>
</div>

<div class="item">
<div class="label">Tipo</div>
<div class="value" id="tipo">-</div>
</div>

<div class="item">
<div class="label">Estado</div>
<div class="value" id="estado">-</div>
</div>

<div class="item">
<div class="label">Fase</div>
<div class="value" id="fase">-</div>
</div>

<div class="item">
<div class="label">Privada</div>
<div class="value" id="privada">-</div>
</div>

<div class="item">
<div class="label">Lote</div>
<div class="value" id="lote">-</div>
</div>

<div class="item">
<div class="label">DRO</div>
<div class="value" id="dro">-</div>
</div>

</div>

</div>

<div class="card">

<h3>Documentos del Expediente</h3>

<table>

<thead>

<tr>

<th>Documento</th>

<th>Obligatorio</th>

<th>Estado</th>

<th>Acción</th>

</tr>

</thead>

<tbody id="tablaDocumentos">

</tbody>

</table>

</div>

<div class="card">

<h3>Bitácora</h3>

<table>

<thead>

<tr>

<th>Fecha</th>

<th>Evento</th>

<th>Descripción</th>

</tr>

</thead>

<tbody id="tablaBitacora">

</tbody>

</table>

</div>

</div>

</body>

</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Reportes de luminarias</title>
<script src="https://cdn.tailwindcss.com"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body class="bg-gray-100 p-4">

<div class="max-w-3xl mx-auto bg-white shadow rounded-2xl p-6">

<h2 class="text-2xl font-bold text-center mb-4">
Reportes vecinales de luminarias
</h2>

<p class="text-center text-sm text-gray-500 mb-4">
Actualización automática en tiempo real
</p>

<table class="w-full text-sm border">

<thead class="bg-gray-200">
<tr>
<th class="p-2 border">Luminaria</th>
<th class="p-2 border">Falla</th>
<th class="p-2 border">Estado</th>
<th class="p-2 border">Fecha</th>
</tr>
</thead>

<tbody id="tabla_reportes"></tbody>

</table>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = 'https://prjxmfhahnzosdwljode.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs';

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

async function cargarReportes() {

const { data, error } = await supabaseClient
.from('reportes_vecinales')
.select('no_luminaria, descripcion, estatus, fecha_reporte')
.order('fecha_reporte', { ascending: false });

if (error) {
console.error(error);
return;
}

const tabla = document.getElementById('tabla_reportes');
tabla.innerHTML = "";

data.forEach(r => {

const fila = `
<tr>
<td class="border p-2 text-center">${r.no_luminaria}</td>
<td class="border p-2">${r.descripcion}</td>
<td class="border p-2 text-center">${r.estatus}</td>
<td class="border p-2 text-center">${new Date(r.fecha_reporte).toLocaleDateString()}</td>
</tr>
`;

tabla.innerHTML += fila;

});

}

/* carga inicial */

cargarReportes();

/* actualización automática cada 10 segundos */

setInterval(cargarReportes, 10000);

</script>

</body>
</html>

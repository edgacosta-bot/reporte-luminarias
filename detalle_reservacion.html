<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Invitados Reservación</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="auth.js"></script>
<script src="utils/residente.js"></script>
<script src="modal.js"></script>

<style>

body{
  margin:0;
  font-family:'Segoe UI';
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
}

.container{
  max-width:700px;
  margin:auto;
  padding:20px;
}

.card{
  background:#111827;
  border-radius:18px;
  padding:20px;
  margin-bottom:15px;
}

input{
  width:100%;
  box-sizing:border-box;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#1f2937;
  color:white;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>
👥 Invitados
</h1>

<div
  id="detalle"
  class="card"
>
Cargando...
</div>

<div class="card">

  <input
    id="nombreInvitado"
    placeholder="Nombre del invitado"
  >

  <br><br>

  <button
    onclick="agregarInvitado()"
  >

    Agregar invitado

  </button>

</div>

<div id="lista"></div>

</div>

<script>

const params =
  new URLSearchParams(
    window.location.search
  );

const reservacionId =
  params.get(
    "reservacion_id"
  );

let detalle = [];

function renderizar(){

  if(
    detalle.length === 0
  ){
    return;
  }

  const r =
    detalle[0];

  document.getElementById(
    "detalle"
  ).innerHTML = `

    <b>🏟 Amenidad:</b>
    ${r.amenidad}

    <br><br>

    <b>📅 Fecha:</b>
    ${r.fecha}

    <br><br>

    <b>🕒 Horario:</b>

    ${r.hora_inicio}
    -
    ${r.hora_fin}

  `;

  const lista =
    document.getElementById(
      "lista"
    );

  let html = "";

  detalle.forEach(i => {

    if(
      !i.invitado_id
    ){
      return;
    }

    html += `

      <div class="card">

        <b>
          ${i.invitado}
        </b>

        <br><br>

        Estado:

        ${i.estatus_invitado}

      </div>

    `;

  });

  lista.innerHTML = html;

}    

async function cargar(){

  const { data, error } =
    await supabaseClient.rpc(
      "obtener_detalle_reservacion",
      {
        p_reservacion_id:
          reservacionId
      }
    );

  if(error){

    console.error(error);

    return;

  }

  detalle =
    data || [];

  renderizar();

}    

async function agregarInvitado(){

  const nombre =
    document.getElementById(
      "nombreInvitado"
    ).value.trim();

  if(!nombre){

    await mostrarAlerta({

      titulo:"SIGVIC",

      mensaje:
        "Capture el nombre del invitado."

    });

    return;

  }

  const { data, error } =
    await supabaseClient.rpc(
      "agregar_invitado_reservacion",
      {
        p_reservacion_id:
          reservacionId,

        p_nombre:
          nombre
      }
    );

  if(error){

    await mostrarAlerta({

      titulo:"Error",

      mensaje:
        error.message

    });

    return;

  }

  await mostrarAlerta({

    titulo:"SIGVIC",

    mensaje:
      data.mensaje

  });

  document.getElementById(
    "nombreInvitado"
  ).value = "";

  await cargar();

}
      
window.addEventListener(
  "DOMContentLoaded",
  async ()=>{

    await protegerPagina([
      "residente"
    ]);

    await cargar();

  }
);      

</script>

</body>
</html>

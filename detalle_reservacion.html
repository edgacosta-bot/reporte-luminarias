<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Invitados Reservación</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="auth.js"></script>
<script src="utils/residente.js"></script>
<script src="modal.js"></script>

    <link rel="stylesheet" href="styles/detalle_actividad.css">
</head>

<body>

<div class="container">

<h1>
👥 Invitados
</h1>

<div
  id="detalle"
  class="card"
>
Cargando...
</div>

<div class="card">

  <input
    id="nombreInvitado"
    placeholder="Nombre del invitado"
  >

  <br><br>

  <button
    onclick="agregarInvitado()"
  >

    Agregar invitado

  </button>

</div>

<div id="lista"></div>

</div>

<script>

const params =
  new URLSearchParams(
    window.location.search
  );

const reservacionId =
  params.get(
    "reservacion_id"
  );

let detalle = [];

function renderizar(){

  if(
    detalle.length === 0
  ){
    return;
  }

  const r =
    detalle[0];

  document.getElementById(
    "detalle"
  ).innerHTML = `

    <b>🏟 Amenidad:</b>
    ${r.amenidad}

    <br><br>

    <b>📅 Fecha:</b>
    ${r.fecha}

    <br><br>

    <b>🕒 Horario:</b>

    ${r.hora_inicio}
    -
    ${r.hora_fin}

  `;

  const lista =
    document.getElementById(
      "lista"
    );

  let html = "";

  detalle.forEach(i => {

    if(
      !i.invitado_id
    ){
      return;
    }

html += `

  <div class="card">

    <b>
      ${i.invitado}
    </b>

    <br><br>

    Estado:

    ${i.estatus_invitado}

    ${
      i.estatus_invitado === 'autorizado'
      ? `

          <button
            style="
              margin-top:12px;
              background:#dc2626;
            "
            onclick="
              cancelarInvitado(
                '${i.invitado_id}'
              )
            "
          >

            Cancelar invitado

          </button>

        `
      : ''
    }

  </div>

`;
        
  });

  lista.innerHTML = html;

}    

async function cargar(){

  const { data, error } =
    await supabaseClient.rpc(
      "obtener_detalle_reservacion",
      {
        p_reservacion_id:
          reservacionId
      }
    );

  if(error){

    console.error(error);

    return;

  }

  detalle =
    data || [];

  renderizar();

}    

async function agregarInvitado(){

  const nombre =
    document.getElementById(
      "nombreInvitado"
    ).value.trim();

  if(!nombre){

    await mostrarAlerta({

      titulo:"SIGVIC",

      mensaje:
        "Capture el nombre del invitado."

    });

    return;

  }

  const { data, error } =
    await supabaseClient.rpc(
      "agregar_invitado_reservacion",
      {
        p_reservacion_id:
          reservacionId,

        p_nombre:
          nombre
      }
    );

  if(error){

    await mostrarAlerta({

      titulo:"Error",

      mensaje:
        error.message

    });

    return;

  }

  await mostrarAlerta({

    titulo:"SIGVIC",

    mensaje:
      data.mensaje

  });

  document.getElementById(
    "nombreInvitado"
  ).value = "";

  await cargar();

}

async function cancelarInvitado(
  invitadoId
){

  const confirmar =
    await mostrarConfirmacion({

      titulo:
        "Cancelar invitado",

      mensaje:
        "¿Desea cancelar este invitado?"

    });

  if(!confirmar){
    return;
  }

  const { data, error } =
    await supabaseClient.rpc(
      "cancelar_invitado_reservacion",
      {
        p_invitado_id:
          invitadoId
      }
    );

  if(error){

    await mostrarAlerta({

      titulo:"Error",

      mensaje:
        error.message

    });

    return;

  }

  await mostrarAlerta({

    titulo:"SIGVIC",

    mensaje:
      data.mensaje

  });

  await cargar();

}      
      
window.addEventListener(
  "DOMContentLoaded",
  async ()=>{

    await protegerPagina([
      "residente"
    ]);

    await cargar();

  }
);      

</script>

</body>
</html>

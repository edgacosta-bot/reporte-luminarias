<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Asesores dentro</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<script>
protegerPagina(["vigilante","administracion","admin"]);
</script>

    <link rel="stylesheet" href="styles/asesores_dentro.css">
</head>

<body>

<div class="container">

<h1>
🏡 Asesores dentro
</h1>

<div
  id="resumen"
  class="resumen">
</div>

<div id="lista">

Cargando...

</div>

</div>

<script>

cargar();

setInterval(
  cargar,
  10000
);

function formatearHora(fecha){

  if(!fecha){
    return "-";
  }

  return new Date(fecha)
    .toLocaleString(
      "es-MX",
      {
        hour:"2-digit",
        minute:"2-digit",
        day:"2-digit",
        month:"2-digit"
      }
    );

}

function calcularTiempo(fecha){

  if(!fecha){
    return "-";
  }

  const inicio =
    new Date(fecha);

  const ahora =
    new Date();

  const diff =
    ahora - inicio;

  const horas =
    Math.floor(
      diff /
      (1000*60*60)
    );

  const minutos =
    Math.floor(
      (
        diff %
        (1000*60*60)
      ) /
      (1000*60)
    );

  return `${horas}h ${minutos}m`;

}

async function cargar(){

  const lista =
    document.getElementById(
      "lista"
    );

  const resumen =
    document.getElementById(
      "resumen"
    );

  const { data, error } =
    await supabaseClient.rpc(
      "obtener_asesores_dentro"
    );

  if(error){

    console.error(error);

    lista.innerHTML =
      "Error al cargar";

    return;

  }

  if(
    !data ||
    data.length === 0
  ){

    resumen.innerHTML =
      "0 asesores dentro";

    lista.innerHTML = `
      <div class="vacio">
        No hay asesores dentro
      </div>
    `;

    return;

  }

  resumen.innerHTML =
    `${data.length} asesor(es) dentro`;

  lista.innerHTML = "";

  data.forEach(asesor => {

    const clientes =
      asesor.clientes
        ? asesor.clientes
            .split(",")
            .map(x => x.trim())
        : [];

    lista.innerHTML += `

      <div class="card">

        <div class="nombre">
          ${asesor.nombre}
        </div>

        <div class="empresa">
          ${asesor.empresa}
        </div>

        <div class="detalle">

          Entrada:
          ${formatearHora(
            asesor.fecha_entrada
          )}

          <br>

          Tiempo dentro:
          ${calcularTiempo(
            asesor.fecha_entrada
          )}

          <br>

          Clientes dentro:
          ${asesor.clientes_dentro}

        </div>

        <div class="clientes">

          ${
            clientes.length
            ? clientes.map(c => `
                <div class="cliente">
                  👤 ${c}
                </div>
              `).join("")
            : `
                <div class="cliente">
                  Sin clientes dentro
                </div>
              `
          }

        </div>

      </div>

    `;

  });

}

</script>

</body>
</html>

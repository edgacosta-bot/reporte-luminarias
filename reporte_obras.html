<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Reporte de Obras - Villas de la Concepción</title>
<script src="https://cdn.tailwindcss.com"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 🔥 HOMOLOGACIÓN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="utils/residente.js"></script>

</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white shadow-xl rounded-2xl p-6 w-full max-w-md border border-gray-200">

<div class="text-center mb-6">
  <h1 class="text-xl font-semibold text-gray-800">
    Sistema de Información Vecinal
  </h1>
  <p class="text-sm text-gray-500">
    Fraccionamiento Villas de la Concepción
  </p>
</div>

<div id="actorInfo" class="bg-blue-50 border border-blue-200 text-blue-700 text-sm rounded-lg p-3 mb-5 text-center"></div>

<h2 class="text-lg font-semibold text-gray-700 mb-4 text-center">
  Reporte de Obras
</h2>

<form id="formReporte" class="space-y-4" onsubmit="event.preventDefault(); enviarReporte();">

<div>
<label class="block text-sm font-medium text-gray-600">
Tipo de reporte <span class="text-red-600">*</span>
</label>

<select
id="tipo"
class="mt-1 w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
>
<option value="">Tipo de reporte</option>
</select>

<p id="error_tipo" class="text-red-600 text-xs mt-1"></p>
</div>

<div>
<label class="block text-sm font-medium text-gray-600">
Obra <span class="text-red-600">*</span>
</label>

<select
id="obra"
class="mt-1 w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
>
<option value="">Selecciona obra</option>
</select>

<p id="error_obra" class="text-red-600 text-xs mt-1"></p>
</div>

<div>
<label class="block text-sm font-medium text-gray-600">
Trabajador (opcional)
</label>

<select
id="trabajador"
class="mt-1 w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
>
<option value="">Selecciona trabajador</option>
</select>
</div>

<div>
<label class="block text-sm font-medium text-gray-600">
Descripción <span class="text-red-600">*</span>
</label>

<textarea
id="descripcion"
rows="3"
class="mt-1 w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
placeholder="Describe el problema...">
</textarea>

<p id="error_descripcion" class="text-red-600 text-xs mt-1"></p>
</div>

<button
id="btn_enviar"
type="submit"
class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition">
Enviar reporte
</button>

<p id="mensaje" class="text-center text-sm mt-2"></p>

</form>

<a href="index.html" class="block text-center mt-4 text-sm text-blue-600">
← Volver a menú principal
</a>

<p class="text-xs text-gray-400 text-center mt-4">
La información proporcionada será utilizada únicamente para fines de atención y seguimiento dentro del fraccionamiento.
</p>

</div>

<script src="public/js/reporte_obras.js"></script>

</body>
</html>

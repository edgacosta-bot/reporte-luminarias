<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporte de Obras</title>

<!-- 🔥 HOMOLOGACIÓN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="utils/residente.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: #111827;
  padding: 25px;
  border-radius: 20px;
  width: 90%;
  max-width: 420px;
}

select, textarea {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 10px;
  border: none;
  background: #1f2937;
  color: white;
}

textarea {
  min-height: 100px;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: #f59e0b;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

.mensaje {
  text-align: center;
  margin-top: 10px;
}

.error { color: #f87171; }
.ok { color: #34d399; }

.info {
  text-align: center;
  font-size: 13px;
  color: #9ca3af;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="card">

<h2>🏗 Reporte de Obras</h2>

<div id="actorInfo" class="info"></div>

<select id="tipo">
  <option value="">Tipo de reporte</option>
</select>

<label style="font-size: 13px; color: #9ca3af;">
Obra
</label>

<select id="obra">
  <option value="">Selecciona obra</option>
</select>

<label style="font-size: 13px; color: #9ca3af;">
Trabajador (opcional)
</label>

<select id="trabajador">
  <option value="">Selecciona trabajador</option>
</select>

<textarea id="descripcion" placeholder="Describe el problema..."></textarea>

<button onclick="enviarReporte()">Enviar reporte</button>

<div id="mensaje" class="mensaje"></div>

</div>

<script>

// 🔐 VARIABLES
let actorInfo = document.getElementById("actorInfo");
let actor = "colono";

// 🔐 OBTENER RESIDENTE (NUEVO MODELO)
async function inicializarResidente(){

  const residente = await getResidente();

  if (!residente) {
    actorInfo.innerText = "Error de sesión";
    return null;
  }

  actorInfo.innerText = `Privada ${residente.privada} - Casa ${residente.casa}`;

  return residente;
}

// 🔥 CATÁLOGO
async function cargarCatalogo() {
  const select = document.getElementById("tipo");

  const { data } = await supabaseClient
    .from("catalogo_reportes")
    .select("subtipo")
    .eq("categoria", "obras")
    .eq("actor_permitido", actor)
    .eq("activo", true);

  select.innerHTML = '<option value="">Tipo de reporte</option>';

  if (data) {
    data.forEach(item => {
      const option = document.createElement("option");
      option.value = item.subtipo;
      option.textContent = item.subtipo.replaceAll("_", " ");
      select.appendChild(option);
    });
  }
}

// 🔥 OBRAS
async function cargarObras() {

  const select = document.getElementById("obra");

  const { data } = await supabaseClient
    .from("obras")
    .select("id, privada, casa")
    .eq("estatus", "activa");

  select.innerHTML = '<option value="">Selecciona obra</option>';

  if (data) {
    data.forEach(item => {
      const option = document.createElement("option");
      option.value = item.id;
      option.textContent = `Privada ${item.privada} - Casa ${item.casa}`;
      select.appendChild(option);
    });
  }
}

// 🔥 FILTRAR TRABAJADORES
document.getElementById("obra").addEventListener("change", async (e) => {

  const obra_id = e.target.value;
  const select = document.getElementById("trabajador");

  select.innerHTML = '<option value="">Selecciona trabajador</option>';

  if (!obra_id) return;

  const { data } = await supabaseClient
    .from("trabajadores_obra")
    .select("id, nombre")
    .eq("obra_id", obra_id)
    .eq("activo", true);

  if (data) {
    data.forEach(item => {
      const option = document.createElement("option");
      option.value = item.id;
      option.textContent = item.nombre;
      select.appendChild(option);
    });
  }
});

// 🚀 ENVIAR
async function enviarReporte() {

  const tipo = document.getElementById("tipo").value;
  const descripcion = document.getElementById("descripcion").value.trim();
  const trabajador_id = document.getElementById("trabajador").value;
  const obra_id = document.getElementById("obra").value;

  const mensaje = document.getElementById("mensaje");

  if (!tipo || !descripcion || !obra_id) {
    mensaje.innerText = "Completa los campos obligatorios";
    mensaje.className = "mensaje error";
    return;
  }

  // 🔥 NUEVO: obtener residente
  const residente = await getResidente();

  if (!residente) {
    mensaje.innerText = "Error de sesión";
    mensaje.className = "mensaje error";
    return;
  }

 const dataInsert = {
  tipo: tipo,
  descripcion: descripcion,
  trabajador_id: trabajador_id || null,
  obra_id: obra_id,
  privada: residente.privada,
  casa: residente.casa,
  residente_id: residente.id,

  // 🔥 NUEVO (CLAVE)
  creado_por: residente.id,
  rol_creador: "residente",
  fecha_reporte: new Date().toISOString(),
  estatus: "nuevo"
};

  const { error } = await supabaseClient
    .from("reportes_obras")
    .insert([dataInsert]);

  if (error) {
    console.error(error);
    mensaje.innerText = "Error al enviar";
    mensaje.className = "mensaje error";
    return;
  }

  mensaje.innerText = "Reporte enviado correctamente ✅";
  mensaje.className = "mensaje ok";
}

// INIT
window.addEventListener("DOMContentLoaded", async () => {
  await inicializarResidente();
  cargarCatalogo();
  cargarObras();
});

</script>

</body>
</html>

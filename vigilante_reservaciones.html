<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Control de Reservaciones</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="/utils/ui.js"></script>  
<script src="/modal.js"></script>  

<script>
protegerPagina(["vigilante"]);
</script>

    <link rel="stylesheet" href="styles/vigilante_actividades.css">
</head>

<body>

<div class="container">


<h2 id="tituloClientes">
👮 Control de Acceso a Reservaciones
</h2>

<div id="resumen"></div>  

<div id="invitados">
Cargando...
</div>

</div>

<script>

cargar();

async function cargar(){

  await cargarInvitados();

}

// =====================================
// ASESORES DENTRO
// =====================================


// =====================================
// CLIENTES DENTRO
// =====================================

async function cargarInvitados(){

  const contenedor =
    document.getElementById(
      "invitados"
    );

  const { data, error } =
    await supabaseClient.rpc(
      "obtener_invitados_reservacion_vigilancia"
    );

    if(error){

    console.error(error);

    contenedor.innerHTML =
      "Error al cargar";

    return;

  }
  
const registros =
  data || [];
  
const dentro =
  registros.filter(
    x => x.estado_acceso === "dentro"
  ).length;

const autorizados =
  registros.filter(
    x => x.estado_acceso === "autorizado"
  ).length;

  const total =
  registros.length;

document.getElementById(
  "resumen"
).innerHTML = `

  <div>
    👥 Total: ${total}
  </div>

  <div>
    🟢 Dentro: ${dentro}
  </div>

  <div>
    🟡 Autorizados: ${autorizados}
  </div>

`;
   
  if(!data || data.length === 0){

    contenedor.innerHTML = `
      <div class="vacio">
        No existen invitados para reservaciones
      </div>
    `;

    return;

  }

  contenedor.innerHTML = "";

  registros
  .sort((a,b)=>{

    if(
      a.estado_acceso === b.estado_acceso
    ){
      return 0;
    }

    return a.estado_acceso === "dentro"
      ? -1
      : 1;

  })
  .forEach(invitado => {

    contenedor.innerHTML += `

      <div class="
  card
  ${
    invitado.estado_acceso === "dentro"
      ? "card-dentro"
      : "card-autorizado"
  }
">

        <div class="nombre">

          ${invitado.invitado}

        </div>

      <div class="detalle">

  Amenidad:
  <b>${invitado.amenidad}</b>

  <br><br>

  Fecha:
  <b>${invitado.fecha_reservacion}</b>

  <br><br>

  Ubicación:
  <b>
    Privada ${invitado.privada}
    - Casa ${invitado.casa}
  </b>

  <br><br>

  Estado:
<b>
  ${
    invitado.estado_acceso === "dentro"
      ? "Dentro del fraccionamiento"
      : "Autorizado para ingresar"
  }
</b>

${
  invitado.hora_entrada
    ? `

    <br><br>

    Ingresó:

    <b>
      ${new Date(
        invitado.hora_entrada
      ).toLocaleTimeString(
        "es-MX",
        {
          hour:"2-digit",
          minute:"2-digit"
        }
      )}
    </b>

    `
    : ""
}

</div>  

        <br>

        ${
          invitado.estado_acceso === "autorizado"

          ?

          `

          <button
            class="btn btn-verde"
            onclick="
              registrarIngreso(
                '${invitado.invitado_id}'
              )
            ">

            Registrar ingreso

          </button>

          `

          :

          `

          <button
            class="btn btn-ambar"
            onclick="
              registrarSalida(
                '${invitado.invitado_id}'
              )
            ">

            Registrar salida

          </button>

          `
        }

      </div>

    `;

  });

}

async function registrarIngreso(
  invitadoId
){

  const pin =
    await mostrarSolicitudPin({

      titulo:
        "Registrar ingreso",

      mensaje:
        "Ingrese NIP del vigilante"

    });

  if(!pin){
    return;
  }

  const { data:vigilante } =
    await supabaseClient.rpc(
      "validar_pin_vigilante",
      {
        pin_input: pin
      }
    );

  if(
    !vigilante ||
    vigilante.length === 0
  ){

    ui.error(
      "NIP incorrecto"
    );

    return;

  }

  const { data, error } =
    await supabaseClient.rpc(
      "registrar_ingreso_invitado_reservacion",
      {

        p_invitado_id:
          invitadoId,

        p_vigilante_id:
          vigilante[0].id

      }
    );

  if(error){

    console.error(error);

    ui.error(
      error.message
    );

    return;

  }

  if(!data.ok){

    ui.error(
      data.mensaje
    );

    return;

  }

  ui.success(
    data.mensaje
  );

  await cargar();

}  

async function registrarSalida(
  invitadoId
){

  const confirmar =
  await mostrarConfirmacion({

    titulo:
      "Registrar salida",

    mensaje:
      "¿Desea registrar la salida de este invitado?"

  });

if(!confirmar){
  return;
}

const pin =
  await mostrarSolicitudPin({
    titulo:"Registrar salida",
    mensaje:"Ingrese NIP del vigilante"
  });

if(!pin){
  return;
}

  const { data: vigilante } =
    await supabaseClient.rpc(
      "validar_pin_vigilante",
      {
        pin_input: pin
      }
    );

  if(
  !vigilante ||
  vigilante.length === 0
){

  ui.error(
    "NIP incorrecto"
  );

  return;

}

  const { data, error } =
  await supabaseClient.rpc(
    "registrar_salida_invitado_reservacion",
    {
      p_invitado_id: invitadoId,
      p_vigilante_id: vigilante[0].id
    }
  );

if(error){

  console.error(error);

  ui.error(
    error.message
  );

  return;

}

if(!data.ok){

  ui.error(
    data.mensaje
  );

  return;

}

ui.success(
  data.mensaje
);

await cargar();

}

</script>

</body>
</html>

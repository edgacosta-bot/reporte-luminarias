<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Acceso de Visitantes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- 🔥 ORDEN CORRECTO -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      color: black;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .header {
      background: #1e293b;
      color: white;
      padding: 12px;
      border-radius: 10px;
      text-align: center;
      margin-bottom: 15px;
      font-weight: bold;
    }

    label {
      font-size: 13px;
      font-weight: bold;
      margin-top: 10px;
      display: block;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-primary { background: #2563eb; color: white; }
    .btn-back { background: #374151; color: white; }
    .btn-wa { background: #25D366; color: white; }

    #qrcode {
      margin-top: 20px;
      text-align: center;
      padding: 15px;
      border-radius: 12px;
      background: #f9fafb;
    }

    .qr-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .qr-logo {
      width: 50px;
      margin-bottom: -10px;
    }

    .qr-title {
      font-size: 13px;
      font-weight: bold;
      color: #1e293b;
    }

    .info-user {
      font-size: 13px;
      margin-bottom: 10px;
      color: #374151;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 999;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: white;
      border-radius: 18px;
      padding: 24px;
      width: 90%;
      max-width: 360px;
      text-align: center;
      color: #1f2937;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
    }

    .btn-gray { background: #6b7280; color: white; }
    .btn-blue { background: #2563eb; color: white; }
    .btn-red { background: #b91c1c; color: white; }
  </style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="header">
      Villas de la Concepción<br>
      Acceso de visitantes
    </div>

    <div id="infoUsuario" class="info-user"></div>

    <label>Nombre del visitante</label>
    <input id="visitante">

    <label>Fecha de visita</label>
    <input id="fecha" type="date">

    <label>Hora de inicio</label>
    <input id="hora_inicio" type="time">

    <label>Hora de fin</label>
    <input id="hora_fin" type="time">

    <button class="btn-primary" onclick="generarQR()">
      Generar código QR
    </button>

    <div id="qrcode"></div>

    <button id="btnWhatsapp" class="btn-wa" style="display:none;">
      Enviar por WhatsApp
    </button>

    <a href="index.html">
      <button class="btn-back">Volver</button>
    </a>

  </div>
</div>

<!-- MODALES -->
<div id="modalAviso" class="modal">
  <div class="modal-content">
    <p><b>⚠️ Estimado residente, tiene atraso en sus aportaciones</b></p>
    <p>Puede generar el acceso, pero lo invitamos a regularizar su pago.</p>
    <div class="modal-buttons">
      <button class="btn-gray" onclick="cerrarModal(false)">Cancelar</button>
      <button class="btn-blue" onclick="cerrarModal(true)">Continuar</button>
    </div>
  </div>
</div>

<div id="modalBloqueo" class="modal">
  <div class="modal-content">
    <p><b>⛔ Acceso bloqueado</b></p>
    <p>Estimado residente, debe regularizar su pago para poder generar accesos.</p>
    <button class="btn-red" onclick="location.href='index.html'">Entendido</button>
  </div>
</div>

<script>

let residenteGlobal = null;

// 🔐 INICIALIZACIÓN SEGURA
window.addEventListener("DOMContentLoaded", async () => {

  await protegerPagina(["administrador","administracion","colono","residente"]);

  const { data: { user } } = await supabaseClient.auth.getUser();

  const { data: residente } = await supabaseClient
    .from("residentes")
    .select("*")
    .eq("user_id", user.id)
    .single();

  residenteGlobal = residente;

  document.getElementById("infoUsuario").innerText =
    `Privada ${residente.privada} - Casa ${residente.casa}`;
});

function obtenerTipoGenerador() {
  const tipo = residenteGlobal?.tipo?.toLowerCase();
  if (tipo === "admin") return "administracion";
  if (tipo === "colono") return "residente";
  if (tipo === "vigilante") return "vigilante";
  return "residente";
}

let resolverModal;

function mostrarModal() {
  return new Promise(resolve => {
    resolverModal = resolve;
    document.getElementById("modalAviso").style.display = "flex";
  });
}

function cerrarModal(respuesta) {
  document.getElementById("modalAviso").style.display = "none";
  resolverModal(respuesta);
}

function mostrarBloqueo() {
  document.getElementById("modalBloqueo").style.display = "flex";
}

async function generarQR() {

  const visitante = document.getElementById('visitante').value;
  const fecha = document.getElementById('fecha').value;
  const hora_inicio = document.getElementById('hora_inicio').value;
  const hora_fin = document.getElementById('hora_fin').value;

  if (!visitante || !fecha || !hora_inicio || !hora_fin) {
    alert("Completa todos los campos");
    return;
  }

  const estado = (residenteGlobal.estado_pago || "corriente").toLowerCase().trim();

  if (estado === "moroso") {
    mostrarBloqueo();
    return;
  }

  if (estado === "atraso_1") {
    const continuar = await mostrarModal();
    if (!continuar) return;
  }

  const codigo = crypto.randomUUID();
  const tipo_generador = obtenerTipoGenerador();

  const { data: { user } } = await supabaseClient.auth.getUser();

  const fechaInicio = new Date(`${fecha}T${hora_inicio}:00`);
  const fechaFin = new Date(`${fecha}T${hora_fin}:00`);

const { error } = await supabaseClient.from('visitas_qr').insert([{
  residente_id: residenteGlobal.id,
  user_id: user.id,
  nombre_visitante: visitante,

  // 🔥 CAMPOS CORRECTOS
  fecha_visita: fecha,
  hora_inicio: hora_inicio,
  hora_fin: hora_fin,

  codigo_qr: codigo,
  privada: residenteGlobal.privada,
  casa: residenteGlobal.casa,
  estatus: 'activo',
  tipo_generador: tipo_generador,
  residente_nombre: residenteGlobal.nombre || ''
}]);

if (error) {
  console.error("ERROR INSERT:", error);
  alert("Error al guardar QR");
  return;
}

  const linkRelativo = `/mostrar_qr.html?qr=${codigo}`;
  const linkAbsoluto = `${window.location.origin}/mostrar_qr.html?qr=${codigo}`;

  document.getElementById("qrcode").innerHTML = `
    <div class="qr-wrapper">
      <img src="/icono-512.png" class="qr-logo">
      <div id="qrCanvas"></div>
      <div class="qr-title">Villas de la Concepción</div>
    </div>
  `;

  new QRCode(document.getElementById("qrCanvas"), {
    text: linkRelativo,
    width: 200,
    height: 200
  });

  const btn = document.getElementById("btnWhatsapp");
  btn.style.display = "block";
  btn.onclick = () => window.open(`https://wa.me/?text=${encodeURIComponent(linkAbsoluto)}`);
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Acceso de Visitantes - Villas de la Concepción</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- QR -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      padding: 20px;
      margin: 0;
    }

    .card {
      background: #ffffff;
      padding: 25px;
      border-radius: 16px;
      max-width: 420px;
      margin: auto;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    }

    h2 {
      text-align: center;
      margin-bottom: 5px;
      color: #0f172a;
    }

    .subtitle {
      text-align: center;
      font-size: 13px;
      color: #64748b;
      margin-bottom: 20px;
    }

    label {
      font-size: 13px;
      font-weight: bold;
      color: #334155;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #cbd5e1;
      font-size: 14px;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #3b82f6;
    }

    button {
      background: #3b82f6;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      padding: 14px;
      margin-top: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #2563eb;
    }

    hr {
      border: none;
      border-top: 1px solid #e2e8f0;
      margin: 20px 0;
    }

    #resultado {
      margin-top: 15px;
      font-size: 14px;
      color: #0f172a;
    }

    #qrcode {
      margin-top: 20px;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Acceso de Visitantes</h2>
  <div class="subtitle">Fraccionamiento Villas de la Concepción</div>

  <label>Tipo de acceso</label>
  <select id="tipo">
    <option value="residente">Residente</option>
    <option value="administracion">Administración</option>
  </select>

  <div id="datosCasa">
    <label>Privada</label>
    <select id="privada">
      <option value="">Selecciona</option>
      <option>I</option>
      <option>II</option>
      <option>III</option>
      <option>IV</option>
    </select>

    <label>Número de casa</label>
    <input id="casa" placeholder="Ej. 12">
  </div>

  <label>Clave</label>
  <input id="clave" placeholder="Clave de acceso">

  <hr>

  <label>Nombre del visitante</label>
  <input id="visitante" placeholder="Ej. Juan Pérez">

  <label>Fecha de visita</label>
  <input id="fecha" type="date">

  <button onclick="generarQR()">Generar código QR</button>

  <div id="resultado"></div>
  <div id="qrcode"></div>
</div>

<script>
const supabaseUrl = 'https://prjxmfhahnzosdwljode.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs'; // ⚠️ PON TU KEY REAL
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

// Mostrar/ocultar privada y casa
document.getElementById('tipo').addEventListener('change', function() {
  document.getElementById('datosCasa').style.display =
    this.value === 'residente' ? 'block' : 'none';
});

async function generarQR() {
  try {
    const tipo = document.getElementById('tipo').value;
    const privada = document.getElementById('privada').value;
    const casa = document.getElementById('casa').value;
    const clave = document.getElementById('clave').value;
    const visitante = document.getElementById('visitante').value;
    const fecha = document.getElementById('fecha').value;

    if (!clave || !visitante || !fecha) {
      alert("Completa todos los campos");
      return;
    }

    if (tipo === 'residente' && (!privada || !casa)) {
      alert("Falta privada o casa");
      return;
    }

    let query = supabase.from('residentes').select('*');

    if (tipo === 'residente') {
      query = query
        .eq('tipo', 'residente')
        .eq('privada', privada)
        .eq('casa', casa)
        .eq('clave', clave);
    } else {
      query = query
        .eq('tipo', 'administracion')
        .eq('clave', clave);
    }

    const { data: user, error } = await query.single();

    if (error || !user) {
      console.error(error);
      alert("Datos incorrectos");
      return;
    }

    let codigo = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString();

    const { error: insertError } = await supabase
      .from('visitas_qr')
      .insert([{
        residente_id: user.id,
        tipo_generador: tipo,
        nombre_visitante: visitante,
        fecha_visita: fecha,
        codigo_qr: codigo,
        privada: user.privada,
        casa: user.casa,
        residente_nombre: user.nombre
      }]);

    if (insertError) {
      console.error(insertError);
      alert("Error al guardar");
      return;
    }

    document.getElementById('qrcode').innerHTML = "";

    new QRCode(document.getElementById("qrcode"), {
      text: `https://reporte-luminarias-3lj5.vercel.app/validar.html?qr=${codigo}`,
      width: 200,
      height: 200
    });

    document.getElementById('resultado').innerHTML = `
      <p><b>Visitante:</b> ${visitante}</p>
      <p><b>Fecha:</b> ${fecha}</p>
      <p><b>Generado por:</b> ${user.identificador}</p>
    `;

  } catch (err) {
    console.error(err);
    alert("Error inesperado");
  }
}
</script>

</body>
</html>

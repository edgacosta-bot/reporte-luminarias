<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Acceso de Visitantes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      color: black;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .header {
      background: #1e293b;
      color: white;
      padding: 12px;
      border-radius: 10px;
      text-align: center;
      margin-bottom: 15px;
      font-weight: bold;
    }

    label {
      font-size: 13px;
      font-weight: bold;
      margin-top: 10px;
      display: block;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-primary { background: #2563eb; color: white; }
    .btn-back { background: #374151; color: white; }
    .btn-wa { background: #25D366; color: white; }

    /* 🔥 QR ESTILO MEJORADO */
    #qrcode {
      margin-top: 20px;
      text-align: center;
      padding: 15px;
      border-radius: 12px;
      background: #f9fafb;
    }

    .qr-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .qr-logo {
      width: 50px;
      margin-bottom: -10px;
      z-index: 2;
    }

    .qr-title {
      font-size: 13px;
      font-weight: bold;
      color: #1e293b;
    }

    .info-user {
      font-size: 13px;
      margin-bottom: 10px;
      color: #374151;
    }

    /* MODALES (sin cambios) */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 999;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-content {
      background: white;
      border-radius: 18px;
      padding: 24px;
      width: 90%;
      max-width: 360px;
      text-align: center;
      box-shadow: 0 15px 40px rgba(0,0,0,0.35);
      animation: scaleIn 0.2s ease;
      color: #1f2937;
    }

    @keyframes scaleIn {
      from { transform: scale(0.9); }
      to { transform: scale(1); }
    }

    .modal-icon { font-size: 40px; margin-bottom: 10px; }
    .modal-title { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
    .modal-text { font-size: 14px; color: #374151; margin-bottom: 15px; }
    .modal-buttons { display: flex; gap: 10px; }

    .btn-gray { background: #6b7280; color: white; }
    .btn-blue { background: #2563eb; color: white; }
    .btn-red { background: #b91c1c; color: white; }

    .warning .modal-title { color: #b45309; }
    .danger .modal-title { color: #b91c1c; }
  </style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="header">
      Villas de la Concepción<br>
      Acceso de visitantes
    </div>

    <div id="infoUsuario" class="info-user"></div>

    <label>Nombre del visitante</label>
    <input id="visitante" placeholder="Ej. Juan Pérez">

    <label>Fecha de visita</label>
    <input id="fecha" type="date">

    <label>Hora de inicio</label>
    <input id="hora_inicio" type="time">

    <label>Hora de fin</label>
    <input id="hora_fin" type="time">

    <button class="btn-primary" onclick="generarQR()">
      Generar código QR
    </button>

    <!-- 🔥 NUEVO DISEÑO QR -->
    <div id="qrcode"></div>

    <button id="btnWhatsapp" class="btn-wa" style="display:none;">
      Enviar por WhatsApp
    </button>

    <a href="index.html">
      <button class="btn-back">Volver</button>
    </a>

  </div>
</div>

<script>
const client = window.supabase.createClient(
  'https://prjxmfhahnzosdwljode.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs'
);

const privada = localStorage.getItem("privada");
const casa = localStorage.getItem("casa");

if (!privada || !casa) {
  window.location.href = "login.html";
}

document.getElementById("infoUsuario").innerText =
  `Privada ${privada} - Casa ${casa}`;

async function generarQR() {

  const visitante = document.getElementById('visitante').value;
  const fecha = document.getElementById('fecha').value;
  const hora_inicio = document.getElementById('hora_inicio').value;
  const hora_fin = document.getElementById('hora_fin').value;

  if (!visitante || !fecha || !hora_inicio || !hora_fin) {
    alert("Completa todos los campos");
    return;
  }

  const { data: user } = await client
    .from('residentes')
    .select('*')
    .eq('privada', privada)
    .eq('casa', casa)
    .single();

  if (!user) {
    alert("Error de sesión");
    return;
  }

  const codigo = crypto.randomUUID();

  await client.from('visitas_qr').insert([{
    residente_id: user.id,
    nombre_visitante: visitante,
    fecha_visita: fecha,
    hora_inicio: hora_inicio,
    hora_fin: hora_fin,
    codigo_qr: codigo,
    privada: user.privada,
    casa: user.casa,
    estatus: 'activo'
  }]);

  const link = `${window.location.origin}/mostrar_qr.html?qr=${codigo}`;

  const qrContainer = document.getElementById("qrcode");
  qrContainer.innerHTML = `
    <div class="qr-wrapper">
      <img src="/icono-512.png" class="qr-logo">
      <div id="qrCanvas"></div>
      <div class="qr-title">Villas de la Concepción</div>
    </div>
  `;

  new QRCode(document.getElementById("qrCanvas"), {
    text: link,
    width: 200,
    height: 200
  });

  const mensaje = `🏡 Villas de la Concepción\n\nPresenta este código QR:\n${link}`;
  const whatsappUrl = `https://wa.me/?text=${encodeURIComponent(mensaje)}`;

  const btn = document.getElementById("btnWhatsapp");
  btn.style.display = "block";
  btn.onclick = () => window.open(whatsappUrl, "_blank");
}
</script>

</body>
</html>

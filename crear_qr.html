<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Generar QR - Villas de la Concepción</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- QR -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      padding: 20px;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }
    #qrcode {
      margin-top: 20px;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Generar acceso visitante</h2>

  <label>Tipo</label>
  <select id="tipo">
    <option value="residente">Residente</option>
    <option value="administracion">Administración</option>
  </select>

  <div id="datosCasa">
    <input id="privada" placeholder="Privada (I, II, III, IV)">
    <input id="casa" placeholder="Número de casa">
  </div>

  <input id="clave" placeholder="Clave">

  <hr>

  <input id="visitante" placeholder="Nombre del visitante">
  <input id="fecha" type="date">

  <button onclick="generarQR()">Generar QR</button>

  <div id="resultado"></div>
  <div id="qrcode"></div>
</div>

<script>
const supabaseUrl = 'https://prjxmfhahnzosdwljode.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs';
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

// Mostrar/ocultar campos
document.getElementById('tipo').addEventListener('change', function() {
  const tipo = this.value;
  document.getElementById('datosCasa').style.display =
    tipo === 'residente' ? 'block' : 'none';
});

async function generarQR() {

  const tipo = document.getElementById('tipo').value;
  const privada = document.getElementById('privada').value;
  const casa = document.getElementById('casa').value;
  const clave = document.getElementById('clave').value;

  const visitante = document.getElementById('visitante').value;
  const fecha = document.getElementById('fecha').value;

  // 🔐 VALIDACIÓN USUARIO
  let query = supabase.from('residentes').select('*');

  if (tipo === 'residente') {
    query = query
      .eq('tipo', 'residente')
      .eq('privada', privada)
      .eq('casa', casa)
      .eq('clave', clave);
  } else {
    query = query
      .eq('tipo', 'administracion')
      .eq('clave', clave);
  }

  const { data: user, error } = await query.single();

  if (!user) {
    alert("Datos incorrectos");
    return;
  }

  // 🔳 GENERAR UUID
  const codigo = crypto.randomUUID();

  // 💾 GUARDAR VISITA
  const { error: insertError } = await supabase
    .from('visitas_qr')
    .insert([{
      residente_id: user.id,
      tipo_generador: tipo,
      nombre_visitante: visitante,
      fecha_visita: fecha,
      codigo_qr: codigo,
      privada: user.privada,
      casa: user.casa,
      residente_nombre: user.nombre
    }]);

  if (insertError) {
    console.error(insertError);
    alert("Error al guardar");
    return;
  }

  // 🎯 MOSTRAR QR
  document.getElementById('qrcode').innerHTML = "";

  new QRCode(document.getElementById("qrcode"), {
    text: `https://reporte-luminarias-3lj5.vercel.app/validar.html?qr=${codigo}`,
    width: 200,
    height: 200
  });

  document.getElementById('resultado').innerHTML = `
    <p><b>Visitante:</b> ${visitante}</p>
    <p><b>Fecha:</b> ${fecha}</p>
    <p><b>Generado por:</b> ${user.identificador}</p>
  `;
}
</script>

</body>
</html>

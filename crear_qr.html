<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Acceso de Visitantes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      color: black;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .header {
      background: #1e293b;
      color: white;
      padding: 12px;
      border-radius: 10px;
      text-align: center;
      margin-bottom: 15px;
      font-weight: bold;
    }

    label {
      font-size: 13px;
      font-weight: bold;
      margin-top: 10px;
      display: block;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:active { transform: scale(0.98); }

    .btn-primary { background: #2563eb; color: white; }
    .btn-back { background: #374151; color: white; }
    .btn-wa { background: #25D366; color: white; }

    /* 🔘 BOTÓN FINALIZAR */
    .btn-finalizar {
      background: #111827;
      color: #9ca3af;
      font-size: 13px;
    }

    #qrcode { margin-top: 20px; text-align: center; }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 999;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: white;
      border-radius: 18px;
      padding: 24px;
      width: 90%;
      max-width: 360px;
      text-align: center;
      box-shadow: 0 15px 40px rgba(0,0,0,0.35);
      color: #1f2937;
    }

    .modal-icon { font-size: 40px; margin-bottom: 10px; }
    .modal-title { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
    .modal-text { font-size: 14px; margin-bottom: 15px; }

    .modal-buttons {
      display: flex;
      gap: 10px;
    }

    .btn-gray { background: #6b7280; color: white; }
    .btn-blue { background: #2563eb; color: white; }
    .btn-red { background: #b91c1c; color: white; }

    /* 🟣 EXIT SCREEN */
    #exitScreen {
      position: fixed;
      inset: 0;
      background: #0f172a;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      z-index: 2000;
    }

    .exit-content h1 {
      font-size: 20px;
      margin-bottom: 10px;
    }

    .exit-content p {
      color: #9ca3af;
      font-size: 14px;
    }

  </style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="header">
      Villas de la Concepción<br>
      Acceso de visitantes
    </div>

    <label>Tipo de acceso</label>
    <select id="tipo">
      <option value="residente">Residente</option>
      <option value="administracion">Administración</option>
    </select>

    <div id="datosCasa">
      <label>Privada</label>
      <select id="privada">
        <option value="">Selecciona privada</option>
        <option value="I">Privada I</option>
        <option value="II">Privada II</option>
        <option value="III">Privada III</option>
        <option value="IV">Privada IV</option>
      </select>

      <label>Número de casa</label>
      <input id="casa" type="number">
    </div>

    <label>Clave</label>
    <input id="clave">

    <hr>

    <label>Nombre del visitante</label>
    <input id="visitante">

    <label>Fecha de visita</label>
    <input id="fecha" type="date">

    <label>Hora de inicio</label>
    <input id="hora_inicio" type="time">

    <label>Hora de fin</label>
    <input id="hora_fin" type="time">

    <button class="btn-primary" onclick="generarQR()">
      Generar código QR
    </button>

    <div id="qrcode"></div>

    <button id="btnWhatsapp" class="btn-wa" style="display:none;">
      Enviar por WhatsApp
    </button>

    <button class="btn-finalizar" onclick="mostrarSalida()">
      Finalizar
    </button>

    <a href="index.html">
      <button class="btn-back">Volver</button>
    </a>

  </div>
</div>

<!-- EXIT -->
<div id="exitScreen">
  <div class="exit-content">
    <h1>Gracias por utilizar el Sistema de Información de Colonos</h1>
    <p>Villas de la Concepción</p>
  </div>
</div>

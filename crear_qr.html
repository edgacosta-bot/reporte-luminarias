<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Acceso de Visitantes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      color: black;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .header {
      background: #1e293b;
      color: white;
      padding: 12px;
      border-radius: 10px;
      text-align: center;
      margin-bottom: 15px;
      font-weight: bold;
    }

    label {
      font-size: 13px;
      font-weight: bold;
      margin-top: 10px;
      display: block;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-primary { background: #2563eb; color: white; }
    .btn-back { background: #374151; color: white; }
    .btn-wa { background: #25D366; color: white; }

    #qrcode { margin-top: 20px; text-align: center; }

    .info-user {
      font-size: 13px;
      margin-bottom: 10px;
      color: #374151;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="header">
      Villas de la Concepción<br>
      Acceso de visitantes
    </div>

    <!-- 👤 INFO USUARIO -->
    <div id="infoUsuario" class="info-user"></div>

    <label>Nombre del visitante</label>
    <input id="visitante" placeholder="Ej. Juan Pérez">

    <label>Fecha de visita</label>
    <input id="fecha" type="date">

    <label>Hora de inicio</label>
    <input id="hora_inicio" type="time">

    <label>Hora de fin</label>
    <input id="hora_fin" type="time">

    <button class="btn-primary" onclick="generarQR()">
      Generar código QR
    </button>

    <div id="qrcode"></div>

    <button id="btnWhatsapp" class="btn-wa" style="display:none;">
      Enviar por WhatsApp
    </button>

    <a href="index.html">
      <button class="btn-back">Volver</button>
    </a>

  </div>
</div>

<script>
const client = window.supabase.createClient(
  'https://prjxmfhahnzosdwljode.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs'
);

// 🔐 VALIDAR SESIÓN
const privada = localStorage.getItem("privada");
const casa = localStorage.getItem("casa");

if (!privada || !casa) {
  window.location.href = "login.html";
}

// 👤 MOSTRAR INFO
document.getElementById("infoUsuario").innerText =
  `Privada ${privada} - Casa ${casa}`;

async function generarQR() {

  const visitante = document.getElementById('visitante').value;
  const fecha = document.getElementById('fecha').value;
  const hora_inicio = document.getElementById('hora_inicio').value;
  const hora_fin = document.getElementById('hora_fin').value;

  if (!visitante || !fecha || !hora_inicio || !hora_fin) {
    alert("Completa todos los campos");
    return;
  }

  // 🔎 BUSCAR USUARIO DESDE SESIÓN
  const { data: user } = await client
    .from('residentes')
    .select('*')
    .eq('privada', privada)
    .eq('casa', casa)
    .single();

  if (!user) {
    alert("Error de sesión");
    return;
  }

  const estado = (user.estado_pago || "corriente").toLowerCase().trim();

  if (estado === "moroso") {
    alert("Acceso restringido por adeudo");
    return;
  }

  if (estado === "atraso_1") {
    const continuar = confirm("Tienes atraso. ¿Deseas continuar?");
    if (!continuar) return;
  }

  const codigo = crypto.randomUUID();

  await client.from('visitas_qr').insert([{
    residente_id: user.id,
    tipo_generador: user.tipo,
    nombre_visitante: visitante,
    fecha_visita: fecha,
    hora_inicio: hora_inicio,
    hora_fin: hora_fin,
    codigo_qr: codigo,
    privada: user.privada,
    casa: user.casa,
    residente_nombre: user.nombre,
    estatus: 'activo'
  }]);

  const link = `${window.location.origin}/mostrar_qr.html?qr=${codigo}`;

  const qrContainer = document.getElementById("qrcode");
  qrContainer.innerHTML = "";

  new QRCode(qrContainer, {
    text: link,
    width: 200,
    height: 200
  });

  const mensaje = `🏡 Villas de la Concepción\n\nPresenta este código QR:\n${link}`;
  const whatsappUrl = `https://wa.me/?text=${encodeURIComponent(mensaje)}`;

  const btn = document.getElementById("btnWhatsapp");
  btn.style.display = "block";
  btn.onclick = () => window.open(whatsappUrl, "_blank");
}
</script>

</body>
</html>

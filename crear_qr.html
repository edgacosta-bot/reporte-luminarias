<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Acceso de Visitantes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      color: black;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .header {
      background: #1e293b;
      color: white;
      padding: 12px;
      border-radius: 10px;
      text-align: center;
      margin-bottom: 15px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
    }

    .btn-wa {
      background: #25D366;
      color: white;
    }

    .btn-back {
      background: #374151;
      color: white;
    }

    #resultado {
      margin-top: 15px;
      font-size: 14px;
    }

    .qr-card {
      margin-top: 20px;
      background: #f8fafc;
      border-radius: 14px;
      padding: 15px;
      text-align: center;
      border: 1px solid #e2e8f0;
    }

    .qr-title {
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 10px;
      color: #1e293b;
    }

    .qr-instruction {
      margin-top: 10px;
      font-size: 12px;
      color: #475569;
    }

    #qrcode canvas {
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="header">
      Villas de la Concepción<br>
      Acceso de visitantes
    </div>

    <select id="tipo">
      <option value="residente">Residente</option>
      <option value="administracion">Administración</option>
    </select>

    <div id="datosCasa">
      <input id="privada" placeholder="Privada (I, II, III, IV)">
      <input id="casa" placeholder="Número de casa">
    </div>

    <input id="clave" placeholder="Clave">

    <hr>

    <input id="visitante" placeholder="Nombre del visitante">
    <input id="fecha" type="date">
    <input id="hora_inicio" type="time">
    <input id="hora_fin" type="time">

    <button class="btn-primary" onclick="generarQR()">
      Generar código QR
    </button>

    <div id="resultado"></div>

    <!-- 🔥 TARJETA QR -->
    <div class="qr-card">
      <div class="qr-title">Código de acceso</div>
      <div id="qrcode"></div>
      <div class="qr-instruction">
        Muestre este código en la entrada
      </div>
    </div>

    <button id="btnWhatsapp" class="btn-wa" style="display:none;">
      Enviar por WhatsApp
    </button>

    <a href="index.html">
      <button class="btn-back">Volver</button>
    </a>

  </div>
</div>

<script>
const client = window.supabase.createClient(
  'https://prjxmfhahnzosdwljode.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs'
);

document.getElementById('tipo').addEventListener('change', function() {
  document.getElementById('datosCasa').style.display =
    this.value === 'residente' ? 'block' : 'none';
});

async function generarQR() {

  const tipo = document.getElementById('tipo').value;
  const privada = document.getElementById('privada').value;
  const casa = document.getElementById('casa').value;
  const clave = document.getElementById('clave').value;
  const visitante = document.getElementById('visitante').value;
  const fecha = document.getElementById('fecha').value;
  const hora_inicio = document.getElementById('hora_inicio').value;
  const hora_fin = document.getElementById('hora_fin').value;

  let query = client.from('residentes').select('*');

  if (tipo === 'residente') {
    query = query.eq('privada', privada).eq('casa', casa).eq('clave', clave);
  } else {
    query = query.eq('tipo', 'administracion').eq('clave', clave);
  }

  const { data: user } = await query.single();

  if (!user) {
    alert("Datos incorrectos");
    return;
  }

  const codigo = crypto.randomUUID();

  await client.from('visitas_qr').insert([{
    residente_id: user.id,
    tipo_generador: tipo,
    nombre_visitante: visitante,
    fecha_visita: fecha,
    hora_inicio: hora_inicio,
    hora_fin: hora_fin,
    codigo_qr: codigo,
    privada: user.privada,
    casa: user.casa,
    residente_nombre: user.nombre,
    estatus: 'activo'
  }]);

  const link = `${window.location.origin}/mostrar_qr.html?qr=${codigo}`;

  const qrContainer = document.getElementById("qrcode");
  qrContainer.innerHTML = "";

  new QRCode(qrContainer, {
    text: link,
    width: 200,
    height: 200
  });

  document.getElementById('resultado').innerHTML = `
    <b>Visitante:</b> ${visitante}<br>
    <b>Fecha:</b> ${fecha}<br>
    <b>Generado por:</b> ${user.identificador}
  `;

  const mensaje = `Acceso autorizado:\n${link}`;
  const whatsappUrl = `https://wa.me/?text=${encodeURIComponent(mensaje)}`;

  const btn = document.getElementById("btnWhatsapp");
  btn.style.display = "block";
  btn.onclick = () => window.open(whatsappUrl, "_blank");
}
</script>

</body>
</html>

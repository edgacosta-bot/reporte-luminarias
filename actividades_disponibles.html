<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Actividades Disponibles</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="auth.js"></script>

<script src="utils/residente.js"></script>  

<script src="utils/dates.js"></script>

<script src="modal.js"></script>  

    <link rel="stylesheet" href="styles/actividades_disponibles.css">
</head>

<body>

<div class="container">

<h1>
💃 Actividades Disponibles
</h1>

  
<div id="lista">
</div>

</div>

<script>

let residenteId = null;

let actividades = [];

function renderizar(){

  const lista =
    document.getElementById(
      "lista"
    );

  if(
    actividades.length === 0
  ){

    lista.innerHTML = `
      <div class="card">
        No existen actividades disponibles.
      </div>
    `;

    return;

  }

  let html = "";

  actividades.forEach(a => {

    html += `

      <div class="card">

        <div
          style="
            font-size:20px;
            font-weight:bold;
            color:#93c5fd;
            margin-bottom:12px;
          "
        >

          💃 ${a.actividad}

        </div>

        <div>

          📍 ${a.amenidad}

        </div>

        <div>

          Tipo:
          ${a.tipo}

        </div>

        <div>

          Inicio:
          ${a.fecha_inicio}

        </div>

        <div>

          Fin:
          ${a.fecha_fin}

        </div>

        <div>

          👥 Cupo:

          ${a.inscritos}
          /
          ${a.capacidad}

        </div>

        <div>

         Invitados:

          ${
            a.permite_invitados
            ? 'Sí'
            : 'No'
          }

        </div>

        ${
          a.ya_inscrito
          ? `

              <div
                style="
                  margin-top:12px;
                  color:#4ade80;
                  font-weight:bold;
                "
              >

                ✅ Ya inscrito

              </div>

            `
          : `

              <button
                style="
                  margin-top:12px;
                "
                onclick="
                  inscribirme(
                    '${a.actividad_id}'
                  )
                "
              >

                Inscribirme

              </button>

            `
        }

      </div>

    `;

  });

  lista.innerHTML = html;

}
  
async function cargarResidente(){

  const residente =
    await getResidente();

  if(!residente){

    alert(
      "Error de sesión"
    );

    return false;

  }

  residenteId =
    residente.id;

  return true;

}

async function inscribirme(
  actividadId
){

  const confirmar =
    await mostrarConfirmacion({

      titulo:
        "Inscripción",

      mensaje:
        "¿Desea inscribirse a esta actividad?"

    });

  if(!confirmar){
    return;
  }

  const { data, error } =
    await supabaseClient.rpc(
      "inscribirse_actividad",
      {
        p_actividad_id:
          actividadId,

        p_residente_id:
          residenteId
      }
    );

  if(error){

    await mostrarAlerta({

      titulo: "Error",

      mensaje:
        error.message

    });

    return;

  }

  await mostrarAlerta({

    titulo: "SIGVIC",

    mensaje:
      data.mensaje

  });

  await cargar();

}
  
async function cargar(){

  const { data, error } =
    await supabaseClient.rpc(
      "obtener_actividades_disponibles",
      {
        p_residente_id:
          residenteId
      }
    );

  if(error){

    console.error(error);

    return;

  }

  actividades =
    data || [];

  renderizar();

}
  
   
window.addEventListener(
  "DOMContentLoaded",
  async ()=>{

    await protegerPagina([
      "residente"
    ]);

    const ok =
      await cargarResidente();

    if(!ok){
      return;
    }

    await cargar();

  }
);

</script>

</body>
</html>

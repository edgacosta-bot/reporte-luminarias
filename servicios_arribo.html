<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Servicios por arribar</title>

<!-- 🔥 ORDEN CORRECTO -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="utils/residente.js"></script>

<script>
protegerPagina(["residente"]);
</script>

    <link rel="stylesheet" href="styles/servicios_arribo.css">
</head>

<body>

<div class="card">

  <!-- 🔥 LOGO -->
  <div style="text-align:center; margin-bottom:15px;">
    <img src="icono-512.png" alt="Logo"
         style="width:90px; height:auto; border-radius:20px;">
  </div>

  <h2>🚚 Servicio por arribar</h2>

  <label>Nombre del servicio</label>
  <input id="servicio" placeholder="Ej: Uber Eats, Gas Hidalgo, Reparaciones Monroy">

  <label>Tipo</label>
  <select id="tipo">
    <option value="">Seleccionar</option>
    <option value="comida">Comida</option>
    <option value="suministros">Suministros</option>
    <option value="mantenimiento">Mantenimiento</option>
    <option value="otro">Otro</option>
  </select>

  <label>Seleccione el tiempo estimado en que arribará el servicio</label>
  
  <select id="vigencia">
  <option value="30">30 min</option>
  <option value="60" selected>1 hora</option>
  <option value="120">2 horas</option>
  <option value="180">3 horas</option>
  <option value="240">4 horas</option>
</select>

  <button onclick="registrar()">Registrar servicio</button>

</div>

<!-- 🔥 MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <div id="modalText" class="modal-text"></div>
    <button id="modalBtn" class="modal-btn">Aceptar</button>
  </div>
</div>

<script>

let residenteGlobal = null;

// 🔽 CARGAR RESIDENTE (HOMOLOGADO)
async function cargarResidente() {

  const residente = await getResidente();

  if (!residente) {
    mostrarModal("Error de sesión", "error");
    return;
  }

  residenteGlobal = residente;
}

// 🔥 MODAL
function mostrarModal(texto, tipo, callback) {

  const modal = document.getElementById("modal");
  const text = document.getElementById("modalText");
  const btn = document.getElementById("modalBtn");

  text.innerText = texto;
  btn.className = "modal-btn " + tipo;

  modal.style.display = "flex";

  btn.onclick = () => {
    modal.style.display = "none";
    if (callback) callback();
  };
}

// 🚀 REGISTRO
async function registrar() {

  const servicio = document.getElementById("servicio").value.trim();
  const tipo = document.getElementById("tipo").value;
  const vigencia = parseInt(document.getElementById("vigencia").value);

  if (!servicio) {
    mostrarModal("Ingresa el nombre del servicio", "warn");
    return;
  }

  const residente = residenteGlobal;

  if (!residente) {
    mostrarModal("Error obteniendo datos", "error");
    return;
  }

  // 🔴 BLOQUEO
  if (residente.estado_pago === "moroso") {
    mostrarModal(
      "No es posible registrar el servicio. Presenta adeudo en sus cuotas.",
      "error"
    );
    return;
  }

  // 🟡 ADVERTENCIA
  if (residente.estado_pago === "atraso_1") {
    mostrarModal(
      "Puede registrar el servicio en esta ocasión, sin embargo presenta retraso en sus cuotas.",
      "warn",
      () => insertarServicio()
    );
    return;
  }

  insertarServicio();
}

// 💾 INSERT
async function insertarServicio() {

  const servicio = document.getElementById("servicio").value.trim();
  const tipo = document.getElementById("tipo").value;
  const vigencia = parseInt(document.getElementById("vigencia").value);

  const residente = residenteGlobal;
  if (!residente) return;

  const ahora = new Date();
  const expira = new Date(ahora.getTime() + (vigencia * 60000));

  const { error } = await supabaseClient
    .from("servicios_arribo")
    .insert([{
      residente_id: residente.id,
      nombre_servicio: servicio,
      tipo: tipo || null,
      privada: residente.privada,
      casa: residente.casa,
      vigencia_minutos: vigencia,
      expira_en: expira.toISOString(),
      estado: "pendiente"
    }]);

  if (error) {
    console.error(error);
    mostrarModal("Error al registrar servicio", "error");
    return;
  }

  mostrarModal("Servicio registrado correctamente", "success", () => {
    window.location.href = "index.html";
  });
}

// INIT
(async () => {
  await cargarResidente();
})();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Servicios por arribar</title>

<!-- 🔥 ORDEN CORRECTO -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="utils/residente.js"></script>

<script>
protegerPagina(["residente"]);
</script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: #e5e7eb;
  padding: 25px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
}

h2 {
  text-align: center;
}

label {
  font-weight: bold;
  margin-top: 10px;
  display: block;
}

input, select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 5px;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  border: none;
  border-radius: 12px;
  background: #2563eb;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* 🔥 MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.modal-content {
  background: #ffffff;
  padding: 22px;
  border-radius: 16px;
  width: 85%;
  max-width: 320px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

.modal-text {
  margin-bottom: 20px;
  color: #111827;
  font-size: 15px;
  line-height: 1.4;
}

.modal-btn {
  padding: 12px;
  border: none;
  border-radius: 10px;
  width: 100%;
  font-weight: bold;
  cursor: pointer;
  color: white;
}

.warn { background: #a57f2c; }
.error { background: #9b2247; }
.success { background: #1e5b4f; }

</style>
</head>

<body>

<div class="card">

  <!-- 🔥 LOGO -->
  <div style="text-align:center; margin-bottom:15px;">
    <img src="icono-512.png" alt="Logo"
         style="width:90px; height:auto; border-radius:20px;">
  </div>

  <h2>🚚 Servicio por arribar</h2>

  <label>Nombre del servicio</label>
  <input id="servicio" placeholder="Ej: Uber Eats, Gas Hidalgo">

  <label>Tipo</label>
  <select id="tipo">
    <option value="">Seleccionar</option>
    <option value="comida">Comida</option>
    <option value="suministros">Suministros</option>
    <option value="mantenimiento">Mantenimiento</option>
    <option value="otro">Otro</option>
  </select>

  <label>Tiempo</label>
  <select id="vigencia">
    <option value="30">30 min</option>
    <option value="60" selected>1 hora</option>
    <option value="120">2 horas</option>
  </select>

  <button onclick="registrar()">Registrar servicio</button>

</div>

<!-- 🔥 MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <div id="modalText" class="modal-text"></div>
    <button id="modalBtn" class="modal-btn">Aceptar</button>
  </div>
</div>

<script>

let residenteGlobal = null;

// 🔽 CARGAR RESIDENTE (HOMOLOGADO)
async function cargarResidente() {

  const residente = await getResidente();

  if (!residente) {
    mostrarModal("Error de sesión", "error");
    return;
  }

  residenteGlobal = residente;
}

// 🔥 MODAL
function mostrarModal(texto, tipo, callback) {

  const modal = document.getElementById("modal");
  const text = document.getElementById("modalText");
  const btn = document.getElementById("modalBtn");

  text.innerText = texto;
  btn.className = "modal-btn " + tipo;

  modal.style.display = "flex";

  btn.onclick = () => {
    modal.style.display = "none";
    if (callback) callback();
  };
}

// 🚀 REGISTRO
async function registrar() {

  const servicio = document.getElementById("servicio").value.trim();
  const tipo = document.getElementById("tipo").value;
  const vigencia = parseInt(document.getElementById("vigencia").value);

  if (!servicio) {
    mostrarModal("Ingresa el nombre del servicio", "warn");
    return;
  }

  const residente = residenteGlobal;

  if (!residente) {
    mostrarModal("Error obteniendo datos", "error");
    return;
  }

  // 🔴 BLOQUEO
  if (residente.estado_pago === "moroso") {
    mostrarModal(
      "No es posible registrar el servicio. Presenta adeudo en sus cuotas.",
      "error"
    );
    return;
  }

  // 🟡 ADVERTENCIA
  if (residente.estado_pago === "atraso_1") {
    mostrarModal(
      "Puede registrar el servicio en esta ocasión, sin embargo presenta retraso en sus cuotas.",
      "warn",
      () => insertarServicio()
    );
    return;
  }

  insertarServicio();
}

// 💾 INSERT
async function insertarServicio() {

  const servicio = document.getElementById("servicio").value.trim();
  const tipo = document.getElementById("tipo").value;
  const vigencia = parseInt(document.getElementById("vigencia").value);

  const residente = residenteGlobal;
  if (!residente) return;

  const ahora = new Date();
  const expira = new Date(ahora.getTime() + (vigencia * 60000));

  const { error } = await supabaseClient
    .from("servicios_arribo")
    .insert([{
      residente_id: residente.id,
      nombre_servicio: servicio,
      tipo: tipo || null,
      privada: residente.privada,
      casa: residente.casa,
      vigencia_minutos: vigencia,
      expira_en: expira.toISOString(),
      estado: "pendiente"
    }]);

  if (error) {
    console.error(error);
    mostrarModal("Error al registrar servicio", "error");
    return;
  }

  mostrarModal("Servicio registrado correctamente", "success", () => {
    window.location.href = "index.html";
  });
}

// INIT
(async () => {
  await cargarResidente();
})();

</script>

</body>
</html>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: #e5e7eb;
  padding: 25px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
}

h2 {
  text-align: center;
}

label {
  font-weight: bold;
  margin-top: 10px;
  display: block;
}

input, select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 5px;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  border: none;
  border-radius: 12px;
  background: #2563eb;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* 🔥 MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.modal-content {
  background: #ffffff; /* 🔥 CAMBIO CLAVE */
  padding: 22px;
  border-radius: 16px;
  width: 85%;
  max-width: 320px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

.modal-text {
  margin-bottom: 20px;
  color: #111827; /* 🔥 TEXTO OSCURO SOBRE FONDO CLARO */
  font-size: 15px;
  line-height: 1.4;
}

.modal-btn {
  padding: 12px;
  border: none;
  border-radius: 10px;
  width: 100%;
  font-weight: bold;
  cursor: pointer;
  color: white;
}

/* 🎨 COLORES BONITOS */
.warn { background: #a57f2c; }
.error { background: #9b2247; }
.success { background: #1e5b4f; }

</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

</select>

<label>Tiempo</label>

<button onclick="registrar()">Registrar servicio</button>

</div>

function mostrarModal(texto, tipo, callback) {

  const modal = document.getElementById("modal");
  const text = document.getElementById("modalText");
  const btn = document.getElementById("modalBtn");

  text.innerText = texto;

  btn.className = "modal-btn " + tipo;

  modal.style.display = "flex";

  btn.onclick = () => {
    modal.style.display = "none";
    if (callback) callback();
  };
}

async function registrar() {

  const servicio = document.getElementById("servicio").value.trim();
  const tipo = document.getElementById("tipo").value;
  const vigencia = parseInt(document.getElementById("vigencia").value);

  if (!servicio) {
    mostrarModal("Ingresa el nombre del servicio", "warn");
    return;
  }

  const identificador = localStorage.getItem("identificador");

  const { data: residente } = await client
    .from("residentes")
    .select("*")
    .eq("identificador", identificador)
    .single();

  if (!residente) {
    mostrarModal("Error obteniendo datos", "error");
    return;
  }

  // 🔴 MOROSO (bloquea)
  if (residente.estado_pago === "moroso") {
    mostrarModal(
      "No es posible registrar el servicio. Presenta adeudo en sus cuotas.",
      "error"
    );
    return;
  }

  // 🟡 ATRASO (advierte y permite)
  if (residente.estado_pago === "atraso_1") {
    mostrarModal(
      "Puede registrar el servicio en esta ocasión, sin embargo presenta retraso en sus cuotas, por lo que se sugiere regularizar sus pagos",
      "warn",
      () => insertarServicio()
    );
    return;
  }

  insertarServicio();
}

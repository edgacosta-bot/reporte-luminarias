<!DOCTYPE html>
<html lang="es">
<head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aprobación de obras</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.container {
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 12px;
}

button {
  margin-top: 10px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #22c55e;
  color: white;
  cursor: pointer;
  width: 100%;
}

button:disabled {
  background: #64748b;
}

#noComite {
  display: none;
  text-align: center;
  margin-top: 40px;
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
}

#noComite button {
  margin-top: 15px;
  background: #2563eb;
}

/* 🔥 MODAL */
#modalConfirmar {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  align-items: center;
  justify-content: center;
}

.modal-box {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  width: 90%;
  max-width: 320px;
  text-align: center;
}

.modal-box button {
  margin-top: 10px;
}
</style>

</head>

<body>

<div class="container">

<h2>Obras pendientes de aprobación</h2>

<!-- 🔴 ACCESO RESTRINGIDO -->
<div id="noComite">
  <h3>Acceso restringido</h3>
  <p>Esta sección es exclusiva del comité de diseño</p>
  <button onclick="window.location.href='index.html'">
    Regresar
  </button>
</div>

<!-- 🔥 LISTA -->
<div id="lista"></div>

</div>

<!-- 🔥 MODAL -->
<div id="modalConfirmar">
  <div class="modal-box">
    <h3>Confirmar acción</h3>
    <p id="textoModal">¿Aprobar esta obra?</p>

    <button id="btnConfirmar">Aprobar</button>
    <button onclick="cerrarModal()" style="background:#64748b;">Cancelar</button>
  </div>
</div>

<script>

let esResponsable = false;
let usuarioNombre = "";
let obraSeleccionada = null;

// 🔐 INICIO
window.addEventListener("DOMContentLoaded", async () => {

  await protegerPagina(["admin", "administracion", "residente"]);

  const esValido = await validarComite();
  if (!esValido) return;

  await cargarObras();
});

// 🔎 VALIDAR COMITÉ
async function validarComite() {

  const { data: userData } = await supabaseClient.auth.getUser();
  const user = userData?.user;

  if (!user) {
    window.location.href = "login.html";
    return false;
  }

  const { data: comite } = await supabaseClient
    .from("comite_diseno")
    .select("*")
    .eq("user_id", user.id)
    .eq("activo", true)
    .maybeSingle();

  if (!comite) {
    document.getElementById("lista").style.display = "none";
    document.getElementById("noComite").style.display = "block";
    return false;
  }

  usuarioNombre = comite.nombre;
  esResponsable = comite.rol === "responsable";

  return true;
}

// 🔥 CARGAR OBRAS
async function cargarObras() {

  const { data, error } = await supabaseClient
    .from("obras")
    .select("*")
    .eq("aprobada", false)
    .eq("estatus", "activa");

  const contenedor = document.getElementById("lista");
  contenedor.innerHTML = "";

  if (error) {
    contenedor.innerHTML = "<p>Error cargando obras</p>";
    console.log(error);
    return;
  }

  if (!data || data.length === 0) {
    contenedor.innerHTML = "<p>No hay obras pendientes</p>";
    return;
  }

  data.forEach(o => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>Privada ${o.privada} - Lote ${o.casa}</b><br>
      DRO: ${o.dro_nombre}<br>
      Fecha inicio: ${o.fecha_inicio || "N/A"}
    `;

    const btn = document.createElement("button");
    btn.innerText = "Aprobar obra";

    if (!esResponsable) {
      btn.disabled = true;
      btn.innerText = "Solo responsable puede aprobar";
    }

    btn.onclick = () => abrirModal(o);

    div.appendChild(btn);
    contenedor.appendChild(div);
  });
}

// 🔥 MODAL
function abrirModal(obra) {
  obraSeleccionada = obra;

  document.getElementById("textoModal").innerHTML = `
    ¿Aprobar obra?<br><br>
    <b>Privada ${obra.privada} - Lote ${obra.casa}</b><br>
    ${obra.dro_nombre}
  `;

  document.getElementById("modalConfirmar").style.display = "flex";
}

function cerrarModal() {
  obraSeleccionada = null;
  document.getElementById("modalConfirmar").style.display = "none";
}

// ✅ CONFIRMAR
document.getElementById("btnConfirmar").onclick = async () => {

  if (!obraSeleccionada) return;

  const { error } = await supabaseClient
    .from("obras")
    .update({
      aprobada: true,
      fecha_autorizacion: new Date().toISOString(),
      responsable_autorizacion: usuarioNombre
    })
    .eq("id", obraSeleccionada.id);

  if (error) {
    alert("Error al aprobar");
    console.log(error);
    return;
  }

  cerrarModal();

  alert("Obra aprobada correctamente");

  cargarObras();
};

</script>

</body>
</html>

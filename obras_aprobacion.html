<!DOCTYPE html>

<html lang="es">
<head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="auth.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de obras</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.container {
  padding: 20px;
  text-align: center;
}

.logo {
  width: 120px;
  margin: 10px auto 20px;
  display: block;
}

h2 {
  margin-bottom: 10px;
}

.seccion {
  margin-top: 25px;
  text-align: left;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 12px;
}

button {
  margin-top: 8px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  color: white;
  cursor: pointer;
  width: 100%;
}

.btn-aprobar { background: #22c55e; }
.btn-rechazar { background: #ef4444; }
.btn-cancelar { background: #64748b; }

#noAcceso {
  display: none;
  text-align: center;
  margin-top: 40px;
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  align-items: center;
  justify-content: center;
}

.modal-box {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  width: 90%;
  max-width: 320px;
  text-align: center;
}

textarea {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

#toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #22c55e;
  padding: 12px 20px;
  border-radius: 8px;
  display: none;
}
</style>

</head>

<body>

<div class="container">

<img src="/icono-512.png" class="logo">

<h2>Gestión de Obras</h2>

<div id="noAcceso">
  <h3>Acceso restringido</h3>
  <p>Solo administración o comité de diseño</p>
</div>

<div id="contenido" style="display:none;">

  <div class="seccion">
    <h3>🟡 Pendientes de aprobar por el comité</h3>
    <div id="pendientes"></div>
  </div>

  <div class="seccion">
    <h3>🟢 Aprobadas</h3>
    <div id="aprobadas"></div>
  </div>

  <div class="seccion">
  <h3>🟠 Suspendidas</h3>
  <div id="suspendidas"></div>
</div>
  
  <div class="seccion">
    <h3>🔴 Rechazadas</h3>
    <div id="rechazadas"></div>
  </div>

</div>

</div>

<!-- MODAL -->

<div id="modal" class="modal">
  <div class="modal-box">
    <h3 id="tituloModal"></h3>
    <p id="detalleModal"></p>


 <textarea
  id="motivo"
  placeholder="Motivo del rechazo..."
  style="display:none;">
</textarea>

<select
  id="motivoSuspension"
  style="
    display:none;
    width:100%;
    margin-top:10px;
    padding:10px;
    border-radius:8px;
  ">

  <option value="">
    Selecciona motivo de suspensión
  </option>

  <option value="Incumplimiento de pagos">
    Incumplimiento de pagos
  </option>

  <option value="Modificaciones del proyecto sin autorización">
    Modificaciones del proyecto sin autorización
  </option>

  <option value="Problemas con licencia municipal">
    Problemas con licencia municipal
  </option>

  <option value="Conducta inapropiada del personal de obra">
  Conducta inapropiada del personal de obra
  </option>

</select>
  
  
<button id="btnAccion"></button>
<button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>

  </div>
</div>

<div id="toast"></div>

<script>

let esResponsable = false;
let usuarioNombre = "";
let usuarioTipo = "";  
let obraSeleccionada = null;
let accion = null;
let obraSuspender = null;  

window.addEventListener("DOMContentLoaded", async () => {

  await protegerPagina(["admin","administracion","residente"]);

  const acceso = await validarAcceso();
  if (!acceso) return;

  document.getElementById("contenido").style.display = "block";

  await cargarObras();
});

async function validarAcceso(){

  const { data: userData } = await supabaseClient.auth.getUser();
  const user = userData?.user;

  const { data: residente } = await supabaseClient
    .from("residentes")
    .select("tipo")
    .eq("user_id", user.id)
    .maybeSingle();

  if (residente && ["admin","administracion"].includes((residente.tipo || "").toLowerCase())) {
    usuarioTipo = (residente.tipo || "").toLowerCase();
    esResponsable = false;
    usuarioNombre = "Administración";
    return true;
  }

  const { data } = await supabaseClient
    .from("comite_diseno")
    .select("*")
    .eq("user_id", user.id)
    .eq("activo", true);

  if (!data || data.length === 0) {
    document.getElementById("noAcceso").style.display = "block";
    return false;
  }

  const comite = data[0];
  usuarioNombre = comite.nombre;
  usuarioTipo = "comite";
  esResponsable = comite.rol === "responsable";

  return true;
}

function formatearFecha(fecha){
  if(!fecha) return "";
  return fecha.split("T")[0];
}

async function cargarObras(){

  const { data } = await supabaseClient
    .from("obras")
    .select("*")
    .order("created_at", { ascending: false });

  const pendientes = data.filter(o => o.estatus === "pendiente");
  const aprobadas = data.filter(o => o.estatus === "aprobada");
  const suspendidas = data.filter(o => o.estatus === "suspendida");
  const rechazadas = data.filter(o => o.estatus === "rechazada");

  pintar("pendientes", pendientes, true);
  pintar("aprobadas", aprobadas, false);
  pintar("suspendidas", suspendidas, false);
  pintar("rechazadas", rechazadas, false);
}

function pintar(id, lista, permitirAccion){

  const contenedor = document.getElementById(id);
  contenedor.innerHTML = "";

  lista.forEach(o => {

    const div = document.createElement("div");
    div.className = "card";

    let extra = "";

    if (o.estatus === "rechazada") {
      extra = `
        <br><b>Motivo:</b> ${o.motivo_rechazo || "N/A"}
        <br><b>Fecha:</b> ${formatearFecha(o.fecha_autorizacion)}
        <br><b>Dictaminó:</b> ${o.responsable_autorizacion || ""}
      `;
    }

    if (o.estatus === "aprobada") {
      extra = `
        <br><b>Fecha aprobación:</b> ${formatearFecha(o.fecha_autorizacion)}
        <br><b>Responsable aprobación:</b> ${o.responsable_autorizacion || ""}
      `;
    }

    if (o.estatus === "suspendida") {

  extra = `
    <br><b>Motivo suspensión:</b> ${o.motivo_suspension || "N/A"}
    <br><b>Fecha suspensión:</b> ${formatearFecha(o.fecha_suspension)}
    <br><b>Responsable:</b> ${o.responsable_suspension || ""}
  `;
}

    div.innerHTML = `
      <b>Privada ${o.privada} - Lote ${o.casa}</b><br>
      ${o.dro_nombre}<br>
      ${o.fecha_inicio || ""}
      ${extra}
    `;

    if (
  !permitirAccion &&
  (esResponsable || usuarioTipo === "administracion") &&
  o.estatus === "aprobada"
) {

  div.innerHTML += `
    <button class="btn-rechazar"
      onclick="suspenderObra('${o.id}')">
      ⏸ Suspender obra
    </button>
  `;
}

    if (
  !permitirAccion &&
  (esResponsable || usuarioTipo === "administracion") &&
  o.estatus === "suspendida"
) {

  div.innerHTML += `
    <button class="btn-aprobar"
      onclick="reactivarObra('${o.id}')">
      ▶ Reactivar obra
    </button>
  `;
}
    
    if (permitirAccion && esResponsable) {
      div.innerHTML += `
        <button class="btn-aprobar" onclick="abrirModal('aprobar', ${JSON.stringify(o).replace(/"/g, '&quot;')})">Aprobar</button>
        <button class="btn-rechazar" onclick="abrirModal('rechazar', ${JSON.stringify(o).replace(/"/g, '&quot;')})">Rechazar</button>
      `;
    }

    contenedor.appendChild(div);
  });
}

function suspenderObra(id){

  obraSuspender = id;

  document.getElementById("tituloModal").innerText =
    "Suspender obra";

  document.getElementById("detalleModal").innerHTML =
    "Selecciona el motivo de suspensión";

  document.getElementById("motivo").style.display = "none";

  document.getElementById("motivoSuspension").style.display =
    "block";

  document.getElementById("btnAccion").innerText =
    "Confirmar suspensión";

  document.getElementById("btnAccion").className =
    "btn-rechazar";

  accion = "suspender";

  document.getElementById("modal").style.display =
    "flex";
}
  
async function reactivarObra(id) {

  const hoy = new Date().toISOString();

  const { error } = await supabaseClient
    .from("obras")
    .update({
      estatus: "aprobada",
      fecha_reactivacion: hoy
    })
    .eq("id", id);

  if (error) {
    mostrarToast("Error al reactivar", true);
    console.log(error);
    return;
  }

  mostrarToast("Obra reactivada");
  cargarObras();
}
  
  function abrirModal(tipo, obra){

  obraSeleccionada = obra;
  accion = tipo;

  const titulo = document.getElementById("tituloModal");
  const detalle = document.getElementById("detalleModal");
  const btn = document.getElementById("btnAccion");
  const motivo = document.getElementById("motivo");

  detalle.innerHTML = `
    Privada ${obra.privada} - Lote ${obra.casa}<br>
    ${obra.dro_nombre}
  `;

  if (tipo === "aprobar") {
    titulo.innerText = "Aprobar obra";
    btn.innerText = "Confirmar aprobación";
    btn.className = "btn-aprobar";
    motivo.style.display = "none";
  } else {
    titulo.innerText = "Rechazar obra";
    btn.innerText = "Confirmar rechazo";
    btn.className = "btn-rechazar";
    motivo.style.display = "block";
  }

  document.getElementById("modal").style.display = "flex";
}

function cerrarModal(){
  obraSeleccionada = null;
  document.getElementById("modal").style.display = "none";
  document.getElementById("motivo").value = "";

    obraSuspender = null;

  document.getElementById(
    "motivoSuspension"
  ).value = "";

  document.getElementById(
    "motivoSuspension"
  ).style.display = "none";
}

document.getElementById("btnAccion").onclick = async () => {

  if (
  !obraSeleccionada &&
  !obraSuspender
) return;

  const hoy = new Date().toISOString().split("T")[0];

  let updateData = {
    responsable_autorizacion: usuarioNombre
  };

  if (accion === "aprobar") {
    updateData.aprobada = true;
    updateData.estatus = "aprobada";
    updateData.fecha_autorizacion = hoy;
  } 

    else if (accion === "suspender") {

  const motivo = document
    .getElementById("motivoSuspension")
    .value;

  if (!motivo) {

    mostrarToast(
      "Selecciona motivo suspensión",
      true
    );

    return;
  }

  updateData.estatus = "suspendida";

  updateData.motivo_suspension = motivo;

  updateData.fecha_suspension = hoy;

  updateData.responsable_suspension =
    usuarioNombre;
}
  else {

    const motivo = document.getElementById("motivo").value.trim();

    if (!motivo) {
      mostrarToast("Debes escribir un motivo", true);
      return;
    }

    updateData.estatus = "rechazada";
    updateData.motivo_rechazo = motivo;
    updateData.fecha_autorizacion = hoy;
  }

  const { error } = await supabaseClient
    .from("obras")
    .update(updateData)
    .eq(
  "id",
  accion === "suspender"
    ? obraSuspender
    : obraSeleccionada.id
);

  if (error){
    mostrarToast("Error en la operación", true);
    return;
  }

  cerrarModal();
  mostrarToast("Operación realizada correctamente");
  cargarObras();
};

function mostrarToast(msg, error=false){
  const toast = document.getElementById("toast");
  toast.innerText = msg;
  toast.style.background = error ? "#ef4444" : "#22c55e";
  toast.style.display = "block";

  setTimeout(() => {
    toast.style.display = "none";
  }, 2500);
}

</script>

</body>
</html>

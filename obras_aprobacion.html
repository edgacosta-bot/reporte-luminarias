<!DOCTYPE html>

<html lang="es">
<head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="auth.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de obras</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.container {
  padding: 20px;
}

h2 {
  margin-bottom: 10px;
}

.seccion {
  margin-top: 25px;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 12px;
}

button {
  margin-top: 8px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  color: white;
  cursor: pointer;
  width: 100%;
}

.btn-aprobar { background: #22c55e; }
.btn-rechazar { background: #ef4444; }
.btn-cancelar { background: #64748b; }

#noAcceso {
  display: none;
  text-align: center;
  margin-top: 40px;
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  align-items: center;
  justify-content: center;
}

.modal-box {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  width: 90%;
  max-width: 320px;
  text-align: center;
}

textarea {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

#toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #22c55e;
  padding: 12px 20px;
  border-radius: 8px;
  display: none;
}
</style>

</head>

<body>

<div class="container">

<h2>Gestión de Obras</h2>

<div id="noAcceso">
  <h3>Acceso restringido</h3>
  <p>Solo administración o comité de diseño</p>
</div>

<div id="contenido" style="display:none;">

  <div class="seccion">
    <h3>🟡 Pendientes</h3>
    <div id="pendientes"></div>
  </div>

  <div class="seccion">
    <h3>🟢 Aprobadas</h3>
    <div id="aprobadas"></div>
  </div>

  <div class="seccion">
    <h3>🔴 Rechazadas</h3>
    <div id="rechazadas"></div>
  </div>

</div>

</div>

<!-- MODAL -->

<div id="modal" class="modal">
  <div class="modal-box">
    <h3 id="tituloModal"></h3>
    <p id="detalleModal"></p>

```
<textarea id="motivo" placeholder="Motivo del rechazo..." style="display:none;"></textarea>

<button id="btnAccion"></button>
<button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
```

  </div>
</div>

<div id="toast"></div>

<script>

let esResponsable = false;
let usuarioNombre = "";
let obraSeleccionada = null;
let accion = null;

window.addEventListener("DOMContentLoaded", async () => {

  await protegerPagina(["admin","administracion","residente"]);

  const acceso = await validarAcceso();
  if (!acceso) return;

  document.getElementById("contenido").style.display = "block";

  await cargarObras();
});

async function validarAcceso(){

  const { data: userData } = await supabaseClient.auth.getUser();
  const user = userData?.user;

  // ADMIN (solo visualiza)
  const { data: residente } = await supabaseClient
    .from("residentes")
    .select("tipo")
    .eq("user_id", user.id)
    .maybeSingle();

  if (residente && ["admin","administracion"].includes((residente.tipo || "").toLowerCase())) {
    esResponsable = false; // 🔥 CLAVE: admin NO aprueba
    usuarioNombre = "Administración";
    return true;
  }

  // COMITÉ
  const { data } = await supabaseClient
    .from("comite_diseno")
    .select("*")
    .eq("user_id", user.id)
    .eq("activo", true);

  if (!data || data.length === 0) {
    document.getElementById("noAcceso").style.display = "block";
    return false;
  }

  const comite = data[0];
  usuarioNombre = comite.nombre;
  esResponsable = comite.rol === "responsable";

  return true;
}

function formatearFecha(fecha){
  if(!fecha) return "";
  return fecha.split("T")[0]; // 🔥 solo YYYY-MM-DD
}

async function cargarObras(){

  const { data } = await supabaseClient
    .from("obras")
    .select("*")
    .order("created_at", { ascending: false });

  const pendientes = data.filter(o => o.estatus === "pendiente");
  const aprobadas = data.filter(o => o.estatus === "aprobada");
  const rechazadas = data.filter(o => o.estatus === "rechazada");

  pintar("pendientes", pendientes, true);
  pintar("aprobadas", aprobadas, false);
  pintar("rechazadas", rechazadas, false);
}

function pintar(id, lista, permitirAccion){

  const contenedor = document.getElementById(id);
  contenedor.innerHTML = "";

  lista.forEach(o => {

    const div = document.createElement("div");
    div.className = "card";

    let extra = "";

    if (o.estatus === "rechazada") {
      extra = `
        <br><b>Motivo:</b> ${o.motivo_rechazo || "N/A"}
        <br><b>Fecha:</b> ${formatearFecha(o.fecha_autorizacion)}
        <br><b>Responsable:</b> ${o.responsable_autorizacion || ""}
      `;
    }

    if (o.estatus === "aprobada") {
      extra = `
        <br><b>Fecha aprobación:</b> ${formatearFecha(o.fecha_autorizacion)}
        <br><b>Responsable:</b> ${o.responsable_autorizacion || ""}
      `;
    }

    div.innerHTML = `
      <b>Privada ${o.privada} - Lote ${o.casa}</b><br>
      ${o.dro_nombre}<br>
      ${o.fecha_inicio || ""}
      ${extra}
    `;

    if (permitirAccion && esResponsable) {
      div.innerHTML += `
        <button class="btn-aprobar" onclick="abrirModal('aprobar', ${JSON.stringify(o).replace(/"/g, '&quot;')})">Aprobar</button>
        <button class="btn-rechazar" onclick="abrirModal('rechazar', ${JSON.stringify(o).replace(/"/g, '&quot;')})">Rechazar</button>
      `;
    }

    contenedor.appendChild(div);
  });
}

function abrirModal(tipo, obra){

  obraSeleccionada = obra;
  accion = tipo;

  const titulo = document.getElementById("tituloModal");
  const detalle = document.getElementById("detalleModal");
  const btn = document.getElementById("btnAccion");
  const motivo = document.getElementById("motivo");

  detalle.innerHTML = `
    Privada ${obra.privada} - Lote ${obra.casa}<br>
    ${obra.dro_nombre}
  `;

  if (tipo === "aprobar") {
    titulo.innerText = "Aprobar obra";
    btn.innerText = "Confirmar aprobación";
    btn.className = "btn-aprobar";
    motivo.style.display = "none";
  } else {
    titulo.innerText = "Rechazar obra";
    btn.innerText = "Confirmar rechazo";
    btn.className = "btn-rechazar";
    motivo.style.display = "block";
  }

  document.getElementById("modal").style.display = "flex";
}

function cerrarModal(){
  obraSeleccionada = null;
  document.getElementById("modal").style.display = "none";
  document.getElementById("motivo").value = "";
}

document.getElementById("btnAccion").onclick = async () => {

  if (!obraSeleccionada) return;

  const hoy = new Date().toISOString().split("T")[0];

  let updateData = {
    responsable_autorizacion: usuarioNombre
  };

  if (accion === "aprobar") {
    updateData.aprobada = true;
    updateData.estatus = "aprobada";
    updateData.fecha_autorizacion = hoy;
  } else {

    const motivo = document.getElementById("motivo").value.trim();

    if (!motivo) {
      mostrarToast("Debes escribir un motivo", true);
      return;
    }

    updateData.estatus = "rechazada";
    updateData.motivo_rechazo = motivo;
    updateData.fecha_autorizacion = hoy;
  }

  const { error } = await supabaseClient
    .from("obras")
    .update(updateData)
    .eq("id", obraSeleccionada.id);

  if (error){
    mostrarToast("Error en la operación", true);
    return;
  }

  cerrarModal();
  mostrarToast("Operación realizada correctamente");
  cargarObras();
};

function mostrarToast(msg, error=false){
  const toast = document.getElementById("toast");
  toast.innerText = msg;
  toast.style.background = error ? "#ef4444" : "#22c55e";
  toast.style.display = "block";

  setTimeout(() => {
    toast.style.display = "none";
  }, 2500);
}

</script>

</body>
</html>

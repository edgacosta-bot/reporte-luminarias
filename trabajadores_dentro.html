<!DOCTYPE html>
<html lang="es">
<head>
<script src="auth.js"></script>
<script>
protegerPagina(["vigilante", "admin"]);

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trabajadores dentro</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 10px;
}

.nombre {
  font-size: 18px;
  font-weight: bold;
}

.detalle {
  font-size: 13px;
  color: #9ca3af;
}

.vacio {
  text-align: center;
  margin-top: 40px;
  color: #9ca3af;
}
</style>
</head>

<body>

<div class="container">
  <h1>👷 Trabajadores dentro</h1>
  <div id="lista"></div>
</div>

<script>

const supabaseClient = window.supabase.createClient(
  "https://prjxmfhahnzosdwljode.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs"
);

cargar();

async function cargar() {

  const { data, error } = await supabaseClient
    .from("accesos_trabajadores")
    .select(`
      *,
      trabajadores_obra (
        nombre,
        privada,
        casa
      )
    `)
    .is("fecha_hora_salida", null);

  const lista = document.getElementById("lista");

  if (error) {
    lista.innerHTML = "<p>Error al cargar</p>";
    return;
  }

  if (!data || data.length === 0) {
    lista.innerHTML = "<p class='vacio'>No hay trabajadores dentro</p>";
    return;
  }

  lista.innerHTML = "";

  data.forEach(item => {

    const trabajador = item.trabajadores_obra;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="nombre">${trabajador.nombre}</div>
      <div class="detalle">
        Privada ${trabajador.privada} - Lote ${trabajador.casa}<br>
        Entrada: ${new Date(item.fecha_hora_entrada).toLocaleString()}
      </div>
    `;

    lista.appendChild(div);
  });
}

</script>

</body>
</html>

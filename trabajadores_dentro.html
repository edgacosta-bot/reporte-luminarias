</div>

<script>

const supabaseClient = window.supabase.createClient(
  "https://prjxmfhahnzosdwljode.supabase.co",

);

cargar();

// 🔥 NORMALIZADOR ÚNICO (CLAVE)
function convertirAMexico(fechaUTC) {
  return new Date(
    new Date(fechaUTC).toLocaleString("en-US", {
      timeZone: "America/Mexico_City"
    })
  );
}

// 🔥 FORMATO CORRECTO
function formatearHora(fechaUTC) {
  if (!fechaUTC) return "-";

  const fecha = new Date(fechaUTC);

  return fecha.toLocaleString("es-MX", {
    timeZone: "America/Mexico_City",
    hour: "2-digit",
    minute: "2-digit",
    day: "2-digit",
    month: "2-digit"
  });
}

// 🔥 CÁLCULO CONSISTENTE
function calcularTiempo(entradaUTC) {

  const entrada = new Date(entradaUTC);
  const ahora = new Date();

  let diff = ahora.getTime() - entrada.getTime();

  if (diff < 0) diff = 0;

  const horas = Math.floor(diff / (1000 * 60 * 60));
  const minutos = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

  return { horas, minutos };
}

async function cargar() {

  const { data: accesos, error } = await supabaseClient
    .from("accesos_trabajadores")
    .select("*")
    .is("fecha_hora_salida", null);

  const lista = document.getElementById("lista");
  const alertaDiv = document.getElementById("alerta");

  if (error) {
    lista.innerHTML = "Error";
    return;
  }

  if (!accesos || accesos.length === 0) {
    lista.innerHTML = "<p style='text-align:center;'>Todo en orden</p>";
    alertaDiv.innerText = "Todo en orden";
    alertaDiv.style.color = "#34d399";
    return;
  }

  lista.innerHTML = "";
  let alertas = 0;

  for (const item of accesos) {

    const { data: trabajador } = await supabaseClient
      .from("trabajadores_obra")
      .select("nombre, privada, casa")
      .eq("id", item.trabajador_id)
      .single();

    const tiempo = calcularTiempo(item.fecha_hora_entrada);

    let alerta = "";
    let estilo = "";

    if (tiempo.totalHoras >= 8) {
      alerta = "⚠️ Exceso de tiempo";
      estilo = "border:2px solid red;";
      alertas++;
    }

    const div = document.createElement("div");
    div.className = "card";
    div.style = estilo;

    div.innerHTML = `
      <div class="nombre">${trabajador?.nombre || "-"}</div>
      <div class="detalle">
        Privada ${trabajador?.privada || "-"} - Lote ${trabajador?.casa || "-"}<br>
        Entrada: ${formatearHora(item.fecha_hora_entrada)}<br>
        Tiempo dentro: ${tiempo.horas}h ${tiempo.minutos}m<br>
        ${alerta}
      </div>
    `;

    lista.appendChild(div);
  }

  if (alertas > 0) {
    alertaDiv.innerText = "⚠️ Hay irregularidades";
    alertaDiv.style.color = "#f87171";
  } else {
    alertaDiv.innerText = "Todo en orden";
    alertaDiv.style.color = "#34d399";
  }
}

</script>

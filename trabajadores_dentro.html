<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trabajadores dentro</title>

<!-- 🔥 ORDEN CORRECTO -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<script>
protegerPagina(["vigilante", "admin"]);
</script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
  margin-bottom: 10px;
}

.alerta-global {
  text-align: center;
  margin-bottom: 15px;
  font-weight: bold;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 10px;
}

.nombre {
  font-size: 18px;
  font-weight: bold;
}

.detalle {
  font-size: 13px;
  color: #9ca3af;
}

.vacio {
  text-align: center;
  margin-top: 40px;
  color: #9ca3af;
}

.acciones button {
  margin-top: 10px;
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.btn-reporte {
  background: #dc2626;
  color: white;
}

.btn-salida {
  background: #2563eb;
  color: white;
}
</style>
</head>

<body>

<div class="container">
  <h1>👷 Trabajadores dentro</h1>

  <div id="alerta" class="alerta-global"></div>

  <div id="lista"></div>
</div>

<script>

// 🔥 AUTO REFRESH
cargar();
setInterval(cargar, 10000);

// 🔥 FORMATO
function formatearHora(fecha) {
  if (!fecha) return "-";

  const f = new Date(fecha);

  return f.toLocaleString("es-MX", {
    hour: "2-digit",
    minute: "2-digit",
    day: "2-digit",
    month: "2-digit"
  });
}

// 🔥 TIEMPO
function calcularTiempo(fechaLocal) {

  if (!fechaLocal) return { horas: 0, minutos: 0, totalHoras: 0 };

  const entrada = new Date(fechaLocal);
  const ahora = new Date();

  let diff = ahora - entrada;

  if (diff < 0) diff = 0;

  const horas = Math.floor(diff / (1000 * 60 * 60));
  const minutos = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

  return {
    horas,
    minutos,
    totalHoras: diff / (1000 * 60 * 60)
  };
}

// 🔥 FUNCIÓN PRINCIPAL
async function cargar() {

  if (!window.supabaseClient) {
    console.error("Supabase no inicializado");
    return;
  }

  const { data: accesos, error } = await supabaseClient
    .from("accesos_trabajadores")
    .select("*")
    .is("fecha_hora_salida", null);

  const lista = document.getElementById("lista");
  const alertaDiv = document.getElementById("alerta");

  if (error) {
    lista.innerHTML = "<p>Error al cargar</p>";
    return;
  }

  if (!accesos || accesos.length === 0) {
    lista.innerHTML = "<p class='vacio'>No hay trabajadores dentro</p>";
    alertaDiv.innerHTML = "Todo en orden";
    alertaDiv.style.color = "#34d399";
    return;
  }

  // 🔥 MAPA DE TRABAJADORES (OPTIMIZACIÓN)
  const ids = accesos.map(a => a.trabajador_id);

  const { data: trabajadores } = await supabaseClient
    .from("trabajadores_obra")
    .select("id, nombre, privada, casa")
    .in("id", ids);

  let mapaTrabajadores = {};
  trabajadores?.forEach(t => {
    mapaTrabajadores[t.id] = t;
  });

  lista.innerHTML = "";
  let totalAlertas = 0;

  for (const item of accesos) {

    const trabajador = mapaTrabajadores[item.trabajador_id];

    const entradaBase = item.fecha_hora_entrada_local || item.fecha_hora_entrada;

    const tiempo = calcularTiempo(entradaBase);

    let alerta = "";
    let estilo = "";
    let esAlerta = false;

    // 🔥 EXCESO DE TIEMPO
    if (tiempo.totalHoras >= 8) {
      alerta = "⚠️ Exceso de tiempo";
      estilo = "border: 2px solid #dc2626;";
      totalAlertas++;
      esAlerta = true;
    }

    // 🔥 FUERA DE HORARIO
    const ahora = new Date();
    const dia = ahora.getDay();
    const hora = ahora.getHours();
    const minutos = ahora.getMinutes();
    const horaActual = hora + (minutos / 60);

    let fueraDeHorario = false;

    if (dia === 0) fueraDeHorario = true;

    if (dia === 6 && (horaActual < 9 || horaActual > 14)) {
      fueraDeHorario = true;
    }

    if (dia >= 1 && dia <= 5 && (horaActual < 8 || horaActual > 18)) {
      fueraDeHorario = true;
    }

    if (fueraDeHorario) {
      alerta = "🚨 Fuera de horario";
      estilo = "border: 2px solid #dc2626;";
      totalAlertas++;
      esAlerta = true;
    }

    const div = document.createElement("div");
    div.className = "card";
    div.style = estilo;

    div.innerHTML = `
      <div class="nombre">${trabajador?.nombre || "Sin nombre"}</div>
      <div class="detalle">
        Privada ${trabajador?.privada || "-"} - Lote ${trabajador?.casa || "-"}<br>
        Entrada: ${formatearHora(entradaBase)}<br>
        Tiempo dentro: ${tiempo.horas}h ${tiempo.minutos}m<br>
        ${alerta}
      </div>

      ${esAlerta ? `
        <div class="acciones">
          <button class="btn-reporte" onclick="reportar('${item.trabajador_id}')">
            🚨 Reportar incidencia
          </button>

          <button class="btn-salida" onclick="forzarSalida('${item.id}')">
            🚪 Forzar salida
          </button>
        </div>
      ` : ""}
    `;

    lista.appendChild(div);
  }

  // 🔥 ALERTA GLOBAL
  if (totalAlertas > 0) {
    alertaDiv.innerHTML = `🚨 ${totalAlertas} trabajador(es) con irregularidades`;
    alertaDiv.style.color = "#f87171";
  } else {
    alertaDiv.innerHTML = "Todo en orden";
    alertaDiv.style.color = "#34d399";
  }
}

// 🚨 REPORTAR
async function reportar(trabajador_id) {

  await supabaseClient
    .from("incidencias_trabajadores")
    .insert([{
      trabajador_id: trabajador_id,
      tipo: "irregularidad",
      descripcion: "Detectado por sistema",
      registrado_por: "vigilante"
    }]);

  alert("Incidencia registrada");
}

// 🚪 FORZAR SALIDA
async function forzarSalida(acceso_id) {

  const ahoraLocal = new Date().toLocaleString("sv-SE", {
    timeZone: "America/Mexico_City"
  }).replace(" ", "T");

  await supabaseClient
    .from("accesos_trabajadores")
    .update({
      fecha_hora_salida_local: ahoraLocal,
      estatus: "forzado"
    })
    .eq("id", acceso_id);

  alert("Salida registrada");

  cargar();
}

</script>

</body>
</html>

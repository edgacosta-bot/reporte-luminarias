<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trabajadores dentro</title>

<!-- 🔥 ORDEN CORRECTO -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<script>
protegerPagina(["vigilante","administracion","admin"]);
</script>

        <link rel="stylesheet" href="styles/global.css">
<link rel="stylesheet" href="styles/trabajadores_dentro.css">
</head>

<body>

<div class="container">
  <h1>👷 Trabajadores dentro</h1>

  <div id="alerta" class="alerta-global"></div>

  <div id="lista"></div>
</div>

<script>

// 🔥 AUTO REFRESH
cargar();
setInterval(cargar, 10000);

// 🔥 FORMATO
function formatearHora(fecha) {
  if (!fecha) return "-";

  const f = new Date(fecha);

  return f.toLocaleString("es-MX", {
    hour: "2-digit",
    minute: "2-digit",
    day: "2-digit",
    month: "2-digit"
  });
}

// 🔥 TIEMPO
function calcularTiempo(fechaLocal) {

  if (!fechaLocal) return { horas: 0, minutos: 0, totalHoras: 0 };

  const entrada = new Date(fechaLocal);
  const ahora = new Date();

  let diff = ahora - entrada;

  if (diff < 0) diff = 0;

  const horas = Math.floor(diff / (1000 * 60 * 60));
  const minutos = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

  return {
    horas,
    minutos,
    totalHoras: diff / (1000 * 60 * 60)
  };
}

let privadasAbiertas = new Set();
let lotesAbiertos = new Set();
  
// 🔥 FUNCIÓN PRINCIPAL
async function cargar() {

  if (!window.supabaseClient) {
    console.error("Supabase no inicializado");
    return;
  }

  const { data: accesos, error } = await supabaseClient
    .from("accesos_trabajadores")
    .select("*")
    .is("fecha_hora_salida", null);

  const lista = document.getElementById("lista");
  const alertaDiv = document.getElementById("alerta");

  if (error) {
    lista.innerHTML = "<p>Error al cargar</p>";
    return;
  }

  if (!accesos || accesos.length === 0) {
    lista.innerHTML = "<p class='vacio'>No hay trabajadores dentro</p>";
    alertaDiv.innerHTML = "Todo en orden";
    alertaDiv.style.color = "#34d399";
    return;
  }

  // 🔥 MAPA DE TRABAJADORES (OPTIMIZACIÓN)
  const ids = accesos.map(a => a.trabajador_id);

  const { data: trabajadores } = await supabaseClient
    .from("trabajadores_obra")
    .select("id, nombre, privada, casa")
    .in("id", ids);

  let mapaTrabajadores = {};
  trabajadores?.forEach(t => {
    mapaTrabajadores[t.id] = t;
  });

  privadasAbiertas.clear();
lotesAbiertos.clear();

document
  .querySelectorAll("details[data-privada]")
  .forEach(d => {
    if (d.open) {
      privadasAbiertas.add(
        d.dataset.privada
      );
    }
  });

document
  .querySelectorAll("details[data-lote]")
  .forEach(d => {
    if (d.open) {
      lotesAbiertos.add(
        d.dataset.lote
      );
    }
  });
  
  lista.innerHTML = "";
  let totalAlertas = 0;
  const agrupado = {};
  

  for (const item of accesos) {

  const trabajador = mapaTrabajadores[item.trabajador_id];

  const privada = trabajador?.privada || "Sin privada";
  const lote = trabajador?.casa || "Sin lote";

  if (!agrupado[privada]) {
    agrupado[privada] = {};
  }

  if (!agrupado[privada][lote]) {
    agrupado[privada][lote] = [];
  }

  agrupado[privada][lote].push({
    acceso: item,
    trabajador
  });
}

  const privadasOrdenadas =
  Object.keys(agrupado).sort();

  for (const privada of privadasOrdenadas) {

  const detallePrivada =
  document.createElement("details");  
  detallePrivada.dataset.privada = privada;  

  if (privadasAbiertas.has(privada)) {
  detallePrivada.open = true;
}  
  
  
  const totalPrivada =
    Object.values(agrupado[privada])
      .reduce((acc, arr) => acc + arr.length, 0);

  detallePrivada.innerHTML = `
    <summary class="acordeon-privada">
      🏘 Privada ${privada} (${totalPrivada})
    </summary>
  `;

  const lotesOrdenados =
  Object.keys(agrupado[privada])
    .sort((a,b) => Number(a) - Number(b));

 for (const lote of lotesOrdenados) {

  const detalleLote =
  document.createElement("details");
  const llaveLote =
  privada + "-" + lote;

detalleLote.dataset.lote =
  llaveLote;

if (lotesAbiertos.has(llaveLote)) {
  detalleLote.open = true;
}

    const trabajadoresLote = agrupado[privada][lote];

    detalleLote.innerHTML = `
      <summary class="acordeon-lote">
        🏠 Lote ${lote} (${trabajadoresLote.length})
      </summary>
    `;

    trabajadoresLote.sort((a,b) =>
      new Date(a.acceso.fecha_hora_entrada)
      - new Date(b.acceso.fecha_hora_entrada)
    );

    for (const registro of trabajadoresLote) {

      const item = registro.acceso;
      const trabajador = registro.trabajador;

      const entradaBase =
        item.fecha_hora_entrada_local ||
        item.fecha_hora_entrada;

      const tiempo = calcularTiempo(entradaBase);

      let alerta = "";
      let estilo = "";
      let esAlerta = false;

      const ahora = new Date();
      const dia = ahora.getDay();
      const hora = ahora.getHours();
      const minutos = ahora.getMinutes();
      

     const minutosActuales =
  (hora * 60) + minutos;

let fueraDeHorario = false;

// Domingo
if (dia === 0) {
  fueraDeHorario = true;
}

// Sábado
if (
  dia === 6 &&
  (
    minutosActuales < 530 ||   // 08:50
    minutosActuales > 850      // 14:10
  )
) {
  fueraDeHorario = true;
}

// Lunes a viernes
if (
  dia >= 1 &&
  dia <= 5 &&
  (
    minutosActuales < 470 ||   // 07:50
    minutosActuales > 1090     // 18:10
  )
) {
  fueraDeHorario = true;
}

      if (fueraDeHorario) {
        alerta = "🚨 Fuera de horario";
        estilo = "border:2px solid #dc2626;";
        totalAlertas++;
        esAlerta = true;
      }

      const div = document.createElement("div");

      div.className = "trabajador-item";
      div.style = estilo;

      div.innerHTML = `
        <div class="nombre">
          ${trabajador?.nombre || "Sin nombre"}
        </div>

        <div class="detalle">
          Entrada: ${formatearHora(entradaBase)}<br>
          Tiempo dentro:
          ${tiempo.horas}h ${tiempo.minutos}m<br>

          ${alerta}
        </div>

        ${esAlerta ? `
          <div class="detalle"
               style="margin-top:10px;
                      color:#f87171;
                      font-weight:bold;">
            ⚠️ Requiere atención del vigilante
          </div>
        ` : ""}
      `;

      detalleLote.appendChild(div);
    }

    detallePrivada.appendChild(detalleLote);
    }
   
    lista.appendChild(detallePrivada);
    }
 

  // 🔥 ALERTA GLOBAL
  if (totalAlertas > 0) {
    alertaDiv.innerHTML = `🚨 ${totalAlertas} trabajador(es) con irregularidades`;
    alertaDiv.style.color = "#f87171";
  } else {
    alertaDiv.innerHTML = "Todo en orden";
    alertaDiv.style.color = "#34d399";
  }
}


</script>

</body>
</html>

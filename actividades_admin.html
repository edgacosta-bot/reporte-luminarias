<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Actividades | SIGVIC</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="auth.js"></script>

<style>

body{
  margin:0;
  font-family:'Segoe UI';
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
}

.container{
  max-width:700px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
}

.kpi{
  background:#111827;
  border-radius:18px;
  padding:20px;
  text-align:center;
  margin-bottom:20px;
}

.kpi span{
  font-size:34px;
  font-weight:bold;
}

.card{
  background:#111827;
  border-radius:18px;
  padding:18px;
  margin-bottom:12px;
}

.activo{

  color:#22c55e;

  font-weight:bold;

}

.inactivo{

  color:#ef4444;

  font-weight:bold;

}  

#contenedorNotificaciones{
  position:fixed;
  top:20px;
  right:20px;
  width:350px;
  z-index:10000;
}

.notificacion{
  padding:14px;
  border-radius:12px;
  margin-bottom:10px;
  font-weight:600;
  animation:aparecer .25s ease;
    box-shadow:
    0 4px 12px rgba(0,0,0,.35);
}

.notificacion.exito{
  background:#14532d;
  border:1px solid #22c55e;
  color:white;
}

.notificacion.error{
  background:#7f1d1d;
  border:1px solid #ef4444;
  color:white;
}

@keyframes aparecer{

  from{
    opacity:0;
    transform:translateY(-10px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }

}
  
</style>

</head>

<body>

<div class="container">

  <h1>
  🏃 Administración de Actividades
</h1>

  <div id="contenedorNotificaciones"></div>

  <div class="kpi">

    Actividades registradas

    <br><br>

    <span id="kpiActividades">
      0
    </span>

  </div>

   <div style="text-align:center;margin-bottom:20px;">

  <button
    id="btnNuevaActividad"
    style="
      background:#2563eb;
      color:white;
      border:none;
      border-radius:12px;
      padding:12px 20px;
      font-size:16px;
      cursor:pointer;
    ">

    ➕ Nueva actividad

  </button>

</div> 

  <div id="lista"></div>

</div>


<div
  id="modalActividad"
  style="
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.7);
    justify-content:center;
    align-items:center;
    z-index:9999;
  ">

  <div
    style="
      background:#111827;
      padding:24px;
      border-radius:16px;
      width:90%;
      max-width:600px;
      max-height:90vh;
      overflow:auto;
    ">

    <h2 id="tituloModalActividad">

      Editar actividad

    </h2>

    <div style="margin-bottom:12px;">

      <label>Amenidad</label>

      <select
        id="cmbAmenidad"
        style="
          width:100%;
          padding:10px;
          margin-top:5px;
        ">
      </select>

    </div>

    <div style="margin-bottom:12px;">

      <label>Nombre</label>

      <input
        id="txtNombreActividad"
        type="text"
        style="
          width:100%;
          padding:10px;
          margin-top:5px;
        ">

    </div>

    <div style="margin-bottom:12px;">

      <label>Descripción</label>

      <textarea
        id="txtDescripcionActividad"
        style="
          width:100%;
          height:80px;
          padding:10px;
          margin-top:5px;
        "></textarea>

    </div>

    <div style="margin-bottom:12px;">

      <label>Tipo</label>

      <select
        id="cmbTipoActividad"
        style="
          width:100%;
          padding:10px;
          margin-top:5px;
        ">

        <option value="recurrente">
          Recurrente
        </option>

        <option value="curso">
          Curso
        </option>

        <option value="taller">
          Taller
        </option>

        <option value="evento">
          Evento
        </option>

      </select>

    </div>

    <div style="margin-bottom:12px;">

      <label>Capacidad</label>

      <input
        id="txtCapacidadActividad"
        type="number"
        min="1"
        style="
          width:100%;
          padding:10px;
          margin-top:5px;
        ">

    </div>

    <div style="margin-bottom:12px;">

      <label>

        <input
          id="chkPermiteInvitados"
          type="checkbox">

        Permite invitados

      </label>

    </div>

    <div style="margin-bottom:12px;">

      <label>Fecha inicio</label>

      <input
        id="fechaInicioActividad"
        type="date"
        style="
          width:100%;
          padding:10px;
          margin-top:5px;
        ">

    </div>

    <div style="margin-bottom:20px;">

      <label>Fecha fin</label>

      <input
        id="fechaFinActividad"
        type="date"
        style="
          width:100%;
          padding:10px;
          margin-top:5px;
        ">

    </div>

    <div
      style="
        display:flex;
        justify-content:flex-end;
        gap:10px;
      ">

      <button
        id="btnCerrarActividad">

        Cancelar

      </button>

      <button
        id="btnGuardarActividad">

        Guardar

      </button>

    </div>

  </div>

</div>
  
<script>

let actividades = [];

let actividadActual = null; 

let notificacionActual = null;

let amenidades = [];

let actividadEditando = null;
  

function mostrarNotificacion(
  mensaje,
  tipo = "exito"
){

   const contenedor =
    document.getElementById(
      "contenedorNotificaciones"
    );

  
  if(notificacionActual){
    notificacionActual.remove();
  }

  const div =
    document.createElement(
      "div"
    );

  div.className =
    `notificacion ${tipo}`;

  div.innerHTML =
    mensaje;

  contenedor.appendChild(
    div
  );

  notificacionActual = div;

  setTimeout(()=>{

    if(div.parentNode){

      div.remove();

      if(
        notificacionActual === div
      ){
        notificacionActual = null;
      }

    }

  },4000);

}  

async function cargarAmenidades(){

 const { data, error } =
  await supabaseClient.rpc(
    "obtener_amenidades_actividades"
  );

console.log(
  "Data:",
  data
);

console.log(
  "Error:",
  error
);

  const { data, error } =
    await supabaseClient.rpc(
      "obtener_amenidades_actividades"
    );

  if(error){

    console.log(error);

    return;

  }

  
  
  amenidades = data || [];

}  

async function cargar(){

  const { data, error } =
    await supabaseClient.rpc(
      "obtener_actividades_admin"
    );

  if(error){

    console.log(error);

    return;

  }

  actividades =
    data.actividades || [];

  renderizar();

  document
    .getElementById(
      "kpiActividades"
    )
    .innerText =
    actividades.length;

}

  function renderizar(){

  const lista =
    document.getElementById(
      "lista"
    );

  if(
    actividades.length === 0
  ){

    lista.innerHTML =
      "<div class='card'>No existen actividades registradas.</div>";

    return;

  }

  let html = "";

  actividades.forEach(a=>{

    html += `

      <div class="card">

        <div
          style="
            font-size:20px;
            font-weight:bold;
            color:#93c5fd;
            margin-bottom:12px;
          ">

          🏃 ${a.nombre}

        </div>

        <div>

          <b>🏟 Amenidad:</b>

          ${a.amenidad}

        </div>

        <div>

          <b>📋 Tipo:</b>

          ${a.tipo}

        </div>

        <div>

          <b>📅 Vigencia:</b>

          ${a.fecha_inicio || '-'}
           -
          ${a.fecha_fin || '-'}

        </div>

        <div>

          <b>👥 Capacidad:</b>

          ${a.capacidad_maxima}

        </div>

        <div>

          <b>✅ Inscritos:</b>

          ${a.inscritos}

        </div>

        <div
          style="
            margin-top:10px;
            font-weight:bold;
            color:${
              a.estado === 'activa'
              ? '#22c55e'
              : '#ef4444'
            };
          ">

          ${
            a.estado === 'activa'
            ? '🟢 ACTIVA'
            : '🔴 INACTIVA'
          }

        </div>

                <div
          style="
            margin-top:15px;
            display:flex;
            flex-wrap:wrap;
            gap:8px;
          ">

          <button
            onclick="editarActividad('${a.id}')">

            ✏ Editar

          </button>

          <button
            onclick="horariosActividad('${a.id}')">

            🕒 Horarios

          </button>

          <button
            onclick="instructoresActividad('${a.id}')">

            👨‍🏫 Instructores

          </button>

          <button
            onclick="inscritosActividad('${a.id}')">

            👥 Inscritos

          </button>

          <button
            onclick="invitadosActividad('${a.id}')">

            🎟 Invitados

          </button>

        </div>

      </div>

    `;

  });

  lista.innerHTML = html;

}

function editarActividad(id){

  alert(
    "Editar actividad\n\n" + id
  );

}

function horariosActividad(id){

  window.location.href =
    "actividad_horarios.html?id=" + id;

}

function instructoresActividad(id){

  window.location.href =
    "actividad_instructores.html?id=" + id;

}
  
function inscritosActividad(id){

  window.location.href =
    "actividad_inscritos.html?id=" + id;

}

function invitadosActividad(id){

  window.location.href =
    "actividad_invitados.html?id=" + id;

}
  
window.addEventListener(
  "DOMContentLoaded",
  async ()=>{

    await protegerPagina([
      "administracion"
    ]);

    await cargar();

    await cargarAmenidades();

  }
);
  
</script>

</body>
</html>

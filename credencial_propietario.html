<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Credencial Propietario</title>

    <link rel="stylesheet" href="styles/credencial_propietario.css">
</head>

<body>

<div class="container">
  <div class="card">

    <div class="header">
      Villas de la Concepción<br>
      Acceso propietario
    </div>

    <div class="nombre" id="nombre"></div>
    <div class="detalle" id="detalle"></div>

    <div id="qr"></div>

    <button id="btnWA" class="btn-wa">
      📲 Enviar por WhatsApp
    </button>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>

const params = new URLSearchParams(window.location.search);

const codigo = params.get("qr");
const nombre = params.get("nombre");
const privada = params.get("privada");
const casa = params.get("casa");
const origen = params.get("origen");

// 🔐 VALIDACIÓN
if (!codigo) {
  document.body.innerHTML = "QR inválido";
  throw new Error("QR inválido");
}

// 🔐 URL QR
const urlQR = `${window.location.origin}/acceso_propietario.html?qr=${codigo}`;

// 🎯 RENDER QR
document.getElementById("qr").innerHTML = `
  <div class="qr-wrapper">
    <img src="/icono-512.png" class="qr-logo">
    <div id="qrCanvas"></div>
    <div class="qr-title">Villas de la Concepción</div>
  </div>
`;

QRCode.toCanvas(urlQR, { width: 200 }, function (err, canvas) {
  document.getElementById("qrCanvas").appendChild(canvas);
});

// 🧾 DATOS
document.getElementById("nombre").innerText = nombre || "";
document.getElementById("detalle").innerText =
  `Privada ${privada || ""} - Lote ${casa || ""}`;

// 🔒 OCULTAR BOTÓN SI NO ES ADMIN
if (origen !== "admin") {
  document.getElementById("btnWA").style.display = "none";
}

// 📲 BOTÓN WHATSAPP
document.getElementById("btnWA").addEventListener("click", () => {

  const link = window.location.href;

  const mensaje =
    `🔐 Acceso al fraccionamiento\n\n` +
    `Nombre: ${nombre}\n` +
    `Ubicación: Privada ${privada} - Lote ${casa}\n\n` +
    `Presenta este código en caseta:\n${link}`;

  window.open(`https://wa.me/?text=${encodeURIComponent(mensaje)}`, "_blank");
});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Credencial Propietario</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  text-align: center;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

/* 🔥 TARJETA COMO VISITANTE */
.card {
  background: white;
  color: black;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.header {
  background: #1e293b;
  color: white;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 15px;
  font-weight: bold;
}

/* DATOS */
.nombre {
  font-size: 20px;
  font-weight: bold;
  margin-top: 10px;
}

.detalle {
  color: #374151;
  margin-bottom: 15px;
  font-size: 14px;
}

/* QR ESTILO VISITANTE */
#qr {
  margin-top: 15px;
}

.qr-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  background: #f9fafb;
  padding: 15px;
  border-radius: 12px;
}

.qr-logo {
  width: 50px;
  margin-bottom: -10px;
}

.qr-title {
  font-size: 13px;
  font-weight: bold;
  color: #1e293b;
}

/* BOTÓN */
.btn-wa {
  margin-top: 20px;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: #25D366;
  color: white;
  font-size: 16px;
  font-weight: bold;
  width: 100%;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="header">
      Villas de la Concepción<br>
      Acceso propietario
    </div>

    <div class="nombre" id="nombre"></div>
    <div class="detalle" id="detalle"></div>

    <div id="qr"></div>

    <button id="btnWA" class="btn-wa">
      📲 Enviar por WhatsApp
    </button>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>

const params = new URLSearchParams(window.location.search);

const codigo = params.get("qr");
const nombre = params.get("nombre");
const privada = params.get("privada");
const casa = params.get("casa");
const origen = params.get("origen");

// 🔐 VALIDACIÓN BÁSICA
if (!codigo) {
  document.body.innerHTML = "QR inválido";
  throw new Error("QR inválido");
}

// 🔐 URL REAL DE ACCESO
const urlQR = `${window.location.origin}/acceso_propietario.html?qr=${codigo}`;

// 🎯 RENDER QR ESTILO VISITANTE
document.getElementById("qr").innerHTML = `
  <div class="qr-wrapper">
    <img src="/icono-512.png" class="qr-logo">
    <div id="qrCanvas"></div>
    <div class="qr-title">Villas de la Concepción</div>
  </div>
`;

QRCode.toCanvas(urlQR, { width: 200 }, function (err, canvas) {
  document.getElementById("qrCanvas").appendChild(canvas);
});

// 🧾 DATOS
document.getElementById("nombre").innerText = nombre || "";
document.getElementById("detalle").innerText =
  `Privada ${privada || ""} - Lote ${casa || ""}`;

// 🔥 OCULTAR BOTÓN SI NO ES ADMIN
if (origen !== "admin") {
  document.getElementById("btnWA").style.display = "none";
}

// 📲 WHATSAPP
document.getElementById("btnWA").addEventListener("click", () => {

  const link =
    `${window.location.origin}/credencial_propietario.html?qr=${codigo}&nombre=${encodeURIComponent(nombre)}&privada=${privada}&casa=${casa}`;

  const mensaje =
    `🔐 Acceso al fraccionamiento\n\n` +
    `Nombre: ${nombre}\n` +
    `Ubicación: Privada ${privada} - Lote ${casa}\n\n` +
    `Presenta este código en caseta:\n${link}`;

  const wa = `https://wa.me/?text=${encodeURIComponent(mensaje)}`;

  window.open(wa, "_blank");
});

</script>

</body>
</html>

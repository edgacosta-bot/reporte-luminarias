<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel principal</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="auth.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #161a1d;
  color: white;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

.header {
  text-align: center;
  margin-bottom: 20px;
}

.logo {
  width: 70px;
  margin: 0 auto 10px;
}

.logo img {
  width: 100%;
}

.card-kpi {
  background: #111827;
  padding: 12px;
  border-radius: 12px;
  text-align: center;
}

.card-kpi strong {
  display: block;
  font-size: 22px;
  margin-top: 5px;
}

.grid-kpi {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.section {
  margin-top: 25px;
}

.section-title {
  margin-bottom: 10px;
  font-weight: bold;
  color: #98989A;
  font-size: 13px;
}

.button {
  display: block;
  text-decoration: none;
  padding: 16px;
  border-radius: 14px;
  margin-bottom: 10px;
  color: white;
  font-size: 16px;
  font-weight: 500;
}

.btn-admin { background: #002f2a; }
.btn-reportes { background: #9b2247; }
.btn-servicios { background: #a57f2c; }
.btn-infra { background: #611232; }
</style>

</head>

<body>

<div class="container">

<div class="header">
  <div class="logo">
    <img src="/icono-512.png">
  </div>
  <h1>Villas de la Concepción</h1>
  <span id="rolTexto"></span>
  <div id="ubicacion"></div>
</div>

<!-- 🔥 DASHBOARD -->

<div id="dashboardAdmin" style="display:none;">

  <div class="grid-kpi">

```
<div class="card-kpi">
  <div>🚨 Reportes hoy</div>
  <strong id="kpiReportes">0</strong>
</div>

<div class="card-kpi">
  <div>📦 Paquetes pendientes</div>
  <strong id="kpiPaquetes">0</strong>
</div>

<div class="card-kpi">
  <div>👷 Trabajadores dentro</div>
  <strong id="kpiTrabajadores">0</strong>
</div>
```

  </div>

</div>

<!-- 🔥 BOTONES (NO TOCADOS) -->

<div id="admin-section" class="section">
  <div class="section-title">ADMINISTRACIÓN</div>

<a href="admin_reporte_general.html" class="button btn-reportes">📊 Reporte general</a> <a href="desempeño_vigilantes.html" class="button btn-admin">📈 Desempeño vigilantes</a> <a href="aportaciones.html" class="button btn-servicios">💰 Aportaciones</a> <a href="luminarias.html" class="button btn-infra">💡 Luminarias</a>

</div>

</div>

<script>

async function iniciarSistema() {

 const { data: userData } = await supabaseClient.auth.getUser();

 if (!userData?.user) {
  window.location.href = "login.html";
  return;
 }

 const userId = userData.user.id;

 const { data: residente } = await supabaseClient
  .from("residentes")
  .select("tipo, privada, casa")
  .eq("user_id", userId)
  .maybeSingle();

 const rol = residente.tipo?.trim().toLowerCase();

 document.getElementById("rolTexto").innerText = rol.toUpperCase();

 if (rol === "administracion" || rol === "mesa_directiva" || rol === "soporte") {
  document.getElementById("dashboardAdmin").style.display = "block";
  cargarDashboardAdmin();
 }

 document.getElementById("ubicacion").innerText =
  `${residente.privada} - ${residente.casa}`;
}

async function cargarDashboardAdmin() {

  const inicio = new Date();
  inicio.setHours(0,0,0,0);

  const fin = new Date();
  fin.setHours(23,59,59,999);

  const desde = inicio.toISOString();
  const hasta = fin.toISOString();

  const [
    vigilantes,
    obras,
    vecinales,
    luminarias,
    agua
  ] = await Promise.all([

    supabaseClient.from("reportes_vigilantes").select("id").gte("fecha_reporte", desde).lte("fecha_reporte", hasta),
    supabaseClient.from("reportes_obras").select("id").gte("fecha_reporte", desde).lte("fecha_reporte", hasta),
    supabaseClient.from("reportes_vecinales").select("id").gte("fecha_reporte", desde).lte("fecha_reporte", hasta),
    supabaseClient.from("reportes_luminarias").select("id").gte("fecha_reporte", desde).lte("fecha_reporte", hasta),
    supabaseClient.from("reportes_agua").select("id").gte("fecha_reporte", desde).lte("fecha_reporte", hasta)

  ]);

  const total =
    (vigilantes.data?.length || 0) +
    (obras.data?.length || 0) +
    (vecinales.data?.length || 0) +
    (luminarias.data?.length || 0) +
    (agua.data?.length || 0);

  document.getElementById("kpiReportes").innerText = total;

  const { data: trabajadores } = await supabaseClient
    .from("accesos_trabajadores")
    .select("id")
    .is("fecha_hora_salida", null);

  document.getElementById("kpiTrabajadores").innerText = trabajadores?.length || 0;

  const { data: paquetes } = await supabaseClient
    .from("paquetes")
    .select("id")
    .eq("estatus", "pendiente");

  document.getElementById("kpiPaquetes").innerText = paquetes?.length || 0;
}

iniciarSistema();

</script>

</body>
</html>

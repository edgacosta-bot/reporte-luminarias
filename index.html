<script>
// CONFIGURACIÓN
const SUPABASE_URL = 'https://prjxmfhahnzosdwljode.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs';
const supabase = typeof supabase !== 'undefined' ? supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzwtyJFPJHBne7BAADj4BIRkBXjsCOb88ybuiizjO4xO9JokDLpweA0oge_c7Xnqsam/exec'; // /exec
const LOOKER_URL_BASE = 'https://lookerstudio.google.com/embed/reporting/d16fb6ac-e2b8-484f-b9cd-18aebbb0e4f1/page/p_81p916em1d';

// 🔥 NUEVOS ELEMENTOS
const input = document.getElementById('no_luminaria');
const boton = document.querySelector('button[type="submit"]');

// crear mensajes dinámicamente (no romper tu diseño)
const mensaje = document.createElement('p');
mensaje.className = "text-xs mt-1";
input.parentNode.appendChild(mensaje);

const ubicacionTxt = document.createElement('p');
ubicacionTxt.className = "text-xs text-gray-500";
input.parentNode.appendChild(ubicacionTxt);

// 🔥 VALIDACIÓN (VERSIÓN ORIGINAL RESTAURADA)
let timeout = null;

input.addEventListener('input', () => {

    clearTimeout(timeout);

    const valor = parseInt(input.value);

    if (!valor) {
        mensaje.innerText = "";
        ubicacionTxt.innerText = "";
        boton.disabled = false;
        return;
    }

    timeout = setTimeout(async () => {

        // 🔹 1. EXISTENCIA
        const { data: luminaria } = await supabase
            .from('control_luminarias')
            .select('*')
            .eq('No. Luminaria', valor)
            .maybeSingle();

        if (!luminaria) {
            mensaje.innerText = "⚠️ Esta luminaria no existe";
            mensaje.className = "text-xs mt-1 text-red-600";
            ubicacionTxt.innerText = "";
            boton.disabled = true;
            return;
        }

        // 🔹 2. UBICACIÓN (USANDO TU ESTRUCTURA REAL)
        if (luminaria.ubicacion_id) {
            const { data: ubicacion } = await supabase
                .from('ubicaciones')
                .select('calle')
                .eq('id', luminaria.ubicacion_id)
                .maybeSingle();

            if (ubicacion) {
                ubicacionTxt.innerText = "📍 " + ubicacion.calle;
            }
        }

        // 🔹 3. ESTADO
        if (luminaria.situacion_id == 2) {
            mensaje.innerText = "⚠️ Esta luminaria ya se encuentra fuera de servicio";
            mensaje.className = "text-xs mt-1 text-red-600";
            boton.disabled = true;
        } else {
            mensaje.innerText = "";
            boton.disabled = false;
        }

    }, 400);
});

// -------- RESTO DE TU CÓDIGO ORIGINAL (SIN CAMBIOS) --------

// FUNCIÓN PARA CARGAR DATOS
async function cargarDatos() {
    const { data, error } = await supabase
        .from('reportes_vecinales')
        .select('*')
        .order('fecha_reporte', { ascending: false })
        .limit(5);

    if (!error) {
        const cuerpo = document.getElementById('tabla-cuerpo');
        cuerpo.innerHTML = data.map(r => `
            <tr>
                <td class="p-3 font-bold">#${r.no_luminaria}</td>
                <td class="p-3">${r.descripcion}</td>
                <td class="p-3"><span class="px-2 py-1 bg-green-100 text-green-700 rounded-full text-xs">${r.estatus}</span></td>
                <td class="p-3 text-gray-500 italic">${r.observaciones || '-'}</td>
            </tr>
        `).join('');
        document.getElementById('reloj').innerText = "Sincronizado: " + new Date().toLocaleTimeString();
    }
}

// ENVÍO
document.getElementById('form-reporte').addEventListener('submit', async (e) => {
    e.preventDefault();

    const datos = {
        no_luminaria: document.getElementById('no_luminaria').value,
        descripcion: document.getElementById('descripcion').value,
        observaciones: document.getElementById('observaciones').value,
        estatus: 'NUEVO'
    };

    try {
        const { error } = await supabase.from('reportes_vecinales').insert([datos]);
        if (error) throw error;

        fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(datos)
        });

        alert("✅ Reporte enviado con éxito");
        document.getElementById('form-reporte').reset();
        cargarDatos();

        const iframe = document.getElementById('looker_iframe');
        iframe.src = LOOKER_URL_BASE + "?t=" + new Date().getTime();

    } catch (err) {
        alert("Error: " + err.message);
    }
});

// INICIO
cargarDatos();
setInterval(cargarDatos, 30000);

</script>

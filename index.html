<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Reporte de Luminaria</title>
<script src="https://cdn.tailwindcss.com"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white shadow-lg rounded-2xl p-6 w-full max-w-md">

<h2 class="text-2xl font-bold text-center mb-6 text-gray-700">
Reportar luminaria
</h2>

<form id="formReporte" class="space-y-4">

<div>
<label class="block text-sm font-medium text-gray-600">
Número de luminaria
</label>

<input 
type="number"
id="no_luminaria"
required
class="mt-1 w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none"
>

<div id="info_luminaria" class="text-sm mt-2"></div>
</div>

<div>
<label class="block text-sm font-medium text-gray-600">
Tipo de falla
</label>

<select
id="descripcion"
required
class="mt-1 w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none"
>
<option value="">Seleccione una opción</option>
<option value="NO_PRENDE">No prende</option>
<option value="BAJA_ILUMINACION">Baja iluminación</option>
<option value="PARPADEA">Parpadea</option>
<option value="SE_APAGA">Se apaga después de un rato</option>
<option value="DAÑO_FISICO">Daño físico</option>
<option value="OTRO">Otro problema</option>
</select>
</div>

<div>
<label class="block text-sm font-medium text-gray-600">
Comentario (opcional)
</label>

<textarea
id="comentario"
rows="3"
class="mt-1 w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none"
placeholder="Describe brevemente el problema si lo deseas">
</textarea>
</div>

<button
id="btn_enviar"
type="submit"
disabled
class="w-full bg-gray-400 text-white py-3 rounded-lg cursor-not-allowed">
Enviar reporte
</button>

<p id="mensaje" class="text-center text-sm mt-2"></p>

</form>
  <iframe 
  id="lookerFrame"
  src="https://lookerstudio.google.com/embed/reporting/d16fb6ac-e2b8-484f-b9cd-18aebbb0e4f1/page/p_81p916em1d"
  width="100%"
  height="600"
  class="mt-6 border rounded-lg">
</iframe>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = 'https://prjxmfhahnzosdwljode.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs';
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

/* 🔗 URL de tu Apps Script */
const GAS_URL = "https://script.google.com/macros/s/AKfycbyTA5oSnLQf8oF4voydTXO5NeyU1tgHOA5L5WV1DzMYfx8czPyGV9bO9HBlI9EhqUg3/exec";

/* estado */
let reporteValido = false;
let luminariaActual = null;
let debounceTimer = null;

/* validar luminaria */

document.getElementById('no_luminaria').addEventListener('input', () => {

clearTimeout(debounceTimer);

debounceTimer = setTimeout(async () => {

const numero = Number(document.getElementById('no_luminaria').value);

const info = document.getElementById('info_luminaria');
const boton = document.getElementById('btn_enviar');

if (!numero) {
info.innerHTML = "";
boton.disabled = true;
luminariaActual = null;
return;
}

const { data, error } = await supabaseClient
.from('luminarias_lookup')
.select('id, calle, privada, situacion')
.eq('no_luminaria', numero);

if (error) {
console.error(error);
return;
}

if (data && data.length > 0) {

luminariaActual = data[0];

if (data[0].situacion === "Fuera de servicio") {

info.innerHTML =
"Calle: <b>" + data[0].calle +
"</b> | Privada: <b>" + data[0].privada +
"</b><br><span class='text-orange-600'>Esta luminaria ya está registrada como fuera de servicio.</span>";

reporteValido = false;
luminariaActual = null;

boton.disabled = true;
boton.className =
"w-full bg-gray-400 text-white py-3 rounded-lg cursor-not-allowed";

return;

}

/* válida */

info.innerHTML =
"Calle: <b>" + data[0].calle +
"</b> | Privada: <b>" + data[0].privada + "</b>";

info.className = "text-green-600 text-sm mt-2";

reporteValido = true;

boton.disabled = false;
boton.className =
"w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition";

} else {

info.innerHTML = "Número de luminaria no encontrado";
info.className = "text-red-600 text-sm mt-2";

reporteValido = false;
luminariaActual = null;

boton.disabled = true;
boton.className =
"w-full bg-gray-400 text-white py-3 rounded-lg cursor-not-allowed";

}

}, 400);

});

/* enviar reporte */

function refrescarLooker() {
  const iframe = document.getElementById("lookerFrame");

  if (!iframe) return;

  const baseUrl = iframe.src.split("?")[0];
  const newUrl = baseUrl + "?t=" + new Date().getTime();

  iframe.src = newUrl;
}
document.getElementById('formReporte').addEventListener('submit', async (e) => {

e.preventDefault();

if (!reporteValido) return;

const mensaje = document.getElementById('mensaje');

try {

const no_luminaria = Number(document.getElementById('no_luminaria').value);
const descripcion = document.getElementById('descripcion').value;
const comentario = document.getElementById('comentario').value;

if (!luminariaActual) {
throw new Error("Luminaria no válida");
}

const luminaria_id = luminariaActual.id;

/* 🔥 INSERT EN SUPABASE + OBTENER ID */

const { data: insertedData, error: errorInsert } = await supabaseClient
.from('reportes_vecinales')
.insert([{
  luminaria_id: luminaria_id,
  no_luminaria: no_luminaria,
  descripcion: descripcion,
  estatus: 'NUEVO',
  observaciones: comentario
}])
.select();

if (errorInsert) throw errorInsert;

const reporte_id = insertedData[0].id;

/* 🔗 ENVIAR A GOOGLE SHEETS */

const formData = new URLSearchParams();
formData.append("data", JSON.stringify({
  id: reporte_id,
  no_luminaria: no_luminaria,
  descripcion: descripcion,
  observaciones: comentario,
  estatus: "NUEVO",
  luminaria_id: luminaria_id
}));

await fetch(GAS_URL, {
  method: "POST",
  body: formData
});

mensaje.innerText =
"Gracias por tu reporte. Será registrado y atendido a la brevedad.";

mensaje.className = "text-center text-green-600";

/* 🔥 NUEVO */
refrescarLooker();

document.getElementById('formReporte').reset();
document.getElementById('info_luminaria').innerHTML = "";
luminariaActual = null;

document.getElementById('btn_enviar').disabled = true;

} catch (error) {

mensaje.innerText = "Error: " + error.message;
mensaje.className = "text-center text-red-600";

console.error(error);

}

});

</script>

</body>
</html>

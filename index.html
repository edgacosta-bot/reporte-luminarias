<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inicio</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="auth.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
}

.header {
  text-align: center;
  padding: 30px 20px 10px;
}

.logo {
  width: 90px;
  margin-bottom: 10px;
}

.rol {
  color: #cbd5f5;
  font-size: 14px;
}

.logout {
  text-align: center;
  margin-bottom: 15px;
}

.logout button {
  background: #9F2241;
  color: white;
  border: none;
  padding: 10px 18px;
  border-radius: 10px;
}

.menu {
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.button {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 22px;
  border-radius: 18px;
  text-decoration: none;
  font-size: 17px;
  box-shadow: 0 6px 16px rgba(0,0,0,0.25);
}

.icon {
  font-size: 26px;
}

.submenu {
  display: none;
  flex-direction: column;
  gap: 10px;
  margin-left: 6px;
  margin-top: 8px;
  margin-bottom: 12px;
}

.submenu .button {
  background: rgba(255,255,255,0.05);
  font-size: 15px;
  padding: 14px;
}

/* COLORES RESIDENTE */
.btn-azul1 { background: #005187; color: white; }
.btn-azul2 { background: #4d82bc; color: white; }
.btn-azul3 { background: #84b6f4; color: white; }
.btn-azul4 { background: #c4dafa; color: #0f172a; }
.btn-blanco { background: #fcffff; color: #0f172a; }

</style>

</head>

<body>

<div class="header">
  <img src="icono-512.png" class="logo">
  <h1>Villas de la Concepción</h1>
  <div class="rol" id="rolTexto"></div>
</div>

<div class="logout">
  <button onclick="logout()">Cerrar sesión</button>
</div>

<div class="menu" id="menuResidente" style="display:none;">

<button class="button btn-azul1" onclick="toggleMenu('qr_res')">
🔐 Generar QR
</button>
<div id="qr_res" class="submenu">
<a href="crear_qr.html" class="button btn-azul3">Visitantes</a>
<a href="trabajador_hogar_registro.html" class="button btn-azul3">Empleado doméstico</a>
</div>

<button class="button btn-azul2" onclick="toggleMenu('paq')">
📦 Paquetería
</button>
<div id="paq" class="submenu">
<a href="residente_paquetes.html" class="button btn-azul3">Autorizar recepción</a>
<a href="mis_paquetes.html" class="button btn-azul3">Mis paquetes</a>
</div>

<a href="servicios_arribo.html" class="button btn-azul3">🚚 Accesos servicios</a>

<a href="trabajadores_hogar_gestion.html" class="button btn-azul3">👨‍🔧 Empleados domésticos</a>

<button class="button btn-azul1" onclick="toggleMenu('reportes')">
🚨 Reportes
</button>
<div id="reportes" class="submenu">
<a href="incidencia_vecinal.html" class="button btn-azul3">Vecinal</a>
<a href="reporte_vigilante.html" class="button btn-azul3">Vigilante</a>
<a href="reporte_obras.html" class="button btn-azul3">Obras</a>
<a href="formulario_luminarias.html" class="button btn-azul3">Luminaria</a>
<a href="formulario_agua.html" class="button btn-azul3">Agua</a>
</div>

<button class="button btn-azul2" onclick="toggleMenu('infra_res')">
🏙 Infraestructura
</button>
<div id="infra_res" class="submenu">
<a href="luminarias_dashboard.html" class="button btn-azul3">Luminarias</a>
<a href="https://drive.google.com" class="button btn-azul3">Croquis</a>
<a href="videocamaras.html" class="button btn-azul3">Videovigilancia</a>
<a href="cerco_electrico.html" class="button btn-azul3">Cerco eléctrico</a>
</div>

<a href="https://drive.google.com" class="button btn-azul4">
💰 Aportaciones luminarias
</a>

<a href="obras_aprobacion.html" class="button btn-blanco">
🏗 Situación obras
</a>

</div>

<script>

function toggleMenu(id){
  const el = document.getElementById(id);
  const isVisible = window.getComputedStyle(el).display !== "none";
  el.style.display = isVisible ? "none" : "block";
}

async function logout(){
  await supabaseClient.auth.signOut();
  window.location.href = "login.html";
}

window.addEventListener("load", async () => {

  const { data } = await supabaseClient.auth.getSession();
  const user = data?.session?.user;

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  const { data: residente } = await supabaseClient
    .from("residentes")
    .select("tipo")
    .eq("user_id", user.id)
    .single();

  document.getElementById("rolTexto").innerText = residente?.tipo?.toUpperCase();

  document.getElementById("menuResidente").style.display = "block";

  ["qr_res","paq","reportes","infra_res"].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.style.display="none";
  });

});

</script>

</body>
</html>

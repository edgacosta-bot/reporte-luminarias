<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Gestión Vecinal</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-100 p-4">

<div class="max-w-md md:max-w-lg mx-auto space-y-6">

    <!-- ENCABEZADO -->
    <div class="text-center bg-white p-5 rounded-2xl shadow">
        <h1 class="text-xl font-bold text-gray-800">
            Plataforma de Gestión Vecinal
        </h1>
        <p class="text-sm font-semibold text-blue-600">
            Villas de la Concepción
        </p>
        <p class="text-xs text-gray-500 mt-1">
            Reporte de infraestructura y servicios comunitarios
        </p>
    </div>

    <!-- FORMULARIO -->
    <div class="bg-white shadow rounded-2xl p-5">

        <h2 class="text-lg font-bold text-gray-700 mb-3">
            💡 Reporte de Luminarias
        </h2>

        <form id="form-reporte" class="space-y-4">

            <input type="hidden" id="tipo_infraestructura" value="LUMINARIA">

            <!-- Número -->
            <div>
                <label class="block text-sm text-gray-600 mb-1">
                    No. de luminaria
                </label>
                <input type="number" id="no_luminaria" required
                    class="w-full p-3 border rounded-lg text-base focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <!-- Tipo de falla -->
            <div>
                <label class="block text-sm text-gray-600 mb-1">
                    Tipo de falla
                </label>
                <select id="descripcion" required
                    class="w-full p-3 border rounded-lg text-base focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="NO_PRENDE">No prende</option>
                    <option value="PARPADEA">Parpadea</option>
                    <option value="BAJA_ILUMINACION">Baja iluminación</option>
                    <option value="DAÑO_FISICO">Daño físico</option>
                </select>
            </div>

            <!-- Observaciones -->
            <div>
                <label class="block text-sm text-gray-600 mb-1">
                    Observaciones (opcional)
                </label>
                <textarea id="observaciones" rows="3"
                    class="w-full p-3 border rounded-lg text-base focus:ring-2 focus:ring-blue-500 outline-none"
                    placeholder="Detalles adicionales..."></textarea>
            </div>

            <!-- BOTÓN -->
            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition">
                Enviar reporte
            </button>

        </form>

        <!-- MENSAJE DE CONFIANZA -->
        <p class="text-xs text-gray-400 text-center mt-4 leading-relaxed">
            Este sistema es de uso exclusivo para vecinos del fraccionamiento.
            La información se utiliza únicamente para el mantenimiento y mejora
            de los servicios comunitarios.
        </p>

    </div>

</div>

<script>
const SUPABASE_URL = 'https://prjxmfhahnzosdwljode.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzwtyJFPJHBne7BAADj4BIRkBXjsCOb88ybuiizjO4xO9JokDLpweA0oge_c7Xnqsam/exec'; // /exec
const LOOKER_URL_BASE = 'https://lookerstudio.google.com/embed/reporting/d16fb6ac-e2b8-484f-b9cd-18aebbb0e4f1/page/p_81p916em1d';

// ENVÍO
document.getElementById('form-reporte').addEventListener('submit', async (e) => {
    e.preventDefault();

    const datos = {
        tipo_infraestructura: 'LUMINARIA',
        no_luminaria: document.getElementById('no_luminaria').value,
        descripcion: document.getElementById('descripcion').value,
        observaciones: document.getElementById('observaciones').value,
        estatus: 'NUEVO'
    };

    try {
        // Supabase
        const { error } = await supabase
            .from('reportes_vecinales')
            .insert([datos]);

        if (error) throw error;

        // Google Sheets
        await fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(datos)
        });

        alert("✅ Reporte enviado correctamente");

        document.getElementById('form-reporte').reset();

    } catch (err) {
        console.error(err);
        alert("Error: " + err.message);
    }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plataforma de Gestión Vecinal</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-100 p-4">

<div class="max-w-md mx-auto space-y-6">

    <div class="text-center bg-white p-5 rounded-2xl shadow">
        <h1 class="text-xl font-bold text-gray-800">
            Plataforma de Gestión Vecinal
        </h1>
        <p class="text-sm font-semibold text-blue-600">
            Villas de la Concepción
        </p>
    </div>

    <div class="bg-white shadow rounded-2xl p-5">

        <h2 class="text-lg font-bold text-gray-700 mb-3">
            💡 Reporte de Luminarias
        </h2>

        <form id="form-reporte" class="space-y-4">

            <div>
                <label class="block text-sm text-gray-600 mb-1">
                    No. de luminaria
                </label>

                <input type="number" id="no_luminaria" required
                    class="w-full p-3 border rounded-lg">

                <p id="mensaje-validacion" class="text-xs mt-1"></p>
                <p id="ubicacion" class="text-xs text-gray-500 mt-1"></p>
            </div>

            <div>
                <label class="block text-sm text-gray-600 mb-1">
                    Tipo de falla
                </label>

                <select id="descripcion" required
                    class="w-full p-3 border rounded-lg">
                    <option value="" disabled selected>Selecciona una opción</option>
                    <option value="NO_PRENDE">No prende</option>
                    <option value="PARPADEA">Parpadea</option>
                    <option value="BAJA_ILUMINACION">Baja iluminación</option>
                    <option value="DAÑO_FISICO">Daño físico</option>
                </select>
            </div>

            <div>
                <label class="block text-sm text-gray-600 mb-1">
                    Observaciones (opcional)
                </label>

                <textarea id="observaciones" rows="2"
                    class="w-full p-3 border rounded-lg"
                    placeholder="Detalles adicionales..."></textarea>
            </div>

            <button type="submit"
                class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl disabled:bg-gray-400">
                Enviar reporte
            </button>

        </form>

    </div>

</div>

<script>
const SUPABASE_URL = 'https://prjxmfhahnzosdwljode.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzwtyJFPJHBne7BAADj4BIRkBXjsCOb88ybuiizjO4xO9JokDLpweA0oge_c7Xnqsam/exec'; // /exec
const LOOKER_URL_BASE = 'https://lookerstudio.google.com/embed/reporting/d16fb6ac-e2b8-484f-b9cd-18aebbb0e4f1/page/p_81p916em1d';

const input = document.getElementById('no_luminaria');
const mensaje = document.getElementById('mensaje-validacion');
const ubicacionTxt = document.getElementById('ubicacion');
const boton = document.querySelector('button[type="submit"]');

let timeout = null;

input.addEventListener('input', () => {

    clearTimeout(timeout);

    const valor = input.value;

    if (!valor) {
        mensaje.innerText = "";
        ubicacionTxt.innerText = "";
        boton.disabled = false;
        return;
    }

    timeout = setTimeout(async () => {

        // 🔹 1. BUSCAR LUMINARIA
        const { data: luminaria, error } = await supabase
            .from('control_luminarias')
            .select('*')
            .eq('"No. Luminaria"', valor)
            .single();

        if (error || !luminaria) {
            mensaje.innerText = "⚠️ Luminaria no encontrada";
            mensaje.className = "text-xs mt-1 text-red-600";
            ubicacionTxt.innerText = "";
            boton.disabled = true;
            return;
        }

        // 🔹 2. UBICACIÓN
        if (luminaria.ubicacion_id) {
            const { data: ubicacion } = await supabase
                .from('ubicaciones')
                .select('calle')
                .eq('id', luminaria.ubicacion_id)
                .single();

            if (ubicacion) {
                ubicacionTxt.innerText = "📍 " + ubicacion.calle;
            }
        }

        // 🔹 3. VALIDACIÓN REAL
        if (luminaria.situacion_id == 2) {
            mensaje.innerText = "⚠️ Esta luminaria ya se encuentra fuera de servicio";
            mensaje.className = "text-xs mt-1 text-red-600";
            boton.disabled = true;
        } else {
            mensaje.innerText = "✔ Disponible para reporte";
            mensaje.className = "text-xs mt-1 text-green-600";
            boton.disabled = false;
        }

    }, 400);
});

// ENVÍO
document.getElementById('form-reporte').addEventListener('submit', async (e) => {
    e.preventDefault();

    const datos = {
        no_luminaria: input.value,
        descripcion: document.getElementById('descripcion').value,
        observaciones: document.getElementById('observaciones').value,
        estatus: 'NUEVO'
    };

    try {
        const { error } = await supabase
            .from('reportes_vecinales')
            .insert([datos]);

        if (error) throw error;

        await fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(datos)
        });

        alert("✅ Reporte enviado correctamente");

        document.getElementById('form-reporte').reset();
        mensaje.innerText = "";
        ubicacionTxt.innerText = "";

    } catch (err) {
        alert("Error: " + err.message);
    }
});
</script>

</body>
</html>

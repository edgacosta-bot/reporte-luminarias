<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Reportes - Luminarias</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-100 p-4">

<div class="max-w-4xl mx-auto space-y-6">

    <!-- FORMULARIO -->
    <div class="bg-white shadow-xl rounded-2xl p-6">
        <h2 class="text-2xl font-bold text-gray-800 mb-4">Reportar Falla de Luminaria</h2>

        <form id="form-reporte" class="space-y-4">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

                <div>
                    <label class="block text-sm font-medium text-gray-700">No. Luminaria</label>

                    <input type="number" id="no_luminaria" required
                        class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">

                    <p id="mensaje" class="text-xs mt-1"></p>
                    <p id="ubicacion" class="text-xs text-gray-500"></p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Tipo de Falla</label>

                    <select id="descripcion" required
                        class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">

                        <option value="" disabled selected>Selecciona una opción</option>
                        <option value="NO_PRENDE">No prende</option>
                        <option value="PARPADEA">Parpadea</option>
                        <option value="BAJA_ILUMINACION">Baja iluminación</option>
                        <option value="DAÑO_FISICO">Daño físico</option>

                    </select>
                </div>

            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Observaciones (Opcional)</label>

                <textarea id="observaciones" rows="2"
                    class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                    placeholder="Detalles adicionales..."></textarea>
            </div>

            <button id="btn-enviar" type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded-xl transition">
                Enviar Reporte
            </button>

        </form>
    </div>

</div>

<script>
document.addEventListener('DOMContentLoaded', () => {

const SUPABASE_URL = 'https://prjxmfhahnzosdwljode.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs'; // ← PON TU KEY

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const input = document.getElementById('no_luminaria');
const mensaje = document.getElementById('mensaje');
const ubicacionTxt = document.getElementById('ubicacion');
const boton = document.getElementById('btn-enviar');

let timeout = null;

// VALIDACIÓN
input.addEventListener('input', () => {

    clearTimeout(timeout);

    const valor = parseInt(input.value);

    if (!valor) {
        mensaje.innerText = "";
        ubicacionTxt.innerText = "";
        boton.disabled = false;
        return;
    }

    timeout = setTimeout(async () => {

        // 1. EXISTENCIA
        const { data: luminaria, error } = await supabase
            .from('control_luminarias')
            .select('*')
            .eq('No. Luminaria', valor)
            .maybeSingle();

        if (error) {
            console.error(error);
        }

        if (!luminaria) {
            mensaje.innerText = "⚠️ Esta luminaria no existe";
            mensaje.className = "text-xs mt-1 text-red-600";
            ubicacionTxt.innerText = "";
            boton.disabled = true;
            return;
        }

        // 2. UBICACIÓN
        if (luminaria.ubicacion_id) {
            const { data: ubicacion } = await supabase
                .from('ubicaciones')
                .select('calle')
                .eq('id', luminaria.ubicacion_id)
                .maybeSingle();

            if (ubicacion) {
                ubicacionTxt.innerText = "📍 " + ubicacion.calle;
            }
        }

        // 3. ESTADO
        if (luminaria.situacion_id == 2) {
            mensaje.innerText = "⚠️ Esta luminaria ya se encuentra fuera de servicio";
            mensaje.className = "text-xs mt-1 text-red-600";
            boton.disabled = true;
        } else {
            mensaje.innerText = "";
            boton.disabled = false;
        }

    }, 400);
});

// ENVÍO
document.getElementById('form-reporte').addEventListener('submit', async (e) => {
    e.preventDefault();

    const datos = {
        no_luminaria: input.value,
        descripcion: document.getElementById('descripcion').value,
        observaciones: document.getElementById('observaciones').value,
        estatus: 'NUEVO'
    };

    try {
        const { error } = await supabase.from('reportes_vecinales').insert([datos]);
        if (error) throw error;

        alert("✅ Reporte enviado correctamente");

        document.getElementById('form-reporte').reset();
        mensaje.innerText = "";
        ubicacionTxt.innerText = "";

    } catch (err) {
        alert("Error: " + err.message);
    }
});

});
</script>

</body>
</html>

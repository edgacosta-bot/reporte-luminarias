<!DOCTYPE html>
<html lang="es">
<head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="utils/residente.js"></script>

<script>
protegerPagina(["colono","residente"]);
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporte a Vigilante</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: #111827;
  padding: 25px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
}

h2 {
  text-align: center;
}

select, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: #1f2937;
  color: white;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  border-radius: 12px;
  border: none;
  background: #dc2626;
  color: white;
}

.mensaje {
  text-align: center;
  margin-top: 10px;
}

.error { color: #f87171; }
.ok { color: #34d399; }

.back {
  margin-top: 10px;
  text-align: center;
  color: #9ca3af;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="card">

<h2>👮 Reportar Vigilante</h2>

<select id="vigilante">
  <option value="">Selecciona vigilante</option>
</select>

<select id="tipo">
  <option value="">Tipo de reporte</option>
</select>

<textarea id="descripcion" placeholder="Describe lo ocurrido..."></textarea>

<button onclick="enviar()">Enviar reporte</button>

<div id="mensaje" class="mensaje"></div>

<div class="back" onclick="history.back()">← Volver</div>

</div>

<script>

/* 🔥 CATÁLOGO DINÁMICO */
async function cargarCatalogo(){

  // 🔴 LÍNEA CRÍTICA (faltaba)
  const residente = await getResidente();

  // 🔴 AQUÍ EXACTO van los logs
  console.log("RESIDENTE COMPLETO:", residente);
  console.log("TIPO EXACTO:", JSON.stringify(residente?.tipo));

  if (!residente) {
    console.error("No se pudo obtener residente");
    return;
  }

  const { data, error } = await supabaseClient
    .from("catalogo_reportes")
    .select("subtipo")
    .eq("categoria","seguridad")
    .eq("actor_permitido", residente.tipo)
    .eq("activo", true)
    .order("subtipo");

  if(error){
    console.error(error);
    return;
  }

  const select = document.getElementById("tipo");

  select.innerHTML = '<option value="">Tipo de reporte</option>'; // reset limpio

  data?.forEach(i=>{
    const opt = document.createElement("option");
    opt.value = i.subtipo;

    opt.textContent = i.subtipo
      .replaceAll("_"," ")
      .replace(/\b\w/g, l => l.toUpperCase());

    select.appendChild(opt);
  });
}

/* 👮 LISTA DE VIGILANTES (CORREGIDO) */
async function cargarVigilantes(){

  const { data, error } = await supabaseClient
    .from("residentes")
    .select("id,nombre")
    .eq("tipo","vigilante")
    .eq("activo", true)
    .order("nombre");

  if(error){
    console.error(error);
    return;
  }

  const select = document.getElementById("vigilante");

  data?.forEach(v=>{
    const opt = document.createElement("option");
    opt.value = v.id;
    opt.textContent = v.nombre;
    select.appendChild(opt);
  });
}

/* 🚀 ENVIAR */
async function enviar(){

  const vigilante_id = document.getElementById("vigilante").value;
  const tipo = document.getElementById("tipo").value;
  const descripcion = document.getElementById("descripcion").value.trim();
  const msg = document.getElementById("mensaje");

  msg.className = "mensaje";

  if(!vigilante_id || !tipo || !descripcion){
    msg.innerText = "Completa todos los campos";
    msg.classList.add("error");
    return;
  }

  // 🔥 OBTENER RESIDENTE
  const residente = await getResidente();

  if (!residente) {
    msg.innerText = "Error de sesión";
    msg.classList.add("error");
    return;
  }

  const { error } = await supabaseClient
    .from("reportes_vigilantes")
    .insert([{
      vigilante_id,
      tipo,
      descripcion,

      privada: residente.privada,
      casa: residente.casa,

      residente_id: residente.id,

      creado_por: residente.id,
      rol_creador: residente.tipo,

      fecha_reporte: new Date().toISOString(),
      estatus: "nuevo"
    }]);
  
  if(error){
    console.error(error);
    msg.innerText = "Error al enviar reporte";
    msg.classList.add("error");
    return;
  }

  msg.innerText = "Reporte enviado correctamente ✅";
  msg.classList.add("ok");

  document.getElementById("descripcion").value = "";
  document.getElementById("tipo").value = "";
  document.getElementById("vigilante").value = "";
}

/* INIT */
async function init(){
  await cargarCatalogo();
  await cargarVigilantes();
}

init();

</script>

</body>
</html>

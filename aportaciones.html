<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Situación de aportaciones</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

.header {
  text-align: center;
  margin-bottom: 15px;
}

/* 🔥 FILTROS */
.filtros {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

.filtros input, .filtros select {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

/* LOTES */
.section-title {
  margin: 10px 0;
  font-size: 13px;
  color: #9ca3af;
}

.lote {
  background: #1e293b;
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.lote span { flex: 1; }

select {
  padding: 6px;
  border-radius: 6px;
  border: none;
}

.btn-save {
  background: #22c55e;
  border: none;
  padding: 6px 10px;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

/* BOTONES */
.button {
  display: block;
  padding: 14px;
  border-radius: 12px;
  margin-top: 10px;
  color: white;
  text-align: center;
  background: #2563eb;
  text-decoration: none;
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-content {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <h2>💰 Situación de aportaciones</h2>
</div>

<!-- 🔥 FILTROS -->
<div class="filtros">
  <input id="busqueda" placeholder="Buscar lote..." oninput="aplicarFiltros()">
  
  <select id="filtroEstado" onchange="aplicarFiltros()">
    <option value="">Todos</option>
    <option value="corriente">Corriente</option>
    <option value="atraso_1">Atraso</option>
    <option value="moroso">Moroso</option>
  </select>
</div>

<div id="contenedor"></div>

<a href="#" onclick="guardarCambios()" class="button">Guardar cambios</a>
<a href="index.html" class="button" style="background:#6b7280;">Regresar</a>

</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitulo"></h3>
    <p id="modalTexto"></p>
    <button onclick="cerrarModal()">Aceptar</button>
  </div>
</div>

<script>
const supabaseClient = supabase.createClient(
  "https://prjxmfhahnzosdwljode.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs"
);

let dataGlobal = [];
let cambios = {};

if (localStorage.getItem("rol") !== "admin") {
  window.location.href = "index.html";
}

function mostrarModal(t, m) {
  document.getElementById("modalTitulo").innerText = t;
  document.getElementById("modalTexto").innerText = m;
  document.getElementById("modal").style.display = "flex";
}

function cerrarModal() {
  document.getElementById("modal").style.display = "none";
}

function obtenerColor(e) {
  if (e === 'corriente') return '#16a34a';
  if (e === 'atraso_1') return '#f59e0b';
  if (e === 'moroso') return '#dc2626';
}

function mapEstadoFrontend(e) {
  return e === 'atraso_1' ? 'atraso' : e;
}

async function cargar() {
  const { data } = await supabaseClient
    .from('residentes')
    .select('id, privada, casa, estado_pago')
    .eq('tipo', 'residente');

  dataGlobal = data;
  aplicarFiltros();
}

function aplicarFiltros() {
  const texto = document.getElementById("busqueda").value.toLowerCase();
  const estado = document.getElementById("filtroEstado").value;

  let filtrado = dataGlobal.filter(r => {

    const matchTexto =
      r.casa.toString().includes(texto) ||
      r.privada.toLowerCase().includes(texto);

    const matchEstado =
      !estado || r.estado_pago === estado;

    return matchTexto && matchEstado;
  });

  render(filtrado);
}

function render(data) {

  const contenedor = document.getElementById("contenedor");
  contenedor.innerHTML = "";

  data.sort((a, b) => {
    if (a.privada !== b.privada) {
      return a.privada.localeCompare(b.privada);
    }
    return parseInt(a.casa) - parseInt(b.casa);
  });

  const grupos = {};

  data.forEach(r => {
    if (!grupos[r.privada]) grupos[r.privada] = [];
    grupos[r.privada].push(r);
  });

  for (const privada in grupos) {

    const titulo = document.createElement("div");
    titulo.className = "section-title";
    titulo.innerText = "Privada " + privada;
    contenedor.appendChild(titulo);

    grupos[privada].forEach(r => {

      const estadoUI = mapEstadoFrontend(r.estado_pago);

      const div = document.createElement("div");
      div.className = "lote";
      div.style.borderLeft = "6px solid " + obtenerColor(r.estado_pago);

      div.innerHTML = `
        <span>Lote ${r.casa}</span>

        <select id="sel_${r.id}">
          <option value="corriente" ${estadoUI === 'corriente' ? 'selected' : ''}>Corriente</option>
          <option value="atraso" ${estadoUI === 'atraso' ? 'selected' : ''}>Atraso</option>
          <option value="moroso" ${estadoUI === 'moroso' ? 'selected' : ''}>Moroso</option>
        </select>

        <button class="btn-save" onclick="guardarUno('${r.id}')">💾</button>
      `;

      contenedor.appendChild(div);
    });
  }
}

async function guardarUno(id) {
  const estado = document.getElementById(`sel_${id}`).value;

  const { error } = await supabaseClient
    .from('residentes')
    .update({
      estado_pago: estado === 'atraso' ? 'atraso_1' : estado
    })
    .eq('id', id);

  if (error) {
    mostrarModal("Error", "No se pudo actualizar");
    return;
  }

  mostrarModal("Listo", "Actualizado");
  cargar();
}

async function guardarCambios() {
  const lista = Object.keys(cambios).map(id => ({
    id,
    estado: cambios[id]
  }));

  if (lista.length === 0) {
    mostrarModal("Sin cambios", "No hay nada que actualizar");
    return;
  }

  await supabaseClient.rpc(
    'actualizar_estado_pago_masivo',
    { cambios: lista }
  );

  mostrarModal("Listo", "Actualizado correctamente");
  cambios = {};
  cargar();
}

cargar();
</script>

</body>
</html>

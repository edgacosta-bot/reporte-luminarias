<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Validación de acceso</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: white;
      text-align: center;
      transition: background 0.3s ease;
    }

    .container {
      padding: 20px;
      max-width: 320px;
      width: 100%;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .ok { background: #16a34a; }
    .warn { background: #f59e0b; }
    .error { background: #dc2626; }

    .control {
      margin-top: 25px;
      display: none;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #334155;
      margin-top: 10px;
      font-size: 18px;
      text-align: center;
      background: #020617;
      color: white;
      font-weight: bold;
      letter-spacing: 2px;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      border-radius: 10px;
      border: none;
      font-weight: bold;
      font-size: 18px;
      cursor: pointer;
    }

    .btn {
      background: #020617;
      color: white;
      opacity: 0.4;
    }

    .btn.enabled {
      opacity: 1;
      transform: scale(1.02);
    }

    .error-box {
      display: none;
      margin-top: 12px;
      padding: 10px;
      border-radius: 8px;
      background: #7f1d1d;
      color: #fecaca;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">
  <h1 id="estado">Validando...</h1>
  <div id="detalle"></div>

  <div id="control" class="control">
    <input type="password" id="pin" placeholder="Ingrese PIN">

    <!-- 🔴 ERROR BONITO -->
    <div id="errorPin" class="error-box">
      PIN incorrecto
    </div>

    <button id="btnAutorizar" class="btn" disabled>
      Autorizar acceso
    </button>
  </div>
</div>

<script>

const client = window.supabase.createClient(
  'https://prjxmfhahnzosdwljode.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs'
);

const params = new URLSearchParams(window.location.search);
const qr = params.get("qr")?.trim();

let visitaGlobal = null;
let tipoAccion = "";
let accesoActual = null;

init();

async function init() {
  await validar();
}

async function validar() {

  const { data, error } = await client
    .from('visitas_qr')
    .select('*')
    .eq('codigo_qr', qr)
    .maybeSingle();

  if (error || !data) {
    pintar("QR inválido", "error");
    return;
  }

  visitaGlobal = data;
  
  // 🔍 verificar si ya tiene salida registrada
const { data: accesosFinalizados } = await client
  .from('accesos_visitas')
  .select('id')
  .eq('visita_id', visitaGlobal.id)
  .not('fecha_hora_salida', 'is', null)
  .limit(1);

if (accesosFinalizados && accesosFinalizados.length > 0) {
  pintar("ACCESO YA FINALIZADO", "error", visitaGlobal);
  return;
}

  if (visitaGlobal.estatus === 'finalizado') {
    pintar("ACCESO YA FINALIZADO", "error", visitaGlobal);
    return;
  }

  if (visitaGlobal.estatus === 'cancelado') {
    pintar("ACCESO CANCELADO", "error", visitaGlobal);
    return;
  }

  const now = new Date();

  const hoy = now.getFullYear() + '-' +
    String(now.getMonth() + 1).padStart(2, '0') + '-' +
    String(now.getDate()).padStart(2, '0');

  const horaActual = now.toTimeString().slice(0,5);

  const horaInicio = visitaGlobal.hora_inicio.slice(0,5);
  const horaFin = visitaGlobal.hora_fin.slice(0,5);

  if (visitaGlobal.fecha_visita !== hoy) {
    pintar("QR NO VÁLIDO PARA HOY", "error", visitaGlobal);
    return;
  }

  if (horaActual < horaInicio || horaActual > horaFin) {
    pintar("FUERA DE HORARIO", "error", visitaGlobal);
    return;
  }

  // 🔍 detectar acceso abierto
  const { data: accesos } = await client
    .from('accesos_visitas')
    .select('id')
    .eq('visita_id', visitaGlobal.id)
    .is('fecha_hora_salida', null)
    .limit(1);

  const acceso = accesos && accesos.length > 0 ? accesos[0] : null;

  if (!acceso) {
    tipoAccion = "entrada";
    pintar("REGISTRAR ENTRADA", "ok", visitaGlobal);
  } else {
    tipoAccion = "salida";
    accesoActual = acceso;
    pintar("REGISTRAR SALIDA", "warn", visitaGlobal);
  }

  document.getElementById("control").style.display = "block";
}

// 🔹 CONTROLES
const pinInput = document.getElementById("pin");
const btn = document.getElementById("btnAutorizar");
const errorDiv = document.getElementById("errorPin");

pinInput.addEventListener("input", () => {
  btn.disabled = pinInput.value.length < 4;
  btn.classList.toggle("enabled", pinInput.value.length >= 4);

  // 🔄 limpiar error al escribir
  errorDiv.style.display = "none";
});

btn.addEventListener("click", async () => {

  btn.disabled = true;
  btn.innerText = "Procesando...";

  const pin = pinInput.value;

  const { data: vigilante } = await client
    .from("residentes")
    .select("id")
    .eq("pin_vigilante", pin)
    .eq("tipo", "vigilante")
    .eq("activo", true)
    .maybeSingle();

  if (!vigilante) {
    errorDiv.style.display = "block";
    pinInput.value = "";
    btn.disabled = false;
    btn.innerText = "Autorizar acceso";
    return;
  }

  const ahora = new Date().toISOString();

  if (tipoAccion === "entrada") {

   const { data: nuevoAcceso, error } = await client
  .from('accesos_visitas')
  .insert([{
    visita_id: visitaGlobal.id,
    fecha_hora_entrada: ahora,
    fecha_hora_salida: null,
    estatus: 'dentro',
    vigilante_id: vigilante.id
  }])
  .select()
  .single();

    if (error) {
      alert("Error al registrar entrada");
      return;
    }

    pintar("ENTRADA REGISTRADA", "ok", visitaGlobal);

    // 🔔 mensaje WA preparado
const mensaje = `Estimado residente, le informamos que su visitante *${visitaGlobal.nombre_visitante}* acaba de ingresar al fraccionamiento. Gracias`;

const url = `https://wa.me/?text=${encodeURIComponent(mensaje)}`;

// 🟢 botón WhatsApp
const btnWA = document.createElement("button");
btnWA.innerText = "Comunicar por WhatsApp";

btnWA.style.marginTop = "12px";

btnWA.style.background = "#16a34a";
btnWA.style.color = "white";
btnWA.style.fontWeight = "bold";
btnWA.style.borderRadius = "10px";
btnWA.style.padding = "14px";
btnWA.style.border = "none";
btnWA.style.cursor = "pointer";

btnWA.onclick = () => {
  window.open(url, '_blank');
};

// limpiar botones previos (por seguridad)
const contenedor = document.querySelector(".container");
const existentes = contenedor.querySelectorAll(".btn-wa");
existentes.forEach(b => b.remove());

btnWA.classList.add("btn-wa");

contenedor.appendChild(btnWA);

    // 🔔 marcar como notificado
const { error: errorNotif } = await client
  .from('accesos_visitas')
  .update({
    notificado: true,
    fecha_notificacion: new Date().toISOString()
  })
  .eq('id', nuevoAcceso.id);

if (errorNotif) {
  console.error("Error registrando notificación", errorNotif);
}

    const mensaje = `Estimado residente, le informamos que su visitante *${visitaGlobal.nombre_visitante}* acaba de ingresar al fraccionamiento. Gracias`;


  } else {

    const { error } = await client
      .from('accesos_visitas')
      .update({
        fecha_hora_salida: ahora,
        estatus: 'fuera',
        vigilante_salida_id: vigilante.id
      })
      .eq('id', accesoActual.id);

    if (error) {
      alert("Error al registrar salida");
      return;
    }

    await client
      .from('visitas_qr')
      .update({ estatus: 'finalizado' })
      .eq('id', visitaGlobal.id);

    pintar("SALIDA REGISTRADA", "warn", visitaGlobal);
  }

  document.getElementById("control").style.display = "none";

  const finalizarBtn = document.createElement("button");
  finalizarBtn.innerText = "Finalizar";

  finalizarBtn.onclick = () => {
    window.location.href = "index.html";
  };

  document.querySelector(".container").appendChild(finalizarBtn);
});

function pintar(mensaje, tipo, data = null) {
  document.getElementById("estado").innerText = mensaje;
  document.body.className = tipo;

  if (data) {
    document.getElementById("detalle").innerHTML = `
      <p><b>${data.nombre_visitante}</b></p>
    `;
  }
}

</script>

</body>
</html>

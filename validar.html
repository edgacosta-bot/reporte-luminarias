<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Validación de acceso</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: white;
      text-align: center;
      transition: background 0.3s ease;
    }

    .container {
      padding: 20px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    p {
      margin: 5px 0;
      font-size: 16px;
    }

    /* 🎯 COLORES SEMÁFORO */
    .ok {
      background: #16a34a; /* verde */
    }

    .warn {
      background: #f59e0b; /* naranja */
    }

    .error {
      background: #dc2626; /* rojo */
    }
  </style>
</head>

<body>

<div class="container">
  <h1 id="estado">Validando...</h1>
  <div id="detalle"></div>
</div>

<script>
const client = window.supabase.createClient(
  'https://prjxmfhahnzosdwljode.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs'
);

// Obtener QR
const params = new URLSearchParams(window.location.search);
const qr = params.get("qr");

// Ejecutar
validar();

async function validar() {

  if (!qr) {
    pintar("QR inválido", "error");
    return;
  }

  const { data, error } = await client
    .from('visitas_qr')
    .select('*')
    .eq('codigo_qr', qr);

  if (error || !data || data.length === 0) {
    pintar("QR NO EXISTE", "error");
    return;
  }

  const visita = data[0];

  // 🔥 FECHA
  const hoy = new Date().toLocaleDateString('en-CA');

  if (visita.fecha_visita !== hoy) {
    pintar("QR NO VÁLIDO PARA HOY", "error", visita);
    return;
  }

  // 🔥 HORA
  const ahora = new Date().toLocaleTimeString('en-GB', {
    hour: '2-digit',
    minute: '2-digit'
  });

  if (visita.hora_inicio && ahora < visita.hora_inicio) {
    pintar("AÚN NO PERMITIDO", "warn", visita);
    return;
  }

  if (visita.hora_fin && ahora > visita.hora_fin) {
    pintar("FUERA DE HORARIO", "warn", visita);
    return;
  }

  if (visita.estatus !== 'activo') {
    pintar("QR YA UTILIZADO", "warn", visita);
    return;
  }

  // ✅ ACCESO PERMITIDO
  pintar("ACCESO PERMITIDO", "ok", visita);

  // Marcar como usado (sin bloquear UI)
  client
    .from('visitas_qr')
    .update({ estatus: 'usado' })
    .eq('id', visita.id);
}

// Mostrar resultado
function pintar(mensaje, tipo, data = null) {

  const estado = document.getElementById("estado");
  const detalle = document.getElementById("detalle");

  estado.innerText = mensaje;

  // 🔥 FONDO COMPLETO TIPO SEMÁFORO
  document.body.className = tipo;

  if (data) {
    detalle.innerHTML = `
      <p><b>Visitante:</b> ${data.nombre_visitante}</p>
      <p><b>Fecha:</b> ${data.fecha_visita}</p>
      <p><b>Origen:</b> ${
        data.tipo_generador === 'administracion'
          ? 'ADMINISTRACIÓN'
          : data.privada + '-' + data.casa
      }</p>
    `;
  }
}
</script>

</body>
</html>

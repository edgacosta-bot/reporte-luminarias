<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Validación de acceso</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;display:flex;align-items:center;justify-content:center;height:100vh;color:#fff;text-align:center;background:#020617}
.container{padding:20px;max-width:320px;width:100%}
.logo{width:80px;margin-bottom:15px}
h1{font-size:28px;margin-bottom:10px;font-weight:bold}
.ok{background:#16a34a}.warn{background:#f59e0b}.error{background:#dc2626}
.control{margin-top:20px;display:block}
input{width:100%;padding:16px;border-radius:10px;border:none;margin-top:10px;font-size:18px;text-align:center;background:#020617;color:#fff;font-weight:bold;letter-spacing:4px}
button{width:100%;padding:14px;margin-top:12px;border-radius:10px;border:none;font-weight:bold;font-size:16px;cursor:pointer}
.btn{background:#020617;color:#fff;opacity:.5}
.btn.enabled{opacity:1}
.error-box{display:none;margin-top:10px;padding:10px;border-radius:8px;background:#7f1d1d;color:#fecaca;font-weight:bold}
.btn-wa{background:#25D366;color:#fff}
.btn-cerrar{background:#020617;color:#fff}
</style>
</head>
<body>
<div class="container">
<img src="/icono-512.png" class="logo">
<h1 id="estado">Validación de visitante</h1>
<div id="detalle">Ingrese el NIP del vigilante para continuar.</div>
<div id="control" class="control">
<input type="password" id="pin" placeholder="Ingrese NIP">
<div id="errorPin" class="error-box"></div>
<button id="btnAutorizar" class="btn" disabled>Autorizar acceso</button>
</div>
</div>
<script>
const qr=new URLSearchParams(location.search).get("qr")?.trim()||"";
console.log("QR recibido:", qr); 
let respuestaRPC=null;
window.addEventListener("DOMContentLoaded",async()=>{
 const {data}=await supabaseClient.auth.getSession();
 if(data.session){await protegerPagina(["vigilante","administracion","residente"]);}
 if(!qr){
   document.getElementById("estado").innerText="Código QR no recibido";
   document.getElementById("detalle").innerText="Escanee nuevamente el código QR.";
   document.getElementById("btnAutorizar").disabled=true;
   return;
 }
 document.getElementById("pin").focus();
});
const pin=document.getElementById("pin");
const btn=document.getElementById("btnAutorizar");
const err=document.getElementById("errorPin");
pin.addEventListener("input",()=>{
 const ok=pin.value.trim().length>=4;
 btn.disabled=!ok;
 btn.classList.toggle("enabled",ok);
 err.style.display="none";
});
btn.onclick=async()=>{
 btn.disabled=true;
 btn.innerText="Procesando...";
 err.style.display="none";
 const {data,error}=await supabaseClient.rpc("validar_acceso_visita",{p_qr:qr,p_pin:pin.value.trim()});
 if(error){return mostrarError("Error de comunicación con el servidor.");}
 respuestaRPC=data;
 if(!respuestaRPC.ok){return mostrarError(respuestaRPC.mensaje||"No fue posible validar el acceso.");}
 const tipo=respuestaRPC.accion==="entrada"?"ok":"warn";
 pintar(respuestaRPC.mensaje,tipo,respuestaRPC);
 const texto=respuestaRPC.accion==="entrada"
 ?`SIGVIC informa: Estimado residente, su visitante *${respuestaRPC.nombre_visitante}* acaba de ingresar al fraccionamiento. Gracias.`
 :`SIGVIC informa: Estimado residente, su visita *${respuestaRPC.nombre_visitante}* acaba de salir del fraccionamiento. Gracias.`;
 crearBotonNotificar(texto,tipo==="ok"?"#16a34a":"#f59e0b");
};
function mostrarError(m){
 err.innerText=m;err.style.display="block";btn.disabled=false;btn.innerText="Autorizar acceso";pin.value="";pin.focus();
}
function crearBotonNotificar(mensaje,color){
 const url=`https://wa.me/?text=${encodeURIComponent(mensaje)}`;
 document.querySelectorAll(".btn-wa,.btn-cerrar").forEach(e=>e.remove());
 const b=document.createElement("button");
 b.className="btn-wa";b.style.background=color;b.innerText="Notificar";
 b.onclick=()=>{
   window.open(url,"_blank");
   b.disabled=true;b.innerText="✔ Notificado";b.style.background="#1e293b";
   const c=document.createElement("button");
   c.className="btn-cerrar";c.innerText="Finalizar";
   c.onclick=()=>{window.close();setTimeout(()=>location.href="about:blank",300);};
   document.querySelector(".container").appendChild(c);
 };
 document.querySelector(".container").appendChild(b);
}
function pintar(msg,tipo,data){
 document.getElementById("control").style.display="none";
 document.body.className=tipo;
 document.getElementById("estado").innerText=msg;
 document.getElementById("detalle").innerHTML=`<p><b>${data.nombre_visitante}</b></p><p style="margin-top:10px;font-size:18px;">Privada ${data.privada} - Lote ${data.casa}</p>`;
}
</script>
</body>
</html>

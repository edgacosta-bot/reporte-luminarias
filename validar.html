<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Validación de acceso</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial;
      text-align: center;
      color: white;
      transition: background 0.3s;
    }

    .container {
      padding: 20px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 15px;
    }

    .detalle {
      font-size: 18px;
      margin-top: 10px;
    }

    .ok { background: #16a34a; }
    .error { background: #dc2626; }
    .warn { background: #f59e0b; color: black; }
  </style>
</head>

<body>

<div class="container">
  <h1 id="estado">Validando...</h1>
  <div id="detalle" class="detalle"></div>
</div>

<script>
const client = window.supabase.createClient(
  'https://prjxmfhahnzosdwljode.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs'
);

const params = new URLSearchParams(window.location.search);
const qr = params.get("qr")?.trim();

validar();

async function validar() {

  if (!qr) {
    pintar("QR inválido", "error");
    return;
  }

  const { data } = await client
    .from('visitas_qr')
    .select('*')
    .eq('codigo_qr', qr);

  if (!data || data.length === 0) {
    pintar("QR NO EXISTE", "error");
    return;
  }

  const visita = data[0];
  const hoy = new Date().toISOString().split('T')[0];

  if (visita.estatus !== 'activo') {
    pintar("QR YA UTILIZADO", "warn", visita);
    return;
  }

  const hoy = new Date().toISOString().split('T')[0];

if (visita.fecha_visita !== hoy) {
  const ahora = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });

// Validar antes de la hora
if (visita.hora_inicio && ahora < visita.hora_inicio) {
  pintar("AÚN NO PERMITIDO", "warn", visita);
  return;
}

// Validar después de la hora
if (visita.hora_fin && ahora > visita.hora_fin) {
  pintar("FUERA DE HORARIO", "warn", visita);
  return;
}
  pintar("QR NO VÁLIDO PARA HOY", "warn", visita);
  return;
}

  pintar("ACCESO PERMITIDO", "ok", visita);

  // Marcar como usado
  await client
    .from('visitas_qr')
    .update({ estatus: 'usado' })
    .eq('id', visita.id);
}

function pintar(mensaje, tipo, data = null) {

  document.body.className = tipo;

  const estado = document.getElementById("estado");
  const detalle = document.getElementById("detalle");

  estado.innerText = mensaje;

  if (data) {
    detalle.innerHTML = `
      👤 ${data.nombre_visitante}<br>
      📅 ${data.fecha_visita}<br>
      🏠 ${
        data.tipo_generador === 'administracion'
          ? 'ADMINISTRACIÓN'
          : data.privada + '-' + data.casa
      }
    `;
  }
}
</script>

</body>
</html>

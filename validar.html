<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Validación de acceso</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: white;
      text-align: center;
      transition: background 0.3s ease;
    }

    .container {
      padding: 20px;
      max-width: 320px;
      width: 100%;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
      font-weight: bold;
    }

    p {
      font-size: 16px;
    }

    .ok { background: #16a34a; }
    .warn { background: #f59e0b; }
    .error { background: #dc2626; }

    /* 🔐 CONTROL */
    .control {
      margin-top: 25px;
      display: none;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #334155;
      margin-top: 10px;
      font-size: 18px;
      text-align: center;
      background: #020617;
      color: white;
      font-weight: bold;
      letter-spacing: 2px;
    }

    input::placeholder {
      color: #94a3b8;
      font-weight: normal;
      letter-spacing: normal;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      border-radius: 10px;
      border: none;
      font-weight: bold;
      font-size: 18px;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn {
      background: #020617;
      color: white;
      opacity: 0.4;
    }

    .btn.enabled {
      opacity: 1;
      background: #020617;
      transform: scale(1.02);
    }

    .btn.enabled:hover {
      transform: scale(1.05);
    }

  </style>
</head>

<body>

<div class="container">
  <h1 id="estado">Validando...</h1>
  <div id="detalle"></div>

  <div id="control" class="control">
    <input type="password" id="pin" placeholder="Ingrese PIN">
    <button id="btnAutorizar" class="btn" disabled>
      Autorizar acceso
    </button>
  </div>
</div>

<script>
const PIN_CORRECTO = "7482";

const client = window.supabase.createClient(
  'https://prjxmfhahnzosdwljode.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs'
);

const params = new URLSearchParams(window.location.search);
const qr = params.get("qr");

let visitaGlobal = null;

validar();

async function validar() {

  const { data } = await client
    .from('visitas_qr')
    .select('*')
    .eq('codigo_qr', qr);

  if (!data || data.length === 0) {
    pintar("QR inválido", "error");
    return;
  }

  const visita = data[0];
  visitaGlobal = visita;

  if (visita.estatus !== 'activo') {
    pintar("QR YA UTILIZADO", "warn", visita);
    return;
  }

  pintar("ACCESO PERMITIDO", "ok", visita);
  document.getElementById("control").style.display = "block";
}

const pinInput = document.getElementById("pin");
const btn = document.getElementById("btnAutorizar");

pinInput.addEventListener("input", () => {
  if (pinInput.value === PIN_CORRECTO) {
    btn.disabled = false;
    btn.classList.add("enabled");
  } else {
    btn.disabled = true;
    btn.classList.remove("enabled");
  }
});

btn.addEventListener("click", async () => {

  const { error } = await client
    .from('visitas_qr')
    .update({
      estatus: 'usado',
      hora_ingreso_utc: new Date().toISOString()
    })
    .eq('id', visitaGlobal.id);

  if (error) {
    alert("Error al registrar acceso");
    return;
  }

  document.getElementById("estado").innerText = "ACCESO REGISTRADO";
});

function pintar(mensaje, tipo, data = null) {
  document.getElementById("estado").innerText = mensaje;
  document.body.className = tipo;

  if (data) {
    document.getElementById("detalle").innerHTML = `
      <p><b>${data.nombre_visitante}</b></p>
    `;
  }
}
</script>

</body>
</html>

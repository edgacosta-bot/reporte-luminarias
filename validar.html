<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Validación de acceso</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: white;
      text-align: center;
      transition: background 0.3s ease;
    }

    .container {
      padding: 20px;
      max-width: 320px;
      width: 100%;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .ok { background: #16a34a; }
    .warn { background: #f59e0b; }
    .error { background: #dc2626; }

    .control {
      margin-top: 25px;
      display: none;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #334155;
      margin-top: 10px;
      font-size: 18px;
      text-align: center;
      background: #020617;
      color: white;
      font-weight: bold;
      letter-spacing: 2px;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      border-radius: 10px;
      border: none;
      font-weight: bold;
      font-size: 18px;
      cursor: pointer;
    }

    .btn {
      background: #020617;
      color: white;
      opacity: 0.4;
    }

    .btn.enabled {
      opacity: 1;
      transform: scale(1.02);
    }
  </style>
</head>

<body>

<div class="container">
  <h1 id="estado">Validando...</h1>
  <div id="detalle"></div>

  <div id="control" class="control">
    <input type="password" id="pin" placeholder="Ingrese PIN">
    <button id="btnAutorizar" class="btn" disabled>
      Autorizar acceso
    </button>
  </div>
</div>

<script>

const client = window.supabase.createClient(
  'https://prjxmfhahnzosdwljode.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByanhtZmhhaG56b3Nkd2xqb2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjE1NjUsImV4cCI6MjA4NzYzNzU2NX0.SHZkaOrD0Em9BRJg67QS6DgZ91qJhQFtGL7YqAssULs'
);

const params = new URLSearchParams(window.location.search);
const qr = params.get("qr");

let visitaGlobal = null;

init();

async function init() {
  await validar();
}

async function validar() {

  const { data, error } = await client
    .from('visitas_qr')
    .select('*')
    .eq('codigo_qr', qr)
    .maybeSingle();

  if (error || !data) {
    pintar("QR inválido", "error");
    return;
  }

  visitaGlobal = data;

  // 🔒 Validaciones de estado
  if (visitaGlobal.estatus === 'finalizado') {
    pintar("ACCESO YA FINALIZADO", "error", visitaGlobal);
    return;
  }

  if (visitaGlobal.estatus === 'cancelado') {
    pintar("ACCESO CANCELADO", "error", visitaGlobal);
    return;
  }

  // 🔒 Validación de fecha y hora
  const now = new Date();
  const hoy = now.getFullYear() + '-' +
  String(now.getMonth() + 1).padStart(2, '0') + '-' +
  String(now.getDate()).padStart(2, '0');
  const ahora = new Date();
  const horaActual = ahora.toTimeString().slice(0,5);

  if (visitaGlobal.fecha_visita !== hoy) {
    pintar("QR NO VÁLIDO PARA HOY", "error", visitaGlobal);
    return;
  }

  if (horaActual < visitaGlobal.hora_inicio || horaActual > visitaGlobal.hora_fin) {
    pintar("FUERA DE HORARIO", "error", visitaGlobal);
    return;
  }

  pintar("ACCESO PERMITIDO", "ok", visitaGlobal);
  document.getElementById("control").style.display = "block";
}

// 🔹 CONTROLES
const pinInput = document.getElementById("pin");
const btn = document.getElementById("btnAutorizar");

pinInput.addEventListener("input", () => {
  if (pinInput.value.length >= 4) {
    btn.disabled = false;
    btn.classList.add("enabled");
  } else {
    btn.disabled = true;
    btn.classList.remove("enabled");
  }
});

btn.addEventListener("click", async () => {

  btn.disabled = true;
  btn.innerText = "Procesando...";

  const pin = pinInput.value;

  const { data: vigilante } = await client
    .from("residentes")
    .select("id, nombre")
    .eq("pin_vigilante", pin)
    .eq("tipo", "vigilante")
    .eq("activo", true)
    .maybeSingle();

  if (!vigilante) {
    alert("PIN incorrecto");
    btn.disabled = false;
    btn.innerText = "Autorizar acceso";
    return;
  }

  const ahora = new Date().toISOString();

  // 🔍 buscar acceso abierto
  const { data: acceso } = await client
    .from('accesos_visitas')
    .select('*')
    .eq('visita_id', visitaGlobal.id)
    .is('fecha_hora_salida', null)
    .maybeSingle();

  if (!acceso) {

    // 👉 ENTRADA
    const { error } = await client
      .from('accesos_visitas')
      .insert([{
        visita_id: visitaGlobal.id,
        fecha_hora_entrada: ahora,
        estatus: 'dentro',
        vigilante_id: vigilante.id
      }]);

    if (error) {
      alert("Error al registrar entrada");
      btn.disabled = false;
      btn.innerText = "Autorizar acceso";
      return;
    }

    pintar("ENTRADA REGISTRADA", "ok", visitaGlobal);

  } else {

    // 👉 SALIDA
    const { error } = await client
      .from('accesos_visitas')
      .update({
        fecha_hora_salida: ahora,
        estatus: 'fuera',
        vigilante_salida_id: vigilante.id
      })
      .eq('id', acceso.id);

    if (error) {
      alert("Error al registrar salida");
      btn.disabled = false;
      btn.innerText = "Autorizar acceso";
      return;
    }

    // 🔥 cerrar QR
    await client
      .from('visitas_qr')
      .update({ estatus: 'finalizado' })
      .eq('id', visitaGlobal.id);

    pintar("SALIDA REGISTRADA", "warn", visitaGlobal);
  }

  document.getElementById("control").style.display = "none";

  const finalizarBtn = document.createElement("button");
  finalizarBtn.innerText = "Finalizar";

  finalizarBtn.onclick = () => {
    window.location.href = "index.html";
  };

  document.querySelector(".container").appendChild(finalizarBtn);
});

function pintar(mensaje, tipo, data = null) {
  document.getElementById("estado").innerText = mensaje;
  document.body.className = tipo;

  if (data) {
    document.getElementById("detalle").innerHTML = `
      <p><b>${data.nombre_visitante}</b></p>
    `;
  }
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Protocolos SIGVIC</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

h1 {
  text-align: center;
}

.banner {
  background: #f59e0b;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 15px;
  color: black;
}

.protocolo {
  background: #111827;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

.protocolo h2 {
  margin-top: 0;
}
</style>
</head>

<body>

<h1>📘 Protocolos SIGVIC</h1>

<div class="banner">
⚠️ Estos procedimientos son obligatorios y forman parte del sistema SIGVIC
</div>

<div id="listaProtocolos"></div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  // 🔐 Validar sesión
  const { data: sessionData } = await supabaseClient.auth.getSession();
  const user = sessionData?.session?.user;

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  // 📥 Obtener protocolos
  const { data, error } = await supabaseClient
    .from("protocolos")
    .select("*")
    .eq("activo", true)
    .order("orden", { ascending: true });

  console.log("DATA:", data);
  console.log("ERROR:", error);

  if (error) {
    console.error("Error cargando protocolos:", error);
    return;
  }

  const contenedor = document.getElementById("listaProtocolos");

  // 🧠 Render dinámico
  contenedor.innerHTML = data.map(p => `
    <div class="protocolo">
      <h2>${p.titulo}</h2>
      <div>${p.contenido}</div>
    </div>
  `).join("");

});
</script>

</body>
</html>

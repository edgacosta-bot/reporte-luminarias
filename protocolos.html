<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  
<meta charset="UTF-8">
<title>Protocolos SIGVIC</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

h1 {
  text-align: center;
}

.banner {
  background: #f59e0b;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 15px;
  color: black;
}

.protocolo {
  background: #111827;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
  word-wrap: break-word;
  overflow-wrap: break-word;
  word-break: break-word;
   max-width: 100%;
  overflow-x: hidden;
  font-size: 15px;
  line-height: 1.5;
}

  .protocolo ul {
  padding-left: 18px;
}

  .protocolo * {
  word-break: break-word;
}

.protocolo h2 {
  margin-top: 0;
}

.btn-doc {
  display: inline-block;
  margin-top: 12px;
  padding: 10px 14px;
  background: #2563eb;
  color: white;
  border-radius: 8px;
  text-decoration: none;
  font-size: 14px;
}

.btn-doc:hover {
  background: #1d4ed8;
}
  
</style>
</head>

<body>

<h1>📘 Reglas SIGVIC</h1>

<div class="banner" id="bannerProtocolos">
⚠️ Estos procedimientos son obligatorios y forman parte del sistema SIGVIC
</div>

<div id="listaProtocolos"></div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  // 🔐 Validar sesión
  const { data: sessionData } = await supabaseClient.auth.getSession();
  const user = sessionData?.session?.user;

  if (!user) {
    window.location.href = "login.html";
    return;
  }

 // 📥 Obtener protocolos
const { data, error } = await supabaseClient
  .from("protocolos")
  .select("*")
  .eq("activo", true)
  .order("orden", { ascending: true });

// 🔴 PRIMERO validar error
if (error) {
  console.error("Error cargando protocolos:", error);
  return;
}

console.log("DATA:", data);

// 🔹 Obtener parámetro
const params = new URLSearchParams(window.location.search);
const moduloFiltro = params.get("modulo");

// 🔹 Asegurar array válido
let dataFiltrada = data || [];

// 🔥 SOLO mostrar módulos operativos en vista general
if (!moduloFiltro) {
  dataFiltrada = dataFiltrada.filter(p =>
    p.modulo === "accesos" || p.modulo === "operacion"
  );
}  
  

// 🔹 Aplicar filtro
if (moduloFiltro) {
  dataFiltrada = dataFiltrada.filter(p =>
    (p.modulo || "").toLowerCase().trim() === moduloFiltro.toLowerCase().trim()
  );
}

// 🎯 Ajustes visuales
if (moduloFiltro === "informacion" || moduloFiltro === "privacidad") {

  // Cambiar título
  if (moduloFiltro === "informacion") {
    document.querySelector("h1").innerText = "📘 ¿Qué es SIGVIC?";
  }

  if (moduloFiltro === "privacidad") {
    document.querySelector("h1").innerText = "📄 Aviso de privacidad";
  }

  // Ocultar banner
  const banner = document.getElementById("bannerProtocolos");
  if (banner) banner.style.display = "none";
}

// 🧪 Debug opcional
console.log("Filtro:", moduloFiltro);
console.log("Filtrados:", dataFiltrada);
  const contenedor = document.getElementById("listaProtocolos");

  // 🧠 Render dinámico
 contenedor.innerHTML = dataFiltrada.map(p => `
  <div class="protocolo">
    
   ${(moduloFiltro === "informacion" || moduloFiltro === "privacidad") ? "" : `<h2>${p.titulo}</h2>`}
    
    <div>${p.contenido}</div>


${p.documento_url ? `
  <a href="${p.documento_url}" target="_blank" class="btn-doc">
    📄 Ver protocolo completo
  </a>
` : ''}
    </div>
  `).join("");

});
</script>

</body>
</html>
